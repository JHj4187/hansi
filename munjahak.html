<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문자학개론 — 한자 자원 탐구</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1410;--im:#3d2e20;--il:#6b5744;
  --pa:#faf8f4;--pw:#f3ede3;--pb:#e0d5c5;
  --red:#c0392b;--rl:#fdf0ee;
  --gold:#9a7d3a;--gl:#faf4e8;
  --sage:#3d6b4a;--sl:#eaf2ec;
  --blue:#1e3a5f;--bl:#e8eef8;
  --sw-bg:#fef9f2;--sw-border:#c8935a;
}
body{font-family:'Noto Sans KR',sans-serif;background:#ece6da;color:var(--ink);min-height:100vh}
.hdr{background:var(--ink);padding:16px 24px}
.hdr-t{font-family:'Noto Serif KR',serif;font-size:17px;color:#f5f0e6;letter-spacing:.12em}
.hdr-s{font-size:11px;color:#8a7d6a;margin-top:3px}
.wrap{max-width:960px;margin:0 auto;padding:22px 16px}
.search-box{background:var(--pa);border-radius:16px;padding:26px 22px;margin-bottom:20px;border:1px solid var(--pb)}
.sb-title{font-family:'Noto Serif KR',serif;font-size:19px;margin-bottom:5px}
.sb-desc{font-size:13px;color:var(--il);margin-bottom:15px;line-height:1.7}
.sb-row{display:flex;gap:10px}
.sb-input{flex:1;background:var(--pw);border:1.5px solid var(--pb);border-radius:10px;padding:12px 15px;font-size:18px;font-family:'Noto Serif KR',serif;color:var(--ink);outline:none;letter-spacing:.1em;transition:border .15s}
.sb-input:focus{border-color:var(--red)}
.sb-btn{padding:12px 22px;border-radius:10px;background:var(--red);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.sb-btn:hover{background:#a93226}
.sb-examples{margin-top:11px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.sb-label{font-size:12px;color:var(--il);flex-shrink:0}
.sb-ex{font-size:13px;padding:4px 12px;border-radius:15px;background:var(--pw);border:1px solid var(--pb);color:var(--il);cursor:pointer;font-family:'Noto Serif KR',serif}
.sb-ex:hover{background:var(--rl);border-color:var(--red);color:var(--red)}
.result-area{display:none}
.result-area.on{display:block}
.result-title{font-family:'Noto Serif KR',serif;font-size:14px;color:var(--il);margin-bottom:16px}
.char-cards{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.char-card{background:var(--pa);border:1px solid var(--pb);border-radius:18px;padding:20px;flex:1;min-width:260px;max-width:480px}
.cc-modern{font-family:'Noto Serif KR',serif;font-size:52px;text-align:center;color:var(--ink);line-height:1;margin-bottom:8px}
.cc-info{text-align:center;padding-bottom:13px;margin-bottom:13px;border-bottom:1px solid var(--pb)}
.cc-eum{font-size:15px;font-weight:600;color:var(--red)}
.cc-hun{font-size:12px;color:var(--il);margin-top:3px}
.script-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;background:var(--pb);border-radius:10px;padding:3px;margin-bottom:12px}
.stab{padding:7px 2px;text-align:center;font-size:11px;color:var(--il);cursor:pointer;border-radius:7px;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-weight:500}
.stab.on{font-weight:600;color:#fff}
.t-oracle.on{background:#8b4513}.t-bronze.on{background:#b8860b}
.t-seal.on{background:#1a3a5a}.t-kai.on{background:var(--sage)}
.canvas-wrap{position:relative;border-radius:12px;overflow:hidden;margin-bottom:10px}
canvas.sv-canvas{display:block;width:100%;aspect-ratio:1}
.cv-badge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;opacity:.9}
.cv-badge.oracle{background:#5a2e00;color:#f5c080}
.cv-badge.bronze{background:#5a4000;color:#f0d060}
.cv-badge.seal{background:#0a1e3a;color:#80b8e0}
.cv-badge.kai{background:#2a4a2a;color:#a0e0a0}
.cv-note{font-size:11px;color:var(--il);text-align:center;margin-bottom:14px;padding:6px 10px;background:var(--pw);border-radius:7px;line-height:1.6}

/* ── 說文解字 박스 (간결 버전) ── */
.sw-box{background:var(--sw-bg);border:1.5px solid var(--sw-border);border-radius:13px;padding:18px 20px;margin-bottom:13px}
.sw-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;flex-wrap:wrap;gap:7px}
.sw-title-wrap{display:flex;align-items:center;gap:7px}
.sw-icon{font-size:15px}
.sw-title{font-size:13px;font-weight:700;color:#6a3010;letter-spacing:.04em;font-family:'Noto Serif KR',serif}
.sw-link{font-size:11px;color:var(--blue);text-decoration:none;padding:3px 10px;background:var(--bl);border-radius:6px;white-space:nowrap;border:1px solid rgba(30,58,95,.2)}
.sw-link:hover{background:#c8d8f0}

/* 원문 */
.sw-original-wrap{margin-bottom:14px}
.sw-orig-label{font-size:10px;font-weight:600;color:#9a5a20;letter-spacing:.1em;margin-bottom:6px}
.sw-original{font-family:'Noto Serif KR',serif;font-size:16px;color:#2a1508;line-height:2;letter-spacing:.08em;padding:11px 15px;background:#fff8ef;border-radius:8px;border-left:3px solid #c8843c}

/* AI 해설 (원문 해석 + 후대 주석) */
.sw-ai-wrap{min-height:60px}
.sw-interp-label{font-size:10px;font-weight:600;color:#9a5a20;letter-spacing:.1em;margin-bottom:6px}
.sw-interp{font-size:14px;color:var(--im);line-height:1.95;padding:11px 15px;background:#fffcf8;border-radius:8px;border-left:3px solid var(--gold)}
.sw-interp p{margin-bottom:0.8em}
.sw-interp p:last-child{margin-bottom:0}
.sw-loading{font-size:13px;color:var(--il);padding:10px 0;display:flex;align-items:center;gap:5px}
.sw-nodata{font-size:12px;color:var(--il);padding:12px;background:var(--pw);border-radius:8px;line-height:1.8;text-align:center}
.sw-nodata a{color:var(--blue)}

.ext-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:0}
.el{font-size:11px;padding:4px 10px;border-radius:7px;background:var(--gl);border:1px solid #d8c888;color:var(--gold);text-decoration:none}
.el:hover{background:#e8d878}

.ex-sec{background:var(--pa);border:1px solid var(--pb);border-radius:14px;overflow:hidden;margin-bottom:12px}
.ex-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 17px;border-bottom:1px solid var(--pb)}
.ex-ttl{font-size:14px;font-weight:500;color:var(--im)}
.ex-cnt{font-size:12px;color:var(--il);background:var(--pw);padding:2px 9px;border-radius:10px}
.ex-list{display:flex;flex-direction:column}
.ex-item{padding:12px 17px;border-bottom:1px solid var(--pb)}
.ex-item:last-child{border-bottom:none}
.ex-src{font-size:11px;font-weight:500;padding:2px 8px;border-radius:9px;margin-bottom:5px;display:inline-block}
.sn{background:var(--bl);color:var(--blue)}.sm{background:var(--sl);color:var(--sage)}
.sd{background:var(--gl);color:var(--gold)}.sz{background:var(--rl);color:var(--red)}
.ex-txt{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--ink);line-height:1.9;letter-spacing:.04em}
.ex-hl{color:var(--red);font-weight:700;background:rgba(192,57,43,.1);border-radius:3px;padding:0 2px}
.ex-more-row{padding:9px 17px;text-align:center}
.btn-more{font-size:12px;padding:5px 15px;border-radius:16px;background:var(--pw);color:var(--il);border:1px solid var(--pb);cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-more:hover{border-color:var(--red);color:var(--red)}
.empty-msg{text-align:center;padding:28px;color:var(--il);font-size:14px}
.ld{display:inline-block;width:5px;height:5px;background:var(--il);border-radius:50%;animation:lda 1.2s infinite;margin:0 2px;vertical-align:middle}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes lda{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:9px;font-size:13px;z-index:200;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-t">문자학개론 — 한자 자원(字源) 탐구</div>
  <div class="hdr-s">《說文解字》 원문 · 해석 · 후대 주석 완전 내장 · 갑골·금·전 자형 · 四書 용례</div>
</header>
<div class="wrap">
  <div class="search-box">
    <div class="sb-title">한자 자원(字源) 탐구</div>
    <div class="sb-desc">한자를 입력하면 <strong>《說文解字》 원문과 해석, 후대 주석서 해설</strong>, 갑골문·금문·소전 자형,
      그리고 논어·맹자·대학·중용의 용례를 함께 제시합니다.</div>
    <div class="sb-row">
      <input class="sb-input" id="SI" placeholder="예: 豫, 俗, 仁, 道" maxlength="4"
        onkeydown="if(event.key==='Enter')doSearch()">
      <button class="sb-btn" onclick="doSearch()">탐구하기</button>
    </div>
    <div class="sb-examples">
      <span class="sb-label">예시:</span>
      <button class="sb-ex" onclick="ss('豫')">豫</button>
      <button class="sb-ex" onclick="ss('俗')">俗</button>
      <button class="sb-ex" onclick="ss('仁')">仁</button>
      <button class="sb-ex" onclick="ss('天')">天</button>
      <button class="sb-ex" onclick="ss('道')">道</button>
      <button class="sb-ex" onclick="ss('心')">心</button>
      <button class="sb-ex" onclick="ss('學')">學</button>
      <button class="sb-ex" onclick="ss('德')">德</button>
      <button class="sb-ex" onclick="ss('孝')">孝</button>
      <button class="sb-ex" onclick="ss('誠')">誠</button>
      <button class="sb-ex" onclick="ss('中')">中</button>
      <button class="sb-ex" onclick="ss('和')">和</button>
      <button class="sb-ex" onclick="ss('性')">性</button>
      <button class="sb-ex" onclick="ss('王')">王</button>
    </div>
  </div>

  <div class="result-area" id="RA">
    <div class="result-title" id="RT"></div>
    <div class="char-cards" id="CC"></div>
    <div id="ES"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var CLASSICS=[{"text":"史記世家曰孔子名丘字仲尼其先宋人父叔梁紇母顔氏以魯襄公二十二年","source":"논어"},{"text":"庚戌之歲十一月庚子生孔子於魯昌平鄕鄹邑爲兒嬉戱常陳俎豆設禮容及長","source":"논어"},{"text":"爲委吏料量平爲司職吏畜蕃息適周問禮於老子旣反而弟子益進昭公二十","source":"논어"},{"text":"五年甲申孔子年三十五而昭公奔齊魯亂於是適齊爲高昭子家臣以通乎景公","source":"논어"},{"text":"公欲封以尼谿之田晏嬰不可公惑之孔子遂行反乎魯定公元年壬辰孔子年四","source":"논어"},{"text":"十三而季氏强僭其臣陽虎作亂專政故孔子不仕而退修詩書禮樂弟子彌衆","source":"논어"},{"text":"九年庚子孔子年五十一公山不狃以費畔季氏召孔子欲往而卒不行定公以","source":"논어"},{"text":"孔子爲中都宰一年四方則之遂爲司空又爲大司寇十年辛丑相定公會齊侯","source":"논어"},{"text":"于夾谷齊人歸魯侵地十二年癸卯使仲由爲季氏宰墮三都收其甲兵孟氏不","source":"논어"},{"text":"肯墮成圍之不克十四年乙巳孔子年五十六攝行相事誅少正卯與聞國政三","source":"논어"},{"text":"月魯國大治齊人歸女樂以沮之季桓子受之郊又不致膰俎於大夫孔子行適衛","source":"논어"},{"text":"主於子路妻兄顔濁鄒家適陳過匡匡人以爲陽虎而拘之旣解還衛主蘧伯玉家","source":"논어"},{"text":"見南子去適宋司馬桓魋欲殺之又去適陳主司城貞子家居三歲而反于衛靈","source":"논어"},{"text":"公不能用晉趙氏家臣佛肸以中牟畔召孔子孔子欲往亦不果將西見趙簡子","source":"논어"},{"text":"至河而反又主蘧伯玉家靈公問陳不對而行復如陳季桓子卒遺言謂康子必","source":"논어"},{"text":"召孔子其臣止之康子乃召冉求孔子如蔡及葉楚昭王將以書社地封孔子令","source":"논어"},{"text":"尹子西不可乃止又反乎衛時靈公已卒衛君輒欲得孔子爲政而冉求爲季氏","source":"논어"},{"text":"將與齊戰有功康子乃召孔子而孔子歸魯實哀公之十一年丁巳而孔子年六十八","source":"논어"},{"text":"矣然魯終不能用孔子孔子亦不求仕乃敍書傳禮記刪詩正樂序易彖繫象說卦","source":"논어"},{"text":"文言弟子蓋三千焉身通六藝者七十二人十四年庚申魯西狩獲麟孔子作春秋","source":"논어"},{"text":"明年辛酉子路死於衛十六年壬戌四月己丑孔子卒年七十三葬魯城北泗上弟","source":"논어"},{"text":"子皆服心喪三年而去惟子貢廬於冢上凡六年孔子生鯉字伯魚先卒伯魚生伋","source":"논어"},{"text":"字子思作中庸何氏曰魯論語二十篇齊論語別有問王知道凡二十二篇其二","source":"논어"},{"text":"十篇中章句頗多於魯論古論出孔氏壁中分堯曰下章子張問以爲一篇有兩子","source":"논어"},{"text":"張凡二十一篇篇次不與齊魯論同程子曰論語之書成於有子曾子之門人故","source":"논어"},{"text":"其書獨二子以子稱程子曰讀論語有讀了全然無事者有讀了後其中得一兩句","source":"논어"},{"text":"喜者有讀了後知好之者有讀了後直有不知手之舞之足之蹈之者程子曰今人","source":"논어"},{"text":"不會讀書如讀論語未讀時是此等人讀了後又只是此等人便是不曾讀程子","source":"논어"},{"text":"曰頤自十七八讀論語當時已曉文義讀之愈久但覺意味深長","source":"논어"},{"text":"此爲書之首篇故所記多務本之意乃入道之門積德之基學者之先務也凡十","source":"논어"},{"text":"01-01-01 子曰學而時習之不亦說乎","source":"논어"},{"text":"學之爲言效也人性皆善而覺有先後後覺者必效先覺之所爲乃可以明善而復","source":"논어"},{"text":"其初也習鳥數飛也學之不已如鳥數飛也說喜意也旣學而又時時習之則所","source":"논어"},{"text":"學者熟而中心喜說其進自不能已矣程子曰習重習也時復思繹浹洽於中則","source":"논어"},{"text":"說也又曰學者將以行之也時習之則所學者在我故悅謝氏曰時習者無時而","source":"논어"},{"text":"不習坐如尸坐時習也立如齊立時習也","source":"논어"},{"text":"01-01-02 有朋自遠方來不亦樂乎","source":"논어"},{"text":"朋同類也自遠方來則近者可知程子曰以善及人而信從者衆故可樂又曰","source":"논어"},{"text":"說在心樂主發散在外","source":"논어"},{"text":"01-01-03 人不知而不慍　不亦君子乎","source":"논어"},{"text":"慍含怒意君子成德之名尹氏曰學在己知不知在人何慍之有程子曰雖樂於","source":"논어"},{"text":"及人不見是而無悶乃所謂君子愚謂及人而樂者順而易不知而不慍者逆而難","source":"논어"},{"text":"故惟成德者能之然德之所以成亦由學之正習之熟說之深而不已焉耳○程","source":"논어"},{"text":"子曰樂由說而後得非樂不足以語君子","source":"논어"},{"text":"01-02-01 有子曰其爲人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之","source":"논어"},{"text":"有子孔子弟子名若善事父母爲孝善事兄長爲弟犯上謂干犯在上之人鮮少也","source":"논어"},{"text":"作亂則爲悖逆爭鬪之事矣此言人能孝弟則其心和順少好犯上必不好作亂也","source":"논어"},{"text":"01-02-02 君子務本本立而道生孝弟也者其爲仁之本與","source":"논어"},{"text":"務專力也本猶根也仁者愛之理心之德也爲仁猶曰行仁與者疑辭謙退","source":"논어"},{"text":"不敢質言也言君子凡事專用力於根本根本旣立則其道自生若上文所謂孝弟","source":"논어"},{"text":"乃是爲仁之本學者務此則仁道自此而生也○程子曰孝弟順德也故不好犯","source":"논어"},{"text":"上豈復有逆理亂常之事德有本本立則其道充大孝弟行於家而後仁愛及於物","source":"논어"},{"text":"所謂親親而仁民也故爲仁以孝弟爲本論性則以仁爲孝弟之本或問孝弟爲仁","source":"논어"},{"text":"之本此是由孝弟可以至仁否曰非也謂行仁自孝弟始孝弟是仁之一事謂之","source":"논어"},{"text":"行仁之本則可謂是仁之本則不可蓋仁是性也孝弟是用也性中只有箇仁義","source":"논어"},{"text":"禮智四者而已曷嘗有孝弟來然仁主於愛愛莫大於愛親故曰孝弟也者其爲","source":"논어"},{"text":"01-03-01 子曰巧言令色鮮矣仁","source":"논어"},{"text":"巧好令善也好其言善其色致飾於外務以悅人則人欲肆而本心之德亡矣","source":"논어"},{"text":"聖人辭不迫切專言鮮則絶無可知學者所當深戒也○程子曰知巧言令色之","source":"논어"},{"text":"非仁則知仁矣","source":"논어"},{"text":"01-04-01 曾子曰吾日三省吾身爲人謀而不忠乎與朋友交而不信乎傳不習乎","source":"논어"},{"text":"曾子孔子弟子名參字子輿盡己之謂忠以實之謂信傳謂受之於師習謂熟","source":"논어"},{"text":"之於己曾子以此三者日省其身有則改之無則加勉其自治誠切如此可謂得","source":"논어"},{"text":"爲學之本矣而三者之序則又以忠信爲傳習之本也○尹氏曰曾子守約故動必","source":"논어"},{"text":"求諸身謝氏曰諸子之學皆出於聖人其後愈遠而愈失其眞獨曾子之學專用心","source":"논어"},{"text":"於內故傳之無弊觀於子思孟子可見矣惜乎其嘉言善行不盡傳於世也其幸","source":"논어"},{"text":"存而未泯者學者其可不盡心乎","source":"논어"},{"text":"01-05-01 子曰道千乘之國敬事而信節用而愛人使民以時","source":"논어"},{"text":"道治也千乘諸侯之國其地可出兵車千乘者也敬者主一無適之謂敬事而信","source":"논어"},{"text":"者敬其事而信於民也時謂農隙之時言治國之要在此五者亦務本之意也○","source":"논어"},{"text":"程子曰此言至淺然當時諸侯果能此亦足以治其國矣聖人言雖至近上下皆","source":"논어"},{"text":"通此三言者若推其極堯舜之治亦不過此若常人之言近則淺近而已矣楊氏","source":"논어"},{"text":"曰上不敬則下慢不信則下疑下慢而疑事不立矣敬事而信以身先之也易曰","source":"논어"},{"text":"節以制度不傷財不害民蓋侈用則傷財傷財必至於害民故愛民必先於節用","source":"논어"},{"text":"然使之不以其時則力本者不獲自盡雖有愛人之心而人不被其澤矣然此特","source":"논어"},{"text":"論其所存而已未及爲政也苟無是心則雖有政不行焉胡氏曰凡此數者又皆","source":"논어"},{"text":"以敬爲主愚謂五者反復相因各有次第讀者宜細推之","source":"논어"},{"text":"01-06-01 子曰弟子入則孝出則弟謹而信汎愛衆而親仁行有餘力則以學文","source":"논어"},{"text":"謹者行之有常也信者言之有實也汎廣也衆謂衆人親近也仁謂仁者餘","source":"논어"},{"text":"力猶言暇日以用也文謂詩書六藝之文○程子曰爲弟子之識力有餘則學","source":"논어"},{"text":"文不修其職而先文非爲己之學也尹氏曰德行本也文藝末也窮其本末知","source":"논어"},{"text":"所先後可以入德矣洪氏曰未有餘力而學文則文滅其質有餘力而不學文則質","source":"논어"},{"text":"勝而野愚謂力行而不學文則無以考聖賢之成法識事理之當然而所行或出於","source":"논어"},{"text":"私意非但失之於野而已","source":"논어"},{"text":"01-07-01 子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有","source":"논어"},{"text":"信雖曰未學吾必謂之學矣","source":"논어"},{"text":"子夏孔子弟子姓卜名商賢人之賢而易其好色之心好善有誠也致猶委也委","source":"논어"},{"text":"致其身謂不有其身也四者皆人倫之大者而行之必盡其誠學求如是而已故","source":"논어"},{"text":"子夏言有能如是之人苟非生質之美必其務學之至雖或以爲未嘗爲學我必謂之","source":"논어"},{"text":"已學也○游氏曰三代之學皆所以明人倫也能是四者則於人倫厚矣學之爲","source":"논어"},{"text":"道何以加此子夏以文學名而其言如此則古人之所謂學者可知矣故學而一篇","source":"논어"},{"text":"大抵皆在於務本吳氏曰子夏之言其意善矣然詞氣之間抑揚大過其流之弊","source":"논어"},{"text":"將或至於廢學必若上章夫子之言然後爲無弊也","source":"논어"},{"text":"01-08-01 子曰君子不重則不威學則不固","source":"논어"},{"text":"重厚重威威嚴固堅固也輕乎外者必不能堅乎內故不厚重則無威嚴而","source":"논어"},{"text":"所學亦不堅固也","source":"논어"},{"text":"01-08-02 主忠信","source":"논어"},{"text":"人不忠信則事皆無實爲惡則易爲善則難故學者必以是爲主焉○程子曰人","source":"논어"},{"text":"道惟在忠信不誠則無物且出入無時莫知其鄕者人心也若無忠信豈復有物乎","source":"논어"},{"text":"01-08-03 無友不如己者過則勿憚改","source":"논어"},{"text":"無毋通禁止辭也友所以輔仁不如己則無益而有損勿亦禁止之辭憚畏難","source":"논어"},{"text":"也自治不勇則惡日長故有過則當速改不可畏難而苟安也程子曰學問之道","source":"논어"},{"text":"無他也知其不善則速改以從善而已","source":"논어"},{"text":"○程子曰君子自修之道當如是也游氏","source":"논어"},{"text":"曰君子之道以威重爲質而學以成之學之道必以忠信爲主而以勝己者輔之","source":"논어"},{"text":"然或吝於改過則終無以入德而賢者未必樂告以善道故以過勿憚改終焉","source":"논어"},{"text":"01-09-01 曾子曰愼終追遠民德歸厚矣","source":"논어"},{"text":"愼終者喪盡其禮追遠者祭盡其誠民德歸厚謂下民化之其德亦歸於厚蓋終","source":"논어"},{"text":"者人之所易忽也而能謹之遠者人之所易忘也而能追之厚之道也故以此自","source":"논어"},{"text":"爲則己之德厚下民化之則其德亦歸於厚也","source":"논어"},{"text":"學而10章","source":"논어"},{"text":"01-10-01 子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與","source":"논어"},{"text":"子禽姓陳名亢子貢姓端木名賜皆孔子弟子或曰亢子貢弟子未知孰是","source":"논어"},{"text":"01-10-02 子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與","source":"논어"},{"text":"溫和厚也良易直也恭莊敬也儉節制也讓謙遜也五者夫子之盛德光輝","source":"논어"},{"text":"接於人者也其諸語辭也人他人也言夫子未嘗求之但其德容如是故時君敬","source":"논어"},{"text":"信自以其政就而問之耳非若他人必求之而後得也聖人過化存神之妙未易窺測","source":"논어"},{"text":"然卽此而觀則其德盛禮恭而不願乎外亦可見矣學者所當潛心而勉學也○謝","source":"논어"},{"text":"氏曰學者觀於聖人威儀之間亦可以進德矣若子貢亦可謂善觀聖人矣亦可謂","source":"논어"},{"text":"善言德行矣今去聖人千五百年以此五者想見其形容尙能使人興起而況於親","source":"논어"},{"text":"炙之者乎張敬夫曰夫子至是邦必聞其政而未有能委國而授之以政者蓋見聖","source":"논어"},{"text":"人之儀刑而樂告之者秉彝好德之良心也而私欲害之是以終不能用耳","source":"논어"},{"text":"學而11章","source":"논어"},{"text":"01-11-01 子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣","source":"논어"},{"text":"父在子不得自專而志則可知父沒然後其行可見故觀此足以知其人之善惡","source":"논어"},{"text":"然又必能三年無改於父之道乃見其孝不然則所行雖善亦不得爲孝矣○尹氏","source":"논어"},{"text":"曰如其道雖終身無改可也如其非道何待三年然則三年無改者孝子之心有","source":"논어"},{"text":"所不忍故也游氏曰三年無改亦謂在所當改而可以未改者耳","source":"논어"},{"text":"學而12章","source":"논어"},{"text":"01-12-01 有子曰禮之用和爲貴先王之道斯爲美小大由之","source":"논어"},{"text":"禮者天理之節文人事之儀則也和者從容不迫之意蓋禮之爲體雖嚴然皆出","source":"논어"},{"text":"於自然之理故其爲用必從容而不迫乃爲可貴先王之道此其所以爲美而小事","source":"논어"},{"text":"大事無不由之也","source":"논어"},{"text":"01-12-02 有所不行知和而和不以禮節之亦不可行也","source":"논어"},{"text":"承上文而言","source":"논어"},{"text":"如此而復有所不行者","source":"논어"},{"text":"以其徒知和之爲貴","source":"논어"},{"text":"不復以禮節之","source":"논어"},{"text":"則亦非復禮之本然矣所以流蕩忘反而亦不可行也○程子曰禮勝則離故禮","source":"논어"},{"text":"之用和爲貴先王之道以斯爲美而小大由之樂勝則流故有所不行者知和而","source":"논어"},{"text":"和不以禮節之亦不可行范氏曰凡禮之體主於敬而其用則以和爲貴敬者禮","source":"논어"},{"text":"之所以立也和者樂之所由生也若有子可謂達禮樂之本矣愚謂嚴而泰和而","source":"논어"},{"text":"節此理之自然禮之全體也毫釐有差則失其中正而各倚於一偏其不可行均矣","source":"논어"},{"text":"學而13章","source":"논어"},{"text":"01-13-01 有子曰信近於義言可復也恭近於禮遠恥辱也因不失其親亦可宗","source":"논어"},{"text":"信約信也義者事之宜也復踐言也恭致敬也禮節文也因猶依也宗猶","source":"논어"},{"text":"主也言約信而合其宜則言必可踐矣致恭而中其節則能遠恥辱矣所依者不失","source":"논어"},{"text":"其可親之人則亦可以宗而主之矣此言人之言行交際皆當謹之於始而慮其所終","source":"논어"},{"text":"不然則因仍苟且之間將有不勝其自失之悔者矣","source":"논어"},{"text":"學而14章","source":"논어"},{"text":"01-14-01 子曰君子食無求飽居無求安敏於事而愼於言就有道而正焉可謂","source":"논어"},{"text":"不求安飽者志有在而不暇及也敏於事者勉其所不足謹於言者不敢盡其所有","source":"논어"},{"text":"餘也然猶不敢自是而必就有道之人以正其是非則可謂好學矣凡言道者皆","source":"논어"},{"text":"謂事物當然之理人之所共由者也○尹氏曰君子之學能是四者可謂篤志力行","source":"논어"},{"text":"者矣然不取正於有道未免有差如楊墨學仁義而差者也其流至於無父無君謂","source":"논어"},{"text":"之好學可乎","source":"논어"},{"text":"學而15章","source":"논어"},{"text":"01-15-01 子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者","source":"논어"},{"text":"諂卑屈也驕矜肆也常人溺於貧富之中而不知所以自守故必有二者之病","source":"논어"},{"text":"無諂無驕則知自守矣而未能超乎貧富之外也凡曰可者僅可而有所未盡之辭也","source":"논어"},{"text":"樂則心廣體胖而忘其貧好禮則安處善樂循理亦不自知其富矣子貢貨殖蓋先","source":"논어"},{"text":"貧後富而嘗用力於自守者故以此爲問而夫子答之如此蓋許其所已能而勉其","source":"논어"},{"text":"01-15-02 子貢曰詩云如切如磋如琢如磨其斯之謂與","source":"논어"},{"text":"詩衛風淇奧之篇言治骨角者旣切之而復磋之治玉石者旣琢之而復磨之治之","source":"논어"},{"text":"已精而益求其精也子貢自以無諂無驕爲至矣聞夫子之言又知義理之無窮雖","source":"논어"},{"text":"有得焉而未可遽自足也故引是詩以明之","source":"논어"},{"text":"01-15-03 子曰賜也始可與言詩已矣告諸往而知來者","source":"논어"},{"text":"往者其所已言者來者其所未言者○愚按此章問答其淺深高下固不待辯說","source":"논어"},{"text":"而明矣然不切則磋無所施不琢則磨無所措故學者雖不可安於小成而不求造","source":"논어"},{"text":"道之極致亦不可騖於虛遠而不察切己之實病也","source":"논어"},{"text":"學而16章","source":"논어"},{"text":"01-16-01 子曰不患人之不己知患不知人也","source":"논어"},{"text":"尹氏曰君子求在我者故不患人之不己知不知人則是非邪正或不能辨故","source":"논어"},{"text":"凡二十四章","source":"논어"},{"text":"02-01-01 子曰爲政以德譬如北辰居其所而衆星共之","source":"논어"},{"text":"政之爲言正也所以正人之不正也德之爲言得也行道而有得於心也北辰北","source":"논어"},{"text":"極天之樞也居其所不動也共向也言衆星四面旋繞而歸向之也爲政以德則","source":"논어"},{"text":"無爲而天下歸之其象如此○程子曰爲政以德然後無爲范氏曰爲政以德則","source":"논어"},{"text":"不動而化不言而信無爲而成所守者至簡而能御煩所處者至靜而能制動所務","source":"논어"},{"text":"者至寡而能服衆","source":"논어"},{"text":"02-02-01 子曰詩三百一言以蔽之曰思無邪","source":"논어"},{"text":"詩三百十一篇言三百者擧大數也蔽猶蓋也思無邪魯頌駉篇之辭凡詩之言","source":"논어"},{"text":"善者可以感發人之善心惡者可以懲創人之逸志其用歸於使人得情性之正而","source":"논어"},{"text":"已然其言微婉且或各因一事而發求其直指全體則未有若此之明且盡者故","source":"논어"},{"text":"夫子言詩三百篇而惟此一言足以盡蓋其義其示人之意亦深切矣○程子曰","source":"논어"},{"text":"思無邪者誠也范氏曰學者必務知要知要則能守約守約則足以盡博矣經禮","source":"논어"},{"text":"三百曲禮三千亦可以一言以蔽之曰毋不敬","source":"논어"},{"text":"02-03-01 子曰道之以政齊之以刑民免而無恥","source":"논어"},{"text":"道猶引導謂先之也政謂法制禁令也齊所以一之也道之而不從者有刑以一","source":"논어"},{"text":"之也免而無恥謂苟免刑罰而無所羞愧蓋雖不敢爲惡而爲惡之心未嘗亡也","source":"논어"},{"text":"02-03-02 道之以德齊之以禮有恥且格","source":"논어"},{"text":"禮謂制度品節也格至也言躬行以率之則民固有所觀感而興起矣而其淺深厚","source":"논어"},{"text":"薄之不一者又有禮以一之則民恥於不善而又有以至於善也一說格正也書曰","source":"논어"},{"text":"格其非心○愚謂政者爲治之具刑者輔治之法德禮則所以出治之本而德又","source":"논어"},{"text":"禮之本也此其相爲終始雖不可以偏廢然政刑能使民遠罪而已德禮之效則","source":"논어"},{"text":"有以使民日遷善而不自知故治民者不可徒恃其末又當深探其本也","source":"논어"},{"text":"02-04-01 子曰吾十有五而志于學","source":"논어"},{"text":"古者十五而入大學心之所之謂之志此所謂學卽大學之道也志乎此則念念","source":"논어"},{"text":"在此而爲之不厭矣","source":"논어"},{"text":"02-04-02 三十而立","source":"논어"},{"text":"有以自立則守之固而無所事志矣","source":"논어"},{"text":"02-04-03 四十而不惑","source":"논어"},{"text":"於事物之所當然皆無所疑則知之明而無所事守矣","source":"논어"},{"text":"02-04-04 五十而知天命","source":"논어"},{"text":"天命卽天道之流行而賦於物者乃事物所以當然之故也知此則知極其精而不惑","source":"논어"},{"text":"又不足言矣","source":"논어"},{"text":"02-04-05 六十而耳順","source":"논어"},{"text":"聲入心通無所違逆知之之至不思而得也","source":"논어"},{"text":"02-04-06 七十而從心所欲不踰矩","source":"논어"},{"text":"從隨也矩法度之器所以爲方者也隨其心之所欲而自不過於法度安而行之","source":"논어"},{"text":"不勉而中也○程子曰孔子生而知者也言亦由學而至所以勉進後人也立能","source":"논어"},{"text":"自立於斯道也不惑則無所疑矣知天命窮理盡性也耳順所聞皆通也從心所","source":"논어"},{"text":"欲不踰矩則不勉而中矣又曰孔子自言其進德之序如此者聖人未必然但爲學","source":"논어"},{"text":"者立法使之盈科而後進成章而後達耳胡氏曰聖人之敎亦多術然其要使人","source":"논어"},{"text":"不失其本心而已欲得此心者惟志乎聖人所示之學循其序而進焉至於一疵不存","source":"논어"},{"text":"萬里明盡之後則其日用之間本心瑩然隨所意欲莫非至理蓋心卽體欲卽用","source":"논어"},{"text":"體卽道用卽義聲爲律而身爲度矣又曰聖人言此一以示學者當優游涵泳不","source":"논어"},{"text":"可躐等而進二以示學者當日就月將不可半途而廢也愚謂聖人生知安行固","source":"논어"},{"text":"無積累之漸然其心未嘗自謂已至此也是其日用之間必有獨覺其進而人不及","source":"논어"},{"text":"知者故因其近似以自名欲學者以是爲則而自勉非心實自聖而姑爲是退託也","source":"논어"},{"text":"後凡言謙辭之屬意皆放此","source":"논어"},{"text":"02-05-01 孟懿子問孝子曰無違","source":"논어"},{"text":"孟懿子魯大夫仲孫氏名何忌無違謂不背於理","source":"논어"},{"text":"02-05-02 樊遲御子告之曰孟孫問孝於我我對曰無違","source":"논어"},{"text":"樊遲孔子弟子名須御爲孔子御車也孟孫卽仲孫也夫子以懿子未達而不能","source":"논어"},{"text":"問恐其失指而以從親之令爲孝故語樊遲以發之","source":"논어"},{"text":"02-05-03 樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮","source":"논어"},{"text":"生事葬祭事親之始終具矣禮卽理之節文也人之事親自始至終一於禮而不苟","source":"논어"},{"text":"其尊親也至矣是時三家僭禮故夫子以是警之然語意渾然又若不專爲三家","source":"논어"},{"text":"發者所以爲聖人之言也○胡氏曰人之欲孝其親心雖無窮而分則有限得爲","source":"논어"},{"text":"而不爲與不得爲而爲之均於不孝所謂以禮者爲其所得爲者而已矣","source":"논어"},{"text":"02-06-01 孟武伯問孝子曰父母唯其疾之憂","source":"논어"},{"text":"武伯懿子之子名彘言父母愛子之心無所不至唯恐其有疾病常以爲憂也人","source":"논어"},{"text":"子體此而以父母之心爲心","source":"논어"},{"text":"則凡所以守其身者","source":"논어"},{"text":"自不容於不謹矣","source":"논어"},{"text":"豈不可以爲孝乎","source":"논어"},{"text":"舊說人子能使父母不以其陷於不義爲憂而獨以其疾爲憂乃可爲孝亦通","source":"논어"},{"text":"02-07-01 子游問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以別","source":"논어"},{"text":"子游孔子弟子姓言名偃養謂飮食供奉也犬馬待人而食亦若養然言人畜","source":"논어"},{"text":"犬馬皆能有以養之若能養其親而敬不至則與養犬馬者何異甚言不敬之罪所","source":"논어"},{"text":"以深警之也○胡氏曰世俗事親能養足矣狎恩恃愛而不知其漸流於不敬則","source":"논어"},{"text":"非小失也子游聖門高弟未必至此聖人直恐其愛踰於敬故以是深警發之也","source":"논어"},{"text":"02-08-01 子夏問孝子曰色難有事弟子服其勞有酒食先生饌曾是以爲孝乎","source":"논어"},{"text":"色難謂事親之際惟色爲難也食飯也先生父兄也饌飮食之也曾猶嘗也","source":"논어"},{"text":"蓋孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容故事親","source":"논어"},{"text":"之際惟色爲難耳服勞奉養未足爲孝也舊說承順父母之色爲難亦通○程","source":"논어"},{"text":"子曰告懿子告衆人者也告武伯者以其人多可憂之事子游能養而或失於敬","source":"논어"},{"text":"子夏能直義而或少溫潤之色各因其材之高下與其所失而告之故不同也","source":"논어"},{"text":"02-09-01 子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚","source":"논어"},{"text":"回孔子弟子姓顔字子淵不違者意不相背有聽受而無問難也私謂燕居獨處","source":"논어"},{"text":"非進見請問之時發謂發明所言之理愚聞之師曰顔子深潛純粹其於聖人體","source":"논어"},{"text":"段已具其聞夫子之言黙識心融觸處洞然自有條理故終日言但見其不違如","source":"논어"},{"text":"愚人而已及退省其私則見其日用動靜語黙之間皆足以發明夫子之道坦然由之","source":"논어"},{"text":"而無疑然後知其不愚也","source":"논어"},{"text":"爲政10章","source":"논어"},{"text":"02-10-01 子曰視其所以","source":"논어"},{"text":"以爲也爲善者爲君子爲惡者爲小人","source":"논어"},{"text":"02-10-02 觀其所由","source":"논어"},{"text":"觀比視爲詳矣由從也事雖爲善而意之所從來者有未善焉則亦不得爲君子矣","source":"논어"},{"text":"或曰由行也謂所以行其所爲者也","source":"논어"},{"text":"02-10-03 察其所安","source":"논어"},{"text":"察則又加詳矣安所樂也所由雖善而心之所樂者不在於是則亦僞耳豈能久","source":"논어"},{"text":"02-10-04 人焉廋哉人焉廋哉","source":"논어"},{"text":"焉何也廋匿也重言以深明之○程子曰在己者能知言窮理則能以此察人","source":"논어"},{"text":"爲政11章","source":"논어"},{"text":"02-11-01 子曰溫故而知新可以爲師矣","source":"논어"},{"text":"溫尋繹也故者舊所聞新者今所得言學能時習舊聞而每有新得則所學在我","source":"논어"},{"text":"而其應不窮故可以爲人師若夫記問之學則無得於心而所知有限故學記譏","source":"논어"},{"text":"其不足以爲人師正與此意互相發也","source":"논어"},{"text":"爲政12章","source":"논어"},{"text":"02-12-01 子曰君子不器","source":"논어"},{"text":"器者各適其用而不能相通成德之士體無不具故用無不周非特爲一才一藝","source":"논어"},{"text":"爲政13章","source":"논어"},{"text":"02-13-01 子貢問君子子曰先行其言而後從之","source":"논어"},{"text":"周氏曰先行其言者行之於未言之前而後從之者言之於旣行之後○范氏曰","source":"논어"},{"text":"子貢之患非言之艱而行之艱故告之以此","source":"논어"},{"text":"爲政14章","source":"논어"},{"text":"02-14-01 子曰君子周而不比小人比而不周","source":"논어"},{"text":"周普徧也比偏黨也皆與人親厚之意但周公而比私爾○君子小人所爲不同","source":"논어"},{"text":"如陰陽晝夜每每相反然究其所以分則在公私之際毫釐之差耳故聖人於周","source":"논어"},{"text":"比和同驕泰之屬常對擧而互言之欲學者察乎兩間而審其取舍之幾也","source":"논어"},{"text":"爲政15章","source":"논어"},{"text":"02-15-01 子曰學而不思則罔思而不學則殆","source":"논어"},{"text":"不求諸心故昏而無得不習其事故危而不安○程子曰博學審問愼思明辨篤","source":"논어"},{"text":"行五者廢其一非學也","source":"논어"},{"text":"爲政16章","source":"논어"},{"text":"02-16-01 子曰攻乎異端斯害也已","source":"논어"},{"text":"范氏曰攻專治也故治木石金玉之工曰攻異端非聖人之道而別爲一端如楊","source":"논어"},{"text":"墨是也其率天下至於無父無君專治而欲精之爲害甚矣○程子曰佛氏之言","source":"논어"},{"text":"比之楊墨尤爲近理所以其害爲尤甚學者當如淫聲美色以遠之不爾則駸駸然","source":"논어"},{"text":"入於其中矣","source":"논어"},{"text":"爲政17章","source":"논어"},{"text":"02-17-01 子曰由誨女知之乎知之爲知之不知爲不知是知也","source":"논어"},{"text":"由孔子弟子姓仲字子路子路好勇蓋有强其所不知以爲知者故夫子告之曰","source":"논어"},{"text":"我敎女以知之之道乎","source":"논어"},{"text":"但所知者則以爲知","source":"논어"},{"text":"所不知者則以爲不知","source":"논어"},{"text":"如此則雖或不能","source":"논어"},{"text":"盡知而無自欺之蔽亦不害其爲知矣況由此而求之又有可知之理乎","source":"논어"},{"text":"爲政18章","source":"논어"},{"text":"02-18-01 子張學干祿","source":"논어"},{"text":"子張孔子弟子姓顓孫名師干求也祿仕者之奉也","source":"논어"},{"text":"02-18-02 子曰多聞闕疑愼言其餘則寡尤多見闕殆愼行其餘則寡悔言寡尤","source":"논어"},{"text":"行寡悔祿在其中矣","source":"논어"},{"text":"呂氏曰疑者所未信殆者所未安程子曰尤罪自外至者也悔理自內出者也","source":"논어"},{"text":"愚謂多聞見者學之博闕疑殆者擇之精謹言行者守之約凡言在其中者皆不","source":"논어"},{"text":"求而自至之辭言此以救子張之失而進之也○程子曰修天爵則人爵至君子言","source":"논어"},{"text":"行能謹得祿之道也子張學干祿故告之以此使定其心而不爲利祿動若顔閔","source":"논어"},{"text":"則無此問矣或疑如此亦有不得祿者孔子蓋曰耕也餒在其中惟理可爲者爲","source":"논어"},{"text":"爲政19章","source":"논어"},{"text":"02-19-01 哀公問曰何爲則民服孔子對曰擧直錯諸枉則民服擧枉錯諸直則","source":"논어"},{"text":"哀公魯君名蔣凡君問皆稱孔子對曰者尊君也錯捨置也諸衆也程子曰","source":"논어"},{"text":"擧錯得義則人心服○謝氏曰好直而惡枉天下之至情也順之則服逆之則去","source":"논어"},{"text":"必然之理也然或無道以照之則以直爲枉以枉爲直者多矣是以君子大居敬","source":"논어"},{"text":"而貴窮理也","source":"논어"},{"text":"爲政20章","source":"논어"},{"text":"02-20-01 季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠擧善","source":"논어"},{"text":"而敎不能則勸","source":"논어"},{"text":"季康子魯大夫季孫氏名肥莊謂容貌端嚴也臨民以莊則民敬於己孝於親慈","source":"논어"},{"text":"於衆則民忠於己善者擧之而不能者敎之則民有所勸而樂於爲善○張敬夫曰","source":"논어"},{"text":"此皆在我所當爲非爲欲使民敬忠以勸而爲之也然能如是則其應蓋有不期然","source":"논어"},{"text":"爲政21章","source":"논어"},{"text":"02-21-01 或謂孔子曰子奚不爲政","source":"논어"},{"text":"定公初年孔子不仕故或人疑其不爲政也","source":"논어"},{"text":"02-21-02 子曰書云孝乎惟孝友于兄弟施於有政是亦爲政奚其爲爲政","source":"논어"},{"text":"書周書君陳篇書云孝乎者言書之言孝如此也善兄弟曰友書言君陳能孝於","source":"논어"},{"text":"親友於兄弟又能推廣此心以爲一家之政孔子引之言如此則是亦爲政矣何","source":"논어"},{"text":"必居位乃爲爲政乎蓋孔子之不仕有難以語或人者故託此以告之要之至理亦","source":"논어"},{"text":"爲政22章","source":"논어"},{"text":"02-22-01 子曰人而無信不知其可也大車無輗小車無軏其何以行之哉","source":"논어"},{"text":"大車謂平地任載之車輗轅端橫木縛軛以駕牛者小車謂田車兵車乘車軏","source":"논어"},{"text":"轅端上曲鉤衡以駕馬者車無此二者則不可以行人而無信亦猶是也","source":"논어"},{"text":"爲政23章","source":"논어"},{"text":"02-23-01 子張問十世可知也","source":"논어"},{"text":"陸氏曰也一作乎王者易姓受命爲一世子張問自此以後十世之事可前知乎","source":"논어"},{"text":"02-23-02 子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼","source":"논어"},{"text":"周者雖百世可知也","source":"논어"},{"text":"馬氏曰所因謂三綱五常所損益謂文質三統愚按三綱謂君爲臣綱父爲子綱","source":"논어"},{"text":"夫爲妻綱五常謂仁義禮智信文質謂夏尙忠商尙質周尙文三統謂夏正建寅","source":"논어"},{"text":"爲人統商正建丑爲地統周正建子爲天統三綱五常禮之大體三代相繼皆因","source":"논어"},{"text":"之而不能變其所損益不過文章制度小過不及之間而其已然之迹今皆可見則","source":"논어"},{"text":"自今以往或有繼周而王者雖百世之遠所因所革亦不過此豈但十世而已乎聖","source":"논어"},{"text":"人所以知來者蓋如此非若後世讖緯術數之學也○胡氏曰子張之問蓋欲知來","source":"논어"},{"text":"而聖人言其旣往者以明之也夫自修身以至於爲天下不可一日而無禮天敍天","source":"논어"},{"text":"秩人所共由禮之本也商不能改乎夏周不能改乎商所謂天地之常經也若乃制","source":"논어"},{"text":"度文爲或太過則當損或不足則當益益之損之與時宜之而所因者不壞是古今","source":"논어"},{"text":"之通義也因往推來雖百世之遠不過如此而已矣","source":"논어"},{"text":"爲政24章","source":"논어"},{"text":"02-24-01 子曰非其鬼而祭之諂也","source":"논어"},{"text":"非其鬼謂非其所當祭之鬼諂求媚也","source":"논어"},{"text":"02-24-02 見義不爲無勇也","source":"논어"},{"text":"知而不爲是無勇也","source":"논어"},{"text":"凡二十六章通前篇末二章皆論禮樂之事","source":"논어"},{"text":"03-01-01 孔子謂季氏八佾舞於庭是可忍也孰不可忍也","source":"논어"},{"text":"季氏魯大夫季孫氏也佾舞列也天子八諸侯六大夫四士二每佾人數如其","source":"논어"},{"text":"佾數或曰每佾八人未詳孰是季氏以大夫而僭用天子之禮樂孔子言其此事","source":"논어"},{"text":"尙忍爲之則何事不可忍爲或曰忍容忍也蓋深疾之之辭○范氏曰樂舞之數","source":"논어"},{"text":"自上而下降殺以兩而已故兩之間不可以毫髮僭差也孔子爲政先正禮樂則","source":"논어"},{"text":"季氏之罪不容誅矣謝氏曰君子於其所不當爲不敢須臾處不忍故也而季氏忍","source":"논어"},{"text":"此矣則雖弑父與君亦何所憚而不爲乎","source":"논어"},{"text":"03-02-01 三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂","source":"논어"},{"text":"三家魯大夫孟孫叔孫季孫之家也雍周頌篇名徹祭畢而收其俎也天子宗廟之","source":"논어"},{"text":"祭則歌雍以徹是時三家僭而用之相助也辟公諸侯也穆穆深遠之意天子","source":"논어"},{"text":"之容也此雍詩之辭孔子引之言三家之堂非有此事亦何取於此義而歌之乎","source":"논어"},{"text":"譏其無知妄作以取僭竊之罪○程子曰周公之功固大矣皆臣子之分所當爲","source":"논어"},{"text":"魯安得獨用天子禮樂哉成王之賜伯禽之受皆非也其因襲之弊遂使季氏僭八","source":"논어"},{"text":"佾三家僭雍徹故仲尼譏之","source":"논어"},{"text":"03-03-01 子曰人而不仁如禮何人而不仁如樂何","source":"논어"},{"text":"游氏曰人而不仁則人心亡矣其如禮樂何哉言雖欲用之而禮樂不爲之用也","source":"논어"},{"text":"○程子曰仁者天下之正理失正理則無序而不和李氏曰禮樂待人而後行苟","source":"논어"},{"text":"非其人則雖玉帛交錯鍾鼓鏗鏘亦將如之何哉然記者序此於八佾雍徹之後疑","source":"논어"},{"text":"其爲僭禮樂者發也","source":"논어"},{"text":"03-04-01 林放問禮之本","source":"논어"},{"text":"林放魯人見世之爲禮者專事繁文而疑其本之不在是也故以爲問","source":"논어"},{"text":"03-04-02 子曰大哉問","source":"논어"},{"text":"孔子以時方逐末而放獨有志於本故大其問蓋得其本則禮之全體無不在其中","source":"논어"},{"text":"03-04-03 禮與其奢也寧儉喪與其易也寧戚","source":"논어"},{"text":"易治也孟子曰易其田疇在喪禮則節文習熟而無哀痛慘怛之實者也戚則一於","source":"논어"},{"text":"哀而文不足耳禮貴得中奢易則過於文儉戚則不及而質二者皆未合禮然凡物","source":"논어"},{"text":"之理必先有質而後有文則質乃禮之本也○范氏曰夫祭與其敬不足而禮有餘","source":"논어"},{"text":"不若禮不足而敬有餘也","source":"논어"},{"text":"與其哀不足而禮有餘也","source":"논어"},{"text":"不若禮不足而哀有餘也","source":"논어"},{"text":"皆不能反本而隨其末故也","source":"논어"},{"text":"不若儉而不備之愈也","source":"논어"},{"text":"喪易而文不若戚而不文之愈也儉者物之質戚者心之誠故爲禮之本楊氏曰","source":"논어"},{"text":"禮始諸飮食故汚尊而抔飮爲之簠簋籩豆罍爵之飾所以文之也則其本儉而已","source":"논어"},{"text":"喪不可以徑情而直行爲之衰麻哭踊之數所以節之也則其本戚而已周衰世方","source":"논어"},{"text":"以文滅質而林放獨能問禮之本故夫子大之而告之以此","source":"논어"},{"text":"03-05-01 子曰夷狄之有君不如諸夏之亡也","source":"논어"},{"text":"吳氏曰亡古無字通用程子曰夷狄且有君長不如諸夏之僭亂反無上下之分","source":"논어"},{"text":"也○尹氏曰孔子傷時之亂而歎之也無非實無也雖有之不能盡其道爾","source":"논어"},{"text":"03-06-01 季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曾謂泰","source":"논어"},{"text":"山不如林放乎","source":"논어"},{"text":"旅祭名泰山山名在魯地禮諸侯祭封內山川季氏祭之僭也冉有孔子弟子","source":"논어"},{"text":"名求時爲季氏宰救謂救其陷於僭竊之罪嗚呼歎辭言神不享非禮欲季氏知","source":"논어"},{"text":"其無益而自止又進林放以厲冉有也○范氏曰冉有從季氏夫子豈不知其不可","source":"논어"},{"text":"告也然而聖人不輕絶人盡己之心安知冉有之不能救季氏之不可諫也旣不能","source":"논어"},{"text":"正則美林放以明泰山之不可誣是亦敎誨之道也","source":"논어"},{"text":"03-07-01 子曰君子無所爭必也射乎揖讓而升下而飮其爭也君子","source":"논어"},{"text":"揖讓而升者大射之禮耦進三揖而後升堂也下而飮謂射畢揖降以俟衆耦皆降","source":"논어"},{"text":"勝者乃揖不勝者升取觶立飮也言君子恭遜不與人爭惟於射而後有爭然其爭","source":"논어"},{"text":"也雍容揖遜乃如此則其爭也君子而非若小人之爭也","source":"논어"},{"text":"03-08-01 子夏問曰巧笑倩兮美目盼兮素以爲絢兮何謂也","source":"논어"},{"text":"此逸詩也倩好口輔也盼目黑白分也素粉地畫之質也絢采色畫之飾也言","source":"논어"},{"text":"人有此倩盼之美質","source":"논어"},{"text":"而又加以華采之飾","source":"논어"},{"text":"如有素地而加采色也","source":"논어"},{"text":"子夏疑其反謂以素","source":"논어"},{"text":"爲飾故問之","source":"논어"},{"text":"03-08-02 子曰繪事後素","source":"논어"},{"text":"繪事繪畫之事也後素後於素也考工記曰繪畫之事後素功謂先以粉地爲質","source":"논어"},{"text":"而後施五采猶人有美質然後可加文飾","source":"논어"},{"text":"03-08-03 曰禮後乎子曰起予者商也始可與言詩已矣","source":"논어"},{"text":"禮必以忠信爲質猶繪事必以粉素爲先起猶發也起予言能起發我之志意謝","source":"논어"},{"text":"氏曰子貢因論學而知詩子夏因論詩而知學故皆可與言詩○楊氏曰甘受","source":"논어"},{"text":"和白受采忠信之人可以學禮苟無其質禮不虛行此繪事後素之說也孔子曰","source":"논어"},{"text":"繪事後素而子夏曰禮後乎可謂能繼其志矣非得之言意之表者能之乎商賜可","source":"논어"},{"text":"與言詩者以此若夫玩心於章句之末則其爲詩也固而已矣所謂起予則亦相長","source":"논어"},{"text":"03-09-01 子曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不","source":"논어"},{"text":"足故也足則吾能徵之矣","source":"논어"},{"text":"杞夏之後宋殷之後徵證也文典籍也獻賢也言二代之禮我能言之而二","source":"논어"},{"text":"國不足取以爲證以其文獻不足故也文獻若足則我能取之以證吾言矣","source":"논어"},{"text":"八佾10章","source":"논어"},{"text":"03-10-01 子曰禘自旣灌而往者吾不欲觀之矣","source":"논어"},{"text":"趙伯循曰禘王者之大祭也王者旣立始祖之廟又推始祖所自出之帝祀之於始","source":"논어"},{"text":"祖之廟而以始祖配之也成王以周公有大勳勞賜魯重祭故得禘於周公之廟以","source":"논어"},{"text":"文王爲所出之帝而周公配之然非禮矣灌者方祭之始用鬱鬯之酒灌地以降神","source":"논어"},{"text":"也魯之君臣當此之時誠意未散猶有可觀自此以後則浸以懈怠而無足觀矣","source":"논어"},{"text":"蓋魯祭非禮孔子本不欲觀至此而失禮之中又失禮焉故發此歎也○謝氏曰","source":"논어"},{"text":"我欲觀夏道","source":"논어"},{"text":"是故之杞而不足證也","source":"논어"},{"text":"我欲觀商道","source":"논어"},{"text":"是故之宋而不足證也","source":"논어"},{"text":"又曰我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣考之杞","source":"논어"},{"text":"宋已如彼考之當今又如此孔子所以深歎也","source":"논어"},{"text":"八佾11章","source":"논어"},{"text":"03-11-01 或問禘之說子曰不知也知其說者之於天下也其如示諸斯乎指其掌","source":"논어"},{"text":"先王報本追遠之意莫深於禘非仁孝誠敬之至不足以與此非或人之所及也而","source":"논어"},{"text":"不王不禘之法又魯之所當諱者故以不知答之示與視同指其掌弟子記夫子","source":"논어"},{"text":"言此而自指其掌言其明且易也蓋知禘之說則理無不明誠無不格而治天下不","source":"논어"},{"text":"難矣聖人於此豈眞有所不知也哉","source":"논어"},{"text":"八佾12章","source":"논어"},{"text":"03-12-01 祭如在祭神如神在","source":"논어"},{"text":"程子曰祭祭先祖也祭神祭外神也祭先主於孝祭神主於敬愚謂此門人","source":"논어"},{"text":"記孔子祭祀之誠意","source":"논어"},{"text":"03-12-02 子曰吾不與祭如不祭","source":"논어"},{"text":"又記孔子之言以明之言己當祭之時或有故不得與而使他人攝之則不得致其如","source":"논어"},{"text":"在之誠故雖已祭而此心缺然如未嘗祭也○范氏曰君子之祭七日戒三日齊","source":"논어"},{"text":"必見所祭者誠之至也是故郊則天神格廟則人鬼享皆由己以致之也有其誠則","source":"논어"},{"text":"有其神無其誠則無其神可不謹乎吾不與祭如不祭誠爲實禮爲虛也","source":"논어"},{"text":"八佾13章","source":"논어"},{"text":"03-13-01 王孫賈問曰與其媚於奧寧媚於竈何謂也","source":"논어"},{"text":"王孫賈衛大夫媚親順也室西南隅爲奧竈者五祀之一夏所祭也凡祭五祀","source":"논어"},{"text":"皆先設主而祭於其所","source":"논어"},{"text":"然後迎尸而祭於奧","source":"논어"},{"text":"略如祭宗廟之儀","source":"논어"},{"text":"如祀竈則設主於竈陘","source":"논어"},{"text":"祭畢而更設饌於奧以迎尸也故時俗之語因以奧有常尊而非祭之主竈雖卑賤","source":"논어"},{"text":"而當時用事喩自結於君不如阿附權臣也賈衛之權臣故以此諷孔子","source":"논어"},{"text":"03-13-02 子曰不然獲罪於天無所禱也","source":"논어"},{"text":"天卽理也其尊無對非奧竈之可比也逆理則獲罪於天矣豈媚於奧竈所能禱而","source":"논어"},{"text":"免乎言但當順理非特不當媚竈亦不可媚於奧也○謝氏曰聖人之言遜而不","source":"논어"},{"text":"迫使王孫賈而知此意不爲無益使其不知亦非所以取禍","source":"논어"},{"text":"八佾14章","source":"논어"},{"text":"03-14-01 子曰周監於二代郁郁乎文哉吾從周","source":"논어"},{"text":"監視也二代夏商也言其視二代之禮而損益之郁郁文盛貌○尹氏曰三代","source":"논어"},{"text":"之禮至周大備夫子美其文而從之","source":"논어"},{"text":"八佾15章","source":"논어"},{"text":"03-15-01 子入大廟每事問或曰孰謂鄹人之子知禮乎入大廟每事問子聞之","source":"논어"},{"text":"大廟魯周公廟此蓋孔子始仕之時入而助祭也鄹魯邑名孔子父叔梁紇嘗爲","source":"논어"},{"text":"其邑大夫孔子自少以知禮聞故或人因此而譏之孔子言是禮者敬謹之至乃所","source":"논어"},{"text":"以爲禮也○尹氏曰禮者敬而已矣雖知亦問謹之至也其爲敬莫大於此謂","source":"논어"},{"text":"之不知禮者豈足以知孔子哉","source":"논어"},{"text":"八佾16章","source":"논어"},{"text":"03-16-01 子曰射不主皮爲力不同科古之道也","source":"논어"},{"text":"射不主皮鄕射禮文爲力不同科孔子解禮之意如此也皮革也布侯而棲革於其","source":"논어"},{"text":"中以爲的所謂鵠也科等也古者射以觀德但主於中而不主於貫革蓋以人","source":"논어"},{"text":"之力有强弱不同等也記曰武王克商散軍郊射而貫革之射息正謂此也周衰","source":"논어"},{"text":"禮廢列國兵爭復尙貫革故孔子歎之○楊氏曰中可以學而能力不可以强","source":"논어"},{"text":"而至聖人言古之道所以正今之失","source":"논어"},{"text":"八佾17章","source":"논어"},{"text":"03-17-01 子貢欲去告朔之餼羊","source":"논어"},{"text":"告朔之禮古者天子常以季冬頒來歲十二月之朔于諸侯諸侯受而藏之祖廟月","source":"논어"},{"text":"朔則以特羊告廟請而行之餼生牲也魯自文公始不視朔而有司猶供此羊故","source":"논어"},{"text":"子貢欲去之","source":"논어"},{"text":"03-17-02 子曰賜也爾愛其羊我愛其禮","source":"논어"},{"text":"愛猶惜也子貢蓋惜其無實而妄費然禮雖廢羊存猶得以識之而可復焉若倂","source":"논어"},{"text":"去其羊則此禮遂亡矣孔子所以惜之○楊氏曰告朔諸侯所以稟命於君親禮","source":"논어"},{"text":"之大者魯不視朔矣然羊存則告朔之名未泯而其實因可擧此夫子所以惜之也","source":"논어"},{"text":"八佾18章","source":"논어"},{"text":"03-18-01 子曰事君盡禮人以爲諂也","source":"논어"},{"text":"黃氏曰孔子於事君之禮非有所加也如是而後盡爾時人不能反以爲諂故孔","source":"논어"},{"text":"子言之以明禮之當然也○程子曰聖人事君盡禮當時以爲諂若他人言之必","source":"논어"},{"text":"曰我事君盡禮小人以爲諂而孔子之言止於如此聖人道大德宏此亦可見","source":"논어"},{"text":"八佾19章","source":"논어"},{"text":"03-19-01 定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠","source":"논어"},{"text":"定公魯君名宋二者皆理之當然各欲自盡而已○呂氏曰使臣不患其不忠","source":"논어"},{"text":"患禮之不至事君不患其無禮患忠之不足尹氏曰君臣以義合者也故君使臣以","source":"논어"},{"text":"禮則臣事君以忠","source":"논어"},{"text":"八佾20章","source":"논어"},{"text":"03-20-01 子曰關雎樂而不淫哀而不傷","source":"논어"},{"text":"關雎周南國風詩之首篇也淫者樂之過而失其正者也傷者哀之過而害於和者","source":"논어"},{"text":"也關雎之詩言后妃之德宜配君子求之未得則不能無寤寐反側之憂求而得之","source":"논어"},{"text":"則宜其有琴瑟鍾鼓之樂蓋其憂雖深而不害於和其樂雖盛而不失其正故夫子","source":"논어"},{"text":"稱之如此欲學者玩其辭審其音而有以識其性情之正也","source":"논어"},{"text":"八佾21章","source":"논어"},{"text":"03-21-01 哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民","source":"논어"},{"text":"宰我孔子弟子名予三代之社不同者古者立社各樹其土之所宜木以爲主也","source":"논어"},{"text":"戰栗恐懼貌宰我又言周所以用栗之意如此豈以古者戮人於社故附會其說與","source":"논어"},{"text":"03-21-02 子聞之曰成事不說遂事不諫旣往不咎","source":"논어"},{"text":"遂事謂事雖未成而勢不能已者孔子以宰我所對非立社之本意又啓時君殺伐之","source":"논어"},{"text":"心而其言已出不可復救故歷言此以深責之欲使謹其後也○尹氏曰古者","source":"논어"},{"text":"各以所宜木名其社非取義於木也宰我不知而妄對故夫子責之","source":"논어"},{"text":"八佾22章","source":"논어"},{"text":"03-22-01 子曰管仲之器小哉","source":"논어"},{"text":"管仲齊大夫名夷吾相桓公覇諸侯器小言其不知聖賢大學之道故局量褊淺","source":"논어"},{"text":"規模卑狹不能正身修德以致主於王道","source":"논어"},{"text":"03-22-02 或曰管仲儉乎曰管氏有三歸官事不攝焉得儉","source":"논어"},{"text":"或人蓋疑器小之爲儉三歸臺名事見說苑攝兼也家臣不能具官一人常兼數","source":"논어"},{"text":"事管仲不然皆言其侈","source":"논어"},{"text":"03-22-03 然則管仲知禮乎曰邦君樹塞門管氏亦樹塞門邦君爲兩君之好有","source":"논어"},{"text":"反坫管氏亦有反坫管氏而知禮孰不知禮","source":"논어"},{"text":"或人又疑不儉爲知禮屛謂之樹塞猶蔽也設屛於門以蔽內外也好謂好會","source":"논어"},{"text":"坫在兩楹之間獻酬飮畢則反爵於其上此皆諸侯之禮而管仲僭之不知禮也","source":"논어"},{"text":"○愚謂孔子譏管仲之器小其旨深矣或人不知而疑其儉故斥其奢以明其非","source":"논어"},{"text":"儉或又疑其知禮故又斥其僭以明其不知禮蓋雖不復明言小器之所以然而其","source":"논어"},{"text":"所以小者於此亦可見矣故程子曰奢而犯禮其器之小可知蓋器大則自知禮","source":"논어"},{"text":"而無此失矣此言當深味也蘇氏曰自修身正家以及於國則其本深其及者遠","source":"논어"},{"text":"是謂大器揚雄所謂大器猶規矩準繩先自治而後治人者是也管仲三歸反坫桓","source":"논어"},{"text":"公內嬖六人而覇天下其本固已淺矣管仲死桓公薨天下不復宗齊楊氏曰夫","source":"논어"},{"text":"子大管仲之功而小其器蓋非王佐之才雖能合諸侯正天下其器不足稱也道學不","source":"논어"},{"text":"明而王覇之略混爲一途故聞管仲之器小則疑其爲儉以不儉告之則又疑其","source":"논어"},{"text":"知禮蓋世方以詭遇爲功而不知爲之範則不悟其小宜矣","source":"논어"},{"text":"八佾23章","source":"논어"},{"text":"03-23-01 子語魯大師樂曰樂其可知也始作翕如也從之純如也皦如也繹如","source":"논어"},{"text":"語告也大師樂官名時音樂廢缺故孔子敎之翕合也從放也純和也皦","source":"논어"},{"text":"明也繹相續不絶也成樂之一終也○謝氏曰五音六律不具不足以言樂翕","source":"논어"},{"text":"如言其合也五音合矣淸濁高下如五味之相濟而後和故曰純如合而和矣欲","source":"논어"},{"text":"其無相奪倫故曰皦如然豈宮自宮而商自商乎不相反而相連如貫珠可也故","source":"논어"},{"text":"曰繹如也以成","source":"논어"},{"text":"八佾24章","source":"논어"},{"text":"03-24-01 儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二","source":"논어"},{"text":"三子何患於喪乎天下之無道也久矣天將以夫子爲木鐸","source":"논어"},{"text":"儀衛邑封人掌封疆之官蓋賢而隱於下位者也君子謂當時賢者至此皆得見","source":"논어"},{"text":"之自言其平日不見絶於賢者而求以自通也見之謂通使得見喪謂失位去國","source":"논어"},{"text":"禮曰喪欲速貧是也木鐸金口木舌施政敎時所振以警衆者也言亂極當治天","source":"논어"},{"text":"必將使夫子得位設敎不久失位也封人一見夫子而遽以是稱之其得於觀感之間","source":"논어"},{"text":"者深矣或曰木鐸所以徇于道路言天使夫子失位周流四方以行其敎如木鐸","source":"논어"},{"text":"之徇于道路也","source":"논어"},{"text":"八佾25章","source":"논어"},{"text":"03-25-01 子謂韶盡美矣又盡善也謂武盡美矣未盡善也","source":"논어"},{"text":"韶舜樂武武王樂美者聲容之盛善者美之實也舜紹堯致治武王伐紂救","source":"논어"},{"text":"民其功一也故其樂皆盡美然舜之德性之也又以揖遜而有天下武王之德","source":"논어"},{"text":"反之也又以征誅而得天下故其實有不同者○程子曰成湯放桀惟有慙德武","source":"논어"},{"text":"王亦然故未盡善堯舜湯武其揆一也征伐非其所欲所遇之時然爾","source":"논어"},{"text":"八佾26章","source":"논어"},{"text":"03-26-01 子曰居上不寬爲禮不敬臨喪不哀吾何以觀之哉","source":"논어"},{"text":"居上主於愛人故以寬爲本爲禮以敬爲本臨喪以哀爲本旣無其本則以何","source":"논어"},{"text":"者而觀其所行之得失哉","source":"논어"},{"text":"凡二十六章","source":"논어"},{"text":"04-01-01 子曰里仁爲美擇不處仁焉得知","source":"논어"},{"text":"里有仁厚之俗爲美擇里而不居於是焉則失其是非之本心而不得爲知矣","source":"논어"},{"text":"04-02-01 子曰不仁者不可以久處約不可以長處樂仁者安仁知者利仁","source":"논어"},{"text":"約窮困也利猶貪也蓋深知篤好而必欲得之也不仁之人失其本心久約必濫","source":"논어"},{"text":"久樂必淫惟仁者則安其仁而無適不然知者則利於仁而不易所守蓋雖深淺之不","source":"논어"},{"text":"同然皆非外物所能奪矣○謝氏曰仁者心無內外遠近精粗之間非有所存而","source":"논어"},{"text":"自不亡非有所理而自不亂如目視而耳聽手持而足行也知者謂之有所見則可","source":"논어"},{"text":"謂之有所得則未可有所存斯不亡有所理斯不亂未能無意也安仁則一利仁","source":"논어"},{"text":"則二安仁者非顔閔以上去聖人爲不遠不知此味也諸子雖有卓越之才謂之見","source":"논어"},{"text":"道不惑則可然未免於利之也","source":"논어"},{"text":"04-03-01 子曰惟仁者能好人能惡人","source":"논어"},{"text":"惟之爲言獨也蓋無私心然後好惡當於理程子所謂得其公正是也○游氏曰","source":"논어"},{"text":"好善而惡惡天下之同情然人每失其正者心有所繫而不能自克也惟仁者無私","source":"논어"},{"text":"心所以能好惡也","source":"논어"},{"text":"04-04-01 子曰苟志於仁矣無惡也","source":"논어"},{"text":"苟誠也志者心之所之也其心誠在於仁則必無爲惡之事矣○楊氏曰苟志於","source":"논어"},{"text":"仁未必無過擧也然而爲惡則無矣","source":"논어"},{"text":"04-05-01 子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所","source":"논어"},{"text":"惡也不以其道得之不去也","source":"논어"},{"text":"不以其道得之謂不當得而得之然於富貴則不處於貧賤則不去君子之審富貴","source":"논어"},{"text":"而安貧賤也如此","source":"논어"},{"text":"04-05-02 君子去仁惡乎成名","source":"논어"},{"text":"言君子所以爲君子以其仁也若貪富貴而厭貧賤則是自離其仁而無君子之實矣","source":"논어"},{"text":"何所成其名乎","source":"논어"},{"text":"04-05-03 君子無終食之間違仁造次必於是顚沛必於是","source":"논어"},{"text":"終食者一飯之頃造次急遽苟且之時顚沛傾覆流離之際蓋君子之不去乎仁","source":"논어"},{"text":"如此不但富貴貧賤取舍之間而已也○言君子爲仁自富貴貧賤取舍之間以至","source":"논어"},{"text":"於終食造次顚沛之頃","source":"논어"},{"text":"無時無處而不用其力也","source":"논어"},{"text":"取舍之分明然後","source":"논어"},{"text":"存養之功密","source":"논어"},{"text":"存養之功密則其取舍之分益明矣","source":"논어"},{"text":"04-06-01 子曰我未見好仁者惡不仁者好仁者無以尙之惡不仁者其爲仁矣","source":"논어"},{"text":"不使不仁者加乎其身","source":"논어"},{"text":"夫子自言未見好仁者惡不仁者蓋好仁者眞知仁之可好故天下之物無以加","source":"논어"},{"text":"之惡不仁者眞知不仁之可惡故其所以爲仁者必能絶去不仁之事而不使少有","source":"논어"},{"text":"及於其身此皆成德之事故難得而見之也","source":"논어"},{"text":"04-06-02 有能一日用其力於仁矣乎我未見力不足者","source":"논어"},{"text":"言好仁惡不仁者雖不可見然或有人果能一旦奮然用力於仁則我又未見其力有","source":"논어"},{"text":"不足者蓋爲仁在己欲之則是而志之所至氣必至焉故仁雖難能而至之亦易","source":"논어"},{"text":"04-06-03 蓋有之矣我未之見也","source":"논어"},{"text":"蓋疑辭有之謂有用力而力不足者蓋人之氣質不同故疑亦容或有此昏弱之甚","source":"논어"},{"text":"欲進而不能者但我偶未之見耳蓋不敢終以爲易而又歎人之莫肯用力於仁也○","source":"논어"},{"text":"此章言仁之成德雖難其人然學者苟能實用其力則亦無不可至之理但用力而","source":"논어"},{"text":"不至者今亦未見其人焉此夫子所以反覆而歎息之也","source":"논어"},{"text":"04-07-01 子曰人之過也各於其黨觀過斯知仁矣","source":"논어"},{"text":"黨類也程子曰人之過也各於其類君子常失於厚小人常失於薄君子過於","source":"논어"},{"text":"愛小人過於忍尹氏曰於此觀之則人之仁不仁可知矣○吳氏曰後漢吳祐","source":"논어"},{"text":"謂掾以親故受汚辱之名所謂觀過知仁是也愚按此亦但言人雖有過猶可卽此","source":"논어"},{"text":"而知其厚薄非謂必俟其有過而後賢否可知也","source":"논어"},{"text":"04-08-01 子曰朝聞道夕死可矣","source":"논어"},{"text":"道者事物當然之理苟得聞之則生順死安無復遺恨矣朝夕所以甚言其時之近","source":"논어"},{"text":"○程子曰言人不可以不知道苟得聞道雖死可也又曰皆實理也人知而信者","source":"논어"},{"text":"爲難死生亦大矣非誠有所得豈以夕死爲可乎","source":"논어"},{"text":"04-09-01 子曰士於道而恥惡衣惡食者未足與議也","source":"논어"},{"text":"心欲求道而以口體之奉不若人爲恥其識趣之卑陋甚矣何足與議於道哉○程","source":"논어"},{"text":"子曰志於道而心役乎外何足與議也","source":"논어"},{"text":"里仁10章","source":"논어"},{"text":"04-10-01 子曰君子之於天下也無適也無莫也義之與比","source":"논어"},{"text":"適專主也春秋傳曰吾誰適從是也莫不肯也比從也○謝氏曰適可也","source":"논어"},{"text":"莫不可也無可無不可苟無道以主之不幾於猖狂自恣乎此佛老之學所以自","source":"논어"},{"text":"謂心無所住而能應變而卒得罪於聖人也聖人之學不然於無可無不可之間有","source":"논어"},{"text":"義存焉然則君子之心果有所倚乎","source":"논어"},{"text":"里仁11章","source":"논어"},{"text":"04-11-01 子曰君子懷德小人懷土君子懷刑小人懷惠","source":"논어"},{"text":"懷思念也懷德謂存其固有之善懷土謂溺其所處之安懷刑謂畏法懷惠謂","source":"논어"},{"text":"貪利君子小人趣向不同公私之間而已矣○尹氏曰樂善惡不善所以爲君子","source":"논어"},{"text":"苟安務得所以爲小人","source":"논어"},{"text":"里仁12章","source":"논어"},{"text":"04-12-01 子曰放於利而行多怨","source":"논어"},{"text":"孔氏曰放依也多怨謂多取怨○程子曰欲利於己必害於人故多怨","source":"논어"},{"text":"里仁13章","source":"논어"},{"text":"04-13-01 子曰能以禮讓爲國乎何有不能以禮讓爲國如禮何","source":"논어"},{"text":"讓者禮之實也何有言不難也言有禮之實以爲國則何難之有不然則其禮文","source":"논어"},{"text":"雖具亦且無如之何矣而況於爲國乎","source":"논어"},{"text":"里仁14章","source":"논어"},{"text":"04-14-01 子曰不患無位患所以立不患莫己知求爲可知也","source":"논어"},{"text":"所以立謂所以立乎其位者可知謂可以見知之實○程子曰君子求其在己者","source":"논어"},{"text":"里仁15章","source":"논어"},{"text":"04-15-01 子曰參乎吾道一以貫之曾子曰唯","source":"논어"},{"text":"參乎者呼曾子之名而告之貫通也唯者應之速而無疑者也聖人之心渾然一","source":"논어"},{"text":"理而泛應曲當用各不同曾子於其用處蓋已隨事精察而力行之但未知其體之一","source":"논어"},{"text":"爾夫子知其眞積力久將有所得是以呼而告之曾子果能黙契其指卽應之速而","source":"논어"},{"text":"04-15-02 子出門人問曰何謂也曾子曰夫子之道忠恕而已矣","source":"논어"},{"text":"盡己之謂忠推己之謂恕而已矣者竭盡而無餘之辭也夫子之一理渾然而泛應曲","source":"논어"},{"text":"當譬則天地之至誠無息而萬物各得其所也自此之外固無餘法而亦無待於推矣","source":"논어"},{"text":"曾子有見於此而難言之故借學者盡己推己之目以著明之欲人之易曉也蓋至","source":"논어"},{"text":"誠無息者道之體也萬殊之所以一本也萬物各得其所者道之用也一本之所以","source":"논어"},{"text":"萬殊也以此觀之一以貫之之實可見矣或曰中心爲忠如心爲恕於義亦通○","source":"논어"},{"text":"程子曰以己及物仁也推己及物恕也違道不遠是也忠恕一以貫之忠者天","source":"논어"},{"text":"道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也此與","source":"논어"},{"text":"違道不遠異者動以天爾又曰維天之命於穆不已忠也乾道變化各正性命恕","source":"논어"},{"text":"也又曰聖人敎人各因其才吾道一以貫之惟曾子爲能達此孔子所以告之也","source":"논어"},{"text":"曾子告門人曰夫子之道忠恕而已矣亦猶夫子之告曾子也中庸所謂忠恕違道不","source":"논어"},{"text":"遠斯乃下學上達之義","source":"논어"},{"text":"里仁16章","source":"논어"},{"text":"04-16-01 子曰君子喩於義小人喩於利","source":"논어"},{"text":"喩猶曉也義者天理之所宜利者人情之所欲○程子曰君子之於義猶小人","source":"논어"},{"text":"之於利也惟其深喩是以篤好楊氏曰君子有舍生而取義者以利言之則人之所","source":"논어"},{"text":"欲無甚於生所惡無甚於死孰肯舍生而取義哉其所喩者義而已不知利之爲利故","source":"논어"},{"text":"也小人反是","source":"논어"},{"text":"里仁17章","source":"논어"},{"text":"04-17-01 子曰見賢思齊焉見不賢而內自省也","source":"논어"},{"text":"思齊者冀己亦有是善內自省者恐己亦有是惡○胡氏曰見人之善惡不同而無","source":"논어"},{"text":"不反諸身者則不徒羨人而甘自棄不徒責人而忘自責矣","source":"논어"},{"text":"里仁18章","source":"논어"},{"text":"04-18-01 子曰事父母幾諫見志不從又敬不違勞而不怨","source":"논어"},{"text":"此章與內則之言相表裏幾微也微諫所謂父母有過下氣怡色柔聲以諫也見","source":"논어"},{"text":"志不從又敬不違所謂諫若不入起敬起孝悅則復諫也勞而不怨所謂與其得罪","source":"논어"},{"text":"於鄕黨州閭寧孰諫父母怒不悅而撻之流血不敢疾怨起敬起孝也","source":"논어"},{"text":"里仁19章","source":"논어"},{"text":"04-19-01 子曰父母在不遠遊遊必有方","source":"논어"},{"text":"遠遊則去親遠而爲日久定省曠而音問疎不惟己之思親不置亦恐親之念我不忘","source":"논어"},{"text":"也遊必有方如已告云之東則不敢更適西欲親必知己之所在而無憂召己則必","source":"논어"},{"text":"至而無失也范氏曰子能以父母之心爲心則孝矣","source":"논어"},{"text":"里仁20章","source":"논어"},{"text":"04-20-01 子曰三年無改於父之道可謂孝矣","source":"논어"},{"text":"胡氏曰已見首篇此蓋複出而逸其半也","source":"논어"},{"text":"里仁21章","source":"논어"},{"text":"04-21-01 子曰父母之年不可不知也一則以喜一則以懼","source":"논어"},{"text":"知猶記憶也常知父母之年則旣喜其壽又懼其衰而於愛日之誠自有不能已者","source":"논어"},{"text":"里仁22章","source":"논어"},{"text":"04-22-01 子曰古者言之不出恥躬之不逮也","source":"논어"},{"text":"言古者以見今之不然逮及也行不及言可恥之甚古者所以不出其言爲此故","source":"논어"},{"text":"也○范氏曰君子之於言也不得已而後出之非言之難而行之難也人惟其不","source":"논어"},{"text":"行也是以輕言之言之如其所行行之如其所言則出諸其口必不易矣","source":"논어"},{"text":"里仁23章","source":"논어"},{"text":"04-23-01 子曰以約失之者鮮矣","source":"논어"},{"text":"謝氏曰不侈然以自放之謂約尹氏曰凡事約則鮮失非止謂儉約也","source":"논어"},{"text":"里仁24章","source":"논어"},{"text":"04-24-01 子曰君子欲訥於言而敏於行","source":"논어"},{"text":"謝氏曰放言易故欲訥力行難故欲敏○胡氏曰自吾道一貫至此十章疑","source":"논어"},{"text":"皆曾子門人所記也","source":"논어"},{"text":"里仁25章","source":"논어"},{"text":"04-25-01 子曰德不孤必有隣","source":"논어"},{"text":"隣猶親也德不孤立必以類應故有德者必有其類從之如居之有隣也","source":"논어"},{"text":"里仁26章","source":"논어"},{"text":"04-26-01 子游曰事君數斯辱矣朋友數斯疏矣","source":"논어"},{"text":"程子曰數煩數也胡氏曰事君諫不行則當去導友善不納則當止至於煩瀆","source":"논어"},{"text":"則言者輕聽者厭矣是以求榮而反辱求親而反疏也范氏曰君臣朋友皆以義","source":"논어"},{"text":"合故其事同也","source":"논어"},{"text":"此篇皆論古今人物賢否得失蓋格物窮理之一端也凡二十七章胡氏以爲疑多子","source":"논어"},{"text":"貢之徒所記云","source":"논어"},{"text":"公冶長1章","source":"논어"},{"text":"05-01-01 子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之","source":"논어"},{"text":"公冶長孔子弟子妻爲之妻也縲黑索也絏攣也古者獄中以黑索拘攣罪人","source":"논어"},{"text":"長之爲人無所考而夫子稱其可妻其必有以取之矣又言其人雖嘗陷於縲絏之中","source":"논어"},{"text":"而非其罪則固無害於可妻也夫有罪無罪在我而已豈以自外至者爲榮辱哉","source":"논어"},{"text":"05-01-02 子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之","source":"논어"},{"text":"南容孔子弟子居南宮名縚又名适字子容諡敬叔孟懿子之兄也不廢言必","source":"논어"},{"text":"見用也以其謹於言行故能見用於治朝免禍於亂世也事又見第十一篇○或","source":"논어"},{"text":"曰公冶長之賢不及南容故聖人以其子妻長而以兄子妻容蓋厚於兄而薄於","source":"논어"},{"text":"己也程子曰此以己之私心窺聖人也凡人避嫌者皆內不足也聖人自至公何","source":"논어"},{"text":"避嫌之有況嫁女必量其才而求配尤不當有所避也若孔子之事則其年之長幼","source":"논어"},{"text":"時之先後皆不可知惟以爲避嫌則大不可避嫌之事賢者且不爲況聖人乎","source":"논어"},{"text":"公冶長2章","source":"논어"},{"text":"05-02-01 子謂子賤君子哉若人魯無君子者斯焉取斯","source":"논어"},{"text":"子賤孔子弟子姓宓名不齊上斯斯此人不斯斯此德子賤蓋能尊賢取友以","source":"논어"},{"text":"成其德者故夫子旣歎其賢而又言若魯無君子則此人何所取以成此德乎因以","source":"논어"},{"text":"見魯之多賢也○蘇氏曰稱人之善必本其父兄師友厚之至也","source":"논어"},{"text":"公冶長3章","source":"논어"},{"text":"05-03-01 子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也","source":"논어"},{"text":"器者有用之成材夏曰瑚商曰璉周曰簠簋皆宗廟盛黍稷之器而飾以玉器之貴","source":"논어"},{"text":"重而華美者也子貢見孔子以君子許子賤故以己爲問而孔子告之以此然則子","source":"논어"},{"text":"貢雖未至於不器其亦器之貴者歟","source":"논어"},{"text":"公冶長4章","source":"논어"},{"text":"05-04-01 或曰雍也仁而不佞","source":"논어"},{"text":"雍孔子弟子姓冉字仲弓佞口才也仲弓爲人重厚簡黙而時人以佞爲賢故","source":"논어"},{"text":"美其優於德而病其短於才也","source":"논어"},{"text":"05-04-02 子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞","source":"논어"},{"text":"禦當也猶應答也給辯也憎惡也言何用佞乎佞人所以應答人者但以口取","source":"논어"},{"text":"辯而無情實徒多爲人所憎惡爾我雖未知仲弓之仁然其不佞乃所以爲賢不足","source":"논어"},{"text":"以爲病也再言焉用佞所以深曉之○或疑仲弓之賢而夫子不許其仁何也曰","source":"논어"},{"text":"仁道至大非全體而不息者不足以當之如顔子亞聖猶不能無違於三月之後況","source":"논어"},{"text":"仲弓雖賢未及顔子聖人固不得而輕許之也","source":"논어"},{"text":"公冶長5章","source":"논어"},{"text":"05-05-01 子使漆雕開仕對曰吾斯之未能信子說","source":"논어"},{"text":"漆雕開孔子弟子字子若斯指此理而言信謂眞知其如此而無毫髮之疑也開","source":"논어"},{"text":"自言未能如此未可以治人故夫子說其篤志○程子曰漆雕開已見大意故夫子","source":"논어"},{"text":"說之又曰古人見道分明故其言如此謝氏曰開之學無可考然聖人使之仕必其","source":"논어"},{"text":"材可以仕矣至於心術之微則一毫不自得不害其爲未信此聖人所不能知而開","source":"논어"},{"text":"自知之其材可以仕而其器不安於小成他日所就其可量乎夫子所以說之也","source":"논어"},{"text":"公冶長6章","source":"논어"},{"text":"05-06-01 子曰道不行乘桴浮于海從我者其由與子路聞之喜子曰由也好","source":"논어"},{"text":"勇過我無所取材","source":"논어"},{"text":"桴筏也程子曰浮海之歎傷天下之無賢君也子路勇於義故謂其能從己皆假設","source":"논어"},{"text":"之言耳子路以爲實然而喜夫子之與己故夫子美其勇而譏其不能裁度事理以適","source":"논어"},{"text":"公冶長7章","source":"논어"},{"text":"05-07-01 孟無伯問子路仁乎子曰不知也","source":"논어"},{"text":"子路之於仁蓋日月至焉者或在或亡不能必其有無故以不知告之","source":"논어"},{"text":"05-07-02 又問子曰由也千乘之國可使治其賦也不知其仁也","source":"논어"},{"text":"賦兵也古者以田賦出兵故謂兵爲賦春秋傳所謂悉索敝賦是也言子路之才","source":"논어"},{"text":"可見者如此仁則不能知也","source":"논어"},{"text":"05-07-03 求也何如子曰求也千室之邑百乘之家可使爲之宰也不知其仁也","source":"논어"},{"text":"千室大邑百乘卿大夫之家宰邑長家臣之通號","source":"논어"},{"text":"05-07-04 赤也何如子曰赤也束帶立於朝可使與賓客言也不知其仁也","source":"논어"},{"text":"赤孔子弟子姓公西字子華","source":"논어"},{"text":"公冶長8章","source":"논어"},{"text":"05-08-01 子謂子貢曰女與回也孰愈","source":"논어"},{"text":"05-08-02 對曰賜也何敢望回回也聞一以知十賜也聞一以知二","source":"논어"},{"text":"一數之始十數之終二者一之對也顔子明睿所照卽始而見終子貢推測而知因","source":"논어"},{"text":"此而識彼無所不說告往知來是其驗矣","source":"논어"},{"text":"05-08-03 子曰弗如也吾與女弗如也","source":"논어"},{"text":"與許也○胡氏曰子貢方人夫子旣語以不暇又問其與回孰愈以觀其自知之","source":"논어"},{"text":"如何聞一知十上知之資生知之亞也聞一知二中人以上之資學而知之之才也","source":"논어"},{"text":"子貢平日以己方回見其不可企及故喩之如此夫子以其自知之明而又不難於自","source":"논어"},{"text":"屈故旣然之又重許之此其所以終聞性與天道不特聞一知二而已也","source":"논어"},{"text":"公冶長9章","source":"논어"},{"text":"05-09-01 宰予晝寢子曰朽木不可雕也糞土之牆不可杇也於予與何誅","source":"논어"},{"text":"晝寢謂當晝而寐朽腐也雕刻畫也杇鏝也言其志氣昏惰敎無所施也與","source":"논어"},{"text":"語辭誅責也言不足責乃所以深責之","source":"논어"},{"text":"05-09-02 子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於予","source":"논어"},{"text":"宰予能言而行不逮","source":"논어"},{"text":"故孔子自言於予之事而改此失","source":"논어"},{"text":"亦以重警之也","source":"논어"},{"text":"疑衍文不然則非一日之言也○范氏曰君子之於學惟日孜孜斃而後已惟恐","source":"논어"},{"text":"其不及也宰予晝寢自棄孰甚焉故夫子責之胡氏曰宰予不能以志帥氣居然而","source":"논어"},{"text":"倦是宴安之氣勝儆戒之志惰也古之聖賢未嘗不以懈惰荒寧爲懼勤勵不息自","source":"논어"},{"text":"此孔子所以深責宰予也","source":"논어"},{"text":"聖人不待是而後能","source":"논어"},{"text":"亦非緣此而盡疑學者","source":"논어"},{"text":"特因此立敎以警群弟子使謹於言而敏於行耳","source":"논어"},{"text":"公冶長10章","source":"논어"},{"text":"05-10-01 子曰吾未見剛者或對曰申棖子曰棖也慾焉得剛","source":"논어"},{"text":"剛堅强不屈之意最人所難能者故夫子歎其未見申棖弟子姓名慾多嗜慾也","source":"논어"},{"text":"多嗜慾則不得爲剛矣○程子曰人有慾則無剛剛則不屈於慾謝氏曰剛與慾","source":"논어"},{"text":"正相反能勝物之謂剛故常伸於萬物之上爲物揜之謂慾故常屈於萬物之下自","source":"논어"},{"text":"古有志者少無志者多宜夫子之未見也棖之慾不可知其爲人得非悻悻自好者乎","source":"논어"},{"text":"故或者疑以爲剛然不知此其所以爲慾耳","source":"논어"},{"text":"公冶長11章","source":"논어"},{"text":"05-11-01 子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也","source":"논어"},{"text":"我所不欲人加於我之事","source":"논어"},{"text":"我亦不欲以此加之於人","source":"논어"},{"text":"此仁者之事","source":"논어"},{"text":"故夫子以爲非子貢所及○程子曰我不欲人之加諸我吾亦欲無加諸人仁也施","source":"논어"},{"text":"諸己而不願亦勿施於人恕也恕則子貢或能勉之仁則非所及矣愚謂無者自然","source":"논어"},{"text":"而然勿者禁止之謂此所以爲仁恕之別","source":"논어"},{"text":"公冶長12章","source":"논어"},{"text":"05-12-01 子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也","source":"논어"},{"text":"文章德之見乎外者威儀文辭皆是也性者人所受之天理天道者天理自然之本","source":"논어"},{"text":"體其實一理也言夫子之文章日見乎外固學者所共聞至於性與天道則夫子罕","source":"논어"},{"text":"言之而學者有不得聞者蓋聖門敎不躐等子貢至是始得聞之而歎其美也○","source":"논어"},{"text":"程子曰此子貢聞夫子之至論而歎美之言也","source":"논어"},{"text":"公冶長13章","source":"논어"},{"text":"05-13-01 子路有聞未之能行唯恐有聞","source":"논어"},{"text":"前所聞者旣未及行故恐復有所聞而行之不給也○范氏曰子路聞善勇於必行","source":"논어"},{"text":"門人自以爲弗及也故著之若子路可謂能用其勇矣","source":"논어"},{"text":"公冶長14章","source":"논어"},{"text":"05-14-01 子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之","source":"논어"},{"text":"孔文子衛大夫名圉凡人性敏者多不好學位高者多恥下問故諡法有以勤學","source":"논어"},{"text":"好問爲文者蓋亦人所難也孔圉得諡爲文以此而已○蘇氏曰孔文子使太叔疾","source":"논어"},{"text":"出其妻而妻之疾痛於初妻之娣文子怒將攻之訪於仲尼仲尼不對命駕而行","source":"논어"},{"text":"疾奔宋文子使疾弟遺室孔姞其爲人如此而諡曰文此子貢之所以疑而問也孔","source":"논어"},{"text":"子不沒其善言能如此亦足以爲文矣非經天緯地之文也","source":"논어"},{"text":"公冶長15章","source":"논어"},{"text":"05-15-01 子謂子産有君子之道四焉其行己也恭其事上也敬其養民也惠其使","source":"논어"},{"text":"子産鄭大夫公孫僑恭謙遜也敬謹恪也惠愛利也使民義如都鄙有章上下","source":"논어"},{"text":"有服田有封洫廬井有伍之類○吳氏曰數其事而責之者其所善者多也臧文","source":"논어"},{"text":"仲不仁者三不知者三是也數其事而稱之者猶有所未至也子産有君子之道四","source":"논어"},{"text":"焉是也今或以一言蓋一人一事蓋一時皆非也","source":"논어"},{"text":"公冶長16章","source":"논어"},{"text":"05-16-01 子曰晏平仲善與人交久而敬之","source":"논어"},{"text":"晏平仲齊大夫明嬰程子曰人交久則敬衰久而能敬所以爲善","source":"논어"},{"text":"公冶長17章","source":"논어"},{"text":"05-17-01 子曰臧文仲居蔡山節藻梲何如其知也","source":"논어"},{"text":"臧文仲魯大夫臧孫氏名辰居猶藏也蔡大龜也節柱頭斗栱也藻水草名","source":"논어"},{"text":"梲梁上短柱也蓋爲藏龜之室而刻山於節畫藻於梲也當時以文仲爲知孔子言","source":"논어"},{"text":"其不務民義而諂瀆鬼神如此安得爲知春秋傳所謂作虛器卽此事也○張子曰","source":"논어"},{"text":"山節藻梲爲藏龜之室祀爰居之義同歸於不知宜矣","source":"논어"},{"text":"公冶長18章","source":"논어"},{"text":"05-18-01 子張問曰令尹子文三仕爲令尹無喜色三已之無慍色舊令尹之政","source":"논어"},{"text":"必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁","source":"논어"},{"text":"令尹官名楚上卿執政者也子文姓鬪名穀於菟其爲人也喜怒不形物我無間","source":"논어"},{"text":"知有其國而不知有其身","source":"논어"},{"text":"故子張疑其仁","source":"논어"},{"text":"然其所以三仕三已而告新令尹","source":"논어"},{"text":"者未知其皆出於天理而無人欲之私也是以夫子但許其忠而未許其仁也","source":"논어"},{"text":"05-18-02 崔子弑齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔","source":"논어"},{"text":"子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰淸矣曰仁矣乎曰","source":"논어"},{"text":"未知焉得仁","source":"논어"},{"text":"崔子齊大夫名杼齊君莊公名光陳文子亦齊大夫名須無十乘四十匹也違","source":"논어"},{"text":"文子潔身去亂","source":"논어"},{"text":"然未知其心果見義理之當然","source":"논어"},{"text":"而能脫然無所累乎","source":"논어"},{"text":"抑不得已於利害之私","source":"논어"},{"text":"而猶未免於怨悔也","source":"논어"},{"text":"故夫子特許其淸而不許其仁","source":"논어"},{"text":"曰當理而無私心則仁矣今以是而觀二子之事雖其制行之高若不可及然皆未","source":"논어"},{"text":"有以見其必當於理而眞無私心也子張未識仁體而悅於苟難遂以小者信其大者","source":"논어"},{"text":"夫子之不許也宜哉讀者於此更以上章不知其仁後篇仁則吾不知之語幷與三仁","source":"논어"},{"text":"夷齊之事觀之則彼此交盡而仁之爲義可識矣今以他書考之子文之相楚所謀","source":"논어"},{"text":"者無非僭王猾夏之事文子之仕齊旣失正君討賊之義又不數歲而復反於齊焉則","source":"논어"},{"text":"其不仁亦可見矣","source":"논어"},{"text":"公冶長19章","source":"논어"},{"text":"05-19-01 季文子三思而後行子聞之曰再斯可矣","source":"논어"},{"text":"季文子魯大夫名行父每事必三思而後行若使晉而求遭喪之禮以行亦其一事","source":"논어"},{"text":"也斯語辭程子曰爲惡之人未嘗知有思有思則爲善矣然至於再則已審三則","source":"논어"},{"text":"私意起而反惑矣故夫子譏之○愚按季文子慮事如此可謂詳審而宜無過擧矣","source":"논어"},{"text":"以宣公簒立","source":"논어"},{"text":"文子乃不能討","source":"논어"},{"text":"反爲之使齊而納賂焉","source":"논어"},{"text":"豈非程子所謂私意起而反惑之","source":"논어"},{"text":"驗歟是以君子務窮理而貴果斷不徒多思之爲尙","source":"논어"},{"text":"公冶長20章","source":"논어"},{"text":"05-20-01 子曰寗無子邦有道則知邦無道則愚其知可及也其愚不可及也","source":"논어"},{"text":"寗武子衛大夫名兪按春秋傳武子仕衛當文公成公之時文公有道而武子無","source":"논어"},{"text":"事可見此其知之可及也成公無道至於失國而武子周旋其間盡心竭力不避艱","source":"논어"},{"text":"險凡其所處皆智巧之士所深避而不肯爲者而能卒保其身以濟其君此其愚之","source":"논어"},{"text":"不可及也○程子曰邦無道能沈晦以免患故曰不可及也亦有不當愚者比干","source":"논어"},{"text":"公冶長21章","source":"논어"},{"text":"05-21-01 子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之","source":"논어"},{"text":"此孔子周流四方道不行而思歸之歎也吾黨小子指門人之在魯者狂簡志大而","source":"논어"},{"text":"略於事也斐文貌成章言其文理成就有可觀者裁割正也夫子初心欲行其道","source":"논어"},{"text":"於天下至是而知其終不用也於是始欲成就後學以傳道於來世又不得中行之","source":"논어"},{"text":"士而思其次以爲狂士志意高遠猶或可與進於道也但恐其過中失正而或陷於異","source":"논어"},{"text":"端耳故欲歸而裁之也","source":"논어"},{"text":"公冶長22章","source":"논어"},{"text":"05-22-01 子曰伯夷叔齊不念舊惡怨是用希","source":"논어"},{"text":"伯夷叔齊孤竹君之二子孟子稱其不立於惡人之朝不與惡人言與鄕人立其冠","source":"논어"},{"text":"不正望望然去之若將浼焉其介如此宜若無所容矣然其所惡之人能改卽止","source":"논어"},{"text":"故人亦不甚怨之也○程子曰不念舊惡此淸者之量又曰二子之心非夫子孰","source":"논어"},{"text":"公冶長23章","source":"논어"},{"text":"05-23-01 子曰孰謂微生高直或乞醯焉乞諸其隣而與之","source":"논어"},{"text":"微生姓高名魯人素有直名者醯醋也人來乞時其家無有故乞諸隣家以與之","source":"논어"},{"text":"夫子言此譏其曲意徇物掠美市恩不得爲直也○程子曰微生高所枉雖小害","source":"논어"},{"text":"直爲大范氏曰是曰是非曰非有謂有無謂無曰直聖人觀人於其一介之取予","source":"논어"},{"text":"而千駟萬鐘從可知焉故以微事斷之所以敎人不可不謹也","source":"논어"},{"text":"公冶長24章","source":"논어"},{"text":"05-24-01 子曰巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之","source":"논어"},{"text":"足過也程子曰左丘明古之聞人也謝氏曰二者之可恥有甚於穿窬也左丘明","source":"논어"},{"text":"恥之其所養可知矣夫子自言丘亦恥之蓋竊比老彭之意又以深戒學者使察乎","source":"논어"},{"text":"此而立心以直也","source":"논어"},{"text":"公冶長25章","source":"논어"},{"text":"05-25-01 顔淵季路侍子曰盍各言爾志","source":"논어"},{"text":"05-25-02 子路曰願車馬衣輕裘與朋友共敝之而無憾","source":"논어"},{"text":"衣服之也裘皮服敝壞也憾恨也","source":"논어"},{"text":"05-25-03 顔淵曰願無伐善無施勞","source":"논어"},{"text":"伐誇也善謂有能施亦張大之意勞謂有功易曰勞而不伐是也或曰勞勞","source":"논어"},{"text":"事也勞事非己所欲故亦不欲施之於人亦通","source":"논어"},{"text":"05-25-04 子路曰願聞子之志子曰老者安之朋友信之少者懷之","source":"논어"},{"text":"老者養之以安朋友與之以信少者懷之以恩一說安之安我也信之信我也","source":"논어"},{"text":"懷之懷我也亦通○程子曰夫子安仁顔淵不違仁子路求仁又曰子路顔淵孔","source":"논어"},{"text":"子之志皆與物共者也但有小大之差爾又曰子路勇於義者觀其志豈可以勢利","source":"논어"},{"text":"拘之哉亞於浴沂者也顔子不自私己故無伐善知同於人故無施勞其志可謂","source":"논어"},{"text":"大矣然未免於有意也至於夫子則如天地之化工付與萬物而己不勞焉此聖人","source":"논어"},{"text":"之所爲也今夫羈靮以御馬而不以制牛人皆知羈靮之作在乎人而不知羈靮之生","source":"논어"},{"text":"由於馬聖人之化亦猶是也先觀二子之言後觀聖人之言分明天地氣象凡看論","source":"논어"},{"text":"語非但欲理會文字須要識得聖賢氣象","source":"논어"},{"text":"公冶長26章","source":"논어"},{"text":"05-26-01 子曰已矣乎吾未見能見其過而內自訟者也","source":"논어"},{"text":"已矣乎者恐其終不得見而歎之也內自訟者口不言而心自咎也人有過而能自知","source":"논어"},{"text":"者鮮矣知過而能內自訟者爲尤鮮能內自訟則其悔悟深切而能改必矣夫子自","source":"논어"},{"text":"恐終不得見而歎之其警學者深矣","source":"논어"},{"text":"公冶長27章","source":"논어"},{"text":"05-27-01 子曰十室之邑必有忠信如丘者焉不如丘之好學也","source":"논어"},{"text":"十室小邑也忠信如聖人生質之美者也夫子生知而未嘗不好學故言此以勉人","source":"논어"},{"text":"言美質易得至道難聞學之至則可以爲聖人不學則不免爲鄕人而已可不勉哉","source":"논어"},{"text":"凡二十八章篇內第十四章以前大意與前篇同","source":"논어"},{"text":"06-01-01 子曰雍也可使南面","source":"논어"},{"text":"南面者人君聽治之位言仲弓寬洪簡重有人君之度也","source":"논어"},{"text":"06-01-02 仲弓問子桑伯子子曰可也簡","source":"논어"},{"text":"子桑伯子魯人胡氏以爲疑卽莊周所稱子桑戶者是也仲弓以夫子許己南面故問","source":"논어"},{"text":"伯子如何可者僅可而有所未盡之辭簡者不煩之謂","source":"논어"},{"text":"06-01-03 仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃大簡乎","source":"논어"},{"text":"言自處以敬則中有主而自治嚴如是而行簡以臨民則事不煩而民不擾所以爲可","source":"논어"},{"text":"若先自處以簡","source":"논어"},{"text":"則中無主而自治疎矣","source":"논어"},{"text":"而所行又簡","source":"논어"},{"text":"豈不失之太簡而無法度之可守","source":"논어"},{"text":"乎家語記伯子不衣冠而處夫子譏其欲同人道於牛馬然則伯子蓋太簡者而仲弓","source":"논어"},{"text":"疑夫子之過許與","source":"논어"},{"text":"06-01-04 子曰雍之言然","source":"논어"},{"text":"仲弓蓋未喩夫子可字之意而其所言之理有黙契焉者故夫子然之○程子曰子","source":"논어"},{"text":"桑伯子之簡","source":"논어"},{"text":"雖可取而未盡善","source":"논어"},{"text":"故夫子云可也","source":"논어"},{"text":"仲弓因言內主於敬而簡","source":"논어"},{"text":"內存乎簡而簡則爲疏略可謂得其旨矣又曰居敬則心中無物故所行自簡居簡","source":"논어"},{"text":"則先有心於簡而多一簡字矣故曰太簡","source":"논어"},{"text":"06-02-01 哀公問弟子孰爲好學孔子對曰有顔回者好學不遷怒不貳過不幸","source":"논어"},{"text":"短命死矣今也則亡未聞好學者也","source":"논어"},{"text":"遷移也貳復也怒於甲者不移於乙過於前者不復於後顔子克己之功至於","source":"논어"},{"text":"如此可謂眞好學矣短命者顔子三十二而卒也旣云今也則亡又言未聞好學者","source":"논어"},{"text":"蓋深惜之又以見眞好學者之難得也○程子曰顔子之怒在物不在己故不遷","source":"논어"},{"text":"有不善未嘗不知知之未嘗復行不貳過也又曰喜怒在事則理之當喜怒者也","source":"논어"},{"text":"不在血氣則不遷若舜之誅四凶也可怒在彼己何與焉如鑑之照物姸媸在彼","source":"논어"},{"text":"隨物應之而已何遷之有又曰如顔子地位豈有不善所謂不善只是微有差失纔","source":"논어"},{"text":"差失便能知之纔知之便更不萌作張子曰慊於己者不使萌於再或曰詩書六藝","source":"논어"},{"text":"七十子非不習而通也而夫子獨稱顔子爲好學顔子之所好果何學歟程子曰學","source":"논어"},{"text":"以至乎聖人之道也","source":"논어"},{"text":"學之道奈何","source":"논어"},{"text":"曰天地儲精","source":"논어"},{"text":"得五行之秀者爲人","source":"논어"},{"text":"其本也眞而靜","source":"논어"},{"text":"其未發也五性具焉曰仁義禮智信形旣生矣外物觸其形而動於中矣其中動而","source":"논어"},{"text":"七情出焉曰喜怒哀懼愛惡欲情旣熾而益蕩其性鑿矣故覺者約其情使合於中","source":"논어"},{"text":"正其心養其性而已然必先明諸心知所往然後力行以求至焉若顔子之非禮勿視","source":"논어"},{"text":"不遷怒貳過者","source":"논어"},{"text":"則其好之篤而學之得其道也","source":"논어"},{"text":"然其未至於聖人者","source":"논어"},{"text":"非化之也假之以年則不日而化矣今人乃謂聖本生知非學可至而所以爲學者","source":"논어"},{"text":"不過記誦文辭之間其亦異乎顔子之學矣","source":"논어"},{"text":"06-03-01 子華使於齊冉子爲其母請粟子曰與之釜請益曰與之庾冉子與之","source":"논어"},{"text":"子華公西赤也使爲孔子使也釜六斗四升庾十六斗秉十六斛","source":"논어"},{"text":"06-03-02 子曰赤之適齊也乘肥馬衣輕裘吾聞之也君子周急不繼富","source":"논어"},{"text":"乘肥馬衣輕裘言其富也急窮迫也周者補不足繼者續有餘","source":"논어"},{"text":"06-03-03 原思爲之宰與之粟九百辭","source":"논어"},{"text":"原思孔子弟子名憲孔子爲魯司寇時以思爲宰粟宰之祿也九百不言其量","source":"논어"},{"text":"06-03-04 子曰毋以與爾隣里鄕黨乎","source":"논어"},{"text":"毋禁止辭五家爲隣二十五家爲里萬二千五百家爲鄕五百家爲黨言常祿不當","source":"논어"},{"text":"辭有餘自可推之以周貧乏蓋隣里鄕黨有相周之義○程子曰夫子之使子華","source":"논어"},{"text":"子華之爲夫子使義也而冉有乃爲之請聖人寬容不欲直拒人故與之少所以示","source":"논어"},{"text":"不當與也請益而與之亦少所以示不當益也求未達而自與之多則已過矣故夫","source":"논어"},{"text":"子非之蓋赤苟至乏則夫子必自周之不待請矣原思爲宰則有常祿思辭其多","source":"논어"},{"text":"故又敎以分諸隣里之貧者蓋亦莫非義也張子曰於斯二者可見聖人之用財矣","source":"논어"},{"text":"06-04-01 子謂仲弓曰犁牛之子騂且角雖欲勿用山川其舍諸","source":"논어"},{"text":"犁雜文騂赤色周人尙赤牲用騂角角周正中犧牲也用用以祭也山川山","source":"논어"},{"text":"川之神也言人雖不用神必不舍也仲弓父賤而行惡故夫子以此譬之言父之惡","source":"논어"},{"text":"不能廢其子之善","source":"논어"},{"text":"如仲弓之賢","source":"논어"},{"text":"自當見用於世也","source":"논어"},{"text":"然此論仲弓云爾","source":"논어"},{"text":"非與仲弓言也","source":"논어"},{"text":"○范氏曰以瞽瞍爲父而有舜以鯀爲父而有禹古之聖賢不係於世類尙矣子能","source":"논어"},{"text":"改父之過變惡以爲美則可謂孝矣","source":"논어"},{"text":"06-05-01 子曰回也其心三月不違仁其餘則日月至焉而已矣","source":"논어"},{"text":"三月言其久仁者心之德心不違仁者無私欲而有其德也日月至焉者或日一至","source":"논어"},{"text":"焉或月一至焉能造其域而不能久也○程子曰三月天道小變之節言其久也","source":"논어"},{"text":"過此則聖人矣不違仁只是無纖毫私欲少有私欲便是不仁尹氏曰此顔子於聖","source":"논어"},{"text":"人未達一間者也若聖人則渾然無間斷矣張子曰始學之要當知三月不違與日","source":"논어"},{"text":"月至焉內外賓主之辨使心意勉勉循循而不能已過此幾非在我者","source":"논어"},{"text":"06-06-01 季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可","source":"논어"},{"text":"使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎","source":"논어"},{"text":"從政謂爲大夫果有決斷達通事理藝多才能○程子曰季康子問三子之才","source":"논어"},{"text":"可以從政乎夫子答以各有所長非惟三子人各有所長能取其長皆可用也","source":"논어"},{"text":"06-07-01 季氏使閔子騫爲費宰閔子騫曰善爲我辭焉如有復我者則吾必在汶","source":"논어"},{"text":"閔子騫孔子弟子名損費季氏邑汶水名在齊南魯北竟上閔子不欲臣季氏","source":"논어"},{"text":"令使者善爲己辭言若再來召我則當去之齊○程子曰仲尼之門能不仕大夫之","source":"논어"},{"text":"閔子曾子數人而已","source":"논어"},{"text":"學者能少知內外之分","source":"논어"},{"text":"皆可以樂道而忘人之勢","source":"논어"},{"text":"況閔子得聖人爲之依歸彼其視季氏不義之富貴不啻犬彘又從而臣之豈其心哉","source":"논어"},{"text":"在聖人則有不然者蓋居亂邦見惡人在聖人則可自聖人以下剛則必取禍柔則","source":"논어"},{"text":"必取辱閔子豈不能早見而豫待之乎如由也不得其死求也爲季氏附益夫豈其本","source":"논어"},{"text":"心哉蓋旣無先見之知又無克亂之才故也然則閔子其賢乎","source":"논어"},{"text":"06-08-01 伯牛有疾子問之自牖執其手曰亡之命矣夫斯人也而有斯疾也斯","source":"논어"},{"text":"人也而有斯疾也","source":"논어"},{"text":"伯牛孔子弟子姓冉名耕有疾先儒以爲癩也牖南牖也禮病者居北牖下君","source":"논어"},{"text":"視之則遷於南牖下使君得以南面視己時伯牛家以此禮尊孔子孔子不敢當故","source":"논어"},{"text":"不入其室而自牖執其手蓋與之永訣也命謂天命言此人不應有此疾而今乃有","source":"논어"},{"text":"之是乃天之所命也然則非其不能謹疾而有以致之亦可見矣○侯氏曰伯牛以","source":"논어"},{"text":"德行稱亞於顔閔故其將死也孔子尤痛惜之","source":"논어"},{"text":"06-09-01 子曰賢哉回也一簞食一瓢飮在陋巷人不堪其憂回也不改其樂","source":"논어"},{"text":"簞竹器食飯也瓢瓠也顔子之貧如此而處之泰然不以害其樂故夫子再言","source":"논어"},{"text":"賢哉回也以深嘆美之○程子曰顔子之樂非樂簞瓢陋巷也不以貧窶累其心而","source":"논어"},{"text":"改其所樂也故夫子稱其賢又曰簞瓢陋巷非可樂蓋自有其樂爾其字當玩味","source":"논어"},{"text":"自有深意又曰昔受學於周茂叔每令尋仲尼顔子樂處所樂何事愚按程子之言","source":"논어"},{"text":"蓋欲學者深思而自得之","source":"논어"},{"text":"今亦不敢妄爲之說","source":"논어"},{"text":"學者但當從事於博文約禮","source":"논어"},{"text":"之誨以至於欲罷不能而竭其才則庶乎有以得之矣","source":"논어"},{"text":"雍也10章","source":"논어"},{"text":"06-10-01 冉求曰非不說子之道力不足也子曰力不足者中道而廢今女畫","source":"논어"},{"text":"力不足者欲進而不能畫者能進而不欲謂之畫者如畫地以自限也○胡氏曰","source":"논어"},{"text":"夫子稱顔回不改其樂冉求聞之故有是言然使求說夫子之道誠如口之說芻豢","source":"논어"},{"text":"則必將盡力以求之何患力之不足哉畫而不進則日退而已矣此冉求之所以局於","source":"논어"},{"text":"雍也11章","source":"논어"},{"text":"06-11-01 子謂子夏曰女爲君子儒無爲小人儒","source":"논어"},{"text":"儒學者之稱程子曰君子儒爲己小人儒爲人○謝氏曰君子小人之分義與","source":"논어"},{"text":"利之間而已然所謂利者豈必殖貨財之謂以私滅公適己自便凡可以害天理者","source":"논어"},{"text":"皆利也子夏文學雖有餘然意其遠者大者或昧焉故夫子語之以此","source":"논어"},{"text":"雍也12章","source":"논어"},{"text":"06-12-01 子游爲武城宰子曰女得人焉爾乎曰有澹臺滅明者行不由徑非公事","source":"논어"},{"text":"未嘗至於偃之室也","source":"논어"},{"text":"武城魯下邑澹臺姓滅明名字子羽徑路之小而捷者公事如飮射讀法之類","source":"논어"},{"text":"不由徑則動必以正而無見小欲速之意可知非公事不見邑宰則其有以自守而","source":"논어"},{"text":"無枉己徇人之私可見矣○楊氏曰爲政以人才爲先故孔子以得人爲問如滅","source":"논어"},{"text":"明者觀其二事之小而其正大之情可見矣後世有不由徑者人必以爲迂不至其","source":"논어"},{"text":"室人必以爲簡非孔氏之徒其孰能知而取之愚謂持身以滅明爲法則無苟賤","source":"논어"},{"text":"之羞取人以子游爲法則無邪媚之惑","source":"논어"},{"text":"雍也13章","source":"논어"},{"text":"06-13-01 子曰孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也","source":"논어"},{"text":"孟之反魯大夫名側胡氏曰反卽莊周所稱孟子反者是也伐誇功也奔敗走","source":"논어"},{"text":"也軍後曰殿策鞭也戰敗而還以後爲功反奔而殿故以此言自揜其功也事在","source":"논어"},{"text":"哀公十一年○謝氏曰人能操無欲上人之心則人欲日消天理日明而凡可以矜","source":"논어"},{"text":"己誇人者皆無足道矣然不知學者欲上人之心無時而忘也若孟之反可以爲法","source":"논어"},{"text":"雍也14章","source":"논어"},{"text":"06-14-01 子曰不有祝鮀之佞而有宋朝之美難乎免於今之世矣","source":"논어"},{"text":"祝宗廟之官鮀衛大夫字子魚有口才朝宋公子有美色言衰世好諛悅色非","source":"논어"},{"text":"此難色蓋傷之也","source":"논어"},{"text":"雍也15章","source":"논어"},{"text":"06-15-01 子曰誰能出不由戶何莫由斯道也","source":"논어"},{"text":"言人不能出不由戶何故乃不由此道耶怪而歎之之辭○洪氏曰人知出必由戶","source":"논어"},{"text":"而不知行必由道非道遠人人自遠爾","source":"논어"},{"text":"雍也16章","source":"논어"},{"text":"06-16-01 子曰質勝文則野文勝質則史文質彬彬然後君子","source":"논어"},{"text":"野野人言鄙略也史掌文書多聞習事而誠或不足也彬彬猶斑斑物相雜而適","source":"논어"},{"text":"均之貌言學者當損有餘補不足至於成德則不期然而然矣○楊氏曰文質不","source":"논어"},{"text":"可以相勝然質之勝文猶之甘可以受和白可以受采也文勝而至於滅質則其本","source":"논어"},{"text":"亡矣雖有文將安施乎然則與其史也寧野","source":"논어"},{"text":"雍也17章","source":"논어"},{"text":"06-17-01 子曰人之生也直罔之生也幸而免","source":"논어"},{"text":"程子曰生理本直罔不直也而亦生者幸而免耳","source":"논어"},{"text":"雍也18章","source":"논어"},{"text":"06-18-01 子曰知之者不如好之者好之者不如樂之者","source":"논어"},{"text":"尹氏曰知之者知有此道也好之者好而未得也樂之者有所得而樂之也○張","source":"논어"},{"text":"敬夫曰譬之五穀知者知其可食者也好者食而嗜之者也樂者嗜之而飽者也","source":"논어"},{"text":"知而不能好則是知之未至也好之而未及於樂則是好之未至也此古之學者所以","source":"논어"},{"text":"自强而不息者與","source":"논어"},{"text":"雍也19章","source":"논어"},{"text":"06-19-01 子曰中人以上可以語上也中人以下不可以語上也","source":"논어"},{"text":"語告也言敎人者當隨其高下而告語之則其言易入而無躐等之弊也○張敬夫","source":"논어"},{"text":"曰聖人之道精粗雖無二致但其施敎則必因其材而篤焉蓋中人以下之質驟而","source":"논어"},{"text":"語之太高非惟不能以入且將妄意躐等而有不切於身之弊亦終於下而已矣故","source":"논어"},{"text":"就其所及而語之是乃所以使之切問近思而漸進於高遠也","source":"논어"},{"text":"雍也20章","source":"논어"},{"text":"06-20-01 樊遲問知子曰務民之義敬鬼神而遠之可謂知矣問仁曰仁者先難","source":"논어"},{"text":"而後獲可謂仁矣","source":"논어"},{"text":"民亦人也獲謂得也專用力於人道之所宜而不惑於鬼神之不可知知者之事也","source":"논어"},{"text":"先其事之所難而後其效之所得仁者之心也此必因樊遲之失而告之○程子曰","source":"논어"},{"text":"人多信鬼神惑也而不信者又不能敬能敬能遠可謂知矣又曰先難克己也","source":"논어"},{"text":"以所難爲先而不計所獲仁也呂氏曰當務爲急不求所難知力行所知不憚所難","source":"논어"},{"text":"雍也21章","source":"논어"},{"text":"06-21-01 子曰知者樂水仁者樂山知者動仁者靜知者樂仁者壽","source":"논어"},{"text":"樂喜好也知者達於事理而周流無滯有似於水故樂水仁者安於義理而厚重","source":"논어"},{"text":"不遷有似於山故樂山動靜以體言樂壽以效言也動而不括故樂靜而有常","source":"논어"},{"text":"故壽○程子曰非體仁知之深者不能如此形容之","source":"논어"},{"text":"雍也22章","source":"논어"},{"text":"06-22-01 子曰齊一變至於魯魯一變至於道","source":"논어"},{"text":"孔子之時齊俗急功利喜夸詐乃覇政之餘習魯則重禮敎崇信義猶有先王之","source":"논어"},{"text":"遺風焉但人亡政息不能無廢墜耳道則先王之道也言二國之政俗有美惡故","source":"논어"},{"text":"其變而之道有難易○程子曰夫子之時齊强魯弱孰不以爲齊勝魯也然魯猶","source":"논어"},{"text":"存周公之法制齊由桓公之覇爲從簡尙功之治太公之遺法變易盡矣故一變乃","source":"논어"},{"text":"能至魯魯則修擧廢墜而已一變則至於先王之道也愚謂二國之俗惟夫子爲能","source":"논어"},{"text":"變之而不得試然因其言以考之則其施爲緩急之序亦略可見矣","source":"논어"},{"text":"雍也23章","source":"논어"},{"text":"06-23-01 子曰觚不觚觚哉觚哉","source":"논어"},{"text":"觚稜也或曰酒器或曰木簡皆器之有稜者也不觚者蓋當時失其制而不爲稜","source":"논어"},{"text":"也觚哉觚哉言不得爲觚也○程子曰觚而失其形制則非觚也擧一器而天下","source":"논어"},{"text":"之物莫不皆然故君而失其君之道則爲不君臣而失其臣之職則爲虛位范氏曰","source":"논어"},{"text":"人而不仁則非人國而不治則不國矣","source":"논어"},{"text":"雍也24章","source":"논어"},{"text":"06-24-01 宰我問曰仁者雖告之曰井有仁焉其從之也子曰何爲其然也君子","source":"논어"},{"text":"可逝也不可陷也可欺也不可罔也","source":"논어"},{"text":"劉聘君曰有仁之仁當作人今從之從謂隨之於井而救之也宰我信道不篤而","source":"논어"},{"text":"憂爲仁之陷害故有此問逝謂使之往救陷謂陷之於井欺謂誑之以理之所有","source":"논어"},{"text":"罔謂昧之以理之所無蓋身在井上乃可以救井中之人若從之於井則不復能救","source":"논어"},{"text":"之矣此理甚明人所易曉仁者雖切於救人而不私其身然不應如此之愚也","source":"논어"},{"text":"雍也25章","source":"논어"},{"text":"06-25-01 子曰君子博學於文約之以禮亦可以弗畔矣夫","source":"논어"},{"text":"約要也畔背也君子學欲其博故於文無不考守欲其要故其動必以禮如此","source":"논어"},{"text":"則可以不背於道矣○程子曰博學於文而不約之以禮必至於汗漫博學矣又能","source":"논어"},{"text":"守禮而由於規矩則亦可以不畔道矣","source":"논어"},{"text":"雍也26章","source":"논어"},{"text":"06-26-01 子見南子子路不說夫子矢之曰予所否者天厭之天厭之","source":"논어"},{"text":"南子衛靈公之夫人有淫行孔子至衛南子請見孔子辭謝不得已而見之蓋古","source":"논어"},{"text":"者仕於其國有見其小君之禮而子路以夫子見此淫亂之人爲辱故不悅矢誓","source":"논어"},{"text":"也所誓辭也如云所不與崔慶者之類否謂不合於禮不由其道也厭棄絶也聖","source":"논어"},{"text":"人道大德全無可不可其見惡人固謂在我有可見之禮則彼之不善我何與焉然","source":"논어"},{"text":"此豈子路所能測哉故重言以誓之欲其姑信此而深思以得之也","source":"논어"},{"text":"雍也27章","source":"논어"},{"text":"06-27-01 子曰中庸之爲德也其至矣乎民鮮久矣","source":"논어"},{"text":"中者無過不及之名也庸平常也至極也鮮少也言民少此德今已久矣○","source":"논어"},{"text":"程子曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理自世敎衰","source":"논어"},{"text":"民不興於行少有此德久矣","source":"논어"},{"text":"雍也28章","source":"논어"},{"text":"06-28-01 子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也","source":"논어"},{"text":"聖乎堯舜其猶病諸","source":"논어"},{"text":"博廣也仁以理言通乎上下聖以地言則造其極之名也乎者疑而未定之辭","source":"논어"},{"text":"病心有所不足也言此何止於仁必也聖人能之乎則雖堯舜之聖其心猶有所不","source":"논어"},{"text":"足於此也以是求仁愈難而愈遠矣","source":"논어"},{"text":"06-28-02 夫仁者己欲立而立人己欲達而達人","source":"논어"},{"text":"以己及人仁者之心也於此觀之可以見天理之周流而無間矣狀仁之體莫切於","source":"논어"},{"text":"06-28-03 能近取譬可謂仁之方也已","source":"논어"},{"text":"譬喩也方術也近取諸身以己所欲譬之他人知其所欲亦猶是也然後推其所","source":"논어"},{"text":"欲以及於人則恕之事而仁之術也於此勉焉則有以勝其人欲之私而全其天理之","source":"논어"},{"text":"公矣○程子曰醫書以手足痿痺爲不仁此言最善名狀仁者以天地萬物爲","source":"논어"},{"text":"一體莫非己也認得爲己何所不至若不屬己自與己不相干如手足之不仁氣","source":"논어"},{"text":"已不貫皆不屬己故博施濟衆乃聖人之功用仁至難言故止曰己欲立而立人己","source":"논어"},{"text":"欲達而達人能近取譬可謂仁之方也已欲令如是觀仁可以得仁之體又曰論語","source":"논어"},{"text":"言堯舜其猶病諸者二夫博施者豈非聖人之所欲然必五十乃衣帛七十乃食肉聖","source":"논어"},{"text":"人之心非不欲少者亦衣帛食肉也顧其養有所不贍爾此病其施之不博也濟衆者","source":"논어"},{"text":"豈非聖人之所欲然治不過九州聖人非不欲四海之外亦兼濟也顧其治有所不及","source":"논어"},{"text":"爾此病其濟之不衆也推此以求修己以安百姓則爲病可知苟以吾治已足則便","source":"논어"},{"text":"不是聖人呂氏曰子貢有志於仁徒事高遠未知其方孔子敎以於己取之庶近而","source":"논어"},{"text":"可入是乃爲仁之方雖博施濟衆亦由此進","source":"논어"},{"text":"此篇多記聖人謙己誨人之辭及其容貌行事之實凡三十七章","source":"논어"},{"text":"07-01-01 子曰述而不作信而好古竊比於我老彭","source":"논어"},{"text":"述傳舊而已作則創始也故作非聖人不能而述則賢者可及竊比尊之之辭","source":"논어"},{"text":"我親之之辭老彭商賢大夫見大戴禮蓋信古而傳述者也孔子刪詩書定禮樂","source":"논어"},{"text":"贊周易修春秋皆傳先王之舊而未嘗有所作也故其自言如此蓋不惟不敢當作","source":"논어"},{"text":"而亦不敢顯然自附於古之賢人","source":"논어"},{"text":"蓋其德愈盛而心愈下","source":"논어"},{"text":"不自知其辭之謙也","source":"논어"},{"text":"然當是時作者略備夫子蓋集群聖之大成而折衷之其事雖述而功則倍於作矣","source":"논어"},{"text":"此又不可不知也","source":"논어"},{"text":"07-02-01 子曰黙而識之學而不厭誨人不倦何有於我哉","source":"논어"},{"text":"識記也黙識謂不言而存諸心也一說識知也不言而心解也前說近是何有","source":"논어"},{"text":"於我言何者能有於我也三者已非聖人之極至而猶不敢當則謙而又謙之辭也","source":"논어"},{"text":"07-03-01 子曰德之不修學之不講聞義不能徙不善不能改是吾憂也","source":"논어"},{"text":"尹氏曰德必修而後成學必講而後明見善能徙改過不吝此四者日新之要也","source":"논어"},{"text":"苟未能之聖人猶憂況學者乎","source":"논어"},{"text":"07-04-01 子之燕居申申如也夭夭如也","source":"논어"},{"text":"燕居閒暇無事之時楊氏曰申申其容舒也夭夭其色愉也○程子曰此弟子","source":"논어"},{"text":"善形容聖人處也爲申申字說不盡故更著夭夭字今人燕居之時不怠惰放肆必","source":"논어"},{"text":"太嚴厲嚴厲時著此四字不得怠惰放肆時亦著此四字不得惟聖人便自有中和之","source":"논어"},{"text":"07-05-01 子曰甚矣吾衰也久矣吾不復夢見周公","source":"논어"},{"text":"孔子盛時志欲行周公之道故夢寐之間如或見之至其老而不能行也則無復是","source":"논어"},{"text":"心而亦無復是夢矣故因此而自歎其衰之甚也○程子曰孔子盛時寤寐常存行","source":"논어"},{"text":"周公之道及其老也則志慮衰而不可以有爲矣蓋存道者心無老少之異而行道","source":"논어"},{"text":"者身老則衰也","source":"논어"},{"text":"07-06-01 子曰志於道","source":"논어"},{"text":"志者心之所之之謂道則人倫日用之間所當行者是也知此而心必之焉則所適","source":"논어"},{"text":"者正而無他岐之惑矣","source":"논어"},{"text":"07-06-02 據於德","source":"논어"},{"text":"據者執守之意德則行道而有得於心者也得之於心而守之不失則終始惟一而","source":"논어"},{"text":"有日新之功矣","source":"논어"},{"text":"07-06-03 依於仁","source":"논어"},{"text":"依者不違之謂仁則私欲盡去而心德之全也工夫至此而無終食之違則存養之","source":"논어"},{"text":"熟無適而非天理之流行矣","source":"논어"},{"text":"07-06-04 游於藝","source":"논어"},{"text":"游者玩物適情之謂藝則禮樂之文射御書數之法皆至理所寓而日用之不可闕","source":"논어"},{"text":"者也朝夕游焉以博其義理之趣則應務有餘而心亦無所放矣○此章言人之","source":"논어"},{"text":"爲學當如是也蓋學莫先於立志志道則心存於正而不他據德則道得於心而不失","source":"논어"},{"text":"依仁則德性常用而物欲不行","source":"논어"},{"text":"游藝則小物不遺而動息有養","source":"논어"},{"text":"有以不失其","source":"논어"},{"text":"先後之序輕重之倫焉則本末兼該內外交養日用之間無少間隙而涵泳從容忽","source":"논어"},{"text":"不自知其入於聖賢之域矣","source":"논어"},{"text":"07-07-01 子曰自行束脩以上吾未嘗無誨焉","source":"논어"},{"text":"脩脯也十脡爲束古者相見必執贄以爲禮束脩其至薄者蓋人之有生同具此","source":"논어"},{"text":"理故聖人之於人無不欲其入於善但不知來學則無往敎之禮故苟以禮來則","source":"논어"},{"text":"無不有以敎之也","source":"논어"},{"text":"07-08-01 子曰不憤不啓不悱不發擧一隅不以三隅反則不復也","source":"논어"},{"text":"憤者心求通而未得之意悱者口欲言而未能之貌啓謂開其意發謂達其辭物","source":"논어"},{"text":"之有四隅者擧一可知其三反者還以相證之義復再告也上章已言聖人誨人","source":"논어"},{"text":"不倦之意因幷記此欲學者勉於用力以爲受敎之地也○程子曰憤悱誠意之見","source":"논어"},{"text":"於色辭者也待其誠至而後告之旣告之又必待其自得乃復告爾又曰不待憤悱","source":"논어"},{"text":"而發則知之不能堅固待其憤悱而後發則沛然矣","source":"논어"},{"text":"07-09-01 子食於有喪者之側未嘗飽也","source":"논어"},{"text":"臨喪哀不能甘也","source":"논어"},{"text":"07-09-02 子於是日哭則不歌","source":"논어"},{"text":"哭謂吊哭一日之內餘哀未忘自不能歌也○謝氏曰學者於此二者可見聖人","source":"논어"},{"text":"情性之正也能識聖人之情性然後可以學道","source":"논어"},{"text":"述而10章","source":"논어"},{"text":"07-10-01 子謂顔淵曰用之則行舍之則藏惟我與爾有是夫","source":"논어"},{"text":"尹氏曰用舍無與於己行藏安於所遇命不足道也顔子幾於聖人故亦能之","source":"논어"},{"text":"07-10-02 子路曰子行三軍則誰與","source":"논어"},{"text":"萬二千五百人爲軍","source":"논어"},{"text":"子路見孔子獨美顔淵","source":"논어"},{"text":"意夫子若行三軍","source":"논어"},{"text":"07-10-03 子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也","source":"논어"},{"text":"暴虎徒搏馮河徒涉懼謂敬其事成謂成其謀言此皆以抑其勇而敎之然","source":"논어"},{"text":"行師之要實不外此子路蓋不知也○謝氏曰聖人於行藏之間無意無必其行非","source":"논어"},{"text":"貪位其藏非獨善也若有欲心則不用而求行舍之而不藏矣是以惟顔子爲可以","source":"논어"},{"text":"與於此子路雖非有欲心者然未能無固必也至以行三軍爲問則其論益卑矣","source":"논어"},{"text":"夫子之言蓋因其失而救之夫不謀無成不懼必敗小事尙然而況於行三軍乎","source":"논어"},{"text":"述而11章","source":"논어"},{"text":"07-11-01 子曰富而可求也雖執鞭之士吾亦爲之如不可求從吾所好","source":"논어"},{"text":"執鞭賤者之事設言富若可求則雖身爲賤役以求之亦所不辭然有命焉非求","source":"논어"},{"text":"之可得也則安於義理而已矣何必徒取辱哉○蘇氏曰聖人未嘗有意於求富也","source":"논어"},{"text":"豈問其可不可哉","source":"논어"},{"text":"特以明其決不可求爾","source":"논어"},{"text":"君子非惡富貴而不求","source":"논어"},{"text":"以其在天無可求之道也","source":"논어"},{"text":"述而12章","source":"논어"},{"text":"07-12-01 子之所愼齊戰疾","source":"논어"},{"text":"齊之爲言齊也將祭而齊其思慮之不齊者以交於神明也誠之至與不至神之享","source":"논어"},{"text":"與不享皆決於此戰則衆之死生國之存亡繫焉疾又吾身之所以死生存亡者","source":"논어"},{"text":"皆不可以不謹也○尹氏曰夫子無所不謹弟子記其大者耳","source":"논어"},{"text":"述而13章","source":"논어"},{"text":"07-13-01 子在齊聞韶三月不知肉味曰不圖爲樂之至於斯也","source":"논어"},{"text":"史記三月上有學之二字不知肉味蓋心一於是而不及乎他也曰不意舜之作樂","source":"논어"},{"text":"至於如此之美則有以極其情文之備而不覺其歎息之深也蓋非聖人不足以及此","source":"논어"},{"text":"○范氏曰韶盡美又盡善樂之無以加此也故學之三月不知肉味而歎美之如","source":"논어"},{"text":"此誠之至感之深也","source":"논어"},{"text":"述而14章","source":"논어"},{"text":"07-14-01 冉有曰夫子爲衛君乎子貢曰諾吾將問之","source":"논어"},{"text":"爲猶助也衛君出公輒也靈公逐其世子蒯聵公薨而國人立蒯聵之子輒於是","source":"논어"},{"text":"晉納蒯聵而輒拒之時孔子居衛衛人以蒯聵得罪於父而輒嫡孫當立故冉有疑","source":"논어"},{"text":"而問之諾應辭也","source":"논어"},{"text":"07-14-02 入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨","source":"논어"},{"text":"出曰夫子不爲也","source":"논어"},{"text":"伯夷叔齊孤竹君之二子其父將死遺命立叔齊父卒叔齊遜伯夷伯夷曰父命也","source":"논어"},{"text":"遂逃去叔齊亦不立而逃之國人立其中子其後武王伐紂夷齊扣馬而諫武王滅","source":"논어"},{"text":"商夷齊恥食周粟去隱于首陽山遂餓而死怨猶悔也君子居是邦不非其大夫","source":"논어"},{"text":"況其君乎故子貢不斥衛君而以夷齊爲問夫子告之如此則其不爲衛君可知矣","source":"논어"},{"text":"蓋伯夷以父命爲尊","source":"논어"},{"text":"叔齊以天倫爲重","source":"논어"},{"text":"皆求所以合乎天理之正而卽乎人","source":"논어"},{"text":"心之安旣而各得其志焉則視棄其國猶敝蹝爾何怨之有若衛輒之據國拒父而","source":"논어"},{"text":"唯恐失之其不可同年而語明矣○程子曰伯夷叔齊遜國而逃諫伐而餓終無","source":"논어"},{"text":"怨悔夫子以爲賢故知其不與輒也","source":"논어"},{"text":"述而15章","source":"논어"},{"text":"07-15-01 子曰飯疏食飮水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮","source":"논어"},{"text":"飯食之也疏食麤飯也聖人之心渾然天理雖處困極而樂亦無不在焉其視不","source":"논어"},{"text":"義之富貴如浮雲之無有漠然無所動於其中也○程子曰非樂疏食飮水也雖疏","source":"논어"},{"text":"食飮水不能改其樂也不義之富貴視之輕如浮雲然又曰須知所樂者何事","source":"논어"},{"text":"述而16章","source":"논어"},{"text":"07-16-01 子曰加我數年五十以學易可以無大過矣","source":"논어"},{"text":"劉騁君見元城劉忠定公自言嘗讀他論加作假五十作卒蓋加假聲相近而誤","source":"논어"},{"text":"讀卒與五十字相似而誤分也愚按此章之言史記作假我數年若是我於易則","source":"논어"},{"text":"彬彬矣加正作假而無五十字蓋是時孔子年已幾七十矣五十字誤無疑也學","source":"논어"},{"text":"易則明乎吉凶消長之理","source":"논어"},{"text":"進退存亡之道","source":"논어"},{"text":"可以無大過","source":"논어"},{"text":"蓋聖人深見易道之無窮","source":"논어"},{"text":"而言此以敎人使知其不可不學而又不可以易而學也","source":"논어"},{"text":"述而17章","source":"논어"},{"text":"07-17-01 子所雅言詩書執禮皆雅言也","source":"논어"},{"text":"雅常也執守也詩以理情性書以道政事禮以謹節文皆切於日用之實故常","source":"논어"},{"text":"言之禮獨言執者以人所執守而言非徒通說而已也○程子曰孔子雅素之言","source":"논어"},{"text":"止於如此若性與天道則有不可得而聞者要在黙而識之也謝氏曰此因學易之","source":"논어"},{"text":"語而類記之","source":"논어"},{"text":"述而18章","source":"논어"},{"text":"07-18-01 葉公問孔子於子路子路不對","source":"논어"},{"text":"葉公楚葉縣尹沈諸梁字子高僭稱公也葉公不知孔子必有非所問而問者故","source":"논어"},{"text":"子路不對抑亦以聖人之德實有未易名言者與","source":"논어"},{"text":"07-18-02 子曰女奚不曰其爲人也發憤忘食樂以忘憂不知老之將至云爾","source":"논어"},{"text":"未得則發憤而忘食已得則樂之而忘憂以是二者俛焉日有孶孶而不知年數之不","source":"논어"},{"text":"足但自言其好學之篤爾然深味之則見其全體至極純亦不已之妙有非聖人不","source":"논어"},{"text":"能及者蓋凡夫子之自言類如此學者宜致思焉","source":"논어"},{"text":"述而19章","source":"논어"},{"text":"07-19-01 子曰我非生而知之者好古敏以求之者也","source":"논어"},{"text":"生而知之者氣質淸明義理昭著不待學而知也敏速也謂汲汲也○尹氏曰","source":"논어"},{"text":"孔子以生知之聖每云好學者非惟勉人也蓋生而可知者義理爾若夫禮樂名物","source":"논어"},{"text":"古今事變亦必待學而後有以驗其實也","source":"논어"},{"text":"述而20章","source":"논어"},{"text":"07-20-01 子不語怪力亂神","source":"논어"},{"text":"怪異勇力悖亂之事非理之正固聖人所不語鬼神造化之迹雖非不正然非","source":"논어"},{"text":"窮理之至有未易明者故亦不輕以語人也○謝氏曰聖人語常而不語怪語德","source":"논어"},{"text":"而不語力語治而不語亂語人而不語神","source":"논어"},{"text":"述而21章","source":"논어"},{"text":"07-21-01 子曰三人行必有我師焉擇其善者而從之其不善者而改之","source":"논어"},{"text":"三人同行其一我也彼二人者一善一惡則我從其善而改其惡焉是二人者皆我","source":"논어"},{"text":"師也○尹氏曰見賢思齊見不賢而內自省則善惡皆我之師進善其有窮乎","source":"논어"},{"text":"述而22章","source":"논어"},{"text":"07-22-01 子曰天生德於予桓魋其如予何","source":"논어"},{"text":"桓魋宋司馬向魋也出於桓公故又稱桓氏魋欲害孔子孔子言天旣賦我以如是","source":"논어"},{"text":"之德則桓魋其奈我何言必不能違天害己","source":"논어"},{"text":"述而23章","source":"논어"},{"text":"07-23-01 子曰二三者以我爲隱乎吾無隱乎爾吾無行而不與二三子者是丘也","source":"논어"},{"text":"諸弟子以夫子之道高深","source":"논어"},{"text":"而不知聖人作止語黙無非敎也","source":"논어"},{"text":"故夫子以此言曉之與猶示也○程子曰聖人之道猶天然門弟子親炙而冀及","source":"논어"},{"text":"之然後知其高且遠也使誠以爲不可及則趨向之心不幾於怠乎故聖人之敎","source":"논어"},{"text":"常俯而就之如此","source":"논어"},{"text":"非獨使資質庸下者勉思企及","source":"논어"},{"text":"而才氣高邁者亦不敢躐易而進也","source":"논어"},{"text":"呂氏曰聖人體道無隱與天象昭然莫非至敎常以示人而人自不察","source":"논어"},{"text":"述而24章","source":"논어"},{"text":"07-24-01 子以四敎文行忠信","source":"논어"},{"text":"程子曰敎人以學文修行而存忠信也忠信本也","source":"논어"},{"text":"述而25章","source":"논어"},{"text":"07-25-01 子曰聖人吾不得而見之矣得見君子者斯可矣","source":"논어"},{"text":"聖人神明不測之號君子才德出衆之名","source":"논어"},{"text":"07-25-02 子曰善人吾不得而見之矣得見有恒者斯可矣","source":"논어"},{"text":"子曰字疑衍文恒常久之意張子曰有恒者不二其心善人者志於仁而無惡","source":"논어"},{"text":"07-25-03 亡而爲有虛而爲盈約而爲泰難乎有恒矣","source":"논어"},{"text":"三者皆虛夸之事凡若此者必不能守其常也○張敬夫曰聖人君子以學言善","source":"논어"},{"text":"人有恒者以質言愚謂有恒者之與聖人高下固懸絶矣然未有不自有恒而能至","source":"논어"},{"text":"於聖者也故章末申言有恒之義其示人入德之門可謂深切而著明矣","source":"논어"},{"text":"述而26章","source":"논어"},{"text":"07-26-01 子釣而不綱弋不射宿","source":"논어"},{"text":"綱以大繩屬網絶流而漁者也弋以生絲繫矢而射也宿宿鳥○洪氏曰孔子","source":"논어"},{"text":"少貧賤爲養與祭或不得已而釣弋如獵較是也然盡物取之出其不意亦不爲","source":"논어"},{"text":"也此可見仁人之本心矣待物如此待人可知小者如此大者可知","source":"논어"},{"text":"述而27章","source":"논어"},{"text":"07-27-01 子曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之","source":"논어"},{"text":"不知而作不知其理而妄作也孔子自言未嘗妄作蓋亦謙辭然亦可見其無所不","source":"논어"},{"text":"知也識記也所從不可不擇記則善惡皆當存之以備參考如此者雖未能實","source":"논어"},{"text":"知其理亦可以次於知之者也","source":"논어"},{"text":"述而28章","source":"논어"},{"text":"07-28-01 互鄕難與言童子見門人惑","source":"논어"},{"text":"互鄕鄕名其人習於不善難與言善惑者疑夫子不當見之也","source":"논어"},{"text":"07-28-02 子曰與其進也不與其退也唯何甚人潔己以進與其潔也不保其往","source":"논어"},{"text":"疑此章有錯簡人潔至往也十四字當在與其進也之前潔脩治也與許也往前","source":"논어"},{"text":"日也言人潔己而來但許其能自潔耳固不能保其前日所爲之善惡也但許其進而","source":"논어"},{"text":"來見耳非許其旣退而爲不善也蓋不追其旣往不逆其將來以是心至斯受之耳","source":"논어"},{"text":"唯字上下疑又有闕文大抵亦不爲已甚之意○程子曰聖人待物之洪如此","source":"논어"},{"text":"述而29章","source":"논어"},{"text":"07-29-01 子曰仁遠乎哉我欲仁斯仁至矣","source":"논어"},{"text":"仁者心之德非在外也放而不求故有以爲遠者反而求之則卽此而在矣夫豈","source":"논어"},{"text":"遠哉○程子曰爲仁由己欲之則至何遠之有","source":"논어"},{"text":"述而30章","source":"논어"},{"text":"07-30-01 陳司敗問昭公知禮乎孔子曰知禮","source":"논어"},{"text":"陳國名司敗官名卽司寇也昭公魯君名稠習於威儀之節當時以爲知禮故","source":"논어"},{"text":"司敗以爲問而孔子答之如此","source":"논어"},{"text":"07-30-02 孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於吳爲同","source":"논어"},{"text":"姓謂之吳孟子君而知禮孰不知禮","source":"논어"},{"text":"巫馬姓期字孔子弟子名施司敗揖而進之也相助匿非曰黨禮不取同姓而","source":"논어"},{"text":"魯與吳皆姬姓謂之吳孟子者諱之使若宋女子姓者然","source":"논어"},{"text":"07-30-03 巫馬期以告子曰丘也幸苟有過人必知之","source":"논어"},{"text":"孔子不可自謂諱君之惡又不可以取同姓爲知禮故受以爲過而不辭○吳氏曰","source":"논어"},{"text":"魯蓋夫子父母之國昭公魯之先君也司敗又未嘗顯言其事而遽以知禮爲問其","source":"논어"},{"text":"對之宜如此也及司敗以爲有黨而夫子受以爲過蓋夫子之盛德無所不可也然","source":"논어"},{"text":"其受以爲過也亦不正言其所以過初若不知孟子之事者可以爲萬世之法矣","source":"논어"},{"text":"述而31章","source":"논어"},{"text":"07-31-01 子與人歌而善必使反之而後和之","source":"논어"},{"text":"反復也必使復歌者欲得其詳而取其善也而後和之者喜得其詳而與其善也此","source":"논어"},{"text":"見聖人氣象從容誠意懇至而其謙遜審密不掩人善又如此蓋一事之微而衆善","source":"논어"},{"text":"之集有不可勝旣者焉讀者宜詳味之","source":"논어"},{"text":"述而32章","source":"논어"},{"text":"07-32-01 子曰文莫吾猶人也躬行君子則吾未之有得","source":"논어"},{"text":"莫疑辭猶人言不能過人而尙可以及人未之有得則全未有得皆自謙之辭而","source":"논어"},{"text":"足以見言行之難易緩急欲人之勉其實也○謝氏曰文雖聖人無不與人同故","source":"논어"},{"text":"不遜能躬行君子斯可以入聖故不居猶言君子道者三我無能焉","source":"논어"},{"text":"述而33章","source":"논어"},{"text":"07-33-01 子曰若聖與仁則吾豈敢抑爲之不厭誨人不倦則可謂云爾已矣公","source":"논어"},{"text":"西華曰正唯弟子不能學也","source":"논어"},{"text":"此亦夫子之謙辭聖者大而化之仁則心德之全而人道之備也爲之謂爲仁聖之","source":"논어"},{"text":"道誨人亦謂以此敎人也然不厭不倦非己有之則不能所以弟子不能學也○","source":"논어"},{"text":"晁氏曰當時有稱夫子聖且仁者以故夫子辭之苟辭之而已焉則無以進天下之","source":"논어"},{"text":"材率天下之善將使聖與仁爲虛器而人終莫能至矣故夫子雖不居仁聖而必以","source":"논어"},{"text":"爲之不厭誨人不倦自處也可謂云爾已矣者無他之辭也公西華仰而歎之其亦","source":"논어"},{"text":"深知夫子之意矣","source":"논어"},{"text":"述而34章","source":"논어"},{"text":"07-34-01 子疾病子路請禱子曰有諸子路對曰有之誄曰禱爾于上下神祗子","source":"논어"},{"text":"曰丘之禱久矣","source":"논어"},{"text":"禱謂禱於鬼神有諸問有此理否誄者哀死而述其行之辭也上下謂天地天曰","source":"논어"},{"text":"神地曰祗禱者悔過遷善以祈神之佑也無其理則不必禱旣曰有之則聖人未","source":"논어"},{"text":"嘗有過無善可遷其素行固已合於神明故曰丘之禱久矣又士喪禮疾病行禱","source":"논어"},{"text":"五祀蓋臣子迫切之至情有不能自已者初不請於病者而後禱也故孔子之於子","source":"논어"},{"text":"路不直拒之而但告以無所事禱之意","source":"논어"},{"text":"述而35章","source":"논어"},{"text":"07-35-01 子曰奢則不孫儉則固與其不孫也寧固","source":"논어"},{"text":"孫順也固陋也奢儉俱失中而奢之害大○晁氏曰不得已而救時之弊也","source":"논어"},{"text":"述而36章","source":"논어"},{"text":"07-36-01 子曰君子坦蕩蕩小人長戚戚","source":"논어"},{"text":"坦平也蕩蕩寬廣貌程子曰君子循理故常舒泰小人役於物故多憂戚○","source":"논어"},{"text":"程子曰君子坦蕩蕩心廣體胖","source":"논어"},{"text":"述而37章","source":"논어"},{"text":"07-37-01 子溫而厲威而不猛恭而安","source":"논어"},{"text":"厲嚴肅也人之德性本無不備而氣質所賦鮮有不偏惟聖人全體渾然陰陽合","source":"논어"},{"text":"德故其中和之氣見於容貌之間者如此門人熟察而詳記之亦可見其用心之密矣","source":"논어"},{"text":"抑非知足以知聖人而善言德行者不能記故程子以爲曾子之言學者所宜反復而","source":"논어"},{"text":"凡二十一章","source":"논어"},{"text":"08-01-01 子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉","source":"논어"},{"text":"泰伯周大王之長子至德謂德之至極無以復加者也三讓謂固遜也無得而稱","source":"논어"},{"text":"其遜隱微無迹可見也蓋大王三子長泰伯次仲雍次季歷大王之時商道浸","source":"논어"},{"text":"衰而周日彊大季歷又生子昌有聖德大王因有翦商之志而泰伯不從大王遂","source":"논어"},{"text":"欲傳位季歷以及昌泰伯知之卽與仲雍逃之荊蠻於是大王乃立季歷傳國至","source":"논어"},{"text":"昌而三分天下有其二是爲文王文王崩子發立遂克商而有天下是爲武王夫","source":"논어"},{"text":"以泰伯之德當商周之際固足以朝諸侯有天下矣乃棄不取而又泯其迹焉則其","source":"논어"},{"text":"德之至極爲如何哉蓋其心卽夷齊扣馬之心而事之難處有甚焉者宜夫子之歎","source":"
