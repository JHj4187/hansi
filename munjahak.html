書無俚方言亦訓賴","source":"맹자"},{"text":"14-19-02 孟子曰無傷也士憎玆多口","source":"맹자"},{"text":"趙氏曰爲士者益多爲衆口所訕按此則憎當從土今本皆從心蓋傳寫之誤","source":"맹자"},{"text":"14-19-03 詩云憂心悄悄慍于群小孔子也肆不殄厥慍　亦不隕厥問文王也","source":"맹자"},{"text":"詩邶風柏舟及大雅線之篇也悄悄憂貌慍怒也本言衛之仁人見怒於群小孟子","source":"맹자"},{"text":"以爲孔子之事可以當之肆發語辭隕墜也問聲問也本言大王事昆夷雖不能殄","source":"맹자"},{"text":"絶其慍怒亦不自墜其聲問之美孟子以爲文王之事可以當之○尹氏曰言人顧","source":"맹자"},{"text":"自處如何盡其在我者而已","source":"맹자"},{"text":"盡心下20章","source":"맹자"},{"text":"14-20-01 孟子曰賢者以其昭昭使人昭昭今以其昏昏使人昭昭","source":"맹자"},{"text":"昭昭明也昏昏闇也尹氏曰大學之道在自昭明德而施於天下國家其有不順者","source":"맹자"},{"text":"盡心下21章","source":"맹자"},{"text":"14-21-01 孟子謂高子曰山徑之蹊間介然用之而成路爲間不用則茅塞之矣今茅","source":"맹자"},{"text":"塞子之心矣","source":"맹자"},{"text":"徑小路也蹊人行處也介然倏然之頃也用由也路大路也爲間少頃也茅塞茅草","source":"맹자"},{"text":"生而塞之也言理義之心不可少有間斷也","source":"맹자"},{"text":"盡心下22章","source":"맹자"},{"text":"14-22-01 高子曰禹之聲尙文王之聲","source":"맹자"},{"text":"尙加尙也豊氏曰言禹之樂過於文王之樂","source":"맹자"},{"text":"14-22-02 孟子曰何以言之曰以追蠡","source":"맹자"},{"text":"豐氏曰追鐘紐也周禮所謂旋蟲是也蠡者齧木蟲也言禹時鐘在者鐘紐如蟲","source":"맹자"},{"text":"齧而欲絶蓋用之者多而文王之鐘不然是以知禹之樂過於文王之樂也","source":"맹자"},{"text":"14-22-03 曰是奚足哉城門之軌兩馬之力與","source":"맹자"},{"text":"豊氏曰奚足言此何足以知之也軌車轍跡也兩馬一車所駕也城中之涂容九","source":"맹자"},{"text":"軌車可散行故其轍跡淺城門惟容一車車皆由之故其轍跡深蓋日久車多所","source":"맹자"},{"text":"致非一車兩馬之力能使之然也言禹在文王前千餘年故鐘久而紐絶文王之","source":"맹자"},{"text":"鐘則未久而紐全不可以此而譏優劣也○此章文義本不可曉舊說相承如此","source":"맹자"},{"text":"而豊氏差明白故今存之亦未知其是否也","source":"맹자"},{"text":"盡心下23章","source":"맹자"},{"text":"14-23-01 齊饑陳臻曰國人皆以夫子將復爲發棠殆不可復","source":"맹자"},{"text":"先時齊國嘗饑孟子勸王發棠邑之倉以賑貧窮至此又饑陳臻問言齊人望孟子","source":"맹자"},{"text":"復勸王發棠而又自言恐其不可也","source":"맹자"},{"text":"14-23-02 孟子曰是爲馮婦也晉人有馮婦者善搏虎卒爲善士則之野有衆逐虎","source":"맹자"},{"text":"虎負嵎莫之敢攖望見馮婦趨而迎之馮婦攘臂下車衆皆悅之其爲士者笑之","source":"맹자"},{"text":"手執曰搏卒爲善士後能改行爲善也之適也負依也山曲曰嵎攖觸也笑之笑","source":"맹자"},{"text":"其不知止也疑此時齊王已不能用孟子而孟子亦將去矣故其言如此","source":"맹자"},{"text":"盡心下24章","source":"맹자"},{"text":"14-24-01 孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢於安佚","source":"맹자"},{"text":"也性也有命焉君子不謂性也","source":"맹자"},{"text":"程子曰五者之欲性也然有分不能皆如其願則是命也不可謂我性之所有而求","source":"맹자"},{"text":"必得之也愚按不能皆如其願不止爲貧賤蓋雖富貴之極亦有品節限制則是亦","source":"맹자"},{"text":"14-24-02 仁之於父子也義之於君臣也禮之於賓主也智之於賢者也聖人之於","source":"맹자"},{"text":"天道也命也有性焉君子不謂命也","source":"맹자"},{"text":"程子曰仁義禮智天道在人則賦於命者所禀有厚薄淸濁然而性善可學而盡","source":"맹자"},{"text":"故不謂之命也張子曰晏嬰智矣而不知仲尼是非命邪愚按所禀者厚而淸則","source":"맹자"},{"text":"其仁之於父子也至義之於君臣也盡禮之於賓主也恭智之於賢否也哲聖人","source":"맹자"},{"text":"之於天道也無不脗合而純亦不已焉薄而濁則反是是皆所謂命也或曰者當作","source":"맹자"},{"text":"否人衍字更詳之○愚聞之師曰此二條者皆性之所有而命於天者也然世之","source":"맹자"},{"text":"人以前五者爲性雖有不得而必欲求之以後五者爲命一有不至則不復致力故","source":"맹자"},{"text":"孟子各就其重處言之以伸此而抑彼也張子所謂養則付命於天道則責成於己其","source":"맹자"},{"text":"言約而盡矣","source":"맹자"},{"text":"盡心下25章","source":"맹자"},{"text":"14-25-01 浩生不害問曰樂正子何人也孟子曰善人也信人也","source":"맹자"},{"text":"趙氏曰浩生姓不害名齊人也","source":"맹자"},{"text":"14-25-02 何謂善何謂信","source":"맹자"},{"text":"14-25-03 曰可欲之謂善","source":"맹자"},{"text":"天下之理其善者必可欲其惡者必可惡其爲人也可欲而不可惡則可謂善人矣","source":"맹자"},{"text":"14-25-04 有諸己之謂信","source":"맹자"},{"text":"凡所謂善皆實有之如惡惡臭如好好色是則可謂信人矣張子曰志仁無惡之謂","source":"맹자"},{"text":"善誠善於身之謂信","source":"맹자"},{"text":"14-25-05 充實之謂美","source":"맹자"},{"text":"力行其善至於充滿而積實則美在其中而無待於外矣","source":"맹자"},{"text":"14-25-06 充實而有光輝之謂大","source":"맹자"},{"text":"和順積中而英華發外美在其中而暢於四支發於事業則德業至盛而不可加矣","source":"맹자"},{"text":"14-25-07 大而化之之謂聖","source":"맹자"},{"text":"大而能化使其大者泯然無復可見之迹則不思不勉從容中道而非人力之所能","source":"맹자"},{"text":"爲矣張子曰大可爲也化不可爲也在熟之而已矣","source":"맹자"},{"text":"14-25-08 聖而不可知之之謂神","source":"맹자"},{"text":"程子曰聖不可知謂聖之至妙人所不能測非聖人之上又有一等神人也","source":"맹자"},{"text":"14-25-09 樂正子二之中四之下也","source":"맹자"},{"text":"蓋在善信之間觀其從於子敖則其有諸己者或未實也張子曰顔淵樂正子皆知","source":"맹자"},{"text":"好仁矣樂正子志仁無惡而不致於學所以但爲善人信人而已顔子好學不倦合","source":"맹자"},{"text":"仁與智具體聖人獨未至聖人之止耳○程子曰士之所難者在有諸己而已能","source":"맹자"},{"text":"有諸己則居之安資之深而美且大可以馴致矣徒知可欲之善而若存若亡而已","source":"맹자"},{"text":"則能不受變於俗者鮮矣尹氏曰自可欲之善至於聖而不可知之神上下一理擴","source":"맹자"},{"text":"充而至於神則不可得而名矣","source":"맹자"},{"text":"盡心下26章","source":"맹자"},{"text":"14-26-01 孟子曰逃墨必歸於楊逃楊必歸於儒歸斯受之而已矣","source":"맹자"},{"text":"墨氏務外而不情楊氏太簡而近實故其反正之漸大略如此歸斯受之者憫其陷","source":"맹자"},{"text":"溺之久而取其悔悟之新也","source":"맹자"},{"text":"14-26-02 今之與楊墨辯者如追放豚旣入其苙又從而招之","source":"맹자"},{"text":"放豚放逸之豕豚也苙闌也招罥也覊其足也言彼旣來歸而又追咎其旣往之失","source":"맹자"},{"text":"也○此章見聖賢之於異端距之甚嚴而於其來歸待之甚恕距之嚴故人知彼","source":"맹자"},{"text":"說之爲邪待之恕故人知此道之可反仁之至義之盡也","source":"맹자"},{"text":"盡心下27章","source":"맹자"},{"text":"14-27-01 孟子曰有布縷之征粟米之征力役之征君子用其一緩其二用其二","source":"맹자"},{"text":"而民有殍用其三而父子離","source":"맹자"},{"text":"征賦之法歲有常數然布縷取之於夏粟米取之於秋力役取之於冬當各以其時","source":"맹자"},{"text":"若幷取之則民力有所不堪矣今兩稅三限之法亦此意也尹氏曰言民爲邦本","source":"맹자"},{"text":"取之無度則其國危矣","source":"맹자"},{"text":"盡心下28章","source":"맹자"},{"text":"14-28-01 孟子曰諸侯之寶三土地人民政事寶珠玉者殃必及身","source":"맹자"},{"text":"尹氏曰言寶得其寶者安寶失其寶者危","source":"맹자"},{"text":"盡心下29章","source":"맹자"},{"text":"14-29-01 盆成括仕於齊孟子曰死矣盆成括盆成括見殺門人問曰夫子","source":"맹자"},{"text":"何以知其將見殺曰其爲人也小有才未聞君子之大道也則足以殺其軀而已矣","source":"맹자"},{"text":"盆成姓括名也恃才妄作所以取禍徐氏曰君子道其常而已括有死之道焉設","source":"맹자"},{"text":"使幸而獲免孟子之言猶信也","source":"맹자"},{"text":"盡心下30章","source":"맹자"},{"text":"14-30-01 孟子之滕　館於上宮有業屨於牖上館人求之弗得","source":"맹자"},{"text":"館舍也上宮別宮名業屨織之有次業而未成者蓋館人所作置之牖上而失之也","source":"맹자"},{"text":"14-30-02 或問之曰若是乎從者之廋也曰子以是爲竊屨來與曰殆非也夫子","source":"맹자"},{"text":"之設科也往者不追來者不拒苟以是心至斯受之而已矣","source":"맹자"},{"text":"或問之者問於孟子也廋匿也言子之從者乃匿人之物如此乎孟子答之而或人","source":"맹자"},{"text":"自悟其失因言此從者固不爲竊屨而來但夫子設置科條以待學者苟以向道之心","source":"맹자"},{"text":"而來則受之耳雖夫子亦不能保其往也門人取其言有合於聖賢之指故記之","source":"맹자"},{"text":"盡心下31章","source":"맹자"},{"text":"14-31-01 孟子曰人皆有所不忍達之於其所忍仁也人皆有所不爲達之於其所","source":"맹자"},{"text":"惻隱羞惡之心人皆有之故莫不有所不忍不爲此仁義之端也然以氣質之偏物","source":"맹자"},{"text":"欲之蔽則於他事或有不能者但推所能達之於所不能則無非仁義矣","source":"맹자"},{"text":"14-31-02 人能充無欲害人之心而仁不可勝用也人能充無穿踰之心而義不可","source":"맹자"},{"text":"充滿也穿穿穴踰踰牆皆爲盜之事也能推所不忍以達於所忍則能滿其無欲害","source":"맹자"},{"text":"人之心而無不仁矣能推其所不爲以達於所爲則能滿其無穿踰之心而無不義","source":"맹자"},{"text":"14-31-03 人能充無受爾汝之實無所往而不爲義也","source":"맹자"},{"text":"此申說上文充無穿踰之心之意也","source":"맹자"},{"text":"人所輕賤之稱","source":"맹자"},{"text":"人雖或有所貪昧隱忍而","source":"맹자"},{"text":"甘受之者然其中心必有慙忿而不肯受之之實人能卽此而推之使其充滿無所","source":"맹자"},{"text":"虧缺則無適而非義矣","source":"맹자"},{"text":"14-31-04 士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆","source":"맹자"},{"text":"穿踰之類也","source":"맹자"},{"text":"餂探取之也今人以舌取物曰餂卽此意也便佞隱黙皆有意探取於人是亦穿","source":"맹자"},{"text":"踰之類然其事隱微人所易忽故特擧以見例明必推無穿踰之心達於此而悉去","source":"맹자"},{"text":"之然後爲能充其無穿踰之心也","source":"맹자"},{"text":"盡心下32章","source":"맹자"},{"text":"14-32-01 孟子曰言近而指遠者善言也守約而施博者善道也君子之言也不下","source":"맹자"},{"text":"帶而道存焉","source":"맹자"},{"text":"古人視不下於帶","source":"맹자"},{"text":"乃目前常見至近之處也","source":"맹자"},{"text":"擧目前之近事","source":"맹자"},{"text":"而至理存焉","source":"맹자"},{"text":"所以爲言近而指遠也","source":"맹자"},{"text":"14-32-02 君子之守修其身而天下平","source":"맹자"},{"text":"此所謂守約而施博也","source":"맹자"},{"text":"14-32-03 人病舍其田而芸人之田所求於人者重而所以自任者輕也","source":"맹자"},{"text":"此言不守約而務博施之病","source":"맹자"},{"text":"盡心下33章","source":"맹자"},{"text":"14-33-01 孟子曰堯舜性者也湯武反之也","source":"맹자"},{"text":"性者得全於天無所汚壞不假修爲聖之至也反之者修爲以復其性而至於聖人","source":"맹자"},{"text":"也程子曰性之反之古未有此語蓋自孟子發之呂氏曰無意而安行性者也有","source":"맹자"},{"text":"意利行而至於無意復性者也堯舜不失其性湯武善反其性乃其成功則一也","source":"맹자"},{"text":"14-33-02 動容周旋中禮者盛德之至也哭死而哀非爲生者也經德不回非以","source":"맹자"},{"text":"干祿也言語必信非以正行也","source":"맹자"},{"text":"細微曲折無不中禮乃其盛德之至自然而中而非有意於中也經常也回曲也","source":"맹자"},{"text":"三者亦皆自然而然非有意而爲之也皆聖人之事性之之德也","source":"맹자"},{"text":"14-33-03 君子行法以俟命而已矣","source":"맹자"},{"text":"法者天理之當然者也君子行之而吉凶禍福有所不計蓋雖未至於自然而已非有","source":"맹자"},{"text":"所爲而爲矣","source":"맹자"},{"text":"此反之之事","source":"맹자"},{"text":"董子所謂正其義不謀其利","source":"맹자"},{"text":"明其道不計其功","source":"맹자"},{"text":"○程子曰動容周旋中禮者盛德之至行法以俟命者朝聞道夕死可矣之意也","source":"맹자"},{"text":"呂氏曰法由此立命有此出聖人也行法以俟命君子也聖人性之君子所以復","source":"맹자"},{"text":"盡心下34章","source":"맹자"},{"text":"14-34-01 孟子曰說大人則藐之勿視其巍巍然","source":"맹자"},{"text":"趙氏曰大人當時尊貴者也藐輕之也巍巍富貴高顯之貌貓焉而不畏之則志意舒","source":"맹자"},{"text":"展言語得盡也","source":"맹자"},{"text":"14-34-02 堂高數仞榱題數尺我得志弗爲也食前方丈侍妾數百人我得志弗","source":"맹자"},{"text":"爲也般樂飮酒驅騁田獵後車千乘我得志弗爲也在彼者皆我所不爲也在我","source":"맹자"},{"text":"者皆古之制也吾何畏彼哉","source":"맹자"},{"text":"榱桷也題頭也食前方丈饌食列於前者方一丈也此皆其所謂巍巍然者我雖得","source":"맹자"},{"text":"志有所不爲而所守者皆古聖賢之法則彼之巍巍者何足道哉○楊氏曰孟子","source":"맹자"},{"text":"此章以己之長方人之短猶有此等氣象在孔子則無此矣","source":"맹자"},{"text":"盡心下35章","source":"맹자"},{"text":"14-35-01 孟子曰養心莫善於寡欲其爲人也寡欲雖有不存焉者寡矣其爲人","source":"맹자"},{"text":"也多欲雖有存焉者寡矣","source":"맹자"},{"text":"欲如口鼻耳目四支之欲雖人之所不能無然多而不節未有不失其本心者學者所","source":"맹자"},{"text":"當深戒也程子曰所欲不必沈溺只有所向便是欲","source":"맹자"},{"text":"盡心下36章","source":"맹자"},{"text":"14-36-01 曾晳嗜羊棗而曾子不忍食羊棗","source":"맹자"},{"text":"羊棗實小黑而圓又謂之羊矢棗曾子以父嗜之父沒之後食必思親故不忍食也","source":"맹자"},{"text":"14-36-02 公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則曾子何爲","source":"맹자"},{"text":"食膾炙而不食羊棗曰膾炙所同也羊棗所獨也諱名不諱姓姓所同也名所獨","source":"맹자"},{"text":"肉聶而切之爲膾炙炙肉也","source":"맹자"},{"text":"盡心下37章","source":"맹자"},{"text":"14-37-01 萬章問曰孔子在陳曰盍歸乎來吾黨之士狂簡進取不忘其初孔","source":"맹자"},{"text":"子在陳何思魯之狂士","source":"맹자"},{"text":"盍何不也狂簡謂志大而略於事進取謂求望高遠不忘其初謂不能改其舊也此","source":"맹자"},{"text":"語與論語小異","source":"맹자"},{"text":"14-37-02 孟子曰孔子不得中道而與之必也狂獧乎狂者進取獧者有所不爲也","source":"맹자"},{"text":"孔子豈不欲中道哉不可必得故思其次也","source":"맹자"},{"text":"不得中道至有所不爲據論語亦孔子之言然則孔子字下當有曰字論語道作行","source":"맹자"},{"text":"獧作狷有所不爲者知恥自好不爲不善之人也孔子豈不欲中道以下孟子言也","source":"맹자"},{"text":"14-37-03 敢問何如斯可謂狂矣","source":"맹자"},{"text":"14-37-04 曰如琴張曾晳牧皮者孔子之所謂狂矣","source":"맹자"},{"text":"琴張名牢字子張子桑戶死琴張臨其喪而歌事見莊子雖未必盡然要必有近似","source":"맹자"},{"text":"者曾晳見前篇季武子死曾晳倚其門而歌事見檀弓又言志異乎三子者之撰","source":"맹자"},{"text":"事見論語牧皮未詳","source":"맹자"},{"text":"14-37-05 何以謂之狂也","source":"맹자"},{"text":"14-37-06 曰其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也","source":"맹자"},{"text":"嘐嘐志大言大也重言古之人見其動輒稱之不一稱而已也夷平也掩覆也言平","source":"맹자"},{"text":"考其行則不能覆其言也程子曰曾晳言志而夫子與之蓋與聖人之志同便是堯","source":"맹자"},{"text":"舜氣象也特行有不掩焉耳此所謂狂也","source":"맹자"},{"text":"14-37-07 狂者又不可得欲得不屑不潔之士而與之是獧也是又其次也","source":"맹자"},{"text":"此因上文所引遂解所以思得獧者之意狂有志者也獧有守者也有志者能進於道","source":"맹자"},{"text":"有守者不失其身屑潔也","source":"맹자"},{"text":"14-37-08 孔子曰過我門而不入我室我不憾焉者其惟鄕原乎鄕原德之賊也曰","source":"맹자"},{"text":"何如斯可謂之鄕原矣","source":"맹자"},{"text":"鄕原非有識者原與愿同荀子原慤字皆讀作愿謂謹愿之人也故鄕里所謂愿人","source":"맹자"},{"text":"謂之鄕原孔子以其似德而非德故以爲德之賊過門不入而不恨之以其不見親就","source":"맹자"},{"text":"爲幸深惡而痛絶之也萬章又引孔子之言而問也","source":"맹자"},{"text":"14-37-09 曰何以是嘐嘐也言不顧行行不顧言則曰古之人古之人行何爲踽踽","source":"맹자"},{"text":"凉凉生斯世也爲斯世也善斯可矣閹然媚於世也者是鄕原也","source":"맹자"},{"text":"踽踽獨行不進之貌凉凉薄也不見親厚於人也鄕原譏狂者曰何用如此嘐嘐然","source":"맹자"},{"text":"行不掩其言","source":"맹자"},{"text":"而徒每事必稱古人邪","source":"맹자"},{"text":"又譏狷者曰","source":"맹자"},{"text":"何必如此踽踽凉凉","source":"맹자"},{"text":"無所親厚哉","source":"맹자"},{"text":"人旣生於此世","source":"맹자"},{"text":"則但當爲此世之人","source":"맹자"},{"text":"使當世之人","source":"맹자"},{"text":"皆以爲善則可矣","source":"맹자"},{"text":"此鄕原之志也","source":"맹자"},{"text":"閹如奄人之奄閉藏之意也媚求悅於人也孟子言此深自閉藏以求親媚於世是","source":"맹자"},{"text":"鄕原之行也","source":"맹자"},{"text":"14-37-10 萬章曰一鄕皆稱原人焉無所往而不爲原人孔子以爲德之賊何哉","source":"맹자"},{"text":"原亦謹厚之稱而孔子以爲德之賊故萬章疑之","source":"맹자"},{"text":"14-37-11 曰非之無擧也刺之無刺也同乎流俗合乎汚世居之似忠信行之似廉","source":"맹자"},{"text":"潔衆皆悅之自以爲是而不可與入堯舜之道故曰德之賊也","source":"맹자"},{"text":"呂侍講曰言此等之人欲非之則無可擧欲刺之則無可刺也流俗者風俗頹靡","source":"맹자"},{"text":"如水之下流衆莫不然也汚濁也非忠信而似忠信非廉潔而似廉潔","source":"맹자"},{"text":"14-37-12 孔子曰惡似而非者惡莠恐其亂苗也惡佞恐其亂義也惡利口恐其","source":"맹자"},{"text":"亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄕原恐其亂德也","source":"맹자"},{"text":"孟子又引孔子之言以明之莠似苗之草也佞才智之稱其言似義而非義也利口多","source":"맹자"},{"text":"言而不實者也鄭聲淫樂也樂正樂也紫間色朱正色也鄕原不狂不獧人皆以爲","source":"맹자"},{"text":"善有似乎中道而實非也故恐其亂德","source":"맹자"},{"text":"14-37-13 君子反經而已矣經正則庶民興庶民興斯無邪慝矣","source":"맹자"},{"text":"反復也經常也萬世不易之常道也興興起於善也邪慝如鄕原之屬是也世衰道","source":"맹자"},{"text":"微大經不正故人人得爲異說以濟其私而邪慝幷起不可勝正君子於此亦復","source":"맹자"},{"text":"其常道而已常道旣復則民興於善而是非明白無所回互雖有邪慝不足以惑之","source":"맹자"},{"text":"矣○尹氏曰君子取夫狂獧者蓋以狂者志大而可與進道獧者有所不爲而可與","source":"맹자"},{"text":"有爲也所惡於鄕原而欲痛絶之者爲其似是而非惑人之深也絶之之術無他焉","source":"맹자"},{"text":"亦曰反經而已矣","source":"맹자"},{"text":"盡心下38章","source":"맹자"},{"text":"14-38-01 孟子曰由堯舜至於湯五百有餘歲若禹皐陶則見而知之若湯則聞而知","source":"맹자"},{"text":"趙氏曰五百歲而聖人出天道之常然亦有遲速不能正五百年故言有餘也尹","source":"맹자"},{"text":"氏曰知謂知其道也","source":"맹자"},{"text":"14-38-02 由湯至於文王五百有餘歲若伊尹萊朱則見而知之若文王則聞而知之","source":"맹자"},{"text":"趙氏曰萊朱湯賢臣或曰卽仲虺也爲湯左相","source":"맹자"},{"text":"14-38-03 由文王至於孔子五百有餘歲若太公望散宜生則見而知之若孔子則聞","source":"맹자"},{"text":"散氏宜生名文王賢臣也子貢曰文武之道未墜於地在人賢者識其大者不賢","source":"맹자"},{"text":"者識其小者莫不有文武之道焉夫子焉不學此所謂聞而知之也","source":"맹자"},{"text":"14-38-04 由孔子而來至於今百有餘歲去聖人之世若此其未遠也近聖人之居","source":"맹자"},{"text":"若此其甚也然而無有乎爾則亦無有乎爾","source":"맹자"},{"text":"林氏曰孟子言孔子至今時未遠鄒魯相去又近然而已無有見而知之者矣則五百","source":"맹자"},{"text":"餘歲之後又豈復有聞而知之者乎愚按此言雖若不敢自謂己得其傳而憂後世遂","source":"맹자"},{"text":"失其傳然乃所以自見其有不得辭者而又以見夫天理民彝不可泯滅百世之下必","source":"맹자"},{"text":"將有神會而心得之者耳","source":"맹자"},{"text":"故於篇終歷序群聖之統","source":"맹자"},{"text":"而終之以此","source":"맹자"},{"text":"所以明其傳之有在","source":"맹자"},{"text":"而又以俟後聖於無窮也其旨深哉○有宋元豐八年河南程顥伯淳卒潞公文彦","source":"맹자"},{"text":"博題其墓曰明道先生而其弟頤正叔序之曰周公沒聖人之道不行孟軻死聖","source":"맹자"},{"text":"人之學不傳道不行百世無善治學不傳千載無眞儒無善治士猶得以明夫善治","source":"맹자"},{"text":"之道以淑諸人以傳諸後無眞儒則天下貿貿焉莫知所之人欲肆而天理滅矣先","source":"맹자"},{"text":"生生乎千四百年之後得不傳之學於遺經以興起斯文爲己任辨異端闢邪說使","source":"맹자"},{"text":"聖人之道煥然復明於世蓋自孟子之後一人而已然學者於道不知所向則孰知","source":"맹자"},{"text":"斯人之爲功不知所至則孰知斯名之稱情也哉","source":"맹자"},{"text":"大學章句序","source":"대학"},{"text":"大學之書古之大學所以敎人之法也蓋自天降生民則旣莫不與之以仁義禮智之性","source":"대학"},{"text":"然其氣質之稟或不能齊","source":"대학"},{"text":"是以不能皆有以知其性之所有而全之也","source":"대학"},{"text":"一有聰明叡","source":"대학"},{"text":"智能盡其性者出於其間則天必命之以爲億兆之君師使之治而敎之以復其性此","source":"대학"},{"text":"伏羲神農黃帝堯舜所以繼天立極而司徒之職典樂之官所由設也三代之隆其法","source":"대학"},{"text":"寖備然後王宮國都以及閭巷莫不有學人生八歲則自王公以下至於庶人之子弟","source":"대학"},{"text":"皆入小學而敎之以灑掃應對進退之節禮樂射御書數之文及其十有五年則天子","source":"대학"},{"text":"之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而敎之以窮理","source":"대학"},{"text":"正心修己治人之道","source":"대학"},{"text":"此又學校之敎","source":"대학"},{"text":"大小之節所以分也","source":"대학"},{"text":"夫以學校之設","source":"대학"},{"text":"其次第節目之詳又如此","source":"대학"},{"text":"而其所以爲敎","source":"대학"},{"text":"則又皆本之人君躬行心得之餘","source":"대학"},{"text":"不待求之民生日用彛倫之外","source":"대학"},{"text":"是以當世之人","source":"대학"},{"text":"其學焉者無不有以知其性分","source":"대학"},{"text":"之所固有職分之所當爲而各俛焉以盡其力此古昔盛時所以治隆於上俗美於下","source":"대학"},{"text":"而非後世之所能及也及周之衰賢聖之君不作學校之政不修敎化陵夷風俗頹","source":"대학"},{"text":"敗時則有若孔子之聖而不得君師之位以行其政敎於是獨取先王之法誦而傳","source":"대학"},{"text":"之而詔後世若曲禮少儀內則弟子職諸篇固小學之支流餘裔而此篇者則因小學","source":"대학"},{"text":"之成功以著大學之明法外有以極其規模之大而內有以盡其節目之詳者也三千","source":"대학"},{"text":"之徒蓋莫不聞其說而曾氏之傳獨得其宗於是作爲傳義以發其意及孟子沒而","source":"대학"},{"text":"其傳泯焉卽其書雖存而知者鮮矣自是以來俗儒記誦詞章之習其功倍於小學","source":"대학"},{"text":"異端虛無寂滅之敎其高過於大學而無實","source":"대학"},{"text":"其他權謀術數","source":"대학"},{"text":"一切以就功名之","source":"대학"},{"text":"說與夫百家衆技之流所以惑世誣民充塞仁義者又紛然雜出乎其間使其君子","source":"대학"},{"text":"不幸而不得聞大道之要其小人不幸而不得蒙至治之澤晦盲否塞反覆沈痼以及","source":"대학"},{"text":"五季之衰而壞亂極矣天運循環無往不復宋德隆盛治敎休明於是河南程氏兩","source":"대학"},{"text":"夫子出而有以接乎孟氏之傳實始尊信此篇而表章之旣又爲之次其簡編發其","source":"대학"},{"text":"歸趣然後古者大學敎人之法聖經賢傳之指粲然復明於世雖以熹之不敏亦幸","source":"대학"},{"text":"私淑而與有聞焉顧其爲書猶頗放失是以忘其固陋采而輯之間亦竊附己意補","source":"대학"},{"text":"其闕略以俟後之君子極知僭踰無所逃罪然於國家化民成俗之意學者修己治人","source":"대학"},{"text":"之方則未必無小補云","source":"대학"},{"text":"淳熙己酉二月甲子新安朱熹書","source":"대학"},{"text":"朱子曰語孟隨事問答難見要領惟大學是曾子述孔子說古人爲學之大方而門","source":"대학"},{"text":"人又傳述以明其旨前後相因體統都具翫味此書知得古人爲學所向却讀語孟","source":"대학"},{"text":"便易入後面工夫雖多而大體已立矣○看這一書又自與看語孟不同語孟中只","source":"대학"},{"text":"一項事是一箇道理","source":"대학"},{"text":"如孟子說仁義處","source":"대학"},{"text":"只就仁義上說道理","source":"대학"},{"text":"孔子答顔淵以克己復禮","source":"대학"},{"text":"只就克己復禮上說道理若大學却只統說論其功用之極至於平天下然天下所","source":"대학"},{"text":"以平却先須治國國之所以治却先須齊家家之所以齊却先須修身身之所以修","source":"대학"},{"text":"却先須正心心之所以正却先須誠意意之所以誠却先須致知知之所以至却先","source":"대학"},{"text":"須格物○大學是爲學綱目先讀大學立定綱領他書皆雜說在裏許通得大學","source":"대학"},{"text":"了去看他經方見得此是格物致知事此是誠意正心事此是修身事此是齊家治","source":"대학"},{"text":"國平天下事○今且熟讀大學作間架却以他書塡補去○大學是通言學之初","source":"대학"},{"text":"終中庸是指本原極致處○問欲專看一書以何爲先曰先讀大學可見古人爲","source":"대학"},{"text":"學首末次第不比他書他書非一時所言非一人所記○又曰看大學固是著逐句","source":"대학"},{"text":"也須先統讀傳文敎熟","source":"대학"},{"text":"方好從頭仔細看","source":"대학"},{"text":"若專不識傳文大意","source":"대학"},{"text":"便看前頭亦難","source":"대학"},{"text":"又曰嘗欲作一說敎人只將大學一日去讀一遍看他如何是大人之學如何是小","source":"대학"},{"text":"學如何是明明德如何是新民如何是止於至善日日如是讀月來日去自見所","source":"대학"},{"text":"謂溫故而知新須是知新日日看得新方得却不是道理解新但自家這箇意思長長","source":"대학"},{"text":"地新○讀大學初間也只如此讀後來也只如此讀只是初間讀得似不與自家","source":"대학"},{"text":"相關後來看熟見許多說話須著如此做不如此做自不得○讀書不可貪多當","source":"대학"},{"text":"且以大學爲先逐段熟讀精思須令了了分明方可改讀後段看第二段却思量前","source":"대학"},{"text":"段令文意連屬却不妨○問大學稍通方要讀論語曰且未可大學稍通正好","source":"대학"},{"text":"著心精讀前日讀時見得前未見得後面見得後未見得前面今識得大綱體統","source":"대학"},{"text":"正好熟看讀此書功深則用博昔尹和靖見伊川半年方得大學西銘看今人半","source":"대학"},{"text":"年要讀多少書某且要人讀此是如何緣此書却不多而規模周備凡讀書初一項","source":"대학"},{"text":"須著十分工夫了第二項只費得八九分工夫第三項便只費得六七分工夫少間","source":"대학"},{"text":"讀漸多自通貫他書自著不得多工夫○看大學俟見大指乃及他書但看時須","source":"대학"},{"text":"是更將大段分作小段字字句句不可容易放過常時暗誦黙思反覆硏究未上口","source":"대학"},{"text":"時須敎上口未通透時須敎通透已通透後便要純熟直待不思索時此意常在","source":"대학"},{"text":"心胸之間驅遣不去方是此一段了又換一段看令如此數段之後心安理熟覺工","source":"대학"},{"text":"夫省力時便漸得力也○又曰大學是一箇腔子而今却要塡敎他實如他說格","source":"대학"},{"text":"物自家須是去格物後塡敎他實著誠意亦然若只讀得空殼子亦無益也○讀大","source":"대학"},{"text":"學豈在看他言語正欲驗之於心如何如好好色惡惡臭試驗之吾心果能好善惡","source":"대학"},{"text":"惡如此乎閒居爲不善是果有此乎一有不至則勇猛奮躍不已必有長進今不知","source":"대학"},{"text":"如此則書自書我自我何益之有○又曰某一生只看得這文字透見得前賢所","source":"대학"},{"text":"未到處溫公作通鑑言平生精力盡在此書某於大學亦然先須通此方可讀他","source":"대학"},{"text":"書○又曰伊川舊日敎人先看大學那時未解說而今有註解覺大段分曉了","source":"대학"},{"text":"只在仔細看○又曰看大學且逐章理會先將本文念得次將章句來解本文又","source":"대학"},{"text":"將或問來參章句須逐一令記得反覆尋究待他浹洽旣逐段曉得却統看溫尋過","source":"대학"},{"text":"○又曰大學一書有正經有章句有或問看來看去不用或問只看章句便了","source":"대학"},{"text":"久之又只看正經便了又久之自有一部大學在我胸中而正經亦不用矣然不","source":"대학"},{"text":"用某許多工夫亦看某底不出不用聖賢許多工夫亦看聖賢底不出○又曰大學","source":"대학"},{"text":"解本文未詳者於或問中詳之且從頭逐句理會到不通處却看或問乃註脚之註","source":"대학"},{"text":"脚○某解書不合太多又先準備學者爲他說疑說了所以致得學者看得容易了","source":"대학"},{"text":"○人只說某說大學等不略說使人自致思此事大不然人之爲學只爭箇肯與不","source":"대학"},{"text":"肯耳他若不肯向這裏略亦不解致思他若肯向此一邊自然有味愈詳愈有味","source":"대학"},{"text":"子程子曰大學孔氏之遺書而初學入德之門也","source":"대학"},{"text":"於今可見古人爲學次第者獨賴此篇","source":"대학"},{"text":"之存而論孟次之學者必由是而學焉則庶乎其不差矣","source":"대학"},{"text":"大學經1章","source":"대학"},{"text":"00-01 大學之道在明明德在親民在止於至善","source":"대학"},{"text":"程子曰親當作新○大學者大人之學也明明之也明德者人之所得乎天而虛靈","source":"대학"},{"text":"不昧以具衆理而應萬事者也但爲氣稟所拘人欲所蔽則有時而昏然其本體之","source":"대학"},{"text":"則有未嘗息者","source":"대학"},{"text":"故學者當因其所發而遂明之","source":"대학"},{"text":"以復其初也","source":"대학"},{"text":"新者革其舊之謂也","source":"대학"},{"text":"言旣自明其明德","source":"대학"},{"text":"又當推以及人","source":"대학"},{"text":"使之亦有以去其舊染之汚也","source":"대학"},{"text":"止者必至於是而不","source":"대학"},{"text":"遷之意至善則事理當然之極也言明明德新民皆當止於至善之地而不遷蓋必其","source":"대학"},{"text":"有以盡夫天理之極而無一毫人欲之私也此三者大學之綱領也","source":"대학"},{"text":"00-02 知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得","source":"대학"},{"text":"止者所當止之地卽至善之所在也知之則志有定向靜謂心不妄動安謂所處而安","source":"대학"},{"text":"慮謂處事精詳得謂得其所止","source":"대학"},{"text":"00-03 物有本末事有終始知所先後則近道矣","source":"대학"},{"text":"明德爲本新民爲末知止爲始能得爲終本始所先末終所後此結上文兩節之意","source":"대학"},{"text":"00-04 古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先","source":"대학"},{"text":"修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致","source":"대학"},{"text":"明明德於天下者使天下之人皆有以明其明德也心者身之所主也誠實也意煮","source":"대학"},{"text":"心之所發也實其心之所發欲其必自慊而無自欺也致推極也知猶識也推極吾","source":"대학"},{"text":"之知識欲其所知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也","source":"대학"},{"text":"此八者大學之條目也","source":"대학"},{"text":"00-05 物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊","source":"대학"},{"text":"家齊而后國治國治而后天下平","source":"대학"},{"text":"物格者物理之極處無不到也知至者吾心之所知無不盡也知旣盡則意可得而實矣","source":"대학"},{"text":"意旣實則心可得而正矣","source":"대학"},{"text":"修身以上明明德之事也","source":"대학"},{"text":"齊家以下新民之事也","source":"대학"},{"text":"則知所止矣意誠以下則皆得所止之序也","source":"대학"},{"text":"00-06 自天子以至於庶人壹是皆以修身爲本","source":"대학"},{"text":"壹是一切也正心以上皆所以修身也齊家以下則擧此而措之耳","source":"대학"},{"text":"00-07 其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也","source":"대학"},{"text":"本謂身也所厚謂家也此兩節結上文兩節之意○右經一章蓋孔子之言而曾子","source":"대학"},{"text":"述之其傳十章則曾子之意而門人記之也舊本頗有錯簡今因程子所定而更考","source":"대학"},{"text":"經文別爲序次如左○凡傳文雜引經傳若無統紀然文理接續血脈貫通深淺","source":"대학"},{"text":"始終至爲精密熟讀詳味久當見之今不盡釋也","source":"대학"},{"text":"大學傳1章","source":"대학"},{"text":"01-01 康誥曰克明德","source":"대학"},{"text":"康誥周書克能也","source":"대학"},{"text":"01-02 太甲曰顧諟天之明命","source":"대학"},{"text":"太甲商書顧謂常目在之也諟猶此也或曰審也天之明命卽天之所以與我而我","source":"대학"},{"text":"之所以爲德者也常目在之則無時不明矣","source":"대학"},{"text":"01-03 帝典曰克明峻德","source":"대학"},{"text":"帝典堯典虞書峻大也","source":"대학"},{"text":"01-04 皆自明也","source":"대학"},{"text":"結所引書皆言自明己德之意○右傳之首章釋明明德○此通下三章至止於信","source":"대학"},{"text":"舊本誤在沒世不忘之下","source":"대학"},{"text":"大學傳2章","source":"대학"},{"text":"02-01 湯之盤銘曰苟日新日日新又日新","source":"대학"},{"text":"盤沐浴之盤也銘名其器以自警之辭也苟誠也湯以人之洗濯其心以去惡如沐浴","source":"대학"},{"text":"其身以去垢故銘其盤言誠能一日有以滌其舊染之汚而自新則當因其已新者","source":"대학"},{"text":"而日日新之又日新之不可略有間斷也","source":"대학"},{"text":"02-02 康誥曰作新民","source":"대학"},{"text":"鼓之舞之之謂作言振起其自新之民也","source":"대학"},{"text":"02-03 詩曰周雖舊邦其命維新","source":"대학"},{"text":"詩大雅文王之篇言周國雖舊至於文王能新其德以及於民而始受天命也","source":"대학"},{"text":"02-04 是故君子無所不用其極","source":"대학"},{"text":"自新新民皆欲止於至善也○右傳之二章釋新民","source":"대학"},{"text":"大學傳3章","source":"대학"},{"text":"03-01 詩云邦畿千里惟民所止","source":"대학"},{"text":"詩商頌玄鳥之篇邦畿王者之都也止居也言物各有所當止之處也","source":"대학"},{"text":"03-02 詩云緡蠻黃鳥止于丘隅子曰於止知其所止可以人而不如鳥乎","source":"대학"},{"text":"詩小雅緡蠻之篇緡蠻鳥聲丘隅岑蔚之處子曰以下孔子說詩之辭言人當知所當","source":"대학"},{"text":"03-03 詩云穆穆文王於緝熙敬止爲人君止於仁爲人臣止於敬爲人子止於","source":"대학"},{"text":"孝爲人父止於慈與國人交止於信","source":"대학"},{"text":"詩文王之篇穆穆深遠之意於歎美辭緝繼續也熙光明也敬止言其無不敬而安","source":"대학"},{"text":"所止也引此而言聖人之止無非至善五者乃其目之大者也學者於此究其精微之","source":"대학"},{"text":"蘊而又推類以盡其餘則於天下之事皆有以知其所止而無疑矣","source":"대학"},{"text":"03-04 詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僩兮赫兮","source":"대학"},{"text":"喧兮有斐君子終不可諠兮如切如磋者道學也如琢如磨者自修也瑟兮僩兮","source":"대학"},{"text":"者恂慄也赫兮喧兮者威儀也有斐君子終不可諠兮者道盛德至善民之不能","source":"대학"},{"text":"詩衛風淇澳之篇淇水名澳隈也猗猗美盛貌興也斐文貌切以刀鉅琢以椎鑿","source":"대학"},{"text":"皆裁物使成形質也磋以鑢錫磨以沙石皆治物使其滑澤也治骨角者旣切而復磋","source":"대학"},{"text":"之治玉石者旣琢而復磨之皆言其治之有緖而益致其精也瑟嚴密之貌僩武毅之","source":"대학"},{"text":"貌赫喧宣著盛大之貌諠忘也道言也學謂講習討論之事自修者省察克治之功","source":"대학"},{"text":"恂慄戰懼也威可畏也儀可象也引詩而釋之以明明明德者之止於至善道學自","source":"대학"},{"text":"修言其所以得之之由恂慄威儀言其德容表裏之盛卒乃指其實而歎美之也","source":"대학"},{"text":"03-05 詩云於戱前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒","source":"대학"},{"text":"詩周頌烈文篇於戱歎辭前王謂文武也君子謂其後賢後王小人謂後民也此言","source":"대학"},{"text":"前王所以新民者止於至善能使天下後世無一物不得其所所以旣沒世而人思慕","source":"대학"},{"text":"之愈久而不忘也此兩節咏歎淫泆其味深長當熟玩之○右傳之三章釋止於","source":"대학"},{"text":"至善○此章內自引淇澳詩以下舊本誤在誠意章下","source":"대학"},{"text":"大學傳4章","source":"대학"},{"text":"04-01 子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知","source":"대학"},{"text":"猶人不異於人也情實也引夫子之言而言聖人能使無實之人不敢盡其虛誕之","source":"대학"},{"text":"辭蓋我之明德旣明自然有以畏服民之心志故訟不待聽而自無也觀於此言可","source":"대학"},{"text":"以知本末之先後矣○右傳之四章釋本末○此章舊本誤在止於信下","source":"대학"},{"text":"大學傳5章","source":"대학"},{"text":"05-01 此謂知本","source":"대학"},{"text":"程子曰衍文也","source":"대학"},{"text":"05-02 此謂知之至也","source":"대학"},{"text":"此句之上別有闕文","source":"대학"},{"text":"此特其結語耳","source":"대학"},{"text":"右傳之五章","source":"대학"},{"text":"蓋釋格物致知之義而今亡矣","source":"대학"},{"text":"○此章舊本通下章誤在經文之下○間嘗竊取程子之意以補之曰所謂致知","source":"대학"},{"text":"在格物者言欲致吾之知在卽物而窮其理也蓋人心之靈莫不有知而天下之物","source":"대학"},{"text":"莫不有理惟於理有未窮故其知有不盡也是以大學始敎必使學者卽凡天下之","source":"대학"},{"text":"莫不因其已知之理而益窮之","source":"대학"},{"text":"以求至乎其極","source":"대학"},{"text":"至於用力之久而一旦豁然貫通焉","source":"대학"},{"text":"則衆物之表裏精粗無不到而吾心之全體大用無不明矣此謂物格此謂知之至","source":"대학"},{"text":"大學傳6章","source":"대학"},{"text":"06-01 所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必愼其","source":"대학"},{"text":"誠其意者自修之首也毋者禁止之辭自欺云者知爲善以去惡而心之所發有未實","source":"대학"},{"text":"獨者人所不知而己所獨知之地也","source":"대학"},{"text":"言欲自修者知爲善以去其惡","source":"대학"},{"text":"則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務決去而","source":"대학"},{"text":"求必得之以自快足於己不可徒苟且以徇外而爲人也然其實與不實蓋有他人","source":"대학"},{"text":"所不及知而己獨知之者故必謹之於此以審其幾焉","source":"대학"},{"text":"06-02 小人閒居爲不善無所不至見君子而后厭然揜其不善而著其善人之視","source":"대학"},{"text":"己如見其肺肝然則何益矣此謂誠於中形於外故君子必愼其獨也","source":"대학"},{"text":"閒居獨處也厭然消沮閉藏之貌此言小人陰爲不善而陽欲揜之則是非不知善之","source":"대학"},{"text":"當爲與惡之當去也但不能實用其力以至此耳然欲揜其惡而卒不可揜欲詐爲善","source":"대학"},{"text":"而卒不可詐則亦何益之有哉此君子所以重以爲戒而必謹其獨也","source":"대학"},{"text":"06-03 曾子曰十目所視十手所指其嚴乎","source":"대학"},{"text":"引此以明上文之意言雖幽獨之中而其善惡之不可揜如此可畏之甚也","source":"대학"},{"text":"06-04 富潤屋德潤身心廣體胖故君子必誠其意","source":"대학"},{"text":"胖安舒也言富則能潤屋矣德則能潤身矣故心無愧怍則廣大寬平而體常舒泰","source":"대학"},{"text":"德之潤身者然也蓋善之實於中而形於外者如此故又言此以結之○右傳之六章","source":"대학"},{"text":"釋誠意○經曰欲誠其意先致其知又曰知至而后意誠蓋心體之明有所未盡","source":"대학"},{"text":"必有不能實用其力","source":"대학"},{"text":"而苟焉以自欺者","source":"대학"},{"text":"然或已明而不謹乎此","source":"대학"},{"text":"又非己有而無以爲進德之基故此章之指必承上章而通考之然後有以見其用力","source":"대학"},{"text":"之始終其序不可亂而功不可闕如此云","source":"대학"},{"text":"大學傳7章","source":"대학"},{"text":"07-01 所謂修身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有","source":"대학"},{"text":"所好樂則不得其正有所憂患則不得其正","source":"대학"},{"text":"程子曰身有之身當作心○忿懥怒也蓋是四者皆心之用而人所不能無者然一","source":"대학"},{"text":"有之而不能察則欲動情勝而其用之所行或不能不失其正矣","source":"대학"},{"text":"07-02 心不在焉視而不見聽而不聞食而不知其味","source":"대학"},{"text":"心有不存則無以檢其身是以君子必察乎此而敬以直之然後此心常存而身無不","source":"대학"},{"text":"07-03 ○此謂修身在正其心","source":"대학"},{"text":"右傳之七章釋正心修身○此亦承上章以起下章蓋意誠則眞無惡而實有善矣","source":"대학"},{"text":"所以能存是心以檢其身","source":"대학"},{"text":"然或但知誠意","source":"대학"},{"text":"而不能密察此心之存否","source":"대학"},{"text":"則又無以直內而","source":"대학"},{"text":"修身也自此以下竝以舊文爲正","source":"대학"},{"text":"大學傳8章","source":"대학"},{"text":"08-01 所謂齊其家在修其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所","source":"대학"},{"text":"畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者","source":"대학"},{"text":"人謂衆人之猶於也辟猶偏也五者在人本有當然之則然常人之情惟其所向而","source":"대학"},{"text":"不可察焉則必陷於一偏而身不修矣","source":"대학"},{"text":"08-02 故諺有之曰人莫知其子之惡莫知其苗之碩","source":"대학"},{"text":"諺俗語也溺愛者不明貪得者無厭是則偏之爲害而家之所以不齊也","source":"대학"},{"text":"08-03 此謂身不修不可而齊其家","source":"대학"},{"text":"○右傳之八章釋修身齊家","source":"대학"},{"text":"大學傳9章","source":"대학"},{"text":"09-01 所謂治國必先齊其家者其家不可敎而能敎人者無之故君子不出家而","source":"대학"},{"text":"成敎於國孝者所以事君也弟者所以事長也慈者所以使衆也","source":"대학"},{"text":"身修則家可敎矣孝弟慈所以修身而敎於家者也然而國之所以事君事長使衆之道","source":"대학"},{"text":"不外乎此此所以家齊於上而敎成於下也","source":"대학"},{"text":"09-02 康誥曰如保赤子心誠求之雖不中不遠矣未有學養子而后嫁者也","source":"대학"},{"text":"此引書而釋之又明立敎之本不假强爲在識其端而推廣之耳","source":"대학"},{"text":"09-03 一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其幾如此此謂","source":"대학"},{"text":"一言僨事一人定國","source":"대학"},{"text":"一人謂君也機發動所由也僨覆敗也此言敎成於國之效","source":"대학"},{"text":"09-04 堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而","source":"대학"},{"text":"民不從是故君子有諸己而後求諸人無諸己而後非諸人所藏乎身不恕而能喩","source":"대학"},{"text":"諸人者未之有也","source":"대학"},{"text":"此又承上文一人定國而言有善於己然後可以責人之善無惡於己然後可以正人","source":"대학"},{"text":"之惡皆推己而及人所謂恕也不如是則所令反其所好而民不從矣喩曉也","source":"대학"},{"text":"09-05 故治國在齊其家","source":"대학"},{"text":"09-06 詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以敎國人","source":"대학"},{"text":"詩周南桃夭之篇夭夭少好貌蓁蓁美盛貌興也之子猶言是子此指女子之嫁者","source":"대학"},{"text":"而言也婦人謂嫁曰歸宜猶善也","source":"대학"},{"text":"09-07 詩云宜兄宜弟宜兄宜弟而后可以敎國人","source":"대학"},{"text":"詩小雅蓼蕭篇","source":"대학"},{"text":"09-08 詩云其儀不忒正是四國其爲父子兄弟足法而后民法之也","source":"대학"},{"text":"詩曹風鳲鳩篇忒差也","source":"대학"},{"text":"09-09 此謂治國在齊其家","source":"대학"},{"text":"此三引詩皆以詠歎上文之事而又結之如此其味深長最宜潛玩○右傳之九章","source":"대학"},{"text":"釋齊家治國","source":"대학"},{"text":"大學傳10章","source":"대학"},{"text":"10-01 所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而","source":"대학"},{"text":"民不倍是以君子有絜矩之道也","source":"대학"},{"text":"老老所謂老吾老也興謂有所感發而興起也孤者幼而無父之稱絜度也矩所以爲","source":"대학"},{"text":"方也言此三者上行下效捷於影響所謂家齊而國治也亦可以見人心之所同而","source":"대학"},{"text":"不可使有一夫之不獲矣是以君子必當因其所同推以度物使彼我之間各得分願","source":"대학"},{"text":"則上下四旁均齊方正而天下平矣","source":"대학"},{"text":"10-02 所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後","source":"대학"},{"text":"毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂絜矩之道也","source":"대학"},{"text":"此覆解上文絜矩二字之意","source":"대학"},{"text":"如不欲上之無禮於我","source":"대학"},{"text":"則必以此度下之心","source":"대학"},{"text":"而亦不敢以","source":"대학"},{"text":"此無禮使之不欲下之不忠於我則必以此度上之心而亦不敢以此不忠事之至於","source":"대학"},{"text":"前後左右無不皆然則身之所處上下四旁長短廣狹彼此如一而無不方矣彼同","source":"대학"},{"text":"有是心而興起焉者又豈有一夫之不獲哉","source":"대학"},{"text":"而所及者廣","source":"대학"},{"text":"此平天下之要道","source":"대학"},{"text":"也故章內之意皆自此而推之","source":"대학"},{"text":"10-03 詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父","source":"대학"},{"text":"詩小雅南山有臺之篇只語助辭言能絜矩而以民心爲己心則是愛民如子而民愛","source":"대학"},{"text":"之如父母矣","source":"대학"},{"text":"10-04 詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不愼辟則","source":"대학"},{"text":"爲天下僇矣","source":"대학"},{"text":"詩小雅節南山之篇節截然高大貌師尹周太師尹氏也具俱也辟偏也言在上者","source":"대학"},{"text":"人所瞻仰不可不謹若不能絜矩而好惡徇於一己之偏則身弑國亡爲天下之大戮","source":"대학"},{"text":"10-05 詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失","source":"대학"},{"text":"詩文王篇師衆也配對也配上帝言其爲天下君而對乎上帝也監視也峻大也不","source":"대학"},{"text":"易言難保也","source":"대학"},{"text":"引詩而言此","source":"대학"},{"text":"以結上文兩節之意","source":"대학"},{"text":"有天下者能存此心而不失","source":"대학"},{"text":"則所以絜矩而與民同欲者自不能已矣","source":"대학"},{"text":"10-06 是故君子先愼乎德有德此有人有人此有土有土此有財有財此有用","source":"대학"},{"text":"先謹乎德承上文不可不謹而言德卽所謂明德有人謂得衆有土謂得國有國則","source":"대학"},{"text":"不患無財用矣","source":"대학"},{"text":"10-07 德者本也財者末也","source":"대학"},{"text":"本上文而言","source":"대학"},{"text":"10-08 外本內末爭民施奪","source":"대학"},{"text":"人君以德爲外以財爲內則是爭鬪其民而施之以劫奪之敎也蓋財者人之所同欲","source":"대학"},{"text":"不能絜矩而欲專之則民亦起而爭奪矣","source":"대학"},{"text":"10-09 是故財聚則民散財散則民聚","source":"대학"},{"text":"外本內末故財聚爭民施奪故民散反是則有德而有人矣","source":"대학"},{"text":"10-10 是故言悖而出者亦悖而入貨悖而入者亦悖而出","source":"대학"},{"text":"悖逆也此以言之出入明貨之出入也自先謹乎德以下至此又因財貨以明能絜","source":"대학"},{"text":"矩與不能者之得失也","source":"대학"},{"text":"10-11 康誥曰惟命不于常道善則得之不善則失之矣","source":"대학"},{"text":"道言也因上文引文王詩之意而申言之其丁寧反覆之意益深切矣","source":"대학"},{"text":"10-12 楚書曰楚國無以爲寶惟善以爲寶","source":"대학"},{"text":"楚書楚語言不寶金玉而寶善人也","source":"대학"},{"text":"10-13 舅犯曰亡人無以爲寶仁親以爲寶","source":"대학"},{"text":"舅犯晋文公舅狐偃字子犯亡人文公時爲公子出亡在外也仁愛也事見檀弓","source":"대학"},{"text":"此兩節又明不外本而內末之意","source":"대학"},{"text":"10-14 秦誓曰若有一个臣斷斷兮無他技其心休休焉其如有容焉人之有技","source":"대학"},{"text":"若己有之人之彦聖其心好之不啻若自其口出寔能容之以能保我子孫黎民尙","source":"대학"},{"text":"亦有利哉人之有技娼疾以惡之人之彦聖而違之俾不通寔不能容以不能保","source":"대학"},{"text":"我子孫黎民亦曰殆哉","source":"대학"},{"text":"秦誓周書斷斷誠一之貌彦美士也聖通明也尙庶幾也娟忌也違拂戾也殆危","source":"대학"},{"text":"10-15 唯仁人放流之迸諸四夷不與同中國此謂唯仁人爲能愛人能惡人","source":"대학"},{"text":"言有此娟疾之人","source":"대학"},{"text":"妨賢而疾國","source":"대학"},{"text":"則仁人必深惡而痛絶之","source":"대학"},{"text":"以其至公無私","source":"대학"},{"text":"故能得好惡之正如此也","source":"대학"},{"text":"10-16 見賢而不能擧擧而不能先命也見不善而不能退退而不能遠過也","source":"대학"},{"text":"命鄭氏云當作慢程子云當作怠未詳孰是若此者知所愛惡矣而未能盡愛惡","source":"대학"},{"text":"之道蓋君子而未仁者也","source":"대학"},{"text":"10-17 好人之所惡惡人之所好是謂拂人之性菑必逮夫身","source":"대학"},{"text":"拂逆也好善而惡惡人之性也至於拂人之性則不仁之甚者也自秦誓至此又皆","source":"대학"},{"text":"以申言好惡公私之極以明上文所引南山有臺節南山之意","source":"대학"},{"text":"10-18 是故君子有大道必忠信以得之驕泰以失之","source":"대학"},{"text":"君子以位言之道謂居其位而修己治人之術發己自盡爲忠循物無違謂信驕者","source":"대학"},{"text":"矜高泰者侈肆此因上所引文王康誥之意而言章內三言得失而語益加切蓋至","source":"대학"},{"text":"此而天理存亡之幾決矣","source":"대학"},{"text":"10-19 生財有大道生之者衆食之者寡爲之者疾用之者舒則財恒足矣","source":"대학"},{"text":"呂氏曰國無遊民則生者衆矣朝無幸位則食者寡矣不奪農時則爲之疾矣量","source":"대학"},{"text":"入爲出則用之舒矣愚按此因有土有財而言以明足國之道在乎務本而節用非","source":"대학"},{"text":"必外本內末而後財可聚也自此以至終篇皆一意也","source":"대학"},{"text":"10-20 仁者以財發身不仁者以身發財","source":"대학"},{"text":"發猶起也仁者散財以得民不仁者亡身以殖貨","source":"대학"},{"text":"10-21 未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其","source":"대학"},{"text":"上好仁以愛其下則下好義以忠其上所以事必有終而府庫之財無悖出之患也","source":"대학"},{"text":"10-22 孟獻子曰畜馬乘不察於鷄豚伐氷之家不畜牛羊百乘之家不畜聚斂之","source":"대학"},{"text":"臣與其有聚斂之臣寧有盜臣此謂國不以利爲利以義爲利也","source":"대학"},{"text":"孟獻子魯之賢大夫仲孫蔑也畜馬乘士初試爲大夫者也伐冰之家卿大夫以上","source":"대학"},{"text":"喪祭用冰者也百乘之家有采地者也君子寧亡己之財而不忍傷民之力故寧有","source":"대학"},{"text":"盜臣而不畜聚斂之臣此謂以下釋獻子之言也","source":"대학"},{"text":"10-23 長國家而務財用者必自小人矣彼爲善之小人之使爲國家菑害竝至雖","source":"대학"},{"text":"有善者亦無如之何矣此謂國不以利爲利以義爲利也","source":"대학"},{"text":"彼爲善之此句上下疑有闕文誤字○自由也言由小人導之也此一節深明以利","source":"대학"},{"text":"爲利之害而重言以結之其丁寧之意切矣○右傳之十章釋治國平天下○次","source":"대학"},{"text":"章之義務在與民同好惡而不專其利皆推廣絜矩之意也能如是則親賢樂利各","source":"대학"},{"text":"得其所而天下平矣○凡傳十章前四章統論綱領旨趣後六章細論條目工夫","source":"대학"},{"text":"其第五章乃明善之要第六章乃誠身之本在初學尤爲當務之急讀者不可以其","source":"대학"},{"text":"近而忽之也","source":"대학"},{"text":"中庸章句序","source":"중용"},{"text":"中庸何爲而作 子思子 憂道學之失其傳而作也 蓋自上古 聖神繼天立極而道統之傳 有自來","source":"중용"},{"text":"矣 其見於經則允執厥中者 堯之所以授舜也 人心惟危 道心惟微 惟精惟一 允執厥中者 舜","source":"중용"},{"text":"之所以授禹也 堯之一言 至矣盡矣 而舜復益之以三言者 則所以明夫堯之一言 必如是而後","source":"중용"},{"text":"可庶幾也 蓋嘗論之 心之虛靈知覺 一而已矣 而以爲有人心道心之異者 則以其或生於形氣","source":"중용"},{"text":"之私 或原於性命之正 而所以爲知覺者不同 是以或危殆而不安 或微妙而難見耳 然人莫不","source":"중용"},{"text":"有是形 故雖上智不能無人心 亦莫不有是性 故雖下愚不能無道心 二者雜於方寸之間 而不","source":"중용"},{"text":"知所以治之 則危者愈危 微者愈微 而天理之公 卒無以勝夫人欲之私矣 精則察夫二者之間","source":"중용"},{"text":"而不雜也 一則守其本心之正而不離也 從事於斯 無少間斷 必使道心 常爲一身之主 而人心","source":"중용"},{"text":"每聽命焉 則危者安 微者著 而動靜云爲 自無過不及之差矣 夫堯舜禹天下之大聖也 而天下","source":"중용"},{"text":"相傳 天下之大事也 以天下之大聖 行天下之大事 而其授受之際 丁寧告戒 不過如此 則天","source":"중용"},{"text":"下之理 豈有以加於此哉 自是以來 聖聖相承 若成湯文武之爲君 皐陶伊傅周召之爲臣 旣皆","source":"중용"},{"text":"以此 而接夫道統之傳 若吾夫子 則雖不得其位 而所以繼往聖 開來學 其功 反有賢於堯舜","source":"중용"},{"text":"者 然當是時 見而知之者惟顔氏曾氏之傳 得其宗 及曾氏之再傳 而復得夫子之孫子思 則去","source":"중용"},{"text":"聖遠而異端起矣 子思懼夫愈久而愈失其眞也 於是 推本堯舜以來相傳之意 質以平日所聞父","source":"중용"},{"text":"師之言 更互演繹 作爲此書 以詔後之學者 蓋其憂之也深 故其言之也切 其慮之也遠 故其","source":"중용"},{"text":"說之也詳 其曰 天命率性 則道心之謂也 其曰 擇善固執 則精一之謂也 其曰 君子時中 則","source":"중용"},{"text":"執中之謂也 世之相後千有餘年 而其言之不異 如合符節 歷選前聖之書 所以提挈網維 開示","source":"중용"},{"text":"蘊奧 未有若是之明且盡者也 自是而又再傳 以得孟氏 爲能推明是書 以承先聖之統 及其沒","source":"중용"},{"text":"而遂失其傳焉 則吾道之所寄 不越乎言語文字之間 而異端之說 日新月盛 以至於老佛之徒","source":"중용"},{"text":"出 則彌近理而大亂眞矣 然而尙幸此書之不泯 故程夫子兄弟者出 得有所考 以續夫千載不","source":"중용"},{"text":"傳之緖 得有所據 以斥夫二家似是之非 蓋子思之功 於是爲大 而微程夫子 則亦莫能因其語","source":"중용"},{"text":"而得其心也 惜乎 其所以爲說者 不傳 而凡石氏之所輯錄 僅出於其門人之所記 是以 大義","source":"중용"},{"text":"雖明 而微言未析 至其門人所自爲說 則雖頗詳盡而多所發明 然倍其師說而淫於老佛者亦有","source":"중용"},{"text":"之矣 熹自蚤歲 卽嘗受讀而竊疑之 沈潛反復 蓋亦有年 一旦恍然 似有以得其要領者 然後","source":"중용"},{"text":"乃敢會衆說而折其衷 旣爲定著章句一篇 以俟後之君子 而一二同志 復取石氏書 刪其繁亂","source":"중용"},{"text":"名以輯略 且記所嘗論辨取舍之意 別爲或問 以附其後 然後 此書之旨 支分節解 脈絡貫通","source":"중용"},{"text":"詳略相因 巨細畢擧 而凡諸說之同異得失 亦得以曲暢旁通 而各極其趣 雖於道統之傳 不敢","source":"중용"},{"text":"妄議 然初學之士 或有取焉 則亦庶乎行遠升高之一助云爾","source":"중용"},{"text":"淳熙己酉春三月戊申 新安朱熹書","source":"중용"},{"text":"中者 不偏不倚無過不及之名 庸平常也 子程子曰 不偏之謂中 不易之胃庸 中者天下之正道","source":"중용"},{"text":"庸者天下之定理 此篇乃孔門傳授心法子思恐其久而差也 故筆之於書以授孟子 其書始言一","source":"중용"},{"text":"理 中散爲萬事 末複合爲一理 放之則彌六合 卷之則退藏於密 其味無窮 皆實學也 善讀者","source":"중용"},{"text":"玩索而有得焉 則終身用之 有不能盡者矣","source":"중용"},{"text":"01-01 天命之謂性 率性之謂道 修道之謂敎","source":"중용"},{"text":"命猶令也 性卽理也 天以陰陽五行 化生萬物 氣以成形 而理亦賦焉 猶命令也 於是人物之","source":"중용"},{"text":"生 因各得 其所賦之理 以爲健順五常之德 所謂性也 率循也 道猶路也 人物各循其性之自","source":"중용"},{"text":"然 則其日用事物之間 莫不各有當行之路 是則所謂道也 脩品節之也 性道雖同 而氣稟或異","source":"중용"},{"text":"故不能無過不及之差 聖人因人物之所當行者 而品節之 以爲法於天下 則謂之敎 若禮樂刑","source":"중용"},{"text":"政之屬是也 蓋人知己之有性 而不知其出於天 知事之有道 而不知其由於性 知聖人之有敎","source":"중용"},{"text":"而不知其因吾知之所固有者裁之也 故子思於此首發明之 而董子所謂道之大原 出於天 亦此","source":"중용"},{"text":"01-02 道也者 不可須臾離也 可離 非道也 是故君子 戒愼乎其所不睹 恐懼乎其所不聞","source":"중용"},{"text":"道者日用事物當行之理 皆性之德而具於心 無物不有 無時不然 所以不可須臾離也 若其可","source":"중용"},{"text":"離 則豈率性之謂哉 是以君子之心常存敬畏 雖不見聞 亦不敢忽 所以存天理之本然 而不使","source":"중용"},{"text":"離於須臾之頃也","source":"중용"},{"text":"01-03 莫見乎隱 莫顯乎微 故君子 愼其獨也","source":"중용"},{"text":"隱暗處也 微細事也 獨者人所不知而己所獨知之地也 言幽暗之中 細微之事 跡雖未形 而幾","source":"중용"},{"text":"則已動 人雖不知 而己獨知之 則是天下之事 無有著見明顯而過於此者 是以 君子旣常戒懼","source":"중용"},{"text":"而於此 尤加謹焉 所以遏人欲於將萌 而不使其潛滋暗長於隱微之中 以至離道之遠也","source":"중용"},{"text":"01-04 喜怒哀樂之未發 謂之中 發而皆中節 謂之和 中也者 天下之大本也 和也者 天下之","source":"중용"},{"text":"喜怒哀樂 情也 其未發則性也 無所偏倚故 謂之中 發皆中節情之正也 無所乖戾故 謂之和","source":"중용"},{"text":"大本者 天命之性 天下之理 皆由此出 道之體也 達道者 循性之謂 天下古今之所共由 道之","source":"중용"},{"text":"用也 此言性情之德 以明道不可離之意","source":"중용"},{"text":"01-05 致中和 天地位焉 萬物育焉","source":"중용"},{"text":"致推而極之也 位者安其所也 育者 遂其生也 自戒懼而約之 以至於至靜之中無所偏倚而其","source":"중용"},{"text":"守不失 則極其中而天地位矣 自謹獨而精之 以至於應物之處無少差謬而無適不然 則極其和","source":"중용"},{"text":"而萬物育矣 蓋天地萬物本吾一體吾之心正 則天地之心亦正矣 吾之氣順 則天地之氣亦順矣","source":"중용"},{"text":"故其效驗 至於如此 此學問之極功 聖人之能事 初非有待於外 而脩道之敎亦在其中矣 是其","source":"중용"},{"text":"一體一用 雖有動靜之殊 然 必其體立而後用有以行 則其實亦非有兩事也 故於此 合而言之","source":"중용"},{"text":"以結上文之意 ○ 右第一章 子思述所傳之意以立言 首明道之本原出於天而不可易 其實體","source":"중용"},{"text":"備於己而不可離 次言存養省察之要 終言聖神功化之極 蓋欲學者於此 反求諸身而自得之","source":"중용"},{"text":"以去夫外誘之私而充其本然之善 楊氏所謂一篇之體要是也 其下十章 蓋子思引夫子之言 以","source":"중용"},{"text":"終此章之義","source":"중용"},{"text":"02-01 仲尼曰 君子中庸 小人反中庸","source":"중용"},{"text":"中庸者 不偏不倚無過不及而平常之理 乃天命所當然精微之極致也 唯君子爲能體之 小人反","source":"중용"},{"text":"02-02 君子之中庸也 君子而時中 小人之中庸也 小人而無忌憚也","source":"중용"},{"text":"王肅本作小人之反中庸也 程子亦以爲然 今從之 ○ 君子之所以爲中庸者 以其有君子之德","source":"중용"},{"text":"而又能隨時以處中也 小人之所以反中庸者 以其有小人之心 而又無所忌憚也 蓋中無定體","source":"중용"},{"text":"隨時而在 是乃平常之理也 君子知其在我 故能戒謹不睹 恐懼不聞 而無時不中 小人不知有","source":"중용"},{"text":"此 則肆欲妄行而無所忌憚矣 ○ 右第二章 此下十章皆論中庸 以釋首章之義 文雖不屬 而","source":"중용"},{"text":"意實相承也 變和言庸者 游氏曰 以性情言之 則曰中和 以德行言之 則曰中庸 是也 然 中","source":"중용"},{"text":"庸之中實兼中和之義","source":"중용"},{"text":"03-01 子曰 中庸 其至矣乎 民鮮能 久矣","source":"중용"},{"text":"過則失中 不及則未至 故惟中庸之德 爲至 然亦人所同得 初無難事 但世敎衰 民不興行 故","source":"중용"},{"text":"鮮能之今已久矣 論語無能字 ○ 右第三章","source":"중용"},{"text":"04-01 子曰 道之不行也 我知之矣 知者過之 愚者不及也 道之不明也 我知之矣 賢者過之","source":"중용"},{"text":"不肖者不及也","source":"중용"},{"text":"道者天理之當然 中而已矣 知愚賢不肖之過不及 則生稟之異而失其中也 知者知之過 旣以","source":"중용"},{"text":"道爲不足行 愚者不及知 又不知所以行 此道之所以常不行也 賢者行之過 旣以道爲不足知","source":"중용"},{"text":"不肖者不及行 又不求所以知 此道之所以常不明也","source":"중용"},{"text":"04-02 人莫不飮食也 鮮能知味也","source":"중용"},{"text":"道不可離人自不察 是以有過不及之弊 ○ 右第四章","source":"중용"},{"text":"05-01 子曰 道其不行矣夫","source":"중용"},{"text":"由不明故 不行 ○ 右第五章 此章承上章而擧其不行之端 以起下章之意","source":"중용"},{"text":"06-01 子曰 舜其大知也與 舜好問而好察邇言 隱惡而揚善 執其兩端 用其中於民 其斯以","source":"중용"},{"text":"舜之所以爲大知者 以其不自用而取諸人也 邇言者 淺近之言 猶必察焉 其無遺善可知 然於","source":"중용"},{"text":"其言之未善者 則隱而不宣 其善者則播而不匿 其廣大光明 又如此 則人孰不樂告以善哉 兩","source":"중용"},{"text":"端謂衆論不同之極致 蓋凡物 皆有兩端 如小大厚薄之類 於善之中又執其兩端而量度以取中","source":"중용"},{"text":"然後用之 則其擇之審而行之至矣 然非在我之權度精切不差 何以與此 此知之所以無過不及","source":"중용"},{"text":"而道之所以行也 ○ 右第六章","source":"중용"},{"text":"07-01 子曰 人皆曰予知 驅而納諸罟擭陷阱之中而莫之知 辟也人皆曰予知 擇乎中庸而不","source":"중용"},{"text":"能期月守也","source":"중용"},{"text":"罟網也 擭機檻也 陷阱坑坎也 皆所以掩取禽獸者也 擇乎中庸 辨別衆理 以求所謂中庸 卽","source":"중용"},{"text":"上章好問用中之事也 期月匝一月也 言知禍而不知辟 以況能擇而不能守 皆不得爲知也 ○","source":"중용"},{"text":"右第七章 承上章大知而言 又擧不明之端 以起下章也","source":"중용"},{"text":"08-01 子曰 回之爲人也 擇乎中庸 得一善則拳拳服膺而弗失之矣","source":"중용"},{"text":"回孔子弟子顔淵名 拳拳奉持之貌 服猶著也 膺胸也 奉持而著之心胸之間 言能守也 顔子蓋","source":"중용"},{"text":"眞知之 故能擇能守 如此 此 行之所以無過不及而道之所以明也 ○ 右第八章","source":"중용"},{"text":"09-01 子曰 天下國家 可均也 爵祿 可辭也 白刃 可蹈也 中庸 不可能也","source":"중용"},{"text":"均平治也 三者亦知仁勇之事 天下之至難也 然皆倚於一偏 故 資之近而力能勉者 皆足以能","source":"중용"},{"text":"之 至於中庸 雖若易能 然非義精仁熟而無一毫人欲之私者 不能及也 三者難而易 中庸易而","source":"중용"},{"text":"難 此民之所以鮮能也 ○ 右第九章 亦承上章以起下章","source":"중용"},{"text":"中庸10章","source":"중용"},{"text":"10-01 子路 問强","source":"중용"},{"text":"子路孔子弟子仲由也 子路好勇 故問强","source":"중용"},{"text":"10-02 子曰 南方之强與 北方之强與 抑而强與","source":"중용"},{"text":"抑語辭 而汝也","source":"중용"},{"text":"10-03 寬柔以敎 不報無道 南方之强也 君子 居之","source":"중용"},{"text":"寬柔以敎 謂含容巽順 以誨人之不及也 不報無道 謂橫逆之來 直受之而不報也 南方 風氣","source":"중용"},{"text":"柔弱 故以含忍之力勝人爲强 君子之道也","source":"중용"},{"text":"10-04 衽金革 死而不厭 北方之强也 而强者 居之","source":"중용"},{"text":"衽席也 金戈兵之屬 革甲冑之屬 北方風氣剛勁 故以果敢之力勝人爲强 强者之事也","source":"중용"},{"text":"10-05 故君子 和而不流 强哉矯 中立而不倚 强哉矯 國有道 不變塞焉 强哉矯 國無道 至","source":"중용"},{"text":"死不變 强哉矯","source":"중용"},{"text":"此四者汝之所當强也 矯强貌 詩曰矯矯虎臣 是也 倚偏著也 塞未達也 國有道 不變未達之","source":"중용"},{"text":"所守 國無道 不變平生之所守也 此則所謂中庸之不可能者 非有以自勝其人欲之私 不能擇","source":"중용"},{"text":"而守也 君子之强 孰大於是 夫子以是告子路者 所以抑其血氣之剛而進之以德義之勇也 ○","source":"중용"},{"text":"中庸11章","source":"중용"},{"text":"11-01 子曰 素隱行怪 後世 有述焉 吾弗爲之矣","source":"중용"},{"text":"素按漢書當作索 蓋字之誤也 索隱行怪言深求隱僻之理而過爲詭異之行也 然以其足以欺世","source":"중용"},{"text":"而盜名 故後世或有稱述之者 此知之過而不擇乎善 行之過而不用其中 不當强而强者也 聖","source":"중용"},{"text":"人豈爲之哉","source":"중용"},{"text":"11-02 君子 遵道而行 半塗而廢 吾弗能已矣","source":"중용"},{"text":"遵道而行則能擇乎善矣 半塗而廢則力之不足也 此其知雖足以及之而行有不逮 當强而不强","source":"중용"},{"text":"者也 已止也 聖人於此 非勉焉而不敢廢 蓋至誠無息 自有所不能止也","source":"중용"},{"text":"11-03 君子 依乎中庸 遯世不見知而不悔 唯聖者 能之","source":"중용"},{"text":"不爲索隱行怪 則依乎中庸而已 不能半塗而廢 是以遯世不見知而不悔也 此中庸之成德 知","source":"중용"},{"text":"之盡 仁之至 不賴勇而裕如者 正吾夫子之事 而猶不自居也 故曰唯聖者能之而已 ○ 右第","source":"중용"},{"text":"十一章 子思所引夫子之言以明首章之義者 止此 蓋此篇大旨以知仁勇三達德 爲入道之門","source":"중용"},{"text":"故於篇首 卽以大舜顔淵子路之事 明之 舜知也 顔淵仁也 子路勇也 三者 廢其一 則無以造","source":"중용"},{"text":"道而成德矣 餘見第二十章","source":"중용"},{"text":"中庸12章","source":"중용"},{"text":"12-01 君子之道 費而隱","source":"중용"},{"text":"費用之廣也 隱體之微也","source":"중용"},{"text":"12-02 夫婦之愚 可以與知焉 及其至也 雖聖人 亦有所不知焉 夫婦之不肖 可以能行焉 及","source":"중용"},{"text":"其至也 雖聖人 亦有所不能焉 天地之大也 人猶有所憾 故君子語大 天下莫能載焉 語小 天","source":"중용"},{"text":"下莫能破焉","source":"중용"},{"text":"君子之道 近自夫婦居室之間 遠而至於聖人天地之所不能盡 其大無外 其小無內 可謂費矣","source":"중용"},{"text":"然其理之所以然 則隱而莫之見也 蓋可知可能者 道中之一事 及其至而聖人不知不能 則擧","source":"중용"},{"text":"全體而言 聖人固有所不能盡也 侯氏曰 聖人所不知 如孔子問禮問官之類 所不能 如孔子不","source":"중용"},{"text":"得位 堯舜病博施之類 愚謂 人所憾於天地 如覆載生成之偏 及寒署災祥之不得其正者","source":"중용"},{"text":"12-03 詩云 鳶飛戾天 魚躍于淵 言其上下察也","source":"중용"},{"text":"詩大雅旱麓之篇 鳶鴟類 戾至也 察著也 子思引此詩 以明化育流行 上下昭著 莫非此理之","source":"중용"},{"text":"用 所謂費也 然其所以然者 則非見聞所及 所謂隱也 故程子曰 此一節 子思喫緊爲人處 活","source":"중용"},{"text":"潑潑地 讀者其致思焉","source":"중용"},{"text":"12-04 君子之道 造端乎夫婦 及其至也 察乎天地","source":"중용"},{"text":"結上文 ○ 右第二十章 子思之言 蓋以申明首章道不可離之意也 其下八章雜引孔子之言以","source":"중용"},{"text":"中庸13章","source":"중용"},{"text":"13-01 子曰 道不遠人 人之爲道而遠人 不可以爲道","source":"중용"},{"text":"道者率性而已 固衆人之所能知能行者也 故常不遠於人 若爲道者厭其卑近 以爲不足爲 而","source":"중용"},{"text":"反務爲高遠難行之事 則非所以爲道矣","source":"중용"},{"text":"13-02 詩云 伐柯伐柯 其則不遠 執柯以伐柯 睨而視之 猶以爲遠 故君子 以人治人 改而","source":"중용"},{"text":"詩豳風伐柯之篇 柯斧柄 則法也 睨邪視也 言人執柯伐木以爲柯者 彼柯長短之法 在此柯耳","source":"중용"},{"text":"然猶有彼此之別 故伐者視之猶以爲遠也 若以人治人 則所以爲人之道各在當人之身 初無彼","source":"중용"},{"text":"此之別 故君子之治人也 卽以其人之道 還治其人之身 其人能改 卽止不治 蓋責之以其所能","source":"중용"},{"text":"知能行 非欲其遠人以爲道也 張子所謂以衆人望人則易從 是也","source":"중용"},{"text":"13-03 忠恕 違道不遠 施諸己而不願 亦勿施於人","source":"중용"},{"text":"盡己之心爲忠 推己及人爲恕 違去也 如春秋傳齊師違穀七里之違 言自此至彼 相去不遠 非","source":"중용"},{"text":"背而去之之謂也 道卽其不遠人者是也 施諸己而不願 亦勿施於人 忠恕之事也 以己之心 度","source":"중용"},{"text":"人之心 未嘗不同 則道之不遠於人者 可見 故己之所不欲 則勿以施於人 亦不遠人以爲道之","source":"중용"},{"text":"事 張子所謂以愛己之心愛人則盡仁 是也","source":"중용"},{"text":"13-04 君子之道四 丘未能一焉 所求乎子 以事父 未能也 所求乎臣 以事君 未能也 所求","source":"중용"},{"text":"乎弟 以事兄 未能也 所求乎朋友 先施之 未能也 庸德之行 庸言之謹 有所不足 不敢不勉","source":"중용"},{"text":"有餘 不敢盡 言顧行 行顧言 君子 胡不慥慥爾","source":"중용"},{"text":"求猶責也 道不遠人 凡己之所以責人者 皆道之所當然也 故反之以自責而自脩焉 庸平常也","source":"중용"},{"text":"行者踐其實 謹者擇其可 德不足而勉 則行益力 言有餘而訒 則謹益至 謹之至則言顧行矣","source":"중용"},{"text":"行之力則行顧言矣 慥慥篤實貌 言君子之言行如此 豈不慥慥乎 贊美之也 凡此皆不遠人以","source":"중용"},{"text":"爲道之事 張子所謂以責人之心責己則盡道 是也 ○ 右第十三章 道不遠人者 夫婦所能 丘","source":"중용"},{"text":"未能一者 聖人所不能 皆費也而其所以然者 則至隱存焉 下章放此","source":"중용"},{"text":"中庸14章","source":"중용"},{"text":"14-01 君子 素其位而行 不願乎其外","source":"중용"},{"text":"素猶見在也 言君子但因見在所居之位 而爲其所當爲 無慕乎其外之心也","source":"중용"},{"text":"14-02 素富貴 行乎富貴 素貧賤 行乎貧賤 素夷狄 行乎夷狄 素患難 行乎患難 君子 無入","source":"중용"},{"text":"而 不自得焉","source":"중용"},{"text":"此言素其位而行也","source":"중용"},{"text":"14-03 在上位 不陵下 在下位 不援上 正己而不求於人 則無怨 上不怨天 下不尤人","source":"중용"},{"text":"此言不願乎其外也","source":"중용"},{"text":"14-04 故君子 居易以俟命 小人 行險以徼幸","source":"중용"},{"text":"易平地也 居易素位而行也 俟命不願乎外也 徼求也 幸謂所不當得而得者","source":"중용"},{"text":"14-05 子曰 射有似乎君子 失諸正鵠 反求諸其身","source":"중용"},{"text":"畫布曰正 棲皮曰鵠 皆侯之中 射之的也 子思引此孔子之言 以結上文之意 ○ 右第十四章","source":"중용"},{"text":"子思之言也 凡章首 無子曰字者 放此","source":"중용"},{"text":"中庸15章","source":"중용"},{"text":"15-01 君子之道 辟如行遠必自邇 辟如登高必自卑","source":"중용"},{"text":"15-02 詩曰 妻子好合 如鼓瑟琴 兄弟旣翕 和樂且耽 宜爾室家 樂爾妻帑","source":"중용"},{"text":"詩小雅常棣之篇 鼓瑟琴和也 翕亦合也 耽亦樂也 帑子孫也","source":"중용"},{"text":"15-03 子曰 父母 其順矣乎","source":"중용"},{"text":"夫子誦此詩而贊之曰 人能和於妻子 宜於兄弟如此 則父母其安樂之矣 子思引詩及此語 以","source":"중용"},{"text":"明行遠自邇 登高自卑之意 ○ 右第十五章","source":"중용"},{"text":"中庸16章","source":"중용"},{"text":"16-01 子曰 鬼神之爲德 其盛矣乎","source":"중용"},{"text":"程子曰 鬼神天地之功用 而造化之迹也 張子曰 鬼神者 二氣之良能也 愚謂以二氣言 則鬼","source":"중용"},{"text":"者陰之靈也 神者陽之靈也 以一氣言 則至而伸者爲神 反而歸者爲鬼 其實一物而已 爲德猶","source":"중용"},{"text":"言性情功效","source":"중용"},{"text":"16-02 視之而弗見 聽之而弗聞 體物而不可遺","source":"중용"},{"text":"鬼神無形與聲 然物之終始 莫非陰陽合散之所爲 是其爲物之體而物之所不能遺也 其言體物","source":"중용"},{"text":"猶易所謂幹事","source":"중용"},{"text":"16-03 使天下之人 齊明盛服 以承祭祀 洋洋乎如在其上 如在其左右","source":"중용"},{"text":"齊之爲言 齊也 所以齊不齊而致其齊也 明猶潔也 洋洋流動充滿之意 能使人畏敬奉承而發","source":"중용"},{"text":"見昭著如此 乃其體物而不可遺之驗也 孔子曰其氣發揚于上 爲昭明焄蒿悽愴 此百物之精也","source":"중용"},{"text":"神之著也 正謂此爾","source":"중용"},{"text":"16-04 詩曰 神之格思 不可度思 矧可射思","source":"중용"},{"text":"詩大雅抑之篇 格來也 矧況也 射厭也 言厭怠而不敬也 思語辭","source":"중용"},{"text":"16-05 夫微之顯 誠之不可揜 如此夫","source":"중용"},{"text":"誠者眞實無妄之謂 陰陽合散 無非實者 故其發見之不可揜 如此 ○ 右第十六章 不見不聞","source":"중용"},{"text":"隱也 體物如在 則亦費矣 此前三章 以其費之小者而言 此後三章 以其費之大者而言 此一","source":"중용"},{"text":"章 兼費隱包大小而言","source":"중용"},{"text":"中庸17章","source":"중용"},{"text":"17-01 子曰 舜其大孝也與 德爲聖人 尊爲天子 富有四海之內 宗廟饗之 子孫保之","source":"중용"},{"text":"子孫謂虞思陳胡公之屬","source":"중용"},{"text":"17-02 故大德 必得其位 必得其祿 必得其名 必得其壽","source":"중용"},{"text":"舜年百有十歲","source":"중용"},{"text":"17-03 故天之生物 必因其材而篤焉 故栽者 培之 傾者 覆之","source":"중용"},{"text":"材質也 篤厚也 栽植也 氣至而滋息爲培 氣反而遊散則覆","source":"중용"},{"text":"17-04 詩曰 嘉樂君子 憲憲令德 宜民宜人 受祿于天 保佑命之 自天申之","source":"중용"},{"text":"詩大雅假樂之篇 假當依此作嘉 憲當依詩作顯 申重也","source":"중용"},{"text":"17-05 故大德者 必受命","source":"중용"},{"text":"受命者 受天命爲天子也 ○ 右第十七章 此由庸行之常 推之以極其至 見道之用廣也 而其","source":"중용"},{"text":"所以然者 則爲體微矣 後二章亦此意","source":"중용"},{"text":"中庸18章","source":"중용"},{"text":"18-01 子曰 無憂者 其惟文王乎 以王季爲父 以武王爲子 父作之 子述之","source":"중용"},{"text":"此言文王之事 書言王季其勤王家 蓋其所作 亦積功累仁之事也","source":"중용"},{"text":"18-02 武王 纘大王王季文王之緖 壹戎衣而有天下 身不失天下之顯名 尊爲天子 富有四海","source":"중용"},{"text":"之內宗廟饗之 子孫保之","source":"중용"},{"text":"此言武王之事 纘繼也 大王王季之父也 書云大王肇基王迹 詩云至于大王 實始翦商 緖業也","source":"중용"},{"text":"戎衣甲冑之屬 壹戎衣 武成文 言壹著戎衣以伐紂也","source":"중용"},{"text":"18-03 武王 末受命 周公 成文武之德 追王大王王季 上祀先公以天子之禮 斯禮也 達乎諸","source":"중용"},{"text":"侯 大夫及士庶人 父爲大夫 子爲士 葬以大夫 祭以士 父爲士 子爲大夫 葬以士 祭以大 夫","source":"중용"},{"text":"期之喪 達乎大夫 三年之喪 達乎天子 父母之喪 無貴賤一也","source":"중용"},{"text":"此言周公之事 末猶老也 追王蓋推文武之意 以及乎王迹之所起也 先公組紺以上至后稷也","source":"중용"},{"text":"上祀先公以天子之禮 又推大王王季之意 以及於無窮也 制爲禮法 以及天下 使葬用死者之","source":"중용"},{"text":"爵 祭用生者之祿 喪服自期以下 諸侯絶 大夫降 而父母之喪 上下同之 推己以及人也 ○","source":"중용"},{"text":"右第十八章","source":"중용"},{"text":"中庸19章","source":"중용"},{"text":"19-01 子曰 武王周公 其達孝矣乎","source":"중용"},{"text":"達通也 承上章而言 武王周公之孝 乃天下之人 通謂之孝 猶孟子之言達尊也","source":"중용"},{"text":"19-02 夫孝者 善繼人之志 善述人之事者也","source":"중용"},{"text":"上章 言武王纘大王王季文王之緖 以有天下 而周公成文武之德 以追崇其先祖 此繼志述事","source":"중용"},{"text":"之大者也 下文又以其所制祭祀之禮通于上下者 言之","source":"중용"},{"text":"19-03 春秋 脩其祖廟 陳其宗器 設其裳衣 薦其時食","source":"중용"},{"text":"祖廟天子七 諸侯五 大夫三 適士二 官師一 宗器 先世所藏之重器 若周之赤刀 大訓 天球","source":"중용"},{"text":"河圖之屬也 裳衣 先祖之遺衣服 祭則設之以授尸也 時食四時之食 各有其物 如春行羔豚膳","source":"중용"},{"text":"膏香之類是也","source":"중용"},{"text":"19-04 宗廟之禮 所以序昭穆也 序爵 所以辨貴賤也 序事 所以辨賢也 旅酬 下 爲上 所以","source":"중용"},{"text":"逮 賤也 燕毛 所以序齒也","source":"중용"},{"text":"宗廟之次 左爲昭 右爲穆而子孫 亦以爲序 有事於太廟 則子姓兄弟羣昭群穆 咸在而不失其","source":"중용"},{"text":"倫焉 爵公侯卿大夫也 事宗祝有司之職事也 旅衆也 酬導飮也 旅酬之禮 賓弟子 兄弟之子","source":"중용"},{"text":"各擧觶於其長而衆相酬 蓋宗廟之中 以有事爲榮 故逮及賤者 使亦得以申其敬也 燕毛祭畢","source":"중용"},{"text":"而燕則以毛髮之色 別長幼 爲坐次也 齒年數也","source":"중용"},{"text":"19-05 踐其位 行其禮奏其樂 敬其所尊 愛其所親 事死如事生 事亡如事存 孝之至也","source":"중용"},{"text":"踐猶履也 其指先王也 所尊所親先王之祖考子孫臣庶也 始死謂之死 旣葬則曰反而亡焉 皆","source":"중용"},{"text":"指先王也 此結上文兩節 皆繼志述事之意也","source":"중용"},{"text":"19-06 郊社之禮 所以事上帝也 宗廟之禮 所以祀乎其先也 明乎郊社之禮 禘嘗之義 治國","source":"중용"},{"text":"其如示諸掌乎","source":"중용"},{"text":"郊祭天 社祭地 不言后土者 省文也 禘天子宗廟之大祭 追祭太祖之所自出於太廟 而以太祖","source":"중용"},{"text":"配之也 嘗秋祭也 四時皆祭 擧其一耳 禮必有義 對擧之互文也 示與視同 視諸掌言易見也","source":"중용"},{"text":"此與論語文意 大同小異 記有詳略耳 ○ 右第十九章","source":"중용"},{"text":"中庸20章","source":"중용"},{"text":"20-01 哀公 問政","source":"중용"},{"text":"哀公魯君 名蔣","source":"중용"},{"text":"20-02 子曰 文武之政 布在方策 其人存則其政擧 其人亡則其政息","source":"중용"},{"text":"方版也 策簡也 息猶滅也 有是君有是臣 則有是政矣","source":"중용"},{"text":"20-03 人道敏政 地道敏樹 夫政也者 蒲盧也","source":"중용"},{"text":"敏速也 蒲盧 沈括 以爲蒲葦 是也 以人立政 猶以地種樹 其成速矣 而蒲葦 又易生之物 其","source":"중용"},{"text":"成尤速也 言人存政擧 其易如此","source":"중용"},{"text":"20-04 故爲政在人 取人以身 修身以道 脩道以仁","source":"중용"},{"text":"此承上文人道敏政而言也 爲政在人 家語 作爲政在於得人 語意尤備 人謂賢臣 身指君身","source":"중용"},{"text":"道者天下之達道 仁者天地生物之心而人得以生者 所謂元者善之長也 言人君爲政 在於得人","source":"중용"},{"text":"而取人之則 又在脩身 能仁其身 則有君有臣而政無不擧矣","source":"중용"},{"text":"20-05 仁者人也 親親爲大 義者宜也 尊賢爲大 親親之殺 尊賢之等 禮所生也","source":"중용"},{"text":"人指人身而言 具此生理 自然便有惻怛慈愛之意 深體味之可見 宜者分別事理 各有所宜也","source":"중용"},{"text":"禮則節文斯二者而已","source":"중용"},{"text":"20-06 在下位 不獲乎上 民不可得而治矣","source":"중용"},{"text":"鄭氏曰 此句在下 誤重在此","source":"중용"},{"text":"20-07 故君子 不可以不脩身 思脩身 不可以不事親 思事親 不可以不知人 思知人 不可以","source":"중용"},{"text":"爲政在人 取人以身 故不可以不脩身 脩身以道 脩道以仁 故思脩身 不可以不事親 欲盡親","source":"중용"},{"text":"親之仁 必由尊賢之義 故又當知人 親親之殺 尊賢之等 皆天理也 故又當知天","source":"중용"},{"text":"20-08 天下之達道五 所以行之者三 曰君臣也 父子也 夫婦也 昆弟也 朋友之交也 五者","source":"중용"},{"text":"天下之達道也 知仁勇三者 天下之達德也 所以行之者 一也","source":"중용"},{"text":"達道者 天下古今所共由之路 卽書所謂五典 孟子所謂父子有親 君臣有義 夫婦有別 長幼有","source":"중용"},{"text":"序 朋友有信 是也 知所以知此也 仁所以體此也 勇所以强此也 謂之達德者 天下古今所同","source":"중용"},{"text":"得之理也 一則誠而已矣 達道雖人所共由 然 無是三德 則無以行之 達德 雖人所同得 然","source":"중용"},{"text":"一有不誠 則人欲間之 而德非其德矣 程子曰 所謂誠者 止是誠實此三者 三者之外 更別無","source":"중용"},{"text":"20-09 或生而知之 或學而知之 或困而知之 及其知之 一也 或安而行之 或利而行之 或勉","source":"중용"},{"text":"强 而行之 及其成功 一也","source":"중용"},{"text":"知之者之所知 行之者之所行 謂達道也 以其分而言 則所以知者知也 所以行者仁也 所以至","source":"중용"},{"text":"於知之成功而一者勇也 以其等而言 則生知安行者知也 學知利行者仁也 困知勉行者勇也","source":"중용"},{"text":"蓋人性雖無不善 而氣稟有不同者 故聞道有蚤莫 行道有難易 然能自强不息 則其至一也 呂","source":"중용"},{"text":"氏曰 所入之塗雖異 而所至之域則同 此所以爲中庸 若乃企生知安行之資 爲不可幾及 輕困","source":"중용"},{"text":"知勉行 謂不能有成 此道之所以不明不行也","source":"중용"},{"text":"20-10 子曰 好學 近乎知 力行 近乎仁 知恥 近乎勇","source":"중용"},{"text":"子曰二字 衍文 此言未及乎達德而求以入德之事 通上文三知爲知 三行爲仁 則此三近者 勇","source":"중용"},{"text":"之次也 呂氏曰 愚者自是而不求 自私者 徇人欲而忘返 懦者甘爲人下而不辭 故好學非知","source":"중용"},{"text":"然足以破愚 力行非仁 然足以忘私 知恥非勇 然足以起懦","source":"중용"},{"text":"20-11 知斯三者 則知所以脩身 知所以脩身 則知所以治人 知所以治人 則知所以治天下國","source":"중용"},{"text":"斯三者 指三近而言 人者對己之稱 天下國家 則盡乎人矣 言此以結上文脩身之意 起下文九","source":"중용"},{"text":"20-12 凡爲天下國家 有九經曰 脩身也 尊賢也 親親也 敬大臣也 體群臣也 子庶民也 來","source":"중용"},{"text":"百 工也 柔遠人也 懷諸侯也","source":"중용"},{"text":"經常也 體謂設以身處其地而察其心也 子如父母之愛其子也 柔遠人所謂無忘賓旅者也 此列","source":"중용"},{"text":"九經之目也 呂氏曰 天下國家之本 在身 故脩身爲九經之本 然 必親師取友然後 脩身之道","source":"중용"},{"text":"進 故尊賢次之 道之所進 莫先其家 故親親次之 由家以及朝廷 故敬大臣 體君臣次之 由朝","source":"중용"},{"text":"廷以及其國 故子庶民 來百工次之 由其國以及天下 故柔遠人 懷諸侯次之 此九經之序也","source":"중용"},{"text":"視君臣 猶吾四體 視百姓 猶吾子 此視臣視民之別也","source":"중용"},{"text":"20-13 脩身則道立 尊賢則不惑 親親則諸父昆弟 不怨 敬大臣則不眩 體群臣則士之報禮重","source":"중용"},{"text":"子庶民則百姓勸 來百工則財用足 柔遠人則四方歸之 懷諸侯則天下畏之","source":"중용"},{"text":"此言九經之效也 道立謂道成於己而可爲民表 所謂皇建其有極 是也 不惑謂不疑於理 不眩","source":"중용"},{"text":"謂不迷於事 敬大臣 則信任專而小臣不得以間之 故臨事而不眩也 來百工 則通功易事 農末","source":"중용"},{"text":"相資 故財用足 柔遠人 則天下之旅 皆悅而願出於其塗 故四方歸 懷諸侯 則德之所施者博","source":"중용"},{"text":"而威之所制者廣矣 故 曰天下畏之","source":"중용"},{"text":"20-14 齊明盛服 非禮不動 所以脩身也 去讒遠色 賤貨而貴德 所以勸賢也 尊其位 重其祿","source":"중용"},{"text":"同其好惡 所以勸親親也 官盛任使 所以勸大臣也 忠信重祿 所以勸士也 時使薄斂 所 以勸","source":"중용"},{"text":"百姓也 日省月試 旣稟稱事 所以勸百工也 送往迎來 嘉善而矜不能 所以柔遠人也 繼絶世","source":"중용"},{"text":"擧廢國 治亂持危 朝聘以時 厚往而薄來 所以懷諸侯也","source":"중용"},{"text":"此言九經之事也 官盛任使 謂官屬衆盛 足任使令也 蓋大臣 不當親細事 故所以優之者如此","source":"중용"},{"text":"忠信重祿 謂待之誠而養之厚 蓋以身體之 而知其所賴乎上者如此也 旣讀曰餼 餼稟稍食也","source":"중용"},{"text":"稱事如周禮槀人職曰 考其弓弩 以上下其食 是也 往則爲之授節以送之 來則豊其委積以迎","source":"중용"},{"text":"之 朝謂諸侯見於天子 聘謂諸侯使大夫來獻 王制比年一少聘 三年一大聘 五年一朝 厚往薄","source":"중용"},{"text":"來 謂燕賜厚而納貢薄","source":"중용"},{"text":"20-15 凡爲天下國家 有九經 所以行之者 一也","source":"중용"},{"text":"一者誠也 一有不誠 則是九者皆爲虛文矣 此九經之實也","source":"중용"},{"text":"20-16 凡事 豫則立 不豫則廢 言前定則不跲 事前定則不困 行前定則不疚 道前定則不窮","source":"중용"},{"text":"凡事指達道達德九經之屬 豫素定也 跲躓也 疚病也 此承上文 言凡事皆欲先立乎誠 如下文","source":"중용"},{"text":"20-17 在下位 不獲乎上 民不可得而治矣 獲乎上 有道 不信乎朋友 不獲乎上矣 信乎朋友","source":"중용"},{"text":"有道 不順乎親 不信乎朋友矣 順乎親 有道 反諸身不誠 不順乎親矣 誠身 有道 不明 乎善","source":"중용"},{"text":"不誠乎身矣","source":"중용"},{"text":"此又以在下位者 推言素定之意 反諸身不誠 謂反求諸身 而所存所發 未能眞實而無妄也 不","source":"중용"},{"text":"明乎善 謂不能察於人心天命之本然 而眞知至善之所在也","source":"중용"},{"text":"20-18 誠者 天之道也 誠之者 人之道也 誠者 不勉而中 不思而得 從容中道 聖人也 誠之","source":"중용"},{"text":"者 擇善而固執之者也","source":"중용"},{"text":"此承上文誠身而言 誠者眞實無妄之謂 天理之本然也 誠之者 未能眞實無妄而欲其眞實無妄","source":"중용"},{"text":"之謂 人事之當然也 聖人之德 渾然天理 眞實無妄 不待思勉而從容中道 則亦天之道也 未","source":"중용"},{"text":"至於聖 則不能無人欲之私 而其爲德 不能皆實 故未能不思而得 則必擇善然後 可以明善","source":"중용"},{"text":"未能不勉而中 則必固執而後 可以誠身 此則所謂人之道也 不思而得 生知也 不勉而中 安","source":"중용"},{"text":"行也 擇善學知以下之事 固執利行以下之事也","source":"중용"},{"text":"20-19 博學之 審問之 愼思之 明辨之 篤行之","source":"중용"},{"text":"此誠之之目也 學問思辨 所以擇善而爲知 學而知也 篤行 所以固執而爲仁 利而行也 程子","source":"중용"},{"text":"曰 五者廢其一 非學也","source":"중용"},{"text":"20-20 有弗學 學之 弗能 弗措也 有弗問 問之 弗知 弗措也 有弗思 思之 弗得 弗措也","source":"중용"},{"text":"有 弗辨 辨之 弗明 弗措也 有弗行 行之 弗篤 弗措也 人一能之 己百之 人十能之 己千之","source":"중용"},{"text":"君子之學 不爲則已 爲則必要其成 故常百倍其功 此困而知 勉而行者也 勇之事也","source":"중용"},{"text":"20-21 果能此道矣 雖愚必明 雖柔必强","source":"중용"},{"text":"明者擇善之功 强者固執之效 呂氏曰 君子所以學者 爲能變化氣質而已 德勝氣質 則愚者可","source":"중용"},{"text":"進於明 柔者可進於强 不能勝之 則雖有志於學 亦愚不能明 柔不能立而已矣 蓋均善而無惡","source":"중용"},{"text":"者 性也 人所同也 昏明强弱之稟 不齊者 才也 人所異也 誠之者 所以反其同而變其異也","source":"중용"},{"text":"夫以不美之質 求變而美 非百倍其功 不足以致之 今以鹵莽滅裂之學 或作或輟 以變其不美","source":"중용"},{"text":"之質 及不能變 則曰天質不美 非學所能變 是果於自棄 其爲不仁 甚矣 ○ 右第二十章 此","source":"중용"},{"text":"引孔子之言 以繼大舜文武周公之緖 明其所傳之一致 擧而措之 亦猶是爾 蓋包費隱 兼小大","source":"중용"},{"text":"以終十二章之意 章內 語誠始詳 而所謂誠者 實此篇之樞紐也 又按孔子家語 亦載此章而其","source":"중용"},{"text":"文尤詳 成功一也之下 有公曰 子之言 美矣至矣 寡人實固不足以成之也 故其下 復以子曰","source":"중용"},{"text":"起答辭 今無此問辭而猶有子曰二字 蓋子思刪其繁文 以附于篇而所刪有不盡者 今當爲衍文","source":"중용"},{"text":"也 博學之以下 家語無之 意彼有闕文 抑此或子思所補也歟","source":"중용"},{"text":"中庸21章","source":"중용"},{"text":"21-01 自誠明 謂之性 自明誠 謂之敎 誠則明矣 明則誠矣","source":"중용"},{"text":"自由也 德無不實而明無不照者 聖人之德 所性而有者也 天道也 先明乎善而後 能實其善者","source":"중용"},{"text":"賢人之學 由敎而入者也 人道也 誠則無不明矣 明則可以至於誠矣 ○ 右第二十一章 子思","source":"중용"},{"text":"承上章夫子天道人道之意而立言也 自此以下十二章 皆子思之言 以反覆推明此章之意","source":"중용"},{"text":"中庸22章","source":"중용"},{"text":"22-01 唯天下至誠 爲能盡其性 能盡其性則能盡人之性 能盡人之性則能盡物之性 能盡物","source":"중용"},{"text":"之 性則可以贊天地之化育 可以贊天地之化育則可以與天地參矣","source":"중용"},{"text":"天下至誠 謂聖人之德之實 天下莫能加也 盡其性者 德無不實 故無人欲之私 而天命之在我","source":"중용"},{"text":"者 察之由之 巨細精粗 無毫髮之不盡也 人物之性亦我之性 但以所賦形氣不同而有異耳 能","source":"중용"},{"text":"盡之者 謂知之無不明而處之無不當也 贊猶助也 與天地參 謂與天地並立而爲三也 此自誠","source":"중용"},{"text":"而明者之事也 ○ 右第二十二章 言天道也","source":"중용"},{"text":"中庸23章","source":"중용"},{"text":"23-01 其次 致曲 曲能有誠 誠則形 形則著 著則明 明則動 動則變 變則化 唯天下至誠","source":"중용"},{"text":"其次通大賢以下凡誠有未至者而言也 致推致也 曲一偏也 形者積中而發外 著則又加顯矣","source":"중용"},{"text":"明則又有光輝發越之誠也 動者誠能動物 變者物從而變 化則有不知其所以然者 蓋人之性","source":"중용"},{"text":"無不同 而氣則有異 故惟聖人能擧其性之全體而盡之 其次則必自其善端發見之偏而悉推致","source":"중용"},{"text":"之 以各造其極也 曲無不致 則德無不實 而形著動變之功 自不能已 積而至於能化 則其至","source":"중용"},{"text":"誠之妙 亦不異於聖人矣 ○ 右第二十三章 言人道也","source":"중용"},{"text":"中庸24章","source":"중용"},{"text":"24-01 至誠之道 可以前知 國家將興 必有禎祥 國家將亡 必有妖孼 見乎蓍龜 動乎四體","source":"중용"},{"text":"禍 福將至 善 必先知之 不善 必先知之 故至誠 如神","source":"중용"},{"text":"禎祥者福之兆 妖孼者禍之萌 蓍所以筮 龜所以卜 四體謂動作威儀之間 如執玉高卑 其容俯","source":"중용"},{"text":"仰之類 凡此 皆理之先見者也 然 唯誠之至極而無一毫私僞留於心目之間者 乃能有以察其","source":"중용"},{"text":"幾焉 神謂鬼神 ○ 右第二十四章 言天道也","source":"중용"},{"text":"中庸25章","source":"중용"},{"text":"25-01 誠者 自成也 而道 自道也","source":"중용"},{"text":"言誠者 物之所以自成 而道者 人之所當自行也 誠以心言 本也 道以理言 用也","source":"중용"},{"text":"25-02 誠者 物之終始 不誠 無物 是故君子 誠之爲貴","source":"중용"},{"text":"天下之物 皆實理之所爲 故必得是理然後 有是物 所得之理旣盡 則是物亦盡而無有矣 故人","source":"중용"},{"text":"之心 一有不實 則雖有所爲 亦如無有 而君子必以誠爲貴也 蓋人之心 能無不實 乃爲有以","source":"중용"},{"text":"自成 而道之在我者亦無不行矣","source":"중용"},{"text":"25-03 誠者 非自成己而已也 所以成物也 成己 仁也 成物 知也 性之德也 合內外之道也","source":"중용"},{"text":"故 時措之宜也","source":"중용"},{"text":"誠雖所以成己 然旣有以自成 則自然及物 而道亦行於彼矣 仁者體之存 知者用之發 是皆吾","source":"중용"},{"text":"性之固有而無內外之殊 旣得於己 則見於事者以時措之而皆得其宜也 ○ 右第二十五章 言","source":"중용"},{"text":"中庸26章","source":"중용"},{"text":"26-01 故至誠 無息","source":"중용"},{"text":"旣無虛假 自無間斷","source":"중용"},{"text":"26-02 不息則久 久則徵","source":"중용"},{"text":"久常於中也 徵驗於外也","source":"중용"},{"text":"26-03 徵則悠遠 悠遠則博厚 博厚則高明","source":"중용"},{"text":"此皆以其驗於外者言之 鄭氏所謂至誠之德著於四方者 是也 存諸中者旣久 則驗於外者益悠","source":"중용"},{"text":"遠而無窮矣 悠遠故 其積也廣博而深厚 博厚故 其發也高大而光明","source":"중용"},{"text":"26-04 博厚 所以載物也 高明 所以覆物也 悠久 所以成物也","source":"중용"},{"text":"悠久卽悠遠 兼內外而言之也 本以悠遠致高厚 而高厚又悠久也 此言聖人與天地同用","source":"중용"},{"text":"26-05 博厚配地 高明配天 悠久無疆","source":"중용"},{"text":"此言聖人與天地同體","source":"중용"},{"text":"26-06 如此者 不見而章 不動而變 無爲而成","source":"중용"},{"text":"見猶示也 不見而章 以配地而言也 不動而變 以配天而言也 無爲而成 以無疆而言也","source":"중용"},{"text":"26-07 天地之道 可一言而盡也 其爲物 不貳 則其生物 不測","source":"중용"},{"text":"此以下 復以天地 明至誠無息之功用 天地之道可一言而盡 不過曰誠而已 不貳所以誠也 誠","source":"중용"},{"text":"故 不息而生物之多 有莫知其所以然者","source":"중용"},{"text":"26-08 天地之道 博也厚也高也明也悠也久也","source":"중용"},{"text":"言天地之道誠一不貳 故能各極其盛 而有下文生物之功","source":"중용"},{"text":"26-09 今夫天 斯昭昭之多 及其無窮也 日月星辰 繫焉 萬物 覆焉 今夫地一撮土之多 及","source":"중용"},{"text":"其 廣厚 載華嶽而不重 振河海而不洩 萬物載焉 今夫山一卷石之多 及其廣大 草木生之 禽","source":"중용"},{"text":"獸居之 寶藏興焉 今夫水一勺之多 及其不測 黿鼉蛟龍魚鼈生焉 貨財殖焉","source":"중용"},{"text":"昭昭猶耿耿 小明也 此指其一處而言之 及其無窮 猶十二章及其至也之意 蓋擧全體而言也","source":"중용"},{"text":"振收也 卷區也 此四條 皆以發明由其不貳不息 以致盛大而能生物之意 然天地山川 實非由","source":"중용"},{"text":"積累而後大 讀者不以辭害意可也","source":"중용"},{"text":"26-10 詩云 維天之命 於穆不已 蓋曰天之所以爲天也 於乎不顯 文王之德之純 蓋曰文王","source":"중용"},{"text":"之 所以爲文也 純亦不已","source":"중용"},{"text":"詩周頌維天之命篇 於歎辭 穆深遠也 不顯猶言豈不顯也 純純一不雜也 引此以明至誠無息","source":"중용"},{"text":"之意 程子曰 天道不已 文王純於天道亦不已 純則無二無雜 不已則無間斷先後 ○ 右第二","source":"중용"},{"text":"十六章 言天道也","source":"중용"},{"text":"中庸27章","source":"중용"},{"text":"27-01 大哉 聖人之道","source":"중용"},{"text":"包下文兩節而言","source":"중용"},{"text":"27-02 洋洋乎 發育萬物 峻極于天","source":"중용"},{"text":"峻高大也 此言道之極於至大而無外也","source":"중용"},{"text":"27-03 優優大哉 禮儀三百 威儀三千","source":"중용"},{"text":"優優充足有餘之意 禮儀經禮也 威儀曲禮也 此言道之入於至小而無間也","source":"중용"},{"text":"27-04 待其人而後行","source":"중용"},{"text":"總結上兩節","source":"중용"},{"text":"27-05 故曰 苟不至德 至道不凝焉","source":"중용"},{"text":"至德謂其人 至道指上兩節而言 凝聚也 成也","source":"중용"},{"text":"27-06 故君子 尊德性而道問學 致廣大而盡精微 極高明而道中庸 溫故而知新 敦厚以崇禮","source":"중용"},{"text":"尊者恭敬奉持之意 德性者 吾所受於天之正理 道由也 溫猶燖溫之溫 謂故學之矣 復時習之","source":"중용"},{"text":"也 敦加厚也 尊德性 所以存心而極乎道體之大也 道問學 所以致知而盡乎道體之細也 二者","source":"중용"},{"text":"脩德凝道之大端也 不以一毫私意自蔽 不以一毫私欲自累 涵泳乎其所已知 敦篤乎其所已能","source":"중용"},{"text":"此皆存心之屬也 析理則不使有 毫釐之差 處事則不使有過不及之謬 理義則日知其所未知","source":"중용"},{"text":"節文則日謹其所未謹 此皆致知之屬也 蓋非存心 無以致知 而存心者 又不可以不致知 故此","source":"중용"},{"text":"五句 大小相資 首尾相應 聖賢所示入德之方 莫詳於此 學者宜盡心焉","source":"중용"},{"text":"27-07 是故居上不驕 爲下不倍 國有道 其言足以興 國無道 其黙 足以容 詩曰 旣明且哲","source":"중용"},{"text":"以保其身 其此之謂與","source":"중용"},{"text":"興謂興起在位也 詩大雅烝民之篇 ○ 右第二十七章 言人道也","source":"중용"},{"text":"中庸28章","source":"중용"},{"text":"28-01 子曰 愚而好自用 賤而好自專 生乎今之世 反古之道 如此者 災及其身者也","source":"중용"},{"text":"以上孔子之言 子思引之 反復也","source":"중용"},{"text":"28-02 非天子 不議禮 不制度 不考文","source":"중용"},{"text":"此以下子思之言 禮親疎貴賤相接之禮也 度品制 文書名","source":"중용"},{"text":"28-03 今天下 車同軌 書同文 行同倫","source":"중용"},{"text":"今子思自謂當時也 軌轍迹之度 倫次序之體 三者皆同 言天下一統也","source":"중용"},{"text":"28-04 雖有其位 苟無其德 不敢作禮樂焉 雖有其德 苟無其位 亦不敢作禮樂焉","source":"중용"},{"text":"鄭氏曰 言作禮樂者 必聖人在天子之位","source":"중용"},{"text":"28-05 子曰 吾說夏禮 杞不足徵也 吾學殷禮 有宋 存焉 吾學周禮 今用之 吾從周","source":"중용"},{"text":"此又引孔子之言 杞夏之後 徵證也 宋殷之後 三代之禮 孔子皆嘗學之而能言其意 但夏禮","source":"중용"},{"text":"旣不可考證 殷禮雖存 又非當世之法 惟周禮 乃時王之制 今日所用 孔子旣不得位 則從周","source":"중용"},{"text":"而已 ○ 右第二十八章 承上章爲下不倍而言 亦人道也","source":"중용"},{"text":"中庸29章","source":"중용"},{"text":"29-01 王天下 有三重焉 其寡過矣乎","source":"중용"},{"text":"呂氏曰 三重謂議禮 制度 考文 惟天子得以行之 則國不異政 家不殊俗 而人得寡過矣","source":"중용"},{"text":"29-02 上焉者 雖善 無徵 無徵 不信 不信 民弗從 下焉者 雖善 不尊 不尊 不信 不信 民","source":"중용"},{"text":"上焉者謂時王以前 如夏商之禮雖善 而皆不可考 下焉者謂聖人在下 如孔子雖善於禮 而不","source":"중용"},{"text":"29-03 故君子之道 本諸身 徵諸庶民 考諸三王而不謬 建諸天地而不悖 質諸鬼神而無疑","source":"중용"},{"text":"百世以俟聖人而不惑","source":"중용"},{"text":"此君子指王天下者而言 其道卽議禮制度考文之事也 本諸身有其德也 徵諸庶民 驗其所信從","source":"중용"},{"text":"也 建立也 立於此而參於彼也 天地者道也 鬼神者造化之迹也 百世以俟聖人而不惑 所謂聖","source":"중용"},{"text":"人復起 不易吾言者也","source":"중용"},{"text":"29-04 質諸鬼神而無疑 知天也 百世以俟聖人而不惑 知人也","source":"중용"},{"text":"知天知人知其理也","source":"중용"},{"text":"29-05 是故君子 動而世爲天下道 行而世爲天下法 言而世爲天下則 遠之則有望 近之則不","source":"중용"},{"text":"動兼言行而言 道兼法則而言 法法度也 則準則也","source":"중용"},{"text":"29-06 詩曰 在彼無惡 在此無射 庶幾夙夜 以永終譽 君子 未有不如此而蚤有譽於天下者","source":"중용"},{"text":"詩周頌振鷺之篇 射厭也 所謂此者 指本諸身以下六事而言 ○ 右第二十九章 承上章居上不","source":"중용"},{"text":"驕而言 亦人道也","source":"중용"},{"text":"中庸30章","source":"중용"},{"text":"30-01 仲尼 祖述堯舜 憲章文武 上律天時 下襲水土","source":"중용"},{"text":"祖述者 遠宗其道 憲章者 近守其法 律天時者 法其自然之運 襲水土者 因其一定之理 皆兼","source":"중용"},{"text":"內外該本末而言也","source":"중용"},{"text":"30-02 辟如天地之無不持載 無不覆幬 辟如四時之錯行 如日月之代明","source":"중용"},{"text":"錯猶迭也 此言聖人之德","source":"중용"},{"text":"30-03 萬物竝育而不相害 道竝行而不相悖 小德川流 大德敦化 此天地之所以爲大也","source":"중용"},{"text":"悖猶背也 天覆地載 萬物並育於其間而不相害 四時日月 錯行代明而不相悖 所以不害不悖","source":"중용"},{"text":"者 小德之川流 所以並育並行者 大德之敦化 小德者 全體之分 大德者 萬殊之本 川流者","source":"중용"},{"text":"如川之流 脈絡分明而往不息也 敦化者 敦厚其化 根本盛大而出無窮也 此言天地之道 以見","source":"중용"},{"text":"上文取譬之意也 ○ 右第三十章 言天道也","source":"중용"},{"text":"中庸31章","source":"중용"},{"text":"31-01 唯天下至聖 爲能聰明睿知 足以有臨也 寬裕溫柔足以有容也 發强剛毅 足以有執也","source":"중용"},{"text":"齊莊中正 足以有敬也 文理密察 足以有別也","source":"중용"},{"text":"聰明睿知生知之質 臨謂居上而臨下也 其下四者 乃仁義禮智之德 文文章也 理條理也 密詳","source":"중용"},{"text":"細也 察明辨也","source":"중용"},{"text":"31-02 溥博淵泉 而時出之","source":"중용"},{"text":"溥博周徧而廣濶也 淵泉靜深而有本也 出發見也 言五者之德 充積於中而以時發見於外也","source":"중용"},{"text":"31-03 溥博如天 淵泉如淵 見而民莫不敬 言而民莫不信 行而民莫不說","source":"중용"},{"text":"言其充積極其盛而發見當其可也","source":"중용"},{"text":"31-04 是以 聲名洋溢乎中國 施及蠻貊 舟車所至 人力所通 天之所覆 地之所載 日月所照","source":"중용"},{"text":"霜露所隊 凡有血氣者 莫不尊親 故曰配天","source":"중용"},{"text":"舟車所至以下 蓋極言之 配天言其德之所及 廣大如天也 ○ 右第三十一章 承上章而言小德","source":"중용"},{"text":"之川流 亦天道也","source":"중용"},{"text":"中庸32章","source":"중용"},{"text":"32-01 唯天下至誠 爲能經綸天下之大經 立天下之大本 知天地之化育 夫焉有所倚","source":"중용"},{"text":"經綸皆治絲之事 經者理其緖而分之 綸者比其類而合之也 經常也 大經者五品之人倫 大本","source":"중용"},{"text":"者 所性之全體也 惟聖人之德 極誠無妄 故於人倫 各盡其當然之實 而皆可以爲天下後世法","source":"중용"},{"text":"所謂經綸之也 其於所性之全體 無一毫人欲之僞以雜之 而天下之道千變萬化 皆由此出 所","source":"중용"},{"text":"謂立之也 其於天地之化育 則亦其極誠無妄者有黙契焉 非但聞見之知而已 此皆至誠無妄自","source":"중용"},{"text":"然之功用 夫豈有所倚著於物而後能哉","source":"중용"},{"text":"32-02 肫肫其仁 淵淵其淵 浩浩其天","source":"중용"},{"text":"肫肫 懇至貌 以經綸而言也 淵淵靜深貌 以立本而言也 浩浩廣大貌 以知化而言也 其淵其","source":"중용"},{"text":"天 則非特如之而已","source":"중용"},{"text":"32-03 苟不固聰明聖知達天德者 其孰能知之","source":"중용"},{"text":"固猶實也 鄭氏曰 唯聖人能知聖人也 ○ 右第三十二章 承上章而言大德之敦化 亦天道也","source":"중용"},{"text":"前章 言至聖之德 此章 言至誠之道 然至誠之道 非至聖 不能知 至聖之德 非至誠 不能爲","source":"중용"},{"text":"則亦非二物矣 此篇 言聖人天道之極致至此而無以加矣","source":"중용"},{"text":"中庸33章","source":"중용"},{"text":"33-01 詩曰 衣錦尙絅 惡其文之著也 故君子之道 闇然而日章 小人之道 的然而日亡 君子","source":"중용"},{"text":"之道 淡而不厭 簡而文 溫而理 知遠之近 知風之自 知微之顯 可與入德矣","source":"중용"},{"text":"前章 言聖人之德 極其盛矣 此復自下學立心之始言之 而下文 又推之 以至其極也 詩國風","source":"중용"},{"text":"衛碩人 鄭之丰 皆作衣錦褧衣 褧絅同 禪衣也 尙加也 古之學者爲己 故其立心如此 尙絅故","source":"중용"},{"text":"闇然 衣錦故 有日章之實 淡簡溫 絅之襲於外也 不厭而文且理焉 錦之美在中也 小人反是","source":"중용"},{"text":"則暴於外而無實以繼之 是以 的然而日亡也 遠之近 見於彼者由於此也 風之自 著乎外者本","source":"중용"},{"text":"乎內也 微之顯 有諸內者形諸外也 有爲己之心 而又知此三者 則知所謹而可入德矣 故 下","source":"중용"},{"text":"文 引詩 言謹獨之事","source":"중용"},{"text":"33-02 詩云 潛雖伏矣 亦孔之昭 故君子內省不疚 無惡於志 君子之所不可及者 其唯人之","source":"중용"},{"text":"詩小雅正月之篇 承上文 言莫見乎隱 莫顯乎微也 疚病也 無惡於志猶言無愧於心 此君子謹","source":"중용"},{"text":"33-03 詩云 相在爾室 尙不愧于屋漏 故君子 不動而敬 不言而信","source":"중용"},{"text":"詩大雅抑之篇 相視也 屋漏室西北隅也 承上文 又言君子之戒謹恐懼 無時不然 不待言動而","source":"중용"},{"text":"後敬信 則其爲己之功 益加密矣 故下文 引詩 幷言其效","source":"중용"},{"text":"33-04 詩曰 奏假無言 時靡有爭 是故君子 不賞而民勸 不怒而民威於鈇鉞","source":"중용"},{"text":"詩商頌烈祖之篇 奏進也 承上文而遂及其效 言進而感格於神明之際 極其誠敬 無有言說而","source":"중용"},{"text":"人自化之也 威畏也 鈇莝斫刀也 鉞斧也","source":"중용"},{"text":"33-05 詩曰 不顯惟德 百辟其刑之 是故 君子篤恭而天下平","source":"중용"},{"text":"詩周頌烈文之篇 不顯說見二十六章 此借引以爲幽深玄遠之意 承上文 言天子有不顯之德","source":"중용"},{"text":"而諸侯法之 則其德愈深而效悠遠矣 篤厚也 篤恭言不顯其敬也 篤恭而天下平 乃聖人至德","source":"중용"},{"text":"淵微自然之應 中庸之極功也","source":"중용"},{"text":"33-06 詩云 予懷明德 不大聲以色 子曰 聲色之於以化民 末也 詩云 德輶如毛 毛猶有倫","source":"중용"},{"text":"上天之載 無聲無臭 至矣","source":"중용"},{"text":"詩大雅皇矣之篇 引之 以明上文所謂不顯之德者 正以其不大聲與色也 又引孔子之言 以爲","source":"중용"},{"text":"聲色 乃化民之末務 今但言不大之而已 則猶有聲色者存 是未足以形容不顯之妙 不若烝民","source":"중용"},{"text":"之詩所言德輶如毛 則庶乎可以形容矣 而又自以爲謂之毛 則猶有可比者 是亦未盡其妙 不","source":"중용"},{"text":"若文王之詩所言上天之事無聲無臭 然後 乃爲不顯之至耳 蓋聲臭 有氣無形 在物 最爲微妙","source":"중용"},{"text":"而猶曰無之 故惟此可以形容不顯篤恭之妙 非此德之外 又別有是三等然後爲至也 ○ 右第","source":"중용"},{"text":"三十三章 子思因前章極致之言 反求其本 復自下學爲己謹獨之事 推而言之 以馴致乎篤恭","source":"중용"},{"text":"而天下平之盛 又贊其妙 至於無聲無臭而後已焉 蓋擧一篇之要而約言之 其反復丁寧示人之","source":"중용"},{"text":"意 至深切矣 學者其可不盡心乎","source":"중용"}];
var SW={"豫": {"original": "象之大者，賈侍中說，不害於物。从象，予聲。（羊茹切）", "interp": "코끼리 중에서 큰 것이다. 가시중(賈侍中)의 설에 의하면 사물을 해치지 않는다고 하였다. 象을 의미부로 하고 予를 소리부로 한다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 豫는 본래 코끼리의 일종으로 성질이 유순하여 해를 끼치지 않는 동물을 가리켰다. 이로부터 \"편안히 즐기다(逸豫)\"는 뜻이 파생되었고, 다시 \"미리 준비하다(豫備)\"의 의미로 확장되었다. 《주역》 豫卦의 괘명도 이 글자에서 취한 것으로, 先儒들은 豫를 \"기뻐하다(悅豫)\"와 \"미리 준비하다\"의 두 가지 의미로 해석하였다. 임용시험에서는 豫의 字形 분석(从象予聲)과 의미 변천이 자주 출제된다."}, "俗": {"original": "習也。从人，谷聲。（似足切）", "interp": "익힌 것이다. 人(사람)을 의미부로 하고 谷을 소리부로 한다. 반절음은 似足切이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 俗의 핵심 의미는 \"사람들 사이에 반복하여 익혀진 것(習尙)\"이다. 段玉裁는 習을 \"새가 날개를 반복 움직여 나는 법을 익히는 것\"으로 풀이하고, 이것이 인간의 풍속·관습에 비유된 것임을 밝혔다. 谷이 소리부인 동시에 \"통한다(通)\"는 의미를 가지므로, 俗은 \"사람들 사이에 두루 통하여 익혀진 것\"이다. 《論語》에서 鄕原을 \"德之賊\"이라 한 것도 진정한 풍속과 덕의 관계를 보여준다."}, "仁": {"original": "親也。从人，从二。（如鄰切）", "interp": "친하게 여기는 것이다. 人(사람)과 二(둘)로 이루어진 회의자이다. 두 사람이 서로 가깝게 지내는 모습이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 仁의 자형은 두 사람이 서로 가깝게 지내는 모습을 나타낸 회의자이다. 程頤는 仁을 만물과 하나가 되는 天理로 이해하였고, 朱熹는 \"仁은 마음의 덕이요 사랑의 이치(心之德愛之理)\"라 정의하였다. 《논어》 〈옹야〉의 \"己欲立而立人\"은 仁의 실천적 의미를 잘 드러내며, 인의 개념은 四書 전반의 핵심을 이룬다."}, "義": {"original": "己之威儀也。从我，从羊。（宜寄切）", "interp": "자기의 위의(威儀)이다. 我(나)와 羊(양)으로 이루어진 회의자이다. 바른 몸가짐과 예의 있는 행동을 뜻한다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 義의 자형에서 羊은 아름답고 선한 것의 상징이며, 我는 원래 무기를 든 사람의 모습이다. 後代에는 義를 \"宜(마땅하다)\"와 연결하여 \"각각의 상황에 마땅한 도리\"로 해석하는 것이 보편화되었다. 孟子는 義를 仁과 함께 인간 본성의 핵심으로 보았으며, \"羞惡之心이 義의 단서\"라고 하였다."}, "禮": {"original": "履也，所以事神致福也。从示，豊聲。（靈啓切）", "interp": "실천하는 것이니, 신을 섬겨 복을 이루는 수단이다. 示(제사)를 의미부로 하고 豊을 소리부로 한다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 豊는 제기에 제물이 가득 찬 모습을 나타내어 禮의 의미부로도 작용한다. 許愼이 履(실천하다)로 풀이한 것은 禮가 단순한 형식이 아닌 실천적 규범임을 뜻한다. 荀子는 禮를 인간 사회질서의 근본으로 보았고, 朱熹는 天理의 절문(節文)이라 하였다."}, "學": {"original": "覺悟也。从教，冖，尚蒙也，臼聲。（胡覺切）", "interp": "깨달아 아는 것이다. 教를 의미부로 하고, 冖은 아직 덮여 있음이며, 臼가 소리부이다. 배움을 통해 덮인 것을 깨쳐 나가는 과정이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 學의 갑골문 자형은 두 손으로 산가지(爻)를 쥐고 아이(子)가 배우는 구체적인 교육 장면을 묘사하였다. 朱熹는 學을 \"效(본받다)\"로 풀이하여 \"선각자의 행위를 본받아 스스로의 선한 본성을 회복하는 것\"이라 하였다. 《논어》 첫 장이 \"學而時習之\"로 시작한다는 사실 자체가 儒家에서 學의 위상을 잘 보여준다."}, "道": {"original": "所行道也。从辵，首聲。一達謂之道。（徒皓切）", "interp": "사람이 다니는 길이다. 辵(걷다)을 의미부로 하고 首가 소리부이다. 사방이 통하는 것을 道라 한다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 道의 자형에서 辵은 걷는 행위를, 首는 머리·방향을 나타낸다. 유가에서는 道를 \"사람이 마땅히 행해야 할 길\"로, 道家에서는 천지 만물의 근원적 원리로 각각 확장하였다. 朱熹는 道를 \"사물에 당연히 갖추어진 이치\"로 정의하였으며, 《중용》의 \"天命之謂性, 率性之謂道\"는 道의 형이상학적 의미를 잘 보여준다."}, "德": {"original": "升也。从彳，惪聲。（多則切）", "interp": "오르는 것이다. 彳(걷다)을 의미부로 하고 惪이 소리부이다. 도덕적으로 향상되고 진보함을 뜻한다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 德의 갑골문·금문 자형은 彳+直+心의 회의자였다. 惪은 直+心으로, \"마음이 곧은 것\"이 德의 원래 의미이다. 朱熹는 德을 \"道를 행하여 마음에 얻은 것(行道而有得於心)\"으로 정의하였다. 자형 변천(갑골문→금문→소전)과 의미 변화는 임용시험의 중요한 출제 포인트이다."}, "天": {"original": "顚也。至高無上，从一，大。（他前切）", "interp": "정수리이다. 지극히 높아 위가 없으니, 一과 大로 이루어진 회의자이다. 사람의 정수리 위에 있는 가장 높은 것이 하늘이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 갑골문에서 天은 大(큰 사람)의 머리 위를 강조한 지사자이다. 유가에서 天은 道德의 근원이자 命令의 주체로서 중요한 의미를 가지며, 《중용》의 \"天命之謂性\"에서 天命 개념이 핵심적으로 드러난다."}, "心": {"original": "人心，土藏，在身之中，象形。博士說以爲火藏。（息林切）", "interp": "사람의 심장으로, 오장 중 토에 속하는 장기이며 몸의 가운데 있다. 상형자이다. 박사설에서는 화에 속하는 장기라고도 한다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 心의 갑골문 자형은 심장의 모양을 직접 본뜬 상형자이다. 유가에서 心은 도덕적 판단과 감정의 주체로서 핵심적 위치를 차지한다. 孟子는 \"惻隱之心이 仁의 단서\"라 하였고, 程朱는 心을 性과 情을 통괄하는 주재자로 보았다."}, "性": {"original": "人之陽氣，性善者也。从心，生聲。（息正切）", "interp": "사람의 양기로, 본성이 선한 것이다. 心을 의미부로 하고 生을 소리부로 한다. 마음에서 태어나는 타고난 본성이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 許愼이 性善을 명시한 것은 孟子의 性善說을 반영한다. 程頤는 \"性卽理\"라 하여 性을 天理와 동일시하였고, 朱熹는 \"性은 마음에 갖추어진 이치\"라 하였다. 《중용》의 \"天命之謂性, 率性之謂道\"는 性 개념의 형이상학적 근거를 제시하는 핵심 명제이다."}, "誠": {"original": "信也。从言，成聲。（氏征切）", "interp": "믿음이다. 言(말)을 의미부로 하고 成을 소리부로 한다. 말이 이루어지는, 거짓 없는 참됨이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 成은 소리부이면서 \"이루어짐\"의 의미도 함축하여 \"말이 이루어지는 것\"이 誠의 본래 뜻이다. 朱熹는 誠을 \"眞實無妄\"으로 정의하였다. 《中庸》에서 誠은 \"誠者天之道, 誠之者人之道\"라 하여 天道와 人道를 연결하는 핵심 개념으로 격상되었다."}, "孝": {"original": "善事父母者。从老省，从子；子承老也。（呼教切）", "interp": "부모를 잘 섬기는 것이다. 老의 생략형과 子로 이루어진 회의자이다. 아이가 노인을 받드는 모습이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 許愼의 \"子承老\"라는 분석은 자형으로 효도의 의미를 정확하게 포착한 탁월한 해석이다. 《효경》에서는 孝를 모든 德의 근본(百行之本)으로 높였고, 《논어》에서도 \"孝弟는 仁의 근본\"이라 하였다. 孝는 자형 분석과 유가 윤리에서의 위상이 임용시험의 핵심 출제 내용이다."}, "中": {"original": "內也，从囗；｜，上下通。（陟弓切）", "interp": "안이다. 口를 의미부로 하며, 세로획이 위아래를 통한다. 어떤 공간의 한가운데를 직접 가리키는 지사자이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 程子는 \"偏倚함이 없는 것을 中이라 한다\"고 하였고, 《中庸》에서 \"喜怒哀樂이 아직 발하지 않은 상태\"가 中임을 밝혔다. 中이 中庸·時中·守中 등의 핵심 개념으로 쓰이는 방식은 임용시험에서 반드시 숙지해야 할 내용이다."}, "和": {"original": "相應也。从口，禾聲。（戶戈切）", "interp": "서로 호응하는 것이다. 口를 의미부로 하고 禾를 소리부로 한다. 음악에서 소리들이 서로 어울리는 것이 원래 의미이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 和의 원래 의미는 음악에서 소리들이 서로 호응하는 것으로, 이로부터 인간 관계의 조화로 의미가 확장되었다. 《중용》에서 \"發而皆中節謂之和\"라 하여 和를 인간 감정의 적절한 표현으로 정의하였다. 和는 中과 대를 이루어 中和 개념을 형성하는 유가 도덕철학의 핵심 범주이다."}, "王": {"original": "天下所歸往也。董仲舒曰：古之造文者，三畫而連其中謂之王。（雨方切）", "interp": "천하가 귀의하는 대상이다. 董仲舒는 세 획을 긋고 그 가운데를 연결한 것을 王이라 하였다. 天·地·人 三才를 관통하는 존재이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 王의 세 획은 天·地·人 三才를 상징하고 가운데 획이 이를 관통하는 것은 王이 삼재를 하나로 다스리는 존재임을 나타낸다. 갑골문의 王자는 본래 도끼의 형태로 보기도 한다. 孟子는 \"以德行仁者王\"이라 하여 德治로 다스리는 것이 진정한 王道임을 강조하였다."}, "民": {"original": "衆萌也。从古文之象。（彌鄰切）", "interp": "무리 지어 싹트는 것이다. 고문의 모양을 본뜬 것이다. 수많은 사람이 싹처럼 돋아나는 것을 비유한다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 民의 갑골문 자형에 대해 눈에 침을 찌르는 모습으로 노예를 나타낸다는 견해가 있다. 孟子는 民을 社稷보다 귀하게 여겨 \"民爲貴, 社稷次之, 君爲輕\"이라 하였으며, 이는 民本思想의 핵심 명제이다. 民의 자형 논쟁과 민본 개념은 임용시험의 중요한 출제 주제이다."}, "善": {"original": "吉也。从誩，从羊。此與義美同意。（常演切）", "interp": "길한 것이다. 誩와 羊으로 이루어진 회의자이다. 義, 美와 같은 뜻으로, 모두 羊을 포함하여 바르고 아름다운 것을 나타낸다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 善·義·美 모두 羊을 구성 요소로 포함하는 것은 양이 상서로운 동물로 인식되었기 때문이다. 孟子는 \"可欲之謂善\"이라 하여 善을 욕구할 만한 것으로 정의하고, 인간 본성이 본래 善함을 역설하였다. 性善說의 근거로서 善 개념은 四書 전반에서 핵심적 역할을 한다."}, "文": {"original": "錯畫也。象交文。（無分切）", "interp": "교차하는 획이다. 교차하는 무늬를 본뜬 상형자이다. 본래 무늬를 뜻하다가 글자·문장·문화로 의미가 확장되었다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 文의 갑골문 자형은 가슴에 문신(刺靑)을 새긴 사람의 모습으로 해석된다. 《논어》에서 孔子는 文을 德과 함께 인격 수양의 양축으로 강조하였으며, \"文質彬彬, 然後君子\"는 文의 교양적 의미를 잘 보여준다. 文의 자형 변천은 육서(六書) 상형의 전형적 사례로 자주 인용된다."}, "忠": {"original": "敬也。从心，中聲。（陟弓切）", "interp": "공경하는 것이다. 心을 의미부로 하고 中을 소리부로 한다. 마음의 중심에서 우러나는 성실함이다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 忠의 形聲 구조에서 中은 소리부이면서 \"마음의 중심\"이라는 의미도 함축한다. 朱熹는 忠을 \"盡己之謂忠(자기 마음을 다하는 것)\"으로 정의하였다. 忠은 恕와 함께 孔子 仁의 핵심 실천 방법으로, 《논어》 〈이인〉의 \"吾道一以貫之, 忠恕而已矣\"에서 그 중요성이 드러난다."}, "恕": {"original": "仁也。从心，如聲。（商署切）", "interp": "仁이다. 心을 의미부로 하고 如를 소리부로 한다. 如(같다)에서 내 마음과 같이 남을 헤아리는 뜻이 나온다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 朱熹는 恕를 \"推己及人(자기를 미루어 남에게까지 미침)\"으로 정의하였다. 《논어》에서 子貢이 \"평생 실천할 한 마디\"를 묻자 孔子가 \"恕\"라고 답한 것은 恕의 도덕적 핵심을 잘 보여준다. 忠恕는 유가 仁의 실천론에서 가장 중요한 개념 쌍이다."}, "命": {"original": "使也。从口，从令。（眉病切）", "interp": "시키는 것이다. 口와 令으로 이루어진 회의자이다. 입으로 명령하는 것에서 천명·목숨·운명으로 의미가 확장되었다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 命과 令은 원래 같은 글자였다가 후에 분화되었다. 《중용》의 \"天命之謂性\"은 命 개념의 형이상학적 정점을 보여주며, 天命·命運의 유가적 해석은 임용시험에서 반복 출제되는 중요한 주제이다."}, "春": {"original": "推也。从艸屯，从日，艸春時生也。會意，屯亦聲。（昌脣切）", "interp": "밀어 올리는 것이다. 艸와 屯과 日로 이루어진 회의자로, 풀이 봄에 돋아남을 나타낸다. 양기가 만물을 밀어올려 생장하게 하는 봄의 성질을 표현한다.", "duan": "段玉裁의 《說文解字注》를 비롯한 後代 주석서들을 보면, 春의 \"推\"라는 풀이는 양기(陽氣)가 만물을 밀어올려 생장하게 하는 봄의 성질을 표현한다. 艸(풀)+日(해)+屯(씨앗이 싹트는 모습)의 결합은 봄의 생장 과정을 시각적으로 묘사한 것이다. 四書에서 春은 사계절의 순환을 통해 道德의 운행 원리를 설명하는 데 자주 활용된다."}};

  if(!/[\u4e00-\u9fff]/.test(q)){showToast('한자를 입력하세요');return;}
  var chars=Array.from(q);
  document.getElementById('RT').textContent='"'+q+'" — 자원 탐구 결과';
  document.getElementById('RA').className='result-area on';
  renderCards(chars);

}

function drawChar(cv,ch,type){
  var th=THEMES[type]||THEMES.kai;
  var sz=cv.width;var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,sz,sz);
  ctx.fillStyle=th.bg;ctx.fillRect(0,0,sz,sz);
  if(type==='oracle'||type==='bronze'){
    ctx.fillStyle='rgba(255,200,80,0.025)';
    for(var i=0;i<40;i++){ctx.beginPath();ctx.arc(Math.random()*sz,Math.random()*sz,0.7,0,Math.PI*2);ctx.fill();}
  }
  if(type==='seal'){
    ctx.strokeStyle='rgba(80,120,180,0.06)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(sz/2,4);ctx.lineTo(sz/2,sz-4);ctx.stroke();
    ctx.beginPath();ctx.arc(sz/2,sz/2,sz*0.42,0,Math.PI*2);ctx.stroke();
  }
  var scale=sz/100;
  ctx.strokeStyle=th.stroke;ctx.lineCap='round';ctx.lineJoin='round';
  if(SP[ch]&&type!=='kai'){
    var paths=SP[ch];
    for(var pi=0;pi<paths.length;pi++){
      var parts=paths[pi].match(/[MLQC][^MLQC]*/g);if(!parts)continue;
      ctx.beginPath();ctx.lineWidth=(th.lw+Math.random()*0.8)*scale;
      for(var i=0;i<parts.length;i++){
        var cmd=parts[i][0];var nums=parts[i].slice(1).trim().split(/[\s,]+/).map(Number);
        if(cmd==='M')ctx.moveTo(nums[0]*scale,nums[1]*scale);
        else if(cmd==='L')ctx.lineTo(nums[0]*scale,nums[1]*scale);
        else if(cmd==='Q')ctx.quadraticCurveTo(nums[0]*scale,nums[1]*scale,nums[2]*scale,nums[3]*scale);
      }
      ctx.stroke();
    }
  }else{
    ctx.globalAlpha=(type==='kai')?0.88:0.28;
    ctx.fillStyle=th.stroke;
    ctx.font='bold '+Math.floor(sz*0.60)+'px Noto Serif KR,serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ch,sz/2,sz/2);ctx.globalAlpha=1;
    if(type!=='kai'){
      ctx.fillStyle=th.stroke;ctx.globalAlpha=0.4;
      ctx.font=Math.floor(sz*0.07)+'px Noto Sans KR,sans-serif';
      ctx.fillText('hanziyuan.net 참조',sz/2,sz*0.90);ctx.globalAlpha=1;
    }
  }
}

          '<div class="sw-original">'+ch+'　'+orig.original+'</div>'+

        '<div id="swai_'+i+'">'+'</div>'+
      '</div>';
    }else{
      swHtml='<div class="sw-box">'+
        '<div class="sw-header">'+
          '<div class="sw-title-wrap"><span class="sw-icon">📜</span><span class="sw-title">《說文解字》 許愼 撰</span></div>'+
          '<a class="sw-link" href="'+zdicUrl+'" target="_blank">zdic.net →</a>'+
        '</div>'+

    html+='<div class="char-card">'+

      '<div class="script-tabs">'+
        '<button class="stab t-oracle on" onclick="st('+i+',\'oracle\',\''+ch+'\')">甲骨文</button>'+
        '<button class="stab t-bronze"    onclick="st('+i+',\'bronze\',\''+ch+'\')">金文</button>'+
        '<button class="stab t-seal"      onclick="st('+i+',\'seal\',\''+ch+'\')">小篆</button>'+
        '<button class="stab t-kai"       onclick="st('+i+',\'kai\',\''+ch+'\')">楷書</button>'+
      '</div>'+

      '<div class="cv-note">'+(SP[ch]?'소전 필획 재현 · 실제 자형은 hanziyuan.net 참조':'실제 자형은 hanziyuan.net / zdic.net에서 확인')+'</div>'+
      swHtml+

  setTimeout(function(){

      var cv=document.getElementById('cv'+i);
      if(cv){cv.width=cv.offsetWidth||200;cv.height=cv.width;drawChar(cv,chars[i],'oracle');}
    }
  },50);

  // 각 한자별 說文解字 AI 해석 로드
  for(var i=0;i<chars.length;i++){

function st(idx,type,ch){
  var types=['oracle','bronze','seal','kai'];
  var card=document.querySelector('#CC .char-card:nth-child('+(idx+1)+')');
  if(!card)return;
  var tabs=card.querySelectorAll('.stab');
  for(var i=0;i<tabs.length;i++)tabs[i].className='stab '+['t-oracle','t-bronze','t-seal','t-kai'][i]+(types[i]===type?' on':'');
  var lbl=document.getElementById('cvb'+idx);
  if(lbl){lbl.textContent=THEMES[type].label;lbl.className='cv-badge '+type;}
  var cv=document.getElementById('cv'+idx);
  if(cv){cv.width=cv.offsetWidth||200;cv.height=cv.width;drawChar(cv,ch,type);}
}

/* ── 說文解字 정적 렌더 ── */
function renderSWContent(ch, idx){
  var el=document.getElementById('swai_'+idx);
  if(!el)return;
  var d=SW[ch];
  if(!d){el.innerHTML='<div class="sw-nodata">zdic.net에서 원문을 확인하세요.</div>';return;}
  var html=
    '<div class="sw-orig-label">원문 해석</div>'+
    '<div class="sw-interp"><p>'+d.interp+'</p></div>'+
    '<div class="sw-orig-label" style="margin-top:12px">後代 주석</div>'+
    '<div class="sw-interp"><p>'+d.duan+'</p></div>';
  el.innerHTML=html;
}

/* ── 예문 ── */
var _SH={};
function renderExamples(chars,q){
  _SH={};var el=document.getElementById('ES');
  var srcs=[
    {k:'\ub17c\uc5b4',l:'논어',c:'sn'},
    {k:'\ub9f9\uc790',l:'맹자',c:'sm'},
    {k:'\ub300\ud559',l:'대학',c:'sd'},
    {k:'\uc911\uc6a9',l:'중용',c:'sz'}
  ];
  var html='';
  for(var si=0;si<srcs.length;si++){
    var src=srcs[si];var res=[];
    for(var i=0;i<CLASSICS.length;i++){
      if(CLASSICS[i].source===src.k&&CLASSICS[i].text.indexOf(q)>=0)res.push(CLASSICS[i]);
    }
    if(!res.length){
      for(var i=0;i<CLASSICS.length;i++){
        if(CLASSICS[i].source===src.k){
          for(var j=0;j<chars.length;j++){if(CLASSICS[i].text.indexOf(chars[j])>=0){res.push(CLASSICS[i]);break;}}
        }
      }
    }
    if(!res.length)continue;
    _SH[src.k]=res;var show=res.slice(0,5);
    html+='<div class="ex-sec"><div class="ex-hdr"><span class="ex-ttl">'+src.l+' 용례</span><span class="ex-cnt">'+res.length+'건</span></div><div class="ex-list" id="el'+src.k+'">';
    for(var k=0;k<show.length;k++)html+='<div class="ex-item"><div><span class="ex-src '+src.c+'">'+src.l+'</span></div><div class="ex-txt">'+hl(show[k].text,chars)+'</div></div>';
    html+='</div>';
    if(res.length>5)html+='<div class="ex-more-row"><button class="btn-more" onclick="moreEx(\''+src.k+'\',\''+src.c+'\',\''+src.l+'\')">더 보기 ('+(res.length-5)+'건) ▼</button></div>';
    html+='</div>';
  }
  if(!html)html='<div class="empty-msg">四書에서 용례를 찾지 못했습니다.</div>';
  el.innerHTML=html;
}
function hl(t,chars){var r=t;for(var i=0;i<chars.length;i++)r=r.split(chars[i]).join('<span class="ex-hl">'+chars[i]+'</span>');return r;}
function moreEx(k,c,l){
  var res=_SH[k];if(!res)return;
  var q=document.getElementById('SI').value.trim();var chars=Array.from(q);
  var el2=document.getElementById('el'+k);if(!el2)return;
  var html='';for(var i=0;i<res.length;i++)html+='<div class="ex-item"><div><span class="ex-src '+c+'">'+l+'</span></div><div class="ex-txt">'+hl(res[i].text,chars)+'</div></div>';
  el2.innerHTML=html;var mr=el2.parentElement.querySelector('.ex-more-row');if(mr)mr.remove();
}

var _tT=null;
function showToast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tT);_tT=setTimeout(function(){e.classList.remove('show');},2500);}
</script>
