자"},{"text":"孟子言舜非不知其將殺己","source":"맹자"},{"text":"但見其憂則憂","source":"맹자"},{"text":"見其喜則喜","source":"맹자"},{"text":"兄弟之情自有所不能已耳萬章所言其有無不可知然舜之心則孟子有以知之","source":"맹자"},{"text":"矣他亦不足辨也程子曰象憂亦憂象喜亦喜人情天理於是爲至","source":"맹자"},{"text":"09-02-04 曰然則舜僞喜者與曰否昔者有饋生魚於鄭子産子産使校人畜之池","source":"맹자"},{"text":"校人烹之反命曰始舍之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉得其","source":"맹자"},{"text":"所哉校人出曰孰謂子産智予旣烹而食之曰得其所哉得其所哉故君子可欺以","source":"맹자"},{"text":"其方難罔以非其道彼以愛兄之道來故誠信而喜之奚僞焉","source":"맹자"},{"text":"校人主池沼小吏也圉圉困而未舒之貌洋洋則稍縱矣攸然而逝者自得而遠去也","source":"맹자"},{"text":"方亦道也罔蒙蔽也欺以其方謂誑之以理之所有罔以非其道謂昧之以理之所","source":"맹자"},{"text":"無象以愛兄之道來所謂欺之以其方也舜本不知其僞故實喜之何僞之有○","source":"맹자"},{"text":"此章又言舜遭人倫之變而不失天理之常也","source":"맹자"},{"text":"萬章上3章","source":"맹자"},{"text":"09-03-01 萬章問曰象日以殺舜爲事立爲天子則放之何也孟子曰封之也或曰","source":"맹자"},{"text":"放猶置也置之於此使不得去也萬章疑舜何不誅之孟子言舜實封之而或者誤","source":"맹자"},{"text":"09-03-02 萬章曰舜流共工于幽州放驩兜于崇山殺三苗于三危殛鯀于羽山四","source":"맹자"},{"text":"罪而天下咸服誅不仁也象至不仁封之有庳有庳之人奚罪焉仁人固如是乎","source":"맹자"},{"text":"在他人則誅之在弟則封之曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣","source":"맹자"},{"text":"親之欲其貴也愛之欲其富也封之有庳富貴之也身爲天子弟爲匹夫可謂親","source":"맹자"},{"text":"流徙也共工官名驩兜人名二人比周相與爲黨三苗國名負固不服殺殺其君","source":"맹자"},{"text":"也殛誅也鯀禹父名方命圮族治水無功皆不仁之人也幽州崇山三危羽山","source":"맹자"},{"text":"有庳皆地名也或曰今道州鼻亭卽有庳之地也未知是否萬章疑舜不當封象","source":"맹자"},{"text":"使彼有庳之民無罪而遭象之虐非仁人之心也藏怒謂藏匿其怒宿怨謂留蓄其","source":"맹자"},{"text":"09-03-03 敢問或曰放者何謂也曰象不得有爲於其國天子使吏治其國而納其貢","source":"맹자"},{"text":"稅焉故謂之放豈得暴彼民哉雖然欲常常而見之故源源而來不及貢以政接","source":"맹자"},{"text":"于有庳此之謂也","source":"맹자"},{"text":"孟子言象雖封爲有庳之君然不得治其國天子使吏代之治而納其所收之貢稅於","source":"맹자"},{"text":"象有似於放故或者以爲放也蓋象至不仁處之如此則旣不失吾親愛之心而彼","source":"맹자"},{"text":"亦不得虐有庳之民也","source":"맹자"},{"text":"源源若水之相繼也","source":"맹자"},{"text":"謂來朝覲也","source":"맹자"},{"text":"不及貢以政接于有庳","source":"맹자"},{"text":"謂不待及諸侯朝貢之期而以政事接見有庳之君蓋古書之辭而孟子引以證源源","source":"맹자"},{"text":"而來之意見其親愛之無已如此也○吳氏曰言聖人不以公義廢私恩亦不以私","source":"맹자"},{"text":"恩害公義舜之於象仁之至義之盡也","source":"맹자"},{"text":"萬章上4章","source":"맹자"},{"text":"09-04-01 咸丘蒙問曰語云盛德之士君不得而臣父不得而子舜南面而立堯帥","source":"맹자"},{"text":"諸侯北面而朝之瞽瞍亦北面而朝之舜見瞽瞍其容有蹙孔子曰於斯時也天下","source":"맹자"},{"text":"殆哉岌岌乎不識此語誠然乎哉孟子曰否此非君子之言齊東野人之語也堯老","source":"맹자"},{"text":"而舜攝也堯典曰二十有八載放勳乃徂落百姓如喪考妣三年四海遏密八音孔","source":"맹자"},{"text":"子曰天無二日民無二王舜旣爲天子矣又帥天下諸侯以爲堯三年喪是二天子","source":"맹자"},{"text":"咸丘蒙孟子弟子也","source":"맹자"},{"text":"語者古語也","source":"맹자"},{"text":"蹙顰蹙不自安也","source":"맹자"},{"text":"岌岌不安之貌也","source":"맹자"},{"text":"言人倫乖亂","source":"맹자"},{"text":"天下將危也齊東齊國之東鄙也孟子言堯但老不治事而舜攝天子之事耳堯在","source":"맹자"},{"text":"時舜未嘗卽天子位堯何由北面而朝乎又引書及孔子之言以明之堯典虞書篇","source":"맹자"},{"text":"名今此文乃見於舜典蓋古書二篇或合爲一耳言舜攝位二十八年而堯死也","source":"맹자"},{"text":"徂升也落降也人死則魂升而魄降故古者謂死爲徂落遏止也密靜也八音金","source":"맹자"},{"text":"石絲竹匏土革木樂器之音也","source":"맹자"},{"text":"09-04-02 咸丘蒙曰舜之不臣堯則吾旣得聞命矣詩云普天之下莫非王土率土","source":"맹자"},{"text":"之濱莫非王臣而舜旣爲天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞","source":"맹자"},{"text":"於王事而不得養父母也曰此莫非王事我獨賢勞也故說詩者不以文害辭不以辭","source":"맹자"},{"text":"害志以意逆志是爲得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯","source":"맹자"},{"text":"言也是周無遺民也","source":"맹자"},{"text":"不臣堯不以堯爲臣使北面而朝也詩小雅北山之篇也普徧也率循也此詩今毛","source":"맹자"},{"text":"氏序云役使不均己勞於王事而不得養其父母焉其詩下文亦云大夫不均我從","source":"맹자"},{"text":"事獨賢乃作詩者自言天下皆王臣何爲獨使我以賢才而勞苦乎非謂天子可臣其","source":"맹자"},{"text":"父也文字也辭語也逆迎也雲漢大雅篇名也孑獨立之貌遺脫也言說詩之法","source":"맹자"},{"text":"不可以一字而害一句之義不可以一句而害設辭之志當以己意迎取作者之志乃","source":"맹자"},{"text":"可得之若但以其辭而已則如雲漢所言是周之民眞無遺種矣惟以意逆之則知","source":"맹자"},{"text":"作詩者之志在於憂旱而非眞無遺民也","source":"맹자"},{"text":"09-04-03 孝子之至莫大乎尊親尊親之至莫大乎以天下養爲天子父尊之至也","source":"맹자"},{"text":"以天下養養之至也詩曰永言孝思孝思維則此之謂也","source":"맹자"},{"text":"言瞽瞍旣爲天子之父","source":"맹자"},{"text":"則當享天下之養","source":"맹자"},{"text":"此舜之所以爲尊親養親之至也","source":"맹자"},{"text":"北面而朝之理乎詩大雅下武之篇言人能長言孝思而不忘則可以爲天下法則也","source":"맹자"},{"text":"09-04-04 書曰祗載見瞽瞍夔夔齊栗瞽瞍亦允若是爲父不得而子也","source":"맹자"},{"text":"書大禹謨篇也祗敬也載事也夔夔齊栗敬謹恐懼之貌允信也若順也言舜敬","source":"맹자"},{"text":"事瞽瞍往而見之敬謹如此瞽瞍亦信而順之也孟子引此而言瞽瞍不能以不善及","source":"맹자"},{"text":"其子而反見化於其子則是所謂父不得而子者而非如咸丘蒙之說也","source":"맹자"},{"text":"萬章上5章","source":"맹자"},{"text":"09-05-01 萬章曰堯以天下與舜有諸孟子曰否天子不能以天下與人","source":"맹자"},{"text":"天下者天下之天下非一人之私有故也","source":"맹자"},{"text":"09-05-02 然則舜有天下也孰與之曰天與之","source":"맹자"},{"text":"萬章問而孟子答也","source":"맹자"},{"text":"09-05-03 天與之者諄諄然命之乎","source":"맹자"},{"text":"萬章問也諄諄詳語之貌","source":"맹자"},{"text":"09-05-04 曰否天不言以行與事示之而已矣","source":"맹자"},{"text":"行之於身謂之行措諸天下謂之事言但因舜之行事而示以與之之意耳","source":"맹자"},{"text":"09-05-05 曰以行與事示之者如之何曰天子能薦人於天不能使天與之天下","source":"맹자"},{"text":"諸侯能薦人於天子不能使天子與之諸侯大夫能薦人於諸侯不能使諸侯與之","source":"맹자"},{"text":"大夫昔者堯薦舜於天而天受之暴之於民而民受之故曰天不言以行與事示之","source":"맹자"},{"text":"暴顯也言下能薦人於上不能令上必用之舜爲天人所受是因舜之行與事而示之","source":"맹자"},{"text":"以與之之意也","source":"맹자"},{"text":"09-05-06 曰敢問薦之於天而天受之暴之於民而民受之如何曰使之主祭而百神","source":"맹자"},{"text":"享之是天受之使之主事而事治百姓安之是民受之也天與之人與之故曰天子","source":"맹자"},{"text":"不能以天下與人舜相堯二十有八載非人之所能爲也天也堯崩三年之喪畢舜","source":"맹자"},{"text":"避堯之子於南河之南","source":"맹자"},{"text":"天下諸侯朝覲者","source":"맹자"},{"text":"不之堯之子而之舜","source":"맹자"},{"text":"訟獄者不之堯之子而","source":"맹자"},{"text":"之舜謳歌者不謳歌堯之子而謳歌舜故曰天也夫然後之中國踐天子位焉而居","source":"맹자"},{"text":"堯之宮逼堯之子是簒也非天與也","source":"맹자"},{"text":"南河在冀州之南其南卽豫州也訟獄謂獄不決而訟之也","source":"맹자"},{"text":"09-05-07 太誓曰天視自我民視天聽自我民聽此之謂也","source":"맹자"},{"text":"自從也天無形其視聽皆從於民之視聽民之歸舜如此則天與之可知矣","source":"맹자"},{"text":"萬章上6章","source":"맹자"},{"text":"09-06-01 萬章問曰人有言至於禹而德衰不傳於賢而傳於子有諸孟子曰否","source":"맹자"},{"text":"不然也天與賢則與賢天與子則與子昔者舜薦禹於天十有七年舜崩三年之喪","source":"맹자"},{"text":"畢禹避舜之子於陽城天下之民從之若堯崩之後不從堯之子而從舜也禹薦益","source":"맹자"},{"text":"於天七年禹崩三年之喪畢益避禹之子於箕山之陰朝覲訟獄者不之益而之啓","source":"맹자"},{"text":"曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也","source":"맹자"},{"text":"陽城箕山之陰","source":"맹자"},{"text":"皆嵩山下深谷中可藏處","source":"맹자"},{"text":"啓禹之子也","source":"맹자"},{"text":"此語孟子必有所受","source":"맹자"},{"text":"然不可考矣但云天與賢則與賢天與子則與子可以見堯舜禹之心皆無一豪私意","source":"맹자"},{"text":"09-06-02 丹朱之不肖舜之子亦不肖舜之相堯禹之相舜也歷年多施澤於民","source":"맹자"},{"text":"久啓賢能敬承繼禹之道益之相禹也歷年少施澤於民未久舜禹益相去久遠其","source":"맹자"},{"text":"子之賢不肖皆天也非人之所能爲也莫之爲而爲者天也莫之致而至者命也","source":"맹자"},{"text":"堯舜之子皆不肖而舜禹之爲相久此堯舜之子所以不有天下而舜禹有天下也禹","source":"맹자"},{"text":"而益相不久","source":"맹자"},{"text":"此啓所以有天下而益不有天下也","source":"맹자"},{"text":"然此皆非人力所爲而自爲","source":"맹자"},{"text":"非人力所致而自至者蓋以理言之謂之天自人言之謂之命其實則一而已","source":"맹자"},{"text":"09-06-03 匹夫而有天下者德必若舜禹而又有天子薦之者故仲尼不有天下","source":"맹자"},{"text":"孟子因禹益之事歷擧此下兩條以推明之言仲尼之德雖無媿於舜禹而無天子","source":"맹자"},{"text":"薦之者故不有天下","source":"맹자"},{"text":"09-06-04 繼世而有天下天之所廢必若桀紂者也故益伊尹周公不有天下","source":"맹자"},{"text":"繼世而有天下者其先世皆有大功德於民故必有大惡如桀紂則天乃廢之如啓及","source":"맹자"},{"text":"太甲成王雖不及益伊尹周公之賢聖但能嗣守先業則天亦不廢之故益伊尹周公","source":"맹자"},{"text":"雖有舜禹之德而亦不有天下","source":"맹자"},{"text":"09-06-05 伊尹相湯以王於天下湯崩太丁未立外丙二年仲壬四年太甲顚覆","source":"맹자"},{"text":"湯之典刑伊尹放之於桐三年太甲悔過自怨自艾於桐處仁遷義三年以聽伊尹","source":"맹자"},{"text":"之訓己也復歸于亳","source":"맹자"},{"text":"此承上文言伊尹不有天下之事趙氏曰太丁湯之大子未立而死外丙立二年仲","source":"맹자"},{"text":"壬立四年皆太丁弟也太甲太丁子也程子曰古人謂歲爲年湯崩時外丙方二歲","source":"맹자"},{"text":"仲壬方四歲惟太甲差長故立之也二說未知孰是顚覆壞亂也典刑常法也桐","source":"맹자"},{"text":"湯墓所在艾治也說文云芟草也蓋斬絶自新之意亳商所都也","source":"맹자"},{"text":"09-06-06 周公之不有天下猶益之於夏伊尹之於殷也","source":"맹자"},{"text":"此復言周公所以不有天下之意","source":"맹자"},{"text":"09-06-07 孔子曰唐虞禪夏后殷周繼其義一也","source":"맹자"},{"text":"禪受也或禪或繼皆天命也聖人豈有私意於其間哉○尹氏曰孔子曰唐虞禪","source":"맹자"},{"text":"夏后殷周繼其義一也孟子曰天與賢則與賢天與子則與子知前聖之心者無如","source":"맹자"},{"text":"孔子繼孔子者孟子而已矣","source":"맹자"},{"text":"萬章上7章","source":"맹자"},{"text":"09-07-01 萬章問曰人有言伊尹以割烹要湯有諸","source":"맹자"},{"text":"要求也按史記伊尹欲行道以致君而無由乃爲有莘氏之媵臣負鼎俎以滋味說","source":"맹자"},{"text":"湯致於王道蓋戰國時有爲此說者","source":"맹자"},{"text":"09-07-02 孟子曰否不然伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道","source":"맹자"},{"text":"也祿之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人","source":"맹자"},{"text":"一介不以取諸人","source":"맹자"},{"text":"莘國名樂堯舜之道者誦其詩讀其書而欣慕愛樂之也駟四匹也介與草芥之芥","source":"맹자"},{"text":"同言其辭受取與無大無細一以道義而不苟也","source":"맹자"},{"text":"09-07-03 湯使人以幣聘之囂囂然曰我何以湯之聘幣爲哉我豈若處畎畝之中由","source":"맹자"},{"text":"是以樂堯舜之道哉","source":"맹자"},{"text":"囂囂無欲自得之貌","source":"맹자"},{"text":"09-07-04 湯三使往聘之旣而幡然改曰與我處畎畝之中由是以樂堯舜之道吾","source":"맹자"},{"text":"豈若使是君爲堯舜之君哉吾豈若使是民爲堯舜之民哉吾豈若於吾身親見之","source":"맹자"},{"text":"幡然變動之貌於吾身親見之言於我之身親見其道之行不徒誦說嚮慕之而已也","source":"맹자"},{"text":"09-07-05 天之生此民也使先知覺後知使先覺覺後覺也予天民之先覺者也予","source":"맹자"},{"text":"將以斯道覺斯民也非予覺之而誰也","source":"맹자"},{"text":"此亦伊尹之言也知謂識其事之所當然覺謂悟其理之所以然覺後知後覺如呼寐","source":"맹자"},{"text":"者而使之寤也言天使者天理當然若使之也程子曰予天民之先覺謂我乃天生","source":"맹자"},{"text":"此民中盡得民道而先覺者也旣爲先覺之民豈可不覺其未覺者及彼之覺亦非","source":"맹자"},{"text":"分我所有以予之也皆彼自有此理我但能覺之而已","source":"맹자"},{"text":"09-07-06 思天下之民匹夫匹婦有不被堯舜之澤者若己推而內之溝中其自任","source":"맹자"},{"text":"以天下之重如此故就湯而說之以伐夏救民","source":"맹자"},{"text":"書曰昔先正保衡作我先王曰予弗克俾厥后爲堯舜其心愧恥若撻于市一夫不","source":"맹자"},{"text":"獲則曰時予之辜孟子之言蓋取諸此是時夏桀無道暴虐其民故欲使湯伐夏以","source":"맹자"},{"text":"救之徐氏曰伊尹樂堯舜之道堯舜揖遜而伊尹說湯以伐夏者時之不同義則一","source":"맹자"},{"text":"09-07-07 吾未聞枉己而正人者也況辱己以正天下者乎聖人之行不同也或遠或","source":"맹자"},{"text":"近或去或不去歸潔其身而已矣","source":"맹자"},{"text":"辱己甚於枉己正天下難於正人若伊尹以割烹要湯辱己甚矣何以正天下乎","source":"맹자"},{"text":"遠謂隱遁也近謂仕近君也言聖人之行雖不必同然其要歸在潔其身而已伊尹","source":"맹자"},{"text":"豈肯以割烹要湯哉","source":"맹자"},{"text":"09-07-08 吾聞其以堯舜之道要湯未聞以割烹也","source":"맹자"},{"text":"林氏曰以堯舜之道要湯者非實以是要之也道在此而湯之聘自來耳猶子貢言夫","source":"맹자"},{"text":"子之求之異乎人之求之也愚謂此語亦猶前章所論父不得而子之意","source":"맹자"},{"text":"09-07-09 伊訓曰天誅造攻自牧宮朕載自亳","source":"맹자"},{"text":"伊訓商書篇名孟子引以證伐夏救民之事也今書牧宮作鳴條造載皆始也伊尹言","source":"맹자"},{"text":"始攻桀無道由我始其事於亳也","source":"맹자"},{"text":"萬章上8章","source":"맹자"},{"text":"09-08-01 萬章問曰或謂孔子於衛主癰疽於齊主侍人瘠環有諸乎孟子曰否","source":"맹자"},{"text":"不然也好事者爲之也","source":"맹자"},{"text":"主謂舍於其家以之爲主人也癰疽瘍醫也侍人奄人也瘠姓環名皆時君所近狎","source":"맹자"},{"text":"之人也好事謂喜造言生事之人也","source":"맹자"},{"text":"09-08-02 於衛主顔讐由彌子之妻與子路之妻兄弟也彌子謂子路曰孔子主我","source":"맹자"},{"text":"衛卿可得也子路以告孔子曰有命孔子進以禮退以義得之不得曰有命而主","source":"맹자"},{"text":"癰疽與侍人瘠環是無義無命也","source":"맹자"},{"text":"顔讐由衛之賢大夫也史記作顔濁鄒彌子衛靈公幸臣彌子瑕也徐氏曰禮主於","source":"맹자"},{"text":"辭遜故進以禮義主於斷制故退以義難進而易退者也在我者有禮義而已得","source":"맹자"},{"text":"之不得則有命存焉","source":"맹자"},{"text":"09-08-03 孔子不悅於魯衛遭宋桓司馬將要而殺之微服而過宋是時孔子當阨","source":"맹자"},{"text":"主司城貞子爲陳侯周臣","source":"맹자"},{"text":"不悅不樂居其國也桓司馬宋大夫向魋也司城貞子亦宋大夫之賢者也陳侯名","source":"맹자"},{"text":"周按史記孔子爲魯司寇齊人饋女樂以間之孔子遂行適衛月餘去衛適宋司","source":"맹자"},{"text":"馬魋欲殺孔子孔子去至陳主於司城貞子孟子言孔子雖當阨難然猶擇所主況","source":"맹자"},{"text":"在齊衛無事之時豈有主癰疽侍人之事乎","source":"맹자"},{"text":"09-08-04 吾聞觀近臣以其所爲主觀遠臣以其所主若孔子主癰疽與侍人瘠環","source":"맹자"},{"text":"何以爲孔子","source":"맹자"},{"text":"近臣在朝之臣","source":"맹자"},{"text":"遠臣遠方來仕者","source":"맹자"},{"text":"故觀其所爲主與其所主者","source":"맹자"},{"text":"而其人可知","source":"맹자"},{"text":"萬章上9章","source":"맹자"},{"text":"09-09-01 萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公","source":"맹자"},{"text":"信乎孟子曰否不然好事者爲之也","source":"맹자"},{"text":"百里奚虞之賢臣","source":"맹자"},{"text":"人言其自賣於秦養牲者之家","source":"맹자"},{"text":"得五羊之皮而爲之食牛","source":"맹자"},{"text":"09-09-02 百里奚虞人也晉人以垂棘之璧與屈産之乘假道於虞以伐虢宮之奇","source":"맹자"},{"text":"諫百里奚不諫","source":"맹자"},{"text":"虞虢皆國名垂棘之地所出之璧也屈産之乘屈地所生之良馬也乘四匹也晉欲","source":"맹자"},{"text":"伐虢道經於虞故以此物借道其實欲幷取虞宮之奇亦虞之賢臣諫虞公令勿許","source":"맹자"},{"text":"虞公不用遂爲晉所滅百里奚知其不可諫故不諫而去之秦","source":"맹자"},{"text":"09-09-03 知虞公之不可諫而去之秦年已七十矣曾不知以食牛干秦穆公之爲汚","source":"맹자"},{"text":"也可謂智乎不可諫而不諫可謂不智乎知虞公之將亡而先去之不可謂不智也","source":"맹자"},{"text":"時擧於秦知穆公之可與有行也而相之可謂不智乎相秦而顯其君於天下可傳於","source":"맹자"},{"text":"後世不賢而能之乎自鬻以成其君鄕黨自好者不爲而謂賢者爲之乎","source":"맹자"},{"text":"自好自愛其身之人也","source":"맹자"},{"text":"孟子言百里奚之智如此","source":"맹자"},{"text":"必知食牛以干主之爲汚","source":"맹자"},{"text":"此必不肯自鬻以成其君也然此事當孟子時已無所據孟子直以事理反覆推之","source":"맹자"},{"text":"而知其必不然耳○范氏曰古之聖賢未遇之時鄙賤之事不恥爲之如百里奚","source":"맹자"},{"text":"爲人養牛無足怪也惟是人君不致敬盡禮則不可得而見豈有先自汚辱以要其","source":"맹자"},{"text":"君哉莊周曰百里奚爵祿不入於心故飯牛而牛肥使穆公忘其賤而與之政亦","source":"맹자"},{"text":"可謂知百里奚矣伊尹百里奚之事皆聖賢出處之大節故孟子不得不辨尹氏曰","source":"맹자"},{"text":"當時好事者之論大率類此蓋以其不正之心度聖賢也","source":"맹자"},{"text":"萬章下1章","source":"맹자"},{"text":"10-01-01 孟子曰伯夷目不視惡色耳不聽惡聲非其君不事非其民不使治則","source":"맹자"},{"text":"進亂則退橫政之所出橫民之所止不忍居也思與鄕人處如以朝衣朝冠坐於","source":"맹자"},{"text":"塗炭也當紂之時居北海之濱以待天下之淸也故聞伯夷之風者頑夫廉懦夫有","source":"맹자"},{"text":"橫謂不循法度頑者無知覺廉者有分辨懦柔弱也餘並見前篇","source":"맹자"},{"text":"10-01-02 伊尹曰何事非君何事非民治亦進亂亦進曰天之生斯民也使先知","source":"맹자"},{"text":"覺後知使先覺覺後覺予天民之先覺者也予將以此道覺此民也思天下之民","source":"맹자"},{"text":"匹夫匹婦有不與被堯舜之澤者若己推而內之溝中其自任以天下之重也","source":"맹자"},{"text":"何事非君言所事卽君何使非民言所使卽民無不可事之君無不可使之民也餘","source":"맹자"},{"text":"10-01-03 柳下惠不羞汚君不辭小官進不隱賢必以其道遺佚而不怨阨窮而","source":"맹자"},{"text":"不憫與鄕人處由由然不忍去也爾爲爾我爲我雖袒裼裸裎於我側爾焉能浼我","source":"맹자"},{"text":"哉故聞柳下惠之風者鄙夫寬薄夫敦","source":"맹자"},{"text":"鄙狹陋也敦厚也餘見前篇","source":"맹자"},{"text":"10-01-04 孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也可以速","source":"맹자"},{"text":"而速可以久而久可以處而處可以仕而仕孔子也","source":"맹자"},{"text":"接猶承也淅漬米水也漬米將炊而欲去之速故以手承水取米而行不及炊也擧","source":"맹자"},{"text":"此一端以見其久速仕止各當其可也或曰孔子去魯不稅冕而行豈得爲遲楊氏","source":"맹자"},{"text":"曰孔子欲去之意久矣不欲苟去故遲遲其行也膰肉不至則得以微罪行矣故不","source":"맹자"},{"text":"稅冕而行非速也","source":"맹자"},{"text":"10-01-05 孟子曰伯夷聖之淸者也伊尹聖之任者也柳下惠聖之和者也孔子","source":"맹자"},{"text":"聖之時者也","source":"맹자"},{"text":"張子曰無所雜者淸之極無所異者和之極勉而淸非聖人之淸勉而和非聖人","source":"맹자"},{"text":"之和所謂聖者不勉不思而至焉者也孔氏曰任者以天下爲己責也愚謂孔子仕","source":"맹자"},{"text":"止久速各當其可蓋兼三子之所以聖者而時出之非如三子之可以一德名也或疑","source":"맹자"},{"text":"伊尹出處合乎孔子而不得爲聖之時何也程子曰終是任底意思在","source":"맹자"},{"text":"10-01-06 孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉","source":"맹자"},{"text":"振之也者終條理也始條理者智之事也終條理者聖之事也","source":"맹자"},{"text":"此言孔子集三聖之事而爲一大聖之事猶作樂者集衆音之小成而爲一大成也成者","source":"맹자"},{"text":"樂之一終書所謂簫韶九成是也金鐘屬聲宣也如聲罪致討之聲玉磬也振收","source":"맹자"},{"text":"也如振河海而不洩之振始始之也終終之也條理猶言脈絡指衆音而言也智者","source":"맹자"},{"text":"知之所及聖者德之所就也蓋樂有八音金石絲竹匏土革木若獨奏一音則其一","source":"맹자"},{"text":"自爲始終而爲一小成","source":"맹자"},{"text":"猶三子之所知偏於一","source":"맹자"},{"text":"而其所就亦偏於一也","source":"맹자"},{"text":"故特爲衆音之綱紀","source":"맹자"},{"text":"又金始震而玉終詘然也","source":"맹자"},{"text":"故並奏八音","source":"맹자"},{"text":"則於其未作","source":"맹자"},{"text":"而先擊鎛鐘以宣其聲俟其旣闋而後擊特磬以收其韻宣以始之收以終之二","source":"맹자"},{"text":"者之間脈絡通貫無所不備則合衆小成而爲一大成猶孔子之知無不盡而德無不","source":"맹자"},{"text":"全也金聲玉振始終條理疑古樂經之言故兒寬云唯天子建中和之極兼總條貫","source":"맹자"},{"text":"金聲而玉振之亦此意也","source":"맹자"},{"text":"10-01-07 智譬則巧也聖譬則力也由射於百步之外也其至爾力也其中非爾","source":"맹자"},{"text":"此復以射之巧力發明聖智二字之義見孔子巧力俱全而聖智兼備三子則力有餘","source":"맹자"},{"text":"而巧不足是以一節雖至於聖而智不足以及乎時中也○此章言三子之行各極","source":"맹자"},{"text":"其一偏孔子之道兼全於衆理所以偏者由其蔽於始是以缺於終所以全者由","source":"맹자"},{"text":"其知之至是以行之盡三子猶春夏秋冬之各一其時孔子則太和元氣之流行於四","source":"맹자"},{"text":"萬章下2章","source":"맹자"},{"text":"10-02-01 北宮錡問曰周室班爵祿也如之何","source":"맹자"},{"text":"北宮姓錡名衛人班列也","source":"맹자"},{"text":"10-02-02 孟子曰其詳不可得而聞也諸侯惡其害己也而皆去其籍然而軻也嘗","source":"맹자"},{"text":"當時諸侯兼幷僭竊故惡周制妨害己之所爲也","source":"맹자"},{"text":"10-02-03 天子一位公一位侯一位伯一位子男同一位凡五等也君一位卿一","source":"맹자"},{"text":"位大夫一位上士一位中士一位下士一位凡六等","source":"맹자"},{"text":"此班爵之制也五等通於天下六等施於國中","source":"맹자"},{"text":"10-02-04 天子之制地方千里公侯皆方百里伯七十里子男五十里凡四等","source":"맹자"},{"text":"不能五十里不達於天子附於諸侯曰附庸","source":"맹자"},{"text":"此以下班祿之制也不能猶不足也小國之地不足五十里者不能自達於天子因","source":"맹자"},{"text":"大國以姓名通謂之附庸若春秋邾儀父之類是也","source":"맹자"},{"text":"10-02-05 天子之卿受地視侯大夫受地視伯元士受地視子男","source":"맹자"},{"text":"視比也徐氏曰王畿之內亦制都鄙受地也元士上士也","source":"맹자"},{"text":"10-02-06 大國地方百里君十卿祿卿祿四大夫大夫倍上士上士倍中士中","source":"맹자"},{"text":"士倍下士下士與庶人在官者同祿祿足以代其耕也","source":"맹자"},{"text":"十十倍之也四四倍之也倍加一倍也徐氏曰大國君田三萬二千畝其入可食二","source":"맹자"},{"text":"千八百八十人卿田三千二百畝可食二百八十八人大夫田八百畝可食七十二人","source":"맹자"},{"text":"上士田四百畝可食三十六人中士田二百畝可食十八人下士與庶人在官者田","source":"맹자"},{"text":"百畝可食九人至五人庶人在官府史胥徒也愚按君以下所食之祿皆助法之公","source":"맹자"},{"text":"田藉農夫之力以耕而收其租士之無田與庶人在官者則但受祿於官如田之入","source":"맹자"},{"text":"10-02-07 次國地方七十里君十卿祿卿祿三大夫大夫倍上士上士倍中士","source":"맹자"},{"text":"中士倍下士下士與庶人在官者同祿祿足以代其耕也","source":"맹자"},{"text":"三謂三倍之也徐氏曰次國君田二萬四千畝可食二千一百六十人卿田二千四","source":"맹자"},{"text":"百畝可食二百十六人","source":"맹자"},{"text":"10-02-08 小國地方五十里君十卿祿卿祿二大夫大夫倍上士上士倍中士中","source":"맹자"},{"text":"士倍下士下士與庶人在官者同祿祿足以代其耕也","source":"맹자"},{"text":"二卽倍也徐氏曰小國君田一萬六千畝可食千四百四十人卿田一千六百畝可","source":"맹자"},{"text":"食百四十四人","source":"맹자"},{"text":"10-02-09 耕者之所獲一夫百畝百畝之糞上農夫食九人上次食八人中食七","source":"맹자"},{"text":"人中次食六人下食五人庶人在官者其祿以是爲差","source":"맹자"},{"text":"獲得也一夫一婦佃田百畝加之以糞糞多而力勤者爲上農其所收可供九人","source":"맹자"},{"text":"其次用力不齊故有此五等庶人在官者其受祿不同亦有此五等也○愚按此章","source":"맹자"},{"text":"之說與周禮王制不同蓋不可考闕之可也程子曰孟子之時去先王未遠載籍","source":"맹자"},{"text":"未經秦火然而班爵祿之制已不聞其詳今之禮書皆掇拾於煨燼之餘而多出於","source":"맹자"},{"text":"漢儒一時之傅會奈何欲盡信而句爲之解乎然則其事固不可一一追復矣","source":"맹자"},{"text":"萬章下3章","source":"맹자"},{"text":"10-03-01 萬章問曰敢問友孟子曰不挾長不挾貴不挾兄弟而友友也者友","source":"맹자"},{"text":"其德也不可以有挾也","source":"맹자"},{"text":"挾者兼有而恃之之稱","source":"맹자"},{"text":"10-03-02 孟獻子百乘之家也有友五人焉樂正裘牧仲其三人則予忘之矣獻","source":"맹자"},{"text":"子之與此五人者友也無獻子之家者也此五人者亦有獻子之家則不與之友矣","source":"맹자"},{"text":"孟獻子魯之賢大夫仲孫蔑也張子曰獻子忘其勢五人者忘人之勢不資其勢而利","source":"맹자"},{"text":"其有然後能忘人之勢若五人者有獻子之家則反爲獻子之所賤矣","source":"맹자"},{"text":"10-03-03 非惟百乘之家爲然也雖小國之君亦有之費惠公曰吾於子思則師之","source":"맹자"},{"text":"矣吾於顔般則友之矣王順長息則事我者也","source":"맹자"},{"text":"惠公費邑之君也師所尊也友所敬也事我者所使也","source":"맹자"},{"text":"10-03-04 非惟小國之君爲然也雖大國之君亦有之晉平公之於亥唐也入云則","source":"맹자"},{"text":"入坐云則坐食云則食雖疏食菜羹未嘗不飽蓋不敢不飽也然終於此而已矣","source":"맹자"},{"text":"弗與共天位也弗與治天職也弗與食天祿也士之尊賢者也非王公之尊賢也","source":"맹자"},{"text":"亥唐晉賢人也平公造之唐言入公乃入言坐乃坐言食乃食也疎食糲飯也不","source":"맹자"},{"text":"敢不飽敬賢者之命也○范氏曰位曰天位職曰天職祿曰天祿言天所以待賢","source":"맹자"},{"text":"人使治天民非人君所得專者也","source":"맹자"},{"text":"10-03-05 舜尙見帝帝館甥于貳室亦饗舜迭爲賓主是天子而友匹夫也","source":"맹자"},{"text":"尙上也舜上而見於帝堯也館舍也禮妻父曰外舅謂我舅者吾謂之甥堯以女妻","source":"맹자"},{"text":"舜故謂之甥貳室副宮也堯舍舜於副宮而就饗其食","source":"맹자"},{"text":"10-03-06 用下敬上謂之貴貴用上敬下謂之尊賢貴貴尊賢其義一也","source":"맹자"},{"text":"貴貴尊賢皆事之宜者然當時但知貴貴而不知尊賢故孟子曰其義一也○此言","source":"맹자"},{"text":"朋友人倫之一所以輔仁故以天子友匹夫而不爲詘以匹夫友天子而不爲僭此堯","source":"맹자"},{"text":"舜所以爲人倫之至而孟子言必稱之也","source":"맹자"},{"text":"萬章下4章","source":"맹자"},{"text":"10-04-01 萬章問曰敢問交際何心也孟子曰恭也","source":"맹자"},{"text":"際接也交際謂人以禮儀幣帛相交接也","source":"맹자"},{"text":"10-04-02 曰卻之卻之爲不恭何哉曰尊者賜之曰其所取之者義乎不義乎而後","source":"맹자"},{"text":"受之以是爲不恭故弗卻也","source":"맹자"},{"text":"卻不受而還之也再言之未詳萬章疑交際之間有所卻者人便以爲不恭何哉孟","source":"맹자"},{"text":"子言尊者之賜而心竊計其所以得此物者未知合義與否必其合義然後可受不然","source":"맹자"},{"text":"則卻之矣所以卻之爲不恭也","source":"맹자"},{"text":"10-04-03 曰請無以辭卻之以心卻之曰其取諸民之不義也而以他辭無受不可","source":"맹자"},{"text":"乎曰其交也以道其接也以禮斯孔子受之矣","source":"맹자"},{"text":"萬章以爲彼旣得之不義則其餽不可受但無以言辭間而卻之直以心度其不義而","source":"맹자"},{"text":"託於他辭以卻之如此可否邪交以道如餽贐聞戒周其飢餓之類接以禮謂辭","source":"맹자"},{"text":"命恭敬之節孔子受之如受陽貨蒸豚之類也","source":"맹자"},{"text":"10-04-04 萬章曰今有禦人於國門之外者其交也以道其餽也以禮斯可受禦與","source":"맹자"},{"text":"曰不可康誥曰殺越人于貨閔不畏死凡民罔不譈是不待敎而誅者也殷受夏","source":"맹자"},{"text":"周受殷所不辭也於今爲烈如之何其受之","source":"맹자"},{"text":"禦止也止人而殺之且奪其貨也國門之外無人之處也萬章以爲苟不問其物之","source":"맹자"},{"text":"而但觀其交接之禮","source":"맹자"},{"text":"則設有禦人者用其禦得之貨","source":"맹자"},{"text":"則可受之乎","source":"맹자"},{"text":"康誥周書篇名越顚越也今書閔作暋無凡民二字譈怨也言殺人而顚越之因取","source":"맹자"},{"text":"其貨閔然不知畏死凡民無不怨之孟子言此乃不待敎戒而當卽誅者也如何而","source":"맹자"},{"text":"可受之乎殷受至爲烈十四字語意不倫李氏以爲此必有斷簡或闕文者近之而","source":"맹자"},{"text":"愚意其直爲衍字耳然不可考姑闕之可也","source":"맹자"},{"text":"10-04-05 曰今之諸侯取之於民也猶禦也苟善其禮際矣斯君子受之敢問何說","source":"맹자"},{"text":"也曰子以爲有王者作將比今之諸侯而誅之乎其敎之不改而後誅之乎夫謂非","source":"맹자"},{"text":"其有而取之者盜也充類至義之盡也孔子之仕於魯也魯人獵較孔子亦獵較","source":"맹자"},{"text":"獵較猶可而況受其賜乎","source":"맹자"},{"text":"比連也言今諸侯之取於民固多不義然有王者起必不連合而盡誅之必敎之不","source":"맹자"},{"text":"改而後誅之則其與禦人之盜不待敎而誅者不同矣夫禦人於國門之外與非其","source":"맹자"},{"text":"有而取之二者固皆不義之類然必禦人乃爲眞盜其謂非有而取爲盜者乃推其","source":"맹자"},{"text":"至於義之至精至密之處而極言之耳","source":"맹자"},{"text":"非便以爲眞盜也","source":"맹자"},{"text":"然則今之諸侯雖曰取非","source":"맹자"},{"text":"其有而豈可遽以同於人之盜也哉又引孔子之事以明世俗所尙猶或可從況受","source":"맹자"},{"text":"其賜何爲不可乎獵較未詳趙氏以爲田獵相較奪禽獸以祭孔子不違所以小同","source":"맹자"},{"text":"於俗也張氏以爲獵而較所獲之多少也二說未知孰是","source":"맹자"},{"text":"10-04-06 曰然則孔子之仕也非事道與曰事道也事道奚獵較也曰孔子先簿正","source":"맹자"},{"text":"祭器不以四方之食供簿正曰奚不去也曰爲之兆也兆足以行矣而不行而後去","source":"맹자"},{"text":"是以未嘗有所終三年淹也","source":"맹자"},{"text":"此因孔子事而反覆辯論也事道者以行道爲事也事道奚獵較也萬章問也先簿","source":"맹자"},{"text":"正祭器未詳徐氏曰先以簿書正其祭器使有定數而不以四方難繼之物實之夫","source":"맹자"},{"text":"器有常數實有常品則其本正矣彼獵較者將久而自廢矣未知是否也兆猶卜之","source":"맹자"},{"text":"兆盖事之端也孔子所以不去者亦欲小試行道之端以示於人使知吾道之果可","source":"맹자"},{"text":"行也若其端旣可行而人不能遂行之然後不得已而必去之蓋其去雖不輕而亦","source":"맹자"},{"text":"未嘗不決是以未嘗終三年留於一國也","source":"맹자"},{"text":"10-04-07 孔子有見行可之仕有際可之仕有公養之仕於季桓子見行可之仕也","source":"맹자"},{"text":"於衛靈公際可之仕也於衛孝公公養之仕也","source":"맹자"},{"text":"見行可見其道之可行也際可接遇以禮也公養國君養賢之禮也季桓子魯卿季","source":"맹자"},{"text":"孫斯也衛靈公衛侯元也孝公春秋史記皆無之疑出公輒也因孔子仕魯而言其仕","source":"맹자"},{"text":"故於魯則兆足以行矣而不行然後去","source":"맹자"},{"text":"而於衛之事","source":"맹자"},{"text":"則又受其交際問餽而","source":"맹자"},{"text":"不卻之一驗也○尹氏曰不聞孟子之義則自好者爲於陵仲子而已聖賢辭受進","source":"맹자"},{"text":"退惟義所在愚按此章文義多不可曉不必強爲之說","source":"맹자"},{"text":"萬章下5章","source":"맹자"},{"text":"10-05-01 孟子曰仕非爲貧也而有時乎爲貧娶妻非爲養也而有時乎爲養","source":"맹자"},{"text":"仕本爲行道而亦有家貧親老或道與時違而但爲祿仕者如娶妻本爲繼嗣而亦有","source":"맹자"},{"text":"爲不能親操井臼而欲資其餽養者","source":"맹자"},{"text":"10-05-02 爲貧者辭尊居卑辭富居貧","source":"맹자"},{"text":"貧富謂祿之厚薄蓋仕不爲道已非出處之正故其所居但當如此","source":"맹자"},{"text":"10-05-03 辭尊居卑辭富居貧惡乎宜乎抱關擊柝","source":"맹자"},{"text":"柝夜行所擊木也蓋爲貧者雖不主於行道而亦不可以苟祿故惟抱關擊柝之吏位","source":"맹자"},{"text":"卑祿薄其職易稱爲所宜居也李氏曰道不行矣爲貧而仕者此其律令也若不","source":"맹자"},{"text":"能然則是貪位慕祿而已矣","source":"맹자"},{"text":"10-05-04 孔子嘗爲委吏矣曰會計當而已矣嘗爲乘田矣曰牛羊茁壯長而已矣","source":"맹자"},{"text":"此孔子之爲貧而仕者也委吏主委積之吏也乘田主苑囿芻牧之吏也茁肥貌言以","source":"맹자"},{"text":"孔子大聖而嘗爲賤官不以爲辱者所謂爲貧而仕官卑祿薄而職易稱也","source":"맹자"},{"text":"10-05-05 位卑而言高罪也立乎人之本朝而道不行恥也","source":"맹자"},{"text":"以出位爲罪則無行道之責以廢道爲恥則非竊祿之官此爲貧者之所以必辭尊富","source":"맹자"},{"text":"而寧處貧賤也○尹氏曰言爲貧者不可以居尊居尊者必欲以行道","source":"맹자"},{"text":"萬章下6章","source":"맹자"},{"text":"10-06-01 萬章曰士之不託諸侯何也孟子曰不敢也諸侯失國而後託於諸侯禮","source":"맹자"},{"text":"也士之託於諸侯非禮也","source":"맹자"},{"text":"託寄也謂不仕而食其祿也古者諸侯出奔他國食其廩餼謂之寄公士無爵土不","source":"맹자"},{"text":"得比諸侯不仕而食祿則非禮也","source":"맹자"},{"text":"10-06-02 萬章曰君餽之粟則受之乎曰受之受之何義也曰君之於氓也固周之","source":"맹자"},{"text":"周救也視其空乏則周䘏之無常數君待民之禮也","source":"맹자"},{"text":"10-06-03 曰周之則受賜之則不受何也曰不敢也曰敢問其不敢何也曰抱關","source":"맹자"},{"text":"擊柝者皆有常職以食於上無常職而賜於上者以爲不恭也","source":"맹자"},{"text":"賜謂予之祿有常數君所以待臣之禮也","source":"맹자"},{"text":"10-06-04 曰君餽之則受之不識可常繼乎曰繆公之於子思也亟問亟餽鼎肉","source":"맹자"},{"text":"子思不悅於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君","source":"맹자"},{"text":"之犬馬畜伋蓋自是臺無餽也悅賢不能擧又不能養也可謂悅賢乎","source":"맹자"},{"text":"亟數也鼎肉熟肉也卒末也摽麾也數以君命來餽當拜受之非養賢之禮故不","source":"맹자"},{"text":"悅而於其末後復來餽時麾使者出拜而辭之犬馬畜伋言不以人禮待己也臺賤","source":"맹자"},{"text":"官主使令者蓋繆公愧悟自此不復令臺來致餽也擧用也能養者未必能用況又","source":"맹자"},{"text":"10-06-05 曰敢問國君欲養君子如何斯可謂養矣曰以君命將之再拜稽首而","source":"맹자"},{"text":"受其後廩人繼粟庖人繼肉不以君命將之子思以爲鼎肉使己僕僕爾亟拜也","source":"맹자"},{"text":"非養君子之道也","source":"맹자"},{"text":"初以君命來餽則當拜受其後有司各以其職繼續所無不以君命來餽不使賢者","source":"맹자"},{"text":"有亟拜之勞也僕僕煩猥貌","source":"맹자"},{"text":"10-06-06 堯之於舜也使其子九男事之二女女焉百官牛羊倉廩備以養舜於","source":"맹자"},{"text":"畎畝之中後擧而加諸上位故曰王公之尊賢者也","source":"맹자"},{"text":"能養能擧悅賢之至也唯堯舜爲能盡之而後世之所當法也","source":"맹자"},{"text":"萬章下7章","source":"맹자"},{"text":"10-07-01 萬章曰敢問不見諸侯何義也孟子曰在國曰市井之臣在野曰草莽之","source":"맹자"},{"text":"臣皆謂庶人庶人不傳質爲臣不敢見於諸侯禮也","source":"맹자"},{"text":"傳通也質者士執雉庶人執鶩相見以自通者也國內莫非君臣但未仕者與執贄","source":"맹자"},{"text":"在位之臣不同故不敢見也","source":"맹자"},{"text":"10-07-02 萬章曰庶人召之役則往役君欲見之召之則不往見之何也曰往役義","source":"맹자"},{"text":"也往見不義也","source":"맹자"},{"text":"往役者庶人之職不往見者士之禮","source":"맹자"},{"text":"10-07-03 且君之欲見之也何爲也哉曰爲其多聞也爲其賢也曰爲其多聞也則","source":"맹자"},{"text":"天子不召師而況諸侯乎爲其賢也則吾未聞欲見賢而召之也繆公亟見於子思","source":"맹자"},{"text":"曰古千乘之國以友士何如子思不悅曰古之人有言曰事之云乎豈曰友之云","source":"맹자"},{"text":"乎子思之不悅也豈不曰以位則子君也我臣也何敢與君友也以德則子事我者","source":"맹자"},{"text":"也奚可以與我友千乘之君求與之友而不可得也而況可召與","source":"맹자"},{"text":"孟子引子思之言而釋之以明不可召之意","source":"맹자"},{"text":"10-07-04 齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其","source":"맹자"},{"text":"元孔子奚取焉取非其招不往也","source":"맹자"},{"text":"10-07-05 曰敢問招虞人何以曰以皮冠庶人以旃士旂大夫以旌","source":"맹자"},{"text":"皮冠田獵之冠也事見春秋傳然則皮冠者虞人之所有事也故以是招之庶人未","source":"맹자"},{"text":"仕之臣通帛曰旃士謂已仕者交龍爲旂析羽而注於旂干之首曰旌","source":"맹자"},{"text":"10-07-06 以大夫之招招虞人虞人死不敢往以士之招招庶人庶人豈敢往哉","source":"맹자"},{"text":"況乎以不賢人之招招賢人乎","source":"맹자"},{"text":"欲見而召之是不賢人之招也以士之招招庶人則不敢往以不賢人之招招賢人","source":"맹자"},{"text":"則不可往矣","source":"맹자"},{"text":"10-07-07 欲見賢人而不以其道猶欲其入而閉之門也夫義路也禮門也惟君子","source":"맹자"},{"text":"能由是路出入是門也詩云周道如底其直如矢君子所履小人所視","source":"맹자"},{"text":"詩小雅大東之篇底與砥同礪石也言其平也矢言其直也視視以爲法也引此","source":"맹자"},{"text":"以證上文能由是路之義","source":"맹자"},{"text":"10-07-08 萬章曰孔子君命召不俟駕而行然則孔子非與曰孔子當仕有官職","source":"맹자"},{"text":"而以其官召之也","source":"맹자"},{"text":"孔子方仕而任職","source":"맹자"},{"text":"君以其官名召之","source":"맹자"},{"text":"故不俟駕而行","source":"맹자"},{"text":"孔子孟子易地則皆然","source":"맹자"},{"text":"○此章言不見諸侯之義最爲詳悉更合陳代公孫丑所問者而觀之其說乃盡","source":"맹자"},{"text":"萬章下8章","source":"맹자"},{"text":"10-08-01 孟子謂萬章曰一鄕之善士斯友一鄕之善士一國之善士斯友一國之","source":"맹자"},{"text":"善士天下之善士斯友天下之善士","source":"맹자"},{"text":"言己之善蓋於一鄕然後能盡友一鄕之善士推而至於一國天下皆然隨其高下","source":"맹자"},{"text":"以爲廣狹也","source":"맹자"},{"text":"10-08-02 以友天下之善士爲未足又尙論古之人頌其詩讀其書不知其人可","source":"맹자"},{"text":"乎是以論其世也是尙友也","source":"맹자"},{"text":"尙上同言進而上也頌誦通論其世論其當世行事之迹也言旣觀其言則不可以","source":"맹자"},{"text":"不知其爲人之實","source":"맹자"},{"text":"是以又考其行也","source":"맹자"},{"text":"夫能友天下之善士","source":"맹자"},{"text":"其所友衆矣","source":"맹자"},{"text":"猶以爲未足","source":"맹자"},{"text":"又進而取於古人是能進其取友之道而非止爲一世之士矣","source":"맹자"},{"text":"萬章下9章","source":"맹자"},{"text":"10-09-01 齊宣王問卿孟子曰王何卿之問也王曰卿不同乎曰不同有貴戚之","source":"맹자"},{"text":"卿有異姓之卿王曰請問貴戚之卿曰君有大過則諫反覆之而不聽則易位","source":"맹자"},{"text":"大過謂足以亡其國者易位易君之位更立親戚之賢者蓋與君有親親之恩無可去","source":"맹자"},{"text":"之義以宗廟爲重不忍坐視其亡故不得已而至於此也","source":"맹자"},{"text":"10-09-02 王勃然變乎色","source":"맹자"},{"text":"勃然變色貌","source":"맹자"},{"text":"10-09-03 曰王勿異也王問臣臣不敢不以正對","source":"맹자"},{"text":"10-09-04 王色定然後請問異姓之卿曰君有過則諫反覆之而不聽則去","source":"맹자"},{"text":"君臣義合不合則去○此章言大臣之義親疎不同守經行權各有其分貴戚之","source":"맹자"},{"text":"卿小過非不諫也但必大過而不聽乃可易位異姓之卿大過非不諫也雖小過","source":"맹자"},{"text":"而不聽已可去矣然三仁貴戚不能行之於紂而霍光異姓乃能行之於昌邑此","source":"맹자"},{"text":"又委任權力之不同不可以執一論也","source":"맹자"},{"text":"告子上1章","source":"맹자"},{"text":"11-01-1 告子曰性猶杞柳也義猶桮棬也以人性爲仁義猶以杞柳爲桮棬","source":"맹자"},{"text":"性者人生所禀之天理也杞柳柜柳桮棬屈木所爲若巵匜之屬告子言人性本無","source":"맹자"},{"text":"仁義必待矯揉而後成如荀子性惡之說也","source":"맹자"},{"text":"11-01-2 孟子曰子能順杞柳之性而以爲桮棬乎將戕賊杞柳而後以爲桮棬也如","source":"맹자"},{"text":"將戕賊杞柳而以爲桮棬則亦將戕賊人以爲仁義與率天下之人而禍仁義者必","source":"맹자"},{"text":"言如此則天下之人皆以仁義爲害性而不肯爲是因子之言而爲仁義之禍也","source":"맹자"},{"text":"告子上2章","source":"맹자"},{"text":"11-02-01 告子曰性猶湍水也決諸東方則東流決諸西方則西流人性之無分於","source":"맹자"},{"text":"善不善也猶水之無分於東西也","source":"맹자"},{"text":"湍波流瀠回之貌也告子因前說而小變之近於揚子善惡混之說","source":"맹자"},{"text":"11-02-02 孟子曰水信無分於東西無分於上下乎人性之善也猶水之就下也人","source":"맹자"},{"text":"無有不善水無有不下","source":"맹자"},{"text":"言水誠不分東西矣然豈不分上下乎性卽天理未有不善者也","source":"맹자"},{"text":"11-02-03 今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其勢則","source":"맹자"},{"text":"然也人之可使爲不善其性亦猶是也","source":"맹자"},{"text":"搏擊也躍跳也顙額也水之過額在山皆不就下也然其本性未嘗不就下但爲","source":"맹자"},{"text":"搏擊所使而逆其性耳○此章言性本善故順之而無不善本無惡故反之而後","source":"맹자"},{"text":"爲惡非本無定體而可以無所不爲也","source":"맹자"},{"text":"告子上3章","source":"맹자"},{"text":"11-03-01 告子曰生之謂性","source":"맹자"},{"text":"生指人物之所以知覺運動者而言告子論性前後四章語雖不同然其大指不外乎","source":"맹자"},{"text":"此與近世佛氏所謂作用是性者略相似","source":"맹자"},{"text":"11-03-02 孟子曰生之謂性也猶白之謂白與曰然白羽之白也猶白雪之白白","source":"맹자"},{"text":"雪之白猶白玉之白與曰然","source":"맹자"},{"text":"白之謂白猶言凡物之白者同謂之白更無差別也白羽以下孟子再問而告子曰","source":"맹자"},{"text":"然則是謂凡有生者同是一性矣","source":"맹자"},{"text":"11-03-03 然則犬之性猶牛之性牛之性猶人之性與","source":"맹자"},{"text":"孟子又言若果如此則犬牛與人皆有知覺皆能運動其性皆無以異矣於是告","source":"맹자"},{"text":"子自知其說之非而不能對也○愚按性者人之所得於天之理也生者人之所得","source":"맹자"},{"text":"於天之氣也性形而上者也氣形而下者也人物之生莫不有是性亦莫不有是氣","source":"맹자"},{"text":"然以氣言之則知覺運動人與物若不異也以理言之則仁義禮智之禀豈物之所","source":"맹자"},{"text":"得而全哉此人之性所以無不善而爲萬物之靈也告子不知性之爲理而以所謂氣","source":"맹자"},{"text":"者當之是以杞柳湍水之喩食色無善無不善之說縱橫繆戾紛紜舛錯而此章之","source":"맹자"},{"text":"誤乃其本根所以然者蓋徒知知覺運動之蠢然者人與物同而不知仁義禮智之粹","source":"맹자"},{"text":"然者人與物異也孟子以是析之其義精矣","source":"맹자"},{"text":"告子上4章","source":"맹자"},{"text":"11-04-01告子曰食色性也仁內也非外也義外也非內也","source":"맹자"},{"text":"告子以人之知覺運動者爲性","source":"맹자"},{"text":"故言人之甘食悅色者卽其性","source":"맹자"},{"text":"故仁愛之心生於內","source":"맹자"},{"text":"事物之宜由乎外學者但當用力於仁而不必求合於義也","source":"맹자"},{"text":"11-04-02孟子曰何以謂仁內義外也曰彼長而我長之非有長於我也猶彼白而我","source":"맹자"},{"text":"白之從其白於外也故謂之外也","source":"맹자"},{"text":"我長之我以彼爲長也我白之我以彼爲白也","source":"맹자"},{"text":"11-04-03曰異於白馬之白也無以異於白人之白也不識長馬之長也無以異於長","source":"맹자"},{"text":"人之長與且謂長者義乎長之者義乎","source":"맹자"},{"text":"張氏曰上異於二字宜衍李氏曰或有闕文焉愚按白馬白人所謂彼白而我白之","source":"맹자"},{"text":"也長馬長人所謂彼長而我長之也白馬白人不異而長馬長人不同是乃所謂義","source":"맹자"},{"text":"也義不在彼之長而在我長之之心則義之非外明矣","source":"맹자"},{"text":"11-04-04曰吾弟則愛之秦人之弟則不愛也是以我爲悅者也故謂之內長楚人之","source":"맹자"},{"text":"長亦長吾之長是以長爲悅者也故謂之外也","source":"맹자"},{"text":"言愛主於我故仁在內敬主於長故義在外","source":"맹자"},{"text":"11-04-05曰耆秦人之灸無以異於耆吾灸夫物則亦有然者也然則耆炙亦有外與","source":"맹자"},{"text":"言長之耆之皆出於心也林氏曰告子以食色爲性故因其所明者而通之○自篇","source":"맹자"},{"text":"首至此四章告子之辯屢屈而屢變其說以求勝卒不聞其能自反而有所疑也此","source":"맹자"},{"text":"正其所謂不得於言勿求於心者所以卒於鹵莽而不得其正也","source":"맹자"},{"text":"告子上5章","source":"맹자"},{"text":"11-05-01 孟季子問公都子曰何以謂義內也","source":"맹자"},{"text":"孟季子疑孟仲子之弟也蓋聞孟子之言而未達故私論之","source":"맹자"},{"text":"11-05-02 曰行吾敬故謂之內也","source":"맹자"},{"text":"所敬之人雖在外然知其當敬而行吾心之敬以敬之則不在外也","source":"맹자"},{"text":"11-05-03 鄕人長於伯兄一歲則誰敬曰敬兄酌則誰先曰先酌鄕人所敬在此","source":"맹자"},{"text":"所長在彼果在外非由內也","source":"맹자"},{"text":"伯長也酌酌酒也此皆季子問公都子答而季子又言如此則敬長之心果不由中","source":"맹자"},{"text":"11-05-04 公都子不能答以告孟子孟子曰敬叔父乎敬弟乎彼將曰敬叔父","source":"맹자"},{"text":"曰弟爲尸則誰敬彼將曰敬弟子曰惡在其敬叔父也彼將曰在位故也子亦曰","source":"맹자"},{"text":"在位故也庸敬在兄斯須之敬在鄕人","source":"맹자"},{"text":"尸祭祀所主以象神雖弟子爲之然敬之當如祖考也在位弟在尸位鄕人在賓客之","source":"맹자"},{"text":"位也庸常也斯須暫時也言因時制宜皆由中出也","source":"맹자"},{"text":"11-05-05 季子聞之曰敬叔父則敬敬弟則敬果在外非由內也公都子曰冬日","source":"맹자"},{"text":"則飮湯夏日則飮水然則飮食亦在外也","source":"맹자"},{"text":"此亦上章耆炙之義○范氏曰二章問答大指略同皆反覆譬喩以曉當世使明","source":"맹자"},{"text":"仁義之在內則知人之性善而皆可以爲堯舜矣","source":"맹자"},{"text":"告子上6章","source":"맹자"},{"text":"11-06-01 公都子曰告子曰性無善無不善也","source":"맹자"},{"text":"此亦生之謂性食色性也之意近世蘇氏胡氏之說蓋如此","source":"맹자"},{"text":"11-06-02 或曰性可以爲善可以爲不善是故文武興則民好善幽厲興則民好暴","source":"맹자"},{"text":"此卽湍水之說也","source":"맹자"},{"text":"11-06-03 或曰有性善有性不善是故以堯爲君而有象以瞽瞍爲父而有舜以紂","source":"맹자"},{"text":"爲兄之子且以爲君而有微子啓王子比干","source":"맹자"},{"text":"韓子性有三品之說蓋如此按此文則微子比干皆紂之叔父而書稱微子爲商王","source":"맹자"},{"text":"元子疑此或有誤字","source":"맹자"},{"text":"11-06-04 今曰性善然則彼皆非與孟子曰乃若其情則可以爲善矣乃所謂善也","source":"맹자"},{"text":"乃若發語辭情者性之動也人之情本但可以爲善而不可以爲惡則性之本善","source":"맹자"},{"text":"11-06-05 若夫爲不善非才之罪也","source":"맹자"},{"text":"才猶材質人之能也人有是性則有是才性旣善則才亦善人之爲不善乃物欲","source":"맹자"},{"text":"陷溺而然非其才之罪也","source":"맹자"},{"text":"11-06-06 惻隱之心人皆有之羞惡之心人皆有之恭敬之心人皆有之是非之","source":"맹자"},{"text":"心人皆有之惻隱之心仁也羞惡之心義也恭敬之心禮也是非之心智也仁義禮","source":"맹자"},{"text":"智非由外鑠我也我固有之也弗思耳矣故曰求則得之舍則失之或相倍蓰而無","source":"맹자"},{"text":"算者不能盡其才者也","source":"맹자"},{"text":"恭者敬之發於外者也敬者恭之主於中者也鑠以火銷金之名自外以至內也算數","source":"맹자"},{"text":"也言四者之心人所固有但人自不思而求之耳所以善惡相去之遠由不思不求","source":"맹자"},{"text":"而不能擴充以盡其才也前篇言是四者爲仁義禮智之端而此不言端者彼欲其擴","source":"맹자"},{"text":"而充之此直因用以著其本體故言有不同耳","source":"맹자"},{"text":"11-06-07 詩曰天生蒸民有物有則民之秉夷好是懿德孔子曰爲此詩者其知","source":"맹자"},{"text":"道乎故有物必有則民之秉夷也故好是懿德","source":"맹자"},{"text":"詩大雅蒸民之篇蒸詩作烝衆也物事也則法也夷詩作彝常也懿美也有物必","source":"맹자"},{"text":"有法如有耳目則有聰明之德有父子則有慈孝之心是民所秉執之常性也故人之","source":"맹자"},{"text":"情無不好此懿德者以此觀之則人性之善可見而公都子所問之三說皆不辨而","source":"맹자"},{"text":"自明矣○程子曰性卽理也理則堯舜至於塗人一也才禀於氣氣有淸濁禀其","source":"맹자"},{"text":"淸者爲賢禀其濁者爲愚學而知之則氣無淸濁皆可至於善而復性之本湯武身","source":"맹자"},{"text":"之是也孔子所言下愚不移者則自暴自棄之人也又曰論性不論氣不備論氣不","source":"맹자"},{"text":"論性不明二之則不是張子曰形而後有氣質之性善反之則天地之性存焉","source":"맹자"},{"text":"故氣質之性君子有弗性者焉愚按程子此說才字與孟子本文小異蓋孟子專","source":"맹자"},{"text":"指其發於性者言之故以爲才無不善程子兼指其禀於氣者言之則人之才固有昏","source":"맹자"},{"text":"明強弱之不同矣張子所謂氣質之性是也二說雖殊各有所當然以事理考之程","source":"맹자"},{"text":"子爲密蓋氣質所禀雖有不善而不害性之本善性雖本善而不可以無省察矯揉","source":"맹자"},{"text":"之功學者所當深玩也","source":"맹자"},{"text":"告子上7章","source":"맹자"},{"text":"11-07-01 孟子曰富歲子弟多賴凶歲子弟多暴非天之降才爾殊也其所以陷溺","source":"맹자"},{"text":"其心者然也","source":"맹자"},{"text":"富歲豊年也賴藉也豊年衣食饒足故有所賴藉而爲善凶年衣食不足故有以陷","source":"맹자"},{"text":"溺其心而爲暴","source":"맹자"},{"text":"11-07-02 今夫麰麥播種而耰之其地同樹之時又同浡然而生至於日至之時","source":"맹자"},{"text":"皆熟矣雖有不同則地有肥磽雨露之養人事之不齊也","source":"맹자"},{"text":"麰大麥也耰覆種也日至之時謂當成熟之期也磽瘠薄也","source":"맹자"},{"text":"11-07-03 故凡同類者擧相似也何獨至於人而疑之聖人與我同類者","source":"맹자"},{"text":"聖人亦人耳其性之善無不同也","source":"맹자"},{"text":"11-07-04 故龍子曰不知足而爲屨我知其不爲蕢也屨之相似天下之足同也","source":"맹자"},{"text":"蕢草器也不知人足之大小而爲之屨雖未必適中然必似足形不至成蕢也","source":"맹자"},{"text":"11-07-05 口之於味有同耆也易牙先得我口之所耆者也如使口之於味也其性","source":"맹자"},{"text":"與人殊若犬馬之與我不同類也則天下何耆皆從易牙之於味也至於味天下期","source":"맹자"},{"text":"於易牙是天下之口相似也","source":"맹자"},{"text":"易牙古之知味者言易牙所調之味則天下皆以爲美也","source":"맹자"},{"text":"11-07-06 惟耳亦然至於聲天下期於師曠是天下之耳相似也","source":"맹자"},{"text":"師曠能審音者也言師曠所和之音則天下皆以爲美也","source":"맹자"},{"text":"11-07-07 惟目亦然至於子都天下莫不知其姣也不知子都之姣者無目者也","source":"맹자"},{"text":"子都古之美人也姣好也","source":"맹자"},{"text":"11-07-08 故曰口之於味也有同耆焉耳之於聲也有同聽焉目之於色也有同美","source":"맹자"},{"text":"焉至於心獨無所同然乎心之所同然者何也謂理也義也聖人先得我心之所同","source":"맹자"},{"text":"然耳故理義之悅我心猶芻豢之悅我口","source":"맹자"},{"text":"然猶可也草食曰芻牛羊是也穀食曰豢犬豕是也程子曰在物爲理處物爲義","source":"맹자"},{"text":"體用之謂也孟子言人心無不悅理義者但聖人則先知先覺乎此耳非有以異於人","source":"맹자"},{"text":"也程子又曰理義之悅我心猶芻豢之悅我口此語親切有味須實體察得義理之","source":"맹자"},{"text":"悅心眞猶芻豢之悅口始得","source":"맹자"},{"text":"告子上8章","source":"맹자"},{"text":"11-08-01 孟子曰牛山之木嘗美矣以其郊於大國也斧斤伐之可以爲美乎是","source":"맹자"},{"text":"其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也","source":"맹자"},{"text":"人見其濯濯也以爲未嘗有材焉此豈山之性也哉","source":"맹자"},{"text":"牛山齊之東南山也邑外謂之郊言牛山之木前此固嘗美矣今爲大國之郊伐之","source":"맹자"},{"text":"者衆故失其美耳息生長也日夜之所息謂氣化流行未嘗間斷故日夜之間凡","source":"맹자"},{"text":"物皆有所生長也萌芽也蘖芽之旁出者也濯濯光潔之貌材材木也言山木雖伐","source":"맹자"},{"text":"猶有萌蘖而牛羊又從而害之是以至於光潔而無草木也","source":"맹자"},{"text":"11-08-02","source":"맹자"},{"text":"雖存乎人者","source":"맹자"},{"text":"豈無仁義之心哉","source":"맹자"},{"text":"其所以放其良心者","source":"맹자"},{"text":"亦猶斧斤之於木也","source":"맹자"},{"text":"旦旦而伐之可以爲美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則","source":"맹자"},{"text":"其旦晝之所爲有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違","source":"맹자"},{"text":"禽獸不遠矣人見其禽獸也而以爲未嘗有才焉者是豈人之情也哉","source":"맹자"},{"text":"本然之善心","source":"맹자"},{"text":"卽所謂仁義之心也","source":"맹자"},{"text":"謂未與物接之時淸明之氣也","source":"맹자"},{"text":"好惡與人相近言得人心之所同然也幾希不多也梏械也反覆展轉也言人之良","source":"맹자"},{"text":"心雖已放失然其日夜之間猶必有所生長故平旦未與物接其氣淸明之際良心","source":"맹자"},{"text":"猶必有發見者","source":"맹자"},{"text":"但其發見至微","source":"맹자"},{"text":"而旦晝所爲之不善","source":"맹자"},{"text":"又已隨而梏亡之","source":"맹자"},{"text":"如山木旣伐","source":"맹자"},{"text":"猶有萌蘖而牛羊又牧之也晝之所爲旣有以害其夜之所息夜之所息又不能勝","source":"맹자"},{"text":"其晝之所爲是以展轉相害至於夜氣之生日以寖薄而不足以存其仁義之良心","source":"맹자"},{"text":"則平旦之氣亦不能淸而所好惡遂與人遠矣","source":"맹자"},{"text":"11-08-03 故苟得其養無物不長苟失其養無物不消","source":"맹자"},{"text":"山木人心其理一也","source":"맹자"},{"text":"11-08-04 孔子曰操則存舍則亡出入無時莫知其鄕惟心之謂與","source":"맹자"},{"text":"孔子言心操之則在此舍之則失去其出入無定時亦無定處如此孟子引之以明","source":"맹자"},{"text":"心之神明不測得失之易而保守之難不可頃刻失其養學者當無時而不用其力使","source":"맹자"},{"text":"神淸氣定常如平旦之時則此心常存無適而非仁義矣程子曰心豈有出入亦以","source":"맹자"},{"text":"操舍而言耳操之之道敬以直內而已○愚聞之師曰人理義之心未嘗無惟持","source":"맹자"},{"text":"守之卽在爾若於旦晝之間不至梏亡則夜氣愈淸夜氣淸則平旦未與物接之時","source":"맹자"},{"text":"湛然虛明氣象自可見矣孟子發此夜氣之說於學者極有力宜熟玩而深省之也","source":"맹자"},{"text":"告子上9章","source":"맹자"},{"text":"11-09-01 孟子曰無或乎王之不智也","source":"맹자"},{"text":"或與惑同疑怪也王疑指齊王","source":"맹자"},{"text":"11-09-02 雖有天下易生之物也一日暴之十日寒之未有能生者也吾見亦罕矣","source":"맹자"},{"text":"吾退而寒之者至矣吾如有萌焉何哉","source":"맹자"},{"text":"我見王之時少","source":"맹자"},{"text":"猶一日暴之也","source":"맹자"},{"text":"我退則諂諛雜進之日多","source":"맹자"},{"text":"是十日寒之也","source":"맹자"},{"text":"雖有萌蘖之生我亦安能如之何哉","source":"맹자"},{"text":"11-09-03 今夫奕之爲數小數也不專心致志則不得也奕秋通國之善奕者也使","source":"맹자"},{"text":"奕秋誨二人奕其一人專心致志惟奕秋之爲聽一人雖聽之一心以爲有鴻鵠","source":"맹자"},{"text":"將至思援弓繳而射之雖與之俱學弗若之矣爲是其智弗若與曰非然也","source":"맹자"},{"text":"奕圍棋也數技也致極也奕秋善奕者名秋也繳以繩繫矢而射也○程子爲講官","source":"맹자"},{"text":"言於上曰人主一日之間接賢士大夫之時多親宦官宮妾之時少則可以涵養氣質","source":"맹자"},{"text":"而薰陶德性時不能用識者恨之范氏曰人君之心惟在所養君子養之以善則智","source":"맹자"},{"text":"小人養之以惡則愚然賢人易疎小人易親是以寡不能勝衆正不能勝邪自古","source":"맹자"},{"text":"國家治日常少而亂日常多蓋以此也","source":"맹자"},{"text":"告子上10章","source":"맹자"},{"text":"11-10-01 孟子曰魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌","source":"맹자"},{"text":"者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也","source":"맹자"},{"text":"魚與熊掌皆美味而熊掌尤美也","source":"맹자"},{"text":"11-10-02 生亦我所欲所欲有甚於生者故不爲苟得也死亦我所惡所惡有甚","source":"맹자"},{"text":"於死者故患有所不辟也","source":"맹자"},{"text":"釋所以舍生取義之意得得生也欲生惡死者雖衆人利害之常情而欲惡有甚於生","source":"맹자"},{"text":"死者乃秉彝義理之良心是以欲生而不爲苟得惡死而有所不避也","source":"맹자"},{"text":"11-10-03 如使人之所欲莫甚於生則凡可以得生者何不用也使人之所惡莫甚","source":"맹자"},{"text":"於死者則凡可以辟患者何不爲也","source":"맹자"},{"text":"設使人無秉彛之良心","source":"맹자"},{"text":"而但有利害之私情","source":"맹자"},{"text":"則凡可以偸生免死者","source":"맹자"},{"text":"皆將不顧禮義而","source":"맹자"},{"text":"11-10-04 由是則生而有不用也由是則可以辟患而有不爲也","source":"맹자"},{"text":"由其必有秉彝之良心是以其能舍生取義如此","source":"맹자"},{"text":"11-10-05 是故所欲有甚於生者所惡有甚於死者非獨賢者有是心也人皆有","source":"맹자"},{"text":"之賢者能勿喪耳","source":"맹자"},{"text":"羞惡之心人皆有之但衆人汨於利欲而忘之惟賢者能存之而不喪耳","source":"맹자"},{"text":"11-10-06 一簞食一豆羹得之則生弗得則死嘑爾而與之行道之人弗受蹴爾","source":"맹자"},{"text":"而與之乞人不屑也","source":"맹자"},{"text":"豆木器也嘑咄啐之貌行道之人路中凡人也蹴踐踏也乞人丐乞之人也不屑","source":"맹자"},{"text":"不以爲潔也言雖欲食之急而猶惡無禮有寧死而不食者是其羞惡之本心欲惡","source":"맹자"},{"text":"有甚於生死者人皆有之也","source":"맹자"},{"text":"11-10-07 萬鍾則不辨禮義而受之萬鍾於我何加焉爲宮室之美妻妾之奉所識","source":"맹자"},{"text":"窮乏者得我與","source":"맹자"},{"text":"萬鍾於我何加言於我身無所增益也所識窮乏者得我謂所知識之窮乏者感我之","source":"맹자"},{"text":"上言人皆有羞惡之心","source":"맹자"},{"text":"此言衆人所以喪之由此三者","source":"맹자"},{"text":"蓋理義之心","source":"맹자"},{"text":"而物欲之蔽亦人所易昏也","source":"맹자"},{"text":"11-10-08 鄕爲身死而不受今爲宮室之美爲之鄕爲身死而不受今爲妻妾之","source":"맹자"},{"text":"奉爲之鄕爲身死而不受今爲所識窮乏者得我而爲之是亦不可以已乎此之謂","source":"맹자"},{"text":"言三者身外之物其得失比生死爲甚輕鄕爲身死猶不肯受嘑蹴之食今乃爲此","source":"맹자"},{"text":"三者而受無禮義之萬鍾是豈不可以止乎本心謂羞惡之心○此章言羞惡之心","source":"맹자"},{"text":"或能決死生於危迫之際","source":"맹자"},{"text":"而不免計豊約於宴安之時","source":"맹자"},{"text":"是以君子不可頃刻","source":"맹자"},{"text":"而不省察於斯焉","source":"맹자"},{"text":"告子上11章","source":"맹자"},{"text":"11-11-01 孟子曰仁人心也義人路也","source":"맹자"},{"text":"仁者心之德程子所謂心如穀種仁則其生之性是也然但謂之仁則人不知其切","source":"맹자"},{"text":"故反而名之曰人心","source":"맹자"},{"text":"則可以見其爲此身酬酢萬變之主而不可須臾失矣","source":"맹자"},{"text":"行事之宜謂之人路則可以見其爲出入往來必由之道而不可須臾舍矣","source":"맹자"},{"text":"11-11-02 舍其路而不由放其心而不知求哀哉","source":"맹자"},{"text":"哀哉二字最宜詳味令人惕然有深省處","source":"맹자"},{"text":"11-11-03 人有鷄犬放則知求之有放心而不知求","source":"맹자"},{"text":"程子曰心至重鷄犬至輕鷄犬放則知求之心放則不知求豈愛其至輕而忘其至重","source":"맹자"},{"text":"哉弗思而已矣愚謂上兼言仁義而此下專論求放心者能求放心則不違於仁而","source":"맹자"},{"text":"義在其中矣","source":"맹자"},{"text":"11-11-04 學問之道無他求其放心而已矣","source":"맹자"},{"text":"學問之事固非一端然其道則在於求其放心而已蓋能如是則志氣淸明義理昭","source":"맹자"},{"text":"著而可以上達不然則昏昧放逸雖曰從事於學而終不能有所發明矣故程子曰","source":"맹자"},{"text":"聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上","source":"맹자"},{"text":"達也此乃孟子開示切要之言程子又發明之曲盡其指學者宜服膺而勿失也","source":"맹자"},{"text":"告子上12章","source":"맹자"},{"text":"11-12-01 孟子曰今有無名之指屈而不信非疾痛害事也如有能信之者則不遠","source":"맹자"},{"text":"秦楚之路爲指之不若人也","source":"맹자"},{"text":"無名指手之第四指也","source":"맹자"},{"text":"11-12-02 指不若人則知惡之心不若人則不知惡此之謂不知類也","source":"맹자"},{"text":"不知類言其不知輕重之等也","source":"맹자"},{"text":"告子上13章","source":"맹자"},{"text":"11-13-01 孟子曰拱把之桐梓人苟欲生之皆知所以養之者至於身而不知所以","source":"맹자"},{"text":"養之者豈愛身不若桐梓哉弗思甚也","source":"맹자"},{"text":"拱兩手所圍也把一手所握也桐梓二木名","source":"맹자"},{"text":"告子上14章","source":"맹자"},{"text":"11-14-01 孟子曰人之於身也兼所愛兼所愛則兼所養也無尺寸之膚不愛焉則","source":"맹자"},{"text":"無尺寸之膚不養也所以考其善不善者豈有他哉於己取之而已矣","source":"맹자"},{"text":"人於一身固當兼養然欲考其所養之善否者惟在反之於身以審其輕重而已矣","source":"맹자"},{"text":"11-14-02 體有貴賤有大小無以小害大無以賤害貴養其小者爲小人養其大","source":"맹자"},{"text":"賤而小者口腹也貴而大者心志也","source":"맹자"},{"text":"11-14-03 今有場師舍其梧檟養其樲棘則爲賤場師焉","source":"맹자"},{"text":"場師治場圃者梧桐也檟梓也皆美材也樲棘小棗非美材也","source":"맹자"},{"text":"11-14-04 養其一指而失其肩背而不知也則爲狼疾人也","source":"맹자"},{"text":"狼善顧疾則不能故以爲失肩背之喩","source":"맹자"},{"text":"11-14-05 飮食之人則人賤之矣爲其養小以失大也","source":"맹자"},{"text":"飮食之人專養口腹者也","source":"맹자"},{"text":"11-14-06 飮食之人無有失也則口腹豈適爲尺寸之膚哉","source":"맹자"},{"text":"此言若使專養口腹而能不失其大體","source":"맹자"},{"text":"則口腹之養","source":"맹자"},{"text":"不但爲尺寸之膚而已","source":"맹자"},{"text":"但養小之人無不失其大者故口腹雖所當養而終不可以小害大賤害貴也","source":"맹자"},{"text":"告子上15章","source":"맹자"},{"text":"11-15-01 公都子問曰鈞是人也或爲大人或爲小人何也孟子曰從其大體爲","source":"맹자"},{"text":"大人從其小體爲小人","source":"맹자"},{"text":"鈞同也從隨也大體心也小體耳目之類也","source":"맹자"},{"text":"11-15-02 曰鈞是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物","source":"맹자"},{"text":"物交物則引之而已矣心之官則思思則得之不思則不得也此天之所與我者先","source":"맹자"},{"text":"立乎其大者則其小者不能奪也此爲大人而已矣","source":"맹자"},{"text":"官之爲言司也而司聽目司視各有所職而不能思是以蔽於外物旣不能思而蔽","source":"맹자"},{"text":"於外物則亦一物而已又以外物交於此物其引之而去不難矣心則能思而以思","source":"맹자"},{"text":"爲職凡事物之來心得其職則得其理而物不能蔽失其職則不得其理而物來蔽","source":"맹자"},{"text":"之此三者皆天之所以與我者而心爲大若能有以立之則事無不思而耳目之欲","source":"맹자"},{"text":"不能奪之矣此所以爲大人也然此天之此舊本多作比而趙註亦以比方釋之","source":"맹자"},{"text":"今本旣多作此而註亦作此乃未詳孰是但作比字於義爲短故且從今本云○","source":"맹자"},{"text":"范浚心箴曰茫茫堪輿俯仰無垠人於其間眇然有身是身之微太倉稊米參爲","source":"맹자"},{"text":"三才曰惟心爾往古來今孰無此心心爲形役乃獸乃禽惟口耳目手足動靜投","source":"맹자"},{"text":"間抵隙爲厥心病一心之微衆欲攻之其與存者嗚呼幾希君子存誠克念克敬","source":"맹자"},{"text":"天君泰然百體從令","source":"맹자"},{"text":"告子上16章","source":"맹자"},{"text":"11-16-01 孟子曰有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫","source":"맹자"},{"text":"天爵者德義可尊自然之貴也","source":"맹자"},{"text":"11-16-02 古之人修其天爵而人爵從之","source":"맹자"},{"text":"修其天爵以爲吾分之所當然者耳人爵從之蓋不待求之而自至也","source":"맹자"},{"text":"11-16-03 今之人修其天爵以要人爵旣得人爵而棄其天爵則惑之甚者也終","source":"맹자"},{"text":"亦必亡而已矣","source":"맹자"},{"text":"要求也修天爵以要人爵其心固已惑矣得人爵而棄天爵則其惑又甚焉終必並","source":"맹자"},{"text":"其所得之人爵而亡之也","source":"맹자"},{"text":"告子上17章","source":"맹자"},{"text":"11-17-01 孟子曰欲貴者人之同心也人人有貴於己者弗思耳","source":"맹자"},{"text":"貴於己者謂天爵也","source":"맹자"},{"text":"11-17-02 人之所貴者非良貴也趙孟之所貴趙孟能賤之","source":"맹자"},{"text":"人之所貴謂人以爵位加己而後貴也良者本然之善也趙孟晉卿也能以爵祿與人","source":"맹자"},{"text":"而使之貴則亦能奪之而使之賤矣若良貴則人安得而賤之哉","source":"맹자"},{"text":"11-17-03 詩云旣醉以酒旣飽以德言飽乎仁義也所以不願人之膏粱之味也令","source":"맹자"},{"text":"聞廣譽施於身所以不願人之文繡也","source":"맹자"},{"text":"詩大雅旣醉之篇飽充足也願欲也膏肥肉粱美穀令善也聞亦譽也文繡衣之","source":"맹자"},{"text":"美者也仁義充足而聞譽彰著皆所謂良貴也○尹氏曰言在我者重則外物輕","source":"맹자"},{"text":"告子上18章","source":"맹자"},{"text":"11-18-01 孟子曰仁之勝不仁也猶水勝火今之爲仁者猶以一杯水救一車薪之","source":"맹자"},{"text":"火也不熄則謂之水不勝火此又與於不仁之甚者也","source":"맹자"},{"text":"與猶助也仁之能勝不仁必然之理也但爲之不力則無以勝不仁而人遂以爲眞","source":"맹자"},{"text":"不能勝是我之所爲有以深助於不仁者也","source":"맹자"},{"text":"11-18-02 亦終必亡而已矣","source":"맹자"},{"text":"言此人之心亦且自怠於爲仁終必幷與其所爲而亡之○趙氏曰言爲仁不至而","source":"맹자"},{"text":"不反諸己也","source":"맹자"},{"text":"告子上19章","source":"맹자"},{"text":"11-19-01 孟子曰五穀者種之美者也苟爲不熟不如荑稗夫仁亦在乎熟之而","source":"맹자"},{"text":"荑稗草之似穀者其實亦可食然不能如五穀之美也但五穀不熟則反不如荑稗之","source":"맹자"},{"text":"熟猶爲仁而不熟則反不如爲他道之有成是以爲仁必貴乎熟而不可徒恃其種之","source":"맹자"},{"text":"美又不可以仁之難熟而甘爲他道之有成也○尹氏曰日新而不已則熟","source":"맹자"},{"text":"告子上20章","source":"맹자"},{"text":"11-20-01 孟子曰羿之敎人射必志於彀學者亦必志於彀","source":"맹자"},{"text":"羿善射者也志猶期也彀弓滿也滿而後發射之法也學謂學射","source":"맹자"},{"text":"11-20-02 大匠誨人必以規矩學者亦必以規矩","source":"맹자"},{"text":"大匠工師也規矩匠之法也○此章言事必有法然後可成師舍是則無以敎弟","source":"맹자"},{"text":"子舍是則無以學曲藝且然況聖人之道乎","source":"맹자"},{"text":"告子下1章","source":"맹자"},{"text":"12-01-01 任人有問屋廬子曰禮與食孰重曰禮重","source":"맹자"},{"text":"任國名屋盧子名連孟子弟子也","source":"맹자"},{"text":"12-01-02 色與禮孰重","source":"맹자"},{"text":"任人復問也","source":"맹자"},{"text":"12-01-03 曰禮重曰以禮食則飢而死不以禮食則得食必以禮乎親迎則不得妻","source":"맹자"},{"text":"不親迎則得妻必親迎乎屋廬子不能對明日之鄒以告孟子孟子曰於答是也","source":"맹자"},{"text":"何有不難也","source":"맹자"},{"text":"12-01-04 不揣其本而齊其末方寸之木可使高於岑樓","source":"맹자"},{"text":"本謂下末謂上方寸之木至卑喩食色岑樓樓之高銳似山者至高喩禮若不取","source":"맹자"},{"text":"其下之平而升寸木於岑樓之上則寸木反高岑樓反卑矣","source":"맹자"},{"text":"12-01-05 金重於羽者豈謂一鉤金與一輿羽之謂哉","source":"맹자"},{"text":"鉤帶鉤也金本重而帶鉤小故輕喩禮有輕於食色者羽本輕而一輿多故重喩食","source":"맹자"},{"text":"色有重於禮者","source":"맹자"},{"text":"12-01-06 取食之重者與禮之輕者而比之奚翅食重取色之重者與禮之輕者","source":"맹자"},{"text":"而比之奚翅色重","source":"맹자"},{"text":"禮食親迎禮之輕者也飢而死以滅其性不得妻而廢人倫食色之重者也奚翅猶","source":"맹자"},{"text":"言何但言其相去懸絶不但有輕重之差而已","source":"맹자"},{"text":"12-01-07 往應之曰紾兄之臂而奪之食則得食不紾則不得食則將紾之乎踰東","source":"맹자"},{"text":"家牆而摟其處子則得妻不摟則不得妻則將摟之乎","source":"맹자"},{"text":"紾戾也摟牽也妻子處女也此二者禮與食色皆其重者而以之相較則禮爲尤","source":"맹자"},{"text":"重也○此章言義理事物其輕重固有大分然於其中又各自有輕重之別聖賢","source":"맹자"},{"text":"於此錯綜斟酌毫髮不差固不肯枉尺而直尋亦未嘗膠柱而調瑟所以斷之一視","source":"맹자"},{"text":"於理之當然而已矣","source":"맹자"},{"text":"告子下2章","source":"맹자"},{"text":"12-02-01 曹交問曰人皆可以爲堯舜有諸孟子曰然","source":"맹자"},{"text":"趙氏曰曹交曹君之弟也人皆可以爲堯舜疑古語或孟子所嘗言也","source":"맹자"},{"text":"12-02-02 交聞文王十尺湯九尺今交九尺四寸以長食粟而已如何則可","source":"맹자"},{"text":"曹交問也食粟而已言無他材能也","source":"맹자"},{"text":"12-02-03 曰奚有於是亦爲之而已矣有人於此力不能勝一匹雛則爲無力人矣","source":"맹자"},{"text":"今曰擧百鈞則爲有力人矣然則擧烏獲之任是亦爲烏獲而已矣夫人豈以不勝","source":"맹자"},{"text":"爲患哉弗爲耳","source":"맹자"},{"text":"匹字本作鴄鴨也從省作匹禮記說匹爲鶩是也烏獲古之有力人也能擧移","source":"맹자"},{"text":"12-02-04 徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉","source":"맹자"},{"text":"所不爲也堯舜之道孝弟而已矣","source":"맹자"},{"text":"陳氏曰孝弟者人之良知良能自然之性也堯舜人倫之至亦率是性而已豈能加","source":"맹자"},{"text":"毫末於是哉楊氏曰堯舜之道大矣而所以爲之乃在夫行止疾徐之間非有甚高","source":"맹자"},{"text":"難行之事也百姓蓋日用而不知耳","source":"맹자"},{"text":"12-02-05 子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言","source":"맹자"},{"text":"行桀之行是桀而已矣","source":"맹자"},{"text":"言爲善爲惡皆在我而已詳曹交之問淺陋麤率必其進見之時禮貌衣冠言動之","source":"맹자"},{"text":"間多不循理故孟子告之如此兩節云","source":"맹자"},{"text":"12-02-06 曰交得見於鄒君可以假館願留而受業於門","source":"맹자"},{"text":"假館而後受業又可見其求道之不篤","source":"맹자"},{"text":"12-02-07 曰夫道若大路然豈難知哉人病不求耳子歸而求之有餘師","source":"맹자"},{"text":"言道不難知若歸而求之事親敬長之間則性分之內萬理皆備隨處發見無不可","source":"맹자"},{"text":"師不必留此而受業也○曹交事長之禮旣不至求道之心又不篤故孟子敎之以","source":"맹자"},{"text":"孝弟而不容其受業蓋孔子餘力學文之意亦不屑之敎誨也","source":"맹자"},{"text":"告子下3章","source":"맹자"},{"text":"12-03-01 公孫丑問曰高子曰小弁小人之詩也孟子曰何以言之曰怨","source":"맹자"},{"text":"高子齊人也小弁小雅篇名周幽王娶申后生太子宜臼又得褒姒生伯服而黜申","source":"맹자"},{"text":"后廢宜臼於是宜臼之傅爲作此詩以叙其哀痛迫切之情也","source":"맹자"},{"text":"12-03-02 曰固哉高叟之爲詩也有人於此越人關弓而射之則己談笑而道之","source":"맹자"},{"text":"無他疏之也其兄關弓而射之則己垂涕泣而道之無他戚之也小弁之怨親親","source":"맹자"},{"text":"也親親仁也固矣夫高叟之爲詩也","source":"맹자"},{"text":"固謂執滯不通也爲猶治也越蠻夷國名道語也親親之心仁之發也","source":"맹자"},{"text":"12-03-03 曰凱風何以不怨","source":"맹자"},{"text":"凱風邶風篇名衛有七子之母不能安其室七子作此以自責也","source":"맹자"},{"text":"12-03-04 曰凱風親之過小者也小弁親之過大者也親之過大而不怨是愈疏也","source":"맹자"},{"text":"親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也","source":"맹자"},{"text":"磯水激石也不可磯言微激之而遽怒也","source":"맹자"},{"text":"12-03-05 孔子曰舜其至孝矣五十而慕","source":"맹자"},{"text":"言舜猶怨慕小弁之怨不爲不孝也○趙氏曰生之膝下一體而分喘息呼吸氣","source":"맹자"},{"text":"通於親當親而疏怨慕號天是以小弁之怨未足爲愆也","source":"맹자"},{"text":"告子下4章","source":"맹자"},{"text":"12-04-01 宋牼將之楚孟子遇於石丘","source":"맹자"},{"text":"宋姓牼名石丘地名","source":"맹자"},{"text":"12-04-02 曰先生將何之","source":"맹자"},{"text":"趙氏曰學士年長者故謂之先生","source":"맹자"},{"text":"12-04-03 曰吾聞秦楚搆兵我將見楚王說而罷之楚王不悅我將見秦王說而","source":"맹자"},{"text":"罷之二王我將有所遇焉","source":"맹자"},{"text":"時宋牼方欲見楚王恐其不悅則將見秦王也遇合也按莊子書有宋鈃者禁攻寢","source":"맹자"},{"text":"兵救世之戰上說下敎強聒不舍疏云齊宣王時人以事考之疑卽此人也","source":"맹자"},{"text":"12-04-04 曰軻也請無問其詳願聞其指說之將如何曰我將言其不利也曰先生","source":"맹자"},{"text":"之志則大矣先生之號則不可","source":"맹자"},{"text":"徐氏曰能於戰國擾攘之中而以罷兵息民爲說其志可謂大矣然以利爲名則不","source":"맹자"},{"text":"12-04-05 先生以利說秦楚之王秦楚之王悅於利以罷三軍之師是三軍之士","source":"맹자"},{"text":"樂罷而悅於利也爲人臣者懷利以事其君爲人子者懷利以事其父爲人弟者懷","source":"맹자"},{"text":"利以事其兄是君臣父子兄弟終去仁義懷利以相接然而不亡者未之有也先生","source":"맹자"},{"text":"以仁義說秦楚之王秦楚之王悅於仁義而罷三軍之師是三軍之士樂罷而悅於","source":"맹자"},{"text":"仁義也爲人臣者懷仁義以事其君爲人子者懷仁義以事其父爲人弟者懷仁義","source":"맹자"},{"text":"以事其兄是君臣父子兄弟去利懷仁義以相接也然而不王者未之有也何必","source":"맹자"},{"text":"此章言休兵息民爲事則一然其心有義利之殊而其效有興亡之異學者所當深","source":"맹자"},{"text":"察而明辨之也","source":"맹자"},{"text":"告子下5章","source":"맹자"},{"text":"12-05-01 孟子居鄒季任爲任處守以幣交受之而不報處於平陸儲子爲相以","source":"맹자"},{"text":"幣交受之而不報","source":"맹자"},{"text":"趙氏曰季任任君之弟任君朝會於鄰國季任爲之居守其國也儲子齊相也","source":"맹자"},{"text":"不報者來見則當報之但以幣交則不必報也","source":"맹자"},{"text":"12-05-02 他日由鄒之任見季子由平陸之齊不見儲子屋廬子喜曰連得間矣","source":"맹자"},{"text":"屋廬子知孟子之處此必有義理故喜得其間隙而問之","source":"맹자"},{"text":"12-05-03 問曰夫子之任見季子之齊不見儲子爲其爲相與","source":"맹자"},{"text":"言儲子但爲齊相不若季子攝守君位故輕之邪","source":"맹자"},{"text":"12-05-04 曰非也書曰享多儀儀不及物曰不享惟不役志于享","source":"맹자"},{"text":"書周書洛誥之篇享奉上也儀禮也物幣也役用也言雖享而禮意不及其幣則是","source":"맹자"},{"text":"不享矣以其不用志于享故也","source":"맹자"},{"text":"12-05-05 爲其不成享也","source":"맹자"},{"text":"孟子釋書意如此","source":"맹자"},{"text":"12-05-06 屋廬子悅或問之屋廬子曰季子不得之鄒儲子得之平陸","source":"맹자"},{"text":"季子爲君居守","source":"맹자"},{"text":"不得往他國以見孟子","source":"맹자"},{"text":"則以幣交而禮意已備","source":"맹자"},{"text":"儲子爲齊相","source":"맹자"},{"text":"可以至齊之境內而不來見則雖以幣交而禮意不及其物也","source":"맹자"},{"text":"告子下6章","source":"맹자"},{"text":"12-06-01 淳于髡曰先名實者爲人也後名實者自爲也夫子在三卿之中名實","source":"맹자"},{"text":"未加於上下而去之仁者固如此乎","source":"맹자"},{"text":"名聲譽也實事功也言以名實爲先而爲之者是有志於救民者也以名實爲後而不","source":"맹자"},{"text":"爲者是欲獨善其身者也名實未加於上下言上未能正其君下未能濟其民也","source":"맹자"},{"text":"12-06-02 孟子曰居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不","source":"맹자"},{"text":"惡汚君不辭小官者柳下惠也三子者不同道其趨一也一者何也曰仁也君子","source":"맹자"},{"text":"亦仁而已矣何必同","source":"맹자"},{"text":"仁者無私心而合天理之謂楊氏曰伊尹之就湯以三聘之勤也其就桀也湯進之","source":"맹자"},{"text":"也湯豈有伐桀之意哉其進伊尹以事之也欲其悔過遷善而已伊尹旣就湯則以","source":"맹자"},{"text":"湯之心爲心矣及其終也人歸之天命之不得已而伐之耳若湯初求伊尹卽有","source":"맹자"},{"text":"伐桀之心而伊尹遂相之以伐桀是以取天下爲心也以取天下爲心豈聖人之心哉","source":"맹자"},{"text":"12-06-03 曰魯繆公之時公儀子爲政子柳子思爲臣魯之削也滋甚若是乎賢者","source":"맹자"},{"text":"之無益於國也","source":"맹자"},{"text":"公儀子名休爲魯相子柳泄柳也削地見侵奪也髡譏孟子雖不去亦未必能有爲","source":"맹자"},{"text":"12-06-04 曰虞不用百里奚而亡秦穆公用之而霸不用賢則亡削何可得與","source":"맹자"},{"text":"百里奚事見前篇","source":"맹자"},{"text":"12-06-05 曰昔者王豹處於淇而河西善謳綿駒處於高唐而齊右善歌華周杞梁","source":"맹자"},{"text":"之妻善哭其夫而變國俗有諸內必形諸外爲其事而無其功者髡未嘗覩之也","source":"맹자"},{"text":"是故無賢者也有則髡必識之","source":"맹자"},{"text":"王豹衛人善謳淇水名綿駒齊人善歌高唐齊西邑華周杞梁二人皆齊臣戰死於","source":"맹자"},{"text":"莒其妻哭之哀國俗化之皆善哭髡以此譏孟子仕齊無功未足爲賢也","source":"맹자"},{"text":"12-06-06 曰孔子爲魯司寇不用從而祭燔肉不至不稅冕而行不知者以爲爲","source":"맹자"},{"text":"肉也其知者以爲爲無禮也乃孔子則欲以微罪行不欲爲苟去君子之所爲衆","source":"맹자"},{"text":"人固不識也","source":"맹자"},{"text":"按史記孔子爲魯司寇攝行相事齊人聞而懼於是以女樂遺魯君季桓子與魯君","source":"맹자"},{"text":"往觀之怠於政事子路曰夫子可以行矣孔子曰魯今且郊如致膰于大夫則吾","source":"맹자"},{"text":"桓子卒受齊女樂","source":"맹자"},{"text":"郊又不致膰肉于大夫","source":"맹자"},{"text":"孟子言以爲爲肉者","source":"맹자"},{"text":"固不足道以爲爲無禮則亦未爲深知孔子者蓋聖人於父母之國不欲顯其君相之","source":"맹자"},{"text":"失又不欲無故而苟去故不以女樂去而以膰肉行其見幾明決而用意忠厚固非衆","source":"맹자"},{"text":"人所能識也然則孟子之所爲豈髡之所能識哉○尹氏曰淳于髡未嘗知仁亦未","source":"맹자"},{"text":"嘗識賢也宜乎其言若是","source":"맹자"},{"text":"告子下7章","source":"맹자"},{"text":"12-07-01 孟子曰五霸者三王之罪人也今之諸侯五霸之罪人也今之大夫今","source":"맹자"},{"text":"之諸侯之罪人也","source":"맹자"},{"text":"趙氏曰五霸齊桓晉文秦穆宋襄楚莊也三王夏禹商湯周文武也丁氏曰夏昆吾商","source":"맹자"},{"text":"大彭豕韋周齊桓晉文謂之五霸","source":"맹자"},{"text":"12-07-02 天子適諸侯曰巡狩諸侯朝於天子曰述職春省耕而補不足秋省斂而","source":"맹자"},{"text":"助不給入其疆土地辟田野治養老尊賢俊傑在位則有慶慶以地入其疆土","source":"맹자"},{"text":"地荒蕪遺老失賢掊克在位則有讓一不朝則貶其爵再不朝則削其地三不朝則","source":"맹자"},{"text":"六師移之是故天子討而不伐諸侯伐而不討五霸者摟諸侯以伐諸侯者也","source":"맹자"},{"text":"故曰五霸者三王之罪人也","source":"맹자"},{"text":"慶賞也益其地以賞之也掊克聚斂也讓責也移之者誅其人而變置之也討者出","source":"맹자"},{"text":"命以討其罪","source":"맹자"},{"text":"而使方伯連帥","source":"맹자"},{"text":"帥諸侯以伐之也","source":"맹자"},{"text":"伐者奉天子之命","source":"맹자"},{"text":"聲其罪而伐之也","source":"맹자"},{"text":"摟牽也五霸牽諸侯以伐諸侯不用天子之命也自入其疆至則有讓言巡狩之事","source":"맹자"},{"text":"自一不朝至六師移之言述職之事","source":"맹자"},{"text":"12-07-03 五霸桓公爲盛葵丘之會諸侯束牲載書而不歃血初命曰誅不孝無","source":"맹자"},{"text":"易樹子無以妾爲妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賓旅四","source":"맹자"},{"text":"命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封","source":"맹자"},{"text":"而不告曰凡我同盟之人旣盟之後言歸于好今之諸侯皆犯此五禁故曰今之","source":"맹자"},{"text":"諸侯五霸之罪人也","source":"맹자"},{"text":"按春秋傳僖公九年葵丘之會陳牲而不殺讀書加於牲上壹明天子之禁樹立也","source":"맹자"},{"text":"已立世子不得擅易初命三事所以修身正家之要也賓賓客也旅行旅也皆當有","source":"맹자"},{"text":"以待之不可忽忘也士世祿而不世官恐其未必賢也官事無攝當廣求賢才以充","source":"맹자"},{"text":"之不可以闕人廢事也取士必得必得其人也無專殺大夫有罪則請命于天子而後","source":"맹자"},{"text":"殺之也無曲防不得曲爲隄防壅泉激水以專小利病鄰國也無遏糴鄰國凶荒","source":"맹자"},{"text":"不得閉糴也無有封而不告者不得專封國邑而不告天子也","source":"맹자"},{"text":"12-07-04 長君之惡其罪小逢君之惡其罪大今之大夫皆逢君之惡故曰今之","source":"맹자"},{"text":"大夫今之諸侯之罪人也","source":"맹자"},{"text":"君有過不能諫又順之者長君之惡也君之過未萌而先意導之者逢君之惡也","source":"맹자"},{"text":"治春秋者不先治五霸之功罪","source":"맹자"},{"text":"則事無統理而不得聖人之心","source":"맹자"},{"text":"有功者未有大於五霸","source":"맹자"},{"text":"有過者亦未有大於五霸","source":"맹자"},{"text":"故五霸者功之首罪之魁","source":"맹자"},{"text":"也孟子此章之意其亦若此也與然五霸得罪於三王今之諸侯得罪於五霸皆出於","source":"맹자"},{"text":"異世故得以逃其罪至於今之大夫宜得罪於今之諸侯則同時矣而諸侯非惟莫","source":"맹자"},{"text":"之罪也乃反以爲良臣而厚禮之不以爲罪而反以爲功何其謬哉","source":"맹자"},{"text":"告子下8章","source":"맹자"},{"text":"12-08-01 魯欲使愼子爲將軍","source":"맹자"},{"text":"12-08-02 孟子曰不敎民而用之謂之殃民殃民者不容於堯舜之世","source":"맹자"},{"text":"敎民者敎之禮義使知入事父兄出事長上也用之使之戰也","source":"맹자"},{"text":"12-08-03 一戰勝齊遂有南陽然且不可","source":"맹자"},{"text":"是時魯蓋欲使愼子伐齊取南陽也故孟子言就使愼子善戰有功如此且猶不可","source":"맹자"},{"text":"12-08-04 愼子勃然不悅曰此則滑釐所不識也","source":"맹자"},{"text":"滑釐愼子名","source":"맹자"},{"text":"12-08-05 曰吾明告子天子之地方千里不千里不足以待諸侯諸侯之地方百","source":"맹자"},{"text":"里不百里不足以守宗廟之典籍","source":"맹자"},{"text":"待諸侯謂待其朝覲聘問之禮宗廟典籍祭祀會同之常制也","source":"맹자"},{"text":"12-08-06 周公之封於魯爲方百里也地非不足而儉於百里太公之封於齊也亦","source":"맹자"},{"text":"爲方百里也地非不足也而儉於百里","source":"맹자"},{"text":"二公有大勳勞於天下而其封國不過百里儉止而不過之意也","source":"맹자"},{"text":"12-08-07 今魯方百里者五子以爲有王者作則魯在所損乎在所益乎","source":"맹자"},{"text":"魯地之大皆幷呑小國而得之有王者作則必在所損矣","source":"맹자"},{"text":"12-08-08 徒取諸彼以與此然且仁者不爲況於殺人以求之乎","source":"맹자"},{"text":"徒空也言不殺人而取之也","source":"맹자"},{"text":"12-08-09 君子之事君也務引其君以當道志於仁而己","source":"맹자"},{"text":"當道謂事合於理志仁謂心在於仁","source":"맹자"},{"text":"告子下9章","source":"맹자"},{"text":"12-09-01 孟子曰今之事君者曰我能爲君辟土地充府庫今之所謂良臣古之","source":"맹자"},{"text":"所謂民賊也君不鄕道不志於仁而求富之是富桀也","source":"맹자"},{"text":"12-09-02 我能爲君約與國戰必克今之所謂良臣古之所謂民賊也君不鄕道","source":"맹자"},{"text":"不志於仁而求爲之強戰是輔桀也","source":"맹자"},{"text":"約要結也與國和好相與之國也","source":"맹자"},{"text":"12-09-03 由今之道無變今之俗雖與之天下不能一朝居也","source":"맹자"},{"text":"言必爭奪而至於危亡也","source":"맹자"},{"text":"告子下10章","source":"맹자"},{"text":"12-10-01 白圭曰吾欲二十而取一何如","source":"맹자"},{"text":"白圭名丹周人也欲更稅法二十分而取其一分林氏曰按史記白圭能薄飮食","source":"맹자"},{"text":"忍嗜欲與童僕同苦樂樂觀時變人棄我取人取我與以此居積致富其爲此論","source":"맹자"},{"text":"蓋欲以其術施之國家也","source":"맹자"},{"text":"12-10-02 孟子曰子之道貉道也","source":"맹자"},{"text":"貉北方夷狄之國名也","source":"맹자"},{"text":"12-10-03 萬室之國一人陶則可乎曰不可器不足用也","source":"맹자"},{"text":"孟子設喩以詰圭而圭亦知其不可也","source":"맹자"},{"text":"12-10-04 曰夫貉五穀不生惟黍生之無城郭宮室宗廟祭祀之禮無諸侯幣帛饔","source":"맹자"},{"text":"飱無百官有司故二十取一而足也","source":"맹자"},{"text":"北方地寒不生五穀黍早熟故生之饔飱以飮食饋客之禮也","source":"맹자"},{"text":"12-10-05 今居中國去人倫無君子如之何其可也","source":"맹자"},{"text":"無君臣祭祀交際之禮是去人倫無百官有司是無君子","source":"맹자"},{"text":"12-10-06 陶而寡且不可以爲國況無君子乎","source":"맹자"},{"text":"因其辭以折之","source":"맹자"},{"text":"12-10-07 欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀小桀也","source":"맹자"},{"text":"什一而稅堯舜之道也多則桀寡則貉今欲輕重之則是小貉小桀而已","source":"맹자"},{"text":"告子下11章","source":"맹자"},{"text":"12-11-01 白圭曰丹之治水也愈於禹","source":"맹자"},{"text":"趙氏曰當時諸侯有小水白圭爲之築堤壅而注之他國","source":"맹자"},{"text":"12-11-02 孟子曰子過矣禹之治水水之道也","source":"맹자"},{"text":"順水之性也","source":"맹자"},{"text":"12-11-03 是故禹以四海爲壑今吾子以鄰國爲壑","source":"맹자"},{"text":"壑受水處也","source":"맹자"},{"text":"12-11-04 水逆行謂之洚水洚水者洪水也仁人之所惡也吾子過矣","source":"맹자"},{"text":"水逆行者下流壅塞故水逆流今乃壅水以害人則與洪水之災無異矣","source":"맹자"},{"text":"告子下12章","source":"맹자"},{"text":"12-12-01 孟子曰君子不亮惡乎執","source":"맹자"},{"text":"亮信也與諒同惡乎執言凡事苟且無所執持也","source":"맹자"},{"text":"告子下13章","source":"맹자"},{"text":"12-13-01 魯欲使樂正子爲政孟子曰吾聞之喜而不寐","source":"맹자"},{"text":"喜其道之得行","source":"맹자"},{"text":"12-13-02 公孫丑曰樂正子強乎曰否有知慮乎曰否多聞識乎曰否","source":"맹자"},{"text":"此三者皆當世之所尙而樂正子之所短故丑疑而歷問之","source":"맹자"},{"text":"12-13-03 然則奚爲喜而不寐","source":"맹자"},{"text":"12-13-04 曰其爲人也好善好善足乎","source":"맹자"},{"text":"12-13-05 曰好善優於天下而況魯國乎","source":"맹자"},{"text":"優有餘裕也言雖治天下尙有餘力也","source":"맹자"},{"text":"12-13-06 夫苟好善則四海之內皆將輕千里而來告之以善","source":"맹자"},{"text":"輕易也言不以千里爲難也","source":"맹자"},{"text":"12-13-07 夫苟不好善則人將曰訑訑予旣己知之矣訑訑之聲音顔色距人於千","source":"맹자"},{"text":"里之外士止於千里之外則讒諂面諛之人至矣與讒諂面諛之人居國欲治可得","source":"맹자"},{"text":"訑訑自足其智不嗜善言之貌君子小人迭爲消長直諒多聞之士遠則讒諂面諛","source":"맹자"},{"text":"之人至理勢然也○此章言爲政不在於用一己之長而貴於有以來天下之善","source":"맹자"},{"text":"告子下14章","source":"맹자"},{"text":"12-14-01 陳子曰古之君子何如則仕孟子曰所就三所去三","source":"맹자"},{"text":"12-14-02 迎之致敬以有禮言將行其言也則就之禮貌未衰言弗行也則去之","source":"맹자"},{"text":"所謂見行可之仕若孔子於季桓子是也受女樂而不朝則去之矣","source":"맹자"},{"text":"12-14-03 其次雖未行其言也迎之致敬以有禮則就之禮貌衰則去之","source":"맹자"},{"text":"所謂際可之仕若孔子於衛靈公是也故與公遊於囿公仰視蜚雁而後去之","source":"맹자"},{"text":"12-14-04 其下朝不食夕不食飢餓不能出門戶君聞之曰吾大者不能行其道","source":"맹자"},{"text":"又不能從其言也使飢餓於我土地吾恥之周之亦可受也免死而已矣","source":"맹자"},{"text":"所謂公養之仕也君之於民固有周之之義況此又有悔過之言所以可受然未至","source":"맹자"},{"text":"於飢餓不能出門戶則猶不受也其曰免死而已則其所受亦有節矣","source":"맹자"},{"text":"告子下15章","source":"맹자"},{"text":"12-15-01 孟子曰舜發於畎畝之中傅說擧於版築之間膠鬲擧於魚鹽之中管","source":"맹자"},{"text":"夷吾擧於士孫叔敖擧於海百里奚擧於市","source":"맹자"},{"text":"舜耕歷山三十登庸說築傅巖武丁擧之膠鬲遭亂鬻販魚鹽文王擧之管仲囚","source":"맹자"},{"text":"於士官桓公擧以相國孫叔敖隱處海濱楚莊王擧之爲令尹百里奚事見前篇","source":"맹자"},{"text":"12-15-02 故天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身","source":"맹자"},{"text":"行拂亂其所爲所以動心忍性曾益其所不能","source":"맹자"},{"text":"降大任使之任大事也若舜以下是也空窮也乏絶也拂戾也言使之所爲不遂多","source":"맹자"},{"text":"背戾也動心忍性謂竦動其心堅忍其性也然所謂性亦指氣禀食色而言耳程子","source":"맹자"},{"text":"曰若要熟也順從這裏過","source":"맹자"},{"text":"12-15-03 人恒過然後能改困於心衡於慮然後作徵於色發於聲而後喩","source":"맹자"},{"text":"恒常也猶言大率也橫不順也作奮起也徵驗也喩曉也此又言中人之性常必","source":"맹자"},{"text":"有過然後能改蓋不能謹於平日故必事勢窮蹙以至困於心橫於慮然後能奮發","source":"맹자"},{"text":"而興起不能燭於幾微故必事理暴著以至驗於人之色發於人之聲然後能警悟","source":"맹자"},{"text":"12-15-04 入則無法家拂士出則無敵國外患者國恒亡","source":"맹자"},{"text":"此言國亦然也法家法度之世臣也拂士輔弼之賢士也","source":"맹자"},{"text":"12-15-05 然後知生於憂患而死於安樂也","source":"맹자"},{"text":"以上文觀之則知人之生全出於憂患而死亡由於安樂矣○尹氏曰言困窮拂鬱","source":"맹자"},{"text":"能堅人之志而熟人之仁以安樂失之者多矣","source":"맹자"},{"text":"告子下16章","source":"맹자"},{"text":"12-16-01 孟子曰敎亦多術矣予不屑之敎誨也者是亦敎誨之而已矣","source":"맹자"},{"text":"多術言非一端屑潔也不以其人爲潔而拒絶之所謂不屑之敎誨也其人若能感此","source":"맹자"},{"text":"退自修省則是亦我敎誨之也○尹氏曰言或抑或揚或與或不與各因其材而篤之","source":"맹자"},{"text":"凡四十六章","source":"맹자"},{"text":"盡心上1章","source":"맹자"},{"text":"13-01-01 孟子曰盡其心者知其性也知其性則知天矣","source":"맹자"},{"text":"心者人之神明所以具衆理而應萬事者也性則心之所具之理而天又理之所從以","source":"맹자"},{"text":"出者也人有是心莫非全體然不窮理則有所蔽而無以盡乎此心之量故能極","source":"맹자"},{"text":"其心之全體而無不盡者必其能窮夫理而無不知者也旣知其理則其所從出亦不","source":"맹자"},{"text":"外是矣以大學之序言之知性則物格之謂盡心則知至之謂也","source":"맹자"},{"text":"13-01-02 存其心養其性所以事天也","source":"맹자"},{"text":"存謂操而不舍養謂順而不害事則奉承而不違也","source":"맹자"},{"text":"13-01-03 殀壽不貳修身以俟之所以立命也","source":"맹자"},{"text":"殀壽命之短長也貳疑也不貳者知天之至修身以俟死則事天以終身也立命謂","source":"맹자"},{"text":"全其天之所付不以人爲害之○程子曰心也性也天也一理也自理而言謂","source":"맹자"},{"text":"之天自禀受而言謂之性自存諸人而言謂之心張子曰由太虛有天之名由氣","source":"맹자"},{"text":"化有道之名合虛與氣有性之名合性與知覺有心之名愚謂盡心知性而知天","source":"맹자"},{"text":"所以造其理也存心養性以事天所以履其事也不知其理固不能履其事然徒造","source":"맹자"},{"text":"其理理不履其事則亦無以有諸己矣知天而不以殀壽貳其心智之盡也事天而","source":"맹자"},{"text":"能修身以俟死仁之至也智有不盡固不知所以爲仁然智而不仁則亦將流蕩不","source":"맹자"},{"text":"法而不足以爲智矣","source":"맹자"},{"text":"盡心上2章","source":"맹자"},{"text":"13-02-01 孟子曰莫非命也順受其正","source":"맹자"},{"text":"人物之生吉凶禍福皆天所命然惟莫之致而至者乃爲正命故君子修身以俟","source":"맹자"},{"text":"之所以順受乎此也","source":"맹자"},{"text":"13-02-02 是故知命者不立乎巖墻之下","source":"맹자"},{"text":"命謂正命巖墻墻之將覆者知正命則不處危地以取覆壓之禍","source":"맹자"},{"text":"13-02-03 盡其道而死者正命也","source":"맹자"},{"text":"盡其道則所値之吉凶皆莫之致而至者矣","source":"맹자"},{"text":"13-02-04 桎梏死者非正命也","source":"맹자"},{"text":"桎梏所以拘罪人者言犯罪而死與立巖墻之下者同皆人所取非天所爲也○","source":"맹자"},{"text":"此章與上章蓋一時之言所以發其末句未盡之意","source":"맹자"},{"text":"盡心上3章","source":"맹자"},{"text":"13-03-01 孟子曰求則得之舍則失之是求有益於得也求在我者也","source":"맹자"},{"text":"在我者謂仁義禮智凡性之所有者","source":"맹자"},{"text":"13-03-02 求之有道得之有命是求無益於得也求在外者也","source":"맹자"},{"text":"有道言不可妄求有命則不可必得在外者謂富貴利達凡外物皆是○趙氏曰","source":"맹자"},{"text":"言爲仁由己富貴在天如不可求從吾所好","source":"맹자"},{"text":"盡心上4章","source":"맹자"},{"text":"13-04-01 孟子曰萬物皆備於我矣","source":"맹자"},{"text":"此言理之本然也大則君臣父子小則事物細微其當然之理無一不具於性分之內","source":"맹자"},{"text":"13-04-02 反身而誠樂莫大焉","source":"맹자"},{"text":"誠實也言反諸身而所備之理皆如惡惡臭好好色之實然則其行之不待勉強而無","source":"맹자"},{"text":"不利矣其爲樂孰大於是","source":"맹자"},{"text":"13-04-03 強恕而行求仁莫近焉","source":"맹자"},{"text":"強勉強也恕推己以及人也反身而誠則仁矣其有未誠則是猶有私意之隔而理未","source":"맹자"},{"text":"純也故當凡事勉強推己及人庶幾心公理得而仁不遠也○此章言萬物之理","source":"맹자"},{"text":"具於吾身體之而實則道在我而樂有餘行之以恕則私不容而仁可得","source":"맹자"},{"text":"盡心上5章","source":"맹자"},{"text":"13-05-01 孟子曰行之而不著焉習矣而不察焉終身由之而不知其道者衆也","source":"맹자"},{"text":"著者知之明察者識之精言方行之而不能明其所當然旣習矣而猶不識其所以","source":"맹자"},{"text":"然所以終身由之而不知其道者多也","source":"맹자"},{"text":"盡心上6章","source":"맹자"},{"text":"13-06-01 孟子曰人不可以無恥無恥之恥無恥矣","source":"맹자"},{"text":"趙氏曰人能恥己之無所恥是能改行從善之人終身無復有恥辱之累矣","source":"맹자"},{"text":"盡心上7章","source":"맹자"},{"text":"13-07-01 孟子曰恥之於人大矣","source":"맹자"},{"text":"恥者吾所固有羞惡之心也存之則進於聖賢失之則入於禽獸故所繫爲甚大","source":"맹자"},{"text":"13-07-02 爲機變之巧者無所用恥焉","source":"맹자"},{"text":"爲機械變詐之巧者所爲之事皆人所深恥而彼方且自以爲得計故無所用其愧","source":"맹자"},{"text":"13-07-03 不恥不若人何若人有","source":"맹자"},{"text":"但無恥一事不如人則事事不如人矣或曰不恥其不如人則何能有如人之事其","source":"맹자"},{"text":"義亦通或問人有恥不能之心如何程子曰恥其不能而爲之可也恥其不能而","source":"맹자"},{"text":"掩藏之不可也","source":"맹자"},{"text":"盡心上8章","source":"맹자"},{"text":"13-08-01 孟子曰古之賢王好善而忘勢古之賢士何獨不然樂其道而忘人之勢故","source":"맹자"},{"text":"王公不致敬盡禮則不得亟見之見且猶不得亟而況得而臣之乎","source":"맹자"},{"text":"言君當屈己以下賢士不枉道而求利二者勢若相反而實則相成蓋亦各盡其道","source":"맹자"},{"text":"盡心上9章","source":"맹자"},{"text":"13-09-01 孟子謂宋句踐曰子好遊乎吾語子遊","source":"맹자"},{"text":"宋姓句踐名遊遊說也","source":"맹자"},{"text":"13-09-02 人知之亦囂囂人不知亦囂囂","source":"맹자"},{"text":"趙氏曰囂囂自得無欲之貌","source":"맹자"},{"text":"13-09-03 曰何如斯可以囂囂矣曰尊德樂義則可以囂囂矣","source":"맹자"},{"text":"德謂所得之善","source":"맹자"},{"text":"尊之則有以自重而不慕乎人爵之榮","source":"맹자"},{"text":"義謂所守之正","source":"맹자"},{"text":"樂之則有以自","source":"맹자"},{"text":"安而不徇乎外物之誘矣","source":"맹자"},{"text":"13-09-04 故士窮不失義達不離道","source":"맹자"},{"text":"言不以貧賤而移不以富貴而淫此尊德樂義見於行事之實也","source":"맹자"},{"text":"13-09-05 窮不失義故士得己焉達不離道故民不失望焉","source":"맹자"},{"text":"得己言不失己也民不失望言人素望其興道致治而今果如所望也","source":"맹자"},{"text":"13-09-06 古之人得志澤加於民不得志修身見於世窮則獨善其身達則兼善天","source":"맹자"},{"text":"見謂名實之顯著也此又言士得己民不失望之實○此章言內重而外輕則無","source":"맹자"},{"text":"盡心上10章","source":"맹자"},{"text":"13-10-01 孟子曰待文王而後興者凡民也若夫豪傑之士雖無文王猶興","source":"맹자"},{"text":"興者感動奮發之意凡民庸常之人也豪傑有過人之才智者也蓋降衷秉彝人","source":"맹자"},{"text":"所同得唯上智之資無物欲之蔽爲能無待於敎而自能感發以有爲也","source":"맹자"},{"text":"盡心上11章","source":"맹자"},{"text":"13-11-01 孟子曰附之以韓魏之家如其自視欿然則過人遠矣","source":"맹자"},{"text":"附益也韓魏晉卿富家也欿然不自滿之意尹氏曰言有過人之識則不以富貴爲","source":"맹자"},{"text":"盡心上12章","source":"맹자"},{"text":"13-12-01 孟子曰以佚道使民雖勞不怨以生道殺民雖死不怨殺者","source":"맹자"},{"text":"程子曰以佚道使民謂本欲佚之也播穀乘屋之類是也以生道殺民謂本欲生之","source":"맹자"},{"text":"也除害去惡之類是也蓋不得已而爲其所當爲則雖咈民之欲而民不怨其不然","source":"맹자"},{"text":"盡心上13章","source":"맹자"},{"text":"13-13-01 孟子曰霸者之民驩虞如也王者之民皥皥如也","source":"맹자"},{"text":"驩虞與歡娛同皥皥廣大自得之貌程子曰驩虞有所造爲而然豈能久也耕田鑿","source":"맹자"},{"text":"井帝力何有於我如天之自然乃王者之政楊氏曰所以致人驩虞必有違道干","source":"맹자"},{"text":"譽之事若王者則如天亦不令人喜亦不令人怒","source":"맹자"},{"text":"13-13-02 殺之而不怨利之而不庸民日遷善而不知爲之者","source":"맹자"},{"text":"此所謂皥皥如也庸功也豊氏曰因民之所惡而去之非有心於殺之也何怨之有","source":"맹자"},{"text":"因民之所利而利之非有心於利之也何庸之有輔其性之自然使自得之故民日","source":"맹자"},{"text":"遷善而不知誰之所爲也","source":"맹자"},{"text":"13-13-03 夫君子所過者化所存者神上下與天地同流豈曰小補之哉","source":"맹자"},{"text":"君子聖人之通稱也所過者化身所經歷之處卽人無不化如舜之耕歷山而田者遜","source":"맹자"},{"text":"畔陶河濱而器不苦窳也所存者神心所存主處便神妙不測如孔子之立斯立道","source":"맹자"},{"text":"斯行綏斯來動斯和莫知其所以然而然也是其德業之盛乃與天地之化同運並","source":"맹자"},{"text":"行擧一世而甄陶之非如霸者但小小補塞其罅漏而已此則王道之所以爲大而學","source":"맹자"},{"text":"者所當盡心也","source":"맹자"},{"text":"盡心上14章","source":"맹자"},{"text":"13-14-01 孟子曰仁言不如仁聲之入人深也","source":"맹자"},{"text":"程子曰仁言謂以仁厚之言加於民仁聲謂仁聞謂有仁之實而爲衆所稱道者","source":"맹자"},{"text":"也此尤見仁德之昭著故其感人尤深也","source":"맹자"},{"text":"13-14-02 善政不如善敎之得民也","source":"맹자"},{"text":"政謂法道禁令所以制其外也敎謂道德齊禮所以格其心也","source":"맹자"},{"text":"13-14-03 善政民畏之善敎民愛之善政得民財善敎得民心","source":"맹자"},{"text":"得民財者百姓足而君無不足也得民心者不遺其親不後其君也","source":"맹자"},{"text":"盡心上15章","source":"맹자"},{"text":"13-15-01 孟子曰人之所不學而能者其良能也所不慮而知者其良知也","source":"맹자"},{"text":"良者本然之善也程子曰良知良能皆無所由乃出於天不繫於人","source":"맹자"},{"text":"13-15-02 孩提之童無不知愛其親也及其長也無不知敬其兄也","source":"맹자"},{"text":"孩提二三歲之間知孩笑可提抱者也愛親敬長所謂良知良能者也","source":"맹자"},{"text":"13-15-03 親親仁也敬長義也無他達之天下也","source":"맹자"},{"text":"言親親敬長雖一人之私然達之天下無不同者所以爲仁義也","source":"맹자"},{"text":"盡心上16章","source":"맹자"},{"text":"13-16-01 孟子曰舜之居深山之中與木石居與鹿豕遊其所以異於深山之野人","source":"맹자"},{"text":"者幾希及其聞一善言見一善行若決江河沛然莫之能禦也","source":"맹자"},{"text":"居深山謂耕歷山時也蓋聖人之心至虛至明渾然之中萬理畢具一有感觸則","source":"맹자"},{"text":"其應甚速而無所不通非孟子造道之深不能形容至此也","source":"맹자"},{"text":"盡心上17章","source":"맹자"},{"text":"13-17-01 孟子曰無爲其所不爲無欲其所不欲如此而已矣","source":"맹자"},{"text":"李氏曰有所不爲不欲人皆有是心也至於私意一萌而不能以禮義制之則爲所不","source":"맹자"},{"text":"爲欲所不欲者多矣能反是心則所謂擴充其羞惡之心者而義不可勝用矣故曰如","source":"맹자"},{"text":"盡心上18章","source":"맹자"},{"text":"13-18-01 孟子曰人之有德慧術知者恒存乎疢疾","source":"맹자"},{"text":"德慧者德之慧術知者術之知疢疾猶災患也言人必有疢疾則能動心忍性增","source":"맹자"},{"text":"益其所不能也","source":"맹자"},{"text":"13-18-02 獨孤臣孼子其操心也危其慮患也深故達","source":"맹자"},{"text":"孤臣遠臣孼子庶子皆不得於君親而常有疢疾者也達謂達於事理卽所謂德慧術","source":"맹자"},{"text":"盡心上19章","source":"맹자"},{"text":"13-19-01 孟子曰有事君人者事是君則爲容悅者也","source":"맹자"},{"text":"阿徇以爲容逢迎以爲悅此鄙夫之事妾婦之道也","source":"맹자"},{"text":"13-19-02 有安社稷臣者以安社稷爲悅者也","source":"맹자"},{"text":"言大臣之計安社稷如小人之務悅其君眷眷於此而不忘也","source":"맹자"},{"text":"13-19-03 有天民者達可行於天下而後行之者也","source":"맹자"},{"text":"民者無位之稱以其全盡天理乃天之民故謂之天民必其道可行於天下然後行","source":"맹자"},{"text":"之不然則寧沒世不見知而不悔不肯小用其道以徇於人也張子曰必功覆斯民","source":"맹자"},{"text":"然後出如伊呂之徒","source":"맹자"},{"text":"13-19-04 有大人者正己而物正者也","source":"맹자"},{"text":"大人德盛而上下化之所謂見龍在田天下文明者○此章言人品不同略有四等","source":"맹자"},{"text":"容悅佞臣不足言安社稷則忠矣然猶一國之士也天民則非一國之士矣然猶有","source":"맹자"},{"text":"意也無意無必唯其所在而物無不化惟聖者能之","source":"맹자"},{"text":"盡心上20章","source":"맹자"},{"text":"13-20-01 孟子曰君子有三樂而王天下不與存焉","source":"맹자"},{"text":"13-20-02 父母俱存兄弟無故一樂也","source":"맹자"},{"text":"此人所深願而不可必得者今旣得之其樂可知","source":"맹자"},{"text":"13-20-03 仰不愧於天俯不怍於人二樂也","source":"맹자"},{"text":"程子曰人能克己則仰不愧俯不怍心廣體胖其樂可知有息則餒矣","source":"맹자"},{"text":"13-20-04 得天下英才而敎育之三樂也","source":"맹자"},{"text":"盡得一世明睿之才而以所樂乎己者敎而養之則斯道之傳得之者衆而天下後","source":"맹자"},{"text":"世將無不被其澤矣聖人之心所願欲者莫大於此今旣得之其樂爲何如哉","source":"맹자"},{"text":"13-20-05 君子有三樂而王天下不與存焉","source":"맹자"},{"text":"林氏曰此三樂者一係於天一係於人其可以自致者惟不愧不怍而已學者可不","source":"맹자"},{"text":"盡心上21章","source":"맹자"},{"text":"13-21-01 孟子曰廣土衆民君子欲之所樂不存焉","source":"맹자"},{"text":"地闢民聚澤可遠施故君子欲之然未足以爲樂也","source":"맹자"},{"text":"13-21-02 中天下而立定四海之民君子樂之所性不存焉","source":"맹자"},{"text":"其道大行無一夫不被其澤故君子樂之然其所得於天者則不在是也","source":"맹자"},{"text":"13-21-03 君子所性雖大行不加焉雖窮居不損焉分定故也","source":"맹자"},{"text":"分者所得於天之全體故不以窮達而有異","source":"맹자"},{"text":"13-21-04 君子所性仁義禮智根於心其生色也睟然見於面盎於背施於四體","source":"맹자"},{"text":"四體不言而喩","source":"맹자"},{"text":"上言所性之分與所欲所樂不同此乃言其蘊也仁義禮智性之四德也根本也生","source":"맹자"},{"text":"睟然淸和潤澤之貌","source":"맹자"},{"text":"盎豐厚盈溢之意","source":"맹자"},{"text":"謂見於動作威儀之間也","source":"맹자"},{"text":"喩曉也四體不言而喩言四體不待吾言而自能曉吾意也蓋氣禀淸明無物欲之累","source":"맹자"},{"text":"則性之四德根本於心其積之盛則發而著見於外者不待言而無不順也程子曰","source":"맹자"},{"text":"睟面盎背皆積盛致然四體不言而喩惟有德者能之○此章言君子固欲其道之","source":"맹자"},{"text":"大行然其所得於天者則不以是而有所加損也","source":"맹자"},{"text":"盡心上22章","source":"맹자"},{"text":"13-22-01 孟子曰伯夷辟紂居北海之濱聞文王作興曰盍歸乎來吾聞西伯善","source":"맹자"},{"text":"養老者大公辟紂居東海之濱聞文王作興曰盍歸乎來吾聞西伯善養老者天","source":"맹자"},{"text":"下有善養老則仁人以爲己歸矣","source":"맹자"},{"text":"己歸謂己之所歸餘見前篇","source":"맹자"},{"text":"13-22-02 五畝之宅樹墻下以桑匹婦蠶之則老者足以衣帛矣五母鷄二母彘","source":"맹자"},{"text":"無失其時老者足以無失肉矣百畝之田匹夫耕之八口之家可以無飢矣","source":"맹자"},{"text":"此文王之政也一家養母鷄五母彘二也餘見前篇","source":"맹자"},{"text":"13-22-03 所謂西伯善養老者制其田里敎之樹畜導其妻子使養其老五十非","source":"맹자"},{"text":"帛不煖七十非肉不飽不煖不飽謂之凍餒文王之民無凍餒之老者此之謂也","source":"맹자"},{"text":"田謂百畝之田里謂五畝之宅樹謂耕桑畜謂鷄彘也趙氏曰善養老者敎導之","source":"맹자"},{"text":"使可以養其老耳非家賜而人益之也","source":"맹자"},{"text":"盡心上23章","source":"맹자"},{"text":"13-23-01 孟子曰易其田疇薄其稅斂民可使富也","source":"맹자"},{"text":"易治也疇耕治之田也","source":"맹자"},{"text":"13-23-02 食之以時用之以禮財不可勝用也","source":"맹자"},{"text":"敎民節儉則財用足矣","source":"맹자"},{"text":"13-23-03 民非水火不生活昏暮叩人之門戶求水火無弗與者至足矣聖人","source":"맹자"},{"text":"治天下使有菽粟如水火菽粟如水火而民焉有不仁者乎","source":"맹자"},{"text":"水火民之所急宜其愛之而反不愛者多故也尹氏曰言禮義生於富足民無常","source":"맹자"},{"text":"産則無常心矣","source":"맹자"},{"text":"盡心上24章","source":"맹자"},{"text":"13-24-01 孟子曰孔子登東山而小魯登太山而小天下故觀於海者難爲水遊","source":"맹자"},{"text":"於聖人之門者難爲言","source":"맹자"},{"text":"此言聖人之道大也東山蓋魯城東之高山而太山則又高矣此言所處益高則","source":"맹자"},{"text":"其視下益小所見旣大則其小者不足觀也難爲水難爲言猶仁不可爲衆之意","source":"맹자"},{"text":"13-24-02 觀水有術必觀其瀾日月有明容光必照焉","source":"맹자"},{"text":"此言道之有本也瀾水之湍急處也明者光之體光者明之用也觀水之瀾則知其","source":"맹자"},{"text":"源之有本矣觀日月於容光之隙無不照則知其明之有本矣","source":"맹자"},{"text":"13-24-03 流水之爲物也不盈科不行君子之志於道也不成章不達","source":"맹자"},{"text":"言學當以漸","source":"맹자"},{"text":"成章所積者厚而文章外見也","source":"맹자"},{"text":"達者足於此而通於彼也","source":"맹자"},{"text":"此章言聖人之道大而有本學之者必以其漸乃能至也","source":"맹자"},{"text":"盡心上25章","source":"맹자"},{"text":"13-25-01 孟子曰鷄鳴而起孶孶爲善者舜之徒也","source":"맹자"},{"text":"孶孶勤勉之意言雖未至於聖人亦是聖人之徒也","source":"맹자"},{"text":"13-25-02 鷄鳴而起孶孶爲利者蹠之徒也","source":"맹자"},{"text":"13-25-03 欲知舜與蹠之分無他利與善之間也","source":"맹자"},{"text":"程子曰言間者謂相去不遠所爭毫末耳善與利公私而已矣才出於善便以利","source":"맹자"},{"text":"言也○楊氏曰舜蹠之相去遠矣而其分乃在利善之間而已是豈可以不謹然","source":"맹자"},{"text":"講之不熟見之不明未有不以利爲義者又學者所當深察也或問鷄鳴而起若未","source":"맹자"},{"text":"接物如何爲善程子曰只主於敬便是爲善","source":"맹자"},{"text":"盡心上26章","source":"맹자"},{"text":"13-26-01 孟子曰楊子取爲我拔一毛而利天下不爲也","source":"맹자"},{"text":"楊子名朱取者僅足之意取爲我者僅足於爲我而已不及爲人也列子稱其言曰","source":"맹자"},{"text":"佰成子高不以一毫利物是也","source":"맹자"},{"text":"13-26-02 墨子兼愛摩頂放踵利天下爲之","source":"맹자"},{"text":"墨子名翟兼愛無所不愛也摩頂摩突其頂也放至也","source":"맹자"},{"text":"13-26-03 子莫執中執中爲近之執中無權猶執一也","source":"맹자"},{"text":"子莫魯之賢者也知楊墨之失中也故度於二者之間而執其中近近道也權稱錘","source":"맹자"},{"text":"也所以稱物之輕重而取中也執中而無權則膠於一定之中而不知變是亦執一","source":"맹자"},{"text":"而已矣程子曰中字最難識須是黙識心通且試言一廳則中央爲中一家則廳非","source":"맹자"},{"text":"中而堂爲中一國則堂非中而國之中爲中推此類可見矣又曰中不可執也識得","source":"맹자"},{"text":"則事事物物皆有自然之中不待安排安排著則不中矣","source":"맹자"},{"text":"13-26-04 所惡執一者爲其賊道也擧一而廢百也","source":"맹자"},{"text":"賊害也爲我害仁兼愛害義執中者害於時中皆擧一而廢百者也○此章言道","source":"맹자"},{"text":"之所貴者中中之所貴者權楊氏曰禹稷三過其門而不入苟不當其可則與墨子","source":"맹자"},{"text":"無異顔子在陋巷不改其樂苟不當其可則與楊氏無異子莫執爲我兼愛之中而","source":"맹자"},{"text":"無權鄕鄰有鬪而不知閉戶同室有鬪而不知救之是亦猶執一耳故孟子以爲賊","source":"맹자"},{"text":"道禹稷顔回易地則皆然以其有權也不然則是亦楊墨而已矣","source":"맹자"},{"text":"盡心上27章","source":"맹자"},{"text":"13-27-01 孟子曰飢者甘食渴者甘飮是未得飮食之正也飢渴害之也豈惟口腹","source":"맹자"},{"text":"有飢渴之害人心亦皆有害","source":"맹자"},{"text":"口腹爲飢渴所害故於飮食不暇擇而失其正味人心爲貧賤所害故於富貴不","source":"맹자"},{"text":"暇擇而失其正理","source":"맹자"},{"text":"13-27-02 人能無以飢渴之害爲心害則不及人不爲憂矣","source":"맹자"},{"text":"人能不以貧賤之故而動其心則過人遠矣","source":"맹자"},{"text":"盡心上20章","source":"맹자"},{"text":"13-28-01 孟子曰柳下惠不以三公易其介","source":"맹자"},{"text":"介有分辨之意柳下惠進不隱賢必以其道遺佚不怨阨窮不憫直道事人至於","source":"맹자"},{"text":"三黜是其介也○此章言柳下惠和而不流與孔子論夷齊不念舊惡意正相類","source":"맹자"},{"text":"皆聖賢微顯闡幽之意也","source":"맹자"},{"text":"盡心上29章","source":"맹자"},{"text":"13-29-01 孟子曰有爲者辟若掘井掘井九軔而不及泉猶爲棄井也","source":"맹자"},{"text":"八尺曰仞言鑿井雖深然未及泉而止猶爲自棄其井也○呂侍講曰仁不如堯","source":"맹자"},{"text":"孝不如舜學不如孔子終未入於聖人之域終未至於天道未免爲半塗而廢自棄","source":"맹자"},{"text":"盡心上30章","source":"맹자"},{"text":"13-30-01 孟子曰堯舜性之也湯武身之也五霸假之也","source":"맹자"},{"text":"堯舜天性渾全不假修習湯武修身體道以復其性五霸則假借仁義之名以求濟","source":"맹자"},{"text":"其貪欲之私耳","source":"맹자"},{"text":"13-30-02 久假而不歸惡知其非有也","source":"맹자"},{"text":"歸還也有實有也言竊其名以終身而不自知其非眞有或曰蓋歎世人莫覺其僞者","source":"맹자"},{"text":"亦通舊說久假不歸卽爲眞有則誤矣○尹氏曰性之者與道一也身之者履之","source":"맹자"},{"text":"也及其成功則一也五霸則假之而已是以功烈如彼其卑也","source":"맹자"},{"text":"盡心上31章","source":"맹자"},{"text":"13-31-01 公孫丑曰伊尹曰予不狎于不順放太甲于桐民大悅太甲賢又反之","source":"맹자"},{"text":"予不狎于不順太甲篇文狎習見也不順言太甲所爲不順義理也餘見前篇","source":"맹자"},{"text":"13-31-02 賢者之爲人臣也其君不賢則固可放與","source":"맹자"},{"text":"13-31-03 孟子曰有伊尹之志則可無伊尹之志則簒也","source":"맹자"},{"text":"伊尹之志公天下以爲心而無一毫之私者也","source":"맹자"},{"text":"盡心上32章","source":"맹자"},{"text":"13-32-01 公孫丑曰詩曰不素餐兮君子之不耕而食何也孟子曰君子居是國也","source":"맹자"},{"text":"其君用之則安富尊榮其子弟從之則孝弟忠信不素簒兮孰大於是","source":"맹자"},{"text":"詩魏國風伐檀之篇素空也無功而食祿謂之素餐此與告陳相彭更之意同","source":"맹자"},{"text":"盡心上33章","source":"맹자"},{"text":"13-33-01 王子墊問曰士何事","source":"맹자"},{"text":"墊齊王之子也上則公卿大夫下則農工商賈皆有所事而士居其間獨無所事故","source":"맹자"},{"text":"王子問之也","source":"맹자"},{"text":"13-33-02 孟子曰尙志","source":"맹자"},{"text":"尙高尙也志者心之所之也士旣未得行公卿大夫之道又不當爲農工商賈之業則","source":"맹자"},{"text":"高尙其志而已","source":"맹자"},{"text":"13-33-03 曰何謂尙志曰仁義而已矣殺一無罪非仁也非其有而取之非義也居惡","source":"맹자"},{"text":"在仁是也路惡在義是也居仁由義大人之事備矣","source":"맹자"},{"text":"非仁非義之事雖小不爲而所居所由無不在於仁義此士所以尙其志也大人謂","source":"맹자"},{"text":"言士雖未得大人之位","source":"맹자"},{"text":"而其志如此","source":"맹자"},{"text":"則大人之事體用已全","source":"맹자"},{"text":"若小人之事","source":"맹자"},{"text":"則固非所當爲也","source":"맹자"},{"text":"盡心上34章","source":"맹자"},{"text":"13-34-01 孟子曰仲子不義與之齊國而弗受人皆信之是舍簞食豆羹之義也人","source":"맹자"},{"text":"莫大焉亡親戚君臣上下以其小者信其大者奚可哉","source":"맹자"},{"text":"仲子陳仲子也言仲子設若非義而與之齊國必不肯受齊人皆信其賢然此但小廉","source":"맹자"},{"text":"耳其辟兄離母不食君祿無人道之大倫罪莫大焉豈可以小廉信其大節而遂","source":"맹자"},{"text":"盡心上35章","source":"맹자"},{"text":"13-35-01 桃應問曰舜爲天子皐陶爲士瞽瞍殺人則如之何","source":"맹자"},{"text":"桃應孟子弟子也其意以爲舜雖愛父而不可以私害公皐陶雖執法而不可以刑天","source":"맹자"},{"text":"子之父故設此問以觀聖賢用心之所極非以爲眞有此事也","source":"맹자"},{"text":"13-35-02 孟子曰執之而已矣","source":"맹자"},{"text":"言皐陶之心知有法而已不知有天子之父也","source":"맹자"},{"text":"13-35-03 然則舜不禁與","source":"맹자"},{"text":"13-35-04 曰夫舜惡得而禁之夫有所受之也","source":"맹자"},{"text":"言皐陶之法有所傳受非所敢私雖天子之命亦不得而廢之也","source":"맹자"},{"text":"13-35-05 然則舜如之何","source":"맹자"},{"text":"13-35-06 曰舜視棄天下猶棄敝蹝也竊負而逃遵海濱而處終身訢然樂而忘天","source":"맹자"},{"text":"蹝草履也遵循也言舜之心知有父而已不知有天下也孟子嘗言舜視天下猶","source":"맹자"},{"text":"草芥而惟順於父母可以解憂與此意互相發○此章言爲士者但知有法而","source":"맹자"},{"text":"不知天子父之爲尊爲子者但知有父而不知天下之爲大蓋其所以爲心者莫非天","source":"맹자"},{"text":"理之極人倫之至學者察此而有得焉則不待較計論量而天下無難處之事矣","source":"맹자"},{"text":"盡心上36章","source":"맹자"},{"text":"13-36-01 孟子自范之齊望見齊王之子喟然歎曰居移氣養移體大哉居乎夫非","source":"맹자"},{"text":"盡人之子與","source":"맹자"},{"text":"范齊邑居謂所處之位養奉養也言人之居處所繫甚大王子亦人子耳特以所","source":"맹자"},{"text":"居不同故所養不同而其氣體有異也","source":"맹자"},{"text":"13-36-02 孟子曰","source":"맹자"},{"text":"張鄒皆云羡文也","source":"맹자"},{"text":"13-36-03 王子宮室車馬衣服多與人同而王子若彼者其居使之然也況居天下之","source":"맹자"},{"text":"廣居見前篇尹氏曰睟然見於面盎於背居天下之廣居者然也","source":"맹자"},{"text":"13-36-04 魯君之宋呼於垤澤之門守者曰此非吾君也何其聲之似我君也此無","source":"맹자"},{"text":"他居相似也","source":"맹자"},{"text":"垤澤宋城門名也孟子又引此事爲證","source":"맹자"},{"text":"盡心上37章","source":"맹자"},{"text":"13-37-01 孟子曰食而弗愛豕交之也愛而不敬獸畜之也","source":"맹자"},{"text":"交接也畜養也獸謂犬馬之屬","source":"맹자"},{"text":"13-37-02 恭敬者幣之未將者也","source":"맹자"},{"text":"將猶奉也詩曰承筐是將程子曰恭敬雖因威儀幣帛而後發見然幣之未將時","source":"맹자"},{"text":"已有此恭敬之心非因幣帛而後有也","source":"맹자"},{"text":"13-37-03 恭敬而無實君子不可虛拘","source":"맹자"},{"text":"此言當時諸侯之待賢者特以幣帛爲恭敬而無其實也拘留也","source":"맹자"},{"text":"盡心上38章","source":"맹자"},{"text":"13-38-01 孟子曰形色天性也惟聖人然後可以踐形","source":"맹자"},{"text":"人之有形有色無不各有自然之理所謂天性也踐如踐言之踐蓋衆人有是形而不","source":"맹자"},{"text":"能盡其理故無以踐其形惟聖人有是形而又能盡其理然後可以踐其形而無歉","source":"맹자"},{"text":"也○程子曰此言聖人盡得人道而能充其形也蓋人得天地之正氣而生與萬物","source":"맹자"},{"text":"不同旣爲人須盡得人理然後稱其名衆人有之而不知賢人踐之而未盡能充","source":"맹자"},{"text":"其形惟聖人也楊氏曰天生烝民有物有則物者形色也則者性也各盡其則則","source":"맹자"},{"text":"可以踐形矣","source":"맹자"},{"text":"盡心上39章","source":"맹자"},{"text":"13-39-01 齊宣王欲短喪公孫丑曰爲朞之喪猶愈於已乎","source":"맹자"},{"text":"13-39-02 孟子曰是猶或紾其兄之臂子謂之姑徐徐云爾亦敎之孝弟而己矣","source":"맹자"},{"text":"紾戾也敎之以孝弟之道則彼當自知兄之不可戾而喪之不可短矣孔子曰子生三","source":"맹자"},{"text":"年然後免於父母之懷予也有三年之愛於其父母乎所謂敎之以孝弟者如此蓋示","source":"맹자"},{"text":"之以至情之不能已者非強之也","source":"맹자"},{"text":"13-39-03 王子有其母死者其傅爲之請數月之喪公孫丑曰若此者何如也","source":"맹자"},{"text":"陳氏曰王子所生之母死厭於嫡母而不敢終喪其傅爲請於王欲使得行數月之喪","source":"맹자"},{"text":"也時又適有此事丑問如此者是非何如按儀禮公子爲其母練冠麻衣縓緣","source":"맹자"},{"text":"旣葬除之疑當時此禮已廢或旣葬而未忍卽除故請之也","source":"맹자"},{"text":"13-39-04 曰是欲終之而不可得也雖加一日愈於己謂夫莫之禁而弗爲者也","source":"맹자"},{"text":"言王子欲終喪而不可得其傅爲請雖止得加一日猶勝不加我前所譏乃謂夫莫","source":"맹자"},{"text":"之禁而自不爲者耳○此章言三年通喪天經地義不容私意有所短長示之至","source":"맹자"},{"text":"情則不肖者有以企而及之矣","source":"맹자"},{"text":"盡心上40章","source":"맹자"},{"text":"13-40-01 孟子曰君子之所以敎者五","source":"맹자"},{"text":"下文五者蓋因人品高下或相去遠近先後之不同","source":"맹자"},{"text":"13-40-02 有如時雨化之者","source":"맹자"},{"text":"時雨及時之雨也草木之生播種封植人力已至而未能自化所少者雨露之滋耳","source":"맹자"},{"text":"及此時而雨之則其化速矣敎人之妙亦猶是也若孔子之於顔曾是已","source":"맹자"},{"text":"13-40-03 有成德者有達財者","source":"맹자"},{"text":"財與材同此各因其所長而敎之者也成德如孔子之於冉閔達財如孔子之於由賜","source":"맹자"},{"text":"13-40-04 有答問者","source":"맹자"},{"text":"就所問而答之若孔孟之於樊遲萬章也","source":"맹자"},{"text":"13-40-05 有私淑艾者","source":"맹자"},{"text":"人或不能及門受業","source":"맹자"},{"text":"但聞君子之道於人而竊以善治其身","source":"맹자"},{"text":"是亦君子敎誨之所及","source":"맹자"},{"text":"若孔孟之於陳亢夷之","source":"맹자"},{"text":"予未得爲孔子徒也","source":"맹자"},{"text":"予私淑諸人也","source":"맹자"},{"text":"13-40-06 此五者君子之所以敎也","source":"맹자"},{"text":"聖賢施敎各因其材小以成小大以成大無棄人也","source":"맹자"},{"text":"盡心上41章","source":"맹자"},{"text":"13-41-01 公孫丑曰道則高矣美矣宜若登天然似不可及也何不使彼爲可幾及","source":"맹자"},{"text":"而日孶孶也","source":"맹자"},{"text":"13-41-02 孟子曰大匠不爲拙工改廢繩墨羿不爲拙射變其彀率","source":"맹자"},{"text":"彀率彎弓之限也言敎人者皆有不可易之法不容自貶以徇學者之不能也","source":"맹자"},{"text":"13-41-03 君子引而不發躍如也中道而立能者從之","source":"맹자"},{"text":"引引弓也發發矢也躍如如踊躍而出也因上文彀率而言君子敎人但授以學之之","source":"맹자"},{"text":"法而不告以得之之妙如射者之引弓而不發矢然其所不告者已如踊躍而見於","source":"맹자"},{"text":"前矣中者無過不及之謂中道而立言其非難非易能者從之言學者當自勉也○","source":"맹자"},{"text":"此章言道有定體敎有成法卑不可抗高不可貶語不能顯黙不能藏","source":"맹자"},{"text":"盡心上42章","source":"맹자"},{"text":"13-42-01 孟子曰天下有道以道殉身天下無道以身殉道","source":"맹자"},{"text":"殉如殉葬之殉以死隨物之名也身出則道在必行道屈則身在必退以死相從而不","source":"맹자"},{"text":"13-42-02 未聞以道殉乎人者也","source":"맹자"},{"text":"以道從人妾婦之道","source":"맹자"},{"text":"盡心上43章","source":"맹자"},{"text":"13-43-01 公都子曰滕更之在門也若在所禮而不答何也","source":"맹자"},{"text":"趙氏曰滕更滕君之弟來學者也","source":"맹자"},{"text":"13-43-02 孟子曰挾貴而問挾賢而問挾長而問挾有勳勞而問挾故而問皆所","source":"맹자"},{"text":"不答也滕更有二焉","source":"맹자"},{"text":"趙氏曰二謂挾貴挾賢也尹氏曰有所挾則受道之心不專所以不答也○此","source":"맹자"},{"text":"言君子雖誨人不倦又惡夫意之不誠者","source":"맹자"},{"text":"盡心上41章","source":"맹자"},{"text":"13-44-01 孟子曰於不可已而已者無所不已於所厚者薄無所不薄也","source":"맹자"},{"text":"已止也不可止謂所不得不爲者也所厚所當厚者也此言不及者之弊","source":"맹자"},{"text":"13-44-02 其進銳者其退速","source":"맹자"},{"text":"進銳者用心太過其氣易衰故退速○三者之弊理勢必然雖過不及之不同然","source":"맹자"},{"text":"卒同歸於廢弛","source":"맹자"},{"text":"盡心上45章","source":"맹자"},{"text":"13-45-01 孟子曰君子之於物也愛之而弗仁於民也仁之而弗親親親而仁民","source":"맹자"},{"text":"仁民而愛物","source":"맹자"},{"text":"物謂禽獸草木愛謂取之有時用之有節程子曰仁推己及人如老吾老以及人之","source":"맹자"},{"text":"老於民則可於物則不可統而言之則皆仁分而言之則有序楊氏曰其分不同","source":"맹자"},{"text":"故所施不能無差等所謂理一而分殊者也尹氏曰何以有是差等一本故也無僞","source":"맹자"},{"text":"盡心上46章","source":"맹자"},{"text":"13-46-01 孟子曰知者無不知也當務之爲急仁者無不愛也急親賢之爲務堯舜","source":"맹자"},{"text":"之知而不徧物急先務也堯舜之仁不徧愛人急親賢也","source":"맹자"},{"text":"知者固無不知然常以所當務者爲急則事無不治而其爲知也大矣仁者固無不","source":"맹자"},{"text":"愛然常急於親賢則恩無不洽而其爲仁也博矣","source":"맹자"},{"text":"13-46-02 不能三年之喪而緦小功之察放飯流歠而問無齒決是之謂不知務","source":"맹자"},{"text":"三年之喪服之重者也緦麻三月小功五月服之輕者也察致詳也放飯大飯流","source":"맹자"},{"text":"歠長歠不敬之大者也齒決齧斷乾肉不敬之小者也問講求之意○此章言君","source":"맹자"},{"text":"子之於道識其全體則心不狹知所先後則事有序豊氏曰智不急於先務雖徧","source":"맹자"},{"text":"知人之所知徧能人之所能徒弊精神而無益於天下之治矣仁不急於親賢雖有仁","source":"맹자"},{"text":"民愛物之心小人在位無由下達聰明日蔽於上而惡政日加於下此孟子所謂不","source":"맹자"},{"text":"凡三十八章","source":"맹자"},{"text":"盡心下1章","source":"맹자"},{"text":"14-01-01 孟子曰不仁哉梁惠王也仁者以其所愛及其所不愛不仁者以其所","source":"맹자"},{"text":"不愛及其所愛","source":"맹자"},{"text":"親親而仁民仁民而愛物所謂以其所愛及其所不愛也","source":"맹자"},{"text":"14-01-02 公孫丑曰何謂也梁惠王以土地之故麋爛其民而戰之大敗將復之","source":"맹자"},{"text":"恐不能勝故驅其所愛子弟以殉之是之謂以其所不愛及其所愛也","source":"맹자"},{"text":"梁惠王以下孟子答辭也糜爛其民使之戰鬪糜爛其血肉也復之復戰也子弟謂","source":"맹자"},{"text":"太子申也以土地之故及其民以民之故及其子皆以其所不愛及其所愛也○","source":"맹자"},{"text":"此承前篇之末三章之意言仁人之恩自內及外不仁之禍由疏逮親","source":"맹자"},{"text":"盡心下2章","source":"맹자"},{"text":"14-02-01 孟子曰春秋無義戰彼善於此則有之矣","source":"맹자"},{"text":"春秋每書諸侯戰伐之事必加譏貶以著其擅興之罪無有以爲合於義而許之者但","source":"맹자"},{"text":"就中彼善於次者則有之如召陵之師之類是也","source":"맹자"},{"text":"14-02-02 征者上伐下也敵國不相征也","source":"맹자"},{"text":"征所以正人也諸侯有罪則天子討而正之此春秋所以無義戰也","source":"맹자"},{"text":"盡心下3章","source":"맹자"},{"text":"14-03-01 孟子曰盡信書則不如無書","source":"맹자"},{"text":"程子曰載事之辭容有重稱而過其實者學者當識其義而已苟執於辭則時或有","source":"맹자"},{"text":"害於義不如無書之愈也","source":"맹자"},{"text":"14-03-02 吾於武成取二三策而已矣","source":"맹자"},{"text":"武成周書篇名武王伐紂歸而記事之書也策竹簡也取其二三策之言其餘不可","source":"맹자"},{"text":"盡信也程子曰取其奉天伐暴之意反正施仁之法而已","source":"맹자"},{"text":"14-03-03 仁人無敵於天下以至仁伐至不仁而何其血之流杵也","source":"맹자"},{"text":"杵舂杵也或作鹵楯也武成言武王伐紂紂之前徒倒戈攻于後以北血流漂杵","source":"맹자"},{"text":"孟子言此則其不可信者然書本意乃謂商人自相殺非謂武王殺之也孟子之設","source":"맹자"},{"text":"是言懼後世之惑且長不仁之心耳","source":"맹자"},{"text":"盡心下4章","source":"맹자"},{"text":"14-04-01 孟子曰有人曰我善爲陳我善爲戰大罪也","source":"맹자"},{"text":"制行伍曰陳交兵曰戰","source":"맹자"},{"text":"14-04-02 國君好仁天下無敵焉南面而征北狄怨東面而征西夷怨曰奚爲","source":"맹자"},{"text":"此引湯之事以明之解見前篇","source":"맹자"},{"text":"14-04-03 武王之伐殷也革車三百兩虎賁三千人","source":"맹자"},{"text":"又以武王之事明之也兩車數一車兩輪也千書序作百","source":"맹자"},{"text":"14-04-04 王曰無畏寧爾也非敵百姓也若崩厥角稽首","source":"맹자"},{"text":"書泰誓文與此小異孟子之意當云王謂商人曰無畏我也我來伐紂本爲安寧汝","source":"맹자"},{"text":"非敵商之百姓也於是商人稽首至地如角之崩也","source":"맹자"},{"text":"14-04-05 征之爲言正也各欲正己也焉用戰","source":"맹자"},{"text":"民爲暴君所虐皆欲仁者來正己之國也","source":"맹자"},{"text":"盡心下5章","source":"맹자"},{"text":"14-05-01 孟子曰梓匠輪輿能與人規矩不能使人巧","source":"맹자"},{"text":"尹氏曰規矩法度可告者也巧則在其人雖大匠亦末如之何也已蓋下學可以","source":"맹자"},{"text":"言傳上達必由心悟莊周所論斲輪之意蓋如此","source":"맹자"},{"text":"盡心下6章","source":"맹자"},{"text":"14-06-01 孟子曰舜之飯糗茹草也若將終身焉及其爲天子也被袗衣鼓琴二女","source":"맹자"},{"text":"果若固有之","source":"맹자"},{"text":"飯食也糗乾糒也茹亦食也袗畫衣也二女堯二女也果女侍也言聖人之心不","source":"맹자"},{"text":"以貧賤而有慕於外不以富貴而有動於中隨遇而安無預於己所性分定故也","source":"맹자"},{"text":"盡心下7章","source":"맹자"},{"text":"14-07-01 孟子曰吾今而後知殺人親之重也殺人之父人亦殺其父殺人之兄","source":"맹자"},{"text":"人亦殺其兄然則非自殺之也一間耳","source":"맹자"},{"text":"言吾今而後知者必有所爲而感發也一間者我往彼來間一人耳其實與自害其","source":"맹자"},{"text":"親無異也范氏曰知此則愛敬人之親人亦愛敬其親矣","source":"맹자"},{"text":"盡心下8章","source":"맹자"},{"text":"14-08-01 孟子曰古之爲關也將以禦暴","source":"맹자"},{"text":"14-08-02 今之爲關也將以爲暴","source":"맹자"},{"text":"征稅出入○范氏曰古之耕者什一後世或收太半之稅此以賦斂爲暴也文王","source":"맹자"},{"text":"之囿與民同之齊宣王之囿爲阱國中此以園囿爲暴也後世爲暴不止於關若","source":"맹자"},{"text":"使孟子用於諸侯必行文王之政凡此之類皆不終日而改也","source":"맹자"},{"text":"盡心下9章","source":"맹자"},{"text":"14-09-01 孟子曰身不行道不行於妻子使人不以道不能行於妻子","source":"맹자"},{"text":"身不行道者以行言之不行者道不行也使人不以道者以事言之不能行者令","source":"맹자"},{"text":"盡心下10章","source":"맹자"},{"text":"14-10-01 孟子曰周于利者凶年不能殺周于德者邪世不能亂","source":"맹자"},{"text":"周足也言積之厚則用有餘","source":"맹자"},{"text":"盡心下11章","source":"맹자"},{"text":"14-11-01 孟子曰好名之人能讓千乘之國苟非其人簞食豆羹見於色","source":"맹자"},{"text":"好名之人矯情干譽是以能讓千乘之國然若本非能輕富貴之人則於得失之小者","source":"맹자"},{"text":"反不覺其眞情之發見矣蓋觀人不於其所勉而於其所忽然後可以見其所安之實","source":"맹자"},{"text":"盡心下12章","source":"맹자"},{"text":"14-12-01 孟子曰不信仁賢則國空虛","source":"맹자"},{"text":"空虛言若無人然","source":"맹자"},{"text":"14-12-02 無禮義則上下亂","source":"맹자"},{"text":"禮義所以辨上下定民志","source":"맹자"},{"text":"14-12-03 無政事則財用不足","source":"맹자"},{"text":"生之無道取之無度用之無節故也○尹氏曰三者以仁賢爲本無仁賢則禮義","source":"맹자"},{"text":"政事處之皆不以其道矣","source":"맹자"},{"text":"盡心下13章","source":"맹자"},{"text":"14-13-01 孟子曰不仁而得國者有之矣不仁而得天下未之有也","source":"맹자"},{"text":"言不仁之人騁其私智可以盜千乘之國而不可以得丘民之心鄒氏曰自秦以來","source":"맹자"},{"text":"不仁而得天下者有矣然皆一再傳而失之猶不得也所謂得天下者必如三代而","source":"맹자"},{"text":"盡心下14章","source":"맹자"},{"text":"14-14-01 孟子曰民爲貴社稷次之君爲輕","source":"맹자"},{"text":"社土神稷穀神建國則立壇壝以祀之蓋國以民爲本社稷亦爲民而立而君之尊","source":"맹자"},{"text":"又係於二者之存亡故其輕重如此","source":"맹자"},{"text":"14-14-02 是故得乎丘民而爲天子得乎天子爲諸侯得乎諸侯爲大夫","source":"맹자"},{"text":"丘民田野之民至微賤也然得其心則天下歸之天子至尊貴也而得其心者不","source":"맹자"},{"text":"過爲諸侯耳是民爲重也","source":"맹자"},{"text":"14-14-03 諸侯危社稷則變置","source":"맹자"},{"text":"諸侯無道將使社稷爲人所滅則當更立賢君是君輕於社稷也","source":"맹자"},{"text":"14-14-04 犧牲旣成粢盛旣潔祭祀以時然而旱乾水溢則變置社稷","source":"맹자"},{"text":"祭祀不失禮而土穀之神不能爲民禦災捍患則毁其壇壝而更置之亦年不順成八","source":"맹자"},{"text":"蜡不通之意是社稷雖重於君而輕於民也","source":"맹자"},{"text":"盡心下15章","source":"맹자"},{"text":"14-15-01 孟子曰聖人百世之師也伯夷柳下惠是也故聞伯夷之風者頑夫廉懦","source":"맹자"},{"text":"夫有立志聞柳下惠之風者薄夫敦鄙夫寬奮乎百世之上百世之下聞者莫不與","source":"맹자"},{"text":"起也非聖人而能若是乎而況於親炙之者乎","source":"맹자"},{"text":"興起感動奮發也親炙親近而薰炙之也餘見前篇","source":"맹자"},{"text":"盡心下16章","source":"맹자"},{"text":"14-16-01 孟子曰仁也者人也合而言之道也","source":"맹자"},{"text":"仁者人之所以爲人之理也然仁理也人物也以仁之理合於人之身而言之乃所","source":"맹자"},{"text":"謂道者也○程子曰中庸所謂率性之謂道是也或曰外國本人也之下有義也","source":"맹자"},{"text":"者宜也禮也者履也智也者知也信也者實也凡二十字今按如此則理極分明","source":"맹자"},{"text":"然未詳其是否也","source":"맹자"},{"text":"盡心下17章","source":"맹자"},{"text":"14-17-01 孟子曰孔子之去魯曰遲遲吾行也去父母國之道也去齊接淅而行去","source":"맹자"},{"text":"他國之道也","source":"맹자"},{"text":"盡心下18章","source":"맹자"},{"text":"14-18-01 孟子曰君子之戹於陳蔡之間無上下之交也","source":"맹자"},{"text":"君子孔子也戹與厄同君臣皆惡無所與交也","source":"맹자"},{"text":"盡心下19章","source":"맹자"},{"text":"14-19-01 貉稽曰稽大不理於口","source":"맹자"},{"text":"趙氏曰貉姓稽名爲衆口所訕理賴也今按漢
