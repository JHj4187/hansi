章所論人之性情心之體用本然全","source":"맹자"},{"text":"具而各有條理如此學者於此反求黙識而擴充之則天之所以與我者可以無不盡","source":"맹자"},{"text":"矣○程子曰人皆有是心惟君子爲能擴而充之不能然者皆自棄也然其充與","source":"맹자"},{"text":"不充亦在我而已矣又曰四端不言信者旣有誠心爲四端則信在其中矣愚按","source":"맹자"},{"text":"四端之信猶五行之土無定位無成名無專氣而水火金木無不待是以生者故","source":"맹자"},{"text":"土於四行無不在於四時則寄王焉其理亦猶是也","source":"맹자"},{"text":"公孫丑上7章","source":"맹자"},{"text":"03-07-01 孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦","source":"맹자"},{"text":"然故術不可不愼也","source":"맹자"},{"text":"函甲也惻隱之心人皆有之是矢人之心本非不如函人之仁也巫者爲人祈祝利","source":"맹자"},{"text":"人之生匠者作爲棺槨利人之死","source":"맹자"},{"text":"03-07-02 孔子曰里仁爲美擇不處仁焉得智夫仁天之尊爵也人之安宅也莫","source":"맹자"},{"text":"之禦而不仁是不智也","source":"맹자"},{"text":"里有仁厚之俗者猶以爲美人擇所以自處而不於仁安得爲智乎此孔子之言也","source":"맹자"},{"text":"仁義禮智皆天所與之良貴而仁者天地生物之心得之最先而兼統四者所謂元","source":"맹자"},{"text":"者善之長也故曰尊爵在人則爲本心全體之德有天理自然之安無人欲陷溺之危","source":"맹자"},{"text":"人當常在其中而不可須臾離者也","source":"맹자"},{"text":"此又孟子釋孔子之意","source":"맹자"},{"text":"以爲仁道之大","source":"맹자"},{"text":"如此而自不爲之豈非不智之甚乎","source":"맹자"},{"text":"03-07-03 不仁不智無禮無義人役也人役而恥爲役由弓人而恥爲弓矢人而恥","source":"맹자"},{"text":"以不仁故不智不智故不知禮義之所在","source":"맹자"},{"text":"03-07-04 如恥之莫如爲仁","source":"맹자"},{"text":"此亦因人愧恥之心而引之使志於仁也不言智禮義者仁該全體能爲仁則三者在","source":"맹자"},{"text":"03-07-05 仁者如射射者正己而後發發而不中不怨勝己者反求諸己而已矣","source":"맹자"},{"text":"爲仁由己而由人乎哉","source":"맹자"},{"text":"公孫丑上8章","source":"맹자"},{"text":"03-08-01 孟子曰子路人告之以有過則喜","source":"맹자"},{"text":"喜其得聞而改之其勇於自修如此周子曰仲由喜聞過令名無窮焉今人有過不喜","source":"맹자"},{"text":"人規如諱疾而忌醫寧滅其身而無悟也噫程子曰子路人告之以有過則喜亦可","source":"맹자"},{"text":"爲百世之師矣","source":"맹자"},{"text":"03-08-02 禹聞善言則拜","source":"맹자"},{"text":"書曰禹拜昌言蓋不待有過而能屈己以受天下之善也","source":"맹자"},{"text":"03-08-03 大舜有大焉善與人同舍己從人樂取於人以爲善","source":"맹자"},{"text":"言舜之所爲又有大於禹與子路者善與人同公天下之善而不爲私也己未善則","source":"맹자"},{"text":"無所係吝而舍以從人人有善則不待勉強而取之於己此善與人同之目也","source":"맹자"},{"text":"03-08-04 自耕稼陶漁以至爲帝無非取於人者","source":"맹자"},{"text":"舜之側微耕于歷山陶于河濱漁于雷澤","source":"맹자"},{"text":"03-08-05 取諸人以爲善是與人爲善者也故君子莫大乎與人爲善","source":"맹자"},{"text":"與猶許也助也取彼之善而爲之於我則彼益勸於爲善矣是我助其爲善也能使","source":"맹자"},{"text":"天下之人皆勸於爲善君子之善孰大於此也○此章言聖賢樂善之誠初無彼","source":"맹자"},{"text":"此之間故其在人者有以裕於己在己者有以及於人","source":"맹자"},{"text":"公孫丑上9章","source":"맹자"},{"text":"03-09-01 孟子曰伯夷非其君不事非其友不友不立於惡仁之朝不與惡人言立","source":"맹자"},{"text":"於惡人之朝與惡人言如以朝衣朝冠坐於塗炭推惡惡之心思與鄕人立其冠不","source":"맹자"},{"text":"正望望然去之若將浼焉是故諸侯雖有善其辭命而至者不受也不受也者是亦","source":"맹자"},{"text":"塗泥也鄕人鄕里之常人也望望去而不顧之貌浼汚也屑趙氏曰潔也說文曰","source":"맹자"},{"text":"動作切切也不屑就言不以就之爲潔而切切於是也已語助辭","source":"맹자"},{"text":"03-09-02 柳下惠不羞汚君不卑小官進不隱賢必以其道遺佚而不怨阨窮而不","source":"맹자"},{"text":"憫故曰爾爲爾我爲我雖袒裼裸裎於我側爾焉能浼我哉故由由然與之偕而不","source":"맹자"},{"text":"自失焉援而止之而止援而止之而止者是亦不屑去已","source":"맹자"},{"text":"柳下惠魯大夫展禽居柳下而諡惠也不隱賢不枉道也遺佚放棄也阨困也憫","source":"맹자"},{"text":"憂也爾爲爾至焉能浼我哉惠之言也袒裼露臂也裸裎露身也由由自得之貌偕","source":"맹자"},{"text":"並處也不自失不失其正也援而止之而止者言欲去而可留也","source":"맹자"},{"text":"03-09-03 孟子曰伯夷隘柳下惠不恭隘與不恭君子不由也","source":"맹자"},{"text":"隘狹窄也不恭簡慢也夷惠之行固皆造乎至極之地然旣有所偏則不能無弊故","source":"맹자"},{"text":"凡十四章自第二章以下記孟子出處行實爲詳","source":"맹자"},{"text":"公孫丑下1章","source":"맹자"},{"text":"04-01-01 孟子曰天時不如地利地利不如人和","source":"맹자"},{"text":"天時謂時日支干孤虛王相之屬也地利險阻城池之固也人和得民心之和也","source":"맹자"},{"text":"04-01-02 三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然","source":"맹자"},{"text":"而不勝者是天時不如地利也","source":"맹자"},{"text":"三里七里城郭之小者郭外城環圍也言四面攻圍曠日持久必有値天時之善者","source":"맹자"},{"text":"04-01-03 城非不高也池非不深也兵革非不堅利也米粟非不多也委而去之是","source":"맹자"},{"text":"地利不如人和也","source":"맹자"},{"text":"革甲也粟穀也委棄也言不得民心民不爲守也","source":"맹자"},{"text":"04-01-04 故曰域民不以封疆之界固國不以山谿之險威天下不以兵革之利得道","source":"맹자"},{"text":"者多助失道者寡助寡助之至親戚畔之多助之至天下順之","source":"맹자"},{"text":"04-01-05 以天下之所順攻親戚之所畔故君子有不戰戰必勝矣","source":"맹자"},{"text":"言不戰則已戰則必勝尹氏曰言得天下者凡以得民心而已","source":"맹자"},{"text":"公孫丑下2章","source":"맹자"},{"text":"04-02-01","source":"맹자"},{"text":"孟子將朝王","source":"맹자"},{"text":"王使人來曰寡人如就見者也","source":"맹자"},{"text":"有寒疾不可以風","source":"맹자"},{"text":"不識可使寡人得見乎對曰不幸而有疾不能造朝","source":"맹자"},{"text":"王齊王也孟子本將朝王王不知而託疾以召孟子故孟子亦以疾辭也","source":"맹자"},{"text":"04-02-02 明日出弔於東郭氏公孫丑曰昔者辭以病今日弔或者不可乎曰昔者","source":"맹자"},{"text":"疾今日愈如之何不弔","source":"맹자"},{"text":"東郭氏齊大夫家也昔者昨日也或者疑辭辭疾而出弔與孔子不見孺悲取瑟","source":"맹자"},{"text":"04-02-03 王使人問疾醫來孟仲子對曰昔者有王命有采薪之憂不能造朝今","source":"맹자"},{"text":"病少愈趨造於朝我不識能至否乎使數人要於路曰請必無歸而造於朝","source":"맹자"},{"text":"孟仲子趙氏以爲孟子之從昆弟學於孟子者也采薪之憂言病不能采薪謙辭也","source":"맹자"},{"text":"仲子權辭以對又使人要孟子令勿歸而造朝以實己言","source":"맹자"},{"text":"04-02-04 不得已而之景丑氏宿焉景子曰內則父子外則君臣人之大倫也父子","source":"맹자"},{"text":"主恩君臣主敬丑見王之敬子也未見所以敬王也曰惡是何言也齊人無以仁","source":"맹자"},{"text":"義與王言者","source":"맹자"},{"text":"豈以仁義爲不美也","source":"맹자"},{"text":"其心曰是何足與言仁義也云爾","source":"맹자"},{"text":"則不敬莫大乎是","source":"맹자"},{"text":"我非堯舜之道不敢以陳於王前故齊人莫如我敬王也","source":"맹자"},{"text":"景丑氏齊大夫家也景子景丑也惡歎辭也景丑所言敬之小者也孟子所言敬","source":"맹자"},{"text":"04-02-05 景子曰否非此之謂也禮曰父召無諾君命召不俟駕固將朝也聞王命","source":"맹자"},{"text":"而遂不果宜與夫禮若不相似然","source":"맹자"},{"text":"禮曰父命呼唯而不諾又曰君命召在官不俟屨在外不俟車言孟子本欲朝王","source":"맹자"},{"text":"而聞命中止似與此禮之意不同也","source":"맹자"},{"text":"04-02-06 曰豈謂是與曾子曰晉楚之富不可及也彼以其富我以吾仁彼以其爵","source":"맹자"},{"text":"我以吾義吾何慊乎哉夫豈不義而曾子言之是或一道也天下有達尊三爵一齒","source":"맹자"},{"text":"一德一朝廷莫如爵鄕黨莫如齒輔世長民莫如德惡得有其一以慢其二哉","source":"맹자"},{"text":"慊恨也少也或作嗛字書以爲口銜物也然則慊亦但爲心有所銜之義其爲快爲足","source":"맹자"},{"text":"爲恨爲少則因其事而所銜有不同耳孟子言我之意非如景子之所言者因引曾","source":"맹자"},{"text":"子之言而云夫此豈是不義而曾子肯以爲言是或別有一種道理也達通也蓋通","source":"맹자"},{"text":"天下之所尊有此三者曾子之說蓋以德言之也今齊王但有爵耳安得以此慢","source":"맹자"},{"text":"04-02-07 故將大有爲之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是","source":"맹자"},{"text":"不足與有爲也","source":"맹자"},{"text":"大有爲之君大有作爲非常之君也程子曰古之人所以必待人君致敬盡禮而後","source":"맹자"},{"text":"往者非欲自爲尊大也爲是故耳","source":"맹자"},{"text":"04-02-08 故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣","source":"맹자"},{"text":"之故不勞而霸","source":"맹자"},{"text":"先從受學師之也後以爲臣任之也","source":"맹자"},{"text":"04-02-09 今天下地醜德齊莫能相尙無他好臣其所敎而不好臣其所受敎","source":"맹자"},{"text":"醜類也尙過也所敎謂聽從於己可役使者也所受敎謂己之所從學者也","source":"맹자"},{"text":"04-02-10 湯之於伊尹桓公之於管仲則不敢召管仲且猶不可召而況不爲管仲","source":"맹자"},{"text":"不爲管仲孟子自謂也范氏曰孟子之於齊處賓師之位非當仕有官職者故其言","source":"맹자"},{"text":"如此○此章見賓師不以趨走承順爲恭而以責難陳善爲敬人君不以崇高富","source":"맹자"},{"text":"貴爲重而以貴德尊士爲賢則上下交而德業成矣","source":"맹자"},{"text":"公孫丑下3章","source":"맹자"},{"text":"04-03-01 陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽","source":"맹자"},{"text":"五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫","source":"맹자"},{"text":"子必居一於此矣","source":"맹자"},{"text":"陳臻孟子弟子兼金好金也其價兼倍於常者一百百鎰也","source":"맹자"},{"text":"04-03-02 孟子曰皆是也","source":"맹자"},{"text":"皆適於義也","source":"맹자"},{"text":"04-03-03 當在宋也予將有遠行行者必以贐辭曰餽贐予何爲不受","source":"맹자"},{"text":"贐送行者之禮也","source":"맹자"},{"text":"04-03-04 當在薛也予有戒心辭曰聞戒故爲兵餽之予何爲不受","source":"맹자"},{"text":"時人有欲害孟子者孟子設兵以戒備之薛君以金餽孟子爲兵備辭曰聞子之有戒","source":"맹자"},{"text":"04-03-05 若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎","source":"맹자"},{"text":"無遠行戒心之事是未有所處也取猶致也○尹氏曰言君子之辭受取予唯當於","source":"맹자"},{"text":"公孫丑下4章","source":"맹자"},{"text":"04-04-01 孟子之平陸謂其大夫曰子之持戟之士一日而三失伍則去之否乎","source":"맹자"},{"text":"平陸齊下邑也大夫邑宰也戟有枝兵也士戰士也伍行列也去之殺之也","source":"맹자"},{"text":"04-04-02 然則子之失伍也亦多矣凶年饑歲子之民老羸轉於溝壑壯者散而之","source":"맹자"},{"text":"四方者幾千人矣曰此非距心之所得爲也","source":"맹자"},{"text":"子之失伍言其失職猶士之失伍也距心大夫名對言此乃王之失政使然非我所","source":"맹자"},{"text":"04-04-03 曰今有受人之牛羊而爲之牧之者則必爲之求牧與芻矣求牧與芻而不","source":"맹자"},{"text":"得則反諸其人乎抑亦立而視其死與曰此則距心之罪也","source":"맹자"},{"text":"牧之養之也牧牧地也芻草也孟子言若不得自專何不致其事而去","source":"맹자"},{"text":"04-04-04 他日見於王曰王之爲都者臣知五人焉知其罪者惟孔距心爲王誦之","source":"맹자"},{"text":"王曰此則寡人之罪也","source":"맹자"},{"text":"爲都治邑也邑有先君之廟曰都孔大夫姓也爲王誦其語欲以風曉王也○陳氏","source":"맹자"},{"text":"曰孟子一言而齊之君臣擧知其罪固足以興邦矣然而齊卒不得爲善國者豈非說","source":"맹자"},{"text":"而不繹從而不改故邪","source":"맹자"},{"text":"公孫丑下5章","source":"맹자"},{"text":"04-05-01","source":"맹자"},{"text":"孟子謂蚳鼃曰","source":"맹자"},{"text":"子之辭靈丘而請士師似也","source":"맹자"},{"text":"爲其可以言也","source":"맹자"},{"text":"今旣數月矣","source":"맹자"},{"text":"未可以言與","source":"맹자"},{"text":"蚳鼃 齊大夫也靈丘齊下邑似也言所爲近似有理可以言謂士師近王得以諫刑","source":"맹자"},{"text":"罰之不中者","source":"맹자"},{"text":"04-05-02 蚳鼃諫於王而不用致爲臣而去","source":"맹자"},{"text":"04-05-03 齊人曰所以爲蚳鼃則善矣所以自爲則吾不知也","source":"맹자"},{"text":"譏孟子道不行而不能去也","source":"맹자"},{"text":"04-05-04 公都子以告","source":"맹자"},{"text":"公都子孟子弟子也","source":"맹자"},{"text":"04-05-05 曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官","source":"맹자"},{"text":"守我無言責也則吾進退豈不綽綽然有餘裕哉","source":"맹자"},{"text":"官守以官爲守者言責以言爲責者綽綽寬貌裕寬意也孟子居賓師之位未嘗受","source":"맹자"},{"text":"祿故其進退之際寬裕如此尹氏曰進退久速當於理而已","source":"맹자"},{"text":"公孫丑下6章","source":"맹자"},{"text":"04-06-01 孟子爲卿於齊出弔於滕王使蓋大夫王驩爲輔行王驩朝暮見反齊","source":"맹자"},{"text":"滕之路未嘗與之言行事也","source":"맹자"},{"text":"蓋齊下邑也王驩王嬖臣也輔行副使也反往而還也行事使事也","source":"맹자"},{"text":"04-06-02 公孫丑曰齊卿之位不爲小矣齊滕之路不爲近矣反之而未嘗與言行","source":"맹자"},{"text":"事何也曰夫旣或治之予何言哉","source":"맹자"},{"text":"王驩蓋攝卿以行故曰齊卿夫旣或治之言有司已治之矣孟子之待小人不惡而","source":"맹자"},{"text":"公孫丑下7章","source":"맹자"},{"text":"04-07-01 孟子自齊葬於魯反於齊止於嬴充虞請曰前日不知虞之不肖使虞敦","source":"맹자"},{"text":"匠事嚴虞不敢請今願竊有請也木若以美然","source":"맹자"},{"text":"孟子仕於齊喪母歸葬於魯嬴齊南邑充虞孟子弟子嘗董治作棺之事者也嚴急","source":"맹자"},{"text":"也木棺木也以已通以美太美也","source":"맹자"},{"text":"04-07-02 曰古者棺槨無度中古棺七寸槨稱之自天子達於庶人非直爲觀美也","source":"맹자"},{"text":"然後盡於人心","source":"맹자"},{"text":"度厚薄尺寸也中古周公制禮時也槨稱之與棺相稱也欲其堅厚久遠非特爲人","source":"맹자"},{"text":"觀視之美而已","source":"맹자"},{"text":"04-07-03 不得不可以爲悅無財不可以爲悅得之爲有財古之人皆用之吾何爲","source":"맹자"},{"text":"不得謂法制所不當得得之爲有財言得之而又爲有財也或曰爲當作而","source":"맹자"},{"text":"04-07-04 且比化者無使土親膚於人心獨無恔乎","source":"맹자"},{"text":"比猶爲也化者死者也恔快也言爲死者不使土親近其肌膚於人子之心豈不快","source":"맹자"},{"text":"然無所恨乎","source":"맹자"},{"text":"04-07-05 吾聞之也君子不以天下儉其親","source":"맹자"},{"text":"送終之禮所當得爲而不自盡是爲天下愛惜此物而薄於吾親也","source":"맹자"},{"text":"公孫丑下8章","source":"맹자"},{"text":"04-08-01 沈同以其私問曰燕可伐與孟子曰可子噲不得與人燕子之不得受燕","source":"맹자"},{"text":"於子噲有仕於此而子悅之不告於王而私與之吾子之祿爵夫士也亦無王命而","source":"맹자"},{"text":"私受之於子則可乎何以異於是","source":"맹자"},{"text":"沈同齊臣以私問非王命也子噲子之事見前篇諸侯土地人民受之天子傳之先","source":"맹자"},{"text":"君私以與人則與者受者皆有罪也仕爲官也士卽從仕之人也","source":"맹자"},{"text":"04-08-02 齊人伐燕或問曰勸齊伐燕有諸曰未也沈同問燕可伐與吾應之曰","source":"맹자"},{"text":"可彼然而伐之也彼如曰孰可以伐之則將應之曰爲天吏則可以伐之今有殺人","source":"맹자"},{"text":"者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰爲士師則","source":"맹자"},{"text":"可以殺之今以燕伐燕何爲勸之哉","source":"맹자"},{"text":"天吏解見上篇言齊無道與燕無異如以燕伐燕也史記亦謂孟子勸齊伐燕蓋傳","source":"맹자"},{"text":"聞此說之誤○楊氏曰燕固可伐矣故孟子曰可使齊王能誅其君弔其民何不","source":"맹자"},{"text":"可之有乃殺其父兄虜其子弟而後燕人畔之乃以是歸咎孟子之言則誤矣","source":"맹자"},{"text":"公孫丑下9章","source":"맹자"},{"text":"04-09-01 燕人畔王曰吾甚慙於孟子","source":"맹자"},{"text":"齊破燕後二年燕人共立太子平爲王","source":"맹자"},{"text":"04-09-02 陳賈曰王無患焉王自以爲與周公孰仁且智王曰惡是何言也曰周公","source":"맹자"},{"text":"使管叔監殷管叔以殷畔知而使之是不仁也不知而使之是不智也仁智周公未","source":"맹자"},{"text":"之盡也而況於王乎賈請見而解之","source":"맹자"},{"text":"陳賈齊大夫也管叔名鮮武王弟周公兄也武王勝商殺紂立紂子武庚而使管叔與","source":"맹자"},{"text":"弟蔡叔霍叔監其國武王崩成王幼周公攝政管叔與武庚畔周公討而誅之","source":"맹자"},{"text":"04-09-03 見孟子問曰周公何人也曰古聖人也曰使管叔監殷管叔以殷畔也有","source":"맹자"},{"text":"諸曰然曰周公知其將畔而使之與曰不知也然則聖人且有過與曰周公弟也","source":"맹자"},{"text":"管叔兄也周公之過不亦宜乎","source":"맹자"},{"text":"言周公乃管叔之弟","source":"맹자"},{"text":"管叔乃周公之兄","source":"맹자"},{"text":"然則周公不知管叔之將畔而使之","source":"맹자"},{"text":"不免矣或曰周公之處管叔不如舜之處象何也游氏曰象之惡已著而其志不","source":"맹자"},{"text":"過富貴而已故舜得以是而全之若管叔之惡則未著而其志其才皆非象比也周","source":"맹자"},{"text":"公詎忍逆探其兄之惡而棄之邪","source":"맹자"},{"text":"宜無不盡者","source":"맹자"},{"text":"聖人之不幸也","source":"맹자"},{"text":"舜誠信而喜象周公誠信而任管叔此天理人倫之至其用心一也","source":"맹자"},{"text":"04-09-04 且古之君子過則改之今之君子過則順之古之君子其過也如日月之","source":"맹자"},{"text":"食民皆見之及其更也民皆仰之今之君子豈徒順之又從而爲之辭","source":"맹자"},{"text":"順猶遂也更改也辭辯也更之則無損於明故民仰之順而爲之辭則其過愈深","source":"맹자"},{"text":"矣責賈不能勉其君以遷善改過而敎之以遂非文過也○林氏曰齊王慙於孟子","source":"맹자"},{"text":"蓋羞惡之心有不能自已者使其臣有能因是心而將順之則義不可勝用矣而陳賈","source":"맹자"},{"text":"鄙夫方且爲之曲爲辯說而沮其遷善改過之心長其飾非拒諫之惡故孟子深責之","source":"맹자"},{"text":"然此書記事散出而無先後之次故其說必參考而後通若以第二篇十章十一章置","source":"맹자"},{"text":"之前章之後此章之前則孟子之意不待論說而自明矣","source":"맹자"},{"text":"公孫丑下10章","source":"맹자"},{"text":"04-10-01 孟子致爲臣而歸","source":"맹자"},{"text":"孟子久於齊而道不行故去也","source":"맹자"},{"text":"04-10-02 王就見孟子曰前日願見而不可得得侍同朝甚喜今又棄寡人而歸不","source":"맹자"},{"text":"識可以繼此而得見乎對曰不敢請耳固所願也","source":"맹자"},{"text":"04-10-03","source":"맹자"},{"text":"他日王謂時子曰","source":"맹자"},{"text":"我欲中國而授孟子室","source":"맹자"},{"text":"養弟子以萬鍾","source":"맹자"},{"text":"使諸大夫國人","source":"맹자"},{"text":"皆有所矜式子盍爲我言之","source":"맹자"},{"text":"時子齊臣也中國當國之中也萬鍾穀祿之數也鍾量名受六斛四斗矜敬也式法","source":"맹자"},{"text":"也盍何不也","source":"맹자"},{"text":"04-10-04 時子因陳子而以告孟子陳子以時子之言告孟子","source":"맹자"},{"text":"陳子卽陳臻也","source":"맹자"},{"text":"04-10-05 孟子曰然夫時子惡知其不可也如使予欲富辭十萬而受萬是爲欲富","source":"맹자"},{"text":"孟子旣以道不行而去則其義不可以復留而時子不知則又有難顯言者故但言設","source":"맹자"},{"text":"使我欲富則我前日爲卿嘗辭十萬之祿今乃受此萬鍾之饋是我雖欲富亦不爲","source":"맹자"},{"text":"04-10-06 季孫曰異哉子叔疑使己爲政不用則亦已矣又使其子弟爲卿人亦孰","source":"맹자"},{"text":"不欲富貴而獨於富貴之中有私龍斷焉","source":"맹자"},{"text":"此孟子引季孫之語也","source":"맹자"},{"text":"季孫子叔疑","source":"맹자"},{"text":"不知何時人","source":"맹자"},{"text":"龍斷岡壟之斷而高也","source":"맹자"},{"text":"蓋子叔疑者嘗不用而使其子弟爲卿","source":"맹자"},{"text":"季孫譏其旣不得於此","source":"맹자"},{"text":"而又欲求得於彼","source":"맹자"},{"text":"文賤丈夫登龍斷者之所爲也孟子引此以明道旣不行復受其祿則無以異此矣","source":"맹자"},{"text":"04-10-07 古之爲市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍","source":"맹자"},{"text":"斷而登之以左右望而罔市利人皆以爲賤故從而征之征商自此賤丈夫始矣","source":"맹자"},{"text":"孟子釋龍斷之說如此","source":"맹자"},{"text":"治之謂治其爭訟","source":"맹자"},{"text":"左右望者欲得此而又取彼也","source":"맹자"},{"text":"罔謂罔羅取","source":"맹자"},{"text":"之也從而征之謂人惡其專利故就征其稅後世緣此遂征商人也○程子曰齊","source":"맹자"},{"text":"王所以處孟子者未爲不可","source":"맹자"},{"text":"孟子亦非不肯爲國人矜式者","source":"맹자"},{"text":"但齊王實非欲尊孟子","source":"맹자"},{"text":"欲以利誘之故孟子拒而不受","source":"맹자"},{"text":"公孫丑下11章","source":"맹자"},{"text":"04-11-01 孟子去齊宿於晝","source":"맹자"},{"text":"晝齊西南近邑也","source":"맹자"},{"text":"04-11-02 有欲爲王留行者坐而言不應隱几而臥","source":"맹자"},{"text":"隱憑也客坐而言孟子不應而臥也","source":"맹자"},{"text":"04-11-03 客不悅曰弟子齊宿而後敢言夫子臥而不聽請勿復敢見矣曰坐我明","source":"맹자"},{"text":"語子昔者魯繆公無人乎子思之側則不能安子思泄柳申詳無人乎繆公之側則","source":"맹자"},{"text":"不能安其身","source":"맹자"},{"text":"齊宿齊戒越宿也","source":"맹자"},{"text":"繆公尊禮子思","source":"맹자"},{"text":"常使人候伺","source":"맹자"},{"text":"道達誠意於其側","source":"맹자"},{"text":"乃能安而留之也","source":"맹자"},{"text":"泄柳魯人申詳子張之子也繆公尊之不如子思然二子義不苟容非有賢者在其君","source":"맹자"},{"text":"之左右維持調護之則亦不能安其身矣","source":"맹자"},{"text":"04-11-04 子爲長者慮而不及子思子絶長者乎長者絶子乎","source":"맹자"},{"text":"長者孟子自稱也言齊王不使子來而子自欲爲王留我是所以爲我謀者不及繆公","source":"맹자"},{"text":"留子思之事而先絶我也我之臥而不應豈爲先絶子乎","source":"맹자"},{"text":"公孫丑下12章","source":"맹자"},{"text":"04-12-01 孟子去齊尹士語人曰不識王之不可以爲湯武則是不明也識其不可然","source":"맹자"},{"text":"且至則是干澤也千里而見王不遇故去三宿而後出晝是何濡滯也士則玆不悅","source":"맹자"},{"text":"尹士齊人也干求也澤恩澤也濡滯遲留也","source":"맹자"},{"text":"04-12-02 高子以告","source":"맹자"},{"text":"高子亦齊人孟子弟子也","source":"맹자"},{"text":"04-12-03 曰夫尹士惡知予哉千里而見王是予所欲也不遇故去豈予所欲哉","source":"맹자"},{"text":"予不得已也","source":"맹자"},{"text":"見王欲以行道也今道不行故不得已而去非本欲如此也","source":"맹자"},{"text":"04-12-04 予三宿而出晝於予心猶以爲速王庶幾改之王如改諸則必反予","source":"맹자"},{"text":"所改必指一事而言然今不可考矣","source":"맹자"},{"text":"04-12-05 夫出晝而王不予追也予然後浩然有歸志予雖然豈舍王哉王由足用","source":"맹자"},{"text":"爲善王如用予則豈徒齊民安天下之民擧安王庶幾改之予日望之","source":"맹자"},{"text":"浩然如水之流不可止也楊氏曰齊王天資朴實如好勇好貨好色好世俗之樂","source":"맹자"},{"text":"皆以直告而不隱於孟子","source":"맹자"},{"text":"故足以爲善","source":"맹자"},{"text":"若乃其心不然而謬爲大言以欺人","source":"맹자"},{"text":"可與入堯舜之道矣何善之能爲","source":"맹자"},{"text":"04-12-06 予豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其面去則窮日","source":"맹자"},{"text":"之力而後宿哉","source":"맹자"},{"text":"悻悻怒意也窮盡也","source":"맹자"},{"text":"04-12-07 尹士聞之曰士誠小人也","source":"맹자"},{"text":"此章見聖賢行道濟時汲汲之本心","source":"맹자"},{"text":"愛君澤民惓惓之餘意","source":"맹자"},{"text":"於此見君子憂則","source":"맹자"},{"text":"違之之情而荷蕢者所以爲果也","source":"맹자"},{"text":"公孫丑下13章","source":"맹자"},{"text":"04-13-01 孟子去齊充虞路問曰夫子若有不豫色然前日虞聞諸夫子曰君子不","source":"맹자"},{"text":"怨天不尤人","source":"맹자"},{"text":"路問於路中問也豫悅也尤過也此二句實孔子之言蓋孟子嘗稱之以敎人耳","source":"맹자"},{"text":"04-13-02 曰彼一時此一時也","source":"맹자"},{"text":"彼前日此今日","source":"맹자"},{"text":"04-13-03 五百年必有王者興其間必有名世者","source":"맹자"},{"text":"自堯舜至湯自湯至文武皆五百餘年而聖人出名世謂其人德業聞望可名於一世","source":"맹자"},{"text":"者爲之輔佐若皐陶稷契伊尹萊朱太公望散宜生之屬","source":"맹자"},{"text":"04-13-04 由周而來七百有餘歲矣以其數則過矣以其時考之則可矣","source":"맹자"},{"text":"周謂文武之間數謂五百年之期時謂亂極思治可以有爲之日於是而不得一有所","source":"맹자"},{"text":"爲此孟子所以不能無不豫也","source":"맹자"},{"text":"04-13-05 夫天未欲平治天下也如欲平治天下當今之世舍我其誰也吾何爲不","source":"맹자"},{"text":"言當此之時","source":"맹자"},{"text":"而使我不遇於齊","source":"맹자"},{"text":"是天未欲平治天下也","source":"맹자"},{"text":"然天意未可知而其具又在我","source":"맹자"},{"text":"我何爲不豫哉然則孟子雖若有不豫然者而實未嘗不豫也蓋聖賢憂世之志樂天","source":"맹자"},{"text":"之誠有並行而不悖者於此見矣","source":"맹자"},{"text":"公孫丑下14章","source":"맹자"},{"text":"04-14-01 孟子去齊居休公孫丑問曰仕而不受祿古之道乎","source":"맹자"},{"text":"04-14-02 曰非也於崇吾得見王退而有去志不欲變故不受也","source":"맹자"},{"text":"崇亦地名孟子始見齊王必有所不合故有去志變謂變其去志","source":"맹자"},{"text":"04-14-03 繼而有師命不可以請久於齊非我志也","source":"맹자"},{"text":"師命師旅之命也國旣被兵難請去也○孔氏曰仕而受祿禮也不受齊祿義也","source":"맹자"},{"text":"義之所在禮有時而變公孫丑欲以一端裁之不亦誤乎","source":"맹자"},{"text":"滕文公上1章","source":"맹자"},{"text":"05-01-01 滕文公爲世子將之楚過宋而見孟子","source":"맹자"},{"text":"世子太子也","source":"맹자"},{"text":"05-01-02 孟子道性善言必稱堯舜","source":"맹자"},{"text":"道言也性者人所禀於天以生之理也渾然至善未嘗有惡人與堯舜初無少異但","source":"맹자"},{"text":"衆人汨於私欲而失之堯舜則無私欲之蔽而能充其性爾故孟子與世子言每道性","source":"맹자"},{"text":"善而必稱堯舜以實之欲其知仁義不假外求聖人可學而至而不懈於用力也門","source":"맹자"},{"text":"人不能悉記其辭而攝其大旨如此程子曰性卽理也天下之理原其所自未有","source":"맹자"},{"text":"不善喜怒哀樂未發何嘗不善發而中節卽無往而不善發不中節然後爲不善","source":"맹자"},{"text":"故凡言善惡皆先善而後惡言吉凶皆先吉而後凶言是非皆先是而後非","source":"맹자"},{"text":"05-01-03 世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣","source":"맹자"},{"text":"時人不知性之本善而以聖賢爲不可企及故世子於孟子之言不能無疑而復來求","source":"맹자"},{"text":"蓋恐別有卑近易行之說也","source":"맹자"},{"text":"故但告之如此","source":"맹자"},{"text":"以明古今聖愚本同一性","source":"맹자"},{"text":"前言已盡無復有他說也","source":"맹자"},{"text":"05-01-04 成覸謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉顔淵曰舜何人也","source":"맹자"},{"text":"予何人也有爲者亦若是公明儀曰文王我師也周公豈欺我哉","source":"맹자"},{"text":"成覸人姓名彼謂聖賢也有爲者亦若是言人能有爲則皆如舜也公明姓儀名","source":"맹자"},{"text":"魯賢人也文王我師也蓋周公之言公明儀亦以文王爲必可師故誦周公之言而歎","source":"맹자"},{"text":"其不我欺也孟子旣告世子以道無二致而復引此三言以明之欲世子篤信力行以","source":"맹자"},{"text":"師聖賢不當復求他說也","source":"맹자"},{"text":"05-01-05 今滕絶長補短將五十里也猶可以爲善國書曰若藥不暝眩厥疾不瘳","source":"맹자"},{"text":"絶猶截也書商書說命篇暝眩憒亂言滕國雖小猶足爲治但恐安於卑近不能自","source":"맹자"},{"text":"克則不足以去惡而爲善也○愚按孟子之言性善始見於此而詳具於告子之篇","source":"맹자"},{"text":"然黙識而旁通之","source":"맹자"},{"text":"則七篇之中","source":"맹자"},{"text":"其所以擴前聖之未發而有功於聖人之門","source":"맹자"},{"text":"程子之言信矣","source":"맹자"},{"text":"滕文公上2章","source":"맹자"},{"text":"05-02-01 滕定公薨世子謂然友曰昔者孟子嘗與我言於宋於心終不忘今也不","source":"맹자"},{"text":"幸至於大故吾欲使子問於孟子然後行事","source":"맹자"},{"text":"定公文公父也然友世子之傅也大故大喪也事謂喪禮","source":"맹자"},{"text":"05-02-02 然友之鄒問於孟子孟子曰不亦善乎親喪固所自盡也曾子曰生事","source":"맹자"},{"text":"之以禮死葬之以禮祭之以禮可謂孝矣諸侯之禮吾未之學也雖然吾嘗聞之矣","source":"맹자"},{"text":"三年之喪齊疏之服飦粥之食自天子達於庶人三代共之","source":"맹자"},{"text":"當時諸侯莫能行古喪禮而文公獨能以此爲問故孟子善之又言父母之喪固人子","source":"맹자"},{"text":"之心所自盡者蓋悲哀之情痛疾之意非自外至宜乎文公於此有所不能自已也","source":"맹자"},{"text":"但所引曾子之言本孔子告樊遲者豈曾子嘗誦之以告其門人歟三年之喪者子","source":"맹자"},{"text":"生三年然後免於父母之懷故父母之喪必以三年也齊衣下縫也不緝曰斬衰緝","source":"맹자"},{"text":"之曰齊衰疎麤也麤布也飦糜也喪禮三日始食粥旣葬乃疏食此古今貴賤","source":"맹자"},{"text":"通行之禮也","source":"맹자"},{"text":"05-02-03 然友反命定爲三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行","source":"맹자"},{"text":"吾先君亦莫之行也至於子之身而反之不可且志曰喪祭從先祖曰吾有所受之也","source":"맹자"},{"text":"父兄同姓老臣也滕與魯俱文王之後而魯祖周公爲長兄弟宗之故滕謂魯爲宗","source":"맹자"},{"text":"國也然謂二國不行三年之喪者乃其後世之失非周公之法本然也志記也引","source":"맹자"},{"text":"志之言而釋其意以爲所以如此者蓋爲上世以來有所傳受雖或不同不可改也","source":"맹자"},{"text":"然志所言本謂先王之世舊俗所傳禮文小異而可以通行者耳不謂後世失禮之甚","source":"맹자"},{"text":"05-02-04 謂然友曰吾他日未嘗學問好馳馬試劍今也父兄百官不我足也恐其","source":"맹자"},{"text":"不能盡於大事子爲我問孟子然友復之鄒問孟子孟子曰然不可以他求者也孔","source":"맹자"},{"text":"子曰君薨聽於冢宰歠粥面深墨卽位而哭百官有司莫敢不哀先之也上有","source":"맹자"},{"text":"好者下必有甚焉者矣君子之德風也小人之德草也草尙之風必偃是在世子","source":"맹자"},{"text":"不我足謂不以我滿足其意也然者然其不我足之言不可他求者言當責之於己","source":"맹자"},{"text":"冢宰六卿之長也歠飮也深墨甚黑色也卽就也尙加也論語作上古字通也偃","source":"맹자"},{"text":"伏也孟子言但在世子自盡其衰而已","source":"맹자"},{"text":"05-02-05 然友反命世子曰然是誠在我五月居廬未有命戒百官族人可謂曰知","source":"맹자"},{"text":"及至葬四方來觀之顔色之戚哭泣之哀吊者大悅","source":"맹자"},{"text":"諸侯五月而葬未葬居倚廬於中門之外居喪不言故未有命令敎戒也可謂曰知","source":"맹자"},{"text":"疑有闕誤或曰皆謂世子之知禮也○林氏曰孟子之時喪禮旣壞然三年之喪","source":"맹자"},{"text":"惻隱之心痛疾之意出於人心之所固有者初未嘗亡也惟其溺於流俗之幣是以","source":"맹자"},{"text":"喪其良心而不自知耳文公見孟子而聞性善堯舜之說則固有以啓發其良心矣是","source":"맹자"},{"text":"以至此而哀痛之誠心發焉及其父兄百官皆不欲行則亦反躬自責悼其前行之","source":"맹자"},{"text":"不足以取信而不敢有非其父兄百官之心雖其資質有過人者而學問之力亦不可","source":"맹자"},{"text":"誣也及其斷然行之而遠近見聞無不悅服則以人心之所同然者自我發之而彼","source":"맹자"},{"text":"之心悅誠服亦有所不期然而然者人性之善豈不信哉","source":"맹자"},{"text":"滕文公上3章","source":"맹자"},{"text":"05-03-01 滕文公問爲國","source":"맹자"},{"text":"文公以禮聘孟子故孟子至滕而文公問之","source":"맹자"},{"text":"05-03-02 孟子曰民事不可緩也詩云晝爾于茅宵爾索綯亟其乘屋其始播百","source":"맹자"},{"text":"民事謂農事詩豳風七月之篇于往取也綯絞也亟急也乘升也播布也言農事","source":"맹자"},{"text":"至重人君不可以爲緩而忽之故引詩言治屋之急如此者蓋以來春將復始播","source":"맹자"},{"text":"百穀而不暇爲此也","source":"맹자"},{"text":"05-03-03 民之爲道也有恒産者有恒心無恒産者無恒心苟無恒心放辟邪侈","source":"맹자"},{"text":"無不爲已及陷乎罪然後從而刑之是罔民也焉有仁人在位罔民而可爲也","source":"맹자"},{"text":"音義並見前篇是故賢君必恭儉禮下取於民有制","source":"맹자"},{"text":"05-03-04 是故賢君必恭儉禮下取於民有制","source":"맹자"},{"text":"恭則能以禮接下儉則能取民以制","source":"맹자"},{"text":"05-03-05 陽虎曰爲富不仁矣爲仁不富矣","source":"맹자"},{"text":"陽虎陽貨魯季氏家臣也天理人欲不容並立虎之言此恐爲仁之害於富也孟子","source":"맹자"},{"text":"引之恐爲富之害於仁也君子小人每相反而已矣","source":"맹자"},{"text":"05-03-06 夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹","source":"맹자"},{"text":"也助者藉也","source":"맹자"},{"text":"此以下乃言制民常産與其取之之制也夏時一夫受田五十畝而每夫計其五畝","source":"맹자"},{"text":"之入以爲貢商人始爲井田之制以六百三十畝之地畫爲九區區七十畝中爲公","source":"맹자"},{"text":"田其外八家各授一區但借其力以助耕公田而不復稅其私田周時一夫受田百","source":"맹자"},{"text":"畝鄕遂用貢法十夫有溝都鄙用助法八家同井耕則通力而作收則計畝而分","source":"맹자"},{"text":"故謂之徹其實皆什一者貢法固以十分之一爲常數惟助法乃是九一而商制","source":"맹자"},{"text":"不可攷周制則公田百畝中以二十畝爲廬舍一夫所耕公田實計十畝通私田百","source":"맹자"},{"text":"畝爲十一分而取其一蓋又輕於十一矣竊料商制亦當似此而以十四畝爲廬舍","source":"맹자"},{"text":"一夫實耕公田七畝是亦不過十一也徹通也均也藉借也","source":"맹자"},{"text":"05-03-07 龍子曰治地莫善於助莫不善於貢貢者校數歲之中以爲常樂歲粒米","source":"맹자"},{"text":"狼戾多取之而不爲虐則寡取之凶年糞其田而不足則必取盈焉爲民父母使民","source":"맹자"},{"text":"盻盻然將終歲勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其爲民","source":"맹자"},{"text":"龍子古賢人狼戾猶狼籍言多也糞壅也盈滿也盻恨視也勤動勞苦也稱擧也","source":"맹자"},{"text":"貸借也取物於人而出息以償之也益之以足取盈之數也稚幼子也","source":"맹자"},{"text":"05-03-08 夫世祿滕固行之矣","source":"맹자"},{"text":"孟子嘗言文王治岐耕者九一仕者世祿二者王政之本也今世祿滕已行之惟助","source":"맹자"},{"text":"法未行故取於民者無制耳蓋世祿者授之土田使之食其公田之入實與助法","source":"맹자"},{"text":"相爲表裏所以使君子小人各有定業而上下相安者也故下文遂言助法","source":"맹자"},{"text":"05-03-09 詩云雨我公田遂及我私惟助爲有公田由此觀之雖周亦助也","source":"맹자"},{"text":"詩小雅大田之篇雨降雨也言願天雨於公田而遂及私田先公而後私也當時助","source":"맹자"},{"text":"法盡廢典籍不存惟有此詩可見周亦用助故引之也","source":"맹자"},{"text":"05-03-10 設爲庠序學校以敎之庠者養也校者敎也序者射也夏曰校殷曰序","source":"맹자"},{"text":"周曰庠學則三代共之皆所以明人倫也人倫明於上小民親於下","source":"맹자"},{"text":"庠以養老爲義校以敎民爲義序以習射爲義皆鄕學也學國學也共之無異名也","source":"맹자"},{"text":"倫序也父子有親君臣有義夫婦有別長幼有序朋友有信此人之大倫也庠序","source":"맹자"},{"text":"學校皆以明此而已","source":"맹자"},{"text":"05-03-11 有王者起必來取法是爲王者師也","source":"맹자"},{"text":"滕國褊小雖行仁政未必能興王業然爲王者師則雖不有天下而其澤亦足以及","source":"맹자"},{"text":"天下矣聖賢至公無我之心於此可見","source":"맹자"},{"text":"05-03-12 詩云周雖舊邦其命維新文王之謂也子力行之亦以新子之國","source":"맹자"},{"text":"詩大雅文王之篇言周雖后稷以來舊爲諸侯其受天命而有天下則自文王始也","source":"맹자"},{"text":"子指文公諸侯未踰年之稱也","source":"맹자"},{"text":"05-03-13 使畢戰問井地孟子曰子之君將行仁政選擇而使子子必勉之夫仁","source":"맹자"},{"text":"政必自經界始經界不正井地不均穀祿不平是故暴君汚吏必慢其經界經","source":"맹자"},{"text":"界旣正分田制祿可坐而定也","source":"맹자"},{"text":"畢戰滕臣文公因孟子之言而使畢戰主爲井地之事故又使之來問其詳也井地","source":"맹자"},{"text":"卽井田也經界謂治地分田經畫其溝塗封植之界也此法不修則田無定分而豪","source":"맹자"},{"text":"強得以兼幷故井地有不均賦無定法而貪暴得以多取故穀祿有不平此欲行","source":"맹자"},{"text":"仁政者之所以必從此始而暴君汚吏則必欲慢而廢之也有以正之則分田制祿","source":"맹자"},{"text":"可不勞而定矣","source":"맹자"},{"text":"05-03-14 夫滕壤地褊小將爲君子焉將爲野人焉無君子莫治野人無野人莫","source":"맹자"},{"text":"言滕地雖小","source":"맹자"},{"text":"然其間亦必有爲君子而仕者","source":"맹자"},{"text":"亦必有爲野人而耕者","source":"맹자"},{"text":"是以分田制祿之","source":"맹자"},{"text":"法不可偏廢也","source":"맹자"},{"text":"05-03-15 請野九一而助國中什一使自賦","source":"맹자"},{"text":"此分田制祿之常法所以治野人使養君子也野郊外都鄙之地也九一而助爲公","source":"맹자"},{"text":"田而行助法也","source":"맹자"},{"text":"國中郊門之內","source":"맹자"},{"text":"鄕遂之地也","source":"맹자"},{"text":"但爲溝洫使什而自賦其一","source":"맹자"},{"text":"蓋用貢法也周所謂徹法者蓋如此以此推之當時非惟助法不行其貢亦不止什","source":"맹자"},{"text":"05-03-16 卿以下必有圭田圭田五十畝","source":"맹자"},{"text":"此世祿常制之外又有圭田所以厚君子也圭潔也所以奉祭祀也不言世祿者滕","source":"맹자"},{"text":"已行之但此未備耳","source":"맹자"},{"text":"05-03-17 餘夫二十五畝","source":"맹자"},{"text":"程子曰一夫上父母下妻子以五口八口爲率受田百畝如有弟是餘夫也年十","source":"맹자"},{"text":"六別受田二十五畝俟其壯而有室然後更受百畝之田愚按此百畝常制之外","source":"맹자"},{"text":"又有餘夫之田以厚野人也","source":"맹자"},{"text":"05-03-18 死徙無出鄕鄕田同井出入相友守望相助疾病相扶持則百姓","source":"맹자"},{"text":"死謂葬也徙謂徙其居也同井者八家也友猶伴也守望防寇盜也","source":"맹자"},{"text":"05-03-19 方里而井井九百畝其中爲公田八家皆私百畝同養公田公事畢然","source":"맹자"},{"text":"後敢治私事所以別野人也","source":"맹자"},{"text":"此詳言井田形體之制乃周之助法也公田以爲君子之祿而私田野人之所受先","source":"맹자"},{"text":"公後私所以別君子野人之分也不言君子據野人而言省文耳上言野及國中二","source":"맹자"},{"text":"法此獨詳於治野者國中貢法當世已行但取之過於什一爾","source":"맹자"},{"text":"05-03-20 此其大略也若夫潤澤之則在君與子矣","source":"맹자"},{"text":"井地之法諸侯皆去其籍此特其大略而已潤澤謂因時制宜使合於人情宜於土","source":"맹자"},{"text":"俗而不失乎先王之意也呂氏曰子張子慨然有意三代之治論治人先務未始不","source":"맹자"},{"text":"以經界爲急講求法制粲然備具要之可以行於今如有用我者擧而措之耳嘗","source":"맹자"},{"text":"曰仁政必自經界始貧富不均敎養無法雖欲言治皆苟而已世之病難行者未","source":"맹자"},{"text":"始不以亟奪富人之田爲辭然玆法之行悅之者衆苟處之有術期以數年不刑一","source":"맹자"},{"text":"人而可復所病者特上之未行耳乃言曰縱不能行之天下猶可驗之一鄕方與","source":"맹자"},{"text":"學者議古之法買田一方畫爲數井上不失公家之賦役退以其私正經界分宅","source":"맹자"},{"text":"里立斂法廣儲蓄興學校成禮俗救菑恤患厚本抑末足以推先王之遺法明當","source":"맹자"},{"text":"今之可行有志未就而卒愚按喪禮經界兩章見孟子之學識其大者是以雖當禮","source":"맹자"},{"text":"法廢壞之後制度節文不可復考而能因略以致詳推舊而爲新不屑屑於旣往之","source":"맹자"},{"text":"迹而能合乎先王之意眞可謂命世亞聖之才矣","source":"맹자"},{"text":"滕文公上4章","source":"맹자"},{"text":"05-04-01 有爲神農之言者許行自楚之滕踵門而告文公曰遠方之人聞君行仁","source":"맹자"},{"text":"政願受一廛而爲氓文公與之處其徒數十人皆衣褐捆屨織席以爲食","source":"맹자"},{"text":"神農炎帝神農氏始爲耒耜敎民稼穡者也爲其言者史遷所謂農家者流也許姓","source":"맹자"},{"text":"行名也踵門足至門也仁政上章所言井地之法也廛民所居也氓野人之稱褐毛","source":"맹자"},{"text":"布賤者之服也捆扣㧻之欲其堅也以爲食賣以供食也程子曰許行所謂神農","source":"맹자"},{"text":"之言乃後世稱述上古之事失其義理者耳猶陰陽醫方稱黃帝之說也","source":"맹자"},{"text":"05-04-02 陳良之徒陳相與其弟辛負耒耜而自宋之滕曰聞君行聖人之政是亦","source":"맹자"},{"text":"聖人也願爲聖人氓","source":"맹자"},{"text":"陳良楚之儒者耜所以起土耒其柄也","source":"맹자"},{"text":"05-04-03 陳相見許行而大悅盡棄其學而學焉陳相見孟子道許行之言曰滕","source":"맹자"},{"text":"君則誠賢君也雖然未聞道也賢者與民竝耕而食饔飱而治今也滕有倉廩府庫","source":"맹자"},{"text":"則是厲民而以自養也惡得賢","source":"맹자"},{"text":"饔飱熟食也朝曰饔夕曰食言當自炊爨以爲食而兼治民事也厲病也許行此","source":"맹자"},{"text":"言蓋欲陰壞孟子分別君子野人之法","source":"맹자"},{"text":"05-04-04 孟子曰許子必種粟而後食乎曰然許子必織布而後衣乎曰否許","source":"맹자"},{"text":"子衣褐許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子","source":"맹자"},{"text":"奚爲不自織曰害於耕曰許子以釜甑爨以鐵耕乎曰然自爲之與曰否以粟易","source":"맹자"},{"text":"釜所以煮甑所以炊爨然火也鐵耜屬也此語八反皆孟子問而陳相對也","source":"맹자"},{"text":"05-04-05 以粟易械器者不爲厲陶冶陶冶亦以其械器易粟者豈爲厲農夫哉且","source":"맹자"},{"text":"許子何不爲陶冶舍皆取諸其宮中而用之何爲紛紛然與百工交易何許子之不憚","source":"맹자"},{"text":"煩曰百工之事固不可耕且爲也","source":"맹자"},{"text":"此孟子言而陳相對也械器釜甑之屬也陶爲甑者冶爲釜鐵者舍止也或讀屬","source":"맹자"},{"text":"上句舍謂作陶冶之處也","source":"맹자"},{"text":"05-04-06 然則治天下獨可耕且爲與有大人之事有小人之事且一人之身而百","source":"맹자"},{"text":"工之所爲備如必自爲而後用之是率天下而路也故曰或勞心或勞力勞心者","source":"맹자"},{"text":"治人勞力者治於人治於人者食人治人者食於人天下之通義也","source":"맹자"},{"text":"此以下皆孟子言也路謂奔走道路無時休息也治於人者見治於人也食人者","source":"맹자"},{"text":"出賦稅以給公上也食於人者見食於人也此四句皆古語而孟子引之也君子無","source":"맹자"},{"text":"小人則飢小人無君子則亂以此相易正猶農夫陶冶以粟與械器相易乃所以相","source":"맹자"},{"text":"濟而非所以相病也治天下者豈必耕且爲哉","source":"맹자"},{"text":"05-04-07 當堯之時天下猶未平洪水橫流氾濫於天下草木暢茂禽獸繁殖五","source":"맹자"},{"text":"穀不登禽獸偪人獸蹄鳥跡之道交於中國堯獨憂之擧舜而敷治焉舜使益掌火","source":"맹자"},{"text":"益烈山澤而焚之禽獸逃匿禹疏九河瀹濟漯而注諸海決汝漢排淮泗而注之江","source":"맹자"},{"text":"然後中國可得而食也當是時也禹八年於外三過其門而不入雖欲耕得乎","source":"맹자"},{"text":"天下猶未平者洪荒之世生民之害多矣聖人迭興漸次除治至此尙未盡平也","source":"맹자"},{"text":"洪大也橫流不由其道而散溢妄行也氾濫橫流之貌暢茂長盛也繁殖衆多也","source":"맹자"},{"text":"五穀稻黍稷麥菽也登成熟也道路也獸蹄鳥跡交於中國言禽獸多也敷布也","source":"맹자"},{"text":"益舜臣名烈熾也禽獸逃匿然後禹得施治水之功疏通也分也九河曰徒駭曰","source":"맹자"},{"text":"太史曰馬頰曰覆釜曰胡蘇曰簡曰潔曰鉤盤曰鬲津瀹亦疏通之意濟漯二","source":"맹자"},{"text":"水名決排皆去其壅塞也汝漢淮泗亦皆水名也據禹貢及今水路惟漢水入江耳","source":"맹자"},{"text":"汝泗則入淮而淮自入海此謂四水皆入于江記者之誤也","source":"맹자"},{"text":"05-04-08 后稷敎民稼穡樹藝五穀五穀熟而民人育人之有道也飽食煖衣逸居","source":"맹자"},{"text":"而無敎則近於禽獸聖人有憂之使契爲司徒敎以人倫父子有親君臣有義夫","source":"맹자"},{"text":"婦有別長幼有序朋友有信放勳曰勞之來之匡之直之輔之翼之使自得之又","source":"맹자"},{"text":"從而振德之聖人之憂民如此而暇耕乎","source":"맹자"},{"text":"言水土平然後得以敎稼穡衣食足然後得以施敎化后稷官名棄爲之然言敎民","source":"맹자"},{"text":"則亦非竝耕矣樹亦種也藝殖也契亦舜臣名也司徒官名也人之有道言其皆有","source":"맹자"},{"text":"秉彝之性也然無敎則亦放逸怠惰而失之故聖人設官而敎以人倫亦因其固有","source":"맹자"},{"text":"者而道之耳書曰天叙有典勅我五典五惇哉此之謂也放勳本史臣贊堯之辭","source":"맹자"},{"text":"孟子因以爲堯號也德猶惠也堯言勞者勞之來者來之邪者正之枉者直之輔","source":"맹자"},{"text":"以立之翼以行之使自得其性矣又從而提撕警覺以加惠焉不使其放逸怠惰而","source":"맹자"},{"text":"或失之蓋命契之辭也","source":"맹자"},{"text":"05-04-09 堯以不得舜爲己憂舜以不得禹皐陶爲己憂夫以百畝之不易爲己憂者","source":"맹자"},{"text":"易治也堯舜之憂民非事事而憂之也急先務而已所以憂民者其大如此則不惟","source":"맹자"},{"text":"不暇耕而亦不必耕矣","source":"맹자"},{"text":"05-04-10 分人以財謂之惠敎人以善謂之忠爲天下得人者謂之仁是故以天","source":"맹자"},{"text":"下與人易爲天下得人難","source":"맹자"},{"text":"分人以財小惠而已敎人以善雖有愛民之實然其所及亦有限而難久惟若堯","source":"맹자"},{"text":"之得舜舜之得禹皐陶乃所謂爲天下得人者而其恩惠廣大敎化無窮矣此所以爲","source":"맹자"},{"text":"05-04-11 孔子曰大哉堯之爲君惟天爲大惟堯則之蕩蕩乎民無能名焉君哉","source":"맹자"},{"text":"舜也巍巍乎有天下而不與焉堯舜之治天下豈無所用其心哉亦不用於耕耳","source":"맹자"},{"text":"則法也蕩蕩廣大之貌君哉言盡君道也巍巍高大之貌不與猶言不相關言其不","source":"맹자"},{"text":"以位爲樂也","source":"맹자"},{"text":"05-04-12 吾聞用夏變夷者未聞變於夷者也陳良楚産也悅周公仲尼之道北學","source":"맹자"},{"text":"於中國北方之學者未能或之先也彼所謂豪傑之士也子之兄弟事之數十年師","source":"맹자"},{"text":"死而遂倍之","source":"맹자"},{"text":"此以下責陳相倍師而學許行也夏諸夏禮義之敎也變夷變化蠻夷之人也變於","source":"맹자"},{"text":"夷反見變化於蠻夷之人也産生也陳良生於楚在中國之南故北遊而學於中國","source":"맹자"},{"text":"也先過也豪傑才德出衆之稱言其能自拔於流俗也倍與背同言陳良用夏變夷","source":"맹자"},{"text":"陳相變於夷也","source":"맹자"},{"text":"05-04-13 昔者孔子沒三年之外門人治任將歸入揖於子貢相嚮而哭皆失聲","source":"맹자"},{"text":"然後歸子貢反築室於場獨居三年然後歸他日子夏子張子游以有若似聖人","source":"맹자"},{"text":"欲以所事孔子事之彊曾子曾子曰不可江漢以濯之秋陽以暴之皜皜乎不可","source":"맹자"},{"text":"三年古者爲師心喪三年若喪父而無服也任擔也場冢上之壇場也有若似聖人","source":"맹자"},{"text":"蓋其言行氣象有似之者如檀弓所記子游謂有若之言似夫子之類是也所事孔","source":"맹자"},{"text":"子所以事夫子之禮也江漢水多言濯之潔也秋日燥烈言暴之乾也皜皜潔白","source":"맹자"},{"text":"貌尙加也言夫子道德明著光輝潔白非有若所能彷彿也或曰此三語者孟子贊","source":"맹자"},{"text":"美曾子之辭也","source":"맹자"},{"text":"05-04-14 今也南蠻鴃舌之人非先王之道子倍子之師而學之亦異於曾子矣","source":"맹자"},{"text":"鴃博勞也惡聲之鳥南蠻之聲似之指許行也","source":"맹자"},{"text":"05-04-15 吾聞出於幽谷遷于喬木者未聞下喬木而入於幽谷者","source":"맹자"},{"text":"小雅伐木之詩云伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木","source":"맹자"},{"text":"05-04-16 魯頌曰戎狄是膺荊舒是懲周公方且膺之子是之學亦爲不善變矣","source":"맹자"},{"text":"魯頌閟宮之篇也膺擊也荊楚本號也舒國名近楚者也懲艾也今按此詩爲僖","source":"맹자"},{"text":"公之頌而孟子以周公言之亦斷章取義也","source":"맹자"},{"text":"05-04-17 從許子之道則市賈不貳國中無僞雖使五尺之童適市莫之或欺布帛","source":"맹자"},{"text":"長短同則賈相若麻縷絲絮輕重同則賈相若五穀多寡同則賈相若屨大小同則","source":"맹자"},{"text":"陳相又言許子之道如此蓋神農始爲市井故許行又託於神農而有是說也五尺","source":"맹자"},{"text":"之童言幼小無知也許行欲使市中所粥之物皆不論精粗美惡但以長短輕重多寡","source":"맹자"},{"text":"大小爲價也","source":"맹자"},{"text":"05-04-18 曰夫物之不齊物之情也或相倍蓰或相什伯或相千萬子比而同之","source":"맹자"},{"text":"是亂天下也巨屨小屨同賈人豈爲之哉從許子之道相率而爲僞者也惡能治國","source":"맹자"},{"text":"倍一倍也蓰五倍也什伯千萬皆倍數也比次也孟子言物之不齊乃其自然之理","source":"맹자"},{"text":"其有精粗猶其有大小也若大屨小屨同價則人豈肯爲其大者哉今不論精粗使","source":"맹자"},{"text":"之同價是使天下之人皆不肯爲其精者而競爲濫惡之物以相欺耳","source":"맹자"},{"text":"滕文公上5章","source":"맹자"},{"text":"05-05-01 墨者夷之因徐辟而求見孟子孟子曰吾固願見今吾尙病病愈我且往","source":"맹자"},{"text":"見夷子不來","source":"맹자"},{"text":"墨者治墨翟之道者夷姓之名徐辟孟子弟子孟子稱疾疑亦託辭以觀其意之誠","source":"맹자"},{"text":"05-05-02 他日又求見孟子孟子曰吾今則可以見矣不直則道不見我且直之吾","source":"맹자"},{"text":"聞夷子墨者","source":"맹자"},{"text":"墨之治喪也","source":"맹자"},{"text":"以薄爲其道也","source":"맹자"},{"text":"夷子思以易天下","source":"맹자"},{"text":"豈以爲非是而不貴也","source":"맹자"},{"text":"然而夷子葬其親厚則是以所賤事親也","source":"맹자"},{"text":"又求見則其意已誠矣故因徐辟以質之如此直盡言以相正也莊子曰墨子生不","source":"맹자"},{"text":"歌死無服桐棺三寸而無槨是墨之治喪以薄爲道也易天下謂移易天下之風俗","source":"맹자"},{"text":"也夷子學於墨氏而不從其敎其心必有所不安者故孟子因以詰之","source":"맹자"},{"text":"05-05-03 徐子以告夷子夷子曰儒者之道古之人若保赤子此言何謂也之則","source":"맹자"},{"text":"以爲愛無差等","source":"맹자"},{"text":"徐子以告孟子","source":"맹자"},{"text":"夫夷子信以爲人之親其兄之子","source":"맹자"},{"text":"爲若親其隣之赤子乎彼有取爾也赤子匍匐將入井非赤子之罪也且天之生物也","source":"맹자"},{"text":"使之一本而夷子二本故也","source":"맹자"},{"text":"若保赤子周書康誥篇文此儒者之言也夷子引之蓋欲援儒而入於墨以拒孟子","source":"맹자"},{"text":"之非己又曰愛無差等施由親始則推墨而附於儒以釋己所以厚葬其親之意皆","source":"맹자"},{"text":"所謂遁辭也孟子言人之愛其兄子與隣之子本有差等書之取譬本爲小民無知","source":"맹자"},{"text":"而犯法如赤子無知而入井耳且人物之生必各本於父母而無二乃自然之理若","source":"맹자"},{"text":"天使之然也故其愛由此立而推以及人自有差等今如夷子之言則是視其父母本","source":"맹자"},{"text":"無異於路人但其施之之序姑自此始耳非二本而何哉然其於先後之間猶知所擇","source":"맹자"},{"text":"則又本心之明有終不得而息者此其所以卒能受命而自覺其非也","source":"맹자"},{"text":"05-05-04","source":"맹자"},{"text":"蓋上世嘗有不葬其親者","source":"맹자"},{"text":"其親死則擧而委之於壑","source":"맹자"},{"text":"蠅蚋姑嘬之其顙有泚睨而不視夫泚也非爲人泚中心達於面目蓋歸反虆梩而","source":"맹자"},{"text":"掩之掩之誠是也則孝子仁人之掩其親亦必有道矣","source":"맹자"},{"text":"因夷子厚葬其親而言此","source":"맹자"},{"text":"以深明一本之意","source":"맹자"},{"text":"上世謂太古也","source":"맹자"},{"text":"壑山水所趨也","source":"맹자"},{"text":"蚋蚊屬姑語助聲或曰螻蛄也嘬攅共食之也顙額也泚泚然汗出之貌睨邪視","source":"맹자"},{"text":"也視正視也不能不視而又不忍正視哀痛迫切不能爲心之甚也非爲人泚言","source":"맹자"},{"text":"非爲他人見之而然也所謂一本者於此見之尤爲親切蓋惟至親故如此在他人","source":"맹자"},{"text":"則雖有不忍之心而其哀痛迫切不至若此之甚矣反覆也虆土籠也梩土轝也於","source":"맹자"},{"text":"是歸而掩覆其親之尸此葬埋之禮所由起也此掩其親者若所當然則孝子仁人","source":"맹자"},{"text":"所以掩其親者必有其道而不以薄爲貴矣","source":"맹자"},{"text":"05-05-05 徐子以告夷子夷子憮然爲間曰命之矣","source":"맹자"},{"text":"憮然茫然自失之貌爲間者有頃之間也命猶敎也言孟子已敎我矣蓋因其本心","source":"맹자"},{"text":"之明以攻其所學之蔽是以吾之言易入而彼之惑易解也","source":"맹자"},{"text":"滕文公下1章","source":"맹자"},{"text":"06-01-01 陳代曰不見諸侯宜若小然今一見之大則以王小則以霸且志曰枉","source":"맹자"},{"text":"尺而直尋宜若可爲也","source":"맹자"},{"text":"陳代孟子弟子也小謂小節也枉屈也直伸也八尺曰尋枉尺直尋猶屈己一見","source":"맹자"},{"text":"諸侯而可以致王霸所屈者小所伸者大也","source":"맹자"},{"text":"06-01-02 孟子曰昔齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士","source":"맹자"},{"text":"不忘喪其元孔子奚取焉取非其招不往也如不待其招而往何哉","source":"맹자"},{"text":"田獵也虞人守苑囿之吏也招大夫以旌招虞人以皮冠元首也志士固窮常念死","source":"맹자"},{"text":"無棺槨棄溝壑而不恨勇士輕生常念戰鬪而死喪其首而不顧也此二句乃孔子","source":"맹자"},{"text":"歎美虞人之言","source":"맹자"},{"text":"夫虞人招之不以其物","source":"맹자"},{"text":"尙守死而不往","source":"맹자"},{"text":"況君子豈可不待其招而自往","source":"맹자"},{"text":"見之邪此以上告之以不可往見之意","source":"맹자"},{"text":"06-01-03 且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可爲與","source":"맹자"},{"text":"此以下正其所稱枉尺直尋之非夫所謂枉小而所伸者大則爲之者計其利耳一有","source":"맹자"},{"text":"計利之心則雖枉多伸少而有利亦將爲之邪甚言其不可也","source":"맹자"},{"text":"06-01-04 昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤","source":"맹자"},{"text":"工也或以告王良良曰請復之彊而後可一朝而獲十禽嬖奚反命曰天下之良","source":"맹자"},{"text":"工也簡子曰我使掌與女乘謂王良良不可曰吾爲之範我馳驅終日不獲一爲","source":"맹자"},{"text":"之詭遇一朝而獲十詩云不失其馳舍矢如破我不貫與小人乘請辭","source":"맹자"},{"text":"趙簡子晉大夫趙鞅也王良善御者也嬖奚簡子幸臣與之乘爲之御也復之再乘","source":"맹자"},{"text":"也彊而後可嬖奚不肯彊之而後肯也一朝自晨至食時也掌專主也範法度也","source":"맹자"},{"text":"詭遇不正而與禽遇也言奚不善射以法馳驅則不獲廢法詭遇而後中也詩小雅","source":"맹자"},{"text":"車攻之篇言御者不失其馳驅之法而射者發矢皆中而力今嬖奚不能也貫習也","source":"맹자"},{"text":"06-01-05 御者且羞與射者比比而得禽獸雖若丘陵弗爲也如枉道而從彼何","source":"맹자"},{"text":"也且子過矣枉己者未有能直人者也","source":"맹자"},{"text":"比阿黨也若丘陵言多也○或曰居今之世出處去就不必一一中節欲其一一","source":"맹자"},{"text":"中節則道不得行矣楊氏曰何其不自重也枉己其能直人乎古之人寧道之不","source":"맹자"},{"text":"行而不輕其去就是以孔孟雖在春秋戰國之時而進必以正以至終不得行而死","source":"맹자"},{"text":"也使不恤其去就而可以行道孔孟當先爲之矣孔孟豈不欲道之行哉","source":"맹자"},{"text":"滕文公下2章","source":"맹자"},{"text":"06-02-01 景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄","source":"맹자"},{"text":"景春人姓名公孫衍張儀皆魏人怒則說諸侯使相攻伐故諸侯懼也","source":"맹자"},{"text":"06-02-02 孟子曰是焉得爲大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁","source":"맹자"},{"text":"也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順爲正者妾婦","source":"맹자"},{"text":"加冠於首曰冠女家夫家也婦人內夫家以嫁爲歸也夫子夫也女子從人以順","source":"맹자"},{"text":"爲正道也蓋言二子阿諛苟容竊取權勢乃妾婦順從之道耳非丈夫之事也","source":"맹자"},{"text":"06-02-03 居天下之廣居立天下之正位行天下之大道得志與民由之不得志","source":"맹자"},{"text":"獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫","source":"맹자"},{"text":"廣居仁也正位禮也大道義也與民由之推其所得於人也獨行其道守其所得於","source":"맹자"},{"text":"己也淫蕩其心也移變其節也屈挫其志也○何叔京曰戰國之時聖賢道否天","source":"맹자"},{"text":"下不復見其德業之盛但見姦巧之徒得志橫行氣焰可畏遂以爲大丈夫不知由君","source":"맹자"},{"text":"子觀之是乃妾婦之道耳何足道哉","source":"맹자"},{"text":"滕文公下3章","source":"맹자"},{"text":"06-03-01 周霄問曰古之君子仕乎孟子曰仕傳曰孔子三月無君則皇皇如也","source":"맹자"},{"text":"出疆必載質公明儀曰古之人三月無君則弔","source":"맹자"},{"text":"周霄魏人無君謂不得仕而事君也皇皇如有求而弗得之意出疆謂失位而去國也","source":"맹자"},{"text":"質所執以見人者如士則執雉也出疆載之者將以見所適國之君而事之也","source":"맹자"},{"text":"06-03-02 三月無君則弔不以急乎","source":"맹자"},{"text":"周霄問也以已通太也後章放此","source":"맹자"},{"text":"06-03-03 曰士之失位也猶諸侯之失國家也禮曰諸侯耕助以供粢盛夫人蠶繅","source":"맹자"},{"text":"以爲衣服犧牲不成粢盛不潔衣服不備不敢以祭惟士無田則亦不祭牲殺器皿","source":"맹자"},{"text":"衣服不備不敢以祭則不敢以宴亦不足弔乎","source":"맹자"},{"text":"禮曰諸侯爲藉百畝冕而靑紘躬秉耒以耕而庶人助以終畝收而藏之御廩以供","source":"맹자"},{"text":"宗廟之粢盛使世婦蠶于公桑蠶室奉繭以示于君遂獻于夫人夫人副褘受之繅","source":"맹자"},{"text":"三盆手遂布于三宮世婦使繅以爲黼黻文章而服以祀先王先公又曰士有田則","source":"맹자"},{"text":"祭無田則薦黍稷曰粢在器曰盛牲殺牲必特殺也皿所以覆器者","source":"맹자"},{"text":"06-03-04 出疆必載質何也","source":"맹자"},{"text":"06-03-05 曰士之仕也猶農夫之耕也農夫豈爲出疆舍其耒耜哉曰晉國亦仕國","source":"맹자"},{"text":"也未嘗聞仕如此其急仕如此其急也君子之難仕何也曰丈夫生而願爲之有室","source":"맹자"},{"text":"女子生而願爲之有家父母之心人皆有之不待父母之命媒妁之言鑽穴隙相窺","source":"맹자"},{"text":"踰牆相從則父母國人皆賤之古之人未嘗不欲仕也又惡不由其道不由其道而","source":"맹자"},{"text":"往者與鑽穴隙之類也","source":"맹자"},{"text":"晉國解見首篇","source":"맹자"},{"text":"仕國謂君子遊宦之國","source":"맹자"},{"text":"霄意以孟子不見諸侯爲難仕","source":"맹자"},{"text":"故先問古之君","source":"맹자"},{"text":"子仕否然後言此以風切之也男以女爲室女以男爲家妁亦媒也言爲父母者非","source":"맹자"},{"text":"不願其男女之有室家","source":"맹자"},{"text":"而亦惡其不由道","source":"맹자"},{"text":"蓋君子雖不潔身以亂倫","source":"맹자"},{"text":"而亦不徇利而忘","source":"맹자"},{"text":"滕文公下4章","source":"맹자"},{"text":"06-04-01 彭更問曰後車數十乘從者數百人以傳食於諸侯不以泰乎孟子曰","source":"맹자"},{"text":"非其道則一簞食不可受於人如其道則舜受堯之天下不以爲泰子以爲泰乎","source":"맹자"},{"text":"彭更孟子弟子也泰侈也","source":"맹자"},{"text":"06-04-02 曰否士無事而食不可也","source":"맹자"},{"text":"言不以舜爲泰但謂今之士無功而食人之食則不可也","source":"맹자"},{"text":"06-04-03 曰子不通功易事以羨補不足則農有餘粟女有餘布子如通之則梓","source":"맹자"},{"text":"匠輪輿皆得食於子於此有人焉入則孝出則悌守先王之道以待後之學者而","source":"맹자"},{"text":"不得食於子子何尊梓匠輪輿而輕爲仁義者哉","source":"맹자"},{"text":"通功易事謂通人之功而交易其事羡餘也有餘言無所貿易而積於無用也梓人匠","source":"맹자"},{"text":"人木工也輪人輿人車工也","source":"맹자"},{"text":"06-04-04 曰梓匠輪輿其志將以求食也君子之爲道也其志亦將以求食與曰子","source":"맹자"},{"text":"何以其志爲哉其有功於子可食而食之矣且子食志乎食功乎曰食志","source":"맹자"},{"text":"孟子言自我而言固不求食自彼而言凡有功者則當食之","source":"맹자"},{"text":"06-04-05 曰有人於此毁瓦畫墁其志將以求食也則子食之乎曰否曰然則子非","source":"맹자"},{"text":"食志也食功也","source":"맹자"},{"text":"墁牆壁之飾也毁瓦畫墁言無功而有害也旣曰食功則以士爲無事而食者眞尊","source":"맹자"},{"text":"梓匠輪輿而輕爲仁義者矣","source":"맹자"},{"text":"滕文公下5章","source":"맹자"},{"text":"06-05-01 萬章問曰宋小國也今將行王政齊楚惡而伐之則如之何","source":"맹자"},{"text":"萬章孟子弟子宋王偃嘗滅滕伐薛敗齊楚魏之兵欲霸天下疑卽此時也","source":"맹자"},{"text":"06-05-02 孟子曰湯居亳與葛爲鄰葛伯放而不祀湯使人問之曰何爲不祀曰","source":"맹자"},{"text":"無以供犧牲也湯使遺之牛羊葛伯食之又不以祀湯又使人問之曰何爲不祀曰","source":"맹자"},{"text":"無以供粢盛也湯使亳衆往爲之耕老弱饋食葛伯帥其民要其有酒食黍稻者奪","source":"맹자"},{"text":"之不授者殺之有童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也","source":"맹자"},{"text":"葛國名伯爵也放而不祀放縱無道不祀先祖也毫衆湯之民其民葛民也授","source":"맹자"},{"text":"與也餉亦饋也書商書仲虺之誥也仇餉言與餉者爲仇也","source":"맹자"},{"text":"06-05-03 爲其殺是童子而征之四海之內皆曰非富天下也爲匹夫匹婦復讐也","source":"맹자"},{"text":"非富天下言湯之心非以天下爲富而欲得之也","source":"맹자"},{"text":"06-05-04 湯始征自葛載十一征而無敵於天下東面而征西夷怨南面而征北","source":"맹자"},{"text":"狄怨曰奚爲後我民之望之若大旱之望雨也歸市者弗止芸者不變誅其君吊其","source":"맹자"},{"text":"民如時雨降民大悅書曰徯我后后來其無罰","source":"맹자"},{"text":"載亦始也十一征所征十一國也餘已見前篇","source":"맹자"},{"text":"06-05-05","source":"맹자"},{"text":"有攸不爲臣","source":"맹자"},{"text":"東征綏厥士女","source":"맹자"},{"text":"匪厥玄黃紹我周王見休","source":"맹자"},{"text":"惟臣附于大邑周","source":"맹자"},{"text":"其君子實玄黃于匪以迎其君子其小人簞食壼漿以迎其小人救民於水火之中","source":"맹자"},{"text":"取其殘而已矣","source":"맹자"},{"text":"按周書武成篇載武王之言孟子約其文如此然其辭時與今書文不類今姑依此文","source":"맹자"},{"text":"解之有所不爲臣謂助紂爲惡而不爲周臣者匪與篚同玄黃幣也紹繼也猶言","source":"맹자"},{"text":"事也言其士女以匪盛玄黃之幣迎武王而事之也商人而曰我周王猶商書所謂我","source":"맹자"},{"text":"后也休美也言武王能順天休命而事之者皆見休也臣附歸服也孟子又釋其意","source":"맹자"},{"text":"言商人聞周師之來各以其類相迎者以武王能救民於水火之中取其殘民者誅之","source":"맹자"},{"text":"而不爲暴虐耳君子謂在位之人小人謂細民也","source":"맹자"},{"text":"06-05-06 太誓曰我武惟揚侵于之疆則取于殘殺伐用張于湯有光","source":"맹자"},{"text":"太誓周書也今書文亦小異言武王威武奮揚侵彼紂之疆界取其殘賊而殺伐之","source":"맹자"},{"text":"功因以張大比於湯之伐桀又有光焉引此以證上文取其殘之義","source":"맹자"},{"text":"06-05-07 不行王政云爾苟行王政四海之內皆擧首而望之欲以爲君齊楚雖大","source":"맹자"},{"text":"宋實不能行王政後果爲齊所滅王偃走死○尹氏曰爲國者能自治而得民心則","source":"맹자"},{"text":"天下皆將歸往之恨其征伐之不早也尙何彊國之足畏哉苟不自治而以彊弱之勢","source":"맹자"},{"text":"言之是可畏而已矣","source":"맹자"},{"text":"滕文公下6章","source":"맹자"},{"text":"06-06-01 孟子謂戴不勝曰子欲子之王之善與我明告子有楚大夫於此欲其子","source":"맹자"},{"text":"之齊語也則使齊人傅諸使楚人傅諸曰使齊人傅之曰一齊人傅之衆楚人咻之","source":"맹자"},{"text":"雖日撻而求其齊也不可得矣引而置之莊嶽之間數年雖日撻而求其楚亦不可得","source":"맹자"},{"text":"戴不勝宋臣也齊語齊人語也傅敎也咻讙也齊齊語也莊嶽齊街里名也楚楚語","source":"맹자"},{"text":"也此先設譬以曉之也","source":"맹자"},{"text":"06-06-02 子謂薛居州善士也使之居於王所在於王所者長幼卑尊皆薛居州也","source":"맹자"},{"text":"王誰與爲不善在王所者長幼卑尊皆非薛居州也王誰與爲善一薛居州獨如宋","source":"맹자"},{"text":"居州亦宋臣言小人衆而君子獨無以成正君之功","source":"맹자"},{"text":"滕文公下7章","source":"맹자"},{"text":"06-07-01 公孫丑問曰不見諸侯何義孟子曰古者不爲臣不見","source":"맹자"},{"text":"不爲臣謂未仕於其國者也此不見諸侯之義也","source":"맹자"},{"text":"06-07-02 段干木踰垣而辟之泄柳閉門而不內是皆已甚迫斯可以見矣","source":"맹자"},{"text":"段干木魏文侯時人泄柳魯繆公時人文侯繆公欲見此二人而二人不肯見之蓋","source":"맹자"},{"text":"未爲臣也已甚過甚也迫謂求見之切也","source":"맹자"},{"text":"06-07-03 陽貨欲見孔子而惡無禮大夫有賜於士不得受於其家則往拜其門陽","source":"맹자"},{"text":"貨矙孔子之亡也而饋孔子蒸豚孔子亦矙其亡也而往拜之當是時陽貨先豈得","source":"맹자"},{"text":"此又引孔子之事以明可見之節也欲見孔子欲召孔子來見己也惡無禮畏人以","source":"맹자"},{"text":"己爲無禮也受於其家對使人拜受於家也其門大夫之門也矙窺也陽貨於魯","source":"맹자"},{"text":"爲大夫孔子爲士故以此物及其不在而饋之欲其來拜而見之也先謂先來加禮","source":"맹자"},{"text":"06-07-04 曾子曰脅肩諂笑病于夏畦子路曰未同而言觀其色赧赧然非由之","source":"맹자"},{"text":"所知也由是觀之則君子之所養可知已矣","source":"맹자"},{"text":"脅肩竦體諂笑彊笑皆小人側媚之態也病勞也夏畦夏月治畦之人也言爲此者","source":"맹자"},{"text":"其勞過於夏畦之人也未同而言與人未合而彊與之言也赧赧慙而面赤之貌由子","source":"맹자"},{"text":"路名言非己所知甚惡之之辭也孟子言由此二言觀之則二子之所養可知必不","source":"맹자"},{"text":"肯不侯其禮之至而輒往見之也○此章言聖人禮義之中正過之者傷於迫切而","source":"맹자"},{"text":"不洪不及者淪於汚賤而不恥","source":"맹자"},{"text":"滕文公下8章","source":"맹자"},{"text":"06-08-01 戴盈之曰什一去關市之征今玆未能請輕之以待來年然後已何如","source":"맹자"},{"text":"盈之亦宋大夫也什一井田之法也關市之征商賈之稅也已止也","source":"맹자"},{"text":"06-08-02 孟子曰今有人日攘其鄰之鷄者或告之曰是非君子之道曰請損之","source":"맹자"},{"text":"月攘一鷄以待來年然後已","source":"맹자"},{"text":"攘物自來而取之也損減也","source":"맹자"},{"text":"06-08-03 如知其非義斯速已矣何待來年","source":"맹자"},{"text":"知義理之不可而不能速改與月攘一鷄何以異哉","source":"맹자"},{"text":"滕文公下9章","source":"맹자"},{"text":"06-09-01 公都子曰外人皆稱夫子好辯敢問何也孟子曰予豈好辯哉予不得","source":"맹자"},{"text":"已也天下之生久矣一治一亂","source":"맹자"},{"text":"生謂生民也一治一亂氣化盛衰人事得失反覆相尋理之常也","source":"맹자"},{"text":"06-09-02 當堯之時水逆行氾濫於中國蛇龍居之民無所定下者爲巢上者爲","source":"맹자"},{"text":"營窟書曰洚水警余洚水者洪水也","source":"맹자"},{"text":"水逆行下流雍塞故水倒流而旁溢也下下地上高地也營窟穴處也書虞書大禹","source":"맹자"},{"text":"謨也洚水洚洞無涯之水也警戒也此一亂也","source":"맹자"},{"text":"06-09-03 使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是","source":"맹자"},{"text":"也險阻旣遠鳥獸之害人者消然後人得平土而居之","source":"맹자"},{"text":"掘地掘去壅塞也菹澤生草者也地中兩涯之間也險阻謂水之氾濫也遠去也消","source":"맹자"},{"text":"除也此一治也","source":"맹자"},{"text":"06-09-04 堯舜旣沒聖人之道衰暴君代作壞宮室以爲汚池民無所安息棄田以","source":"맹자"},{"text":"爲園囿使民不得衣食邪說暴行又作園囿汚池沛澤多而禽獸至及紂之身天下","source":"맹자"},{"text":"暴君謂夏太康孔甲履癸商武乙之類也宮室民居也沛草木之所生也澤水所鍾","source":"맹자"},{"text":"也自堯舜沒至此治亂非一及紂而又一大亂也","source":"맹자"},{"text":"06-09-05 周公相武王誅紂伐奄三年討其君驅飛廉於海隅而戮之滅國者五十","source":"맹자"},{"text":"驅虎豹犀象而遠之天下大悅書曰丕顯哉文王謨丕承哉武王烈佑啓我後人","source":"맹자"},{"text":"咸以正無缺","source":"맹자"},{"text":"奄東方之國助紂爲虐者也飛廉紂幸臣也五十國皆紂黨虐民者也書周書君牙之","source":"맹자"},{"text":"篇丕大也顯明也謨謀也承繼也烈光也佑助也啓開也缺壞也此一治也","source":"맹자"},{"text":"06-09-06 世衰道微邪說暴行有作臣弑其君者有之子弑其父者有之","source":"맹자"},{"text":"此周室東遷之後又一亂也","source":"맹자"},{"text":"06-09-07 孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪","source":"맹자"},{"text":"我者其惟春秋乎","source":"맹자"},{"text":"胡氏曰中尼作春秋以寓王法厚典庸禮命德討罪其大要皆天子之事也知孔子","source":"맹자"},{"text":"者謂此書之作遏人欲於橫流存天理於旣滅爲後世慮至深遠也罪孔子者以","source":"맹자"},{"text":"謂無其位而託二百四十二年南面之權使亂臣賊子禁其欲而不得肆則戚矣愚謂","source":"맹자"},{"text":"孔子作春秋以討亂賊則致治之法垂於萬世是亦一治也","source":"맹자"},{"text":"06-09-08 聖王不作諸侯放恣處士橫議楊朱墨翟之言盈天下天下之言不歸","source":"맹자"},{"text":"楊則歸墨楊氏爲我是無君也墨氏兼愛是無父也無父無君是禽獸也公明","source":"맹자"},{"text":"儀曰庖有肥肉廐有肥馬民有飢色野有餓莩此率獸而食人也楊墨之道不息孔","source":"맹자"},{"text":"子之道不著是邪說誣民充塞仁義也仁義充塞則率獸食人人將相食","source":"맹자"},{"text":"楊朱但知愛身而不復知有致身之義故無君墨子愛無差等而視其至親無異衆人","source":"맹자"},{"text":"故無父無父無君則人道滅絶是亦禽獸而已公明儀之言義見首篇充塞仁義","source":"맹자"},{"text":"謂邪說徧滿妨於仁義也孟子引儀之言以明楊墨道行則人皆無父無君以陷於","source":"맹자"},{"text":"禽獸而大亂將起是亦率獸食人而人又相食也此又一亂也","source":"맹자"},{"text":"06-09-09 吾爲此懼閑先聖之道距楊墨放淫辭邪說者不得作作於其心害於","source":"맹자"},{"text":"其事作於其事害於其政聖人復起不易吾言矣","source":"맹자"},{"text":"閑衛也放驅而遠之也作起也事所行政大體也孟子雖不得志於時然楊墨之","source":"맹자"},{"text":"害自是滅息而君臣父子之道賴以不墜是亦一治也程子曰楊墨之害甚於申韓","source":"맹자"},{"text":"佛老之害甚於楊墨蓋楊氏爲我疑於義墨氏兼愛疑於仁申韓則淺陋易見","source":"맹자"},{"text":"故孟子止闢楊墨爲其或世之甚也佛氏之言近理又非楊墨之比所以爲害尤甚","source":"맹자"},{"text":"06-09-10 昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂","source":"맹자"},{"text":"抑止也兼幷之也總結上文也","source":"맹자"},{"text":"06-09-11 詩云戎狄是膺荊舒是懲則莫我敢承無父無君是周公所膺也","source":"맹자"},{"text":"說見上篇承當也","source":"맹자"},{"text":"06-09-12 我亦欲正人心息邪說距詖行放淫辭以承三聖者豈好辯哉予不得","source":"맹자"},{"text":"詖淫解見前篇辭者說之詳也承繼也三聖禹周公孔子也蓋邪說橫流壞人心術","source":"맹자"},{"text":"甚於洪水猛獸之災慘於夷狄簒弑之禍故孟子深懼而力救之再言豈好辯哉予不","source":"맹자"},{"text":"得已也所以深致意焉然非知道之君子孰能眞知其所以不得已之故哉","source":"맹자"},{"text":"06-09-13 能言距楊墨者聖人之徒也","source":"맹자"},{"text":"言苟有能爲此距楊墨之說者則其所趨正矣雖未必知道是亦聖人之徒也孟子旣","source":"맹자"},{"text":"答公都子之問而意有未盡故復言此蓋邪說害正人人得而攻之不必聖賢如春","source":"맹자"},{"text":"秋之法亂臣賊子人人得而誅之不必士師也聖人救世立法之意其切如此若以","source":"맹자"},{"text":"此意推之則不能攻討而又唱爲不必攻討之說者其爲邪詖之徒亂賊之黨可知","source":"맹자"},{"text":"矣○尹氏曰學者於是非之原毫釐有差則害流於生民禍及於後世故孟子辯","source":"맹자"},{"text":"邪說如是之嚴而自以爲承三聖之功也當是時方且以好辯目之是以常人之心","source":"맹자"},{"text":"而度聖賢之心也","source":"맹자"},{"text":"滕文公下10章","source":"맹자"},{"text":"06-10-01 匡章曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井","source":"맹자"},{"text":"上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見","source":"맹자"},{"text":"匡章陳仲子皆齊人廉有分辨不苟取也於陵地名螬蠐螬蟲也匍匐言無力不","source":"맹자"},{"text":"能行也咽呑也","source":"맹자"},{"text":"06-10-02 孟子曰於齊國之士吾必以仲子爲巨擘焉雖然仲子惡能廉充仲子","source":"맹자"},{"text":"之操則蚓而後可者也","source":"맹자"},{"text":"巨擘大指也言齊人中有仲子如衆小指中有大指也充推而滿之也操所守也","source":"맹자"},{"text":"蚓丘蚓也言仲子未得爲廉也必若滿其所守之志則惟丘蚓之無求於世然後可以","source":"맹자"},{"text":"06-10-03 夫蚓上食槁壤下飮黃泉仲子所居之室伯夷之所築與抑亦盜跖之所","source":"맹자"},{"text":"築與所食之粟伯夷之所樹與抑亦盜跖之所樹與是未可知也","source":"맹자"},{"text":"槁壤乾土也黃泉濁水也抑發語辭也言蚓無求於人而自足而仲子不免居室食粟","source":"맹자"},{"text":"若所從來或有非義則是未能如蚓之廉也","source":"맹자"},{"text":"06-10-04 曰是何傷哉彼身織屨妻辟纑以易之也","source":"맹자"},{"text":"辟績也纑練麻也","source":"맹자"},{"text":"06-10-05 曰仲子齊之世家也兄戴蓋祿萬鍾以兄之祿爲不義之祿而不食也","source":"맹자"},{"text":"以兄之室爲不義之室而不居也辟兄離母處於於陵他日歸則有饋其兄生鵝","source":"맹자"},{"text":"者己頻顣曰惡用是鶃鶃者爲哉他日其母殺是鵝也與之食之其兄自外至曰","source":"맹자"},{"text":"是鶃鶃之肉也出而哇之","source":"맹자"},{"text":"世家世卿之家兄名戴食采於蓋其入萬鍾也歸自於陵歸也己仲子也鶃鶃鵝聲","source":"맹자"},{"text":"也頻顣而言以其兄受饋爲不義也哇吐之也","source":"맹자"},{"text":"06-10-06 以母則不食以妻則食之以兄之室則弗居以於陵則居之是尙爲能充","source":"맹자"},{"text":"其類也乎若仲子者蚓而後充其操者也","source":"맹자"},{"text":"言仲子以母之食兄之室爲不義而不食不居其操守如此至於妻所易之粟於陵","source":"맹자"},{"text":"所居之室旣未必伯夷之所爲則亦不義之類耳今仲子於此則不食不居於彼則食","source":"맹자"},{"text":"之居之豈爲能充滿其操守之類者乎必其無求自足如丘蚓然乃爲能滿其志而得","source":"맹자"},{"text":"爲廉耳然豈人之所可爲哉○范氏曰天之所生地之所養惟人爲大人之所以","source":"맹자"},{"text":"爲大者以其有人倫也仲子避兄離母無親戚君臣上下是無人倫也豈有無人倫","source":"맹자"},{"text":"而可以爲廉哉","source":"맹자"},{"text":"凡二十八章","source":"맹자"},{"text":"離婁上1章","source":"맹자"},{"text":"07-01-01 孟子曰離婁之明公輸子之巧不以規矩不能成方員師曠之聰不以","source":"맹자"},{"text":"六律不能正五音堯舜之道不以仁政不能平治天下","source":"맹자"},{"text":"離婁古之明目者公輸子名班魯之巧人也規所以爲員之器也矩所以爲方","source":"맹자"},{"text":"之器也師曠晉之樂師知音者也六律截竹爲筩陰陽各六以節五音之上下黃","source":"맹자"},{"text":"鍾大簇姑洗蕤賓夷則無射爲陽大呂夾鍾仲呂林鍾南呂應鍾爲陰也","source":"맹자"},{"text":"五音宮商角徵羽也范氏曰此言治天下不可無法度仁政者治天下之法度也","source":"맹자"},{"text":"07-01-02 今有仁心仁聞而民不被其澤不可法於後世者不行先王之道也","source":"맹자"},{"text":"仁心愛人之心也仁聞者有愛人之聲聞於人也先王之道仁政是也范氏曰","source":"맹자"},{"text":"齊宣王不忍一牛之死以羊易之可謂有仁心梁武帝終日一食蔬素宗廟以麪","source":"맹자"},{"text":"爲犧牲斷死刑必爲之涕泣天下知其慈仁可謂有仁聞然而宣王之時齊國不治","source":"맹자"},{"text":"武帝之末江南大亂其故何哉有仁心仁聞而不行先王之道故也","source":"맹자"},{"text":"07-01-03 故曰徒善不足以爲政徒法不能以自行","source":"맹자"},{"text":"徒猶空也有其心無其政是謂徒善有其政無其心是謂徒法程子嘗言爲政","source":"맹자"},{"text":"須要有綱紀文章謹權審量讀法平價皆不可闕而又曰必有關雎麟趾之意然","source":"맹자"},{"text":"後可以行周官之法度正謂此也","source":"맹자"},{"text":"07-01-04 詩云不愆不忘率由舊章遵先王之法而過者未之有也","source":"맹자"},{"text":"詩大雅假樂之篇愆過也率循也章典法也所行不過差不遺忘者以其循用","source":"맹자"},{"text":"07-01-05 聖人旣竭目力焉繼之以規矩準繩以爲方員平直不可勝用也旣竭耳","source":"맹자"},{"text":"力焉繼之以六律正五音不可勝用也旣竭心思焉繼之以不忍人之政而仁覆天","source":"맹자"},{"text":"準所以爲平繩所以爲直覆被也此言古之聖人旣竭耳目心思之力然猶以","source":"맹자"},{"text":"爲未足以徧天下及後世故制爲法度以繼續之則其用不窮而仁之所被者廣矣","source":"맹자"},{"text":"07-01-06 故曰爲高必因丘陵爲下必因川澤爲政不因先王之道可謂智乎","source":"맹자"},{"text":"丘陵本高川澤本下爲高下者因之則用力少而成功多矣鄒氏曰自章首至","source":"맹자"},{"text":"此論以仁心仁聞行先王之道","source":"맹자"},{"text":"07-01-07 是以惟仁者宜在高位不仁而在高位是播其惡於衆也","source":"맹자"},{"text":"仁者有仁心仁聞而能擴而充之以行先王之道者也播惡於衆謂貽患於下也","source":"맹자"},{"text":"07-01-08 上無道揆也下無法守也朝不信道工不信度君子犯義小人犯刑國","source":"맹자"},{"text":"之所存者幸也","source":"맹자"},{"text":"此言不仁而在高位之禍也道義理也揆度也法制度也道揆謂以義理度量","source":"맹자"},{"text":"事物而制其宜法守謂以法度自守工官也度卽法也君子小人以位而言也","source":"맹자"},{"text":"由上無道揆故下無法守無道揆則朝不信道而君子犯義無法守則工不信度而","source":"맹자"},{"text":"小人犯刑有此六者其國必亡其不亡者僥倖而已","source":"맹자"},{"text":"07-01-09 故曰城郭不完兵甲不多非國之災也田野不辟貨財不聚非國之害","source":"맹자"},{"text":"也上無禮下無學賊民興喪無日矣","source":"맹자"},{"text":"上不知禮則無以敎民下不知學則易與爲亂鄒氏曰自是以惟仁者至此所以","source":"맹자"},{"text":"07-01-10 詩曰天之方蹶無然泄泄","source":"맹자"},{"text":"詩大雅板之篇蹶顚覆之意泄泄怠緩悅從之貌言天欲顚覆周室群臣無得泄泄","source":"맹자"},{"text":"然不急救正之","source":"맹자"},{"text":"07-01-11 泄泄猶沓沓也","source":"맹자"},{"text":"沓沓卽泄泄之意蓋孟子時人語如此","source":"맹자"},{"text":"07-01-12 事君無義進退無禮言則非先王之道者猶沓沓也","source":"맹자"},{"text":"07-01-13 故曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊","source":"맹자"},{"text":"范氏曰人臣以難事責於君使其君爲堯舜之君者尊君之大也開陣善道以禁","source":"맹자"},{"text":"閉君之邪心惟恐其君或陷於有過之地者敬君之至也謂其君不能行善道而不","source":"맹자"},{"text":"以告者賊害其君之甚也鄒氏曰自詩云天之方蹶至此所以責其臣○鄒氏曰","source":"맹자"},{"text":"此章言爲治者當有仁心仁聞以行先王之政而君臣又當各任其責也","source":"맹자"},{"text":"離婁上2章","source":"맹자"},{"text":"07-02-01 孟子曰規矩方員之至也聖人人倫之至也","source":"맹자"},{"text":"至極也人倫說見前篇規矩盡所以爲方員之理猶聖人盡所以爲人之道","source":"맹자"},{"text":"07-02-02 欲爲君盡君道欲爲臣盡臣道二者皆法堯舜而已矣不以舜之所以","source":"맹자"},{"text":"事堯事君不敬其君者也不以堯之所以治民治民賊其民者也","source":"맹자"},{"text":"法堯舜以盡君臣之道猶用規矩以盡方員之極此孟子所以道性善而稱堯舜也","source":"맹자"},{"text":"07-02-03 孔子曰道二仁與不仁而已矣","source":"맹자"},{"text":"法堯舜則盡君臣之道而仁矣不法堯舜則慢君賊民而不仁矣二端之外更無他","source":"맹자"},{"text":"道出乎此則入乎彼矣可不謹哉","source":"맹자"},{"text":"07-02-04 暴其民甚則身弑國亡不甚則身危國削名之曰幽厲雖孝子慈孫百世","source":"맹자"},{"text":"幽暗厲虐皆惡諡也苟得其實則雖有孝子慈孫愛其祖考之甚者亦不得廢公","source":"맹자"},{"text":"義而改之言不仁之禍必至於此可懼之甚也","source":"맹자"},{"text":"07-02-05 詩云殷鑑不遠在夏后之世此之謂也","source":"맹자"},{"text":"詩大雅蕩之篇言商紂之所當鑑者近在夏桀之世而孟子引之又欲後人以幽","source":"맹자"},{"text":"離婁上3章","source":"맹자"},{"text":"07-03-01 孟子曰三代之得天下也以仁其失天下也以不仁","source":"맹자"},{"text":"三代謂夏商周也禹湯文武以仁得之桀紂幽厲以不仁失之","source":"맹자"},{"text":"07-03-02 國之所以廢興存亡者亦然","source":"맹자"},{"text":"國爲諸侯之國","source":"맹자"},{"text":"07-03-03 天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人","source":"맹자"},{"text":"不仁不保四體","source":"맹자"},{"text":"07-03-04 今惡死亡而樂不仁是猶惡醉而強酒","source":"맹자"},{"text":"此承上章之意而推言之也","source":"맹자"},{"text":"離婁上4章","source":"맹자"},{"text":"07-04-01 孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬","source":"맹자"},{"text":"我愛人而人不親我則反求諸己恐我之仁未至也智敬放此","source":"맹자"},{"text":"07-04-02 行有不得者皆反求諸己其身正而天下歸之","source":"맹자"},{"text":"不得謂不得其所欲如不親不治不答是也反求諸己謂反其仁反其智反其敬","source":"맹자"},{"text":"也如此則自治益詳而身無不正矣天下歸之極言其效也","source":"맹자"},{"text":"07-04-03 詩云永言配命自求多福","source":"맹자"},{"text":"解見前篇○亦承上章而言","source":"맹자"},{"text":"離婁上5章","source":"맹자"},{"text":"07-05-01 孟子曰人有恒言皆曰天下國家天下之本在國國之本在家家之本在","source":"맹자"},{"text":"恒常也雖常言之而未必知其言之有序也故推言之而又以家本乎身也此","source":"맹자"},{"text":"亦承上章而推言之大學所謂自天子至於庶人壹是皆以修身爲本爲是故也","source":"맹자"},{"text":"離婁上6章","source":"맹자"},{"text":"07-06-01 孟子曰爲政不難不得罪於巨室巨室之所慕一國慕之一國之所慕","source":"맹자"},{"text":"天下慕之故沛然德敎溢乎四海","source":"맹자"},{"text":"巨室世臣大家也得罪謂身不正而取怨怒也麥丘邑人祝齊桓公曰願主君無","source":"맹자"},{"text":"得罪於群臣百姓意蓋如此慕向也心悅誠服之謂也沛然盛大流行之貌溢充","source":"맹자"},{"text":"滿也蓋巨室之心難以力服而國人素所取信今旣悅服則國人皆服而吾德敎","source":"맹자"},{"text":"之所施可以無遠而不至矣此亦承上章而言盖君子不患人心之不服而患吾身","source":"맹자"},{"text":"之不修吾身旣修則人心之難服者先服而無一人之不服矣○林氏曰戰國之","source":"맹자"},{"text":"世諸侯失德巨室擅權爲患甚矣然或者不修其本而遽欲勝之則未必能勝","source":"맹자"},{"text":"而適以取禍故孟子推本而言惟務修德以服其心彼旣悅服則吾之德敎無所","source":"맹자"},{"text":"留礙可以及乎天下矣裵度所謂韓洪輿疾討賊承宗斂手削地非朝廷之力能","source":"맹자"},{"text":"制其死命特以處置得宜能服其心故爾政此類也","source":"맹자"},{"text":"離婁上7章","source":"맹자"},{"text":"07-07-01 孟子曰天下有道小德役大德小賢役大賢天下無道小役大弱役強","source":"맹자"},{"text":"斯二者天也順天者存逆天者亡","source":"맹자"},{"text":"有道之世人皆修德而位必稱其德之大小天下無道人不修德則但以力相役而","source":"맹자"},{"text":"已天者理勢之當然也","source":"맹자"},{"text":"07-07-02 齊景公曰旣不能令又不受命是絶物也涕出而女於吳","source":"맹자"},{"text":"引此以言小役大弱役強之事也令出令以使人也受命聽命於人也物猶人也","source":"맹자"},{"text":"女以女與人也吳蠻夷之國也景公羞與爲昏而畏其強故涕泣而以女與之","source":"맹자"},{"text":"07-07-03 今也小國師大國而恥受命焉是猶弟子而恥受命於先師也","source":"맹자"},{"text":"言小國不修德以自強其般樂怠敖皆若效大國之所爲者而獨恥受其敎命不可","source":"맹자"},{"text":"07-07-04 如恥之莫若師文王師文王大國五年小國七年必爲政於天下矣","source":"맹자"},{"text":"此因其愧恥之心而勉以修德也文王之政布在方策擧而行之所謂師文王也","source":"맹자"},{"text":"五年七年以其所乘之勢不同爲差蓋天下雖無道然修德之至則道自我行","source":"맹자"},{"text":"而大國反爲吾役矣程子曰五年七年聖人度其時則可矣然凡此類學者皆","source":"맹자"},{"text":"當思其作爲如何乃有益耳","source":"맹자"},{"text":"07-07-05 詩云商之孫子其麗不億上帝旣命侯于周服侯服于周天命靡常殷","source":"맹자"},{"text":"士膚敏祼將于京孔子曰仁不可爲衆也夫國君好仁天下無敵","source":"맹자"},{"text":"詩大雅文王之篇孟子引此詩及孔子之言以言文王之事麗數也十萬曰億","source":"맹자"},{"text":"侯維也商士商孫子之臣也膚大也敏達也祼宗廟之祭以鬱鬯之酒灌地而","source":"맹자"},{"text":"降神也將助也言商之孫子衆多其數不但十萬而已上帝旣命周以天下則凡","source":"맹자"},{"text":"此商之孫子皆臣服于周矣所以然者以天命不常歸于有德故也是以商士之膚","source":"맹자"},{"text":"大而敏達者皆執祼獻之禮助王祭事于周之京師也孔子因讀此詩而言有仁者","source":"맹자"},{"text":"則雖有十萬之衆不能當之故國君好仁則必無敵於天下也不可爲衆猶所謂難","source":"맹자"},{"text":"爲兄難爲弟云爾","source":"맹자"},{"text":"07-07-06 今也欲無敵於天下而不以仁是猶執熱而不以濯也詩云誰能執熱逝不","source":"맹자"},{"text":"恥受命於大國是欲無敵於天下也乃師大國而不師文王是不以仁也詩大雅","source":"맹자"},{"text":"桑柔之篇逝語辭也言誰能執持熱物而不以水自濯其手乎○此章言不能自","source":"맹자"},{"text":"強則聽天所命修德行仁則天命在我","source":"맹자"},{"text":"離婁上8章","source":"맹자"},{"text":"07-08-01 孟子曰不仁者可與言哉安其危而利其菑樂其所以亡者不仁而可與","source":"맹자"},{"text":"言則何亡國敗家之有","source":"맹자"},{"text":"安其危利其菑者不知其爲危菑而反以爲安利也所以亡者謂荒暴淫虐所以致","source":"맹자"},{"text":"亡之道也不仁之人私欲固蔽失其本心故其顚倒錯亂至於如此所以不可告以","source":"맹자"},{"text":"忠言而卒至於敗亡也","source":"맹자"},{"text":"07-08-02 有孺子歌曰滄浪之水淸兮可以濯我纓滄浪之水濁兮可以濯我足","source":"맹자"},{"text":"滄浪水名纓冠系也","source":"맹자"},{"text":"07-08-03 孔子曰小子聽之淸斯濯纓濁斯濯足矣自取之也","source":"맹자"},{"text":"言水之淸濁有以自取之也聖人聲入心通無非至理此類可見","source":"맹자"},{"text":"07-08-04 夫人必自侮然後人侮之家必自毁而後人毀之國必自伐而後人伐之","source":"맹자"},{"text":"所謂自取之者","source":"맹자"},{"text":"07-08-05 太甲曰天作孼猶可違自作孼不可活此之謂也","source":"맹자"},{"text":"解見前篇○此章言心存則有以審夫得失之幾不存則無以辨於存亡之著禍福","source":"맹자"},{"text":"之來皆其自取","source":"맹자"},{"text":"離婁上9章","source":"맹자"},{"text":"07-09-01 孟子曰桀紂之失天下也失其民也失其民者失其心也得天下有道得","source":"맹자"},{"text":"其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡","source":"맹자"},{"text":"民之所欲皆爲致之如聚斂然民之所惡則勿施於民鼂錯所謂人情莫不欲壽","source":"맹자"},{"text":"三王生之而不傷人情莫不欲富三王厚之而不困人情莫不欲安三王扶之而不","source":"맹자"},{"text":"危人情莫不欲逸三王節其力而不盡此類之謂也","source":"맹자"},{"text":"07-09-02 民之歸仁也猶水之就下獸之走壙也","source":"맹자"},{"text":"壙廣野也言民之所以歸乎此以其所欲之在乎此也","source":"맹자"},{"text":"07-09-03 故爲淵敺魚者獺也爲叢敺爵者鸇也爲湯武敺民者桀與紂也","source":"맹자"},{"text":"淵深水也獺食魚者也叢茂林也鸇食雀者也言民之所以去此以其所欲在","source":"맹자"},{"text":"彼而所畏在此也","source":"맹자"},{"text":"07-09-04 今天下之君有好仁者則諸侯皆爲之敺矣雖欲無王不可得已","source":"맹자"},{"text":"07-09-05 今之欲王者猶七年之病求三年之艾也苟爲不畜終身不得苟不志於","source":"맹자"},{"text":"仁終身憂辱以陷於死亡","source":"맹자"},{"text":"艾草名所以灸者乾久益善夫病已深而欲求乾久之艾固難卒辦然自今畜之","source":"맹자"},{"text":"則猶或可及不然則病日益深死日益迫而艾終不可得矣","source":"맹자"},{"text":"07-09-06 詩云其何能淑載胥及溺此之謂也","source":"맹자"},{"text":"詩大雅桑柔之篇淑善也載則也胥相也言今之所爲其何能善則相引以陷","source":"맹자"},{"text":"於亂亡而已","source":"맹자"},{"text":"離婁上10章","source":"맹자"},{"text":"07-10-01 孟子曰自暴者不可與有言也自棄者不可與有爲也言非禮義謂之自","source":"맹자"},{"text":"暴也吾身不能居仁由義謂之自棄也","source":"맹자"},{"text":"暴猶害也非猶毁也自害其身者不知禮義之爲美而非毁之雖與之言必不見","source":"맹자"},{"text":"信也自棄其身者猶知仁義之爲美但溺於怠惰自謂必不能行與之有爲必不能","source":"맹자"},{"text":"勉也程子曰人苟以善自治則無不可移者雖昏愚之至皆可漸磨而進也惟自暴","source":"맹자"},{"text":"者拒之以不信自棄者絶之以不爲雖聖人與居不能化而入也此所謂下愚之不","source":"맹자"},{"text":"07-10-02 仁人之安宅也義人之安路也","source":"맹자"},{"text":"仁宅已見前篇義者宜也乃天理之當行無人欲之邪曲故曰正路","source":"맹자"},{"text":"07-10-03 曠安宅而弗居舍正路而不由哀哉","source":"맹자"},{"text":"曠空也由行也○此章言道本固有而人自絶之是可哀也此聖賢之深戒學者","source":"맹자"},{"text":"所當猛省也","source":"맹자"},{"text":"離婁上11章","source":"맹자"},{"text":"07-11-01 孟子曰道在爾而求諸遠事在易而求諸難人人親其親長其長而天下平","source":"맹자"},{"text":"親長在人爲甚邇親之長之在人爲甚易而道初不外是也舍此而他求則遠且","source":"맹자"},{"text":"難而反失之但人人各親其親各長其長則天下自平矣","source":"맹자"},{"text":"離婁上12章","source":"맹자"},{"text":"07-12-01 孟子曰居下位而不獲乎上民不可得而治也獲於上有道不信於友弗","source":"맹자"},{"text":"獲於上矣信於友有道事親弗悅弗信於友矣悅親有道反身不誠不悅於親矣","source":"맹자"},{"text":"誠身有道不明乎善不誠其身矣","source":"맹자"},{"text":"獲於上得其上之信任也誠實也反身不誠反求諸身而其所以爲善之心有不","source":"맹자"},{"text":"實也不明乎善不能卽事以窮理無以眞知善之所在也游氏曰欲誠其意先致其","source":"맹자"},{"text":"知不明乎善不誠乎身矣學至於誠身則安往而不致其極哉以內則順乎親以外","source":"맹자"},{"text":"則信乎友以上則可以得君以下則可以得民矣","source":"맹자"},{"text":"07-12-02 是故誠者天之道也思誠者人之道也","source":"맹자"},{"text":"誠者理之在我者皆實而無僞天道之本然也思誠者欲此理之在我者皆實而無","source":"맹자"},{"text":"僞人道之當然也","source":"맹자"},{"text":"07-12-03 至誠而不動者未之有也不誠未有能動者也","source":"맹자"},{"text":"至極也楊氏曰動便是驗處若獲乎上信乎友悅於親之類是也○此章術中","source":"맹자"},{"text":"庸孔子之言見思誠爲修身之本而明善又爲思誠之本乃子思所聞於曾子而孟","source":"맹자"},{"text":"子所受乎子思者亦與大學相表裏學者宜潛心焉","source":"맹자"},{"text":"離婁上13章","source":"맹자"},{"text":"07-13-01 孟子曰伯夷辟紂居北海之濱聞文王作興曰盍歸乎來吾聞西伯善養","source":"맹자"},{"text":"老者太公辟紂居東海之濱聞文王作興曰盍歸乎來吾聞西伯善養老者","source":"맹자"},{"text":"作興皆起也盍何不也西伯卽文王也紂命爲西方諸侯之長得專征伐故稱西","source":"맹자"},{"text":"伯太公姜姓呂氏名尙文王發政必先鰥寡孤獨庶人之老皆無凍餒故伯夷太公","source":"맹자"},{"text":"來就其養非求仕也","source":"맹자"},{"text":"07-13-02 二老者天下之大老也而歸之是天下之父歸之也天下之父歸之其子焉","source":"맹자"},{"text":"二老伯夷太公也大老言非常人之老者天下之父言齒德皆尊如衆父然旣得其","source":"맹자"},{"text":"心則天下之心不能外矣蕭何所謂養民致賢以圖天下者其意暗與此合但其意","source":"맹자"},{"text":"則有公私之辨學者又不可不察也","source":"맹자"},{"text":"07-13-03 諸侯有行文王之政者七年之內必爲政於天下矣","source":"맹자"},{"text":"七年以小國而言也大國五年在其中矣","source":"맹자"},{"text":"離婁上14章","source":"맹자"},{"text":"07-14-01 孟子曰求也爲季氏宰無能改於其德而賦粟倍他日孔子曰求非我徒","source":"맹자"},{"text":"也小子鳴鼓而攻之可也","source":"맹자"},{"text":"求孔子弟子冉求季氏魯卿宰家臣賦猶取也取民之粟倍於他日也小子弟子","source":"맹자"},{"text":"也鳴鼓而攻之聲其罪而責之也","source":"맹자"},{"text":"07-14-02 由此觀之君不行仁政而富之皆棄於孔子者也況於爲之強戰爭地以","source":"맹자"},{"text":"戰殺人盈野爭城以戰殺人盈城此所謂率土地而食人肉罪不容於死","source":"맹자"},{"text":"林氏曰富其君者奪民之財耳而夫子猶惡之況爲土地之故而殺人使其肝腦塗","source":"맹자"},{"text":"地則是率土地而食人之肉其罪之大雖至於死猶不足以容之也","source":"맹자"},{"text":"07-14-03 故善戰者服上刑連諸侯者次之辟草萊任土地者次之","source":"맹자"},{"text":"善戰如孫臏吳起之徒連結諸侯如蘇秦張儀之類辟開墾也任土地謂分土授民","source":"맹자"},{"text":"使任耕稼之責如李悝盡地力商鞅開阡陌之類也","source":"맹자"},{"text":"離婁上15章","source":"맹자"},{"text":"07-15-01 孟子曰存乎人者莫良於眸子眸子不能掩其惡胸中正則眸子瞭焉胸","source":"맹자"},{"text":"中不正則眸子眊焉","source":"맹자"},{"text":"良善也眸子目瞳子也瞭明也眊者蒙蒙目不明之貌蓋人與物接之時其神","source":"맹자"},{"text":"在目故胸中正則神精而明不正則神散而昏","source":"맹자"},{"text":"07-15-02 聽其言也觀其眸子人焉廋哉","source":"맹자"},{"text":"廋匿也言亦心之所發故幷此以觀則人之邪正不可匿矣然言猶可以僞爲眸","source":"맹자"},{"text":"子則有不容僞者","source":"맹자"},{"text":"離婁上16章","source":"맹자"},{"text":"07-16-01 孟子曰恭者不侮人儉者不奪人侮奪人之君惟恐不順焉惡得爲恭儉","source":"맹자"},{"text":"恭儉豈可以聲音笑貌爲哉","source":"맹자"},{"text":"惟恐不順言恐人之不順己聲音笑貌僞爲於外也","source":"맹자"},{"text":"離婁上17章","source":"맹자"},{"text":"07-17-01 淳于髡曰男女授受不親禮與孟子曰禮也曰嫂溺則援之以手乎曰嫂","source":"맹자"},{"text":"溺不援是豺狼也男女授受不親禮也嫂溺援之以手者權也","source":"맹자"},{"text":"淳于姓髡名齊之辯士授與也受取也古禮男女不親授受以遠別也援救","source":"맹자"},{"text":"之也權稱錘也稱物輕重而往來以取中者也權而得中是乃禮也","source":"맹자"},{"text":"07-17-02 曰今天下溺矣夫子之不援何也","source":"맹자"},{"text":"言今天下大亂民遭陷溺亦當從權以援之不可守先王之正道也","source":"맹자"},{"text":"07-17-03 曰天下溺援之以道嫂溺援之以手子欲手援天下乎","source":"맹자"},{"text":"言天下溺惟道可以救之非若嫂溺可手援也今子欲援天下乃欲使我枉道求","source":"맹자"},{"text":"合則先失其所以援之之具矣是欲使我以手援天下乎○此章言直己守道所","source":"맹자"},{"text":"以濟時枉道徇人徒爲失己","source":"맹자"},{"text":"離婁上18章","source":"맹자"},{"text":"07-18-01 公孫丑曰君子之不敎子何也","source":"맹자"},{"text":"07-18-02 孟子曰勢不行也敎者必以正以正不行繼之以怒繼之以怒則反夷矣","source":"맹자"},{"text":"夫子敎我以正夫子未出於正也則是父子相夷也父子相夷則惡矣","source":"맹자"},{"text":"夷傷也敎子者本爲愛其子也繼之以怒則反傷其子矣父旣傷其子子之心又","source":"맹자"},{"text":"責其父曰夫子敎我以正道而夫子之身未必自行正道則是子又傷其父也","source":"맹자"},{"text":"07-18-03 古者易子而敎之","source":"맹자"},{"text":"易子而敎所以全父子之恩而易不失其爲敎","source":"맹자"},{"text":"07-18-04 父子之間不責善責善則離離則不祥莫大焉","source":"맹자"},{"text":"責善朋友之道也○王氏曰父有爭子何也所謂爭子非責善也當不義則爭","source":"맹자"},{"text":"之而已矣父之於子也如何曰當不義則亦戒之而已矣","source":"맹자"},{"text":"離婁上19章","source":"맹자"},{"text":"07-19-01 孟子曰事孰爲大事親爲大守孰爲大守身爲大不失其身而能事其親","source":"맹자"},{"text":"者吾聞之矣失其身而能事其親者吾未之聞也","source":"맹자"},{"text":"守身持守其身使不陷於不義也一失其身則虧體辱親雖日用三牲之養亦不足","source":"맹자"},{"text":"07-19-02 孰不爲事事親事之本也孰不爲守守身守之本也","source":"맹자"},{"text":"事親孝則忠可移於君順可移於長身正則家齊國治而天下平","source":"맹자"},{"text":"07-19-03 曾子養曾晳必有酒肉將徹必請所與問有餘必曰有曾晳死曾元養","source":"맹자"},{"text":"曾子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也","source":"맹자"},{"text":"若曾子則可謂養志也","source":"맹자"},{"text":"此承上文事親言之曾晳名點曾子父也曾元曾子子也曾子養其父每食必","source":"맹자"},{"text":"有酒肉食畢將徹去必請於父曰此餘者與誰或父問此物尙有餘否必曰有恐","source":"맹자"},{"text":"親意更欲與人也曾元不請所與雖有言無其意將以復進於親不欲其與人也","source":"맹자"},{"text":"此但能養父母之口體而已曾子則能承順父母之志而不忍傷之也","source":"맹자"},{"text":"07-19-04 事親若曾子者可也","source":"맹자"},{"text":"言當如曾子之養志不可如曾元但養口體程子曰子之身所能爲者皆所當爲","source":"맹자"},{"text":"無過分之事也故事親若曾子可謂至矣而孟子止曰可也豈以曾子之孝爲有餘","source":"맹자"},{"text":"離婁上20章","source":"맹자"},{"text":"07-20-01 孟子曰人不足與適也政不足間也惟大人爲能格君心之非君仁莫不","source":"맹자"},{"text":"仁君義莫不義君正莫不正一正君而國定矣","source":"맹자"},{"text":"趙氏曰適過也間非也格正也徐氏曰格者物之所取正也書曰格其非心","source":"맹자"},{"text":"愚謂間字上易當有與字言人君用人之非不足過讁行政之失不足非間惟有","source":"맹자"},{"text":"大人之德則能格君心之不正以歸于正而國無不治矣大人者大德之人正己而","source":"맹자"},{"text":"物正者也○程子曰天下之治亂繫乎人君之仁與不仁耳心之非卽害於政不","source":"맹자"},{"text":"待乎發之於外也昔者孟子三見齊王而不言事門人疑之孟子曰我先攻其邪","source":"맹자"},{"text":"心心旣正而後天下之事可從而理也夫政事之失用人之非知者能更之直者","source":"맹자"},{"text":"能諫之然非心存焉則事事而更之後復有其事將不勝其更矣人人而去之後復","source":"맹자"},{"text":"用其人將不勝其去矣是以輔相之職必在乎格君心之非然後無所不正而欲格","source":"맹자"},{"text":"君心之非者非有大人之德則亦莫之能也","source":"맹자"},{"text":"離婁上21章","source":"맹자"},{"text":"07-21-01 孟子曰有不虞之譽有求全之毀","source":"맹자"},{"text":"虞度也呂氏曰行不足以致譽而偶得譽是謂不虞之譽求免於毀而反致毀是","source":"맹자"},{"text":"謂求全之毀言毀譽之言未必皆實修己者不可以是遽爲憂喜觀人者不可以","source":"맹자"},{"text":"是輕爲進退","source":"맹자"},{"text":"離婁上22章","source":"맹자"},{"text":"07-22-01 孟子曰人之易其言也無責耳矣","source":"맹자"},{"text":"人之所以輕易其言者以其未遭失言之責故耳蓋常人之情無所懲於前則無所警","source":"맹자"},{"text":"於後非以爲君子之學必俟有責而後不敢易其言也然此豈亦有爲而言之與","source":"맹자"},{"text":"離婁上23章","source":"맹자"},{"text":"07-23-01 孟子曰人之患在好爲人師","source":"맹자"},{"text":"王勉曰學問有餘人資於己不得而已應之可也若好爲人師則自足而不復有進","source":"맹자"},{"text":"矣此人之大患也","source":"맹자"},{"text":"離婁上24章","source":"맹자"},{"text":"07-24-01 樂正子從於子敖之齊","source":"맹자"},{"text":"子敖王驩字","source":"맹자"},{"text":"07-24-02 樂正子見孟子孟子曰子亦來見我乎曰先生何爲出此言也曰子來幾","source":"맹자"},{"text":"日矣曰昔者曰昔者則我出此言也不亦宜乎曰舍館未定曰子聞之也舍館定然","source":"맹자"},{"text":"後求見長者乎","source":"맹자"},{"text":"昔者前日也館客舍也王驩孟子所不與言者則其人可知矣樂正子乃從之行","source":"맹자"},{"text":"其失身之罪大矣又不早見長者則其罪又有甚者焉故孟子姑以此責之","source":"맹자"},{"text":"07-24-03 曰克有罪","source":"맹자"},{"text":"陳氏曰樂正子固不能無罪矣然其勇於受責如此非好善而篤信之其能若是乎","source":"맹자"},{"text":"世有強辯飾非聞諫愈甚者又樂正子之罪人也","source":"맹자"},{"text":"離婁上25章","source":"맹자"},{"text":"07-25-01 孟子謂樂正子曰子之從於子敖來徒餔啜也我不意子學古之道而以餔","source":"맹자"},{"text":"徒但也餔食也啜飮也言其不擇所從但求食耳此乃正其罪而切責之","source":"맹자"},{"text":"離婁上26章","source":"맹자"},{"text":"07-26-01 孟子曰不孝有三無後爲大","source":"맹자"},{"text":"趙氏曰於禮有不孝者三事謂阿意曲從陷親不義一也家貧親老不爲祿仕二","source":"맹자"},{"text":"也不娶無子絶先祖祀三也三者之中無後爲大","source":"맹자"},{"text":"07-26-02 舜不告而娶爲無後也君子以爲猶告也","source":"맹자"},{"text":"舜告焉則不得娶而終於無後矣告者禮也不告者權也猶告言與告同也盖","source":"맹자"},{"text":"權而得中則不離於正矣○范氏曰天下之道有正有權正者萬世之常權者","source":"맹자"},{"text":"一時之用常道人皆可守權非體道者不能用也蓋權出於不得已者也若父非","source":"맹자"},{"text":"瞽瞍子非大舜而欲不告而娶則天下之罪人也","source":"맹자"},{"text":"離婁上27章","source":"맹자"},{"text":"07-27-01 孟子曰仁之實事親是也義之實從兄是也","source":"맹자"},{"text":"仁主於愛而愛莫切於事親義主於敬而敬莫先於從兄故仁義之道其用至廣而","source":"맹자"},{"text":"其實不越於事親從兄之間蓋良心之發最爲切近而精實者有子以孝弟爲爲仁","source":"맹자"},{"text":"之本其意亦猶此也","source":"맹자"},{"text":"07-27-02 智之實知斯二者弗去是也禮之實節文斯二者是也樂之實樂斯二者樂","source":"맹자"},{"text":"則生矣生則惡可已也惡可已則不知足之蹈之手之舞之","source":"맹자"},{"text":"斯二者指事親從兄而言知而弗去則見之明而守之固矣節文謂品節文章樂則","source":"맹자"},{"text":"生矣謂和順從容無所勉強事親從兄之意油然自生如草木之有生意也旣有生","source":"맹자"},{"text":"意則其暢茂條達自有不可遏者所謂惡可已也其又盛則至於手舞足蹈而不自","source":"맹자"},{"text":"知矣○此章言事親從兄良心眞切天下之道皆原於此然必知之明而守之","source":"맹자"},{"text":"固然後節之密而樂之深也","source":"맹자"},{"text":"離婁上28章","source":"맹자"},{"text":"07-28-01 孟子曰天下大悅而將歸己視天下悅而歸己猶草芥也惟舜爲然不得","source":"맹자"},{"text":"乎親不可以爲人不順乎親不可以爲子","source":"맹자"},{"text":"言舜視天下之歸己如草芥而惟欲得其親而順之也得者曲爲承順以得其心之","source":"맹자"},{"text":"悅而已順則有以諭之於道心與之一而未始有違尤人所難也爲人蓋泛言之","source":"맹자"},{"text":"爲子則愈密矣","source":"맹자"},{"text":"07-28-02 舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之爲父","source":"맹자"},{"text":"子者定此之謂大孝","source":"맹자"},{"text":"瞽瞍舜父名底致也豫悅樂也瞽瞍至頑嘗欲殺舜至是而底豫焉書所謂不","source":"맹자"},{"text":"格姦亦允若是也蓋舜至此而有以順乎親矣是以天下之爲子者知天下無不","source":"맹자"},{"text":"可事之親顧吾所以事之者未若舜耳於是莫不勉而爲孝至於其親亦底豫焉","source":"맹자"},{"text":"則天下之爲父者亦莫不慈所謂化也子孝父慈各止其所而無不安其位之意所","source":"맹자"},{"text":"謂定也爲法於天下可傳於後世非止一身一家之孝而已此所以爲大孝也○李","source":"맹자"},{"text":"氏曰舜之所以能使瞽瞍底豫者盡事親之道共爲子職不見父母之非而已昔羅","source":"맹자"},{"text":"仲素語此云只爲天下無不是底父母了翁聞而善之曰唯如此而後天下之爲","source":"맹자"},{"text":"父子者定彼臣弑其君子弑其父者常始於見其有不是處耳","source":"맹자"},{"text":"凡三十三章","source":"맹자"},{"text":"離婁下1章","source":"맹자"},{"text":"08-01-01 孟子曰舜生於諸馮遷於負夏卒於鳴條東夷之人也","source":"맹자"},{"text":"諸馮負夏鳴條皆地名在東方夷服之地","source":"맹자"},{"text":"08-01-02 文王生於岐周卒於畢郢西夷之人也","source":"맹자"},{"text":"岐周岐山下周舊邑近畎夷畢郢近豐鎬今有文王墓","source":"맹자"},{"text":"08-01-03 地之相去也千有餘里世之相後也千有餘歲得志行乎中國若合符節","source":"맹자"},{"text":"得志行乎中國謂舜爲天子文王爲方伯得行其道於天下也符節以玉爲之篆刻","source":"맹자"},{"text":"文字而中分之彼此各藏其半有故則左右相合以爲信也若合符節言其同也","source":"맹자"},{"text":"08-01-04 先聖後聖其揆一也","source":"맹자"},{"text":"揆度也其揆一者言度之而其道無不同也○范氏曰言聖人之生雖有先後遠","source":"맹자"},{"text":"近之不同然其道則一也","source":"맹자"},{"text":"離婁下2章","source":"맹자"},{"text":"08-02-01 子産聽鄭國之政以其乘輿濟人於溱洧","source":"맹자"},{"text":"子産鄭大夫公孫僑也溱洧二水名也子産見人有徒涉此水者以其所乘之車","source":"맹자"},{"text":"08-02-02 孟子曰惠而不知爲政","source":"맹자"},{"text":"惠謂私恩小利政則有公平正大之體綱紀法度之施焉","source":"맹자"},{"text":"08-02-03 歲十一月徒杠成十二月輿梁成民未病涉也","source":"맹자"},{"text":"杠方橋也徒杠可通徒行者梁亦橋也輿粱可通車輿者周十一月夏九月也","source":"맹자"},{"text":"周十二月夏十月也夏令曰十月成梁蓋農功已畢可用民力又時將寒沍水有","source":"맹자"},{"text":"橋梁則民不患於徒涉亦王政之一事也","source":"맹자"},{"text":"08-02-04 君子平其政行辟人可也焉得人人而濟之","source":"맹자"},{"text":"辟辟除也如周禮閽人爲之辟之辟言能平其政則出行之際辟除行人使之避","source":"맹자"},{"text":"已亦不爲過況國中之水當涉者衆豈能悉以乘輿濟之哉","source":"맹자"},{"text":"08-02-05 故爲政者每人而悅之日亦不足矣","source":"맹자"},{"text":"言每人皆欲致私恩以悅其意則人多日少亦不足於用矣諸葛武侯嘗言治世以","source":"맹자"},{"text":"大德不以小惠得孟子之意矣","source":"맹자"},{"text":"離婁下3章","source":"맹자"},{"text":"08-03-01","source":"맹자"},{"text":"孟子告齊宣王曰","source":"맹자"},{"text":"君之視臣如手足","source":"맹자"},{"text":"則臣視君如腹心","source":"맹자"},{"text":"君之視臣如犬馬","source":"맹자"},{"text":"則臣視君如國人君之視臣如土芥則臣視君如寇讐","source":"맹자"},{"text":"孔氏曰宣王之遇臣下恩禮衰薄至於昔者所進今日不知其亡則其於群臣可謂","source":"맹자"},{"text":"邈然無敬矣故孟子告之以此手足腹心相待一體恩義之至也如犬馬則輕賤之","source":"맹자"},{"text":"然猶有豢養之恩焉國人猶言路人言無怨無德也土芥則踐踏之而已矣斬艾之","source":"맹자"},{"text":"而已矣其賤惡之又甚矣寇讐之報不亦宜乎","source":"맹자"},{"text":"08-03-02 王曰禮爲舊君有服何如斯可爲服矣","source":"맹자"},{"text":"儀禮曰以道去君而未絶者服齊衰三月王疑孟子之言太甚故以此禮爲問","source":"맹자"},{"text":"08-03-03 曰諫行言聽膏澤下於民有故而去則君使人導之出疆又先於其所往","source":"맹자"},{"text":"去三年不反然後收其田里此之謂三有禮焉如此則爲之服矣","source":"맹자"},{"text":"導之出疆防剽掠也先於其所往稱道其賢欲其收用之也三年而後收其田祿里","source":"맹자"},{"text":"居前此猶望其歸也","source":"맹자"},{"text":"08-03-04 今也爲臣諫則不行言則不聽膏澤不下於民有故而去則君搏執之","source":"맹자"},{"text":"又極之於其所往去之日遂收其田里此之謂寇讐寇讐何服之有","source":"맹자"},{"text":"極窮也窮之於其所往之國如晉錮欒盈也○潘興嗣曰孟子告齊王之言猶孔","source":"맹자"},{"text":"子對定公之意也而其言有迹不若孔子之渾然也蓋聖賢之別如此楊氏曰君","source":"맹자"},{"text":"臣以義合者也","source":"맹자"},{"text":"故孟子爲齊王","source":"맹자"},{"text":"深言報施之道","source":"맹자"},{"text":"使知爲君者","source":"맹자"},{"text":"不可不以禮遇其臣耳","source":"맹자"},{"text":"若君子之自處則豈處其薄乎孟子曰王庶幾改之予日望之君子之言蓋如此","source":"맹자"},{"text":"離婁下4章","source":"맹자"},{"text":"08-04-01 孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙","source":"맹자"},{"text":"言君子當見幾而作禍已迫則不能去矣","source":"맹자"},{"text":"離婁下5章","source":"맹자"},{"text":"08-05-01 孟子曰君仁莫不仁君義莫不義","source":"맹자"},{"text":"張氏曰此章重出然上篇主言人臣當以正君爲急此章直戒人君義亦小異耳","source":"맹자"},{"text":"離婁下6章","source":"맹자"},{"text":"08-06-01 孟子曰非禮之禮非義之義大人弗義","source":"맹자"},{"text":"察理不精故有二者之蔽大人則隨事而順理因時而處宜豈爲是哉","source":"맹자"},{"text":"離婁下7章","source":"맹자"},{"text":"08-07-01 孟子曰中也養不中才也養不才故人樂有賢父兄也如中也棄不中才","source":"맹자"},{"text":"也棄不才則賢不肖之相去其間不能以寸","source":"맹자"},{"text":"無過不及之謂中","source":"맹자"},{"text":"足以有爲之謂才","source":"맹자"},{"text":"養謂涵育薰陶","source":"맹자"},{"text":"俟其自化也","source":"맹자"},{"text":"賢謂中而才者也","source":"맹자"},{"text":"樂有賢父兄者","source":"맹자"},{"text":"樂其終能成己也","source":"맹자"},{"text":"若以子弟之不賢","source":"맹자"},{"text":"遂遽絶之而不能敎","source":"맹자"},{"text":"則吾亦過中而不才矣其相去之間能幾何哉","source":"맹자"},{"text":"離婁下8章","source":"맹자"},{"text":"08-08-01 孟子曰人有不爲也而後可以有爲","source":"맹자"},{"text":"程子曰有不爲知所擇也惟能有不爲是以可以有爲無所不爲者安能有所爲","source":"맹자"},{"text":"離婁下9章","source":"맹자"},{"text":"08-09-01 孟子曰言人之不善當如後患何","source":"맹자"},{"text":"此亦有爲而言","source":"맹자"},{"text":"離婁下10章","source":"맹자"},{"text":"08-10-01 孟子曰仲尼不爲已甚者","source":"맹자"},{"text":"已猶太也楊氏曰言聖人所爲本分之外不加毫末非孟子眞知孔子不能以是","source":"맹자"},{"text":"離婁下11章","source":"맹자"},{"text":"08-11-01 孟子曰大人者言不必信行不必果惟義所在","source":"맹자"},{"text":"必猶期也大人言行不先期於信果但義之所在則必從之卒亦未嘗不信果也","source":"맹자"},{"text":"○尹氏曰主於義則信果在其中矣主於信果則未必合義王勉曰若不合於義","source":"맹자"},{"text":"而不信不果則妄人爾","source":"맹자"},{"text":"離婁下12章","source":"맹자"},{"text":"08-12-01 孟子曰大人者不失其赤子之心者也","source":"맹자"},{"text":"大人之心通達萬變赤子之心則純一無僞而已然大人之所以爲大人正以其不","source":"맹자"},{"text":"爲物誘而有以全其純一無僞之本然是以擴而充之則無所不知無所不能而極","source":"맹자"},{"text":"離婁下13章","source":"맹자"},{"text":"08-13-01 孟子曰養生者不足以當大事惟送死可以當大事","source":"맹자"},{"text":"事生固當愛敬然亦人道之常耳至於送死則人道之大變孝子之事親舍是無","source":"맹자"},{"text":"以用其力矣故尤以爲大事而必誠必信不使少有後日之悔也","source":"맹자"},{"text":"離婁下14章","source":"맹자"},{"text":"08-14-01 孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資","source":"맹자"},{"text":"之深資之深則取之左右逢其原故君子欲其自得之也","source":"맹자"},{"text":"造詣也深造之者進而不已之意道則其進爲之方也資猶藉也左右身之兩旁言","source":"맹자"},{"text":"至近而非一處也","source":"맹자"},{"text":"水之來處也","source":"맹자"},{"text":"言君子務於深造而必以其道者","source":"맹자"},{"text":"欲其有所持循以俟夫黙識心通自然而得之於己也自得於己則所以處之者安固","source":"맹자"},{"text":"而不搖處之安固則所藉者深遠而無盡所藉者深則日用之間取之至近無所往","source":"맹자"},{"text":"而不値其所資之本也○程子曰學不言而自得者乃自得也有安排布置者皆非","source":"맹자"},{"text":"自得也然必潛心積慮優游厭飫於其間然後可以有得若急迫求之則是私己而","source":"맹자"},{"text":"已終不足以得之也","source":"맹자"},{"text":"離婁下15章","source":"맹자"},{"text":"08-15-01 孟子曰博學而詳說之將以反說約也","source":"맹자"},{"text":"言所以博學於文而詳說其理者","source":"맹자"},{"text":"非欲以誇多而鬪靡也","source":"맹자"},{"text":"欲其融會貫通","source":"맹자"},{"text":"有以反而說","source":"맹자"},{"text":"到至約之地耳承上章之意而言學非欲其徒博而亦不可以徑約也","source":"맹자"},{"text":"離婁下16章","source":"맹자"},{"text":"08-16-01 孟子曰以善服人者未有能服人者也以善養人然後能服天下天下不","source":"맹자"},{"text":"心服而王者未之有也","source":"맹자"},{"text":"服人者欲以取勝於人養人者欲其同歸於善盖心之公私小異而人之嚮背頓殊","source":"맹자"},{"text":"學者於此不可以不審也","source":"맹자"},{"text":"離婁下17章","source":"맹자"},{"text":"08-17-01 孟子曰言無實不祥不祥之實蔽賢者當之","source":"맹자"},{"text":"或曰天下之言無有實不詳者惟蔽賢爲不詳之實或曰言而無實者不詳故蔽","source":"맹자"},{"text":"賢爲不祥之實二說不同未知孰是疑或有闕文焉","source":"맹자"},{"text":"離婁下18章","source":"맹자"},{"text":"08-18-01 徐子曰仲尼亟稱於水曰水哉水哉何取於水也","source":"맹자"},{"text":"亟數也水哉水哉歎美之辭","source":"맹자"},{"text":"08-18-02 孟子曰原泉混混不舍晝夜盈科而後進放乎四海有本者如是是之","source":"맹자"},{"text":"原泉有原之水也混混涌出之貌不舍晝夜言常出不竭也盈滿也科坎也言","source":"맹자"},{"text":"其進以漸也放至也言水有原本不已而漸進以至于海如人有實行則亦不已","source":"맹자"},{"text":"而漸進以至于極也","source":"맹자"},{"text":"08-18-03 苟爲無本七八月之間雨集溝澮皆盈其涸也可立而待也故聲聞過情","source":"맹자"},{"text":"集聚也澮田間水道也涸乾也如人無實行而暴得虛譽不能長久也聲聞名譽","source":"맹자"},{"text":"也情實也恥者恥其無實而將不繼也林氏曰徐子之爲人必有躐等干譽之病","source":"맹자"},{"text":"故孟子以是答之○鄒氏曰孔子之稱水其旨微矣孟子獨取此者自徐子之所","source":"맹자"},{"text":"急者言之也孔子嘗以聞達告子張矣達者有本之謂也聞則無本之謂也然則","source":"맹자"},{"text":"學者其可以務本乎","source":"맹자"},{"text":"離婁下19章","source":"맹자"},{"text":"08-19-01 孟子曰人之所以異於禽獸者幾希庶民去之君子存之","source":"맹자"},{"text":"幾希少也庶衆也人物之生同得天地之理以爲性同得天地之氣以爲形其","source":"맹자"},{"text":"不同者獨人於其間得形氣之正而能有以全其性爲少異耳雖曰少異然人物之","source":"맹자"},{"text":"所以分實在於此衆人不知此而去之則名雖爲人而實無以異於禽獸君子知","source":"맹자"},{"text":"此而存之是以戰兢惕厲而卒能有以全其所受之正也","source":"맹자"},{"text":"08-19-02 舜明於庶物察於人倫由仁義行非行仁義也","source":"맹자"},{"text":"物事物也明則有以識其理也人倫說見前篇察則有以盡其理之詳也物理固非","source":"맹자"},{"text":"度外而人倫尤切於身故其知之有詳畧之異在舜則皆生而知之也由仁義行","source":"맹자"},{"text":"非行仁義則仁義已根於心而所行皆從此出非以仁義爲美而後勉強行之所謂","source":"맹자"},{"text":"安而行之也此則聖人之事不待存之而無不存矣○尹氏曰存之者君子也存","source":"맹자"},{"text":"者聖人也君子所存存天理也由仁義行存者能之","source":"맹자"},{"text":"離婁下20章","source":"맹자"},{"text":"08-20-01 孟子曰禹惡旨酒而好善言","source":"맹자"},{"text":"戰國策曰儀狄作酒禹飮而甘之曰後世必有以酒亡其國者遂疏儀狄而絶旨","source":"맹자"},{"text":"酒書曰禹拜昌言","source":"맹자"},{"text":"08-20-02 湯執中立賢無方","source":"맹자"},{"text":"執謂守而不失中者無過不及之名方猶類也立賢無方惟賢則立之於位不問","source":"맹자"},{"text":"08-20-03 文王視民如傷望道而未之見","source":"맹자"},{"text":"民已安矣而視之猶若有傷道已至矣而望之猶若未見聖人之愛民深而求道","source":"맹자"},{"text":"切如此不自滿足終日乾乾之心也","source":"맹자"},{"text":"08-20-04 武王不泄邇不忘遠","source":"맹자"},{"text":"泄狎也邇者人所易狎而不泄遠者人所易忘而不忘德之盛仁之至也","source":"맹자"},{"text":"08-20-05 周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之","source":"맹자"},{"text":"三王禹也湯也文武也四事上四條之事也時異勢殊故其事或有所不合思而","source":"맹자"},{"text":"得之則其理初不異矣坐以待旦急於行也○此承上章言舜因歷叙群聖以繼","source":"맹자"},{"text":"之而各擧其一事而見其憂勤惕厲之意蓋天理之所以常存而人心之所以不死也","source":"맹자"},{"text":"程子曰孟子所稱各因其一事而言非謂武王不能執中立賢湯却泄邇忘遠也","source":"맹자"},{"text":"人謂各擧其盛亦非也聖人亦無不盛","source":"맹자"},{"text":"離婁下21章","source":"맹자"},{"text":"08-21-01 孟子曰王者之跡熄而詩亡詩亡然後春秋作","source":"맹자"},{"text":"王者之跡熄謂平王東遷而政敎號令不及於天下也詩亡謂黍離降爲國風而雅","source":"맹자"},{"text":"亡也春秋魯史記之名孔子因而筆削之始於魯隱公之元年實平王之四十九年","source":"맹자"},{"text":"08-21-02 晉之乘楚之檮杌魯之春秋一也","source":"맹자"},{"text":"乘義未詳趙氏以爲興於田賦乘馬之事或曰取記載當時行事而名之也檮杌","source":"맹자"},{"text":"惡獸名古者因以爲凶人之號取記惡垂戒之義也春秋者記事者必表年以首","source":"맹자"},{"text":"事年有四時故錯擧以爲所記之名也古者列國皆有史官掌記時事此三者皆其","source":"맹자"},{"text":"所記冊書之名也","source":"맹자"},{"text":"08-21-03 其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣","source":"맹자"},{"text":"春秋之時五霸迭興而桓文爲盛史史官也竊取者謙辭也公羊傳作其辭則丘","source":"맹자"},{"text":"有罪焉爾意亦如此蓋言斷之在己所謂筆則筆削則削游夏不能贊一辭者也","source":"맹자"},{"text":"尹氏曰言孔子作春秋亦以史之文載當時之事也而其義則定天下之邪正爲百","source":"맹자"},{"text":"王之大法○此又承上章歷叙群聖因以孔子之事繼之而孔子之事莫大於春","source":"맹자"},{"text":"秋故特言之","source":"맹자"},{"text":"離婁下22章","source":"맹자"},{"text":"08-22-01 孟子曰君子之澤五世而斬小人之澤五世而斬","source":"맹자"},{"text":"澤猶言流風餘韻也父子相繼爲一世三十年亦爲一世斬絶也大約君子小人","source":"맹자"},{"text":"之澤五世而絶也楊氏曰四世而緦服之窮也五世袒免殺同姓也六世親屬竭","source":"맹자"},{"text":"矣服窮則遺澤寖微故五世而斬","source":"맹자"},{"text":"08-22-02 予未得爲孔子徒也予私淑諸人也","source":"맹자"},{"text":"私猶竊也淑善也李氏以爲方言是也人爲子思之徒也自孔子卒至孟子遊","source":"맹자"},{"text":"梁時方百四十餘年而孟子已老然則孟子之生去孔子未百年也故孟子言予","source":"맹자"},{"text":"雖未得親受業於孔子之門然聖人之澤尙存猶有能傳其學者故我得聞孔子之道","source":"맹자"},{"text":"於人而私竊以善其身蓋推尊孔子而自謙之辭也○此又承上三章歷叙舜禹","source":"맹자"},{"text":"至於周孔而以是終之其辭雖謙然其所以自任之重亦有不得而辭者矣","source":"맹자"},{"text":"離婁下23章","source":"맹자"},{"text":"08-23-01 孟子曰可以取可以無取取傷廉可以與可以無與與傷惠可以死","source":"맹자"},{"text":"可以無死死傷勇","source":"맹자"},{"text":"先言可以者略見而自許之辭也後言可以無者深察而自疑之辭也過取固害於","source":"맹자"},{"text":"廉然過與亦反害其惠過死亦反害其勇蓋過猶不及之意也林氏曰公西華受","source":"맹자"},{"text":"五秉之粟是傷廉也冉子與之是傷惠也子路之死於衛是傷勇也","source":"맹자"},{"text":"離婁下24章","source":"맹자"},{"text":"08-24-01 逄蒙學射於羿盡羿之道思天下惟羿爲愈己於是殺羿孟子曰是亦","source":"맹자"},{"text":"羿有罪焉公明儀曰宜若無罪焉曰薄乎云爾惡得無罪","source":"맹자"},{"text":"羿有窮后羿也逄蒙羿之家衆也羿善射簒夏自立後爲家衆所殺愈猶勝也","source":"맹자"},{"text":"薄言其罪差薄耳","source":"맹자"},{"text":"08-24-02 鄭人使子濯孺子侵衛衛使庾公之斯追之子濯孺子曰今日我疾作不","source":"맹자"},{"text":"可以執弓吾死矣夫問其僕曰追我者誰也其僕曰庾公之斯也曰吾生矣其僕曰","source":"맹자"},{"text":"庾公之斯衛之善射者也夫子曰吾生何謂也曰庾公之斯學射於尹公之他尹公","source":"맹자"},{"text":"之他學射於我夫尹公之他端人也其取友必端矣庾公之斯至曰夫子何爲不執","source":"맹자"},{"text":"弓曰今日我疾作不可以執弓曰小人學射於尹公之他尹公之他學射於夫子我","source":"맹자"},{"text":"不忍以夫子之道反害夫子雖然今日之事君事也我不敢廢抽矢扣輪去其金發","source":"맹자"},{"text":"乘矢而後反","source":"맹자"},{"text":"之語助也僕御也尹公他亦衛人也端正也孺子以尹公正人知其取友必","source":"맹자"},{"text":"正故度庾公必不害己小人庾公自稱也金鏃也扣輪出鏃令不害人乃以射也","source":"맹자"},{"text":"乘矢四矢也孟子言使羿如子濯孺子得尹公他而敎之則必無逄蒙之禍然夷","source":"맹자"},{"text":"羿簒弑之賊蒙乃逆儔庾斯雖全私恩亦廢公義其事皆無足論者孟子蓋特以","source":"맹자"},{"text":"取友而言耳","source":"맹자"},{"text":"離婁下25章","source":"맹자"},{"text":"08-25-01 孟子曰西子蒙不潔則人皆掩鼻而過之","source":"맹자"},{"text":"西子美婦人蒙猶冒也不潔汚穢之物也掩鼻惡其臭也","source":"맹자"},{"text":"08-25-02 雖有惡人齊戒沐浴則可以祀上帝","source":"맹자"},{"text":"惡人醜貌者也○尹氏曰此章戒人之喪善而勉人以自新也","source":"맹자"},{"text":"離婁下26章","source":"맹자"},{"text":"08-26-01 孟子曰天下之言性也則故而已矣故者以利爲本","source":"맹자"},{"text":"性者人物所得以生之理也故者其已然之跡若所謂天下之故者也利猶順也","source":"맹자"},{"text":"語其自然之勢也言事物之理雖若無形而難知然其發見之已然則必有跡而易","source":"맹자"},{"text":"見故天下之言性者但言其故而理自明猶所謂善言天者必有驗於人也然其","source":"맹자"},{"text":"所謂故者又必本其自然之勢如人之善水之下非有所矯揉造作而然者也若人","source":"맹자"},{"text":"之爲惡水之在山則非自然之故矣","source":"맹자"},{"text":"08-26-02 所惡於智者爲其鑿也如智者若禹之行水也則無惡於智矣禹之行水","source":"맹자"},{"text":"也行其所無事如智者亦行其所無事則智亦大矣","source":"맹자"},{"text":"天下之理本皆利順小智之人務爲穿鑿所以失之禹之行水則因其自然之勢","source":"맹자"},{"text":"而導之未嘗以私智穿鑿而有所事是以水得其潤下之性而不爲害也","source":"맹자"},{"text":"08-26-03 天之高也星辰之遠也苟求其故千歲之日至可坐而致也","source":"맹자"},{"text":"天雖高星辰雖遠然求其已然之跡則其運有常雖千歲之久其日至之度可坐","source":"맹자"},{"text":"而得況於事物之近若因其故而求之豈有不得其理者而何以穿鑿爲哉必言日","source":"맹자"},{"text":"至者造歷者以上古十一月甲子朔夜半冬至爲歷元也○程子曰此章專爲智","source":"맹자"},{"text":"而發愚謂事物之理莫非自然順而循之則爲大智若用小智而鑿以自私則害","source":"맹자"},{"text":"於性而反爲不智程子之言可謂深得此章之旨矣","source":"맹자"},{"text":"離婁下27章","source":"맹자"},{"text":"08-27-01 公行子有子之喪右師往弔入門有進而與右師言者有就右師之位而","source":"맹자"},{"text":"與右師言者","source":"맹자"},{"text":"公行子齊大夫右師王驩也","source":"맹자"},{"text":"08-27-02 孟子不與右師言右師不悅曰諸君子皆與驩言孟子獨不與驩言是簡","source":"맹자"},{"text":"08-27-03 孟子聞之曰禮朝廷不歷位而相與言不踰階而相揖也我欲行禮子敖","source":"맹자"},{"text":"以我爲簡不亦異乎","source":"맹자"},{"text":"是時齊卿大夫以君命弔各有位次若周禮凡有爵者之喪禮則職喪莅其禁令","source":"맹자"},{"text":"序其事故云朝廷也歷更涉也位他人之位也右師未就位而進與之言則右師","source":"맹자"},{"text":"歷己之位矣右師已就位而就與之言則己歷右師之位矣孟子右師之位又不同","source":"맹자"},{"text":"階孟子不敢失此禮故不與右師言也","source":"맹자"},{"text":"離婁下28章","source":"맹자"},{"text":"08-28-01 孟子曰君子所以異於人者以其存心也君子以仁存心以禮存心","source":"맹자"},{"text":"以仁禮存心言以是存於心而不忘也","source":"맹자"},{"text":"08-28-02 仁者愛人有禮者敬人","source":"맹자"},{"text":"此仁禮之施","source":"맹자"},{"text":"08-28-03 愛人者人恒愛之敬人者人恒敬之","source":"맹자"},{"text":"此仁禮之驗","source":"맹자"},{"text":"08-28-04 有人於此其待我以橫逆則君子必自反也我必不仁也必無禮也此物","source":"맹자"},{"text":"橫逆謂強暴不順理也物事也","source":"맹자"},{"text":"08-28-05 其自反而仁矣自反而有禮矣其橫逆由是也君子必自反也我必不忠","source":"맹자"},{"text":"忠者盡己之謂我必不忠恐所以愛敬人者有所不盡其心也","source":"맹자"},{"text":"08-28-06 自反而忠矣其橫逆由是也君子曰此亦妄人也已矣如此則與禽獸奚","source":"맹자"},{"text":"擇哉於禽獸又何難焉","source":"맹자"},{"text":"奚擇何異也又何難焉言不足與之校也","source":"맹자"},{"text":"08-28-07 是故君子有終身之憂無一朝之患也乃若所憂則有之舜人也我亦人","source":"맹자"},{"text":"也舜爲法於天下可傳於後世我由未免爲鄕人也是則可憂也憂之如何如舜而","source":"맹자"},{"text":"已矣若夫君子所患則亡矣非仁無爲也非禮無行也如有一朝之患則君子不患","source":"맹자"},{"text":"鄕人鄕里之常人也君子存心不苟故無後憂","source":"맹자"},{"text":"離婁下29章","source":"맹자"},{"text":"08-29-01 禹稷當平世三過其門而不入孔子賢之","source":"맹자"},{"text":"08-29-02 顔子當亂世居於陋巷一簞食一瓢飮人不堪其憂顔子不改其樂孔","source":"맹자"},{"text":"08-29-03 孟子曰禹稷顔回同道","source":"맹자"},{"text":"聖賢之道進則救民退則修己其心一而已矣","source":"맹자"},{"text":"08-29-04 禹思天下有溺者由己溺之也稷思天下有餓者由己餓之也是以如是","source":"맹자"},{"text":"禹稷身任其職故以爲己責而救之急也","source":"맹자"},{"text":"08-29-05 禹稷顔子易地則皆然","source":"맹자"},{"text":"聖賢之心無所偏倚隨感而應各盡其道故使禹稷居顔子之地則亦能樂顔子","source":"맹자"},{"text":"之樂使顔子居禹稷之任亦能憂禹稷之憂也","source":"맹자"},{"text":"08-29-06 今有同室之人鬪者救之雖被髮纓冠而救之可也","source":"맹자"},{"text":"不暇束髮而結纓往救言急也以喩禹稷","source":"맹자"},{"text":"08-29-07 鄕鄰有鬪者被髮纓冠而往救之則惑也雖閉戶可也","source":"맹자"},{"text":"喩顔子也○此章言聖賢心無不同事則所遭或異然處之各當其理是乃所","source":"맹자"},{"text":"以爲同也尹氏曰當其可之謂時前聖後聖其心一也故所遇皆盡善","source":"맹자"},{"text":"離婁下30章","source":"맹자"},{"text":"08-30-01 公都子曰匡章通國皆稱不孝焉夫子與之遊又從而禮貌之敢問何也","source":"맹자"},{"text":"匡章齊人通國盡一國之人也禮貌敬之也","source":"맹자"},{"text":"08-30-02 孟子曰世俗所謂不孝者五惰其四肢不顧父母之養一不孝也博奕好","source":"맹자"},{"text":"飮酒不顧父母之養二不孝也好貨財私妻子不顧父母之養三不孝也從耳目之","source":"맹자"},{"text":"欲以爲父母戮四不孝也好勇鬪狼以危父母五不孝也章子有一於是乎","source":"맹자"},{"text":"戮羞辱也狠忿戾也","source":"맹자"},{"text":"08-30-03 夫章子子父責善而不相遇也","source":"맹자"},{"text":"遇合也相責以善而不相合故爲父所逐也","source":"맹자"},{"text":"08-30-04 責善朋友之道也父子責善賊恩之大者","source":"맹자"},{"text":"賊害也朋友當相責以善父子行之則害天性之恩也","source":"맹자"},{"text":"08-30-05 夫章子豈不欲有夫妻子母之屬哉爲得罪於父不得近出妻屛子終身","source":"맹자"},{"text":"不養焉其設心以爲不若是是則罪之大者是則章子已矣","source":"맹자"},{"text":"言章子非不欲身有夫妻之配子有子母之屬但爲身不得根於父故不敢受妻子之","source":"맹자"},{"text":"養以自責罰其心以爲不如此則其罪益大也○此章之旨於衆所惡而必察焉","source":"맹자"},{"text":"可以見聖賢至公至仁之心矣○楊氏曰章子之行孟子非取之也特哀其志而","source":"맹자"},{"text":"不與之絶耳","source":"맹자"},{"text":"離婁下31章","source":"맹자"},{"text":"08-31-01 曾子居武城有越寇或曰寇至盍去諸曰無寓人於我室毀傷其薪木","source":"맹자"},{"text":"寇退則曰修我牆屋我將反寇退曾子反左右曰待先生如此其忠且敬也寇至","source":"맹자"},{"text":"則先去以爲民望寇退則反殆於不可沈猶行曰是非汝所知也昔沈猶有負芻之","source":"맹자"},{"text":"禍從先生者七十人未有與焉","source":"맹자"},{"text":"武城魯邑名盍何不也左右曾子之門人也忠敬言武城之大夫事曾子忠誠恭","source":"맹자"},{"text":"敬也爲民望言使民望而效之沈猶行弟子姓名也言曾子嘗舍於沈猶氏時有負","source":"맹자"},{"text":"芻者作亂來攻沈猶氏曾子率其弟子去之不與其難言師賓不與臣同","source":"맹자"},{"text":"08-31-02 子思居於衛有齊寇或曰寇至盍去諸子思曰如伋去君誰與守","source":"맹자"},{"text":"言所以不去之意如此","source":"맹자"},{"text":"08-31-03 孟子曰曾子子思同道曾子師也父兄也子思臣也微也曾子子思易地","source":"맹자"},{"text":"微猶賤也尹氏曰或遠害或死難其事不同者所處之地不同也君子之心不","source":"맹자"},{"text":"繫於利害惟其是而已故易地則皆能爲之○孔氏曰古之聖賢言行不同事業","source":"맹자"},{"text":"亦異而其道未始不同也學者知此則因所遇而應之若權衡之稱物低昻屢變","source":"맹자"},{"text":"而不害其爲同也","source":"맹자"},{"text":"離婁下32章","source":"맹자"},{"text":"08-32-01 儲子曰王使人瞷夫子果有以異於人乎孟子曰何以異於人哉堯舜與","source":"맹자"},{"text":"儲子齊人也瞷 竊視也聖人亦人耳豈有異於人哉","source":"맹자"},{"text":"離婁下33章","source":"맹자"},{"text":"08-33-01 齊人有一妻一妾而處室者其良人出則必饜酒肉而後反其妻問所與飮","source":"맹자"},{"text":"食者則盡富貴也其妻告其妾曰良人出則必饜酒肉而後反問其與飮食者盡富貴","source":"맹자"},{"text":"也而未嘗有顯者來吾將瞷良人之所之也蚤起施從良人之所之徧國中無與立","source":"맹자"},{"text":"談者卒之東郭墦間之祭者乞其餘不足又顧而之他此其爲饜足之道也其妻歸","source":"맹자"},{"text":"告其妾曰良人","source":"맹자"},{"text":"者所仰望而終身也今若此與其妾訕其良人而相泣於中庭而良人未之知也施施","source":"맹자"},{"text":"從外來驕其妻妾","source":"맹자"},{"text":"章首當有孟子曰字闕文也良人夫也饜飽也顯者富貴人也施邪施而行不","source":"맹자"},{"text":"使良人知也墦冢也顧望也訕怨詈也施施喜悅自得之貌","source":"맹자"},{"text":"08-33-02 由君子觀之則人之所以求富貴利達者其妻妾不羞也而不相泣者幾希","source":"맹자"},{"text":"孟子言自君子而觀今之求富貴者皆若此人耳使其妻妾見之不羞而泣者少矣","source":"맹자"},{"text":"言可羞之甚也○趙氏曰言今之求富貴者皆以枉曲之道昏夜乞哀以求之而以","source":"맹자"},{"text":"驕人於白日與斯人何以異哉","source":"맹자"},{"text":"萬章上1章","source":"맹자"},{"text":"09-01-01 萬章問曰舜往于田號泣于旻天何爲其號泣也孟子曰怨慕也","source":"맹자"},{"text":"舜往于田耕歷山時也仁覆閔下謂之昊天號泣于昊天呼天而泣也事見虞書大","source":"맹자"},{"text":"禹謨篇怨慕怨己之不得其親而思慕也","source":"맹자"},{"text":"09-01-02 萬章曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎曰長息","source":"맹자"},{"text":"問於公明高曰舜往于田則吾旣得聞命矣號泣于旻天于父母則吾不知也公明高","source":"맹자"},{"text":"曰是非爾所知也夫公明高以孝子之心爲不若是恝我竭力耕田共爲子職而已","source":"맹자"},{"text":"矣父母之不我愛於我何哉","source":"맹자"},{"text":"長息公明高弟子公明高曾子弟子于父母亦書辭言呼父母而泣也恝無愁之貌","source":"맹자"},{"text":"於我何哉自責不知己有何罪耳非怨父母也楊氏曰非孟子深知舜之心不能爲","source":"맹자"},{"text":"此言蓋舜惟恐不順於父母未嘗自以爲孝也若自以爲孝則非孝矣","source":"맹자"},{"text":"09-01-03 帝使其子九男二女百官牛羊倉廩備以事舜於畎畝之中天下之士多","source":"맹자"},{"text":"就之者帝將胥天下而遷之焉爲不順於父母如窮人無所歸","source":"맹자"},{"text":"帝堯也史記云二女妻之以觀其內九男事之以觀其外又言一年所居成聚二","source":"맹자"},{"text":"年成邑三年成都是天下之士就之也胥相視也遷之移以與之也如窮人之無所","source":"맹자"},{"text":"歸言其怨慕迫切之甚也","source":"맹자"},{"text":"09-01-04 天下之士悅之人之所欲也而不足以解憂好色人之所欲妻帝之二女","source":"맹자"},{"text":"而不足以解憂富人之所欲富有天下而不足以解憂貴人之所欲貴爲天子而不","source":"맹자"},{"text":"足而解憂人悅之好色富貴無足以解憂者惟順於父母可以解憂","source":"맹자"},{"text":"孟子推舜之心如此以解上文之意極天下之欲不足以解憂而惟順於父母可以","source":"맹자"},{"text":"解憂孟子眞知舜之心哉","source":"맹자"},{"text":"09-01-05 人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君","source":"맹자"},{"text":"則熱中大孝終身慕父母五十而慕者予於大舜見之矣","source":"맹자"},{"text":"言常人之情因物有遷惟聖人爲能不失其本心也艾美好也楚辭戰國策所謂幼","source":"맹자"},{"text":"艾義與此同不得失意也熱中躁急心熱也言五十者舜攝政時年五十也五十而","source":"맹자"},{"text":"慕則其終身慕可知矣○此章言舜不以得衆人之所欲爲己樂而以不順乎親","source":"맹자"},{"text":"之心爲己憂非聖人之盡性其孰能之","source":"맹자"},{"text":"萬章上2章","source":"맹자"},{"text":"09-02-01 萬章問曰詩云娶妻如之何必告父母信斯言也宜莫如舜舜之不告而","source":"맹자"},{"text":"娶何也孟子曰告則不得娶男女居室人之大倫也如告則廢人之大倫以懟父","source":"맹자"},{"text":"母是以不告也","source":"맹자"},{"text":"詩齊國風南山之篇也信誠也誠如此詩之言也懟讎怨也舜父頑母嚚常欲害舜","source":"맹자"},{"text":"告則不聽其娶是廢人之大倫以讎怨於父母也","source":"맹자"},{"text":"09-02-02 萬章曰舜之不告而娶則吾旣得聞命矣帝之妻舜而不告何也曰帝亦","source":"맹자"},{"text":"知告焉則不得妻也","source":"맹자"},{"text":"以女爲人妻曰妻程子曰堯妻舜而不告者以君治之而已如今之官府治民之私","source":"맹자"},{"text":"09-02-03 萬章曰父母使舜完廩捐階瞽瞍焚廩使浚井出從而揜之象曰謨蓋","source":"맹자"},{"text":"都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象往入舜","source":"맹자"},{"text":"宮舜在牀琴象曰鬱陶思君爾忸怩舜曰惟玆臣庶汝其于予治不識舜不知象","source":"맹자"},{"text":"之將殺己與曰奚而不知也象憂亦憂象喜亦喜","source":"맹자"},{"text":"完治也捐去也階梯也揜蓋也按史記曰使舜上塗廩瞽瞍從下縱火焚廩舜乃","source":"맹자"},{"text":"以兩笠自捍而下去得不死後又使舜穿井舜穿井爲匿空旁出舜旣入深瞽瞍","source":"맹자"},{"text":"與象共下土實井舜從匿空中出去卽其事也象舜異母弟也謨謀也蓋蓋井也","source":"맹자"},{"text":"舜所居三年成都故謂之都君咸皆也績功也舜旣入井象不知舜已出欲以殺舜","source":"맹자"},{"text":"爲己功也干盾也戈戟也琴舜所彈五弦琴也弤琱弓也象欲以舜之牛羊倉廩與","source":"맹자"},{"text":"父母而自取此物也二嫂堯二女也棲牀也象欲使爲己妻也象往舜宮欲分取所","source":"맹자"},{"text":"有見舜生在牀彈琴蓋旣出卽潛歸其宮也鬱陶思之甚而氣不得伸也象言己","source":"맹자"},{"text":"思君之甚故來見耳忸怩慙色也臣庶謂其百官也象素憎舜不至其宮故舜見其","source":"맹자"},{"text":"使之治其臣庶也","source":"맹
