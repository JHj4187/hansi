논어"},{"text":"息而贊美之也泰伯不從事見春秋傳","source":"논어"},{"text":"08-02-01 子曰恭而無禮則勞愼而無禮則葸勇而無禮則亂直而無禮則絞","source":"논어"},{"text":"葸畏懼貌絞急切也無禮則無節文故有四者之弊","source":"논어"},{"text":"08-02-02 君子篤於親則民興於仁故舊不遺則民不偸","source":"논어"},{"text":"君子謂在上之人也興起也偸薄也○張子曰人道知所先後則恭不勞愼","source":"논어"},{"text":"不葸勇不亂直不絞民化而德厚矣○吳氏曰君子以下當自爲一章乃曾子之","source":"논어"},{"text":"言也愚按此一節與上文不相蒙而與首篇謹終追遠之意相類吳說近是","source":"논어"},{"text":"08-03-01 曾子有疾召門弟子曰啓予足啓予手詩云戰戰兢兢如臨深淵如履","source":"논어"},{"text":"薄氷而今而後吾知免夫小子","source":"논어"},{"text":"啓開也曾子平日以爲身體受於父母不敢毁傷故於此使弟子開其衾而視之","source":"논어"},{"text":"詩小旻之篇戰戰恐懼兢兢戒謹臨淵恐墜履氷恐陷也曾子以其所保之全","source":"논어"},{"text":"示門人而言其所以保之之難如此至於將死而後知其得免於毁傷也小子門人","source":"논어"},{"text":"也語畢而又呼之以致反復丁寧之意其警之也深矣○程子曰君子曰終小人","source":"논어"},{"text":"曰死君子保其身以沒爲終其事也故曾子以全歸爲免矣尹氏曰父母全而生之","source":"논어"},{"text":"子全而歸之曾子臨終而啓手足爲是故也非有得於道能如是乎范氏曰身體","source":"논어"},{"text":"猶不可虧也況虧其行以辱其親乎","source":"논어"},{"text":"08-04-01 曾子有疾孟敬子問之","source":"논어"},{"text":"孟敬子魯大夫仲孫氏名捷問之者問其疾也","source":"논어"},{"text":"08-04-02 曾子言曰鳥之將死其鳴也哀人之將死其言也善","source":"논어"},{"text":"言自言也鳥畏死故鳴哀人窮反本故言善此曾子謙辭欲敬子知其所言之","source":"논어"},{"text":"善而識之也","source":"논어"},{"text":"08-04-03 君子所貴乎道者三動容貌斯遠暴慢矣正顔色斯近信矣出辭氣斯","source":"논어"},{"text":"遠鄙倍矣籩豆之事則有司存","source":"논어"},{"text":"貴猶重也容貌擧一身而言暴粗厲慢放肆也信實也正顔色而近信則非","source":"논어"},{"text":"色莊也辭言語氣聲氣也鄙凡陋也倍與背同謂背理也籩竹豆豆木豆","source":"논어"},{"text":"言道雖無所不在然君子所重者在此三事而已是皆脩身之要爲政之本學者所","source":"논어"},{"text":"當操存省察而不可有造次顚沛之違者也若夫籩豆之事器數之末道之全體固無","source":"논어"},{"text":"不該然其分則有司之守而非君子之所重矣程子曰動容貌擧一身而言也周","source":"논어"},{"text":"旋中禮暴慢斯遠矣正顔色則不妄斯近信矣出辭氣正由中出斯遠鄙倍三者","source":"논어"},{"text":"正身而不外求故曰籩豆之事則有司存尹氏曰養於中則見於外曾子蓋以修己","source":"논어"},{"text":"爲爲政之本若乃器用事物之細則有司存焉","source":"논어"},{"text":"08-05-01 曾子曰以能問於不能以多問於寡有若無實若虛犯而不校昔者吾","source":"논어"},{"text":"友嘗從事於斯矣","source":"논어"},{"text":"校計校也友馬氏以爲顔淵是也顔子之心惟知義理之無窮不見物我之有間","source":"논어"},{"text":"故能如此○謝氏曰不知有餘在己不足在人不必得爲在己失爲在人非幾於","source":"논어"},{"text":"無我者不能也","source":"논어"},{"text":"08-06-01 曾子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人","source":"논어"},{"text":"與君子人也","source":"논어"},{"text":"其才可以轉幼君攝國政其節至於死生之際而不可奪可謂君子矣與疑辭也","source":"논어"},{"text":"決辭設爲問答所以深著其必然也○程子曰節操如是可謂君子矣","source":"논어"},{"text":"08-07-01 曾子曰士不可以不弘毅任重而道遠","source":"논어"},{"text":"弘寬廣也毅强忍也非弘不能勝其重非毅無以致其遠","source":"논어"},{"text":"08-07-02 仁以爲己任不亦重乎死而後已不亦遠乎","source":"논어"},{"text":"仁者人心之全德而必欲以身體而力行之可謂重矣一息尙存此志不容少懈可","source":"논어"},{"text":"謂遠矣○程子曰弘而不毅則無規矩而難立毅而不弘則隘陋而無以居之又","source":"논어"},{"text":"曰弘大剛毅然後能勝重任而遠到","source":"논어"},{"text":"08-08-01 子曰興於詩","source":"논어"},{"text":"興起也詩本性情有邪有正其爲言旣易知而吟詠之間抑揚反覆其感人又","source":"논어"},{"text":"易入故學者之初所以興起其好善惡惡之心而不能自已者必於此而得之","source":"논어"},{"text":"08-08-02 立於禮","source":"논어"},{"text":"禮以恭敬辭遜爲本而有節文度數之詳可以固人肌膚之會筋骸之束故學者之","source":"논어"},{"text":"中所以能卓然自立而不爲事物之所搖奪者必於此而得之","source":"논어"},{"text":"08-08-03 成於樂","source":"논어"},{"text":"樂有五聲十二律","source":"논어"},{"text":"以爲歌舞八音之節","source":"논어"},{"text":"可以養人之性情","source":"논어"},{"text":"而蕩滌其邪穢","source":"논어"},{"text":"消融其査滓","source":"논어"},{"text":"所以至於義精仁熟而自和順於道德者","source":"논어"},{"text":"必於此而得之","source":"논어"},{"text":"是學之成也○按內則十歲學幼儀十三學樂誦詩二十而後學禮則此三者","source":"논어"},{"text":"非小學傳授之次乃大學終身所得之難易先後淺深也程子曰天下之英才不爲少","source":"논어"},{"text":"矣特以道學不明故不得有所成就夫古人之詩如今之歌曲雖閭里童稚皆習","source":"논어"},{"text":"聞之而知其說故能興起今雖老師宿儒尙不能曉其義況學者乎是不得興於","source":"논어"},{"text":"詩也古人自灑掃應對以至冠婚喪祭莫不有禮今皆廢壞是以人倫不明治家","source":"논어"},{"text":"無法是不得立於禮也古人之樂聲音所以養其耳采色所以養其目歌詠所以養","source":"논어"},{"text":"其性情舞蹈所以養其血脈今皆無之是不得成於樂也是以古之成材也易今","source":"논어"},{"text":"之成材也難","source":"논어"},{"text":"08-09-01 子曰民可使由之不可使知之","source":"논어"},{"text":"民可使之由於是理之當然而不能使之知其所以然也○程子曰聖人設敎非不","source":"논어"},{"text":"欲人家喩而戶曉也然不能使之知但能使之由之爾若曰聖人不使民知則是後","source":"논어"},{"text":"世朝四暮三之術也豈聖人之心乎","source":"논어"},{"text":"泰伯10章","source":"논어"},{"text":"08-10-01 子曰好勇疾貧亂也人而不仁疾之已甚亂也","source":"논어"},{"text":"好勇而不安分則必作亂惡不仁之人而使之無所容則必致亂二者之心善惡雖","source":"논어"},{"text":"殊然其生亂則一也","source":"논어"},{"text":"泰伯11章","source":"논어"},{"text":"08-11-01 子曰如有周公之才之美使驕且吝其餘不足觀也已","source":"논어"},{"text":"才美謂智能技藝之美驕矜夸吝鄙嗇也○程子曰此甚言驕吝之不可也蓋","source":"논어"},{"text":"有周公之德則自無驕吝若但有周公之才而驕吝焉亦不足觀矣又曰驕氣盈","source":"논어"},{"text":"吝氣歉愚謂驕吝雖有盈歉之殊然其勢常相因蓋驕者吝之枝葉吝者驕之","source":"논어"},{"text":"本根故嘗驗之天下之人未有驕而不吝吝而不驕者也","source":"논어"},{"text":"泰伯12章","source":"논어"},{"text":"08-12-01 子曰三年學不至於穀不易得也","source":"논어"},{"text":"穀祿也至疑當作志爲學之久而不求祿如此之人不易得也○楊氏曰雖子","source":"논어"},{"text":"張之賢猶以干祿爲問況其下者乎然則三年學而不至於穀宜不易得也","source":"논어"},{"text":"泰伯13章","source":"논어"},{"text":"08-13-01 子曰篤信好學守死善道","source":"논어"},{"text":"篤厚而力也不篤信則不能好學然篤信而不好學則所信或非其正不守死","source":"논어"},{"text":"則不能以善其道然守死而不足以善其道則亦徒死而已蓋守死者篤信之效善","source":"논어"},{"text":"道者好學之功","source":"논어"},{"text":"08-13-02 危邦不入亂邦不居天下有道則見無道則隱","source":"논어"},{"text":"君子見危授命則仕危邦者無可去之義在外則不入可也亂邦未危而刑政紀綱","source":"논어"},{"text":"紊矣故潔其身而去之天下擧一世而言無道則隱其身而不見也此惟篤信好","source":"논어"},{"text":"學守死善道者能之","source":"논어"},{"text":"08-13-03 邦有道貧且賤焉恥也邦無道富且貴焉恥也","source":"논어"},{"text":"世治而無可行之道世亂而無能守之節碌碌庸人不足以爲士矣可恥之甚也○","source":"논어"},{"text":"晁氏曰有學有守而去就之義潔出處之分明然後爲君子之全德也","source":"논어"},{"text":"泰伯14章","source":"논어"},{"text":"08-14-01 子曰不在其位不謀其政","source":"논어"},{"text":"程子曰不在其位則不任其事也若君大夫問而告者則有矣","source":"논어"},{"text":"泰伯15章","source":"논어"},{"text":"08-15-01 子曰師摯之始關雎之亂洋洋乎盈耳哉","source":"논어"},{"text":"師摯魯樂師名摯也亂樂之卒章也史記曰關雎之亂以爲風始洋洋美盛意","source":"논어"},{"text":"孔子自衛反魯而正樂適師摯在官之初故樂之美盛如此","source":"논어"},{"text":"泰伯16章","source":"논어"},{"text":"08-16-01 子曰狂而不直侗而不愿悾悾而不信吾不知之矣","source":"논어"},{"text":"侗無知貌愿謹厚也悾悾無能貌吾不知之者甚絶之之辭亦不屑之敎誨也","source":"논어"},{"text":"○蘇氏曰天之生物氣質不齊其中材以下有是德則有是病有是病必有是德","source":"논어"},{"text":"故馬之蹄齧者必善走其不善者必馴有是病而無是德則天下之棄才也","source":"논어"},{"text":"泰伯17章","source":"논어"},{"text":"08-17-01 子曰學如不及猶恐失之","source":"논어"},{"text":"言人之爲學旣如有所不及矣而其心猶竦然惟恐其或失之警學者當如是也○","source":"논어"},{"text":"程子曰學如不及猶恐失之不得放過才說姑待明日便不可也","source":"논어"},{"text":"泰伯18章","source":"논어"},{"text":"08-18-01 子曰巍巍乎舜禹之有天下也而不與焉","source":"논어"},{"text":"巍巍高大之貌不與猶言不相關言其不以位爲樂也","source":"논어"},{"text":"泰伯19章","source":"논어"},{"text":"08-19-01 子曰大哉堯之爲君也巍巍乎唯天爲大唯堯則之蕩蕩乎民無能名焉","source":"논어"},{"text":"唯猶獨也則猶準也蕩蕩廣遠之稱也言物之高大莫有過於天者而獨堯之德","source":"논어"},{"text":"能與之準故其德之廣遠亦如天之不可以言語形容也","source":"논어"},{"text":"08-19-02 巍巍乎其有成功也煥乎其有文章","source":"논어"},{"text":"成功事業也煥光明之貌文章禮樂法度也堯之德不可名其可見者此爾○","source":"논어"},{"text":"尹氏曰天道之大無爲而成唯堯則之以治天下故民無得而名焉所可名者其","source":"논어"},{"text":"功業文章巍然煥然而已","source":"논어"},{"text":"泰伯20章","source":"논어"},{"text":"08-20-01 舜有臣五人而天下治","source":"논어"},{"text":"五人禹稷契皐陶伯益","source":"논어"},{"text":"08-20-02 武王曰予有亂臣十人","source":"논어"},{"text":"書泰誓之辭馬氏曰亂治也十人謂周公旦召公奭太公望畢公榮公太顚","source":"논어"},{"text":"閎夭散宜生南宮适其一人謂文母劉侍讀以爲子無臣母之義蓋邑姜也九人","source":"논어"},{"text":"治外邑姜治內或曰亂本作亂古治字也","source":"논어"},{"text":"08-20-03 孔子曰才難不其然乎唐虞之際於斯爲盛有婦人焉九人而已","source":"논어"},{"text":"稱孔子者上係武王君臣之際記者謹之才難蓋古語而孔子然之也才者德之","source":"논어"},{"text":"用也唐虞堯舜有天下之號際交會之間言周室人才之多惟唐虞之際乃盛於","source":"논어"},{"text":"此降自夏商皆不能及然猶但有此數人爾是才之難得也","source":"논어"},{"text":"08-20-04 三分天下有其二以服事殷周之德其可謂至德也已矣","source":"논어"},{"text":"春秋傳曰文王率商之畔國以事紂蓋天下歸文王者六州荊梁雍豫徐揚也惟靑","source":"논어"},{"text":"兗冀尙屬紂耳范氏曰文王之德足以代商天與之人歸之乃不敢而服事焉所","source":"논어"},{"text":"以爲至德也孔子因武王之言而及文王之德且與泰伯皆以至德稱之其指微矣","source":"논어"},{"text":"或曰宜斷三分以下別以孔子曰起之而自爲一章","source":"논어"},{"text":"泰伯21章","source":"논어"},{"text":"08-21-01 子曰禹吾無間然矣菲飮食而致孝乎鬼神惡衣服而致美乎黻冕卑宮","source":"논어"},{"text":"室而盡力乎溝洫禹吾無間然矣","source":"논어"},{"text":"間罅隙也謂指其罅隙而非議之也菲薄也致孝鬼神謂享祀豊潔衣服常服","source":"논어"},{"text":"黻蔽膝也以韋爲之冕冠也皆祭服也溝洫田間水道以正疆界備旱潦者也","source":"논어"},{"text":"或豊或儉各適其宜所以無罅隙之可議也故再言以深美之○楊氏曰薄於自","source":"논어"},{"text":"奉而所勤者民之事所致飾者宗廟朝廷之禮所謂有天下而不與也夫何間然之","source":"논어"},{"text":"09-01-01 子罕言利與命與仁","source":"논어"},{"text":"罕少也程子曰計利則害義命之理微仁之道大皆夫子所罕言也","source":"논어"},{"text":"09-02-01 達巷黨人曰大哉孔子博學而無所成名","source":"논어"},{"text":"達巷黨名其人姓名不傳博學而無所成名蓋美其學之博而惜其不成一藝之名","source":"논어"},{"text":"09-02-02 子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣","source":"논어"},{"text":"執專執也射御皆一藝而御爲人僕所執尤卑言欲使我何所執以成名乎然則","source":"논어"},{"text":"吾將執御矣聞人譽己承之以謙也○尹氏曰聖人道全而德備不可以偏長目","source":"논어"},{"text":"之也達巷黨人見孔子之大意其所學者博而惜其不以一善得名於世蓋慕聖人","source":"논어"},{"text":"而不知者也故孔子曰欲使我何所執而得爲名乎然則吾將執御矣","source":"논어"},{"text":"09-03-01 子曰麻冕禮也今也純儉吾從衆","source":"논어"},{"text":"麻冕緇布冠也純絲也儉謂省約緇布冠以三十升布爲之升八十縷則其經","source":"논어"},{"text":"二千四百縷矣細密難成不如用絲之省約","source":"논어"},{"text":"09-03-02 拜下禮也今拜乎上泰也雖違衆吾從下","source":"논어"},{"text":"臣與君行禮當拜於堂下君辭之乃升成拜泰驕慢也○程子曰君子處世事","source":"논어"},{"text":"之無害於義者從俗可也害於義則不可從也","source":"논어"},{"text":"09-04-01 子絶四毋意毋必毋固毋我","source":"논어"},{"text":"絶無之盡者毋史記作無是也意私意也必期必也固執滯也我私己也","source":"논어"},{"text":"四者相爲終始起於意遂於必留於固而成於我也蓋意必常在事前固我常在","source":"논어"},{"text":"事後至於我又生意則物欲牽引循環不窮矣○程子曰此毋字非禁止之辭聖","source":"논어"},{"text":"人絶此四者何用禁止張子曰四者有一焉則與天地不相似楊氏曰非知足以","source":"논어"},{"text":"知聖人詳視而黙識之不足以記此","source":"논어"},{"text":"09-05-01 子畏於匡","source":"논어"},{"text":"畏者有戒心之謂匡地名史記云陽虎曾暴於匡夫子貌似陽虎故匡人圍之","source":"논어"},{"text":"09-05-02 曰文王旣沒文不在玆乎","source":"논어"},{"text":"道之顯者謂之文蓋禮樂制度之謂不曰道而曰文亦謙辭也玆此也孔子自謂","source":"논어"},{"text":"09-05-03 天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如","source":"논어"},{"text":"馬氏曰文王旣沒故孔子自謂後死者言天若欲喪此文則必不使我得與於此文","source":"논어"},{"text":"今我旣得與於此文則是天未欲喪此文也天旣未欲喪此文則匡人其奈我何言必","source":"논어"},{"text":"不能違天害己也","source":"논어"},{"text":"09-06-01 大宰問於子貢曰夫子聖者與何其多能也","source":"논어"},{"text":"孔氏曰大宰官名或吳或宋未可知也與者疑辭大宰蓋以多能爲聖也","source":"논어"},{"text":"09-06-02 子貢曰固天縱之將聖又多能也","source":"논어"},{"text":"縱猶肆也言不爲限量也將殆也謙若不敢知之辭聖無不通多能乃其餘事","source":"논어"},{"text":"故言又以兼之","source":"논어"},{"text":"09-06-03 子聞之曰大宰知我乎吾少也賤故多能鄙事君子多乎哉不多也","source":"논어"},{"text":"言由少賤故多能而所能者鄙事爾非以聖而無不通也且多能非所以率人故","source":"논어"},{"text":"又言君子不必多能以曉之","source":"논어"},{"text":"09-06-04 牢曰子云吾不試故藝","source":"논어"},{"text":"牢孔子弟子姓琴字子開一字子張試用也言由不爲世用故得以習於藝而通","source":"논어"},{"text":"之○吳氏曰弟子記夫子此言之時子牢因言昔之所聞有如此者其意相近故幷","source":"논어"},{"text":"09-07-01 子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉","source":"논어"},{"text":"孔子謙言己無知識但其告人雖於至愚不敢不盡耳叩發動也兩端猶言兩頭","source":"논어"},{"text":"言終始本末上下精粗無所不盡○程子曰聖人之敎人俯就之若此猶恐衆人以","source":"논어"},{"text":"爲高遠而不親也聖人之道必降而自卑不如此則人不親賢人之言則引而自高","source":"논어"},{"text":"不如此則道不尊觀於孔子孟子可見矣尹氏曰聖人之言上下兼盡卽其近衆","source":"논어"},{"text":"人皆可與知極其至則雖聖人亦無以加焉是之謂兩端如答樊遲之問仁智兩端","source":"논어"},{"text":"竭盡無餘蘊矣若夫語上而遺下語理而遺物則豈聖人之言哉","source":"논어"},{"text":"09-08-01 子曰鳳鳥不至河不出圖吾已矣夫","source":"논어"},{"text":"鳳靈鳥舜時來儀文王時鳴於岐山河圖河中龍馬負圖伏羲時出皆聖王之瑞","source":"논어"},{"text":"也已止也○張子曰鳳至圖出文明之祥伏羲舜文之瑞不至則夫子之文章","source":"논어"},{"text":"09-09-01 子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨","source":"논어"},{"text":"齊衰喪服冕冠也衣上服裳下服冕而衣裳貴者之盛服也瞽無目者作","source":"논어"},{"text":"起也趨疾行也或曰少當作坐○范氏曰聖人之心哀有喪尊有爵矜不成","source":"논어"},{"text":"人其作與趨蓋有不期然而然者尹氏曰此聖人之誠心內外一者也","source":"논어"},{"text":"子罕10章","source":"논어"},{"text":"09-10-01 顔淵喟然歎曰仰之彌高鑽之彌堅瞻之在前忽焉在後","source":"논어"},{"text":"喟歎聲仰彌高不可及鑽彌堅不可入在前在後恍惚不可爲象此顔淵深知","source":"논어"},{"text":"夫子之道無窮盡無方體而歎之也","source":"논어"},{"text":"09-10-02 夫子循循然善誘人博我以文約我以禮","source":"논어"},{"text":"循循有次序貌誘引進也博文約禮敎之序也言夫子道雖高妙而敎人有序也","source":"논어"},{"text":"○侯氏曰博我以文致知格物也約我以禮克己復禮程子曰此顔子稱聖人最","source":"논어"},{"text":"切當處聖人敎人唯此二事而已","source":"논어"},{"text":"09-10-03 欲罷不能旣竭吾才如有所立卓爾雖欲從之末由也已","source":"논어"},{"text":"卓立貌末無也此顔子自言其學之所至也蓋悅之深而力之盡所見益親而又","source":"논어"},{"text":"無所用其力也吳氏曰所謂卓爾亦在乎日用行事之間非所謂窈冥昏黙者程子","source":"논어"},{"text":"曰到此地位工夫尤難直是峻絶又大段著力不得楊氏曰自可欲之謂善充而","source":"논어"},{"text":"至於大力行之積也大而化之則非力行所及矣此顔子所以未達一間也○程","source":"논어"},{"text":"子曰此顔子所以爲深知孔子而善學之者也胡氏曰無上事而喟然歎此顔子學","source":"논어"},{"text":"旣有得故述其先難之故後得之由而歸功於聖人也高堅前後語道體也仰鑽","source":"논어"},{"text":"瞻忽未領其要也惟夫子循循善誘先博我以文使我知古今達事變然後約我以","source":"논어"},{"text":"禮使我尊所聞行所知如行者之赴家食者之求飽是以欲罷而不能盡心盡力","source":"논어"},{"text":"不少休廢然後見夫子所立之卓然雖欲從之末由也已是蓋不怠所從必求至","source":"논어"},{"text":"乎卓立之地也抑斯歎也其在請事斯語之後三月不違之時乎","source":"논어"},{"text":"子罕11章","source":"논어"},{"text":"09-11-01 子疾病子路使門人爲臣","source":"논어"},{"text":"夫子時已去位無家臣子路欲以家臣治其喪其意實尊聖人而未知所以尊也","source":"논어"},{"text":"09-11-02 病間曰久矣哉由之行詐也無臣而爲有臣吾誰欺欺天乎","source":"논어"},{"text":"病間少差也病時不知旣差乃知其事故言我之不當有家臣人皆知之不可欺","source":"논어"},{"text":"也而爲有臣則是欺天而已人而欺天莫大之罪引以自咎其責子路深矣","source":"논어"},{"text":"09-11-03 且予與其死於臣之手也無寧死於二三子之手乎且予縱不得大葬予死","source":"논어"},{"text":"無寧寧也大葬謂君臣禮葬死於道路謂棄而不葬又曉之以不必然之故○范","source":"논어"},{"text":"氏曰曾子將死起而易簀曰吾得正而斃焉斯已矣子路欲尊夫子而不知無臣之","source":"논어"},{"text":"不可爲有臣是以陷於行詐罪至欺天君子之於言動雖微不可不謹夫子深懲","source":"논어"},{"text":"子路所以警學者也楊氏曰非知至而意誠則用智自私不知行其所無事往往自","source":"논어"},{"text":"陷於行詐欺天而莫之知也其子路之謂乎","source":"논어"},{"text":"子罕12章","source":"논어"},{"text":"09-12-01 子貢曰有美玉於斯韞匵而藏諸求善賈而沽諸子曰沽之哉沽之哉","source":"논어"},{"text":"我待賈者也","source":"논어"},{"text":"韞藏也匵匱也沽賣也子貢以孔子有道不仕故設此二端以問也孔子言固","source":"논어"},{"text":"當賣之但當待賈而不當求之耳○范氏曰君子未嘗不欲仕也又惡不由其道","source":"논어"},{"text":"猶玉之待賈也","source":"논어"},{"text":"若伊尹之耕於野","source":"논어"},{"text":"伯夷太公之居於海濱","source":"논어"},{"text":"世無成湯文王","source":"논어"},{"text":"則終焉而已必不枉道以從人衒玉而求售也","source":"논어"},{"text":"子罕13章","source":"논어"},{"text":"09-13-01 子欲居九夷","source":"논어"},{"text":"東方之夷有九鍾欲居之者亦乘桴浮海之意","source":"논어"},{"text":"09-13-02 或曰陋如之何子曰君子居之何陋之有","source":"논어"},{"text":"君子所居則化何陋之有","source":"논어"},{"text":"子罕14章","source":"논어"},{"text":"09-14-01 子曰吾自衛反魯然後樂正雅頌各得其所","source":"논어"},{"text":"魯哀公十一年冬孔子自衛反魯是時周禮在魯然詩樂亦頗殘缺失次孔子周","source":"논어"},{"text":"流四方參互考訂以知其說晩知道終不行故歸而正之","source":"논어"},{"text":"子罕15章","source":"논어"},{"text":"09-15-01 子曰出則事公卿入則事父兄喪事不敢不勉不爲酒困何有於我哉","source":"논어"},{"text":"說見第七篇然此則其事愈卑而意愈切矣","source":"논어"},{"text":"子罕16章","source":"논어"},{"text":"09-16-01 子在川上曰逝者如斯夫不舍晝夜","source":"논어"},{"text":"天地之化往者過來者續無一息之停乃道體之本然也然其可指而易見者莫","source":"논어"},{"text":"如川流故於此發以示人欲學者時時省察而無毫髮之間斷也○程子曰此道","source":"논어"},{"text":"體也天運而不已日往則月來寒往則暑來水流而不息物生而不窮皆與道爲體","source":"논어"},{"text":"運乎晝夜未嘗已也是以君子法之自强不息及其至也純亦不已焉又曰自漢","source":"논어"},{"text":"以來儒者皆不識此義此見聖人之心純亦不已也純亦不已乃天德也有天德","source":"논어"},{"text":"便可語王道其要只在謹獨愚按自此至終篇皆勉人進學不已之辭","source":"논어"},{"text":"子罕17章","source":"논어"},{"text":"09-17-01 子曰吾未見好德如好色者也","source":"논어"},{"text":"謝氏曰好好色惡惡臭誠也好德如好色斯誠好德矣然民鮮能之○史記孔","source":"논어"},{"text":"子居衛靈公與夫人同車使孔子爲次乘招搖市過之孔子醜之故有是言","source":"논어"},{"text":"子罕18章","source":"논어"},{"text":"09-18-01 子曰譬如爲山未成一簣止吾止也譬如平地雖覆一簣進吾往也","source":"논어"},{"text":"簣土籠也書曰爲山九仞功虧一簣夫子之言蓋出於此言山成而但少一簣其","source":"논어"},{"text":"止者吾自止耳平地而方覆一簣其進者吾自往耳蓋學者自强不息則積少成多","source":"논어"},{"text":"中道而止則前功盡棄其止其往皆在我而不在人也","source":"논어"},{"text":"子罕19章","source":"논어"},{"text":"09-19-01 子曰語之而不惰者其回也與","source":"논어"},{"text":"惰懈怠也范氏曰顔子聞夫子之言而心解力行造次顚沛未嘗違之如萬物得","source":"논어"},{"text":"時雨之潤發榮滋長何有於惰此群弟子所不及也","source":"논어"},{"text":"子罕20章","source":"논어"},{"text":"09-20-01 子謂顔淵曰惜乎吾見其進也未見其止也","source":"논어"},{"text":"進止二字說見上章顔子旣死而孔子惜之言其方進而未已也","source":"논어"},{"text":"子罕21章","source":"논어"},{"text":"09-21-01 子曰苗而不秀者有矣夫秀而不實者有矣夫","source":"논어"},{"text":"穀之始生曰苗吐華曰秀成穀曰實蓋學而不至於成有如此者是以君子貴自勉","source":"논어"},{"text":"子罕22章","source":"논어"},{"text":"09-22-01 子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏","source":"논어"},{"text":"孔子言後生年富力彊足以積學而有待其勢可畏安知其將來不如我之今日乎","source":"논어"},{"text":"然或不能自勉至於老而無聞則不足畏矣言此以警人使及時勉學也曾子曰","source":"논어"},{"text":"五十而不以善聞則不聞矣蓋述此意尹氏曰少而不勉老而無聞則亦已矣自","source":"논어"},{"text":"少而進者安知其不至於極乎是可畏也","source":"논어"},{"text":"子罕23章","source":"논어"},{"text":"09-23-01 子曰法語之言能無從乎改之爲貴巽與之言能無說乎繹之爲貴說","source":"논어"},{"text":"而不繹從而不改吾末如之何也已矣","source":"논어"},{"text":"法語者正言之也巽言者婉而導之也繹尋其緖也法言人所敬憚故必從然","source":"논어"},{"text":"不改則面從而已巽言無所乖忤故必說然不繹則又不足以知其微意之所在也","source":"논어"},{"text":"○楊氏曰法言若孟子論行王政之類是也巽言若其論好貨好色之類是也語之","source":"논어"},{"text":"而不達拒之而不受猶之可也其或喩焉則尙庶幾其能改繹矣從且說矣而不改","source":"논어"},{"text":"繹焉則是終不改繹也已雖聖人其如之何哉","source":"논어"},{"text":"子罕24章","source":"논어"},{"text":"09-24-01 子曰主忠信毋友不如己者過則勿憚改","source":"논어"},{"text":"重出而逸其半","source":"논어"},{"text":"子罕25章","source":"논어"},{"text":"09-25-01 子曰三軍可奪帥也匹夫不可奪志也","source":"논어"},{"text":"侯氏曰三軍之勇在人匹夫之志在己故帥可奪而志不可奪如可奪則亦不","source":"논어"},{"text":"足謂之志矣","source":"논어"},{"text":"子罕26章","source":"논어"},{"text":"09-26-01 子曰衣敝縕袍與衣狐貉者立而不恥者其由也與","source":"논어"},{"text":"敝壞也縕枲著也袍衣有著者也蓋衣之賤者狐貉以狐貉之皮爲裘衣之貴","source":"논어"},{"text":"者子路之志如此則能不以貧富動其心而可以進於道矣故夫子稱之","source":"논어"},{"text":"09-26-02 不忮不求何用不臧","source":"논어"},{"text":"忮害也求貪也臧善也言能不忮不求則何爲不善乎此衛風雄雉之詩孔子","source":"논어"},{"text":"引之以美子路也呂氏曰貧與富交彊者必忮弱者必求","source":"논어"},{"text":"09-26-03 子路終身誦之子曰是道也何足以臧","source":"논어"},{"text":"終身誦之則自喜其能而不復求進於道矣故夫子復言此以警之○謝氏曰恥惡","source":"논어"},{"text":"衣惡食學者之大病善心不存蓋由於此子路之志如此其過人遠矣然以衆人","source":"논어"},{"text":"而能此則可以爲善矣子路之賢宜不止此而終身誦之則非所以進於日新也故","source":"논어"},{"text":"子罕27章","source":"논어"},{"text":"09-27-01 子曰歲寒然後知松柏之後彫也","source":"논어"},{"text":"范氏曰小人之在治世或與君子無異惟臨利害遇事變然後君子之所守可見也","source":"논어"},{"text":"○謝氏曰士窮見節義世亂識忠臣欲學者必周于德","source":"논어"},{"text":"子罕28章","source":"논어"},{"text":"09-28-01 子曰知者不惑仁者不憂勇者不懼","source":"논어"},{"text":"明足以燭理故不惑理足以勝私故不憂氣足以配道義故不懼此學之序也","source":"논어"},{"text":"子罕29章","source":"논어"},{"text":"09-29-01 子曰可與共學未可與適道可與適道未可與立可與立未可與權","source":"논어"},{"text":"可與者言其可與共爲此事也程子曰可與共學知所以求之也可與適道知所往","source":"논어"},{"text":"也可與立者篤志固執而不變也權稱錘也所以稱物而知輕重者也可與權謂","source":"논어"},{"text":"能權輕重使合義也○楊氏曰知爲己則可與共學矣學足以明善然後可與適道","source":"논어"},{"text":"信道篤然後可與立知時措之宜然後可與權洪氏曰易九卦終於巽以行權權者","source":"논어"},{"text":"聖人之大用未能立而言權猶人未能立而欲行鮮不仆矣程子曰漢儒以反經合","source":"논어"},{"text":"道爲權故有權變權術之論皆非也權只是經也自漢以下無人識權字愚按","source":"논어"},{"text":"先儒誤以此章連下文偏其反而爲一章故有反經合道之說程子非之是矣然以","source":"논어"},{"text":"孟子嫂溺援之以手之義推之則權與經亦當有辨","source":"논어"},{"text":"子罕30章","source":"논어"},{"text":"09-30-01 唐棣之華偏其反而豈不爾思室是遠而","source":"논어"},{"text":"唐棣郁李也偏晋書作翩然則反亦當與翻同言華之搖動也而助語也此逸","source":"논어"},{"text":"詩也於六義屬興上兩句無意義但以起下兩句之辭耳其所謂爾亦不知其何所","source":"논어"},{"text":"09-30-02 子曰未之思也夫何遠之有","source":"논어"},{"text":"夫子借言而反之蓋前篇仁遠乎哉之意○程子曰聖人未嘗言易以驕人之志亦","source":"논어"},{"text":"未嘗言難以阻人之進但曰未之思也夫何遠之有此言極有涵蓄意思深遠","source":"논어"},{"text":"楊氏曰聖人之所謂道者不離乎日用之間也故夫子之平日一動一靜門人皆審","source":"논어"},{"text":"視而詳記之尹氏曰甚矣孔門諸子之嗜學也於聖人之容色言動無不謹書而備錄","source":"논어"},{"text":"之以貽後世今讀其書卽其事宛然如聖人之在目也雖然聖人豈拘拘而爲之者","source":"논어"},{"text":"哉蓋盛德之至動容周旋自中乎禮耳學者欲潛心於聖人宜於此求焉舊說凡一","source":"논어"},{"text":"章今分爲十七","source":"논어"},{"text":"10-01-01 孔子於鄕黨恂恂如也似不能言者","source":"논어"},{"text":"恂恂信實之貌似不能言者謙卑遜順不以賢知先人也鄕黨父兄宗族之所在故","source":"논어"},{"text":"孔子居之其容貌辭氣如此","source":"논어"},{"text":"10-01-02 其在宗廟朝廷便便言唯謹爾","source":"논어"},{"text":"便便辯也宗廟禮法之所在朝廷政事之所出言不可以不明辨故必詳問而極言","source":"논어"},{"text":"之但謹而不放爾○此一節記孔子在鄕黨宗廟朝廷言貌之不同","source":"논어"},{"text":"10-02-01 朝與下大夫言侃侃如也與上大夫言誾誾如也","source":"논어"},{"text":"此君未視朝時也王制諸侯上大夫卿下大夫五人許氏說文侃侃剛直也誾誾","source":"논어"},{"text":"和悅而諍也","source":"논어"},{"text":"10-02-02 君在踧踖如也與與如也","source":"논어"},{"text":"君在視朝也踧踖恭敬不寧之貌與與威儀中適之貌張子曰與與不忘向君也","source":"논어"},{"text":"亦通○此一節記孔子在朝廷事上接下之不同也","source":"논어"},{"text":"10-03-01 君召使擯色勃如也足躩如也","source":"논어"},{"text":"擯主國之君所使出接賓者勃變色貌躩盤辟貌皆敬君命故也","source":"논어"},{"text":"10-03-02 揖所與立左右手衣前後襜如也","source":"논어"},{"text":"所與立謂同爲擯者也擯用命數之半如上公九命則用五人以次傳命揖左人","source":"논어"},{"text":"則左其手揖右人則右其手襜整貌","source":"논어"},{"text":"10-03-03 趨進翼如也","source":"논어"},{"text":"疾趨而進張拱端好如鳥舒翼","source":"논어"},{"text":"10-03-04 賓退必復命曰賓不顧矣","source":"논어"},{"text":"紓君敬也○此一節記孔子爲君擯相之容","source":"논어"},{"text":"10-04-01 入公門鞠躬如也如不容","source":"논어"},{"text":"鞠躬曲身也公門高大而若不容敬之至也","source":"논어"},{"text":"10-04-02 立不中門行不履閾","source":"논어"},{"text":"中門中於門也謂當棖闑之間君出入處也閾門限也禮士大夫出入公門由闑","source":"논어"},{"text":"右不踐閾謝氏曰立中門則當尊行履閾則不恪","source":"논어"},{"text":"10-04-03 過位色勃如也足躩如也其言似不足者","source":"논어"},{"text":"位君之虛位謂門屛之間人君宁立之處所謂宁也君雖不在過之必敬不敢以","source":"논어"},{"text":"虛位而慢之也言似不足不敢肆也","source":"논어"},{"text":"10-04-04 攝齊升堂鞠躬如也屛氣似不息者","source":"논어"},{"text":"攝摳也齊衣下縫也禮將升堂兩手摳衣使去地尺恐躡之而傾跌失容也屛","source":"논어"},{"text":"藏也息鼻出入者也近至尊氣容肅也","source":"논어"},{"text":"10-04-05 出降一等逞顔色怡怡如也沒階趨翼如也復其位踧踖如也","source":"논어"},{"text":"陸氏曰趨下本無進字俗本有之誤也○等階之級也逞放也漸遠所尊舒氣","source":"논어"},{"text":"解顔怡怡和悅也沒階下盡階也趨走就位也復位踧踖敬之餘也○此一節","source":"논어"},{"text":"記孔子在朝之容","source":"논어"},{"text":"10-05-01 執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循","source":"논어"},{"text":"圭諸侯命圭聘問隣國則使大夫執以通信如不勝執主器執輕如不克敬謹之","source":"논어"},{"text":"至也上如揖下如授謂執圭平衡手與心齊高不過揖卑不過授也戰色戰而色","source":"논어"},{"text":"懼也蹜蹜擧足促狹也如有循記所謂擧前曳踵言行不離地如緣物也","source":"논어"},{"text":"10-05-02 享禮有容色","source":"논어"},{"text":"享獻也旣聘而享用圭璧有庭實有容色和也儀禮曰發氣滿容","source":"논어"},{"text":"10-05-03 私覿愉愉如也","source":"논어"},{"text":"私覿以私禮見也愉愉則又和矣○此一節記孔子爲君聘於隣國之禮也晁氏曰","source":"논어"},{"text":"孔子定公九年仕魯至十三年適齊其間絶無朝聘往來之事疑使擯執圭兩條但","source":"논어"},{"text":"孔子嘗言其禮當如此爾","source":"논어"},{"text":"10-06-01 君子不以紺緅飾","source":"논어"},{"text":"君子謂孔子紺深靑楊赤色齊服也緅絳色三年之喪以飾練服也飾領緣也","source":"논어"},{"text":"10-06-02 紅紫不以爲褻服","source":"논어"},{"text":"紅紫間色不正且近於婦人女子之服也褻服私居服也言此則不以爲朝祭之服可","source":"논어"},{"text":"10-06-03 當暑袗絺綌必表而出之","source":"논어"},{"text":"袗單也葛之精者曰絺麤者曰綌表而出之謂先著裏衣表絺綌而出之於外欲其","source":"논어"},{"text":"不見體也詩所謂蒙彼縐絺是也","source":"논어"},{"text":"10-06-04 緇衣羔裘素衣麑裘黃衣狐裘","source":"논어"},{"text":"緇黑色羔裘用黑羊皮麑鹿子色白狐色黃衣以裼裘欲其相稱","source":"논어"},{"text":"10-06-05 褻裘長短右袂","source":"논어"},{"text":"長欲其溫短右袂所以便作事","source":"논어"},{"text":"10-06-06 必有寢衣長一身有半","source":"논어"},{"text":"齊主於敬不可解衣而寢又不可著明衣而寢故別有寢衣其半蓋以覆足程子曰","source":"논어"},{"text":"此錯簡當在齊必有明衣布之下愚謂如此則條與明衣變食旣得以類相從而褻","source":"논어"},{"text":"裘狐貉亦得以類相從矣","source":"논어"},{"text":"10-06-07 狐貉之厚以居","source":"논어"},{"text":"狐貉毛深溫厚私居取其適體","source":"논어"},{"text":"10-06-08 去喪無所不佩","source":"논어"},{"text":"君子無故玉不去身觿礪之屬亦皆佩也","source":"논어"},{"text":"10-06-09 非帷裳必殺之","source":"논어"},{"text":"朝祭之服裳用正幅如帷要有襞積而旁無殺縫其餘若深衣要半下齊倍要則無","source":"논어"},{"text":"襞積而有殺縫矣","source":"논어"},{"text":"10-06-10 羔裘玄冠不以吊","source":"논어"},{"text":"喪主素吉主玄弔必變服所以哀死","source":"논어"},{"text":"10-06-11 吉月必朝服而朝","source":"논어"},{"text":"吉月月朔也孔子在魯致仕時如此○此一節記孔子衣服之制蘇氏曰此孔氏","source":"논어"},{"text":"遺書雜記曲禮非特孔子事也","source":"논어"},{"text":"10-07-01 齊必有明衣布","source":"논어"},{"text":"齊必沐浴浴竟卽著明衣所以明潔其體也以布爲之此下脫前章寢衣一簡","source":"논어"},{"text":"10-07-02 齊必變食居必遷坐","source":"논어"},{"text":"變食謂不飮酒不茹葷遷坐易常處也○此一節記孔子謹齊之事楊氏曰齊所","source":"논어"},{"text":"以交神故致潔變常以盡敬","source":"논어"},{"text":"10-08-01 食不厭精膾不厭細","source":"논어"},{"text":"食飯也精鑿也牛羊與魚之腥聶而切之爲膾食精則能養人膾麤則能害人不","source":"논어"},{"text":"厭言以是爲善非謂必欲如是也","source":"논어"},{"text":"10-08-02 食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食","source":"논어"},{"text":"饐飯傷熱濕也餲味變也魚爛曰餒肉腐曰敗色惡臭惡未敗而色臭變也飪烹","source":"논어"},{"text":"調生熟之節也不時五穀不成果實未熟之類此數者皆足以傷人故不食","source":"논어"},{"text":"10-08-03 割不正不食不得其醬不食","source":"논어"},{"text":"割肉不方正者不食造次不離於正也漢陸續之母切肉未嘗不方斷葱以寸爲度","source":"논어"},{"text":"蓋其質美如此暗合也食肉用醬各有所宜不得則不食惡其不備也此二者無","source":"논어"},{"text":"害於人但不以嗜味而苟食耳","source":"논어"},{"text":"10-08-04 肉雖多不使勝食氣唯酒無量不及亂","source":"논어"},{"text":"食以穀爲主","source":"논어"},{"text":"故不使肉勝食氣","source":"논어"},{"text":"酒以爲人合懽","source":"논어"},{"text":"但以醉爲節而不及亂耳","source":"논어"},{"text":"程子曰不及亂者非唯不使亂志雖血氣亦不可使亂但浹洽而已可也","source":"논어"},{"text":"10-08-05 沽酒市脯不食","source":"논어"},{"text":"沽市皆買也恐不精潔或傷人也與不嘗康子之藥同意","source":"논어"},{"text":"10-08-06 不撤薑食","source":"논어"},{"text":"薑通神明去穢惡故不撤","source":"논어"},{"text":"10-08-07 不多食","source":"논어"},{"text":"適可而止無貪心也","source":"논어"},{"text":"10-08-08 祭於公不宿肉祭肉不出三日出三日不食之矣","source":"논어"},{"text":"助祭於公所得胙肉歸卽頒賜不俟經宿者不留神惠也家之祭肉則不過三日","source":"논어"},{"text":"皆以分賜蓋過三日則肉必敗而人不食之是褻鬼神之餘也但比君所賜胙可少緩","source":"논어"},{"text":"10-08-09 食不語寢不言","source":"논어"},{"text":"答述曰語自言曰言范氏曰聖人存心不他當食而食當寢而寢言語非其時也楊","source":"논어"},{"text":"氏曰肺爲氣主而聲出焉寢食則氣窒而不通語言恐傷之也亦通","source":"논어"},{"text":"10-08-10 雖疏食菜羹瓜祭必齊如也","source":"논어"},{"text":"陸氏曰魯論瓜作必○古人飮食每種各出少許置之豆間之地以祭先代始爲","source":"논어"},{"text":"飮食之人不忘本也齊嚴敬貌孔子雖薄物必祭其祭必敬聖人之誠也○此一","source":"논어"},{"text":"節記孔子飮食之節謝氏曰聖人飮食如此非極口腹之欲蓋養氣體不以傷生","source":"논어"},{"text":"當如此然聖人之所不食窮口腹者或反食之欲心勝而不暇擇也","source":"논어"},{"text":"10-09-01 席不正不坐","source":"논어"},{"text":"謝氏曰聖人心安於正故於位之不正者雖小不處","source":"논어"},{"text":"鄕黨10章","source":"논어"},{"text":"10-10-01 鄕人飮酒杖者出斯出矣","source":"논어"},{"text":"杖者老人也六十杖於鄕未出不敢先旣出不敢後","source":"논어"},{"text":"10-10-02 鄕人儺朝服而立於阼階","source":"논어"},{"text":"儺所以逐疫","source":"논어"},{"text":"周禮方相氏掌之","source":"논어"},{"text":"阼階東階也","source":"논어"},{"text":"儺雖古禮而近於戱","source":"논어"},{"text":"亦朝服而臨之者","source":"논어"},{"text":"無所不用其誠敬也或曰恐其驚先祖五祀之神欲其依己而安也○此一節記孔","source":"논어"},{"text":"子居鄕之事","source":"논어"},{"text":"鄕黨11章","source":"논어"},{"text":"10-11-01 問人於他邦再拜而送之","source":"논어"},{"text":"拜送使者如親見之敬也","source":"논어"},{"text":"10-11-02 康子饋藥拜而受之曰丘未達不敢嘗","source":"논어"},{"text":"范氏曰凡賜食必嘗以拜藥未達則不敢嘗受而不食則虛人之賜故告之如此","source":"논어"},{"text":"然則可飮而飮不可飮而不飮皆在其中矣楊氏曰大夫有賜拜而受之禮也未達不","source":"논어"},{"text":"敢嘗謹疾也必告之直也○此一節記孔子與人交之誠意","source":"논어"},{"text":"鄕黨12章","source":"논어"},{"text":"10-12-01 廐焚子退朝曰傷人乎不問馬","source":"논어"},{"text":"非不愛馬然恐傷人之意多故未暇問蓋貴人賤畜理當如此","source":"논어"},{"text":"鄕黨13章","source":"논어"},{"text":"10-13-01 君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之","source":"논어"},{"text":"食恐或餕餘故不以薦正席先嘗如對君也言先嘗則餘當以頒賜矣腥生肉熟","source":"논어"},{"text":"而薦之祖考榮君賜也畜之者仁君之惠無故不敢殺也","source":"논어"},{"text":"10-13-02 侍食於君君祭先飯","source":"논어"},{"text":"周禮王日一擧膳夫授祭品嘗食王乃食故侍食者君祭則己不祭而先飯若爲君","source":"논어"},{"text":"嘗食然不敢當客禮也","source":"논어"},{"text":"10-13-03 疾君視之東首加朝服拖紳","source":"논어"},{"text":"東首以受生氣也病臥不能著衣束帶又不可以褻服見君故加朝服於身又引大帶","source":"논어"},{"text":"10-13-04 君命召不俟駕行矣","source":"논어"},{"text":"急趨君命行出而駕車隨之○此一節記孔子事君之禮","source":"논어"},{"text":"10-13-05 入太廟每事問","source":"논어"},{"text":"鄕黨14章","source":"논어"},{"text":"10-14-01 朋友死無所歸曰於我殯","source":"논어"},{"text":"朋友以義合死無所歸不得不殯","source":"논어"},{"text":"10-14-02 朋友之饋雖車馬非祭肉不拜","source":"논어"},{"text":"朋友有通財之義故雖車馬之重不拜祭肉則拜者敬其祖考同於己親也○此","source":"논어"},{"text":"一節記孔子交朋友之義","source":"논어"},{"text":"鄕黨15章","source":"논어"},{"text":"10-15-01 寢不尸居不容","source":"논어"},{"text":"尸謂偃臥似死人也居居家容容儀范氏曰寢不尸非惡其類於死也惰慢之氣","source":"논어"},{"text":"不設於身體雖舒布其四體而亦未嘗肆耳居不容非惰也但不若奉祭祀見賓客而","source":"논어"},{"text":"已申申夭夭是也","source":"논어"},{"text":"10-15-02 見齊衰者雖狎必變見冕者與瞽者雖褻必以貌","source":"논어"},{"text":"狎謂素親狎褻謂燕見貌謂禮貌餘見前篇","source":"논어"},{"text":"10-15-03 凶服者式之式負版者","source":"논어"},{"text":"式車前橫木有所敬則俯而憑之負版持邦國圖籍者式此二者哀有喪重民數也","source":"논어"},{"text":"人惟萬物之靈而王者之所天也故周禮獻民數於王王拜受之況其下者敢不敬乎","source":"논어"},{"text":"10-15-04 有盛饌必變色而作","source":"논어"},{"text":"敬主人之禮非以其饌也","source":"논어"},{"text":"10-15-05 迅雷風烈必變","source":"논어"},{"text":"迅疾也烈猛也必變者所以敬天之怒記曰若有疾風迅雷甚雨則必變雖夜必","source":"논어"},{"text":"興衣服冠而坐○此一節記孔子容貌之變","source":"논어"},{"text":"鄕黨16章","source":"논어"},{"text":"10-16-01 升車必正立執綏","source":"논어"},{"text":"綏挽以上車之索也范氏曰正立執綏則心體無不正而誠意肅恭矣蓋君子莊敬無","source":"논어"},{"text":"所不在升車則見於此也","source":"논어"},{"text":"10-16-02 車中不內顧不疾言不親指","source":"논어"},{"text":"內顧回視也禮曰顧不過轂三者皆失容且惑人○此一節記孔子升車之容","source":"논어"},{"text":"鄕黨17章","source":"논어"},{"text":"10-17-01 色斯擧矣翔而後集","source":"논어"},{"text":"言鳥見人之顔色不善則飛去回翔審視而後下止人之見幾而作審擇所處亦當如","source":"논어"},{"text":"此然此上下必有闕文矣","source":"논어"},{"text":"10-17-02 曰山梁雌雉時哉時哉子路共之三嗅而作","source":"논어"},{"text":"邢氏曰梁橋也時哉言雉之飮啄得其時子路不達以爲時物而共具之孔子不","source":"논어"},{"text":"食三嗅其氣而起晁氏曰石經嗅作戞謂雉鳴也劉聘君曰嗅當作臭古闃反張兩","source":"논어"},{"text":"翅也見爾雅愚按如後兩說則共字當爲拱執之義然此必有闕文不可强爲之說","source":"논어"},{"text":"姑記所聞以俟知者","source":"논어"},{"text":"此篇多評弟子賢否凡二十五章胡氏曰此篇記閔子騫言行者四而其一直稱閔","source":"논어"},{"text":"子疑閔氏門人所記也","source":"논어"},{"text":"11-01-01 子曰先進於禮樂野人也後進於禮樂君子也","source":"논어"},{"text":"先進後進猶言前輩後輩野人謂郊外之民君子謂賢士大夫也程子曰先進於","source":"논어"},{"text":"禮樂文質得宜今反謂之質朴而以爲野人後進之於禮樂文過其質今反謂之彬","source":"논어"},{"text":"彬而以爲君子蓋周末文勝故時人之言如此不自知其過於文也","source":"논어"},{"text":"11-01-02 如用之則吾從先進","source":"논어"},{"text":"用之謂用禮樂孔子旣述時人之言又自言其如此蓋欲損過以就中也","source":"논어"},{"text":"11-02-01 子曰從我於陳蔡者皆不及門也","source":"논어"},{"text":"孔子嘗厄於陳蔡之間弟子多從之者此時皆不在門故孔子思之蓋不忘其相從","source":"논어"},{"text":"於患難之中也","source":"논어"},{"text":"11-02-02 德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子","source":"논어"},{"text":"弟子因孔子之言記此十人而幷目其所長分爲四科孔子敎人各因其材於此可","source":"논어"},{"text":"見○程子曰四科乃從夫子於陳蔡者爾門人之賢者固不止此曾子傳道而不與","source":"논어"},{"text":"焉故知十哲世俗論也","source":"논어"},{"text":"11-03-01 子曰回也非助我者也於吾言無所不說","source":"논어"},{"text":"助我若子夏之起予因疑問而有以相長也顔子於聖人之言黙識心通無所疑問","source":"논어"},{"text":"故夫子云然其辭若有憾焉其實內深喜之○胡氏曰夫子之於回豈眞以助我","source":"논어"},{"text":"望之蓋聖人之謙德又以深贊顔氏云爾","source":"논어"},{"text":"11-04-01 子曰孝哉閔子騫人不間於其父母昆弟之言","source":"논어"},{"text":"胡氏曰父母兄弟稱其孝友人皆信之無異辭者蓋其孝友之實有以積於中而著","source":"논어"},{"text":"於外故夫子嘆而美之","source":"논어"},{"text":"11-05-01 南容三復白圭孔子以其兄之子妻之","source":"논어"},{"text":"詩大雅抑之篇曰白圭之玷尙可磨也斯言之玷不可爲也南容一日三復此言","source":"논어"},{"text":"事見家語蓋深有意於謹言也此邦有道所以不廢邦無道所以免禍故孔子以","source":"논어"},{"text":"兄子妻之○范氏曰言者行之表行者言之實未有易其言而能謹於行者南容","source":"논어"},{"text":"欲謹其言如此則必能謹其行矣","source":"논어"},{"text":"11-06-01 季康子問弟子孰爲好學孔子對曰有顔回者好學不幸短命死矣今","source":"논어"},{"text":"范氏曰哀公康子問同而對有詳略者臣之告君不可不盡若康子者必待其能問","source":"논어"},{"text":"乃告之此敎誨之道也","source":"논어"},{"text":"11-07-01 顔淵死顔路請子之車以謂之槨","source":"논어"},{"text":"顔路淵之父名無繇少孔子六歲孔子始敎而受學焉槨外棺也請爲槨欲賣車","source":"논어"},{"text":"11-07-02 子曰才不才亦各言其子也鯉也死有棺而無槨吾不徒行以謂之槨","source":"논어"},{"text":"以吾從大夫之後不可徒行也","source":"논어"},{"text":"鯉孔子之子伯魚也先孔子卒言鯉之才雖不及顔淵然己與顔路以父視之則皆","source":"논어"},{"text":"子也孔子時已致仕尙從大夫之列言後謙辭○胡氏曰孔子遇舊館人之喪嘗","source":"논어"},{"text":"脫驂以賻之矣今乃不許顔路之請何耶葬可以無槨驂可以脫而復求大夫不可","source":"논어"},{"text":"以徒行命車不可以與人而鬻諸市也且爲所識窮乏者得我而勉强以副其意豈誠","source":"논어"},{"text":"心與直道哉或者以爲君子行禮視吾之有無而已夫君子之用財視義之可否豈","source":"논어"},{"text":"獨視有無而已哉","source":"논어"},{"text":"11-08-01 顔淵死子曰噫天喪予天喪予","source":"논어"},{"text":"噫傷痛聲悼道無傳若天喪己也","source":"논어"},{"text":"11-09-01 顔淵死子哭之慟從者曰子慟矣","source":"논어"},{"text":"11-09-02 曰有慟乎","source":"논어"},{"text":"哀傷之至不自知也","source":"논어"},{"text":"11-09-03 非夫人之爲慟而誰爲","source":"논어"},{"text":"夫人謂顔淵言其死可惜哭之宜慟非他人之比也○胡氏曰慟惜之至施當其","source":"논어"},{"text":"可皆情性之正也","source":"논어"},{"text":"先進10章","source":"논어"},{"text":"11-10-01 顔淵死門人欲厚葬之子曰不可","source":"논어"},{"text":"喪具稱家之有無貧而厚葬不循理也故夫子止之","source":"논어"},{"text":"11-10-02 門人厚葬之","source":"논어"},{"text":"蓋顔路聽之","source":"논어"},{"text":"11-10-03 子曰回也視予猶父也予不得視猶子也非我也夫二三子也","source":"논어"},{"text":"嘆不得如葬鯉之得宜以責門人也","source":"논어"},{"text":"先進11章","source":"논어"},{"text":"11-11-01 季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死","source":"논어"},{"text":"問事鬼神蓋求所以奉祭祀之意而死者人之所必有不可不知皆切問也然非","source":"논어"},{"text":"誠敬足以事人則必不能事神非原始而知所以生則必不能反終而知所以死蓋幽","source":"논어"},{"text":"明始終初無二理但學之有序不可躐等故夫子告之如此○程子曰晝夜者","source":"논어"},{"text":"死生之道也知生之道則知死之道盡事人之道則盡事鬼之道死生人鬼一而二","source":"논어"},{"text":"二而一者也或言夫子不告子路不知此乃所以深告之也","source":"논어"},{"text":"先進12章","source":"논어"},{"text":"11-12-01 閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂","source":"논어"},{"text":"行行剛强之貌子樂者樂得英才而敎育之","source":"논어"},{"text":"11-12-02 若由也不得其死然","source":"논어"},{"text":"尹氏曰子路剛强有不得其死之理故因以戒之其後子路卒死於衛孔悝之難","source":"논어"},{"text":"洪氏曰漢書引此句上有曰字或云上文樂字卽曰字之誤","source":"논어"},{"text":"先進13章","source":"논어"},{"text":"11-13-01 魯人爲長府","source":"논어"},{"text":"長府藏名藏貨財曰府爲蓋改作之","source":"논어"},{"text":"11-13-02 閔子騫曰仍舊貫如之何何必改作","source":"논어"},{"text":"仍因也貫事也王氏曰改作勞民傷財在於得已則不如仍舊貫之善","source":"논어"},{"text":"11-13-03 子曰夫人不言言必有中","source":"논어"},{"text":"言不妄發發必當理惟有德者能之","source":"논어"},{"text":"先進14章","source":"논어"},{"text":"11-14-01 子曰由之瑟奚爲於丘之門","source":"논어"},{"text":"程子曰言其聲之不和與己不同也家語云子路鼓瑟有北鄙殺伐之聲蓋其氣質","source":"논어"},{"text":"剛勇而不足於中和故其發於聲者如此","source":"논어"},{"text":"11-14-02 門人不敬子路子曰由也升堂矣未入於室也","source":"논어"},{"text":"門人以夫子之言遂不敬子路故夫子釋之升堂入室喩入道之次第言子路之","source":"논어"},{"text":"學已造乎正大高明之域特未深入精微之奧耳未可以一事之失而遽忽之也","source":"논어"},{"text":"先進15章","source":"논어"},{"text":"11-15-01 子貢問師與商也孰賢子曰師也過商也不及","source":"논어"},{"text":"子張才高意廣而好爲苟難故常過中子夏篤信謹守而規模狹隘故常不及","source":"논어"},{"text":"11-15-02 曰然則師愈與","source":"논어"},{"text":"11-15-03 子曰過猶不及","source":"논어"},{"text":"道以中庸爲至賢知之過雖若勝於愚不肖之不及然其失中則一也○尹氏曰","source":"논어"},{"text":"中庸之爲德也其至矣乎夫過與不及均也差之毫釐繆以千里故聖人之敎抑","source":"논어"},{"text":"其過引其不及歸於中道而已","source":"논어"},{"text":"先進16章","source":"논어"},{"text":"11-16-01 季氏富於周公而求也爲之聚斂而附益之","source":"논어"},{"text":"周公以王室至親有大功位冢宰其富宜矣季氏以諸侯之卿而富過之非攘奪","source":"논어"},{"text":"其君刻剝其民何以得此冉求爲季氏宰又爲之急賦稅以益其富","source":"논어"},{"text":"11-16-02 子曰非吾徒也小子鳴鼓而攻之可也","source":"논어"},{"text":"非吾徒絶之也小子鳴鼓而攻之使門人聲其罪以責之也聖人之惡黨惡而害民也","source":"논어"},{"text":"如此然師嚴而友親故已絶之而猶使門人正之又見其愛人之無已也○范氏","source":"논어"},{"text":"曰冉有以政事之才施於季氏故爲不善至於如此由其心術不明不能反求諸","source":"논어"},{"text":"身而以仕爲急故也","source":"논어"},{"text":"先進17章","source":"논어"},{"text":"11-17-01 柴也愚","source":"논어"},{"text":"柴孔子弟子姓高字子羔愚者知不足而厚有餘家語記其足不履影啓蟄不殺","source":"논어"},{"text":"方長不折執親之喪泣血三年未嘗見齒避難而行不徑不竇可以見其爲人矣","source":"논어"},{"text":"11-17-02 參也魯","source":"논어"},{"text":"魯鈍也程子曰參也竟以魯得之又曰曾子之學誠篤而已聖門學者聰明才","source":"논어"},{"text":"辨不爲不多而卒傳其道乃質魯之人爾故學以誠實爲貴也尹氏曰曾子之才","source":"논어"},{"text":"魯故其學也確所以能深造乎道也","source":"논어"},{"text":"11-17-03 師也辟","source":"논어"},{"text":"辟便辟也謂習於容止少誠實也","source":"논어"},{"text":"11-17-04 由也喭","source":"논어"},{"text":"喭粗俗也傳稱喭者謂俗論也○楊氏曰四者性之偏語之使知自勵也吳氏曰","source":"논어"},{"text":"此章之首脫子曰二字或疑下章子曰當在此章之首而通爲一章","source":"논어"},{"text":"先進18章","source":"논어"},{"text":"11-18-01 子曰回也其庶乎屢空","source":"논어"},{"text":"庶近也言近道也屢空數至空匱也不以貧窶動心而求富故屢至於空匱也言","source":"논어"},{"text":"其近道又能安貧也","source":"논어"},{"text":"11-18-02 賜不受命而貨殖焉億則屢中","source":"논어"},{"text":"命謂天命貨殖貨財生殖也億意度也言子貢不如顔子之安貧樂道然其才識","source":"논어"},{"text":"之明亦能料事而多中也程子曰子貢之貨殖非若後人之豊財但此心未忘耳然","source":"논어"},{"text":"此亦子貢少時事至聞性與天道則不爲此矣○范氏曰屢空者簞食瓢飮屢絶而","source":"논어"},{"text":"不改其樂也天下之物豈有可動其中者哉貧富在天而子貢以貨殖爲心則是不","source":"논어"},{"text":"能安受天命矣其言而多中者億而已非窮理樂天者也夫子嘗曰賜不幸言而中","source":"논어"},{"text":"是使賜多言也聖人之不貴言也如是","source":"논어"},{"text":"先進19章","source":"논어"},{"text":"11-19-01 子張問善人之道子曰不踐迹亦不入於室","source":"논어"},{"text":"善人質美而未學者也程子曰踐迹如言循途守轍善人雖不必踐舊迹而自不","source":"논어"},{"text":"爲惡然亦不能入聖人之室也○張子曰善人欲仁而未志於學者也欲仁故雖","source":"논어"},{"text":"不踐成法亦不蹈於惡有諸己也由不學故無自而入聖人之室也","source":"논어"},{"text":"先進20章","source":"논어"},{"text":"11-20-01 子曰論篤是與君子者乎色莊者乎","source":"논어"},{"text":"言但以其言論篤實而與之則未知爲君子者乎爲色莊者乎言不可以言貌取人也","source":"논어"},{"text":"先進21章","source":"논어"},{"text":"11-21-01 子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸","source":"논어"},{"text":"子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子","source":"논어"},{"text":"曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之","source":"논어"},{"text":"兼人謂勝人也張敬夫曰聞義固當勇爲然有父兄在則有不可得而專者若不","source":"논어"},{"text":"稟命而行則反傷於義矣子路有聞未之能行惟恐有聞則於所當爲不患其不","source":"논어"},{"text":"能爲矣特患爲之之意或過而於所當稟命者有闕耳若冉求之資稟失之弱不患其","source":"논어"},{"text":"不稟命也患其於所當爲者逡巡畏縮而爲之不勇耳聖人一進之一退之所以約之","source":"논어"},{"text":"於義理之中而使之無過不及之患也","source":"논어"},{"text":"先進22章","source":"논어"},{"text":"11-22-01 子畏於匡顔淵後子曰吾以女爲死矣曰子在回何敢死","source":"논어"},{"text":"後謂相失在後何敢死謂不赴鬪而必死也胡氏曰先王之制民生於三事之如一","source":"논어"},{"text":"惟其所在則致死焉況顔淵之於孔子恩義兼盡又非他人之爲師弟子者而已卽","source":"논어"},{"text":"夫子不幸而遇難回必捐生以赴之矣捐生以赴之幸而不死則必上告天子下告","source":"논어"},{"text":"方伯請討以復讐不但已也夫子而在則回何爲而不愛其死以犯匡人之鋒乎","source":"논어"},{"text":"先進23章","source":"논어"},{"text":"11-23-01 季子然問仲由冉求可謂大臣與","source":"논어"},{"text":"子然季氏子弟自多其家得臣二子故問之","source":"논어"},{"text":"11-23-02 子曰吾以子爲異之問曾由與求之問","source":"논어"},{"text":"異非常也曾猶乃也輕二子以抑季然也","source":"논어"},{"text":"11-23-03 所謂大臣者以道事君不可則止","source":"논어"},{"text":"以道事君者不從君之欲不可則止者必行己之志","source":"논어"},{"text":"11-23-04 今由與求也可謂具臣矣","source":"논어"},{"text":"具臣謂備臣數而已","source":"논어"},{"text":"11-23-05 曰然則從之者與","source":"논어"},{"text":"意二子旣非大臣則從季氏之所爲而已","source":"논어"},{"text":"11-23-06 子曰殺父與君亦不從也","source":"논어"},{"text":"言二子雖不足於大臣之道然君臣之義則聞之熟矣弑逆大故必不從之蓋深許","source":"논어"},{"text":"二子以死難不可奪之節","source":"논어"},{"text":"而又以陰折季氏不臣之心也","source":"논어"},{"text":"季氏專權僭竊","source":"논어"},{"text":"二子仕其家而不能正也知其不可而不能止也可謂具臣矣是時季氏已有無君之","source":"논어"},{"text":"心故自多其得人意其可使從己也故曰弑父與君亦不從也其庶乎二子可免","source":"논어"},{"text":"先進24章","source":"논어"},{"text":"11-24-01 子路使子羔爲費宰","source":"논어"},{"text":"子路爲季氏宰而擧之也","source":"논어"},{"text":"11-14-02 子曰賊夫人之子","source":"논어"},{"text":"賊害也言子羔質美而未學遽使治民適以害之","source":"논어"},{"text":"11-24-03 子路曰有民人焉有社稷焉何必讀書然後爲學","source":"논어"},{"text":"言治民事神皆所以爲學","source":"논어"},{"text":"11-24-04 子曰是故惡夫佞者","source":"논어"},{"text":"治民事神固學者事然必學之已成然後可仕以行其學若初未嘗學而使之卽仕","source":"논어"},{"text":"以爲學其不至於慢神而虐民者幾希矣子路之言非其本意但理屈詞窮而取辨","source":"논어"},{"text":"於口以禦人耳故夫子不斥其非而特惡其佞也○范氏曰古者學而後入政未","source":"논어"},{"text":"聞以政學者也蓋道之本在於修身而後及於治人其說具於方冊讀而知之然後能","source":"논어"},{"text":"行何可以不讀書也子路乃欲使子羔以政爲學失先後本末之序矣不知其過而","source":"논어"},{"text":"以口給禦人故夫子惡其佞也","source":"논어"},{"text":"先進25章","source":"논어"},{"text":"11-25-01 子路曾晳冉有公西華侍坐","source":"논어"},{"text":"晳曾參父名點","source":"논어"},{"text":"11-25-02 子曰以吾一日長乎爾毋吾以也","source":"논어"},{"text":"言我雖年少長於女然汝勿以我長而難言蓋誘之盡言以觀其志而聖人和氣謙","source":"논어"},{"text":"德於此亦可見矣","source":"논어"},{"text":"11-25-03 居則曰不吾知也如或知爾則何以哉","source":"논어"},{"text":"言女平居則言人不知我如或有人知女則女將何以爲用也","source":"논어"},{"text":"11-25-04 子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以饑饉","source":"논어"},{"text":"由也爲之比及三年可使有勇且知方也夫子哂之","source":"논어"},{"text":"率爾輕遽之貌攝管束也二千五百人爲師五百人爲旅因仍也穀不熟曰饑","source":"논어"},{"text":"菜不熟曰饉方向也謂向義也民向義則能親其上死其長矣哂微笑也","source":"논어"},{"text":"11-25-05 求爾何如對曰方六七十如五六十求也爲之比及三年可使足民如","source":"논어"},{"text":"其禮樂以俟君子","source":"논어"},{"text":"求爾何如孔子問也下放此方六七十里小國也如猶或也五六十里則又小矣","source":"논어"},{"text":"足富足也俊君子言非己所能冉有謙退又以子路見哂故其辭益遜","source":"논어"},{"text":"11-25-06 赤爾何如對曰非曰能之願學焉宗廟之事如會同端章甫願爲小相","source":"논어"},{"text":"公西華志於禮樂之事","source":"논어"},{"text":"嫌以君子自居","source":"논어"},{"text":"將言己志而先爲遜辭","source":"논어"},{"text":"言未能而願學也","source":"논어"},{"text":"宗廟之事謂祭祀諸侯時見曰會衆覜曰同端玄端服章甫禮冠相贊君之禮者","source":"논어"},{"text":"言小亦謙辭","source":"논어"},{"text":"11-25-07 點爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎","source":"논어"},{"text":"亦各言其志也曰莫春者春服旣成冠者五六人童子六七人浴乎沂風乎舞雩","source":"논어"},{"text":"詠而歸夫子喟然嘆曰吾與點也","source":"논어"},{"text":"四子侍坐以齒爲序則點當次對以方鼓瑟故孔子先問求赤而後及點也希間","source":"논어"},{"text":"歇也作起也撰具也莫春和煦之時春服單袷之衣浴盥濯也今上巳祓除是","source":"논어"},{"text":"也沂水名在魯城南地志以爲有溫泉焉理或然也風乘凉也舞雩祭天禱雨","source":"논어"},{"text":"之處有壇墠樹木也詠歌也曾點之學蓋有以見夫人欲盡處天理流行隨處充","source":"논어"},{"text":"滿無少欠闕故其動靜之際從容如此而其言志則又不過卽其所居之位樂其日","source":"논어"},{"text":"用之常初無舍己爲人之意而其胸次悠然直與天地萬物上下同流各得其所之","source":"논어"},{"text":"妙隱然自見於言外視三子規規於事爲之末者其氣象不侔矣故夫子歎息而深","source":"논어"},{"text":"許之而門人記其本末獨加詳焉蓋亦有以識此矣","source":"논어"},{"text":"11-25-08 三子者出曾晳後曾晳曰夫三子者之言何如子曰亦各言其志也已","source":"논어"},{"text":"矣曰夫子何哂由也","source":"논어"},{"text":"點以子路之志乃所優爲而夫子哂之故請其說","source":"논어"},{"text":"11-25-09 曰爲國以禮其言不讓是故哂之","source":"논어"},{"text":"夫子蓋許其能特哂其不遜","source":"논어"},{"text":"11-25-10 唯求則非邦也與安見方六七十如五六十而非邦也者","source":"논어"},{"text":"曾點以冉求亦欲爲國而不見哂故微問之而夫子之答無貶詞蓋亦許之","source":"논어"},{"text":"11-25-11 唯赤則非邦也與宗廟會同非諸侯而何赤也爲之小孰能爲之大","source":"논어"},{"text":"此亦曾晳問而夫子答也孰能爲之大言無能出其右者亦許之之詞○程子曰古","source":"논어"},{"text":"之學者優柔厭飫有先後之序如子路冉有公西赤言志如此夫子許之亦以此自","source":"논어"},{"text":"是實事後之學者好高如人游心千里之外然自身却只在此又曰孔子與點","source":"논어"},{"text":"蓋與聖人之志同便是堯舜氣象也誠異三子者之撰特行有不掩焉耳此所謂狂","source":"논어"},{"text":"也子路等所見者小子路只爲不達爲國以禮道理是以哂之若達却便是這氣象","source":"논어"},{"text":"也又曰三子皆欲得國而治之故夫子不取曾點狂者也未必能爲聖人之事","source":"논어"},{"text":"而能知夫子之志故曰浴乎沂風乎舞雩詠而歸言樂而得其所也孔子之志在","source":"논어"},{"text":"於老者安之朋友信之少者懷之使萬物莫不遂其性曾點知之故孔子喟然嘆曰","source":"논어"},{"text":"吾與點也又曰曾點漆雕開已見大意","source":"논어"},{"text":"凡二十四章","source":"논어"},{"text":"12-01-01 顔淵問仁子曰克己復禮爲仁一日克己復禮天下歸仁焉爲仁由己而","source":"논어"},{"text":"仁者本心之全德克勝也己謂身之私欲也復反也禮者天理之節文也爲仁","source":"논어"},{"text":"者所以全其心之德也蓋心之全德莫非天理而亦不能不壞於人欲故爲仁者必","source":"논어"},{"text":"有以勝私欲而復於禮則事皆天理而本心之德復全於我矣歸猶與也又言一日","source":"논어"},{"text":"克己復禮則天下之人皆與其仁極言其效之甚速而至大也又言爲仁由己而非他","source":"논어"},{"text":"人所能預又見其機之在我而無難也日日克之不以爲難則私欲淨盡天理流行","source":"논어"},{"text":"而仁不可勝用矣程子曰非禮處便是私意旣是私意如何得仁須是克盡己私皆","source":"논어"},{"text":"歸於禮方始是仁又曰克己復禮則事事皆仁故曰天下歸仁謝氏曰克己須從","source":"논어"},{"text":"性偏難克處克將去","source":"논어"},{"text":"12-01-02 顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵","source":"논어"},{"text":"曰回雖不敏請事斯語矣","source":"논어"},{"text":"目條件也顔淵聞夫子之言則於天理人欲之際已判然矣故不復有所疑問而直","source":"논어"},{"text":"請其條目也非禮者己之私也勿者禁止之辭是人心之所以爲主而勝私復禮之","source":"논어"},{"text":"機也私勝則動容周旋無不中禮而日用之間莫非天理之流行矣事如事事之事","source":"논어"},{"text":"請事斯語顔淵黙識其理又自知其力有以勝之故直以爲己任而不疑也○程","source":"논어"},{"text":"子曰顔淵問克己於復禮之目子曰非禮勿視非禮勿聽非禮勿言非禮勿動四","source":"논어"},{"text":"者身之用也由乎中而應乎外制於外所以養其中也顔淵事斯語所以進於聖人","source":"논어"},{"text":"後之學聖人者宜服膺而勿失也因箴以自警其視箴曰心兮本虛應勿無迹操之","source":"논어"},{"text":"有要視爲之則蔽交於前其中則遷制之於外以安其內克己復禮久而誠矣其","source":"논어"},{"text":"聽箴曰人有秉彛本乎天性知誘物化遂亡其正卓彼先學知止有定閑邪存誠","source":"논어"},{"text":"非禮勿聽其言箴曰人心之動因言以宣發禁躁妄內邪靜專矧是樞機興戎出","source":"논어"},{"text":"好吉凶榮辱惟其所召傷易則誕傷煩則支己肆勿忤出悖來違非法不道欽哉","source":"논어"},{"text":"訓辭其動箴曰哲人知幾誠之於思志士勵行守之於爲順理則裕從欲惟危造","source":"논어"},{"text":"次克念戰兢自持習與性成聖賢同歸愚按此章問答乃傳授心法切要之言非","source":"논어"},{"text":"至明不能察其幾非至健不能致其決故惟顔子得聞之而凡學者亦不可以不勉","source":"논어"},{"text":"也程子之箴發明親切學者尤宜深玩","source":"논어"},{"text":"12-02-01 仲弓問仁子曰出門如見大賓使民如承大祭己所不欲勿施於人在","source":"논어"},{"text":"邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣","source":"논어"},{"text":"敬以持己恕以及物則私意無所容而心德全矣內外無怨亦以其效言之使以自","source":"논어"},{"text":"考也○程子曰孔子言仁只說出門如見大賓使民如承大祭看其氣象便須心廣","source":"논어"},{"text":"體胖動容周旋中體唯謹獨便是守之之法或問出使民之時如此可也未出門","source":"논어"},{"text":"使民之時如之何曰此儼若思時也有諸中而後見於外觀其出門使民之時其敬","source":"논어"},{"text":"如此則前乎此者敬可知矣非因出門使民然後有此敬也愚按克己復禮乾道","source":"논어"},{"text":"也主敬行恕坤道也顔冉之學其高下淺深於此可見然學者誠能從事於敬恕之","source":"논어"},{"text":"間而有得焉亦將無己之可克矣","source":"논어"},{"text":"12-03-01 司馬牛問仁","source":"논어"},{"text":"司馬牛孔子弟子名犁向魋之弟","source":"논어"},{"text":"12-03-02 子曰仁者其言也訒","source":"논어"},{"text":"訒忍也難也仁者心存而不放故其言若有所忍而不易發蓋其德之一端也","source":"논어"},{"text":"夫子以牛多言而躁故告之以此使其於此而謹之則所以爲仁之方不外是矣","source":"논어"},{"text":"12-03-03 曰其言也訒斯謂之仁矣乎子曰爲之難言之得無訒乎","source":"논어"},{"text":"牛意仁道至大不但如夫子之所言故夫子又告之以此蓋心常存故事不苟事不","source":"논어"},{"text":"苟故其言自有不得而易者非强閉之而不出也楊氏曰觀此及下章再問之語牛","source":"논어"},{"text":"之易其言可知○程子曰雖爲司馬牛多言故及此然聖人之言亦止此爲是愚","source":"논어"},{"text":"謂牛之爲人如此若不告之以其病之所切而泛以爲仁之大槪語之則以彼之躁","source":"논어"},{"text":"必不能深思以去其病而終無自以入德矣故其告之如此蓋聖人之言雖有高下","source":"논어"},{"text":"大小之不同然其切於學者之身而皆爲入德之要則又初不異也讀者其致思焉","source":"논어"},{"text":"12-04-01 司馬牛問君子子曰君子不憂不懼","source":"논어"},{"text":"向魋作亂牛常憂懼故夫子告之以此","source":"논어"},{"text":"12-04-02 曰不憂不懼斯謂之君子矣乎子曰內省不疚夫何憂何懼","source":"논어"},{"text":"牛之再問猶前章之意故復告之以此疚病也言由其平日所爲無愧於心故能","source":"논어"},{"text":"內省不疚而自無憂懼未可遽以爲易而忽之也○晁氏曰不憂不懼由乎德全而","source":"논어"},{"text":"無疵故無入而不自得非實有憂懼而强排遣之也","source":"논어"},{"text":"12-05-01 司馬牛憂曰人皆有兄弟我獨亡","source":"논어"},{"text":"牛有兄弟而云然者憂其爲亂而將死也","source":"논어"},{"text":"12-05-02 子夏曰商聞之矣","source":"논어"},{"text":"蓋聞之夫子","source":"논어"},{"text":"12-05-03 死生有命富貴在天","source":"논어"},{"text":"命稟於有生之初非今所能移天莫之爲而爲非我所能必但當順受而已","source":"논어"},{"text":"12-05-04 君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟","source":"논어"},{"text":"又當修其在己者","source":"논어"},{"text":"又言苟能持己以敬而不間斷","source":"논어"},{"text":"接人以恭而有節文","source":"논어"},{"text":"則天下之人皆愛敬之如兄弟矣蓋子夏欲以寬牛之憂而爲是不得已之辭讀者","source":"논어"},{"text":"不以辭害意可也○胡氏曰子夏四海皆兄弟之言特以廣司馬牛之意意圓而語","source":"논어"},{"text":"滯者也唯聖人則無此病矣且子夏知此而以哭子喪明則以蔽於愛而昧於理是以","source":"논어"},{"text":"不能踐其言爾","source":"논어"},{"text":"12-06-01 子張問明子曰浸潤之譖膚受之愬不行焉可謂明也已矣浸潤之譖","source":"논어"},{"text":"膚受之愬不行焉可謂遠也已矣","source":"논어"},{"text":"浸潤如水之浸灌滋潤漸漬而不驟也讚毁人之行也膚受謂肌膚所受利害切身","source":"논어"},{"text":"如易所謂剝床以膚切近災者也愬愬己之寃也毁人者漸漬而不驟則聽者不覺","source":"논어"},{"text":"其入而信之深矣","source":"논어"},{"text":"愬寃者急迫而切身則聽者不及致詳而發之暴矣","source":"논어"},{"text":"察之則可見其心之明而不蔽於近矣此亦必因子張之失而告之故其辭繁而不殺","source":"논어"},{"text":"以致丁寧之意云○楊氏曰驟而語之與利害不切於身者不行焉有不待明者","source":"논어"},{"text":"能之也故浸潤之譖膚受之愬不行然後謂之明而又謂之遠遠則明之至也書","source":"논어"},{"text":"曰視遠惟明","source":"논어"},{"text":"12-07-01 子貢問政子曰足食足兵民信之矣","source":"논어"},{"text":"言倉稟實而武備修然後敎化行而民信於我不離叛也","source":"논어"},{"text":"12-07-02 子貢曰必不得已而去於斯三者何先曰去兵","source":"논어"},{"text":"言食足而信孚則無兵而守固矣","source":"논어"},{"text":"12-07-03 子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不","source":"논어"},{"text":"民無食必死然死者人之所必不免無信則雖生而無以自立不若死之爲安故","source":"논어"},{"text":"寧死而不失信於民使民亦寧死而不失信於我也○程子曰孔門弟子善問直窮","source":"논어"},{"text":"到底如此章者非子貢不能問非聖人不能答也愚謂以人情而言則兵食足而","source":"논어"},{"text":"後吾之信可以孚於民以民德而言則信本人之所固有非兵食所得而先也是以","source":"논어"},{"text":"爲政者當身率其民而以死守之不以危急而可棄也","source":"논어"},{"text":"12-08-01 棘子成曰君子質而已矣何以文爲","source":"논어"},{"text":"棘子成衛大夫疾時人文勝故爲此言","source":"논어"},{"text":"12-08-02 子貢曰惜乎夫子之說君子也駟不及舌","source":"논어"},{"text":"言子成之言乃君子之意然言出於舌則駟馬不能追之又惜其失言也","source":"논어"},{"text":"12-08-03 文猶質也質猶文也虎豹之鞟 猶犬羊之鞟","source":"논어"},{"text":"鞟皮去毛者也言文質等耳不可相無若必盡去其文而獨存其質則君子小人無","source":"논어"},{"text":"以辨矣夫棘子成矯當時之弊固失之過而子貢矯子成之弊又無本末輕重之差","source":"논어"},{"text":"12-09-01 哀公問於有若曰年饑用不足如之何","source":"논어"},{"text":"稱有若者君臣之詞用謂國用公意蓋欲加賦以足用也","source":"논어"},{"text":"12-09-02 有若對曰盍徹乎","source":"논어"},{"text":"徹通也均也周制一夫受田百畝而與同溝共井之人通力合作計畝均收大率","source":"논어"},{"text":"民得其九公取其一故謂之徹魯自宣公稅畝又逐畝什取其一則爲什而取二矣","source":"논어"},{"text":"故有若請但專行徹法欲公節用以厚民也","source":"논어"},{"text":"12-09-03 曰二吾猶不足如之何其徹也","source":"논어"},{"text":"二卽所謂什二也公以有若不喩其旨故言此以示加賦之意","source":"논어"},{"text":"12-09-04 對曰百姓足君孰與不足百姓不足君孰與足","source":"논어"},{"text":"民富則君不至獨貧民貧則君不能獨富有若深言君民一體之意以止公之厚斂爲","source":"논어"},{"text":"人上者所宜深念也○楊氏曰仁政必自經界始經界正而後井地均穀祿平而","source":"논어"},{"text":"軍國之需皆量是以爲出焉故一徹而百度擧矣上下寧憂不足乎以二猶不足而敎","source":"논어"},{"text":"之徹疑若迂矣然什一天下之中正多則桀寡則貊不可改也後世不究其本","source":"논어"},{"text":"而唯末之圖故征斂無藝費出無經而上下困矣又惡知盍徹之當務而不爲迂乎","source":"논어"},{"text":"顔淵10章","source":"논어"},{"text":"12-10-01 子張問崇德辨惑子曰主忠信徙義崇德也","source":"논어"},{"text":"主忠信則本立徙義則日新","source":"논어"},{"text":"12-10-02 愛之欲其生惡之欲其死旣欲其生又欲其死是惑也","source":"논어"},{"text":"愛惡人之常情也然人之生死有命非可得而欲也以愛惡而欲其生死則惑矣旣","source":"논어"},{"text":"欲其生又欲其死則惑之甚也","source":"논어"},{"text":"12-10-03 誠不以富亦祗以異","source":"논어"},{"text":"此詩小雅我行其野之詞也舊說夫子引之以明欲其生死者不能使之生死如此","source":"논어"},{"text":"詩所言不足以致富而適足以取異也程子曰此錯簡當在第十六篇齊景公有馬","source":"논어"},{"text":"千駟之上因此下文亦有齊景公字而誤也○楊氏曰堂堂乎張也難與並爲仁矣","source":"논어"},{"text":"則非誠善補過不蔽於私者故告之如此","source":"논어"},{"text":"顔淵11章","source":"논어"},{"text":"12-11-01 齊景公問政於孔子","source":"논어"},{"text":"齊景公名杵臼魯昭公末年孔子適齊","source":"논어"},{"text":"12-11-02 孔子對曰君君臣臣父父子子","source":"논어"},{"text":"此人道之大經政事之根本也是時景公失政而大夫陳氏厚施於國景公又多內","source":"논어"},{"text":"嬖而不立太子其君臣父子之間皆失其道故夫子告之以此","source":"논어"},{"text":"12-11-03 公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸","source":"논어"},{"text":"景公善孔子之言而不能用其後果以繼嗣不定啓陳氏弑君簒國之禍○楊氏曰","source":"논어"},{"text":"君之所以君臣之所以臣父之所以父子之所以子是必有道矣景公知善夫子之","source":"논어"},{"text":"言而不知反求其所以然蓋悅而不繹者齊之所以卒於亂也","source":"논어"},{"text":"顔淵12章","source":"논어"},{"text":"12-12-01 子曰片言可以折獄者其由也與","source":"논어"},{"text":"片言半言折斷也子路忠信明決故言出而人信服之不待其辭之畢也","source":"논어"},{"text":"12-12-02 子路無宿諾","source":"논어"},{"text":"宿留也猶宿怨之宿急於踐言不留其諾也記者因夫子之言而記此以見子路之","source":"논어"},{"text":"所以取信於人者由其養之有素也○尹氏曰小邾射以句繹奔魯曰使季子路要","source":"논어"},{"text":"我吾無盟矣千乘之國不信其盟而而信子路之一言其見信於人可知矣一言","source":"논어"},{"text":"而折獄者信在言前人自信之故也不留諾所以全其信也","source":"논어"},{"text":"顔淵13章","source":"논어"},{"text":"12-13-01 子曰聽訟吾猶人也必也使無訟乎","source":"논어"},{"text":"范氏曰聽訟者治其末塞其流也正其本淸其源則無訟矣○楊氏曰子路片","source":"논어"},{"text":"言可以折獄而不知以禮遜爲國則未能使民無訟者也故又記孔子之言以見聖","source":"논어"},{"text":"人不以聽訟爲難而以使民無訟爲貴","source":"논어"},{"text":"顔淵14章","source":"논어"},{"text":"12-14-01 子張問政子曰居之無倦行之以忠","source":"논어"},{"text":"居謂存諸心無倦則始終如一行謂發於事以忠則表裏如一○程子曰子張少","source":"논어"},{"text":"仁無誠心愛民則必倦而不盡心故告之以此","source":"논어"},{"text":"顔淵15章","source":"논어"},{"text":"12-15-01 子曰博學於文約之以禮亦可以弗畔矣夫","source":"논어"},{"text":"顔淵16章","source":"논어"},{"text":"12-16-01 子曰君子成人之美不成人之惡小人反是","source":"논어"},{"text":"成者誘掖獎勸以成其事也君子小人所存旣有厚薄之殊而其所好又有善惡","source":"논어"},{"text":"之異故其用心不同如此","source":"논어"},{"text":"顔淵17章","source":"논어"},{"text":"12-17-01 季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正","source":"논어"},{"text":"范氏曰未有己不正而能正人者○胡氏曰魯自中葉政由大夫家臣效尤據邑","source":"논어"},{"text":"背叛不正甚矣故孔子以是告之欲康子以正自克而改三家之故惜乎康子之","source":"논어"},{"text":"溺於利欲而不能也","source":"논어"},{"text":"顔淵18章","source":"논어"},{"text":"12-18-01 季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊","source":"논어"},{"text":"言子不貪慾則雖賞民使之爲盜民亦知恥而不竊○胡氏曰季氏竊柄康子奪","source":"논어"},{"text":"嫡民之爲盜固其所也盍亦反其本邪孔子以不欲啓之其旨深矣奪嫡事見春秋","source":"논어"},{"text":"顔淵19章","source":"논어"},{"text":"12-19-01 季康子問政於孔子曰如殺無道以就有道何如孔子對曰子爲政焉用","source":"논어"},{"text":"殺子欲善而民善矣君子之德風小人之德草草上之風必偃","source":"논어"},{"text":"爲政者民所視效何以殺爲欲善則民善矣上一作尙加也偃仆也○尹氏曰","source":"논어"},{"text":"殺之爲言豈爲人上之語哉以身敎者從以言敎者訟而況於殺乎","source":"논어"},{"text":"顔淵20章","source":"논어"},{"text":"12-20-01 子張問士何如斯可謂之達矣","source":"논어"},{"text":"達者德孚於人而行無不得之謂","source":"논어"},{"text":"12-20-02 子曰何哉爾所謂達者","source":"논어"},{"text":"子張務外夫子蓋已知其發問之意故反詰之將以發其病而藥之也","source":"논어"},{"text":"12-20-03 子張對曰在邦必聞在家必聞","source":"논어"},{"text":"言名譽著聞也","source":"논어"},{"text":"12-20-04 子曰是聞也非達也","source":"논어"},{"text":"聞與達相似而不同乃誠僞之所以分學者不可不審也故夫子旣明辨之下文","source":"논어"},{"text":"12-20-05 夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達","source":"논어"},{"text":"內主忠信而所行合宜審於接物而卑以自牧皆自修於內不求人知之事然德","source":"논어"},{"text":"修於己而人信之則所行自無窒礙矣","source":"논어"},{"text":"12-20-06 夫聞也者色取仁而行違居之不疑在邦必聞在家必聞","source":"논어"},{"text":"善其顔色以取於仁而行實背之又自以爲是而無所忌憚此不務實而專務求名","source":"논어"},{"text":"者故虛譽雖隆而實德則病矣○程子曰學者須是務實不要近名有意近名","source":"논어"},{"text":"大本已失更學何事爲名而學則是僞也今之學者大抵爲名爲名與爲利雖淸","source":"논어"},{"text":"濁不同然其利心則一也尹氏曰子張之學病在乎不務實故孔子告之皆篤實","source":"논어"},{"text":"之事充乎內而發乎外者也當時門人親受聖人之敎而差失有如此者況後世乎","source":"논어"},{"text":"顔淵21章","source":"논어"},{"text":"12-21-01 樊遲從遊於舞雩之下曰敢問崇德修慝辨惑","source":"논어"},{"text":"胡氏曰慝之字從心從匿蓋惡之匿於心者修者治而去之","source":"논어"},{"text":"12-21-02 子曰善哉問","source":"논어"},{"text":"善其切於爲己","source":"논어"},{"text":"12-21-03 先事後得非崇德與攻其惡無攻人之惡非修慝與一朝之忿忘其身","source":"논어"},{"text":"以及其親非惑與","source":"논어"},{"text":"先事後得猶言先難後獲也爲所當爲而不計其功則德日積而不自知矣專於治","source":"논어"},{"text":"己而不責人則己之惡無所匿矣知一朝之忿爲甚微而禍及其親爲甚大則有以","source":"논어"},{"text":"辨惑而懲其忿矣樊遲麤鄙近利故告之以此三者皆所以救其失也○范氏曰","source":"논어"},{"text":"先事後得上義而下利也人惟有利欲之心故德不崇惟不自省己過而知人之過","source":"논어"},{"text":"故慝不修感物而易動者莫如忿忘其身以及其親惑之甚者也惑之甚者必起","source":"논어"},{"text":"於細微能辨之於早則不至於大惑矣故懲忿所以辨也","source":"논어"},{"text":"顔淵22章","source":"논어"},{"text":"12-22-01 樊遲問仁子曰愛人問知子曰知人","source":"논어"},{"text":"愛人仁之施知人知之務","source":"논어"},{"text":"12-22-02 樊遲未達","source":"논어"},{"text":"曾氏曰遲之意蓋以愛欲其周而知有所擇故疑二者之相悖耳","source":"논어"},{"text":"12-22-03 子曰擧直錯諸枉能使枉者直","source":"논어"},{"text":"擧直錯枉者知也使枉者直則仁矣如此則二者不惟不相悖而反相爲用矣","source":"논어"},{"text":"12-22-04 樊遲退見子夏曰鄕也吾見於夫子而問知子曰擧直錯諸枉能使枉","source":"논어"},{"text":"者直何謂也","source":"논어"},{"text":"遲以夫子之言專爲知者之事又未達所以能使枉者直之理","source":"논어"},{"text":"12-22-05 子夏曰富哉言乎","source":"논어"},{"text":"歎其所包者廣不止言知","source":"논어"},{"text":"12-22-06 舜有天下選於衆擧皐陶不仁者遠矣湯有天下選於衆擧伊尹不","source":"논어"},{"text":"伊尹湯之相也不仁者遠言人皆化而爲仁不見有不仁者若其遠去爾所謂使枉","source":"논어"},{"text":"者直也子夏蓋有以知夫子之兼仁知而言矣○程子曰聖人之語因人而變化雖","source":"논어"},{"text":"若有淺近者而其包含無所不盡觀於此章可見矣非若他人之言語近則遺遠","source":"논어"},{"text":"語遠則不知近也尹氏曰學者之問也不獨欲聞其說又必欲知其方不獨欲知其","source":"논어"},{"text":"方又必欲爲其事如樊遲之問仁知也夫子告之盡矣樊遲未達故又問焉而猶","source":"논어"},{"text":"未知其何以爲之也及退而問諸子夏然後有以知之使其未喩則必將復問矣旣","source":"논어"},{"text":"問於師又辨於友當時學者之務實也如是","source":"논어"},{"text":"顔淵23章","source":"논어"},{"text":"12-23-01 子貢問友子曰忠告而善道之不可則止無自辱焉","source":"논어"},{"text":"友所以輔仁故盡其心以告之善其說以道之然以義合者也故不可則止若以","source":"논어"},{"text":"數而見疏則自辱矣","source":"논어"},{"text":"顔淵24章","source":"논어"},{"text":"12-24-01 曾子曰君子以文會友以友輔仁","source":"논어"},{"text":"講學以會友則道益明取善以輔仁則德日進","source":"논어"},{"text":"13-01-01 子路問政子曰先之勞之","source":"논어"},{"text":"蘇氏曰凡民之行以身先之則不令而行凡民之事以身勞之則雖勤不怨","source":"논어"},{"text":"13-01-02 請益曰無倦","source":"논어"},{"text":"吳氏曰勇者喜於有爲而不能持久故以此告之○程子曰子路問政孔子旣告","source":"논어"},{"text":"之矣及請益則曰無倦而已未嘗復有所告姑使之深思也","source":"논어"},{"text":"13-02-01 仲弓爲季氏宰問政子曰先有司赦小過擧賢才","source":"논어"},{"text":"有司衆職也宰兼衆職然事必先之於彼而後考其成功則己不勞而事畢擧矣","source":"논어"},{"text":"過失誤也大者於事或有所害不得不懲小者赦之則刑不濫而人心悅矣賢有","source":"논어"},{"text":"德者才有能者擧而用之則有司皆得其人而政益修矣","source":"논어"},{"text":"13-02-02 曰焉知賢才而擧之曰擧爾所知爾所不知人其舍諸","source":"논어"},{"text":"仲弓慮無以盡知一時之賢才故孔子告之以此程子曰人各親其親然後不獨親","source":"논어"},{"text":"其親仲弓曰焉知賢才而擧之子曰擧爾所知爾所不知人其舍諸便見仲弓與","source":"논어"},{"text":"聖人用心之大小推此義則一心可以興邦一心可以喪邦只在公私之間爾○范","source":"논어"},{"text":"氏曰不先有司則君行臣職矣不赦小過則下無全人矣不擧賢才則百職廢矣","source":"논어"},{"text":"失此三者不可以爲季氏宰況天下乎","source":"논어"},{"text":"13-03-01 子路曰衛君待子而爲政子將奚先","source":"논어"},{"text":"衛君謂出公輒也是時魯哀公之十年孔子自楚反乎衛","source":"논어"},{"text":"13-03-02 子曰必也正名乎","source":"논어"},{"text":"是時出公不父其父而禰其祖名實紊矣故孔子以正名爲先謝氏曰正名雖爲","source":"논어"},{"text":"衛君而言然爲政之道皆當以此爲先","source":"논어"},{"text":"13-03-03 子路曰有是哉子之迂也奚其正","source":"논어"},{"text":"迂謂遠於事情言非今日之急務也","source":"논어"},{"text":"13-03-04 子曰野哉由也君子於其所不知蓋闕如也","source":"논어"},{"text":"野謂鄙俗責其不能闕疑而率爾妄對也","source":"논어"},{"text":"13-03-05 名不正則言不順言不順則事不成","source":"논어"},{"text":"楊氏曰名不當其實則言不順言不順則無以考實而事不成","source":"논어"},{"text":"13-03-06 事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足","source":"논어"},{"text":"范氏曰事得其序之謂禮物得其和之謂樂事不成則無序而不和故禮樂不興","source":"논어"},{"text":"禮樂不興則施之政事皆失其道故刑罰不中","source":"논어"},{"text":"13-03-07 故君子名之必可言也言之必可行也君子於其言無所苟而已矣","source":"논어"},{"text":"程子曰名實相須一事苟則其餘皆苟矣○胡氏曰衛世子蒯聵恥其母南子之淫","source":"논어"},{"text":"亂欲殺之不果而出奔靈公欲立公子郢郢辭公卒夫人立之又辭乃立蒯聵之","source":"논어"},{"text":"子輒以拒蒯聵夫蒯聵欲殺母得罪於父而輒據國以拒父皆無父之人也其不","source":"논어"},{"text":"可有國也明矣夫子爲政而以正名爲先必將具其事之本末告諸天王請于方伯","source":"논어"},{"text":"命公子郢而立之則人倫正天理得名正言順而事成矣夫子告之之詳如此而子","source":"논어"},{"text":"路終不喩也故事輒不去卒死其難徒知食焉不避其難之爲義而不知食輒之食","source":"논어"},{"text":"13-04-01 樊遲請學稼子曰吾不如老農請學爲圃曰吾不如老圃","source":"논어"},{"text":"種五穀曰稼種蔬菜曰圃","source":"논어"},{"text":"13-04-02 樊遲出子曰小人哉樊須也","source":"논어"},{"text":"小人謂細民孟子所爲小人之事者也","source":"논어"},{"text":"13-04-03 上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情","source":"논어"},{"text":"夫如是則四方之民襁負其子而至矣焉用稼","source":"논어"},{"text":"禮義信大人之事也好義則事合宜情誠實也敬服用情蓋各以其類而應也襁","source":"논어"},{"text":"織縷爲之以約小兒於背者○楊氏曰樊須遊聖人之門而問稼圃志則陋矣辭而","source":"논어"},{"text":"闢之可也待其出而後言其非何也蓋於其問也自謂農圃之不如則拒之者至矣","source":"논어"},{"text":"須之學疑不及此而不能問不能以三隅反矣故不復及其旣出則懼其終不喩","source":"논어"},{"text":"也求老農老圃而學焉則其失愈遠矣故復言之使知前所言者意有在也","source":"논어"},{"text":"13-05-01 子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以爲","source":"논어"},{"text":"專獨也詩本人情該物理可以驗風俗之盛衰見政治之得失其言溫厚和平長","source":"논어"},{"text":"於風諭故誦之者必達於政而能言也○程子曰窮經將以致用也世之誦詩者","source":"논어"},{"text":"果能從政而專對乎然則其所學者章句之末耳此學者之大患也","source":"논어"},{"text":"13-06-01 子曰其身正不令而行其身不正雖令不從","source":"논어"},{"text":"13-07-01 子曰魯衛之政兄弟也","source":"논어"},{"text":"魯周公之後衛康叔之後本兄弟之國而是時衰亂政亦相似故孔子嘆之","source":"논어"},{"text":"13-08-01 子謂衛公子荊善居室始有曰苟合矣少有曰苟完矣富有曰苟美矣","source":"논어"},{"text":"公子荊衛大夫苟聊且粗略之意合聚也完備也言其循序而有節不以欲速","source":"논어"},{"text":"盡美累其心○楊氏曰務爲全美則累物而驕吝之心生公子荊皆曰苟而已則","source":"논어"},{"text":"不以外物爲心其欲易足故也","source":"논어"},{"text":"13-09-01 子適衛冉有僕","source":"논어"},{"text":"13-09-02 子曰庶矣哉","source":"논어"},{"text":"13-09-03 冉有曰旣庶矣又何加焉曰富之","source":"논어"},{"text":"庶而不富則民生不遂故制田里薄賦斂以富之","source":"논어"},{"text":"13-09-04 曰旣富矣又何加焉曰敎之","source":"논어"},{"text":"富而不敎則近於禽獸故必立學校明禮義以敎之○胡氏曰天生斯民立之司","source":"논어"},{"text":"牧而寄以三事然自三代之後能擧此職者百無一二漢之文明唐之太宗亦云","source":"논어"},{"text":"庶且富矣西京之敎無聞焉明帝尊師重傅臨雍拜老宗戚子弟莫不受學唐太宗","source":"논어"},{"text":"大召名儒增廣生員敎亦至矣然而未知所以敎也三代之敎天子公卿躬行於上","source":"논어"},{"text":"言行政事皆可師法彼二君者其能然乎","source":"논어"},{"text":"子路10章","source":"논어"},{"text":"13-10-01 子曰苟有用我者朞月而已可也三年有成","source":"논어"},{"text":"朞月謂周一歲之月也可者僅辭言紀綱布也有成治功成也○尹氏曰孔子","source":"논어"},{"text":"歎當時莫能用己也故云然愚按史記此蓋爲衛靈公不能用而發","source":"논어"},{"text":"子路11章","source":"논어"},{"text":"13-11-01 子曰善人爲邦百年亦可以勝殘去殺矣誠哉是言也","source":"논어"},{"text":"爲邦百年言相繼而久也勝殘化殘暴之人使不爲惡也去殺謂民化於善可以","source":"논어"},{"text":"不用刑殺也蓋古有是言而夫子稱之程子曰漢自高惠至於文景黎民醇厚幾","source":"논어"},{"text":"致刑措庶乎其近之矣○尹氏曰勝殘去殺不爲惡而已善人之功如是若夫聖","source":"논어"},{"text":"人則不待百年其化亦不止此","source":"논어"},{"text":"子路12章","source":"논어"},{"text":"13-12-01 子曰如有王者必世而後仁","source":"논어"},{"text":"王者謂聖人受命而興也三十年爲一世仁謂敎化浹也程子曰周自文武至於","source":"논어"},{"text":"成王而後禮樂興卽其效也○或問三年必世遲速不同何也程子曰三年有成","source":"논어"},{"text":"謂法度紀綱有成而化行也漸民以仁摩民以義使之浹於肌膚淪於骨髓而禮樂","source":"논어"},{"text":"可興所謂仁也此非積久何以能致","source":"논어"},{"text":"子路13章","source":"논어"},{"text":"13-13-01 子曰苟正其身矣於從政乎何有不能正其身如正人何","source":"논어"},{"text":"子路14章","source":"논어"},{"text":"13-14-01 冉子退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以","source":"논어"},{"text":"吾其與聞之","source":"논어"},{"text":"冉有時爲季氏宰朝季氏之私朝也晏晩也政國政事家事以用也禮大夫","source":"논어"},{"text":"雖不治事猶得與聞國政是時季氏專魯其於國政蓋有不與同列議於公朝而獨","source":"논어"},{"text":"與家臣謀於私室者故夫子爲不知者而言此必季氏之家事耳若是國政我嘗爲","source":"논어"},{"text":"大夫雖不見用猶當與聞今旣不聞則是非國政也語意與魏徵獻陵之對略相似","source":"논어"},{"text":"其所以正名分抑季氏而敎冉有之意深矣","source":"논어"},{"text":"子路15章","source":"논어"},{"text":"13-15-01 定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也","source":"논어"},{"text":"幾期也詩曰如幾如式言一言之間未可以如此而必期其效","source":"논어"},{"text":"13-15-02 人之言曰爲君難爲臣不易","source":"논어"},{"text":"當時有此言也","source":"논어"},{"text":"13-15-03 如知爲君之難也不幾乎一言而興邦乎","source":"논어"},{"text":"因此言而知爲君之難則必戰戰兢兢臨深履薄而無一事之敢忽然則此言也豈不","source":"논어"},{"text":"可以必期於興邦乎爲定公言故不及臣也","source":"논어"},{"text":"13-15-04 曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰予無樂","source":"논어"},{"text":"乎爲君唯其言而莫予違也","source":"논어"},{"text":"言他無所樂惟樂此耳","source":"논어"},{"text":"13-15-05 如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎","source":"논어"},{"text":"范氏曰如不善而莫之違則忠言不至於耳君日驕而臣日諂未有不喪邦者也○","source":"논어"},{"text":"謝氏曰知爲君之難則必敬謹以持之唯其言而莫予違則讒諂面諛之人至矣邦","source":"논어"},{"text":"未必遽興喪也而興喪之源分於此然此非識微之君子何足以知之","source":"논어"},{"text":"子路16章","source":"논어"},{"text":"13-16-01 葉公問政","source":"논어"},{"text":"音義並見第七篇","source":"논어"},{"text":"13-16-02 子曰近者說遠者來","source":"논어"},{"text":"被其澤則說聞其風則來然必近者說而後遠者來也","source":"논어"},{"text":"子路17章","source":"논어"},{"text":"13-17-01 子夏爲莒父宰問政子曰無欲速無見小利欲速則不達見小利則大","source":"논어"},{"text":"莒父魯邑名欲事之速成則急遽無序而反不達見小者之爲利則所就者小而","source":"논어"},{"text":"所失者大矣○程子曰子張問政子曰居之無倦行之以忠子夏問政子曰無欲","source":"논어"},{"text":"速無欲速無見小利子張常過高而未仁子夏之病常在近小故名以切己之事","source":"논어"},{"text":"子路18章","source":"논어"},{"text":"13-18-01 葉公語孔子曰吾黨有直躬者其父攘羊而子證之","source":"논어"},{"text":"直躬直身而行者有因而盜曰攘","source":"논어"},{"text":"13-18-02 孔子曰吾黨之直者異於是父爲子隱子爲父隱直在其中矣","source":"논어"},{"text":"父子相隱天理人情之至也故不求爲直而直在其中○謝氏曰順理爲直父不","source":"논어"},{"text":"爲子隱子不爲父隱於理順耶瞽瞍殺人舜竊負而逃遵海濱而處當是時愛親","source":"논어"},{"text":"之心勝其於直不直何暇計哉","source":"논어"},{"text":"子路19章","source":"논어"},{"text":"13-19-01 樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也","source":"논어"},{"text":"恭主容敬主事恭見於外敬主乎中之夷狄不可棄勉其固守而勿失也○程","source":"논어"},{"text":"子曰此是徹上徹下語聖人初無二語也充之則睟面盎背推而達之則篤恭而","source":"논어"},{"text":"天下平矣胡氏曰樊遲問仁者三此最先先難次之愛人其最後乎","source":"논어"},{"text":"子路20章","source":"논어"},{"text":"13-20-01 子貢問曰何如斯可謂之士矣子曰行己有恥使於四方不辱君命可","source":"논어"},{"text":"此其志有所不爲而其材足以有爲者也子貢能言故以使事告之蓋爲使之難不","source":"논어"},{"text":"獨貴於能言而已","source":"논어"},{"text":"13-20-02 曰敢問其次曰宗族稱孝焉鄕黨稱弟焉","source":"논어"},{"text":"此本立而材不足者故爲其次","source":"논어"},{"text":"13-20-03 曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以爲次矣","source":"논어"},{"text":"果必行也硜小石之堅確者小人言其識量之淺狹也此其本末皆無足觀然","source":"논어"},{"text":"亦不害其爲自守也故聖人猶有取焉下此則市井之人不復可爲士矣","source":"논어"},{"text":"13-20-04 曰今之從政者何如子曰噫斗筲之人何足算也","source":"논어"},{"text":"今之從政者蓋如魯三家之屬噫心不平聲斗量名容十升筲竹器容斗二升","source":"논어"},{"text":"斗筲之人言鄙細也算數也子貢之問每下故夫子以是警之○程子曰子貢","source":"논어"},{"text":"之意蓋欲爲皎皎之行聞於人者夫子告之皆篤實自得之事","source":"논어"},{"text":"子路21章","source":"논어"},{"text":"13-21-01 子曰不得中行而與之必也狂狷乎狂者進取狷者有所不爲也","source":"논어"},{"text":"行道也狂者志極高而行不掩狷者知未及而守有餘蓋聖人本欲得中道之人而","source":"논어"},{"text":"敎之然旣不可得而徒得謹厚之人則未必能自振拔而有爲也故不若得此狂狷","source":"논어"},{"text":"之人猶可因其志節而激厲裁抑之以進於道非與其終於此而已也○孟子曰孔","source":"논어"},{"text":"子豈不欲中道哉不可必得故思其次也如琴張曾晳牧皮者孔子之所謂狂也其","source":"논어"},{"text":"志嘐嘐然曰古之人古之人夷考其行而不掩焉者也狂者又不可得欲得不屑不","source":"논어"},{"text":"潔之士而與之是狷也是又其次也","source":"논어"},{"text":"子路22章","source":"논어"},{"text":"13-22-01 子曰南人有言曰人而無恒不可以作巫醫善夫","source":"논어"},{"text":"南人南國之人恒常久也巫所以交鬼神醫所以寄死生故雖賤役而尤不可","source":"논어"},{"text":"以無常孔子稱其言而善之","source":"논어"},{"text":"13-22-02 不恒其德或承之羞","source":"논어"},{"text":"此易恒卦九三爻辭承進也","source":"논어"},{"text":"13-22-03 子曰不占而已矣","source":"논어"},{"text":"復加子曰以別易文也其義未詳楊氏曰君子於易苟玩其占則知無常之取羞矣","source":"논어"},{"text":"其爲無常也蓋亦不占而已矣意亦略通","source":"논어"},{"text":"子路23章","source":"논어"},{"text":"13-23-01 子曰君子和而不同小人同而不和","source":"논어"},{"text":"和者無乖戾之心同者有阿比之意○尹氏曰君子尙義故有不同小人尙利","source":"논어"},{"text":"子路24章","source":"논어"},{"text":"13-24-01 子貢問曰鄕人皆好之何如子曰未可也鄕人皆惡之何如子曰未","source":"논어"},{"text":"可也不如鄕人之善者好之其不善者惡之","source":"논어"},{"text":"一鄕之人宜有公論矣然其間亦各以類自爲好惡也故善者好之而惡者不惡","source":"논어"},{"text":"則必其有苟合之行惡者惡之而善者不好則必其無可好之實","source":"논어"},{"text":"子路25章","source":"논어"},{"text":"13-25-01 子曰君子易事而難說也說之不以道不說也及其使人也器之小人","source":"논어"},{"text":"難事而易說也說之雖不以道說也及其使人也求備焉","source":"논어"},{"text":"器之謂隨其材器而使之也君子之心公而恕小人之心私而刻天理人欲之間","source":"논어"},{"text":"每相反而已矣","source":"논어"},{"text":"子路26章","source":"논어"},{"text":"13-26-01 子曰君子泰而不驕小人驕而不泰","source":"논어"},{"text":"君子循理故安舒而不矜肆小人逞欲故反是","source":"논어"},{"text":"子路27章","source":"논어"},{"text":"13-27-01 子曰剛毅木訥近仁","source":"논어"},{"text":"程子曰木者質樸訥者遲鈍四者質之近乎仁者也楊氏曰剛毅則不屈於物欲","source":"논어"},{"text":"木訥則不至於外馳故近仁","source":"논어"},{"text":"子路28章","source":"논어"},{"text":"13-28-01 子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋","source":"논어"},{"text":"友切切偲偲兄弟怡怡","source":"논어"},{"text":"胡氏曰切切懇到也偲偲詳勉也怡怡和悅也皆子路所不足故告之又恐其","source":"논어"},{"text":"混於所施則兄弟有賊恩之禍朋友有善柔之損故又別而言之","source":"논어"},{"text":"子路29章","source":"논어"},{"text":"13-29-01 子曰善人敎民七年亦可以卽戎矣","source":"논어"},{"text":"敎民者敎之以孝弟忠信之行務農講武之法卽就也戎兵也民知親其上死其","source":"논어"},{"text":"長故可以卽戎○程子曰七年云者聖人度其時可矣如云朞月三年百年一世","source":"논어"},{"text":"大國五年小國七年之類皆當思其作爲如何乃有益","source":"논어"},{"text":"子路30章","source":"논어"},{"text":"13-30-01 子曰以不敎民戰是謂棄之","source":"논어"},{"text":"以用也言用不敎之民以戰必有敗亡之禍是棄其民也","source":"논어"},{"text":"胡氏曰此篇疑原憲所記凡四十七章","source":"논어"},{"text":"14-01-01 憲問恥子曰邦有道穀邦無道穀恥也","source":"논어"},{"text":"憲原思名穀祿也邦有道不能有爲邦無道不能獨善而但知食綠皆可恥也","source":"논어"},{"text":"憲之狷介其於邦無道穀之可恥固知之矣至於邦有道穀之可恥則未必知也故","source":"논어"},{"text":"夫子因其問而幷言之以廣其志使知所以自勉而進於有爲也","source":"논어"},{"text":"14-02-01 克伐怨欲不行焉可以爲仁矣","source":"논어"},{"text":"此亦原憲以其所能而問也克好勝伐自矜怨忿恨欲貪慾","source":"논어"},{"text":"14-02-02 子曰可以爲難矣仁則吾不知也","source":"논어"},{"text":"有是四者而能制之使不得行可謂難矣仁則天理渾然自無四者之累不行不足","source":"논어"},{"text":"以言之也○程子曰人而無克伐怨慾惟仁者能之有之而能制其情使不行斯","source":"논어"},{"text":"亦難能也謂之仁則未也此聖人開示之深惜乎憲之不能再問也或曰四者不行","source":"논어"},{"text":"固不得爲仁矣然亦豈非所謂克己之事求仁之方乎曰克去己私以復乎禮則","source":"논어"},{"text":"私欲不留而天理之本然者得矣若但制而不行則是未有拔去病根之意而容其潛","source":"논어"},{"text":"藏隱伏於胸中也豈克己求仁之謂哉學者察於二者之間則其所以求仁之功益親","source":"논어"},{"text":"切而無滲漏矣","source":"논어"},{"text":"14-03-01 子曰士而懷居不足以爲士矣","source":"논어"},{"text":"居謂意所便安處也","source":"논어"},{"text":"14-04-01 子曰邦有道危言危行邦無道危行言孫","source":"논어"},{"text":"危高峻也孫卑順也尹氏曰君子之持身不可變也至於言則有時而不敢盡以","source":"논어"},{"text":"避禍也然則爲國者使士言孫豈不殆哉","source":"논어"},{"text":"14-05-01 子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁","source":"논어"},{"text":"有德者和順積中英華發外能言者或便佞口給而已仁者心無私累見義必爲","source":"논어"},{"text":"勇者或血氣之强而已○尹氏曰有德者必有言徒能言者未必有德也仁者","source":"논어"},{"text":"志必勇徒能勇者未必有仁也","source":"논어"},{"text":"14-06-01 南宮适問於孔子曰羿善射奡盪舟俱不得其死然禹稷躬稼而有天","source":"논어"},{"text":"下夫子不答南宮适出子曰君子哉若人尙德哉若人","source":"논어"},{"text":"南宮适卽南容也羿有窮之君善射滅夏后相而簒其位其臣寒浞又殺羿而伐之","source":"논어"},{"text":"奡春秋傳作澆浞之子也力能陸地行舟後爲夏后少康所誅禹平水土曁稷播種","source":"논어"},{"text":"身親稼檣之事禹受舜禪而有天下稷之後至周武王亦有天下适之意蓋以羿奡","source":"논어"},{"text":"比當世之有權力者而以禹稷比孔子也故公子不答然适之言如此可謂君子之","source":"논어"},{"text":"人而有尙德之心矣不可以不與故俟其出而贊美之","source":"논어"},{"text":"14-07-01 子曰君子而不仁者有矣夫未有小人而仁者也","source":"논어"},{"text":"謝氏曰君子志於仁矣然毫忽之間心不在焉則未免爲不仁也","source":"논어"},{"text":"14-08-01 子曰愛之能勿勞乎忠焉能勿誨乎","source":"논어"},{"text":"蘇氏曰愛而勿勞禽犢之愛也忠而勿誨婦寺之忠也愛而知勞之則其爲愛也深","source":"논어"},{"text":"矣忠而知誨之則其爲忠也大矣","source":"논어"},{"text":"14-09-01 子曰爲命裨諶草創之世叔討論之行人子羽修飾之東里子産潤","source":"논어"},{"text":"裨諶以下四人皆鄭大夫草略也創造也謂造爲草藁也世叔游吉也春秋傳","source":"논어"},{"text":"作子大叔討尋究也論講議也行人掌使之官子羽公孫揮也修飾謂增損之","source":"논어"},{"text":"東里地名子産所居也潤色謂加以文采也鄭國之爲辭命必更此四賢之手而成","source":"논어"},{"text":"詳審精密各盡所長是以應對諸侯鮮有敗事孔子言此蓋善之也","source":"논어"},{"text":"憲問10章","source":"논어"},{"text":"14-10-01 或問子産子曰惠人也","source":"논어"},{"text":"子産之政不專於寬然其心則一以愛人爲主故孔子以爲惠人蓋擧其重而言也","source":"논어"},{"text":"14-10-02 問子西曰彼哉彼哉","source":"논어"},{"text":"子西楚公子申能遜楚國立昭王而改紀其政亦賢大夫也然不能革其僭王之","source":"논어"},{"text":"號昭王欲用孔子又沮止之其後卒召白公以致禍亂則其爲人可知矣彼哉者","source":"논어"},{"text":"14-10-03 問管仲曰人也奪伯氏騈邑三百飯疏食沒齒無怨言","source":"논어"},{"text":"人也猶言此人也伯氏齊大夫騈邑地名齒年也蓋桓公奪伯氏之邑以與管仲","source":"논어"},{"text":"伯氏自知己罪而心服管仲之功","source":"논어"},{"text":"故窮約以終身","source":"논어"},{"text":"荀卿所謂與之書社三百","source":"논어"},{"text":"而富人莫之敢拒者則此事也○或問管仲子産孰優曰管仲之德不勝其才子産","source":"논어"},{"text":"之才不勝其德然於聖人之學則槪乎其未有聞也","source":"논어"},{"text":"憲問11章","source":"논어"},{"text":"14-11-01 子曰貧而無怨難富而無驕易","source":"논어"},{"text":"處貧難處富易人之常情然人當勉其難而不可忽其易也","source":"논어"},{"text":"憲問12章","source":"논어"},{"text":"14-12-01 子曰孟公綽爲趙魏老則優不可以爲滕薛大夫","source":"논어"},{"text":"公綽魯大夫趙魏晉卿之家老家臣之長大家勢重而無諸侯之事家老望尊","source":"논어"},{"text":"而無官守之責優有餘也滕薛二國名大夫任國政者滕薛國小政繁大夫位","source":"논어"},{"text":"高責重然則公綽蓋廉靜寡欲而短於才者也○楊氏曰知之弗豫枉其才而用之","source":"논어"},{"text":"則爲棄人矣此君子所以患不知人也言此則孔子之用人可知矣","source":"논어"},{"text":"憲問13章","source":"논어"},{"text":"14-13-01 子路問成人子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝","source":"논어"},{"text":"文之以禮樂亦可以爲成人矣","source":"논어"},{"text":"成人猶言全人武仲魯大夫名紇莊子魯卞邑大夫言兼此四子之長則知足以","source":"논어"},{"text":"窮理廉足以養心勇足以力行藝足以泛應而又節之以禮和之以樂使德成於內","source":"논어"},{"text":"而文見乎外則材全德備渾然不見一善成名之迹中正和樂粹然無復偏倚駁雜之","source":"논어"},{"text":"蔽而其爲人也亦成矣然亦之爲言非其至者蓋就子路之所可及而語之也若論","source":"논어"},{"text":"其至則非聖人之盡人道不足以語此","source":"논어"},{"text":"14-13-02 曰今之成人者何必然見利思義見危授命久要不忘平生之言亦可","source":"논어"},{"text":"以爲成人矣","source":"논어"},{"text":"復加曰字者旣答而復言也授命言不愛其生持以與人也久要舊約也平生平","source":"논어"},{"text":"日也有是忠信之實則雖其才知禮樂有所未備亦可以爲成人之次也○程子曰","source":"논어"},{"text":"知之明信之篤行之果天下之達德也若孔子所謂成人亦不出此三者武仲知","source":"논어"},{"text":"也公綽仁也卞莊子勇也冉求藝也須是合此四人之能文之以禮樂亦可以","source":"논어"},{"text":"爲成人矣然而論其大成則不止於此若今之成人有忠信而不及於禮樂則又其","source":"논어"},{"text":"次者也又曰藏武仲之知非正也若文之以禮樂則無不正矣又曰語成人之名","source":"논어"},{"text":"非聖人孰能之孟子曰唯聖人然後可以踐形如此方可以稱成人之名胡氏曰","source":"논어"},{"text":"今之成人以下乃子路之言蓋不復聞斯行之之勇而有終身誦之之固矣未詳是否","source":"논어"},{"text":"憲問14章","source":"논어"},{"text":"14-14-01 子問公叔文子於公明賈曰信乎夫子不言不笑不取乎","source":"논어"},{"text":"公叔文子衛大夫公孫枝也公明姓賈名亦衛人文子爲人其詳不可知然必廉","source":"논어"},{"text":"靜之士故當時以三者稱之","source":"논어"},{"text":"14-14-02 公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭","source":"논어"},{"text":"其笑義然後取人不厭其取子曰其然豈其然乎","source":"논어"},{"text":"厭者苦其多而惡之之辭事適其可則人不厭而不覺其有是矣是以稱之或過而","source":"논어"},{"text":"以爲不言不笑不取也然此言也非禮義充溢於中得時措之宜者不能文子雖賢","source":"논어"},{"text":"疑未及此但君子與人爲善不欲正言其非也故曰其然豈其然乎蓋疑之也","source":"논어"},{"text":"憲問15章","source":"논어"},{"text":"14-15-01 子曰臧武仲以防求爲後於魯雖曰不要君吾不信也","source":"논어"},{"text":"防地名武仲所封邑也要有挾而求也武仲得罪奔邾自邾如防使請立後而避","source":"논어"},{"text":"邑以示若不得請則將據邑以叛是要君也○范氏曰要君者無上罪之大者也","source":"논어"},{"text":"武仲之邑受之於君得罪出奔則立後在君非己所得專也而據邑以請由其好知","source":"논어"},{"text":"而不好學也楊氏曰武仲卑辭請後其跡非要君者而意實要之夫子之言亦春","source":"논어"},{"text":"秋誅意之法也","source":"논어"},{"text":"憲問16章","source":"논어"},{"text":"14-16-01 子曰晉文公譎而不正齊桓公正而不譎","source":"논어"},{"text":"晉文公名重耳齊桓公名小白譎詭也二公皆諸侯盟主攘夷狄以尊周室者也","source":"논어"},{"text":"雖其以力假仁心皆不正然桓公伐楚仗義執言不由詭道猶爲彼善於此文公","source":"논어"},{"text":"則伐衛以致楚而陰謀以取勝其譎甚矣二君他事亦多類此故夫子言此以發其","source":"논어"},{"text":"憲問17章","source":"논어"},{"text":"14-17-01 子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎","source":"논어"},{"text":"按春秋傳齊襄公無道鮑叔牙奉公子小白奔莒及無知弑襄公管夷吾召忽奉公","source":"논어"},{"text":"子糾奔魯魯人納之未克而小白入是爲桓公使魯殺子糾而請管召召忽死之","source":"논어"},{"text":"管仲請囚鮑叔牙言於桓公以爲相子路疑管仲忘君事讐忍心害理不得爲仁也","source":"논어"},{"text":"14-17-02 子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁","source":"논어"},{"text":"九春秋傳作糾督也古字通用不以兵車言不假威力也如其仁言誰如其仁者","source":"논어"},{"text":"又再言以深許之蓋管仲雖未得爲仁人而其利澤及人則有仁之功矣","source":"논어"},{"text":"憲問18章","source":"논어"},{"text":"14-18-01 子貢曰管仲非仁者與桓公殺公子糾不能死又相之","source":"논어"},{"text":"子貢意不死猶可相之則已甚矣","source":"논어"},{"text":"14-18-02 子曰管仲相桓公覇諸侯一匡天下民到于今受其賜微管仲吾其被","source":"논어"},{"text":"覇與伯同長也匡正也尊周室攘夷狄皆所以正天下也微無也袵衣衿也","source":"논어"},{"text":"被髮左袵夷狄之俗也","source":"논어"},{"text":"14-18-03 豈若匹夫匹婦之爲諒也自經於溝瀆而莫之知也","source":"논어"},{"text":"諒小信也經縊也莫之知人不知也後漢書引此文莫字上有人字○程子曰","source":"논어"},{"text":"桓公兄也子糾弟也仲私於所事輔之以爭國非義也桓公殺之雖過而糾之死","source":"논어"},{"text":"實當仲始與之同謀遂與之同死可也知輔之爭爲不義將自免以圖後功亦可也","source":"논어"},{"text":"故聖人不責其死而稱其功若使桓弟而糾兄管仲所輔者正桓奪其國而殺之則","source":"논어"},{"text":"管仲之與桓","source":"논어"},{"text":"不可同世之讐也","source":"논어"},{"text":"若計其後功而與其事桓","source":"논어"},{"text":"無乃害義之甚","source":"논어"},{"text":"啓萬世反覆不忠之亂乎如唐之王珪魏徵不死建成之難而從太宗可謂害於義矣","source":"논어"},{"text":"後雖有功何足贖哉愚謂管仲有功而無罪故聖人獨稱其功王魏先有罪以後","source":"논어"},{"text":"有功則不以相掩可也","source":"논어"},{"text":"憲問19章","source":"논어"},{"text":"14-19-01 公叔文子之臣大夫僎與文子同升諸公","source":"논어"},{"text":"臣家臣公公朝謂薦之與己同進爲公朝之臣也","source":"논어"},{"text":"14-19-02 子聞之曰可以爲文矣","source":"논어"},{"text":"文者順理而成章之謂諡法亦有所謂錫民爵位曰文者○洪氏曰家臣之賤而引","source":"논어"},{"text":"之使與己並有三善焉知人一也忘己二也事君三也","source":"논어"},{"text":"憲問20章","source":"논어"},{"text":"14-20-01 子言衛靈公之無道也康子曰夫如是奚而不喪","source":"논어"},{"text":"14-20-02 孔子曰仲叔圉治賓客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪","source":"논어"},{"text":"仲叔圉則孔文子也三人皆衛臣雖未必賢而其才可用靈公用之又各當其才","source":"논어"},{"text":"○尹氏曰衛靈公之無道宜喪也而能用此三人猶足以保其國而況有道之君","source":"논어"},{"text":"能用天下之賢才者乎詩曰無競維人四方其訓之","source":"논어"},{"text":"憲問21章","source":"논어"},{"text":"14-21-01 子曰其言之不怍則爲之也難","source":"논어"},{"text":"大言不慙則無必爲之志而自不度其能否矣欲踐其言豈不難哉","source":"논어"},{"text":"憲問22章","source":"논어"},{"text":"14-22-01 陳成子弑簡公","source":"논어"},{"text":"成子齊大夫名恒簡公齊君名壬事在春秋哀公十四年","source":"논어"},{"text":"14-22-02 孔子沐浴而朝告於哀公曰陳恒弑其君請討之","source":"논어"},{"text":"是時孔子致仕居魯沐浴齊戒以告君重其事而不敢忽也臣弑其君人倫之大變","source":"논어"},{"text":"天理所不容人人得而誅之況隣國乎故夫子雖已告老而猶請哀公討之","source":"논어"},{"text":"14-22-03 公曰告夫三子","source":"논어"},{"text":"三子三家也時政在三家哀公不得自專故使孔子告之","source":"논어"},{"text":"14-22-04 孔子曰以吾從大夫之後不敢不告也君曰告夫三子者","source":"논어"},{"text":"孔子出而自言如此意謂弑君之賊法所必討大夫謀國義所當告君乃不能自命三","source":"논어"},{"text":"子而使我告之邪","source":"논어"},{"text":"14-22-05 之三子告不可孔子曰以吾從大夫之後不敢不告也","source":"논어"},{"text":"以君命往告而三子魯之强臣素有無君之心實與陳氏聲勢相倚故沮其謀而夫","source":"논어"},{"text":"子復以此應之其所以警之者深矣○程子曰左氏記孔子之言曰陳恒弑其君民","source":"논어"},{"text":"之不予者半以魯之衆加齊之半可克也此非孔子之言誠若此言是以力不以","source":"논어"},{"text":"義也若孔子之志必將正名其罪上告天子下告方伯而率與國以討之至於所以","source":"논어"},{"text":"勝齊者孔子之餘事也豈計魯人之衆寡哉當是時天下之亂極矣因是足以正之","source":"논어"},{"text":"周室其復興乎魯之君臣終不從之可勝惜哉胡氏曰春秋之法弑君之賊人得而","source":"논어"},{"text":"討之仲尼此擧先發後聞可也","source":"논어"},{"text":"憲問23章","source":"논어"},{"text":"14-23-01 子路問事君子曰勿欺也而犯之","source":"논어"},{"text":"犯謂犯顔諫爭○范氏曰犯非子路之所難也而以不欺爲難故夫子告以先勿欺而","source":"논어"},{"text":"憲問24章","source":"논어"},{"text":"14-24-01 子曰君子上達小人下達","source":"논어"},{"text":"君子循天理故日進乎高明小人徇人欲故日究乎汚下","source":"논어"},{"text":"憲問25章","source":"논어"},{"text":"14-25-01 子曰古之學者爲己今之學者爲人","source":"논어"},{"text":"程子曰爲己欲得之於己也爲人欲見知於人也○程子曰古之學者爲己其終至","source":"논어"},{"text":"於成物今之學者爲人其終至於喪己愚按聖賢論學者用心得失之際其說多矣","source":"논어"},{"text":"然未有如此言之切而要者於此明辨而日省之則庶乎其不昧於所從矣","source":"논어"},{"text":"憲問26章","source":"논어"},{"text":"14-26-01 蘧伯玉使人於孔子","source":"논어"},{"text":"蘧伯玉衛大夫名瑗孔子居衛嘗主於其家旣而反魯故伯玉使人來也","source":"논어"},{"text":"14-26-02 孔子與之坐而問焉曰夫子何爲對曰夫子欲寡其過而未能也使者出","source":"논어"},{"text":"子曰使乎使乎","source":"논어"},{"text":"與之坐敬其主以及其使也夫子指伯玉也言其但欲寡過而猶未能則其省身克己","source":"논어"},{"text":"常若不及之意可見矣使者之言猶自卑約而其主之賢益彰亦可謂深知君子之心","source":"논어"},{"text":"而善於詞令者矣","source":"논어"},{"text":"故夫子再言使乎","source":"논어"},{"text":"按莊周稱伯玉行年五十而知四十九","source":"논어"},{"text":"年之非又曰伯玉行年六十而六十化蓋其進德之功老而不倦是以踐履篤實光","source":"논어"},{"text":"輝宣著不惟使者知之而夫子亦信之也","source":"논어"},{"text":"憲問27章","source":"논어"},{"text":"14-27-01 子曰不在其位不謀其政","source":"논어"},{"text":"憲問28章","source":"논어"},{"text":"14-28-01 曾子曰君子思不出其位","source":"논어"},{"text":"此艮卦之象辭也曾子蓋嘗稱之記者因上章之語而類記之也○范氏曰物各止","source":"논어"},{"text":"其所而天下之理得矣故君子所思不出其位而君臣上下大小皆得其職也","source":"논어"},{"text":"憲問29章","source":"논어"},{"text":"14-29-01 子曰君子恥其言而過其行","source":"논어"},{"text":"恥者不敢盡之意過者欲有餘之辭","source":"논어"},{"text":"憲問30章","source":"논어"},{"text":"14-30-01 子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼","source":"논어"},{"text":"自責以勉人也","source":"논어"},{"text":"14-30-02 子貢曰夫子自道也","source":"논어"},{"text":"道言也自道猶云謙辭○尹氏曰成德以仁爲先進學以知爲先故夫子之言其","source":"논어"},{"text":"序有不同者以此","source":"논어"},{"text":"憲問31章","source":"논어"},{"text":"14-31-01 子貢方人子曰賜也賢乎哉夫我則不暇","source":"논어"},{"text":"方比也乎哉疑辭比方人物而較其短長雖亦窮理之事然專務爲此則心馳於","source":"논어"},{"text":"外而所以自治者疎矣故褒之而疑其辭復自貶以深抑之○謝氏曰聖人責人","source":"논어"},{"text":"辭不迫切而意已獨至如此","source":"논어"},{"text":"憲問32章","source":"논어"},{"text":"14-32-01 子曰不患人之不己知患其不能也","source":"논어"},{"text":"凡章指同而文不異者一言而重出也文小異者屢言而各出也此章凡四見而文","source":"논어"},{"text":"皆有異則聖人於此一事蓋屢言之其丁寧之意亦可見矣","source":"논어"},{"text":"憲問33章","source":"논어"},{"text":"14-33-01 子曰不逆詐不億不信抑亦先覺者是賢乎","source":"논어"},{"text":"逆未至而迎之也億未見而意之也詐謂人欺己不信謂人疑己抑反語辭言雖","source":"논어"},{"text":"不逆不億而於人之情僞自然先覺乃爲賢也○楊氏曰君子一於誠而已然未有","source":"논어"},{"text":"誠而不明者故雖不逆詐不億不信而常先覺也若夫不逆不億而卒爲小人所罔","source":"논어"},{"text":"焉斯亦不足觀也已","source":"논어"},{"text":"憲問34章","source":"논어"},{"text":"14-34-01 微生畝謂孔子曰丘何爲是栖栖者與無乃爲佞乎","source":"논어"},{"text":"微生姓畝名也畝名呼夫子而辭甚倨蓋有齒德而隱者栖栖依依也爲佞言","source":"논어"},{"text":"其務爲口給以悅人也","source":"논어"},{"text":"14-34-02 孔子曰非敢爲佞也疾固也","source":"논어"},{"text":"疾惡也固執一而不通也聖人之於達尊禮恭而言直如此其警之亦深矣","source":"논어"},{"text":"憲問35章","source":"논어"},{"text":"14-35-01 子曰驥不稱其力稱其德也","source":"논어"},{"text":"驥善馬之名德爲調良也○尹氏曰驥雖有力其稱在德人有才而無德則亦","source":"논어"},{"text":"憲問36章","source":"논어"},{"text":"14-36-01 或曰以德報怨何如","source":"논어"},{"text":"或人所稱今見老子書德謂恩惠也","source":"논어"},{"text":"14-36-02 子曰何以報德","source":"논어"},{"text":"言於其所怨旣以德報之矣則人之有德於我者又將何以報之乎","source":"논어"},{"text":"14-36-03 以直報怨以德報德","source":"논어"},{"text":"於其所怨者愛憎取舍一以至公而無私所謂直也於其所德者則必以德報之不","source":"논어"},{"text":"可忘也○或人之言可謂厚矣然以聖人之言觀之則見其出於有意之私而怨","source":"논어"},{"text":"德之報皆不得其平也","source":"논어"},{"text":"必如夫子之言然後","source":"논어"},{"text":"二者之報各得其所","source":"논어"},{"text":"然怨有不讐而德無","source":"논어"},{"text":"不報則又未嘗不厚也此章之言明白簡約而其指意曲折反覆如造化之簡易易","source":"논어"},{"text":"知而微妙無窮學者所宜詳琓也","source":"논어"},{"text":"憲問37章","source":"논어"},{"text":"14-37-01 子曰莫我知也夫","source":"논어"},{"text":"夫子自歎以發子貢之問也","source":"논어"},{"text":"14-37-02 子貢曰何爲其莫知子也子曰不怨天不尤人下學而上達知我者其","source":"논어"},{"text":"不得於天而不怨天","source":"논어"},{"text":"不合於人而不尤人","source":"논어"},{"text":"但知下學而自然上達","source":"논어"},{"text":"此但自言其反己自","source":"논어"},{"text":"修循序漸進耳無以甚異於人而致其知也然深味其語意則見其中自有人不及知","source":"논어"},{"text":"而天獨知之之妙蓋在孔門唯子貢之智幾足以及此故特語以發之惜乎其猶有","source":"논어"},{"text":"所未達也○程子曰不怨天不尤人在理當如此又曰下學上達意在言表又曰學","source":"논어"},{"text":"者須守下學上達之語乃學之要蓋凡下學人事便是上達天理然習而不察則亦","source":"논어"},{"text":"不能以上達矣","source":"논어"},{"text":"憲問38章","source":"논어"},{"text":"14-38-01 公伯寮愬子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力","source":"논어"},{"text":"猶能肆諸市朝","source":"논어"},{"text":"公伯寮魯人子服氏景諡伯字魯大夫子服何也夫子指季孫言其有疑於寮之言","source":"논어"},{"text":"也肆陳尸也言欲誅寮","source":"논어"},{"text":"14-38-02 子曰道之將行也與命也道之將廢也與命也公伯寮其如命何","source":"논어"},{"text":"謝氏曰雖寮之愬行亦命也其實寮無如之何愚謂言此以曉景伯安子路而警伯寮","source":"논어"},{"text":"耳聖人於利害之際則不待決於命而後泰然也","source":"논어"},{"text":"憲問39章","source":"논어"},{"text":"14-39-01 子曰賢者辟世","source":"논어"},{"text":"天下無道而隱若伯夷太公是也","source":"논어"},{"text":"14-39-02 其次辟地","source":"논어"},{"text":"去亂國適治邦","source":"논어"},{"text":"14-39-03 其次辟色","source":"논어"},{"text":"禮貌衰而去","source":"논어"},{"text":"14-39-04 其次辟言","source":"논어"},{"text":"有違言而後去也○程子曰四者雖以大小次第言之然非有優劣也所遇不同耳","source":"논어"},{"text":"憲問40章","source":"논어"},{"text":"14-40-01 子曰作者七人矣","source":"논어"},{"text":"季氏曰作起也言起而隱去者今七人矣不可知其誰何必求其人以實之則鑿矣","source":"논어"},{"text":"憲問41章","source":"논어"},{"text":"14-41-01 子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而爲之者與","source":"논어"},{"text":"石門地名晨門掌晨啓門蓋賢人隱於抱關者也自從也問其何所從來也胡氏","source":"논어"},{"text":"曰晨門知世之不可而不爲故以是譏孔子然不知聖人之視天下無不可爲之時也","source":"논어"},{"text":"憲問42章","source":"논어"},{"text":"14-42-01 子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎","source":"논어"},{"text":"磬樂器荷擔也蕢草器也此荷蕢者亦隱士也聖人之心未嘗忘天下此人聞其","source":"논어"},{"text":"磬聲而知之則亦非常人矣","source":"논어"},{"text":"14-42-02 旣而曰鄙哉硜硜乎莫己知也斯已而已矣深則厲淺則揭","source":"논어"},{"text":"硜硜石聲亦專確之意以衣涉水曰厲攝衣涉水曰揭此兩句衛風匏有苦葉之詩","source":"논어"},{"text":"也譏孔子人不知己而不止不能適淺深之宜","source":"논어"},{"text":"14-42-03 子曰果哉末之難矣","source":"논어"},{"text":"果哉嘆其果於忘世也末無也聖人心同天地視天下猶一家中國猶一人不能","source":"논어"},{"text":"一日忘也故聞荷蕢之言而嘆其果於忘世且言人之出處若但如此則亦無所難","source":"논어"},{"text":"憲問43章","source":"논어"},{"text":"14-43-01 子張曰書云高宗諒陰三年不言何謂也","source":"논어"},{"text":"高宗商王武丁也諒陰天子居喪之名未詳其義","source":"논어"},{"text":"14-43-02 子曰何必高宗古之人皆然君薨百官總己以聽於冢宰三年","source":"논어"},{"text":"言君薨則諸侯亦然總己謂總攝己職冢宰大宰也百官聽於冢宰故君得以三年不","source":"논어"},{"text":"言也○胡氏曰位有貴賤而生於父母無以異者故三年之喪自天子達子張非疑","source":"논어"},{"text":"此也殆以爲人君三年不言則臣下無所稟令禍亂或由以起也孔子告以聽於冢宰","source":"논어"},{"text":"則禍亂非所憂矣","source":"논어"},{"text":"憲問44章","source":"논어"},{"text":"14-44-01 子曰上好禮則民易使也","source":"논어"},{"text":"謝氏曰禮達而分定故民易使","source":"논어"},{"text":"憲問45章","source":"논어"},{"text":"14-45-01 子路問君子子曰修己以敬曰如斯而已乎曰修己以安人曰如斯而已","source":"논어"},{"text":"乎曰修己以安百姓修己以安百姓堯舜其猶病諸","source":"논어"},{"text":"修己以敬夫子之言至矣盡矣而子路少之故再以其充積之盛自然及物者告之","source":"논어"},{"text":"無他道也人者對己而言百姓則盡乎人矣堯舜猶病言不可以有加如此以抑子","source":"논어"},{"text":"路使反求諸近也蓋聖人之心無窮世雖極治然豈能必知四海之內果無一物不得","source":"논어"},{"text":"其所哉故堯舜猶以安百姓爲病若曰吾治已足則非所以爲聖人矣○程子曰君","source":"논어"},{"text":"子修己以安百姓篤恭而天下平唯上下一於恭敬則天地自位萬物自育氣無不","source":"논어"},{"text":"和而四靈畢至矣此體信達順之道聰明睿知皆由是出以此事天饗帝","source":"논어"},{"text":"憲問46章","source":"논어"},{"text":"14-46-01 原壤夷俟子曰幼而不孫弟長而無述焉老而不死是爲賊以杖叩其","source":"논어"},{"text":"原壤孔子之故人母死而歌蓋老氏之流自放於禮法之外者夷蹲踞也俟待也","source":"논어"},{"text":"言見孔子來而蹲踞以待之也述猶稱也賊者害人之名以其自幼至老無一善狀","source":"논어"},{"text":"而久生於世徒足以敗常亂俗則是賊而已矣脛足骨也孔子旣責之而因以所曳","source":"논어"},{"text":"之杖微擊其脛若使物蹲踞然","source":"논어"},{"text":"憲問47章","source":"논어"},{"text":"14-47-01 闕黨童子將命或問之曰益者與","source":"논어"},{"text":"闕黨黨名童子未冠者之稱將命謂傳賓主之言或人疑此童子學有進益故孔子","source":"논어"},{"text":"使之傳命以寵異之也","source":"논어"},{"text":"14-47-02 子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也","source":"논어"},{"text":"禮童子當隅坐隨行孔子言吾見此童子不循此禮非能求益但欲速成爾故使之","source":"논어"},{"text":"給使令之役觀長少之序習揖遜之容蓋所以抑而敎之非寵而異之也","source":"논어"},{"text":"凡四十一章","source":"논어"},{"text":"衛靈公1章","source":"논어"},{"text":"15-01-01 衛靈公問陳於孔子孔子對曰俎豆之事則嘗聞之矣軍旅之事未之","source":"논어"},{"text":"學也明日遂行","source":"논어"},{"text":"陳謂軍師行伍之列俎豆禮器尹氏曰衛靈公無道之君也復有志於戰伐之事","source":"논어"},{"text":"故答以未學而去之","source":"논어"},{"text":"15-01-02 在陳絶糧從者病莫能興","source":"논어"},{"text":"孔子去衛適陳興起也","source":"논어"},{"text":"15-01-03 子路慍見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣","source":"논어"},{"text":"何氏曰濫溢也言君子固有窮時不若小人窮則放溢爲非程子曰固窮者固守","source":"논어"},{"text":"其窮亦通○愚謂聖人當行而行無所顧慮處困而亨無所怨悔於此可見學","source":"논어"},{"text":"者宜深味之","source":"논어"},{"text":"衛靈公2章","source":"논어"},{"text":"15-02-01 子曰賜也女以予爲多學而識之者與","source":"논어"},{"text":"子貢之學多而能識矣夫子欲其知所本也故問以發之","source":"논어"},{"text":"15-02-02 對曰然非與","source":"논어"},{"text":"方信而忽疑蓋其積學功至而亦將有得也","source":"논어"},{"text":"15-02-03 曰非也予一以貫之","source":"논어"},{"text":"說見第四篇然彼以行言而此以知言也○謝氏曰聖人之道大矣人不能遍觀","source":"논어"},{"text":"而盡識宜其以爲多學而識之也然聖人豈務博者哉如天之於衆形匪物物刻而","source":"논어"},{"text":"雕之也故曰予一以貫之德輶如毛毛猶有倫上天之載無聲無臭至矣尹氏曰","source":"논어"},{"text":"孔子之於曾子","source":"논어"},{"text":"不待其問而直告之以此","source":"논어"},{"text":"曾子復深喩之曰唯","source":"논어"},{"text":"若子貢則先發其疑而","source":"논어"},{"text":"後告之而子貢終亦不能如曾子之唯也二子所學之淺深於此可見愚按夫子之","source":"논어"},{"text":"於子貢屢有以發之而他人不與焉則顔會以下諸子所學之淺深又可見矣","source":"논어"},{"text":"衛靈公3章","source":"논어"},{"text":"15-03-01 子曰由知德者鮮矣","source":"논어"},{"text":"由呼子路之名而告之也德謂義理之得於己者非己有之不能知其意味之實也","source":"논어"},{"text":"○自第一章至此疑皆一時之言此章蓋爲慍見發也","source":"논어"},{"text":"衛靈公4章","source":"논어"},{"text":"15-04-01 子曰無爲而治者其舜也與夫何爲哉恭己正南面而已矣","source":"논어"},{"text":"無爲而治者聖人德盛而民化不待其有所作爲也獨稱舜者紹堯之後而又得人","source":"논어"},{"text":"以任衆職故尤不見其有爲之迹也恭己者聖人敬德之容旣無所爲則人之所見","source":"논어"},{"text":"衛靈公5章","source":"논어"},{"text":"15-05-01 子張問行","source":"논어"},{"text":"猶問達之意也","source":"논어"},{"text":"15-05-02 子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里","source":"논어"},{"text":"子張意在得行於外故夫子反於身而言之猶答干祿問達之意也篤厚也蠻南","source":"논어"},{"text":"蠻貊北狄二千五百家爲州","source":"논어"},{"text":"15-05-03 立則見其參於前也在輿則見其倚於衡也夫然後行","source":"논어"},{"text":"其者指忠信篤敬而言參讀如毋往參焉之參言與我相參也衡軛也言其於忠","source":"논어"},{"text":"信篤敬念念不忘隨其所在常若有見雖欲頃刻離之而不可得然後一言一行","source":"논어"},{"text":"自然不離於忠信篤敬而蠻貊可行也","source":"논어"},{"text":"15-05-04 子張書諸紳","source":"논어"},{"text":"紳大帶之垂者書之欲其不忘也○程子曰學要鞭辟近裏著己而已博學而篤","source":"논어"},{"text":"志切問而近思言忠信行篤敬立則見其參於前在輿則見其倚於衡卽此是學","source":"논어"},{"text":"質美者明得盡査滓便渾化却與天地同體其次惟莊敬以持養之及其至則一也","source":"논어"},{"text":"衛靈公6章","source":"논어"},{"text":"15-06-01 子曰直哉史魚邦有道如矢邦無道如矢","source":"논어"},{"text":"史官名魚衛大夫名鰌如矢言直也史魚自以不能進賢退不肖旣死猶以尸","source":"논어"},{"text":"諫故夫子稱其直事見家語","source":"논어"},{"text":"15-06-02 君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之","source":"논어"},{"text":"伯玉出處合於聖人之道故曰君子卷收也懷藏也如於孫林父寗殖放弑之謀","source":"논어"},{"text":"不對而出亦其事也○楊氏曰史魚之直未盡君子之道若蘧伯玉然後可免於","source":"논어"},{"text":"亂世若史魚之如矢則雖欲卷而懷之有不可得也","source":"논어"},{"text":"衛靈公7章","source":"논어"},{"text":"15-07-01 子曰可與言而不與之言失人不可與言而與之言失言知者不失人","source":"논어"},{"text":"衛靈公8章","source":"논어"},{"text":"15-08-01 子曰志士仁人無求生以害仁有殺身以成仁","source":"논어"},{"text":"志士有志之士仁人則成德之人也理當死而求生則於其心有不安矣是害其","source":"논어"},{"text":"心之德也當死而死則心安而德全矣○程子曰實理得之於心自別實理者實","source":"논어"},{"text":"見得是實見得非也古人有損軀隕命者若不實見得惡能如此須是實見得生不","source":"논어"},{"text":"重於義生不安於死也故有殺身而成仁者只是成就一箇是而已","source":"논어"},{"text":"衛靈公9章","source":"논어"},{"text":"15-09-01 子貢問爲仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者","source":"논어"},{"text":"友其士之仁者","source":"논어"},{"text":"賢以事言仁以德言夫子嘗謂子貢悅不若己者故以是告之欲其有所嚴憚切","source":"논어"},{"text":"磋以成其德也○程子曰子貢問爲仁非問仁也故孔子告之以爲仁之資而已","source":"논어"},{"text":"衛靈公10章","source":"논어"},{"text":"15-10-01 顔淵問爲邦","source":"논어"},{"text":"顔子王佐之才故問治天下之道曰爲邦者謙辭","source":"논어"},{"text":"15-10-02 子曰行夏之時","source":"논어"},{"text":"夏時謂以斗柄初昏建寅之月爲歲首也天開於子地闢於丑人生於寅故斗柄","source":"논어"},{"text":"建此三辰之月皆可以爲歲首而三代迭用之夏以寅爲人正商以丑爲地正周","source":"논어"},{"text":"以子爲天正也然時以作事則歲月自當以人爲紀故孔子嘗曰吾得夏時焉","source":"논어"},{"text":"而說者以爲夏小正之屬蓋取其時之正與其令之善而於此又以告顔子也","source":"논어"},{"text":"15-10-03 乘殷之輅","source":"논어"},{"text":"商輅木輅也輅者大車之名古者以木爲車而已至商而有輅之名蓋始異其制","source":"논어"},{"text":"也周人飾以金玉則過侈而易敗不若商輅之朴素渾堅而等威已辨爲質而得其","source":"논어"},{"text":"15-10-04 服周之冕","source":"논어"},{"text":"周冕有五祭服之冠也冠上有覆前後有旒黃帝以來蓋已有之而制度儀等至","source":"논어"},{"text":"周始備然其爲物小而加於衆體之上故雖華而不爲靡雖費而不及奢夫子取之","source":"논어"},{"text":"蓋亦以爲文而得其中也","source":"논어"},{"text":"15-10-05 樂則韶舞","source":"논어"},{"text":"取其盡善盡美","source":"논어"},{"text":"15-10-06 放鄭聲遠佞人鄭聲淫佞人殆","source":"논어"},{"text":"放謂禁絶之鄭聲鄭國之音佞人卑諂辯給之人殆危也○程子曰問政多","source":"논어"},{"text":"矣惟顔淵告之以此蓋三代之制皆因時損益及其久也不能無弊周衰聖人不","source":"논어"},{"text":"作故孔子斟酌先王之禮立萬世常行之道發此以爲之兆耳由是求之則餘皆可","source":"논어"},{"text":"考也張子曰禮樂治之法也放鄭聲遠佞人法外意也一日不謹則法壞矣虞","source":"논어"},{"text":"夏君臣更相戒飭意蓋如此又曰法立而能守則德可久業可大鄭聲佞人能使","source":"논어"},{"text":"人喪其所守故放遠之尹氏曰此所謂百王不易之大法孔子之作春秋蓋此意也","source":"논어"},{"text":"孔顔雖不得行之於時然其爲治之法可得而見矣","source":"논어"},{"text":"衛靈公11章","source":"논어"},{"text":"15-11-01 子曰人無遠慮必有近憂","source":"논어"},{"text":"蘇氏曰人之所履者容足之外皆爲無用之地而不可廢也故慮不在千里之外","source":"논어"},{"text":"則患在几席之下矣","source":"논어"},{"text":"衛靈公12章","source":"논어"},{"text":"15-12-01 子曰已矣乎吾未見好德如好色者也","source":"논어"},{"text":"已矣乎歎其終不得而見之也","source":"논어"},{"text":"衛靈公13章","source":"논어"},{"text":"15-13-01 子曰臧文仲其竊位者與知柳下惠之賢而不與立也","source":"논어"},{"text":"竊位言不稱其位而有愧於心如盜得而陰據之也柳下惠魯大夫展獲字禽食邑","source":"논어"},{"text":"柳下諡曰惠與立謂與之並立於朝范氏曰臧文仲爲政於魯若不知賢是不明","source":"논어"},{"text":"也知而不擧是蔽賢也不明之罪小蔽賢之罪大故孔子以爲不仁又以爲竊位","source":"논어"},{"text":"衛靈公14章","source":"논어"},{"text":"15-14-01 子曰躬自厚而薄責於人則遠怨矣","source":"논어"},{"text":"責己厚故身益修責人薄故人易從所以人不得而怨之","source":"논어"},{"text":"衛靈公15章","source":"논어"},{"text":"15-15-01 子曰不曰如之何如之何者吾末如之何也已矣","source":"논어"},{"text":"如之何如之何者熟思而審處之辭也不如是而妄行雖聖人亦無如之何矣","source":"논어"},{"text":"衛靈公16章","source":"논어"},{"text":"15-16-01 子曰群居終日言不及義好行小慧難矣哉","source":"논어"},{"text":"小慧私智也言不及義則放辟邪侈之心滋好行小慧則行險僥倖之機熟難矣哉","source":"논어"},{"text":"者言其無以入德而將有患害也","source":"논어"},{"text":"衛靈公17章","source":"논어"},{"text":"15-17-01 子曰君子義以爲質禮以行之孫以出之信以成之君子哉","source":"논어"},{"text":"義者制事之本故以爲質幹而行之必有節文出之必以退遜成之必在誠實乃","source":"논어"},{"text":"君子之道也○程子曰義以爲質如質幹然禮行此遜出此信成此此四句只","source":"논어"},{"text":"是一事以義爲本又曰敬以直內則義以方外義以爲質則禮以行之孫以出之","source":"논어"},{"text":"衛靈公18章","source":"논어"},{"text":"15-18-01 子曰君子病無能焉不病人之不己知也","source":"논어"},{"text":"衛靈公19章","source":"논어"},{"text":"15-19-01 子曰君子疾沒世而名不稱焉","source":"논어"},{"text":"范氏曰君子學以爲己不求人知然沒世而名不稱焉則無爲善之實可知矣","source":"논어"},{"text":"衛靈公20章","source":"논어"},{"text":"15-20-01 子曰君子求諸己小人求諸人","source":"논어"},{"text":"謝氏曰君子無不反求諸己小人反是此君子小人所以分也○楊氏曰君子雖不","source":"논어"},{"text":"病人之不己知然亦疾沒世而名不稱也雖疾沒世而名不稱然所以求者亦反諸","source":"논어"},{"text":"己而已小人求諸人故違道干譽無所不至三者文不相蒙而意實相足亦記言","source":"논어"},{"text":"衛靈公21章","source":"논어"},{"text":"15-21-01 子曰君子矜而不爭群而不黨","source":"논어"},{"text":"莊以持己曰矜然無乖戾之心故不爭和以處衆曰群然無阿比之意故不黨","source":"논어"},{"text":"衛靈公22章","source":"논어"},{"text":"15-22-01 子曰君子不以言擧人不以人廢言","source":"논어"},{"text":"衛靈公23章","source":"논어"},{"text":"15-23-01 子貢問曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施","source":"논어"},{"text":"推己及物其施不窮故可以終身行之○尹氏曰學貴於知要子貢之問可謂知","source":"논어"},{"text":"要矣孔子告以求仁之方也推而極之雖聖人之無我不出乎此終身行之不亦宜","source":"논어"},{"text":"衛靈公24章","source":"논어"},{"text":"15-24-01 子曰吾之於人也誰毁誰譽如有所譽者其有所試矣","source":"논어"},{"text":"毁者稱人之惡而損其眞譽者揚人之善而過其實夫子無是也然或有所譽者","source":"논어"},{"text":"則必嘗有以試之而知其將然矣聖人善善之速而無所苟如此若其惡惡則已緩","source":"논어"},{"text":"矣是以雖有以前知其惡而終無所毁也","source":"논어"},{"text":"15-24-02 斯民也三代之所以直道而行也","source":"논어"},{"text":"斯民者今此之人也三代夏商周也直道無私曲也言吾之所以無所毁譽者蓋","source":"논어"},{"text":"以此民卽三代之時所以善其善惡其惡而無所私曲之民故我今亦不得而枉其","source"
