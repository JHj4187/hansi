:"논어"},{"text":"是非之實也○尹氏曰孔子之於人也豈有意於毁譽之哉其所以譽之者蓋試而","source":"논어"},{"text":"知其美故也斯民也三代所以直道而行豈得容私於其間哉","source":"논어"},{"text":"衛靈公25章","source":"논어"},{"text":"15-25-01 子曰吾猶及史之闕文也有馬者借人乘之今亡矣夫","source":"논어"},{"text":"楊氏曰史闕文馬借人此二事孔子猶及見之今亡矣夫悼時之益偸也愚謂此","source":"논어"},{"text":"必有爲而言蓋雖細故而時變之大者可知矣○胡氏曰此章義疑不可强解","source":"논어"},{"text":"衛靈公26章","source":"논어"},{"text":"15-26-01 子曰巧言亂德小不忍則亂大謀","source":"논어"},{"text":"巧言變亂是非聽之使人喪其所守小不忍如婦人之仁匹夫之勇皆是","source":"논어"},{"text":"衛靈公27章","source":"논어"},{"text":"15-27-01 子曰衆惡之必察焉衆好之必察焉","source":"논어"},{"text":"楊氏曰惟仁者能好惡人衆好惡之而不察則或蔽於私矣","source":"논어"},{"text":"衛靈公28章","source":"논어"},{"text":"15-28-01 子曰人能弘道非道弘人","source":"논어"},{"text":"弘廓而大之也人外無道道外無人然人心有覺而道體無爲故人能大其道","source":"논어"},{"text":"道不能大其人也○張子曰心能盡性人能弘道也性不知檢其心非道弘人也","source":"논어"},{"text":"衛靈公29章","source":"논어"},{"text":"15-29-01 子曰過而不改是謂過矣","source":"논어"},{"text":"過而能改則復於無過唯不改則其過遂成而將不及改矣","source":"논어"},{"text":"衛靈公30章","source":"논어"},{"text":"15-30-01 子曰吾嘗終日不食終夜不寢以思無益不如學也","source":"논어"},{"text":"此爲思而不學者言之蓋勞心以必求不如遜志而自得也李氏曰夫子非思而不","source":"논어"},{"text":"學者特垂語以敎人爾","source":"논어"},{"text":"衛靈公31章","source":"논어"},{"text":"15-31-01 子曰君子謀道不謀食耕也餒在其中矣學也祿在其中矣君子憂道","source":"논어"},{"text":"耕所以謀食而未必得食學所以謀道而祿在其中然其學也憂不得乎道而已","source":"논어"},{"text":"非爲憂貧之故而欲爲是以得祿也○尹氏曰君子治其本而不䘏其末豈以自外","source":"논어"},{"text":"至者爲憂樂哉","source":"논어"},{"text":"衛靈公32章","source":"논어"},{"text":"15-32-01 子曰知及之仁不能守之雖得之必失之","source":"논어"},{"text":"知足以知此理而私欲間之則無以有之於身矣","source":"논어"},{"text":"15-32-02 知及之仁能守之不莊以涖之則民不敬","source":"논어"},{"text":"涖臨也謂臨民也知此理而無私欲以間之則所知者在我而不失矣然猶有不莊","source":"논어"},{"text":"者蓋氣習之偏或有厚於內而不嚴於外者是以民不見其可畏而慢易之","source":"논어"},{"text":"15-32-03 知及之仁能守之莊以涖之動之不以禮未善也","source":"논어"},{"text":"動之動民也猶曰鼓舞而作興之云爾禮謂義理之節文○愚謂學至於仁則善","source":"논어"},{"text":"有諸己而大本立矣涖之不莊動之不以禮乃其稟學問之小疵然亦非盡善之道","source":"논어"},{"text":"也故夫子歷言之使知德愈全則責愈備不可以爲小節而忽之也","source":"논어"},{"text":"衛靈公33章","source":"논어"},{"text":"15-33-01 子曰君子不可小知而可大受也小人不可大受而可小知也","source":"논어"},{"text":"此言觀人之法知我知之也受彼所受也蓋君子於細事未必可觀而材德足以","source":"논어"},{"text":"任重小人雖器量淺狹而未必無一長可取","source":"논어"},{"text":"衛靈公34章","source":"논어"},{"text":"15-34-01 子曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也","source":"논어"},{"text":"民之於水火所賴以生不可一日無其於仁也亦然但水火外物而仁在己無水火","source":"논어"},{"text":"不過害人之身而不仁則失其心是仁有甚於水火而尤不可一日無者也況水火","source":"논어"},{"text":"或有時而殺人仁則未嘗殺人亦何憚而不爲哉李氏曰此夫子勉人爲仁之語下","source":"논어"},{"text":"衛靈公35章","source":"논어"},{"text":"15-35-01 子曰當仁不讓於師","source":"논어"},{"text":"當仁以仁爲己任也雖師亦無所遜言當勇往而必爲也蓋仁者人所自有而自爲","source":"논어"},{"text":"之非有爭也何遜之有○程子曰爲仁在己無所與遜若善名在外則不可不遜","source":"논어"},{"text":"衛靈公36章","source":"논어"},{"text":"15-36-01 子曰君子貞而不諒","source":"논어"},{"text":"貞正而固也諒則不擇是非而必於信","source":"논어"},{"text":"衛靈公37章","source":"논어"},{"text":"15-37-01 子曰事君敬其事而後其食","source":"논어"},{"text":"後與後獲之後同食祿也君子之仕也有官守者修其職有言責者盡其忠皆","source":"논어"},{"text":"以敬吾之事而已不可先有求祿之心也","source":"논어"},{"text":"衛靈公38章","source":"논어"},{"text":"15-38-01 子曰有敎無類","source":"논어"},{"text":"人性皆善而其類有善惡之殊者氣習之染也故君子有敎則人皆可以復於善而","source":"논어"},{"text":"不當復論其類之惡矣","source":"논어"},{"text":"衛靈公39章","source":"논어"},{"text":"15-39-01 子曰道不同不相爲謀","source":"논어"},{"text":"不同如善惡邪正之類","source":"논어"},{"text":"衛靈公40章","source":"논어"},{"text":"15-40-01 子曰辭達而已矣","source":"논어"},{"text":"辭取達意而上不以富麗爲工","source":"논어"},{"text":"衛靈公41章","source":"논어"},{"text":"15-41-01 師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某","source":"논어"},{"text":"師樂師瞽者冕名再言某在斯歷擧在坐之人以詔之","source":"논어"},{"text":"15-41-02 師冕出子張問曰與師言之道與","source":"논어"},{"text":"聖門學者於夫子之一言一動無不存心省察如此","source":"논어"},{"text":"15-41-03 子曰然固相師之道也","source":"논어"},{"text":"相助也古者瞽必有相其道如此蓋聖人於此非作意而爲之但盡其道而已○","source":"논어"},{"text":"尹氏曰聖人處己爲人其心一致無不盡其誠故也有志於學者求聖人之心於斯","source":"논어"},{"text":"亦可見矣范氏曰聖人不侮鰥寡不虐無告可見於此推之天下無一物不得其","source":"논어"},{"text":"洪氏曰此篇或以爲齊論凡十四章","source":"논어"},{"text":"16-01-01 季氏將伐顓臾","source":"논어"},{"text":"顓臾國名魯附庸也","source":"논어"},{"text":"16-01-02 冉有季路見於孔子曰季氏將有事於顓臾","source":"논어"},{"text":"按左傳史記二子仕季氏不同時此云爾者疑子路嘗從孔子自衛反魯再仕季氏","source":"논어"},{"text":"不久而復之衛也","source":"논어"},{"text":"16-01-03 孔子曰求無乃爾是過與","source":"논어"},{"text":"冉求爲季氏聚斂尤用事故夫子獨責之","source":"논어"},{"text":"16-01-04 夫顓臾昔者先王以爲東蒙主且在邦域之中矣是社稷之臣也何以伐","source":"논어"},{"text":"東蒙山名先王封顓臾於此山之下使主其祭在魯地七百里之中社稷猶云公家","source":"논어"},{"text":"是時四分魯國季氏取其二孟孫叔孫各有其一獨附庸之國尙爲公臣季氏又欲","source":"논어"},{"text":"取二自益故孔子言顓臾乃先王封國則不可伐在邦域之中則不必伐是社稷","source":"논어"},{"text":"之臣則非季氏所當伐也此事理之至當不易之定體而一言盡其曲折如此非","source":"논어"},{"text":"聖人不能也","source":"논어"},{"text":"16-01-05 冉有曰夫子欲之吾二臣者皆不欲也","source":"논어"},{"text":"夫子指季孫冉有實與謀以夫子非之故歸咎於季氏","source":"논어"},{"text":"16-01-06 孔子曰求周任有言曰陳力就列不能者止危而不持顚而不扶則將","source":"논어"},{"text":"焉用彼相矣","source":"논어"},{"text":"周任古之良史陳布也列位也相瞽者之相也言二子不欲則當諫諫而不聽","source":"논어"},{"text":"16-01-07 且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過與","source":"논어"},{"text":"兕野牛也柙檻也櫝匱也言在柙而逸在櫝而毁典守者不得辭其過明二子","source":"논어"},{"text":"居其位而不去則季氏之惡己不得不任其責也","source":"논어"},{"text":"16-01-08 冉有曰今夫顓臾固而近於費今不取後世必爲子孫憂","source":"논어"},{"text":"固謂城郭完固費季氏之私邑此則冉有之飾辭然亦可見其實與季氏之謀矣","source":"논어"},{"text":"16-01-09 孔子曰求君子疾夫舍曰欲之而必爲之辭","source":"논어"},{"text":"欲之謂貪其利","source":"논어"},{"text":"16-01-10 丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無","source":"논어"},{"text":"寡謂民少貧謂財乏均謂各得其分安謂上下相安季氏之欲取顓臾患寡與","source":"논어"},{"text":"貧耳然是時季氏據國而魯君無民則不均矣君弱臣强互生嫌隙則不安矣均","source":"논어"},{"text":"則不患於貧而和和則不患於寡而安安則不相疑忌而無傾覆之患","source":"논어"},{"text":"16-01-11 夫如是故遠人不服則修文德以來之旣來之則安之","source":"논어"},{"text":"內治修然後遠人服有不服則修德以來之亦不當勤兵於遠","source":"논어"},{"text":"16-01-12 今由與求也相夫子遠人不服而不能來也邦分崩離析而不能守也","source":"논어"},{"text":"子路雖不與謀而素不能輔之以義亦不得爲無罪故倂責之遠人謂顓臾分崩","source":"논어"},{"text":"離析謂四分公室家臣屢叛","source":"논어"},{"text":"16-01-13 而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭墻之內也","source":"논어"},{"text":"干楯也戈戟也蕭墻屛也言不均不和內變將作其後哀公果欲以越伐魯而","source":"논어"},{"text":"去季氏○謝氏曰當是時三家强公室弱冉求又欲伐顓臾以附益之夫子所以","source":"논어"},{"text":"深罪之爲其瘠魯以肥三家也洪氏曰二子仕於季氏凡季氏所欲爲必以告於夫","source":"논어"},{"text":"子則因夫子之言而救止者宜亦多矣伐顓臾之事不見於經傳其以夫子之言而止","source":"논어"},{"text":"16-02-01 孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸","source":"논어"},{"text":"侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不","source":"논어"},{"text":"先王之制諸侯不得變禮樂專征伐陪臣家臣也逆理愈甚則其失之愈速大約","source":"논어"},{"text":"世數不過如此","source":"논어"},{"text":"16-02-02 天下有道則政不在大夫","source":"논어"},{"text":"言不得專政","source":"논어"},{"text":"16-02-03 天下有道則庶人不議","source":"논어"},{"text":"上無失政則下無私議非箝其口使不敢言也○此章通論天下之勢","source":"논어"},{"text":"16-03-01 孔子曰祿之去公室五世矣政逮於大夫四世矣故三桓之子孫微矣","source":"논어"},{"text":"魯自文公薨公子遂殺子赤立宣公而君失其政歷成襄昭定凡五公逮及也子","source":"논어"},{"text":"季武子始專國政歷悼平桓子凡四世而爲家臣陽虎所執三桓三家皆桓公之後","source":"논어"},{"text":"此以前章之說推之而知其當然也○此章專論魯事疑與前章皆定公時語蘇","source":"논어"},{"text":"氏曰禮樂征伐自諸侯出宜諸侯之强也而魯以失政政逮於大夫宜大夫之强也","source":"논어"},{"text":"而三桓以微何也强生於安安生於上下之分定今諸侯大夫皆陵其上則無以令","source":"논어"},{"text":"其下矣故皆不久而失之也","source":"논어"},{"text":"16-04-01 孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔","source":"논어"},{"text":"友便佞損矣","source":"논어"},{"text":"友直則聞其過友諒則進於誠友多聞則進於明便習熟也便辟謂習於威儀而不","source":"논어"},{"text":"直善柔謂工於媚悅而不諒便佞謂習於口語而無聞見之實三者損益正相反也","source":"논어"},{"text":"○尹氏曰自天子以至於庶人未有不須友以成者而其損益有如是者可不謹哉","source":"논어"},{"text":"16-05-01 孔子曰益者三樂損者三樂樂節禮樂樂道人之善樂多賢友益矣樂","source":"논어"},{"text":"驕樂樂佚遊樂宴樂損矣","source":"논어"},{"text":"節謂辨其制度聲容之節驕樂則侈肆而不知節佚遊則惰慢而惡聞善宴樂則淫溺","source":"논어"},{"text":"而狎小人三者損益亦相反也○尹氏曰君子之於好樂可不謹哉","source":"논어"},{"text":"16-06-01 孔子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之","source":"논어"},{"text":"隱未見顔色而言謂之瞽","source":"논어"},{"text":"君子有德位之通稱愆過也瞽無目不能察言觀色○尹氏曰時然後言則無","source":"논어"},{"text":"三者之過矣","source":"논어"},{"text":"16-07-01 孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛","source":"논어"},{"text":"戒之在鬪及其老也血氣旣衰戒之在得","source":"논어"},{"text":"血氣形之所待以生者血陰而氣陽也得貪得也隨時知戒以理勝之則不爲血","source":"논어"},{"text":"氣所使也○范氏曰聖人同於人者血氣也異於人者志氣也血氣有時而衰","source":"논어"},{"text":"志氣則無時而衰也少未定壯而剛老而衰者血氣也戒於色戒於鬪戒於得者","source":"논어"},{"text":"志氣也君子養其志氣故不爲血氣所動是以年彌高而德彌邵也","source":"논어"},{"text":"16-08-01 孔子曰君子有三畏畏天命畏大人畏聖人之言","source":"논어"},{"text":"畏者嚴憚之意也天命者天所賦之正理也知其可畏則其戒謹恐懼自有不能已","source":"논어"},{"text":"者而付畀之重可以不失矣大人聖言皆天命所當畏知畏天命則不得不畏之矣","source":"논어"},{"text":"16-08-02 小人不知天命而不畏也狎大人侮聖人之言","source":"논어"},{"text":"侮戱玩也不知天命故不識義理而無所忌憚如此○尹氏曰三畏者修己之","source":"논어"},{"text":"誠當然也小人不務修身誠己則何畏之有","source":"논어"},{"text":"16-09-01 孔子曰生而知之者上也學而知之者次也困而學之又其次也困而","source":"논어"},{"text":"不學民斯爲下矣","source":"논어"},{"text":"困謂有所不通言人之氣質不同大約有此四等○楊氏曰生知學知以至困學","source":"논어"},{"text":"雖其質不同然及其知之一也故君子惟學之爲貴困而不學然後爲下","source":"논어"},{"text":"季氏10章","source":"논어"},{"text":"16-10-01 孔子曰君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬","source":"논어"},{"text":"疑思問忿思難見得思義","source":"논어"},{"text":"視無所蔽則明無不見聽無所壅則聰無不聞色見於面者貌擧身而言思問則","source":"논어"},{"text":"疑不蓄思難則忿必懲思義則得不苟○程子曰九思各專其一謝氏曰未至於","source":"논어"},{"text":"從容中道無時而不自省察也雖有不存焉者寡矣此之謂思誠","source":"논어"},{"text":"季氏11章","source":"논어"},{"text":"16-11-01 孔子曰見善如不及見不善如探湯吾見其人矣吾聞其語矣","source":"논어"},{"text":"眞如善惡而誠好惡之顔曾冉閔之徒蓋能之矣語蓋古語也","source":"논어"},{"text":"16-11-02 隱居以求其志行義以達其道吾聞其語矣未見其人也","source":"논어"},{"text":"求其志守其所達之道也達其道行其所求之志也蓋惟伊尹太公之流可以當之","source":"논어"},{"text":"當時若顔子亦庶乎此然隱而未見又不幸而蚤死故夫子云然","source":"논어"},{"text":"季氏12章","source":"논어"},{"text":"16-12-01 齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到","source":"논어"},{"text":"駟四馬也首陽山名","source":"논어"},{"text":"16-12-02 其斯之謂與","source":"논어"},{"text":"胡氏曰程子以爲第十二篇錯簡誠不以富亦祗以異當在此章之首今詳文勢似當","source":"논어"},{"text":"在此句之上言人之所稱不在於富而在於異也愚謂此說近是而章首當有孔子","source":"논어"},{"text":"曰字蓋闕文耳大抵此書後十篇多闕誤","source":"논어"},{"text":"季氏13章","source":"논어"},{"text":"16-13-01 陳亢問於伯魚曰子亦有異聞乎","source":"논어"},{"text":"亢以私意窺聖人疑必陰厚其子","source":"논어"},{"text":"16-13-02 對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言","source":"논어"},{"text":"鯉退而學詩","source":"논어"},{"text":"事理通達而心氣和平故能言","source":"논어"},{"text":"16-13-03 他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而","source":"논어"},{"text":"品節詳明而德性堅定故能立","source":"논어"},{"text":"16-13-04 聞斯二者","source":"논어"},{"text":"當獨立之時所聞不過如此其無異聞可知","source":"논어"},{"text":"16-13-05 陳亢退而喜曰問一得三聞詩聞禮又聞君子之遠其子也","source":"논어"},{"text":"尹氏曰孔子之敎其子無異於門人故陳亢以爲遠其子","source":"논어"},{"text":"季氏14章","source":"논어"},{"text":"16-14-01 邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異","source":"논어"},{"text":"邦曰寡小君異邦人稱之亦曰君夫人","source":"논어"},{"text":"寡寡德謙辭○吳氏曰凡語中所載如此類者不知何謂或古有之或夫子嘗","source":"논어"},{"text":"言之不可考也","source":"논어"},{"text":"凡二十六章","source":"논어"},{"text":"17-01-01 陽貨欲見孔子孔子不見歸孔子豚孔子時其亡而往拜之遇諸途","source":"논어"},{"text":"陽貨季氏家臣名虎嘗囚季桓子而專國政欲令孔子來見己而孔子不往貨以禮","source":"논어"},{"text":"大夫有賜於士不得受於其家則往拜其門故瞰孔子之亡而歸之豚欲令孔子來","source":"논어"},{"text":"拜而見之也","source":"논어"},{"text":"17-01-02 謂孔子曰來予與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而","source":"논어"},{"text":"亟失時可謂知乎曰不可日月逝矣歲不我與孔子曰諾吾將仕矣","source":"논어"},{"text":"懷寶迷邦謂懷藏道德不救國之迷亂亟數也失時謂不及事幾之會將者且然","source":"논어"},{"text":"而未必之辭貨語皆譏孔子而諷使速仕孔子固未嘗如此而亦非不欲仕也但不仕","source":"논어"},{"text":"於貨耳故直據理答之不復與辯若不諭其意者○陽貨之欲見孔子雖其善意","source":"논어"},{"text":"然不過欲使助己爲亂耳故孔子不見者義也其往拜者禮也必時其亡而往者","source":"논어"},{"text":"欲其稱也遇諸途而不避者不終絶也隨問而對者理之直也對而不辯者言之孫","source":"논어"},{"text":"而亦無所詘也楊氏曰揚雄謂孔子於陽貨也敬所不敬爲詘身以信道非知孔子","source":"논어"},{"text":"者蓋道外無身身外無道身詘矣而可以信道吾未之信也","source":"논어"},{"text":"17-02-01 子曰性相近也習相遠也","source":"논어"},{"text":"此所謂性兼氣質而言者也氣質之性固有美惡之不同矣然以其初而言則皆不","source":"논어"},{"text":"甚相遠也但習於善則善習於惡則惡於是始相遠耳○程子曰此言氣質之性","source":"논어"},{"text":"非言性之本也若言其本則性卽是理理無不善孟子之言性善是也何相近之有","source":"논어"},{"text":"17-03-01 子曰唯上知與下愚不移","source":"논어"},{"text":"此承上章而言人之氣質相近之中又有美惡一定而非習之所能移者○程子曰","source":"논어"},{"text":"人性本善有不可移者何也語其性則皆善也語其才則有下愚之不移所謂下愚","source":"논어"},{"text":"有二焉自暴自棄也人苟以善自治則無不可移雖昏愚之至皆可漸磨而進也惟","source":"논어"},{"text":"自暴者拒之以不信自棄者絶之以不爲雖聖人與居不能化而入也仲尼之所謂","source":"논어"},{"text":"下愚也然其質非必昏且愚也往往强戾而才力有過人者商辛是也聖人以其","source":"논어"},{"text":"自絶於善謂之下愚然考其歸則誠愚也或曰此與上章當合爲一子曰二字蓋","source":"논어"},{"text":"17-04-01 子之武城聞弦歌之聲","source":"논어"},{"text":"弦琴瑟也時子游爲武城宰以禮樂爲敎故邑人皆弦歌也","source":"논어"},{"text":"17-04-02 夫子莞爾而笑曰割鷄焉用牛刀","source":"논어"},{"text":"莞爾小笑貌蓋喜之也因言其治小邑何必用此大道也","source":"논어"},{"text":"17-04-03 子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也","source":"논어"},{"text":"君子小人以位言之子游所稱蓋夫子之常言言君子小人皆不可以不學故武","source":"논어"},{"text":"城雖小亦必敎以禮樂","source":"논어"},{"text":"17-04-04 子曰二三子偃之言是也前言戱之耳","source":"논어"},{"text":"嘉子游之篤信又以解門人之惑也○治有大小而其治之必用禮樂則其爲道一","source":"논어"},{"text":"也但衆人多不能用而子游獨行之故夫子驟聞而深喜之因反其言以戱之而","source":"논어"},{"text":"子游以正對故復是其言而自實其戱也","source":"논어"},{"text":"17-05-01 公山弗擾以費畔召子欲往","source":"논어"},{"text":"弗擾季氏宰與陽虎共執桓子據邑以叛","source":"논어"},{"text":"17-05-02 子路不說曰末之也已何必公山氏之之也","source":"논어"},{"text":"末無也言道旣不行無所往矣何必公山氏之往乎","source":"논어"},{"text":"17-05-03 子曰夫召我者而豈徒哉如有用我者吾其爲東周乎","source":"논어"},{"text":"豈徒哉言必用我也爲東周言興周道於東方○程子曰聖人以天下無不可有","source":"논어"},{"text":"爲之人亦無不可改過之人故欲往然而終不往者知其必不能改故也","source":"논어"},{"text":"17-06-01 子張問仁於孔子孔子曰能行五子於天下爲仁矣請問之曰恭寬信敏","source":"논어"},{"text":"惠恭則不侮寬則得衆信則人任焉敏則有功惠則足以使人","source":"논어"},{"text":"行是五者則心存而理得矣於天下言無適而不然猶所謂雖之夷狄不可棄者五","source":"논어"},{"text":"者之目蓋因子張所不足而言耳任倚仗也又言其效如此○張敬夫曰能行此","source":"논어"},{"text":"五者於天下則其心公平而周遍可知矣然恭其本與李氏曰此章與六言六蔽","source":"논어"},{"text":"五美四惡之類皆與前後文體大不相似","source":"논어"},{"text":"17-07-01 佛肸召子欲往","source":"논어"},{"text":"佛肸晉大夫趙氏之中牟宰也","source":"논어"},{"text":"17-07-02 子路曰昔者由也聞諸夫子曰親於其身爲不善者君子不入也佛肸以","source":"논어"},{"text":"中牟畔子之往也如之何","source":"논어"},{"text":"子路恐佛肸之浼夫子故問此以止夫子之行親猶自也不入不入其黨也","source":"논어"},{"text":"17-07-03 子曰然有是言也不曰堅乎磨而不磷不曰白乎涅而不緇","source":"논어"},{"text":"磷薄也涅染皂物言人之不善不能浼己楊氏曰磨不磷涅不緇而後無可無","source":"논어"},{"text":"不可堅白不足而欲自試於磨涅其不磷緇也者幾希","source":"논어"},{"text":"17-07-04 吾豈匏瓜也哉焉能繫而不食","source":"논어"},{"text":"匏瓠也匏瓜繫於一處而不能飮食人則不如是也○張敬夫曰子路昔者之所","source":"논어"},{"text":"聞君子守身之常法夫子今日之所言聖人體道之大權也然夫子於公山佛肸之","source":"논어"},{"text":"召皆欲往者以天下無不可變之人無不可爲之事也其卒不往者知其人之終不","source":"논어"},{"text":"可變而事之終不可爲耳一則生物之仁一則知人之智也","source":"논어"},{"text":"17-08-01 子曰由也女聞六言六蔽矣乎對曰未也","source":"논어"},{"text":"17-08-02 居吾語女","source":"논어"},{"text":"禮君子問更端則起而對故夫子諭子路使還坐而告之","source":"논어"},{"text":"17-08-03 好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊","source":"논어"},{"text":"好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂","source":"논어"},{"text":"六言皆美德然徒好之而不學以明其理則各有所蔽愚若可陷可罔之類蕩謂","source":"논어"},{"text":"窮高極廣而無所止賊謂傷害於物勇者剛之發剛者勇之體狂躁率也○范","source":"논어"},{"text":"氏曰子路勇於爲善其失之者未能好學以明之也故告之以此曰勇曰剛曰信曰","source":"논어"},{"text":"直又皆所以救其偏也","source":"논어"},{"text":"17-09-01 子曰小子何莫學夫詩","source":"논어"},{"text":"小子弟子也","source":"논어"},{"text":"17-09-02 詩可以興","source":"논어"},{"text":"17-09-03 可以觀","source":"논어"},{"text":"17-09-04 可以群","source":"논어"},{"text":"17-09-05 可以怒","source":"논어"},{"text":"17-09-06 邇之事父遠之事君","source":"논어"},{"text":"人倫之道詩無不備二者擧重而言","source":"논어"},{"text":"17-09-07 多識於鳥獸草木之名","source":"논어"},{"text":"其緖餘又足以資多識○學詩之法此章盡之讀是經者所宜盡心也","source":"논어"},{"text":"陽貨10章","source":"논어"},{"text":"17-10-01 子謂伯魚曰女爲周南召南矣乎人而不爲周南召南其猶正牆面而立也","source":"논어"},{"text":"爲猶學也周南召南詩首篇名所言皆修身齊家之事正牆面而立言卽其至近","source":"논어"},{"text":"之地而一物無所見一步不可行","source":"논어"},{"text":"陽貨11章","source":"논어"},{"text":"17-11-01 子曰禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉","source":"논어"},{"text":"敬而將之以玉帛則爲禮","source":"논어"},{"text":"和而發之以鍾鼓則爲樂","source":"논어"},{"text":"遺其本而專事其末","source":"논어"},{"text":"則豈禮樂之","source":"논어"},{"text":"謂哉○程子曰禮只是一箇序樂只是一箇和只此兩字含蓄多少義理天下","source":"논어"},{"text":"無一物無禮樂且如置此兩椅一不正便是無序無序便乖乖便不和又如盜賊","source":"논어"},{"text":"至爲不道然亦有禮樂蓋心有總屬必相聽順乃能爲盜不然則叛亂無統不能","source":"논어"},{"text":"一日相聚而爲盜也禮樂無處無之學者要須識得","source":"논어"},{"text":"陽貨12章","source":"논어"},{"text":"17-12-01 子曰色厲而內荏譬諸小人其猶穿窬之盜也與","source":"논어"},{"text":"厲威嚴也荏柔弱也小人細民也穿穿壁窬踰牆言其無實盜名而常畏人知","source":"논어"},{"text":"陽貨13章","source":"논어"},{"text":"17-13-01 子曰鄕原德之賊也","source":"논어"},{"text":"鄕者鄙俗之意愿與愿同荀子原慤註讀作愿是也鄕原鄕人之愿者也蓋其","source":"논어"},{"text":"同流合汚以媚於世故在鄕人之中獨以愿稱夫子以其似德非德而反亂乎德故","source":"논어"},{"text":"以爲德之賊而深惡之詳見孟子末篇","source":"논어"},{"text":"陽貨14章","source":"논어"},{"text":"17-14-01 子曰道聽而塗說德之棄也","source":"논어"},{"text":"雖聞善言不爲己有是自棄其德也○王氏曰君子多識前言往行以畜其德道","source":"논어"},{"text":"聽塗說則棄之矣","source":"논어"},{"text":"陽貨15章","source":"논어"},{"text":"17-15-01 子曰鄙夫可與事君也與哉","source":"논어"},{"text":"鄙夫庸惡陋劣之稱","source":"논어"},{"text":"17-15-02 其未得之也患得之旣得之患失之","source":"논어"},{"text":"何氏曰患得之謂患不能得之","source":"논어"},{"text":"17-15-03 苟患失之無所不至矣","source":"논어"},{"text":"小則吮癰舐痔大則弑父與君皆生於患失而已○胡氏曰許昌靳裁之有言曰士","source":"논어"},{"text":"之品大槪有三志於道德者功名不足以累其心志於功名者富貴不足以累其心","source":"논어"},{"text":"志於富貴而已者則亦無所不至矣志於富貴卽孔子所謂鄙夫也","source":"논어"},{"text":"陽貨16章","source":"논어"},{"text":"17-16-01 子曰古者民有三疾今也或是之亡也","source":"논어"},{"text":"氣失其平則爲疾故氣稟之偏者亦謂之疾昔所謂疾今亦亡之傷俗之益偸也","source":"논어"},{"text":"17-16-02 古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之","source":"논어"},{"text":"愚也詐而已矣","source":"논어"},{"text":"狂者志願太高肆謂不拘小節蕩則踰大閑矣矜者持守太嚴廉謂稜角陗厲","source":"논어"},{"text":"忿戾則至於爭矣愚者暗昧不明直謂徑行自遂詐則挾私妄作矣○范氏曰","source":"논어"},{"text":"末世滋僞豈惟賢者不如古哉民性之蔽亦與古人異矣","source":"논어"},{"text":"陽貨17章","source":"논어"},{"text":"17-17-01 子曰巧言令色鮮矣仁","source":"논어"},{"text":"陽貨18章","source":"논어"},{"text":"17-18-01 子曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者","source":"논어"},{"text":"朱正色紫間色雅正也利口捷給覆傾敗也○范氏曰天下之理正而勝","source":"논어"},{"text":"者常少不正而勝者常多聖人所以惡之也利口之人以是爲非以非爲是以賢爲","source":"논어"},{"text":"不肖以不肖爲賢人君苟悅而信之則國家之覆也不難矣","source":"논어"},{"text":"陽貨19章","source":"논어"},{"text":"17-19-01 子曰予欲無言","source":"논어"},{"text":"學者多以言語觀聖人而不察其天理流行之實有不待言而著者是以徒得其言而","source":"논어"},{"text":"不得其所以言故夫子發此以警之","source":"논어"},{"text":"17-19-02 子貢曰子如不言則小子何述焉","source":"논어"},{"text":"子貢正以言語觀聖人者故疑而問之","source":"논어"},{"text":"17-19-03 子曰天何言哉四時行焉百物生焉天何言哉","source":"논어"},{"text":"四時行百物生莫非天理發見流行之實不待言而可見聖人一動一靜莫非妙道","source":"논어"},{"text":"精義之發亦天而已豈待言而顯哉此亦開示子貢之切惜乎其終不喩也○程","source":"논어"},{"text":"子曰孔子之道譬如日星之明猶患門人未能盡曉故曰予欲無言若顔子則便黙","source":"논어"},{"text":"識其他則未免疑問故曰小子何述又曰天何言哉四時行焉百物生焉則可謂","source":"논어"},{"text":"至明白矣愚按此與前篇無隱之意相發學者詳之","source":"논어"},{"text":"陽貨20章","source":"논어"},{"text":"17-20-01 孺悲欲見孔子孔子辭以疾將命者出戶取瑟而歌使之聞之","source":"논어"},{"text":"孺悲魯人嘗學士喪禮於孔子當是時必有以得罪者故辭以疾而又使知其非","source":"논어"},{"text":"疾以警敎之也程子曰此孟子所謂不屑之敎誨所以深敎之也","source":"논어"},{"text":"陽貨21章","source":"논어"},{"text":"17-21-01 宰我問三年之喪期已久矣","source":"논어"},{"text":"17-21-02 君子三年不爲禮禮必壞三年不爲樂樂必崩","source":"논어"},{"text":"恐居喪不習而崩壞也","source":"논어"},{"text":"17-21-03 舊穀旣沒新穀旣升鑽燧改火期可已矣","source":"논어"},{"text":"沒盡也升登也燧取火之木也改火春取楡柳之火夏取棗杏之火夏季取桑","source":"논어"},{"text":"柘之火秋取柞楢之火冬取槐檀之火亦一年而周也已止也言期年則天運一周","source":"논어"},{"text":"時物皆變喪至此可止也尹氏曰短喪之說下愚且恥言之宰我親學聖人之門而","source":"논어"},{"text":"以是爲問者有所疑於心而不敢强焉爾","source":"논어"},{"text":"17-21-04 子曰食夫稻衣夫錦於女安乎曰安","source":"논어"},{"text":"禮父母之喪旣殯食粥麤衰旣葬疏食水飮受以成布期而小祥始食菜果練","source":"논어"},{"text":"冠縓緣要絰不除無食稻衣錦之理夫子欲宰我反求諸心自得其所以不忍者故","source":"논어"},{"text":"問之以此而宰我不察也","source":"논어"},{"text":"17-21-05 女安則爲之夫君子之居喪食旨不甘聞樂不樂居處不安故不爲也","source":"논어"},{"text":"今女安則爲之","source":"논어"},{"text":"此夫子之言也旨亦甘也初言女安則爲之絶之之辭又發其不忍之端以警其","source":"논어"},{"text":"不察而再言女安則爲之以深責之","source":"논어"},{"text":"17-21-06 宰我出子曰予之不仁也子生三年然後免於父母之懷夫三年之喪","source":"논어"},{"text":"天下之通喪也予也有三年之愛於其父母乎","source":"논어"},{"text":"宰我旣出夫子懼其眞以爲可安而遂行之故深探其本而斥之言由其不仁故愛","source":"논어"},{"text":"親之薄如此也懷抱也又言君子所以不忍於親而喪必三年之故使之聞之或能","source":"논어"},{"text":"反求而終得其本心也○范氏曰喪雖止於三年然賢者之情則無窮也特以聖人","source":"논어"},{"text":"爲之中制而不敢過故必俯而就之非以三年之喪爲足以報其親也所謂三年然後","source":"논어"},{"text":"免於父母之懷特以責宰我之無恩欲其有以跂而及之爾","source":"논어"},{"text":"陽貨22章","source":"논어"},{"text":"17-22-01 子曰飽食終日無所用心難矣哉不有博奕者乎爲之猶賢乎已","source":"논어"},{"text":"博局戱也奕圍棊也已止也季氏曰聖人非敎人博奕也所以甚言無所用心之","source":"논어"},{"text":"陽貨23章","source":"논어"},{"text":"17-23-01 子路曰君子尙勇乎子曰君子義以爲上君子有勇而無義爲亂小人有","source":"논어"},{"text":"勇而無義爲盜","source":"논어"},{"text":"尙上之也君子爲亂小人爲盜皆以位而言者也尹氏曰義以爲尙則其爲勇也","source":"논어"},{"text":"大矣子路好勇故夫子以此救其失也胡氏曰疑此子路初見孔子時問答也","source":"논어"},{"text":"陽貨24章","source":"논어"},{"text":"17-24-01 子貢曰君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡","source":"논어"},{"text":"勇而無禮者惡果敢而窒者","source":"논어"},{"text":"訕謗毁也窒不通也稱人惡則無仁厚之意下訕上則無忠敬之心勇無禮則爲亂","source":"논어"},{"text":"果而窒則妄作故夫子惡之","source":"논어"},{"text":"17-24-02 曰賜也亦有惡乎惡徼以爲知者惡不孫以爲勇者惡訐以爲直者","source":"논어"},{"text":"惡徼以下子貢之言也徼伺察也訐謂攻發人之陰私○楊氏曰仁者無不愛","source":"논어"},{"text":"則君子疑若無惡矣子貢之有是心也故問焉以質其是非侯氏曰聖賢之所惡如","source":"논어"},{"text":"此所謂惟仁者能惡人也","source":"논어"},{"text":"陽貨25章","source":"논어"},{"text":"17-25-01 子曰唯女子與小人爲難養也近之則不孫遠之則怨","source":"논어"},{"text":"此小人亦謂僕隸下人也君子之於臣妾莊以涖之慈以畜之則無二者之患矣","source":"논어"},{"text":"陽貨26章","source":"논어"},{"text":"17-26-01 子曰年四十而見惡焉其終也已","source":"논어"},{"text":"四十成德之時見惡於人則止於此而已勉人及時遷善改過也蘇氏曰此亦有爲","source":"논어"},{"text":"而言不知其爲誰也","source":"논어"},{"text":"此篇多記聖賢之出處凡十一章","source":"논어"},{"text":"18-01-01 微子去之箕子爲之奴比干諫而死","source":"논어"},{"text":"微箕二國名子爵也微子紂庶兄箕子比干紂諸父微子見紂無道去之以","source":"논어"},{"text":"存宗祀箕子比干皆諫紂殺比干囚箕子以爲奴箕子因佯狂而受辱","source":"논어"},{"text":"18-01-02 孔子曰殷有三仁焉","source":"논어"},{"text":"而同出於至誠惻怛之意","source":"논어"},{"text":"不咈乎愛之理而有以全其心之德也","source":"논어"},{"text":"楊氏曰此三人者各得其本心故同謂之仁","source":"논어"},{"text":"18-02-01 柳下惠爲士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜","source":"논어"},{"text":"枉道而事人何必去父母之邦","source":"논어"},{"text":"士師獄官黜退也柳下惠三黜不去而其辭氣雍容如此可謂和矣然其不能枉","source":"논어"},{"text":"道之意則有確乎不可拔者是則所謂必以其道而不自失焉者也○胡氏曰此必","source":"논어"},{"text":"有孔子斷之之言而亡之矣","source":"논어"},{"text":"18-03-01 齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用","source":"논어"},{"text":"魯三卿季氏最貴孟氏爲下卿孔子去之事見世家然此言必非面語孔子蓋自","source":"논어"},{"text":"以告其臣而孔子聞之爾○程子曰季氏强臣君待之之禮極隆然非所以待孔","source":"논어"},{"text":"子也以季孟之間待之則禮亦至矣然復曰吾老矣不能用也故孔子去之蓋","source":"논어"},{"text":"不繫待之輕重特以不用而去爾","source":"논어"},{"text":"18-04-01 齊人歸女樂季桓子受之三日不朝孔子行","source":"논어"},{"text":"季桓子魯大夫名斯按史記定公十四年孔子爲魯司寇攝行相事齊人懼歸女","source":"논어"},{"text":"樂以沮之尹氏曰受女樂而怠於政事如此其簡賢棄禮不足與有爲可知矣夫子","source":"논어"},{"text":"所以行也所謂見幾而作不俟終日者與○范氏曰此篇記仁賢之出處而折中以","source":"논어"},{"text":"聖人之行所以明中庸之道也","source":"논어"},{"text":"18-05-01 楚狂接輿歌而過孔子曰鳳兮鳳兮何德之衰往者不可諫來者猶可","source":"논어"},{"text":"追已而已而今之從政者殆而","source":"논어"},{"text":"接輿楚人佯狂避世夫子時將適楚故接輿歌而過其車前也鳳有道則見無道","source":"논어"},{"text":"則隱接輿以比孔子而譏其不能隱爲德衰也來者可追言及今尙可隱去已止","source":"논어"},{"text":"也而語助辭殆危也接輿蓋知尊夫子而趨不同者也","source":"논어"},{"text":"18-05-02 孔子下欲與之言趨而辟之不得與之言","source":"논어"},{"text":"孔子下車蓋欲告之以出處之意接輿自以爲是故不欲聞而辟之也","source":"논어"},{"text":"18-06-01 長沮桀溺耦而耕孔子過之使子路問津焉","source":"논어"},{"text":"二人隱者耦並耕也時孔子自楚反乎蔡津濟渡處","source":"논어"},{"text":"18-06-02 長沮曰夫執輿者爲誰子路曰爲孔丘曰是魯孔丘與曰是也曰是","source":"논어"},{"text":"接輿執轡在車也蓋本子路御而執轡今下問津故夫子代之也知津言數周流","source":"논어"},{"text":"18-06-03 問於桀溺桀溺曰子爲誰曰爲仲由曰是魯孔丘之徒與對曰然曰","source":"논어"},{"text":"滔滔者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰","source":"논어"},{"text":"滔滔流而不反之意以猶與也言天下皆亂將誰與變易之而汝也辟人謂孔子","source":"논어"},{"text":"辟世桀溺自謂耰覆種也亦不告以津處","source":"논어"},{"text":"18-06-04 子路行以告夫子憮然曰鳥獸不可與同群吾非斯人之徒與而誰與","source":"논어"},{"text":"天下有道丘不與易也","source":"논어"},{"text":"憮然猶悵然惜其不喩己意也言所當與同群者斯人而已豈可絶人逃世以爲潔","source":"논어"},{"text":"哉天下若已平治則我無用變易之正爲天下無道故欲以道易之耳○程子曰","source":"논어"},{"text":"聖人不敢有忘天下之心故其言如此也張子曰聖人之仁不以無道必天下而","source":"논어"},{"text":"18-07-01 子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤","source":"논어"},{"text":"五穀不分孰爲夫子植其杖而芸","source":"논어"},{"text":"丈人亦隱者蓧竹器分辨也五穀不分猶言不辨菽麥爾責其不事農業而從師","source":"논어"},{"text":"遠遊也植立之也芸去草也","source":"논어"},{"text":"18-07-02 子路拱而立","source":"논어"},{"text":"知其隱者敬之也","source":"논어"},{"text":"18-07-03 止子路宿殺鷄爲黍而食之見其二子焉明日子路行以告子曰隱者也","source":"논어"},{"text":"使子路反見之至則行矣","source":"논어"},{"text":"孔子使子路反見之蓋欲告之以君臣之義而丈人意子路必將復來故先去之以","source":"논어"},{"text":"滅其跡亦接輿之意也","source":"논어"},{"text":"18-07-04 子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔","source":"논어"},{"text":"其身而亂大倫君子之仕也行其義也道之不行已知之矣","source":"논어"},{"text":"子路述夫子之意如此蓋丈人之接子路甚倨而子路益恭丈人因見其二子焉則於","source":"논어"},{"text":"長幼之節固知其不可廢矣故因其所明以曉之倫序也人之大倫有五父子有","source":"논어"},{"text":"親君臣有義夫婦有別長幼有序朋友有信是也仕所以行君臣之義故雖知","source":"논어"},{"text":"道之不幸而不可廢然謂之義則事之可否身之去就亦自有不可苟者是以雖","source":"논어"},{"text":"不潔身以亂倫亦非忘義以徇祿也福州有國初時寫本路下有反子二字以此爲","source":"논어"},{"text":"子路反而夫子言之也未知是否○范氏曰隱者爲高故往而不返仕者謂通故","source":"논어"},{"text":"溺而不止不與鳥獸同群則決性命之情以饕富貴此二者皆惑也是以依乎中庸","source":"논어"},{"text":"者爲難惟聖人不廢君臣之義而必以其正所以或出或處而終不離於道也","source":"논어"},{"text":"18-08-01 逸民伯夷叔齊虞仲夷逸朱張柳下惠少連","source":"논어"},{"text":"逸遺逸民者無位之稱虞仲卽仲雍與泰伯同竄荊蠻者夷逸朱張不見經傳","source":"논어"},{"text":"少連東夷人","source":"논어"},{"text":"18-08-02 子曰不降其志不辱其身伯夷叔齊與","source":"논어"},{"text":"18-08-03 謂柳下惠少連降志辱身矣言中倫行中慮其斯而已矣","source":"논어"},{"text":"柳下惠事見上倫義理之次第也慮思慮也中慮言有意義合人心少連事不","source":"논어"},{"text":"可考然記稱其善居喪三日不怠三月不解朞悲哀三年憂則行之中慮亦可","source":"논어"},{"text":"18-08-04 謂虞仲夷逸隱居放言身中淸廢中權","source":"논어"},{"text":"仲雍居吳斷髮文身裸以爲飾隱居獨善合乎道之淸放言自廢合乎道之權","source":"논어"},{"text":"18-08-05 我則異於是無可無不可","source":"논어"},{"text":"孟子曰孔子可以仕則仕可以止則止可以久則久可以速則速所謂無可無不可","source":"논어"},{"text":"也○謝氏曰七人隱遯不汚則同其立心造行則異伯夷叔齊天子不得臣諸侯","source":"논어"},{"text":"不得友蓋已遯世離群矣下聖人一等此其最高與柳下惠少連雖降志而不枉己","source":"논어"},{"text":"雖辱身而不求合其心有不屑也故言能中倫行能中慮虞仲夷逸隱居放言則","source":"논어"},{"text":"言不合先王之法者多矣然淸而不汚也權而適宜也與方外之士害義傷敎而亂大","source":"논어"},{"text":"倫者殊科是以均謂之逸民尹氏曰七人各守其一節而孔子則無可無不可所","source":"논어"},{"text":"以常適其可而異於逸民之徒也揚雄曰觀乎聖人則見賢人是以孟子語夷惠","source":"논어"},{"text":"亦必以孔子斷之","source":"논어"},{"text":"18-09-01 大師摯適齊","source":"논어"},{"text":"大師魯樂官之長摯其名也","source":"논어"},{"text":"18-09-02 亞飯干適楚三飯繚適蔡四飯缺適秦","source":"논어"},{"text":"亞飯以下以樂侑食之官干繚缺皆名也","source":"논어"},{"text":"18-09-03 鼓方叔入於河","source":"논어"},{"text":"鼓擊鼓者方叔名河河內","source":"논어"},{"text":"18-09-04 播鼗武入於漢","source":"논어"},{"text":"播搖也鼗小鼓兩旁有耳持其柄而搖之則旁耳還自擊武名也漢漢中","source":"논어"},{"text":"18-09-05 小師陽擊磬襄入於海","source":"논어"},{"text":"少師樂官之佐陽襄二人名襄卽孔子所從學琴者海海島也○此記賢人","source":"논어"},{"text":"之隱遁以附前章然未必夫子之言也末章放此張子曰周衰樂廢夫子自衛反","source":"논어"},{"text":"魯一嘗治之其後伶人賤工識樂之正及魯益衰三桓僭妄自大師以下皆知散","source":"논어"},{"text":"之四方逾河蹈海以去亂聖人俄頃之助功化如此如有用我期月而可豈虛語哉","source":"논어"},{"text":"微子10章","source":"논어"},{"text":"18-10-01 周公謂魯公曰君子不施其親不使大臣怨乎不以故舊無大故則不棄","source":"논어"},{"text":"也無求備於一人","source":"논어"},{"text":"施陸氏本作弛福本同○魯公周公子伯禽也弛遺棄也以用也大臣非其","source":"논어"},{"text":"人則去之在其位則不可不用大故謂惡逆季氏曰四者皆君子之事忠厚之至","source":"논어"},{"text":"也○胡氏曰此伯禽受封之國周公訓戒之辭魯人傳誦久而不忘也其或夫子","source":"논어"},{"text":"嘗與門弟子言之歟","source":"논어"},{"text":"微子11章","source":"논어"},{"text":"18-11-01 周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧","source":"논어"},{"text":"或曰成王時人或曰宣王時人蓋一母四乳而生八子也然不可考矣○張子曰","source":"논어"},{"text":"記善人之多也愚按此篇孔子於三仁逸民師摯八士旣皆稱贊而品列之於接","source":"논어"},{"text":"輿沮溺丈人又每有惓惓接引之意皆衰世之志也其所感者深矣在陳之歎蓋","source":"논어"},{"text":"亦如此三仁則無間然矣其餘數君子者亦皆一世之高士若使得聞聖人之道以","source":"논어"},{"text":"裁其所過而勉其所不及則其所立豈止於此而已哉","source":"논어"},{"text":"此篇皆記弟子之言而子夏爲多子貢次之蓋孔門自顔子以下穎悟莫若子貢自","source":"논어"},{"text":"曾子以下篤實無若子夏故特記之詳焉凡二十五章","source":"논어"},{"text":"19-01-01 子張曰士見危致命見得思義祭思敬喪思哀其可已矣","source":"논어"},{"text":"致命謂委致其命猶言授命也四者立身之大節一有不至則餘無足觀故言士","source":"논어"},{"text":"能如此則庶乎其可矣","source":"논어"},{"text":"19-02-01 子張曰執德不弘信道不篤焉能爲有焉能爲亡","source":"논어"},{"text":"有所得而守之太狹則德孤有所聞而信之不篤則道廢焉能爲有亡猶言不足爲","source":"논어"},{"text":"19-03-01 子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之","source":"논어"},{"text":"其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與","source":"논어"},{"text":"於人何所不容我之不賢與人將拒我如之何其拒人也","source":"논어"},{"text":"子夏之言迫狹子張譏之是也但其所言亦有過高之弊蓋大賢雖無所不容然","source":"논어"},{"text":"大故亦所當絶不賢固不可以拒人然損友亦所當遠學者不可不察","source":"논어"},{"text":"19-04-01 子夏曰雖小道必有可觀者焉致遠恐泥是以君子不爲也","source":"논어"},{"text":"小道如農圃醫卜之屬泥不通也○楊氏曰百家衆技猶耳目口鼻皆有所明而","source":"논어"},{"text":"不能相通非無可觀也致遠則泥矣故君子不爲也","source":"논어"},{"text":"19-05-01 子夏曰日知其所亡月無忘其所能可謂好學也已矣","source":"논어"},{"text":"亡無也謂己之所未有○尹氏曰好學者日新而不失","source":"논어"},{"text":"19-06-01 子夏曰博學而篤志切問而近思仁在其中矣","source":"논어"},{"text":"四者皆學問思辨之事耳未及乎力行而爲仁也然從事於此則心不外馳而所存","source":"논어"},{"text":"自熟故曰仁在其中矣○程子曰博學而篤志切問而近思何以言仁在其中矣","source":"논어"},{"text":"學者要思得之了此便是徹上徹下之道又曰學不博則不能守約志不篤則不能","source":"논어"},{"text":"力行切問近思在己者則仁在其中矣又曰近思者以類而推蘇氏曰博學而志","source":"논어"},{"text":"不篤則大而無成泛問遠思則勞而無功","source":"논어"},{"text":"19-07-01 子夏曰百工居肆以成其事君子學以致其道","source":"논어"},{"text":"肆謂官府造作之處致極也工不居肆則遷於異物而業不精君子不學則奪於","source":"논어"},{"text":"外誘而志不篤尹氏曰學所以致其道也百工居肆必務成其事君子之於學可","source":"논어"},{"text":"不知所務哉愚按二說相須其義始備","source":"논어"},{"text":"19-08-01 子夏曰小人之過也必文","source":"논어"},{"text":"文飾之也小人憚於改過而不憚於自欺故必文以重其過","source":"논어"},{"text":"19-09-01 子夏曰君子有三變望之儼然卽之也溫聽其言也厲","source":"논어"},{"text":"儼然者貌之莊溫者色之和厲者辭之確○程子曰他人儼然則不溫溫則不","source":"논어"},{"text":"厲惟孔子全之謝氏曰此非有意於變蓋並行而不相悖也如良玉溫潤而栗然","source":"논어"},{"text":"子張10章","source":"논어"},{"text":"19-10-01 子夏曰君子信而後勞其民未信則以爲厲己也信而後諫未信則以爲","source":"논어"},{"text":"信謂誠意惻怛而人信之也厲猶病也事上使下皆必誠意交孚而後可以有爲","source":"논어"},{"text":"子張11章","source":"논어"},{"text":"19-11-01 子夏曰大德不踰閑小德出入可也","source":"논어"},{"text":"大德小德猶言大節小節閑闌也所以止物之出入言人能先立乎其大者則小","source":"논어"},{"text":"節雖或未盡合理亦無害也○吳氏曰此章之言不能無弊學者詳之","source":"논어"},{"text":"子張12章","source":"논어"},{"text":"19-12-01 子游曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如","source":"논어"},{"text":"子游譏子夏弟子於威儀容節之間則可矣然此小學之末耳推其本如大學正心誠","source":"논어"},{"text":"意之事則無有","source":"논어"},{"text":"19-12-02 子夏聞之曰噫言游過矣君子之道孰先傳焉孰後倦焉譬諸草木區","source":"논어"},{"text":"以別矣君子之道焉可誣也有始有卒者其惟聖人乎","source":"논어"},{"text":"倦如誨人不倦之倦區猶類也言君子之道非以其末爲先而傳之非以其本爲後","source":"논어"},{"text":"而倦敎但學者所至自有淺深如草木之有大小其類固有別矣若不量其淺深不","source":"논어"},{"text":"問其生熟而槪以高且遠者强而語之則是誣之而已君子之道豈可如此若夫始","source":"논어"},{"text":"終本末一以貫之則惟聖人爲然豈可責之門人小子乎○程子曰君子敎人有序","source":"논어"},{"text":"先傳以小者近者而後敎以大者遠者非先傳以近小而後不敎以遠大也又曰灑掃","source":"논어"},{"text":"應對便是形而上者理無大小故也故君子只在謹獨又曰聖人之道更無精粗","source":"논어"},{"text":"從灑掃應對與精義入神貫通只一理雖灑掃應對只看所以然如何又曰凡物有","source":"논어"},{"text":"本末不可分本末爲兩段事灑掃應對是其然必有所以然又曰自灑掃應對上便","source":"논어"},{"text":"可到聖人事愚按程子第一條說此章文意最爲詳盡其後四條皆以明精粗本末","source":"논어"},{"text":"其分雖殊而理則一學者當循序而漸進不可厭末而求本蓋與第一條之意實相","source":"논어"},{"text":"表裏非謂末卽是本但學其末而本便在此也","source":"논어"},{"text":"子張13章","source":"논어"},{"text":"19-13-01 子夏曰仕而優則學學而優則仕","source":"논어"},{"text":"優有餘力也仕與學理同而事異故當其事者必先有以盡其事而後可及其餘","source":"논어"},{"text":"然仕而學則所以資其仕者益深學而仕則所以驗其學者益廣","source":"논어"},{"text":"子張14章","source":"논어"},{"text":"19-14-01 子游曰喪致乎哀而止","source":"논어"},{"text":"致極其哀不尙文飾也楊氏曰喪與其易也寧戚不若禮不足而哀有餘之意愚","source":"논어"},{"text":"按而止二字亦微有過於高遠而簡略細微之弊學者詳之","source":"논어"},{"text":"子張15章","source":"논어"},{"text":"19-15-01 子游曰吾友張也爲難能也然而未仁","source":"논어"},{"text":"子張行過高而少誠實惻怛之意","source":"논어"},{"text":"子張16章","source":"논어"},{"text":"19-16-01 曾子曰堂堂乎張也難與並爲仁矣","source":"논어"},{"text":"堂堂容貌之盛言其務外自高不可輔而爲仁亦不能有以輔人之仁也○范氏曰","source":"논어"},{"text":"子張外有餘而內不足故門人皆不與其爲仁子曰剛毅木訥近仁寧外不足而","source":"논어"},{"text":"內有餘庶可以爲仁矣","source":"논어"},{"text":"子張17章","source":"논어"},{"text":"19-17-01 曾子曰吾聞諸夫子人未有自致者也必也親喪乎","source":"논어"},{"text":"致盡其極也蓋人之眞情所不能自已者○尹氏曰親喪固所自盡也於此不","source":"논어"},{"text":"用其誠惡乎用其誠","source":"논어"},{"text":"子張18章","source":"논어"},{"text":"19-18-01 曾子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之","source":"논어"},{"text":"政是難能也","source":"논어"},{"text":"孟莊子魯大夫名速其父獻子名蔑獻子有賢德而莊子能用其臣守其政故","source":"논어"},{"text":"其他孝行雖有可稱而皆不若此事之爲難","source":"논어"},{"text":"子張19章","source":"논어"},{"text":"19-19-01 孟氏使陽膚爲士師問於曾子曾子曰上失其道民散久矣如得其情","source":"논어"},{"text":"則哀矜而勿喜","source":"논어"},{"text":"陽膚曾子弟子民散謂情義乖離不相維繫謝氏曰民之散也以使之無道敎之","source":"논어"},{"text":"無素故其犯法也非迫於不得已則陷於不知也故得其情則哀矜而勿喜","source":"논어"},{"text":"子張20章","source":"논어"},{"text":"19-20-01 子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸","source":"논어"},{"text":"下流地形卑下之處衆流之所歸喩人身有汚賤之實亦惡名之所聚也子貢言此","source":"논어"},{"text":"欲人常自警省不可一置其身於不善之地非謂紂本無罪而虛被惡名也","source":"논어"},{"text":"子張21章","source":"논어"},{"text":"19-21-01 子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之","source":"논어"},{"text":"子張22章","source":"논어"},{"text":"19-22-01 衛公孫朝問於子貢曰仲尼焉學","source":"논어"},{"text":"公孫朝衛大夫","source":"논어"},{"text":"19-22-02 子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫","source":"논어"},{"text":"不有文武之道焉夫子焉不學而亦何常師之有","source":"논어"},{"text":"文武之道謂文王武王之謨訓功烈與凡周之禮樂文章皆是也在人言人有能記","source":"논어"},{"text":"之者識記也","source":"논어"},{"text":"子張23章","source":"논어"},{"text":"19-23-01 叔孫武叔語大夫於朝曰子貢賢於仲尼","source":"논어"},{"text":"武叔魯大夫名州仇","source":"논어"},{"text":"19-23-02 子服景伯以告子貢子貢曰譬之宮牆賜之牆也及肩窺見室家之好","source":"논어"},{"text":"19-23-03 夫子之牆數仞不得其門而入不見宗廟之美百官之富","source":"논어"},{"text":"七尺曰仞不入其門則不見其中之所有言牆高而宮廣也","source":"논어"},{"text":"19-23-04 得其門者或寡矣夫子之云不亦宜乎","source":"논어"},{"text":"此夫子指武叔","source":"논어"},{"text":"子張24章","source":"논어"},{"text":"19-24-01 叔孫武叔毁仲尼子貢曰無以爲也仲尼不可毁也他人之賢者丘陵","source":"논어"},{"text":"也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不","source":"논어"},{"text":"無以爲猶言無用爲此土高曰丘大阜曰陵日月喩其至高自絶謂以謗毁自絶於","source":"논어"},{"text":"孔子多與祇同適也不知量謂不自知其分量也","source":"논어"},{"text":"子張25章","source":"논어"},{"text":"19-25-01 陳子禽謂子貢曰子爲恭也仲尼豈賢於子乎","source":"논어"},{"text":"爲恭謂恭敬推遜其師也","source":"논어"},{"text":"19-25-02 子貢曰君子一言以爲知一言以爲不知言不可不愼也","source":"논어"},{"text":"責子禽不謹言","source":"논어"},{"text":"19-25-03 夫子之不可及也猶天之不可階而升也","source":"논어"},{"text":"階梯也大可爲也化不可爲也故曰不可階而升也","source":"논어"},{"text":"19-25-04 夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也","source":"논어"},{"text":"榮其死也哀如之何其可及也","source":"논어"},{"text":"立之謂植其生也道引也謂敎之也行從也綏安也來歸附也動謂鼓舞之也","source":"논어"},{"text":"和所謂於變時雍言其感應之妙神速如此榮謂莫不尊親哀則如喪考妣程子","source":"논어"},{"text":"曰此聖人之神化上下與天地同流者也○謝氏曰觀子貢稱聖人語乃知晩年進","source":"논어"},{"text":"德蓋極於高遠也夫子之得邦家者其鼓舞群動捷於桴鼓影響人雖見變化而莫","source":"논어"},{"text":"竅其所以變化也","source":"논어"},{"text":"蓋不離於聖","source":"논어"},{"text":"而有不可知者存焉","source":"논어"},{"text":"聖而進於不可知之之神矣","source":"논어"},{"text":"殆難以思勉及也","source":"논어"},{"text":"20-01-01 堯曰咨爾舜天之曆數在爾躬允執厥中四海困窮天祿永終","source":"논어"},{"text":"此堯命舜而禪以帝位之辭咨嗟歎聲曆數帝王相繼之次第猶歲時氣節之先後","source":"논어"},{"text":"也允信也中者無過不及之名四海之人困窮則君祿亦永絶矣戒之也","source":"논어"},{"text":"20-01-02 舜亦以命禹","source":"논어"},{"text":"舜後遜位於禹亦以此辭命之今見於虞書大禹謨比此加詳","source":"논어"},{"text":"20-01-03 曰予小子履敢用玄牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡","source":"논어"},{"text":"在帝心朕躬有罪無以萬方萬方有罪罪在朕躬","source":"논어"},{"text":"此引商書湯誥之辭蓋湯旣放桀而告諸侯也與書文大同小異曰上當有湯字履","source":"논어"},{"text":"蓋湯名用玄牡夏尙黑未變其禮也簡閱也言桀有罪己不敢赦而天下賢人","source":"논어"},{"text":"皆上帝之臣己不敢蔽簡在帝心惟帝所命此述其初請命而伐桀之詞也又言君","source":"논어"},{"text":"有罪非民所致民有罪實君所爲見其厚於責己薄於責人之意此其告諸侯之辭","source":"논어"},{"text":"20-01-04 周有大賚善人是富","source":"논어"},{"text":"此以下述武王事賚予也武王克商大賚于四海見周書武成篇此言其所富者","source":"논어"},{"text":"皆善人也詩序云賚所以錫予善人蓋本於此","source":"논어"},{"text":"20-01-05 雖有周親不如仁人百姓有過在予一人","source":"논어"},{"text":"此周書泰誓之辭孔氏曰周至也言紂至親雖多不如周家之多仁人","source":"논어"},{"text":"20-01-06 謹權量審法度修廢官四方之政行焉","source":"논어"},{"text":"權稱錘也量斗斛也法度禮樂制度皆是也","source":"논어"},{"text":"20-01-07 興滅國繼絶世擧逸民天下之民歸心焉","source":"논어"},{"text":"興滅繼絶謂封黃帝堯舜夏商之後擧逸民謂釋箕子之囚復商容之位三者皆","source":"논어"},{"text":"人心之所欲也","source":"논어"},{"text":"20-01-08 所重民食喪祭","source":"논어"},{"text":"武成曰重民五敎惟食喪祭","source":"논어"},{"text":"20-01-09 寬則得衆信則民任焉敏則有功公則說","source":"논어"},{"text":"此於武王之事無所見恐或泛言帝王之道也○楊氏曰論語之書皆聖人微言","source":"논어"},{"text":"而其徒傳守之以明斯道者也故於終篇具載堯舜咨命之言湯武誓師之意與夫","source":"논어"},{"text":"施諸政事者","source":"논어"},{"text":"以明聖學之所傳者一於是而已","source":"논어"},{"text":"所以著明二十篇之大旨也","source":"논어"},{"text":"篇亦歷敍堯舜湯文孔子相承之次皆此意也","source":"논어"},{"text":"20-02-01 子張問於孔子曰何如斯可以從政矣子曰尊五美屛四惡斯可以從政","source":"논어"},{"text":"矣子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不","source":"논어"},{"text":"猛子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎擇可勞而","source":"논어"},{"text":"勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕","source":"논어"},{"text":"乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎","source":"논어"},{"text":"20-02-02 子張曰何謂四惡子曰不敎而殺謂之虐不戒視成謂之暴慢令致期","source":"논어"},{"text":"謂之賊猶之與人也出納之吝謂之有司","source":"논어"},{"text":"虐謂殘酷不仁暴謂卒遽無漸致期刻期也賊者切害之意緩於前而急於後","source":"논어"},{"text":"以誤其民而必刑之是賊害之也猶之猶言均之也均之以物與人而於其出納之際","source":"논어"},{"text":"乃或吝而不果則是有司之事而非爲政之體所與雖多人亦不懷其惠矣項羽使","source":"논어"},{"text":"人有功當封刻印刓忍弗能予卒以取敗亦其驗也○尹氏曰告問政者多矣","source":"논어"},{"text":"未有如此之備者也故記之以繼帝王之治則夫子之爲政可知也","source":"논어"},{"text":"20-03-01 子曰不知命無以爲君子也","source":"논어"},{"text":"程子曰知命者知有命而信之也人不知命則見害必避見利必趨何以爲君子","source":"논어"},{"text":"20-03-02 不知禮無以立也","source":"논어"},{"text":"不知禮則耳目無所加手足無所措","source":"논어"},{"text":"20-03-03 不知言無以知人也","source":"논어"},{"text":"言之得失可以知人之邪正○尹氏曰知斯三者則君子之事備矣弟子記此以終","source":"논어"},{"text":"篇得無意乎學者少而讀之老而不知一言爲可用不幾於侮聖言者乎夫子之罪","source":"논어"},{"text":"人也可不念哉","source":"논어"},{"text":"史記列傳曰孟軻騶人也受業子思之門人道旣通游事齊宣王宣王不能用適","source":"맹자"},{"text":"梁梁惠王不果所言則見以爲迂遠而濶於事情當是之時秦用商鞅楚魏用吳起","source":"맹자"},{"text":"齊用孫子田忌天下方務於合從連衡以攻伐爲賢而孟軻乃述唐虞三代之德是以","source":"맹자"},{"text":"所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇韓子曰堯以是傳","source":"맹자"},{"text":"之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔","source":"맹자"},{"text":"子傳之孟軻軻之死不得其傳焉荀與揚也澤焉而不精語焉而不詳○又曰孟","source":"맹자"},{"text":"氏醇乎醇者也荀與揚大醇而小疵○又曰孔子之道大而能博門弟子不能徧","source":"맹자"},{"text":"觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以其所能","source":"맹자"},{"text":"授弟子源遠而末益分惟孟軻師子思而子思之學出於曾子自孔子沒獨孟軻氏","source":"맹자"},{"text":"之傳得其宗故求觀聖人之道者必自孟子始○又曰揚子雲曰古者楊墨塞","source":"맹자"},{"text":"路孟子辭而闢之廓如也夫楊墨行正道廢孟子雖賢聖不得位空言無施雖切","source":"맹자"},{"text":"何補然賴其言而今之學者尙知宗孔氏崇仁義貴王賤霸而已其大經大法皆","source":"맹자"},{"text":"亡滅而不救壞爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆","source":"맹자"},{"text":"服左袵而言侏離矣故愈嘗推尊孟氏以爲功不在禹下者爲此也或問於程子曰","source":"맹자"},{"text":"孟子還可謂聖人否程子曰未敢便道他是聖人然學已到至處○程子又曰","source":"맹자"},{"text":"孟子有功於聖門不可勝言仲尼只說一箇仁字孟子開口便說仁義仲尼只說一","source":"맹자"},{"text":"箇志孟子便說許多養氣出來只此二字其功甚多○又曰孟子有大功於世以","source":"맹자"},{"text":"其言性善也○又曰孟子性善養氣之論皆前聖所未發○又曰學者全要識時若","source":"맹자"},{"text":"不識時不足以言學顔子陋巷自樂以有孔子在焉若孟子之時世旣無人安可不","source":"맹자"},{"text":"以道自任○又曰孟子有些英氣才有英氣便有圭角英氣甚害事如顔子便渾","source":"맹자"},{"text":"厚不同顔子去聖人只毫髮間孟子大賢亞聖之次也或曰英氣見於甚處曰","source":"맹자"},{"text":"但以孔子之言比之便可見且如氷與水精非不光比之玉自是有溫潤含蓄氣象","source":"맹자"},{"text":"無許多光耀也楊氏曰孟子一書只是要正人心敎人存心養性收其放心至論仁","source":"맹자"},{"text":"義禮智則以惻隱羞惡辭讓是非之心爲之端論邪說之害則曰生於其心害於其","source":"맹자"},{"text":"政論事君則曰格君心之非一正君而國定千變萬化只說從心上來人能正心","source":"맹자"},{"text":"則事無足爲者矣","source":"맹자"},{"text":"大學之修身齊家治國平天下","source":"맹자"},{"text":"其本只是正心誠意而已","source":"맹자"},{"text":"然後知性之善故孟子遇人便道性善歐陽永叔却言聖人之敎人性非所先","source":"맹자"},{"text":"可謂誤矣人性上不可添一物堯舜所以爲萬世法亦是率性而已所謂率性循天","source":"맹자"},{"text":"理是也外邊用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔","source":"맹자"},{"text":"梁惠王上1章","source":"맹자"},{"text":"01-01-01 孟子見梁惠王","source":"맹자"},{"text":"梁惠王魏侯罃也都大梁僭稱王諡曰惠史記惠王三十五年卑禮厚幣以招賢","source":"맹자"},{"text":"者以孟軻至梁","source":"맹자"},{"text":"01-01-02 王曰叟不遠千里而來亦將有以利吾國乎","source":"맹자"},{"text":"叟長老之稱王所謂利蓋富國彊兵之類","source":"맹자"},{"text":"01-01-03 孟子對曰王何必曰利亦有仁義而已矣","source":"맹자"},{"text":"仁者心之德愛之理義者心之制事之宜也此二句乃一章之大指下文乃詳","source":"맹자"},{"text":"言之後多放此","source":"맹자"},{"text":"01-01-04 王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利","source":"맹자"},{"text":"而國危矣萬乘之國殺其君者必千乘之家千乘之國弑其君者必百乘之家萬","source":"맹자"},{"text":"取千焉千取百焉不爲不多矣苟爲後義而先利不奪不饜","source":"맹자"},{"text":"此言求利之害以明上文何必曰利之意也征取也上取乎下下取乎上故曰交","source":"맹자"},{"text":"征國危謂將有弑奪之禍乘車數也萬乘之國者天子畿內地方千里出車萬乘","source":"맹자"},{"text":"千乘之家者天子之公卿采地方百里出車千乘也千乘之國諸侯之國百乘之家","source":"맹자"},{"text":"諸侯之大夫也弑下殺上也饜足也言臣之於君每十分而取其一分亦已多矣","source":"맹자"},{"text":"若又以義爲後而以利爲先則不弑其君而盡奪之其心未肯以爲足也","source":"맹자"},{"text":"01-01-05 未有仁而遺其親者也未有義而後其君者也","source":"맹자"},{"text":"此言仁義未嘗不利以明上文亦有仁義而已之意也遺猶棄也後不急也言仁","source":"맹자"},{"text":"者必愛其親義者必急其君故人君躬行仁義而無求利之心則其下化之自親","source":"맹자"},{"text":"01-01-06 王亦曰仁義而已矣何必曰利","source":"맹자"},{"text":"重言之以結上文兩節之意○此章言仁義根於人心之固有天理之公也利心","source":"맹자"},{"text":"生於物我之相形人欲之私也循天理則不求利而自無不利徇人欲則求利未得","source":"맹자"},{"text":"而害已隨之所謂毫釐之差千里之繆此孟子之書所以造端託始之深意學者所","source":"맹자"},{"text":"宜精察而明辨也○太史公曰余讀孟子書至梁惠王問何以利吾國未嘗不廢書","source":"맹자"},{"text":"而歎也曰嗟乎利誠亂之始也夫子罕言利常防其源也故曰放於利而行多","source":"맹자"},{"text":"怨自天子以至於庶人好利之弊何以異哉程子曰君子未嘗不欲利但專以利","source":"맹자"},{"text":"爲心則有害惟仁義則不求利而未嘗不利也當是之時天下之人惟利是求而不","source":"맹자"},{"text":"復知有仁義故孟子言仁義而不言利所以拔本塞源而求其弊此聖賢之心也","source":"맹자"},{"text":"梁惠王上2章","source":"맹자"},{"text":"01-02-01 孟子見梁惠王王立於沼上顧鴻鴈麋鹿曰賢者亦樂此乎","source":"맹자"},{"text":"沼池也鴻鴈之大者麋鹿之大者","source":"맹자"},{"text":"01-02-02 孟子對曰賢者而後樂此不賢者雖有此不樂也","source":"맹자"},{"text":"此一章之大指","source":"맹자"},{"text":"01-02-03 詩云經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王","source":"맹자"},{"text":"在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴王在靈沼於牣魚躍文王以民力爲臺爲","source":"맹자"},{"text":"沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚鼈古之人與民偕樂","source":"맹자"},{"text":"此引詩而釋之以明賢者而後樂此之意詩大雅靈臺之篇經量度也靈臺文王","source":"맹자"},{"text":"臺名也營謀爲也攻治也不日不終日也亟速也言文王戒以勿亟也子來","source":"맹자"},{"text":"如子來趨父事也靈囿靈沼臺下有囿囿中有沼也麀牝鹿也伏安其所不驚動","source":"맹자"},{"text":"也濯濯肥澤貌鶴鶴潔白貌於歎美辭牣滿也孟子言文王雖用民力而民","source":"맹자"},{"text":"反歡樂之旣加以美名而又樂其所有蓋由文王能愛其民故民樂其樂以文王亦","source":"맹자"},{"text":"得以享其樂也","source":"맹자"},{"text":"01-02-04 湯誓曰時日害喪予及女偕亡民欲與之偕亡雖有臺池鳥獸豈能獨","source":"맹자"},{"text":"此引書而釋之以明不賢者雖有此不樂之意也湯誓商書篇名時是也日指夏","source":"맹자"},{"text":"桀害何也桀嘗自言吾有天下如天之有日日亡吾乃亡耳民怨其虐故因其","source":"맹자"},{"text":"自言而目之曰此日何時亡乎若亡則我寧與之俱亡蓋欲其亡之甚也孟子引此","source":"맹자"},{"text":"以明君獨樂而不恤其民則民怨之而不能保其樂也","source":"맹자"},{"text":"梁惠王上3章","source":"맹자"},{"text":"01-03-01 梁惠王曰寡人之於國也盡心焉耳矣河內凶則移其民於河東移其粟","source":"맹자"},{"text":"於河內河東凶亦然察隣國之政無如寡人之用心者隣國之民不加少寡人之民","source":"맹자"},{"text":"不加多何也","source":"맹자"},{"text":"寡人諸侯自稱言寡德之人也河內河東皆魏地凶歲不熟也移民以就食移粟","source":"맹자"},{"text":"以給其老稚之不能移者","source":"맹자"},{"text":"01-03-02 孟子對曰王好戰請以戰喩塡然鼓之兵刃旣接棄甲曳兵而走或百","source":"맹자"},{"text":"步而後止或五十步而後止以五十步笑百步則何如曰不可直不百步耳是亦","source":"맹자"},{"text":"走也曰王如知此則無望民之多於隣國也","source":"맹자"},{"text":"塡鼓音也兵以鼓進以金退直猶但也言此以譬隣國不恤其民惠王能行小","source":"맹자"},{"text":"惠然皆不能行王道以養其民不可以此而笑彼也楊氏曰移民移粟荒政之所","source":"맹자"},{"text":"不廢也然不能行先王之道而徒以是爲盡心焉則末矣","source":"맹자"},{"text":"01-03-03 不違農時穀不可勝食也數罟不入洿池魚鼈不可勝食也斧斤以時","source":"맹자"},{"text":"入山林材木不可勝用也穀與魚鼈不可勝食材木不可勝用是使民養生喪死","source":"맹자"},{"text":"無憾也養生喪死無憾王道之始也","source":"맹자"},{"text":"農時謂春耕夏耘秋收之時凡有興作不違此時至冬乃役之也不可勝食言多","source":"맹자"},{"text":"也數密也罟網也洿窊下之地水所聚也古者網罟必用四寸之目魚不滿","source":"맹자"},{"text":"尺市不得粥人不得食山林川澤與民共之而有厲禁草木零落然後斧斤入焉","source":"맹자"},{"text":"此皆爲治之初法制未備且因天地自然之利而撙節愛養之事也然飮食宮室所","source":"맹자"},{"text":"以養生祭祀棺槨所以送死皆民所急而不可無者今皆有以資之則人無所恨矣","source":"맹자"},{"text":"王道以得民心爲本故以此爲王道之始","source":"맹자"},{"text":"01-03-04 五畝之宅樹之以桑五十者可以衣帛矣鷄豚狗彘之畜無失其時七十","source":"맹자"},{"text":"者可以食肉矣百畝之田勿奪其時數口之家可以無飢矣謹庠序之敎申之以孝","source":"맹자"},{"text":"悌之義頒白者不負戴於道路矣七十者衣帛食肉黎民不飢不寒然而不王者未","source":"맹자"},{"text":"五畝之宅一夫所受二畝半在田二畝半在邑田中不得有木恐妨五穀故於","source":"맹자"},{"text":"墻下植桑以供蠶事五十始衰非帛不煖未五十者不得依也畜養也時謂孕","source":"맹자"},{"text":"字之時如孟春犧牲毋用牝之類也七十非肉不飽未七十者不得食也百畝之田","source":"맹자"},{"text":"亦一夫所受至此則經界正井地均無不受田之家矣庠序皆學名也申重也丁","source":"맹자"},{"text":"寧反覆之意善事父母謂孝善事兄長爲悌頒與斑同老人頭半白黑者也負任","source":"맹자"},{"text":"在背戴任在首夫民衣食不足則不暇治禮義而飽煖無敎則又近於禽獸故","source":"맹자"},{"text":"旣富而敎以孝悌則人知愛親敬長而代其勞不使之負戴於道路矣衣帛食肉但言","source":"맹자"},{"text":"七十擧重以見輕也黎黑也黎民黑髮之人猶秦言黔首也少壯之人雖不得衣","source":"맹자"},{"text":"帛食肉然亦不至於飢寒也此言盡法制品節之詳極財成輔相之道以左右民","source":"맹자"},{"text":"是王道之成也","source":"맹자"},{"text":"01-03-05 狗彘食人食而不知檢塗有餓莩而不知發人死則曰非我也歲也是","source":"맹자"},{"text":"何異於刺人而殺之曰非我也兵也王無罪歲斯天下之民至焉","source":"맹자"},{"text":"檢制也莩餓死人也發發倉廩以賑貸也歲謂歲之豊凶也惠王不能制民之","source":"맹자"},{"text":"産又使狗彘得以食人之食則與先王制度品節之意異矣至於民飢而死猶不知","source":"맹자"},{"text":"發則其所移特民間之粟而已乃以民不加多歸罪於歲凶是知刃之殺人而不知","source":"맹자"},{"text":"操刃者之殺人也不罪歲則必能自反而益修其政天下之民至焉則不但多於隣","source":"맹자"},{"text":"國而已○程子曰孟子之論王道不過如此可謂實矣又曰孔子之時周室雖微","source":"맹자"},{"text":"天下猶知尊周之爲義故春秋以尊周爲本至孟子時七國爭雄天下不復知有周","source":"맹자"},{"text":"而生民之塗炭已極當是時諸侯能行王道則可以王矣此孟子所以勸齊梁之君","source":"맹자"},{"text":"也蓋王者天下之義主也聖賢亦何心哉視天命之改興未改耳","source":"맹자"},{"text":"梁惠王上4章","source":"맹자"},{"text":"01-04-01 梁惠王曰寡人願安承敎","source":"맹자"},{"text":"承上章言願安意以受敎","source":"맹자"},{"text":"01-04-02 孟子對曰殺人以梃與刃有以異乎曰無以異也","source":"맹자"},{"text":"01-04-03 以刃與政有以異乎曰無以異也","source":"맹자"},{"text":"孟子又問而王答也","source":"맹자"},{"text":"01-04-04 曰庖有肥肉廐有肥馬民有飢色野有餓莩此率獸而食人也","source":"맹자"},{"text":"厚斂於民以養禽獸而使民飢以死則無異於驅獸以食人矣","source":"맹자"},{"text":"01-04-05 獸相食且人惡之爲民父母行政不免於率獸而食人惡在其爲民父母","source":"맹자"},{"text":"君者民之父母也惡在猶言何在也","source":"맹자"},{"text":"01-04-06 仲尼曰始作俑者其無後乎爲其象人而用之也如之何其使斯民飢而","source":"맹자"},{"text":"俑從葬木偶人也古之葬者束草爲人以爲從衛謂之芻靈略似人形而已中古","source":"맹자"},{"text":"亦之以俑則有面目機發而太似人矣故孔子惡其不仁而言其必無後也孟子言","source":"맹자"},{"text":"此作俑者但用象人以葬孔子猶惡之況實使民飢而死乎○李氏曰爲人君者","source":"맹자"},{"text":"固未嘗有率獸食人之心然徇一己之欲而不恤其民則其流必至於此故以爲民","source":"맹자"},{"text":"父母告之夫父母之於子爲之就利避害未嘗頃刻而忘于懷何至視之不如犬馬乎","source":"맹자"},{"text":"梁惠王上5章","source":"맹자"},{"text":"01-05-01 梁惠王曰晉國天下莫強焉叟之所知也及寡人之身東敗於齊長子","source":"맹자"},{"text":"死焉西喪地於秦七百里南辱於楚寡人恥之願比死者一洒之如之何則可","source":"맹자"},{"text":"魏本晉大夫魏斯與韓氏趙氏共分晉地號曰三晉故惠王猶自謂晉國惠王三","source":"맹자"},{"text":"十年齊擊魏破其軍虜太子申七十年秦取魏少梁後魏又數獻地於秦又與楚","source":"맹자"},{"text":"將昭陽戰敗亡其七邑比猶爲也言欲爲死者雪其恥也","source":"맹자"},{"text":"01-05-02 孟子對曰地方百里而可以王","source":"맹자"},{"text":"百里小國也然能行仁政則天下之民歸之矣","source":"맹자"},{"text":"01-05-03 王如施仁政於民省刑罰薄稅斂深耕易耨壯者以暇日修其孝悌忠信","source":"맹자"},{"text":"入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣","source":"맹자"},{"text":"省刑罰薄稅斂此二者仁政之大目也易治也耨耘也盡己之謂忠以實之謂信","source":"맹자"},{"text":"君行仁政則民得盡力於農畝而又有暇日以修禮義是以尊君親上而樂於效死也","source":"맹자"},{"text":"01-05-04 彼奪其民時使不得耕耨以養其父母父母凍餓兄弟妻子離散","source":"맹자"},{"text":"彼謂敵國也","source":"맹자"},{"text":"01-05-05 彼陷溺其民王往而征之夫誰與王敵","source":"맹자"},{"text":"陷陷於阱溺溺於水暴虐之意征正也以彼暴虐其民以率吾尊君親上之民","source":"맹자"},{"text":"往正其罪彼民方怨其上而樂歸於我則誰與我爲敵哉","source":"맹자"},{"text":"01-05-06 故曰仁者無敵王請勿疑","source":"맹자"},{"text":"仁者無敵蓋古語也百里可王以此而已恐王疑其迂闊故勉使勿疑也○孔氏","source":"맹자"},{"text":"曰惠王之志在於報怨孟子之論在於救民所謂惟天吏則可以伐之蓋孟子之本","source":"맹자"},{"text":"梁惠王上6章","source":"맹자"},{"text":"01-06-01 孟子見梁襄王","source":"맹자"},{"text":"襄王惠王子名赫","source":"맹자"},{"text":"01-06-02 出語人曰望之不似人君就之而不見所畏焉卒然問曰天下惡乎定吾","source":"맹자"},{"text":"對曰定于一","source":"맹자"},{"text":"語告也不似人君不見所畏言其無威儀也卒然急遽之貌蓋容貌辭氣乃德之","source":"맹자"},{"text":"符其外如此則其中之所存者可知王問列國分爭天下當何所定孟子對以必","source":"맹자"},{"text":"合于一然後定也","source":"맹자"},{"text":"01-06-03 孰能一之","source":"맹자"},{"text":"01-06-04 對曰不嗜殺人者能一之","source":"맹자"},{"text":"01-06-05 孰能與之","source":"맹자"},{"text":"王復問也與猶歸也","source":"맹자"},{"text":"01-06-06 對曰天下莫不與也王知夫苗乎七八月之間旱則苗槁矣天油然作","source":"맹자"},{"text":"雲沛然下雨則苗浡然興之矣其如是孰能禦之今夫天下之人牧未有不嗜殺人","source":"맹자"},{"text":"者也如有不嗜殺人者則天下之民皆引領而望之矣誠如是也民歸之由水之就","source":"맹자"},{"text":"下沛然誰能禦之","source":"맹자"},{"text":"周七八月夏五六月也油然雲盛貌沛然雨盛貌浡然興起貌禦禁止也人牧","source":"맹자"},{"text":"謂牧民之君也領頸也蓋好生惡死人心所同故人君不嗜殺人則天下悅而歸","source":"맹자"},{"text":"之○蘇氏曰孟子之言非苟爲大而已然不深原其意而詳究其實未有不以爲","source":"맹자"},{"text":"子觀孟子以來","source":"맹자"},{"text":"自漢高祖及光武及唐太宗及我太祖皇帝","source":"맹자"},{"text":"能一天下者四君","source":"맹자"},{"text":"皆以不嗜殺人致之其餘殺人愈多而天下愈亂秦晉及隋力能合之而好殺不已","source":"맹자"},{"text":"故或合而復分或遂以亡國孟子之言豈偶然而已哉","source":"맹자"},{"text":"梁惠王上7章","source":"맹자"},{"text":"01-07-01 齊宣王問曰齊桓晉文之事可得聞乎","source":"맹자"},{"text":"齊宣王姓田氏名辟彊諸侯僭稱王也齊桓公晉文公皆霸諸侯者","source":"맹자"},{"text":"01-07-02 孟子對曰仲尼之徒無道桓文之事者是以後世無傳焉臣未之聞也","source":"맹자"},{"text":"無以則王乎","source":"맹자"},{"text":"道言也董子曰仲尼之門五尺童子羞稱五伯爲其先詐力而後仁義也亦此意","source":"맹자"},{"text":"也以已通用無已必欲言之而不止也王謂王天下之道","source":"맹자"},{"text":"01-07-03 曰德何如則可以王矣曰保民而王莫之能禦也","source":"맹자"},{"text":"01-07-04 曰若寡人者可以保民乎哉曰可曰何由知吾可也曰臣聞之胡齕","source":"맹자"},{"text":"曰王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鍾王曰舍","source":"맹자"},{"text":"之吾不忍其觳觫若無罪而就死地對曰然則廢釁鍾與曰何可廢也以羊易之","source":"맹자"},{"text":"胡齕齊臣也釁鍾新鑄鍾成而殺牲取血以塗其釁郄也觳觫恐懼貌孟子述所","source":"맹자"},{"text":"聞胡齕之語而問王不知果有此事否","source":"맹자"},{"text":"01-07-05 曰有之曰是心足以王矣百姓皆以王爲愛也臣固知王之不忍也","source":"맹자"},{"text":"王見牛之觳觫而不忍殺卽所謂惻隱之心仁之端也擴而充之則可以保四海矣故","source":"맹자"},{"text":"孟子指而言之欲王察識於此而擴充之也愛猶吝也","source":"맹자"},{"text":"01-07-06 王曰然誠有百姓者齊國雖褊小吾何愛一牛卽不忍其觳觫若無罪","source":"맹자"},{"text":"而就死地故以羊易之也","source":"맹자"},{"text":"言以羊易牛其迹似吝實有如百姓所譏者然我之心不如是也","source":"맹자"},{"text":"01-07-07 曰王無異於百姓之以王爲愛也以小易大彼惡知之王若隱其無罪而","source":"맹자"},{"text":"就死地則牛羊何擇焉王笑曰是誠何心哉我非愛其財而易之以羊也宜乎百姓","source":"맹자"},{"text":"之謂我愛也","source":"맹자"},{"text":"異怪也隱痛也擇猶分也言牛羊皆無罪而死何所分別而以羊易牛乎孟子故","source":"맹자"},{"text":"設此難欲王反求而得其本心王不能然故卒無以自解於百姓之言也","source":"맹자"},{"text":"01-07-08 曰無傷也是乃仁術也見牛未見羊也君子之於禽獸也見其生不忍","source":"맹자"},{"text":"見其死聞其聲不忍食其肉是以君子遠庖廚也","source":"맹자"},{"text":"無傷言雖有百姓之言不爲害也術謂法之巧者蓋殺牛卽所不忍釁鍾又不可","source":"맹자"},{"text":"廢於此無以處之則此心雖發而終不得施矣然見牛則此心已發而不可遏未","source":"맹자"},{"text":"見羊則其理未形而無所妨故以羊易牛則二者得以兩全而無害此所以爲仁之術","source":"맹자"},{"text":"也聲謂將死而衰鳴也蓋人之於禽獸同生而異類故用之以禮而不忍之心施","source":"맹자"},{"text":"於見聞之所及其所以必遠庖廚者亦以預養是心而廣爲仁之術也","source":"맹자"},{"text":"01-07-09 王說曰詩云他人有心予忖度之夫子之謂也夫我乃行之反而求之","source":"맹자"},{"text":"不得吾心夫子言之於我心有戚戚焉此心之所以合於王者何也","source":"맹자"},{"text":"詩小雅巧言之篇戚戚心動貌王因孟子之言而前日之心復萌乃知此心不從外","source":"맹자"},{"text":"得然猶未知所以反其本而推之也","source":"맹자"},{"text":"01-07-10 曰有復於王者曰吾力足以擧百鈞而不足以擧一羽明足以察秋毫之","source":"맹자"},{"text":"末而不見輿薪則王許之乎曰否今恩足以及禽獸而功不至於百姓者獨何與","source":"맹자"},{"text":"然則一羽之不擧爲不用力焉輿薪之不見爲不用明焉百姓之不見保爲不用恩","source":"맹자"},{"text":"焉故王之不王不爲也非不能也","source":"맹자"},{"text":"復白也鈞三十斤百鈞至重難擧也羽鳥羽一羽至輕易擧也秋毫之末毛","source":"맹자"},{"text":"至秋而末銳小而難見也輿薪以車載薪大而易見也許猶可也今恩以下又孟","source":"맹자"},{"text":"子之言也蓋天地之性人爲貴故人之與人又爲同類而相親是以惻隱之發則","source":"맹자"},{"text":"於民切而於物緩推廣仁術則仁民易而愛物難今王此心能及物矣則其保民而","source":"맹자"},{"text":"王非不能也但自不肯爲耳","source":"맹자"},{"text":"01-07-11 曰不爲者與不能者之形何以異曰挾太山以超北海語人曰我不能","source":"맹자"},{"text":"是誠不能也爲長者折枝語人曰我不能是不爲也非不能也故王之不王非","source":"맹자"},{"text":"挾太山以超北海之類也王之不王是折枝之類也","source":"맹자"},{"text":"形狀也挾以腋持物也超躍而過也爲長者折枝以長者之命折草木之枝言","source":"맹자"},{"text":"不難也是心固有不待外求擴而充之在我而已何難之有","source":"맹자"},{"text":"01-07-12 老吾老以及人之老幼吾幼以及人之幼天下可運於掌詩云刑于寡","source":"맹자"},{"text":"妻至于兄弟以御于家邦言擧斯心加諸彼而已故推恩足以保四海不推恩","source":"맹자"},{"text":"無以保妻子古之人所以大過人者無他焉善推其所爲而已矣今恩足以及禽獸","source":"맹자"},{"text":"而功不至於百姓者獨何與","source":"맹자"},{"text":"老以老事之也吾老謂我之父兄人之老謂人之父兄幼以幼畜之也吾幼謂","source":"맹자"},{"text":"我之子弟人之幼謂人之子弟運於掌言易也詩大雅思齊之篇刑法也寡妻","source":"맹자"},{"text":"寡德之妻謙辭也御治也不能推恩則衆叛親離故無以保妻子蓋骨肉之親","source":"맹자"},{"text":"本同一氣又非但若人之同類而已故古人必由親親推之然後及於仁民又推其","source":"맹자"},{"text":"餘然後及於愛物皆由近以及遠自易以及難今王反之則必有故矣故復推本","source":"맹자"},{"text":"01-07-13 權然後知輕重度然後知長短物皆然心爲甚王請度之","source":"맹자"},{"text":"權稱錘也度丈尺也度之謂稱量之也言物之輕重長短人所難齊必以權度","source":"맹자"},{"text":"度之而後可見若心之應物則其輕重長短之難齊而不可不度以本然之權度又有","source":"맹자"},{"text":"甚於物者今王恩及禽獸而功不至於百姓是其愛物之心重且長而仁民之心","source":"맹자"},{"text":"輕且短失其當然之序而不自知也故上文卽發其端而於此請王度之也","source":"맹자"},{"text":"01-07-14 抑王興甲兵危士臣構怨於諸侯然後快於心與","source":"맹자"},{"text":"抑發語辭士戰士也構結也孟子以王愛民之心所以輕且短者必其以是三者","source":"맹자"},{"text":"爲快也然三事實非人心之所快有甚於殺觳觫之牛者故指以問王欲其以此","source":"맹자"},{"text":"01-07-15 王曰否吾何快於是將以求吾所大欲也","source":"맹자"},{"text":"不快於此者心之正也而必爲此者欲誘之也欲之所誘者獨在於是是以其心","source":"맹자"},{"text":"尙明於他而獨暗於此此其愛民之心所以輕短而功不至於百姓也","source":"맹자"},{"text":"01-07-16 曰王之所大欲可得聞與王笑而不言曰爲肥甘不足於口與輕煖不","source":"맹자"},{"text":"足於體與抑爲采色不足視於目與聲音不足聽於耳與便嬖不足使令於前與王之","source":"맹자"},{"text":"諸臣皆足以供之而王豈爲是哉曰否吾不爲是也曰然則王之所大欲可知已","source":"맹자"},{"text":"欲辟土地朝秦楚莅中國而撫四夷也以若所爲求若所欲猶緣木而求魚也","source":"맹자"},{"text":"便嬖近習嬖幸之人也已語助辭辟開廣也朝至其來朝也秦楚皆大國莅","source":"맹자"},{"text":"臨也若如此也所爲指興兵結怨之事緣木求魚言必不可得","source":"맹자"},{"text":"01-07-17 王曰若是其甚與曰殆有甚焉緣木求魚雖不得魚無後災以若所","source":"맹자"},{"text":"爲求若所欲盡心力而爲之後必有災曰可得聞與曰鄒人與楚人戰則王以","source":"맹자"},{"text":"爲孰勝曰楚人勝曰然則小固不可以敵大寡固不可以敵衆弱固不可以敵強","source":"맹자"},{"text":"海內之地方千里者九齊集有其一以一服八何以異於鄒敵楚哉蓋亦反其本矣","source":"맹자"},{"text":"殆蓋皆發語辭鄒小國楚大國齊集有其一言集合齊地其方千里是有天下","source":"맹자"},{"text":"九分之一也以一服八必不能勝所謂後災也反本說見下文","source":"맹자"},{"text":"01-07-18 今王發政施仁使天下仕者皆欲立於王之朝耕者皆欲耕於王之野","source":"맹자"},{"text":"商賈皆欲藏於王之市","source":"맹자"},{"text":"皆欲出於王之塗","source":"맹자"},{"text":"天下之欲疾其君者","source":"맹자"},{"text":"皆欲赴愬於王","source":"맹자"},{"text":"其如是孰能禦之","source":"맹자"},{"text":"行貨曰商居貨曰賈發政施仁所以王天下之本也近者悅遠者來則大小彊弱","source":"맹자"},{"text":"非所論矣蓋力求所欲則所欲者反不可得能反其本則所欲者不求而至與首章","source":"맹자"},{"text":"01-07-19 王曰吾惛不能進於是矣願夫子輔吾志明以敎我我雖不敏請嘗試","source":"맹자"},{"text":"之曰無恒産而有恒心者惟士爲能若民則無恒産因無恒心苟無恒心放辟邪","source":"맹자"},{"text":"侈無不爲已及陷於罪然後從而刑之是罔民也焉有仁人在位罔民而可爲也","source":"맹자"},{"text":"恒常也産生業也恒産可常生之業也恒心人所常有之善心也士嘗學問知","source":"맹자"},{"text":"義理故雖無恒産而有常心民則不能然矣罔猶羅罔欺其不見而取之也","source":"맹자"},{"text":"01-07-20 是故明君制民之産必使仰足以事父母俯足以畜妻子樂歲終身飽","source":"맹자"},{"text":"凶年免於死亡然後驅而之善故民之從之也輕","source":"맹자"},{"text":"輕猶易也此言民有常産而有常心也","source":"맹자"},{"text":"01-07-21 今也制民之産仰不足以事父母俯不足以畜妻子樂歲終身苦凶年","source":"맹자"},{"text":"不免於死亡此惟救死而恐不贍奚暇治禮義哉","source":"맹자"},{"text":"贍足也此所謂無常産而無常心者也","source":"맹자"},{"text":"01-07-22 王欲行之則盍反其本矣","source":"맹자"},{"text":"盍何不也使民有常産者又發政施仁之本也說見下文","source":"맹자"},{"text":"01-07-23 吾畝之宅樹之以桑吾十者可以衣帛矣鷄豚狗彘之畜無失其時七十","source":"맹자"},{"text":"者可以食肉矣百畝之田勿奪其時八口之家可以無飢矣謹庠序之敎申之以孝","source":"맹자"},{"text":"悌之義頒白者不負戴於道路矣老者衣帛食肉黎民不飢不寒然而不王者未之","source":"맹자"},{"text":"此言制民之産之法也趙氏曰八口之家次上農夫也此王政之本常生之道故","source":"맹자"},{"text":"孟子爲齊梁之君各陳之也楊氏曰爲天下者擧斯心加諸彼而已然雖有仁心","source":"맹자"},{"text":"仁聞而民不被其澤者不行先王之道故也故以制民之産告之○此章言人君","source":"맹자"},{"text":"當黜霸功行王道而王道之要不過推其不忍之心以行不忍之政而已齊王非無","source":"맹자"},{"text":"此心而奪於功利之私不能擴充以行仁政雖以孟子反霸曉告精切如此而蔽固","source":"맹자"},{"text":"已深終不能悟是可歎也","source":"맹자"},{"text":"梁惠王下1章","source":"맹자"},{"text":"02-01-01 莊暴見孟子曰暴見於王王語暴以好樂暴未有以對也曰好樂何如","source":"맹자"},{"text":"孟子曰王之好樂甚則齊國其庶幾乎","source":"맹자"},{"text":"莊暴齊臣也庶幾近辭也言近於治","source":"맹자"},{"text":"02-01-02 他日見於王曰王嘗語莊子以好樂有諸王變乎色曰寡人非能好先","source":"맹자"},{"text":"王之樂也直好世俗之樂耳","source":"맹자"},{"text":"變色者慙其好之不正也","source":"맹자"},{"text":"02-01-03 曰王之好樂甚則齊其庶幾乎今之樂由古之樂也","source":"맹자"},{"text":"今樂世俗之樂古樂先王之樂","source":"맹자"},{"text":"02-01-04 曰可得聞與曰獨樂樂與人樂樂孰樂曰不若與人曰與少樂樂","source":"맹자"},{"text":"與衆樂樂孰樂曰不若與衆","source":"맹자"},{"text":"獨樂不若與人與少樂不若與衆亦人之常情也","source":"맹자"},{"text":"02-01-05 臣請爲王言樂","source":"맹자"},{"text":"此以下皆孟子之言也","source":"맹자"},{"text":"02-01-06 今王鼓樂於此百姓聞王鍾鼓之聲管籥之音擧疾首蹙頞而相告曰","source":"맹자"},{"text":"吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散今王田獵於此","source":"맹자"},{"text":"百姓聞王車馬之音見羽旄之美擧疾首蹙頞而相告曰吾王之好田獵夫何使我","source":"맹자"},{"text":"至於此極也父子不相見兄弟妻子離散此無他不與民同樂也","source":"맹자"},{"text":"鍾鼓管籥皆樂器也擧皆也疾首頭痛也蹙取也頞額也人憂戚則蹙其額","source":"맹자"},{"text":"極窮也羽旄旌屬不與民同樂謂獨樂其身而不恤其民使之窮困也","source":"맹자"},{"text":"02-01-07 今王鼓樂於此百姓聞王鍾鼓之聲管籥之音擧欣欣然有喜色而相","source":"맹자"},{"text":"告曰吾王庶幾無疾病與何以能鼓樂也今王田獵於此百姓聞王車馬之音見羽","source":"맹자"},{"text":"旄之美擧欣欣然有喜色而相告曰吾王庶幾無疾病與何以能田獵也此無他與","source":"맹자"},{"text":"與民同樂者推好樂之心以行仁政使民各得其所也","source":"맹자"},{"text":"02-01-08 今王與百姓同樂則王矣","source":"맹자"},{"text":"好樂而能與百姓同之則天下之民歸之矣所謂齊其庶幾者如此○范氏曰戰國","source":"맹자"},{"text":"之時民窮財盡人君獨以南面之樂自奉其身孟子切於救民故因齊王之好樂","source":"맹자"},{"text":"開導其善心深勸其與民同樂而謂今樂猶古樂其實今樂, 古樂何可同也但與","source":"맹자"},{"text":"民同樂之意則無古今之異耳若必欲以禮樂治天下當如孔子之言必用韶舞必","source":"맹자"},{"text":"放鄭聲蓋孔子之言爲邦之正道孟子之言救時之急務所以不同○楊氏曰樂","source":"맹자"},{"text":"以和爲主使人聞鍾鼓管絃之音而疾首蹙額則雖奏以咸英韶濩無補於治也故","source":"맹자"},{"text":"孟子告齊王以此姑正其本而已","source":"맹자"},{"text":"梁惠王下2章","source":"맹자"},{"text":"02-02-01 齊宣王問曰文王之囿方七十里有諸孟子對曰於傳有之","source":"맹자"},{"text":"囿者蕃育鳥獸之所古者四時之田皆於農隙以講武事然不欲馳騖於稼穡場","source":"맹자"},{"text":"圃之中故度閒曠之地以爲囿然文王七十里之囿其亦三分天下有其二之後也","source":"맹자"},{"text":"與傳謂古書","source":"맹자"},{"text":"02-02-02 曰若是其大乎曰民猶以爲小也曰寡人之囿方四十里民猶以爲大何","source":"맹자"},{"text":"也曰文王之囿方七十里芻蕘者往焉雉兎者往焉與民同之民以爲小不亦宜乎","source":"맹자"},{"text":"芻草也蕘薪也","source":"맹자"},{"text":"02-02-03 臣始至於境問國之大禁然後敢入臣聞郊關之內有囿方四十里殺其","source":"맹자"},{"text":"麋鹿者如殺人之罪則是方四十里爲阱於國中民以爲大不亦宜乎","source":"맹자"},{"text":"禮入國而問禁國外百里爲郊郊外有關阱坎地以陷獸者言陷民於死也","source":"맹자"},{"text":"梁惠王下3章","source":"맹자"},{"text":"02-03-01 齊宣王問曰交隣國有道乎孟子對曰有惟仁者爲能以大事小是故湯","source":"맹자"},{"text":"事葛文王事昆夷惟智者爲能以小事大故大王事獯鬻句踐事吳","source":"맹자"},{"text":"仁人之心寬洪惻怛而無較計大小彊弱之私故小國雖或不恭而吾所以字之之","source":"맹자"},{"text":"心自不能已智者明義理識時勢故大國雖見侵陵而吾所以事之之禮尤不","source":"맹자"},{"text":"敢廢湯事見後篇文王事見詩大雅大王事見後章所謂狄人卽獯鬻也句踐","source":"맹자"},{"text":"越王名見事國語史記","source":"맹자"},{"text":"02-03-02 以大事小者樂天者也以小事大者畏天者也樂天者保天下畏天者","source":"맹자"},{"text":"天者理而已矣大之字小小之事大皆理之當然也自然合理故曰樂天不敢違","source":"맹자"},{"text":"理故曰畏天包含徧覆無不周徧保天下之氣象也制節謹度不敢縱逸保一國","source":"맹자"},{"text":"02-03-03 詩云畏天之威于時保之","source":"맹자"},{"text":"詩周頌我將之篇時是也","source":"맹자"},{"text":"02-03-04 王曰大哉言矣寡人有疾寡人好勇","source":"맹자"},{"text":"言以好勇故不能事大而恤小也","source":"맹자"},{"text":"02-03-05 對曰王請無好小勇夫撫劍疾視曰彼惡敢當我哉此匹夫之勇敵一人","source":"맹자"},{"text":"者也王請大之","source":"맹자"},{"text":"疾視怒目而視也小勇血氣所爲大勇義理所發","source":"맹자"},{"text":"02-03-06 詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此文王之","source":"맹자"},{"text":"勇也文王一怒而安天下之民","source":"맹자"},{"text":"詩大雅皇矣篇赫赫然怒貌爰於也旅衆也遏詩作按止也徂往也莒詩作","source":"맹자"},{"text":"旅徂旅謂密人侵阮徂共之衆也篤厚也祜福也對答也以答天下仰望之心也","source":"맹자"},{"text":"此文王之大勇也","source":"맹자"},{"text":"02-03-07 書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟","source":"맹자"},{"text":"我在天下曷敢有越厥志一人衡行於天下武王恥之此武王之勇也而武王亦一","source":"맹자"},{"text":"怒而安天下之民","source":"맹자"},{"text":"書周書泰誓之篇也然所引與今書文小異今且依此解之寵之四方寵異之於","source":"맹자"},{"text":"四方也有罪者我得而誅之無罪者我得而安之我旣在此則天下何敢有過越其","source":"맹자"},{"text":"心志而作亂者乎橫行謂作亂也孟子釋書意如此而言武王亦大勇也","source":"맹자"},{"text":"02-03-08 今王亦一怒而安天下之民民惟恐王之不好勇也","source":"맹자"},{"text":"王若能如文武之爲則天下之民望其一怒以除暴亂而拯己於水火之中惟恐王之","source":"맹자"},{"text":"不好勇耳○此章言人君能懲小忿則能恤小事大以交隣國能養大勇則能除","source":"맹자"},{"text":"暴救民以安天下張敬夫曰小勇者血氣之怒也大勇者理義之怒也血氣之怒","source":"맹자"},{"text":"不可有理義之怒不可無知此則可以見性情之正而識天理人欲之分矣","source":"맹자"},{"text":"梁惠王下4章","source":"맹자"},{"text":"02-04-01 齊宣王見孟子於雪宮王曰賢者亦有此樂乎孟子對曰有人不得則","source":"맹자"},{"text":"雪宮離宮名言人君能與民同樂則人皆有此樂不然則下之不得此樂者必有","source":"맹자"},{"text":"非其君上之心明人君當與民同樂不可使人有不得者非但當與賢者共之而已也","source":"맹자"},{"text":"02-04-02 不得而非其上者非也爲民上而不與民同樂者亦非也","source":"맹자"},{"text":"下不安分上不恤民皆非理也","source":"맹자"},{"text":"02-04-03 樂民之樂者民亦樂其樂憂民之憂者民亦憂其憂樂以天下憂以天下","source":"맹자"},{"text":"然而不王者未之有也","source":"맹자"},{"text":"樂民之樂而民樂其樂則樂以天下矣憂民之憂而民憂其憂則憂以天下矣","source":"맹자"},{"text":"02-04-04 昔者齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放于琅邪吾","source":"맹자"},{"text":"何修而可以比於先王觀也","source":"맹자"},{"text":"晏子齊臣名嬰轉附朝儛皆山名也遵循也放至也琅邪齊東南境上邑名觀","source":"맹자"},{"text":"02-04-05 晏子對曰善哉問也天子適諸侯曰巡狩巡狩者巡所守也諸侯朝於天","source":"맹자"},{"text":"子曰述職述職者述所職也無非事者春省耕而補不足秋省斂而助不給夏諺曰","source":"맹자"},{"text":"吾王不遊吾何以休吾王不豫吾何以助一遊一豫爲諸侯度","source":"맹자"},{"text":"述陳也省視也斂收穫也給亦足也夏諺夏時之俗語也豫樂也巡所守巡行","source":"맹자"},{"text":"諸侯所守之土也述所職陳其所受之職也皆無有無事而空行者而又春秋循行郊","source":"맹자"},{"text":"野察民之所不足而補助之故夏諺以爲王者一遊一豫皆有恩惠以及民而諸侯","source":"맹자"},{"text":"皆取法焉不敢無事慢遊以病其民也","source":"맹자"},{"text":"02-04-06 今也不然師行而糧食飢者弗食勞者弗息睊睊胥讒民乃作慝方命","source":"맹자"},{"text":"虐民飮食若流流連荒亡爲諸侯憂","source":"맹자"},{"text":"今謂晏子時也師衆也二千五百人爲師春秋傳曰君行師從糧謂糗糒之屬","source":"맹자"},{"text":"睊睊側目貌胥相也讒謗也慝怨惡也言民不勝其勞而起怨謗也方逆也命王","source":"맹자"},{"text":"命也若流如水之流無窮極也流連荒亡解見下文諸侯謂附庸之國縣邑之長","source":"맹자"},{"text":"02-04-07 從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭","source":"맹자"},{"text":"此釋上文之義也從流下謂放舟隨水而下從流上謂挽舟逆水而上從獸田獵","source":"맹자"},{"text":"也荒廢也樂酒以飮酒爲樂也亡猶失也言廢時失事也","source":"맹자"},{"text":"02-04-08 先王無流連之樂荒亡之行惟君所行也","source":"맹자"},{"text":"言先王之法今時之弊二者惟在君所行耳","source":"맹자"},{"text":"02-04-09 景公說大戒於國出舍於郊於是始興發補不足召大師曰爲我作君","source":"맹자"},{"text":"臣相說之樂蓋徵招角招是也其詩曰畜君何尤畜君者好君也","source":"맹자"},{"text":"戒告命也出舍自責以省民也興發發倉廩也大師樂官也君臣己與晏子也","source":"맹자"},{"text":"樂有五聲三曰角爲民四曰徵爲事招舜樂也其詩徵招角招之詩也尤過也","source":"맹자"},{"text":"言晏子能畜止其君之欲宜爲君之所尤然其心則何過哉孟子釋之以爲臣能畜","source":"맹자"},{"text":"止其君之欲乃是愛其君子也○尹氏曰君之與民貴賤雖不同然其心未始有","source":"맹자"},{"text":"異也孟子之言可謂深切矣齊王不能推而用之惜哉","source":"맹자"},{"text":"梁惠王下5章","source":"맹자"},{"text":"02-05-01 齊宣王問曰人皆謂我毀明堂毀諸已乎","source":"맹자"},{"text":"趙氏曰明堂泰山明堂周天子東巡守朝諸侯之處漢時遺址尙在人欲毀之者蓋","source":"맹자"},{"text":"以天子不復巡守諸侯又不當居之也王問當毀之乎且止乎","source":"맹자"},{"text":"02-05-02 孟子對曰夫明堂者王者之堂也王欲行王政則勿毀之矣","source":"맹자"},{"text":"明堂王者所居以出政令之所也能行王政則亦可以王矣何必毀哉","source":"맹자"},{"text":"02-05-03 王曰王政可得聞與對曰昔者文王之治岐也耕者九一仕者世祿關","source":"맹자"},{"text":"市譏而不征澤梁無禁罪人不孥老而無妻曰鰥老而無夫曰寡老而無子曰獨","source":"맹자"},{"text":"幼而無父曰孤此四者天下之窮民而無告者文王發政施仁必先斯四者詩云哿","source":"맹자"},{"text":"矣富人哀此煢獨","source":"맹자"},{"text":"岐周之舊國也九一者井田之制也方一里爲一井其田九百畝中畫井字界爲","source":"맹자"},{"text":"九區一區之中爲田百畝中百畝爲公田外八百畝爲私田八家各受私田百畝","source":"맹자"},{"text":"而同養公田是九分而稅其一也世祿者先王之世仕者之子孫皆敎之敎之而成","source":"맹자"},{"text":"材則官之如不足用亦使之不失其祿蓋其先世嘗有功德於民故報之如此忠","source":"맹자"},{"text":"厚之至也關謂道路之關市謂都邑之市譏察也征稅也關市之吏察異服異言","source":"맹자"},{"text":"之人而不征商賈之稅也澤謂瀦水梁謂魚梁與民同利不設禁也孥妻子也","source":"맹자"},{"text":"惡惡止其身不及妻子也先王養民之政導其妻子使之養其老而恤其幼不幸而","source":"맹자"},{"text":"有鰥寡孤獨之人無父母妻子之養則尤宜憐恤故必以爲先也詩小雅正月之篇","source":"맹자"},{"text":"哿可也煢困悴貌","source":"맹자"},{"text":"02-05-04 王曰善哉言乎曰王如善之則何爲不行王曰寡人有疾寡人好貨對","source":"맹자"},{"text":"曰昔者公劉好貨詩云乃積乃倉乃裹餱糧于橐于囊思戢用光弓矢斯張干戈","source":"맹자"},{"text":"戚揚爰方啓行故居者有積倉行者有裹糧也然後可以爰方啓行王如好貨與百","source":"맹자"},{"text":"姓同之於王何有","source":"맹자"},{"text":"王自以爲好貨故取民無制而不能行此王政公劉后稷之曾孫也詩大雅公劉之","source":"맹자"},{"text":"篇積露積也餱乾糧也無底曰橐有底曰囊皆所以盛餱糧也戢安集也言思安","source":"맹자"},{"text":"集其民人以光大其國家也戚斧也揚鉞也爰於也啓行言往遷于豳也何有言","source":"맹자"},{"text":"不難也孟子言公劉之民不足如此是公劉好貨而能推己之心以及民也今王好","source":"맹자"},{"text":"貨亦能如此則其於王天下也何難之有","source":"맹자"},{"text":"02-05-05 王曰寡人有疾寡人好色對曰昔者大王好色愛厥妃詩云古公亶父","source":"맹자"},{"text":"來朝走馬率西水滸至于岐下爰及姜女聿來胥宇當是時也內無怨女外無曠","source":"맹자"},{"text":"夫王如好色與百姓同之於王何有","source":"맹자"},{"text":"王又言此者好色則心志蠱惑用度奢侈而不能行王政也大王公劉九世孫詩大","source":"맹자"},{"text":"雅綿之篇也古公大王之本號後乃追尊爲大王也亶父大王名也來朝走馬避","source":"맹자"},{"text":"狄人之難也率循也滸水涯也岐下岐山之下也姜女大王之妃也胥相也宇居也","source":"맹자"},{"text":"曠空也無怨曠者是大王好色而能推己之心以及民也○楊氏曰孟子與人君言","source":"맹자"},{"text":"皆所以擴充其善心而格其非心不止就事論事若使爲人民者論事每如此豈不","source":"맹자"},{"text":"能堯舜其君乎愚謂此篇自首章至此大意皆同蓋鍾鼓苑囿遊觀之樂與夫好勇","source":"맹자"},{"text":"好貨好色之心皆天理之所有而人情之所不能無者然天理人欲同行異情循理","source":"맹자"},{"text":"而公於天下者聖賢之所以盡其性也縱欲而私於一己者衆人之所以滅其天也二","source":"맹자"},{"text":"者之間不能以髮而其是非得失之歸相去遠矣故孟子因時君之問而剖析於幾","source":"맹자"},{"text":"微之際皆所以遏人欲而存天理其法似疏而實密其事似易而實難學者以身體之","source":"맹자"},{"text":"則有以識其非曲學阿世之言而知所以克己復禮之端也","source":"맹자"},{"text":"梁惠王下6章","source":"맹자"},{"text":"02-06-01 孟子謂齊宣王曰王之臣有託其妻子於其友而之楚遊者比其反也則","source":"맹자"},{"text":"凍餒其妻子則如之何王曰棄之","source":"맹자"},{"text":"託寄也比及也棄絶也","source":"맹자"},{"text":"02-06-02 曰士師不能治士則如之何王曰已之","source":"맹자"},{"text":"士師獄官也其屬有鄕士遂士之官士師皆當治之已罷去也","source":"맹자"},{"text":"02-06-03 曰四境之內不治則如之何王顧左右而言他","source":"맹자"},{"text":"孟子將問此而先設上二事以發之及此而王不能答也其憚於自責恥於下問如此","source":"맹자"},{"text":"不足與有爲可知矣○趙氏曰言君臣上下各勤其任無墮其職乃安其身","source":"맹자"},{"text":"梁惠王下7章","source":"맹자"},{"text":"02-07-01 孟子見齊宣王曰所謂故國者非謂有喬木之謂也有世臣之謂也王無","source":"맹자"},{"text":"親臣矣昔者所進今日不知其亡也","source":"맹자"},{"text":"世臣累世勳舊之臣與國同休戚者也親臣君所親信之臣與君同休戚者也此","source":"맹자"},{"text":"言喬木世臣皆故國所宜有然所以爲故國者則在此而不在彼也昨日所進用","source":"맹자"},{"text":"之人今日有亡去而不知者則無親臣矣況世臣乎","source":"맹자"},{"text":"02-07-02 王曰吾何以識其不才而舍之","source":"맹자"},{"text":"王意以爲此亡去者皆不才之人我初不知而誤用之故今不以其去爲意耳因問","source":"맹자"},{"text":"何以先識其不才而舍之邪","source":"맹자"},{"text":"02-07-03 曰國君進賢如不得已將使卑踰尊疏踰戚可不愼與","source":"맹자"},{"text":"如不得已言謹之至也蓋尊尊親親禮之常也然或尊者親者未必賢則必進疏","source":"맹자"},{"text":"遠之賢而用之是使卑者踰尊疏者踰戚非禮之常姑不可不謹也","source":"맹자"},{"text":"02-07-04 左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見","source":"맹자"},{"text":"賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察","source":"맹자"},{"text":"之見不可焉然後去之","source":"맹자"},{"text":"左右近臣其言固未可信諸大夫之言宜可信矣然猶恐其蔽於私也至於國人","source":"맹자"},{"text":"則其論公矣然猶必察之者蓋人有同俗以爲衆所悅者亦有特立而爲俗所憎者","source":"맹자"},{"text":"故必自察之而親見其賢否之實然後從而用舍之則於賢者知之深任之重而","source":"맹자"},{"text":"不才者不得以幸進矣所謂進賢如不得已者如此","source":"맹자"},{"text":"02-07-05 左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之","source":"맹자"},{"text":"見可殺焉然後殺之故曰國人殺之也","source":"맹자"},{"text":"此言非獨以此進退人才至於用刑亦以此道蓋所謂天命天討皆非人君之所得","source":"맹자"},{"text":"02-07-06 如此然後可以爲民父母","source":"맹자"},{"text":"傳曰民之所好好之民之所惡惡之此之謂民之父母","source":"맹자"},{"text":"梁惠王下8章","source":"맹자"},{"text":"02-08-01 齊宣王問曰湯放桀武王伐紂有諸孟子對曰於傳有之","source":"맹자"},{"text":"放置也書云成湯放桀于南巢","source":"맹자"},{"text":"02-08-02 曰臣弑其君可乎","source":"맹자"},{"text":"桀紂天子湯武諸侯","source":"맹자"},{"text":"02-08-03 曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未","source":"맹자"},{"text":"賊害也殘傷也害仁者凶暴淫虐滅絶天理故謂之賊害義者顚倒錯亂傷敗","source":"맹자"},{"text":"彝倫故謂之殘一夫言衆叛親離不復以爲君也書曰獨夫紂蓋四海歸之則","source":"맹자"},{"text":"爲天子天下叛之則爲獨夫所以深警齊王垂戒後世也○王勉曰斯言也惟在","source":"맹자"},{"text":"下者有湯武之仁而在上者有桀紂之暴則可不然是未免於篡弑之罪也","source":"맹자"},{"text":"梁惠王下9章","source":"맹자"},{"text":"02-09 01 孟子見齊宣王曰爲巨室則必使工師求大木工師得大木則王喜以爲","source":"맹자"},{"text":"能勝其任也","source":"맹자"},{"text":"匠人斲而小之","source":"맹자"},{"text":"則王怒以爲不勝其任矣","source":"맹자"},{"text":"夫人幼而學之","source":"맹자"},{"text":"壯而欲行之","source":"맹자"},{"text":"王曰姑舍女所學而從我則何如","source":"맹자"},{"text":"巨室大宮也工師匠人之長匠人衆工人也姑且也言賢人所學者大而王欲小之","source":"맹자"},{"text":"02-09 02 今有璞玉於此雖萬鎰必使玉人彫琢之至於治國家則曰姑舍女所學","source":"맹자"},{"text":"而從我則何以異於敎玉人彫琢玉哉","source":"맹자"},{"text":"璞玉之在石中者鎰二十兩也玉人玉工也不敢自治而付之能者愛之甚也治","source":"맹자"},{"text":"國家則徇私慾而不任賢是愛國家不如愛玉也○范氏曰古之賢者常患人君不","source":"맹자"},{"text":"能行其所學而世之庸君亦常患賢者不能從其所好是以君臣相遇自古以爲難","source":"맹자"},{"text":"孔孟終身而不迂蓋以此耳","source":"맹자"},{"text":"梁惠王下10章","source":"맹자"},{"text":"02-10 01 齊人伐燕勝之","source":"맹자"},{"text":"按史記燕王噲讓國於其相子之而國大亂齊因伐之燕士卒不戰城門不閉遂","source":"맹자"},{"text":"02-10-02 宣王問曰或謂寡人勿取或謂寡人取之以萬乘之國伐萬乘之國五旬","source":"맹자"},{"text":"而擧之人力不至於此不取必有天殃取之何如","source":"맹자"},{"text":"以伐燕爲宣王事與史記諸書不同已見序說","source":"맹자"},{"text":"02-10-03 孟子對曰取之而燕民悅則取之古之人有行之者武王是也取之而","source":"맹자"},{"text":"燕民不悅則勿取古之人有行之者文王是也","source":"맹자"},{"text":"商紂之世文王三分天下其有二以服事商至武王十三年乃伐紂而有天下張","source":"맹자"},{"text":"子曰此事間不容髮一日之間天命未絶則是君臣當日命絶則爲獨夫然命","source":"맹자"},{"text":"之絶否何以知之人情而已諸侯不期而會者八百武王安得而止之哉","source":"맹자"},{"text":"02-10-04 以萬乘之國伐萬乘之國簞食壺漿以迎王師豈有他哉避水火也如","source":"맹자"},{"text":"水益深如火益熱亦運而已矣","source":"맹자"},{"text":"簞竹器食飯也運轉也言齊若更爲暴虐則民將轉而望救於他人矣○趙氏曰","source":"맹자"},{"text":"征伐之道當順民心民心悅則天意得矣","source":"맹자"},{"text":"梁惠王下11章","source":"맹자"},{"text":"02-11-01 齊人伐燕取之諸侯將謀救燕宣王曰諸侯多謀伐寡人者何以待之孟","source":"맹자"},{"text":"子對曰臣聞七十里爲政於天下者湯是也未聞以千里畏人者也","source":"맹자"},{"text":"千里畏人指齊王也","source":"맹자"},{"text":"02-11-02 書曰湯一征自葛始天下信之東面而征西夷怨南面而征北狄怨","source":"맹자"},{"text":"曰奚爲後我民望之若大旱之望雲霓也歸市者不止耕者不變誅其君而弔其民","source":"맹자"},{"text":"若時雨降民大悅書曰徯我后后來其蘇","source":"맹자"},{"text":"兩引書皆商書仲虺之誥文也與今書文亦小異一征初征也天下信之信其志在","source":"맹자"},{"text":"救民不爲暴也奚爲後我言湯何爲不先來征我之國也霓虹也雲合則雨虹見則","source":"맹자"},{"text":"止變動也徯待也后君也蘇復生也他國之民皆以湯爲我君而待其來使己得","source":"맹자"},{"text":"蘇息也此言湯之所以七十里而爲政於天下也","source":"맹자"},{"text":"02-11-03 今燕虐其民王往而征之民以爲將拯己於水火之中也簞食壺漿以迎","source":"맹자"},{"text":"王師若殺其父兄係累其子弟毀其宗廟遷其重器如之何其可也天下固畏齊之","source":"맹자"},{"text":"彊也今又倍地而不行仁政是動天下之兵也","source":"맹자"},{"text":"拯救也係累縶縛也重器寶器也畏忌也倍地幷燕而增一倍之地也齊之取燕若","source":"맹자"},{"text":"能如湯之征葛則燕人悅之而齊可爲政於天下矣今乃不行仁政而肆爲殘虐則","source":"맹자"},{"text":"無以慰燕民之望而服諸侯之心是以不免乎以千里而畏人也","source":"맹자"},{"text":"02-11-04 王速出令反其旄倪止其重器謀於燕衆置君而後去之則猶可及止","source":"맹자"},{"text":"反還也旄老人也倪小兒也所謂虜略之老小也猶尙也及止及其未發而止之也","source":"맹자"},{"text":"○范氏曰孟子事齊梁之君論道德則必稱堯舜論征伐則必稱湯武蓋治民不","source":"맹자"},{"text":"法堯舜則是爲暴行師不法湯武則是爲亂豈可謂吾君不能而舍所學以徇之哉","source":"맹자"},{"text":"梁惠王下12章","source":"맹자"},{"text":"02-12-01 鄒與魯閧穆公問曰吾有司死者三十三人而民莫之死也誅之則不可勝","source":"맹자"},{"text":"誅不誅則疾視其長上之死而不救如之何則可也","source":"맹자"},{"text":"閧鬪聲也穆公鄒君也不可勝誅言人衆不可盡誅也長上謂有司也民怨其上","source":"맹자"},{"text":"故疾視其死而不救也","source":"맹자"},{"text":"02-12-02 孟子對曰凶年饑歲君之民老弱轉乎溝壑壯者散而之四方者幾千人","source":"맹자"},{"text":"矣而君之倉廩實府庫充有司莫以告是上慢而殘下也曾子曰戒之戒之出乎","source":"맹자"},{"text":"爾者反乎爾者也夫民今而後得反之也君無尤焉","source":"맹자"},{"text":"轉飢餓輾轉而死也充滿也上謂君及有司也尤過也","source":"맹자"},{"text":"02-12-03 君行仁政斯民親其上死其長矣","source":"맹자"},{"text":"君不仁而求富是以有司知重斂而不知恤民故君行仁政則有司皆愛其民而民","source":"맹자"},{"text":"亦愛之矣○范氏曰書曰民惟邦本本固邦寧有倉廩府庫所以爲民也豊年則","source":"맹자"},{"text":"斂之凶年則散之恤其飢寒救其疾苦是以民親愛其上有危難則赴救之如子","source":"맹자"},{"text":"弟之衛父兄手足之捍頭目也穆公不能反己猶欲歸罪於民豈不誤哉","source":"맹자"},{"text":"梁惠王下13章","source":"맹자"},{"text":"02-13-01 滕文公問曰滕小國也間於齊楚事齊乎事楚乎","source":"맹자"},{"text":"02-13-02 孟子對曰是謀非吾所能及也無已則有一焉鑿斯池也築斯城也與","source":"맹자"},{"text":"民守之效死而民弗去則是可爲也","source":"맹자"},{"text":"無已見前篇一謂一說也效猶致也國君死社稷故致死以守國至於民亦爲之","source":"맹자"},{"text":"死守而不去則非有以深得其心者不能也○此章言有國者當守義而愛民不","source":"맹자"},{"text":"可僥倖而笱免","source":"맹자"},{"text":"梁惠王下14章","source":"맹자"},{"text":"02-14-01 滕文公問曰齊人將築薛吾甚恐如之何則可","source":"맹자"},{"text":"薛國名近滕齊取其地而城之故文公以其偪己而恐也","source":"맹자"},{"text":"02-14-02 孟子對曰昔者大王居邠狄人侵之去之岐山之下居焉非擇而取之","source":"맹자"},{"text":"邠地名言大王非以岐下爲善擇取而居之也詳見下章","source":"맹자"},{"text":"02-14-03 苟爲善後世子孫必有王者矣君子創業垂統爲可繼也若夫成功則天","source":"맹자"},{"text":"也君如彼何哉彊爲善而已矣","source":"맹자"},{"text":"創造也統緖也言能爲善則如大王雖失其地而其後世遂有天下乃天理也然君","source":"맹자"},{"text":"子造基業於前而垂統緖於後但能不失其正令後世可繼續而行耳若夫成功則豈","source":"맹자"},{"text":"可必乎彼齊也君之力旣無如之何則但彊於爲善使其可繼而俟命於天耳○","source":"맹자"},{"text":"此章言人君但當竭力於其所當爲不可徼倖於其所難必","source":"맹자"},{"text":"梁惠王下15章","source":"맹자"},{"text":"02-15-01 滕文公問曰滕小國也竭力以事大國則不得免焉如之何則可孟子對","source":"맹자"},{"text":"曰昔者大王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事","source":"맹자"},{"text":"之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君","source":"맹자"},{"text":"子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山","source":"맹자"},{"text":"之下居焉邠人曰仁人也不可失也從之者如歸市","source":"맹자"},{"text":"皮謂虎豹麋鹿之皮也幣帛也屬會集也土地本生物以養人今爭地而殺人是以","source":"맹자"},{"text":"其所以養人者害人也邑作邑也歸市人衆而爭先也","source":"맹자"},{"text":"02-15-02 或曰世守也非身之所能爲也效死勿去","source":"맹자"},{"text":"又言或謂土地乃先人所受而世守之者非己所能專但當致死守之不可舍去此","source":"맹자"},{"text":"國君死社稷之常法傳所謂國滅君死之正也正謂此也","source":"맹자"},{"text":"02-15-03 君請擇於斯二者","source":"맹자"},{"text":"能如大王則避之不能則謹守常法蓋遷國以圖存者權也守正而俟死者義也審","source":"맹자"},{"text":"己量力擇而處之可也○楊氏曰孟子之於文公始告之以效死而已禮之正也","source":"맹자"},{"text":"至其甚恐則以大王之事告之非得已也然無大王之德而去則民或不從而遂至","source":"맹자"},{"text":"於亡則又不若效死之爲愈故又請擇於斯二者又曰孟子所論自世俗觀之則","source":"맹자"},{"text":"可謂無謀矣然理之可爲者不過如此舍此則必爲儀秦之爲矣凡事求可功求成","source":"맹자"},{"text":"取必於智謀之末而不循天理之正者非聖賢之道也","source":"맹자"},{"text":"梁惠王下16章","source":"맹자"},{"text":"02-16-01 魯平公將出嬖人臧倉者請曰他日君出則必命有司所之今乘輿已駕矣","source":"맹자"},{"text":"有司未知所之敢請公曰將見孟子曰何哉君所爲輕身以先於匹夫者以爲賢乎","source":"맹자"},{"text":"禮義由賢者出而孟子之後喪踰前喪君無見焉公曰諾","source":"맹자"},{"text":"乘輿君車也駕駕馬也孟子前喪父後喪母踰過也言其厚母薄父也諾應辭也","source":"맹자"},{"text":"02-16-02 樂正子入見曰君奚爲不見孟軻也曰或告寡人曰孟子之後喪踰前喪","source":"맹자"},{"text":"是以不往見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰","source":"맹자"},{"text":"否謂棺槨衣衾之美也曰非所謂踰也貧富不同也","source":"맹자"},{"text":"樂正子孟子弟子也仕於魯三鼎士祭禮五鼎大夫祭禮","source":"맹자"},{"text":"02-16-03 樂正子見孟子曰克告於君君爲來見也嬖人有臧倉者沮君君是以不","source":"맹자"},{"text":"果來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉","source":"맹자"},{"text":"能使予不遇哉","source":"맹자"},{"text":"克樂正子名沮尼皆止之之意也言人之行必有人使之者其止必有人尼之者","source":"맹자"},{"text":"然其所以行所以止則固有天命而非此人所能使亦非此人所能尼也然則我之","source":"맹자"},{"text":"不遇其臧倉之所能爲哉○此章言聖賢之出處關時運之盛衰乃天命之所爲","source":"맹자"},{"text":"非人力之可及","source":"맹자"},{"text":"公孫丑上1章","source":"맹자"},{"text":"03-01-01 公孫丑問曰夫子當路於齊管仲晏子之功可復許乎","source":"맹자"},{"text":"公孫丑孟子弟子齊人也當路居要地也管仲齊大夫名夷吾相桓公霸諸侯許猶期","source":"맹자"},{"text":"也孟子未嘗得政丑蓋設辭以問也","source":"맹자"},{"text":"03-01-02 孟子曰子誠齊人也知管仲晏子而已矣","source":"맹자"},{"text":"齊人但知其國有二子而已不復知有聖賢之事","source":"맹자"},{"text":"03-01-03 或問乎曾西曰吾子與子路孰賢曾西蹴然曰吾先子之所畏也曰然則","source":"맹자"},{"text":"吾子與管仲孰賢曾西艴然不悅曰爾何曾比予於管仲管仲得君如彼其專也行","source":"맹자"},{"text":"乎國政如彼其久也功烈如彼其卑也爾何曾比予於是","source":"맹자"},{"text":"孟子引曾西與或人問答如此曾西曾子之孫蹴不安貌先子曾子也艴怒色也曾","source":"맹자"},{"text":"之言則也烈猶光也桓公獨任管仲四十餘年是專且久也管仲不知王道而行霸術","source":"맹자"},{"text":"故言功烈之卑也楊氏曰孔子言子路之才曰千乘之國可使治其賦也使其見於施","source":"맹자"},{"text":"爲如是而已其於九合諸侯一匡天下固有所不逮也然則曾西推尊子路如此而","source":"맹자"},{"text":"羞比管仲者何哉","source":"맹자"},{"text":"子路則範我馳驅而不獲者也","source":"맹자"},{"text":"管仲之功詭遇而獲禽耳","source":"맹자"},{"text":"曾西仲尼之徒也故不道管仲之事","source":"맹자"},{"text":"03-01-04 曰管仲曾西之所不爲也而子爲我願之乎","source":"맹자"},{"text":"曰孟子言也願望也","source":"맹자"},{"text":"03-01-05 曰管仲以其君霸晏子以其君顯管仲晏子猶不足爲與","source":"맹자"},{"text":"03-01-06 曰以齊王由反手也","source":"맹자"},{"text":"反手言易也","source":"맹자"},{"text":"03-01-07 曰若是則弟子之惑滋甚且以文王之德百年而後崩猶未洽於天下武","source":"맹자"},{"text":"王周公繼之然後大行今言王若易然則文王不足法與","source":"맹자"},{"text":"滋益也文王九十七而崩言百年擧成數也文王三分天下才有其二武王克商乃有","source":"맹자"},{"text":"天下周公相成王制禮作樂然後敎化大行","source":"맹자"},{"text":"03-01-08 曰文王何可當也由湯至於武丁賢聖之君六七作天下歸殷久矣久","source":"맹자"},{"text":"則難變也武丁朝諸侯有天下猶運之掌也紂之去武丁未久也其故家遺俗流風","source":"맹자"},{"text":"善政猶有存者又有微子微仲王子比干箕子膠鬲皆賢人也相與輔相之故久而","source":"맹자"},{"text":"後失之也尺地莫非其有也一民莫非其臣也然而文王猶方百里起是以難也","source":"맹자"},{"text":"當猶敵也商自成湯至於武丁中間太甲太戊祖乙盤庚皆賢聖之君作起也自武","source":"맹자"},{"text":"丁至紂凡七世故家舊臣之家也","source":"맹자"},{"text":"03-01-09 齊人有言曰雖有知慧不如乘勢雖有鎡基不如待時今時則易然也","source":"맹자"},{"text":"鎡基田器也時謂耕種之時","source":"맹자"},{"text":"03-01-10 夏后殷周之盛地未有過千里者也而齊有其地矣鷄鳴狗吠相聞而達","source":"맹자"},{"text":"乎四境而齊有其民矣地不改辟矣民不改聚矣行仁政而王莫之能禦也","source":"맹자"},{"text":"此言其勢之易也三代盛時王畿不過千里今齊已有之異於文王之百里又鷄犬","source":"맹자"},{"text":"之聲相聞自國都以至於四境言居民稠密也","source":"맹자"},{"text":"03-01-11 且王者之不作未有疏於此時者也民之憔悴於虐政未有甚於此時者","source":"맹자"},{"text":"也飢者易爲食渴者易爲飮","source":"맹자"},{"text":"此言其時之易也自文王至此七百餘年異於商之賢聖繼作民苦虐政之甚異於紂","source":"맹자"},{"text":"之猶有善政易爲飮食言飢渴之甚不待甘美也","source":"맹자"},{"text":"03-01-12 孔子曰德之流行速於置郵而傳命","source":"맹자"},{"text":"置驛也郵馹也所以傳命也孟子引孔子之言如此","source":"맹자"},{"text":"03-01-13 當今之時萬乘之國行仁政民之悅之猶解倒懸也故事半古之人功","source":"맹자"},{"text":"必倍之惟此時爲然","source":"맹자"},{"text":"倒懸諭困苦也所施之事半於古人而功倍於古人由時勢易而德行速也","source":"맹자"},{"text":"公孫丑上2章","source":"맹자"},{"text":"03-02-01 公孫丑問曰夫子加齊之卿相得行道焉雖由此霸王不異矣如此則動","source":"맹자"},{"text":"心否乎孟子曰否我四十不動心","source":"맹자"},{"text":"此承上章又設問孟子若得位而行道則雖由此而成霸王之業亦不足怪任大責重","source":"맹자"},{"text":"亦有所恐懼疑惑而動其心乎","source":"맹자"},{"text":"四十彊仕君子道明德立之時","source":"맹자"},{"text":"孔子四十而不惑","source":"맹자"},{"text":"亦不動心之謂","source":"맹자"},{"text":"03-02-02 曰若是則夫子過孟賁遠矣曰是不難告子先我不動心","source":"맹자"},{"text":"孟賁勇士告子名不害孟賁血氣之勇丑蓋借之以贊孟子不動心之難孟子言告","source":"맹자"},{"text":"子未爲知道乃能先我不動心則此未足爲難也","source":"맹자"},{"text":"03-02-03 曰不動心有道乎曰有","source":"맹자"},{"text":"程子曰心有主則能不動矣","source":"맹자"},{"text":"03-02-04 北宮黝之養勇也不膚撓不目逃思以一毫挫於人若撻之於市朝不受","source":"맹자"},{"text":"於褐寬博亦不受於萬乘之君視刺萬乘之君若刺褐夫無嚴諸侯惡聲至必反之","source":"맹자"},{"text":"北宮姓黝名膚撓肌膚被刺而撓屈也目挑目被刺而轉睛逃避也挫猶辱也褐毛","source":"맹자"},{"text":"布寬博寬大之衣賤者之服也不受者不受其挫也刺殺也嚴畏憚也言無可畏憚","source":"맹자"},{"text":"之諸侯也黝蓋刺客之流以必勝爲主而不動心者也","source":"맹자"},{"text":"03-02-05 孟施舍之所養勇也曰視不勝猶勝也量敵而後進慮勝而後會是畏","source":"맹자"},{"text":"三軍者也舍豈能爲必勝哉能無懼而已矣","source":"맹자"},{"text":"孟姓施發語聲舍名也會合戰也舍自言其戰雖不勝亦無所懼若量敵慮勝而後","source":"맹자"},{"text":"進戰則是無勇而畏三軍矣舍蓋力戰之士以無懼爲主而不動心者也","source":"맹자"},{"text":"03-02-06 孟施舍似曾子北宮黝似子夏夫二子之勇未知其孰賢然而孟施舍","source":"맹자"},{"text":"黝務敵人舍專守己子夏篤信聖人曾子反求諸己故二子之與曾子子夏雖非等","source":"맹자"},{"text":"倫然論其氣象則各有所似賢猶勝也約要也言論二子之勇則未知誰勝論其所","source":"맹자"},{"text":"守則舍比於黝爲得其要也","source":"맹자"},{"text":"03-02-07 昔者曾子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖褐","source":"맹자"},{"text":"寬博吾不惴焉自反而縮雖千萬人吾往矣","source":"맹자"},{"text":"此言曾子之勇也子襄曾子弟子也夫子孔子也縮直也檀弓曰古者冠縮縫今也","source":"맹자"},{"text":"衡縫又曰棺束縮二衡三惴恐懼之也往往而敵之也","source":"맹자"},{"text":"03-02-08 孟施舍之守氣又不如曾子之守約也","source":"맹자"},{"text":"言孟施舍雖似曾子","source":"맹자"},{"text":"然其所守乃一身之氣","source":"맹자"},{"text":"又不如曾子之反身循理","source":"맹자"},{"text":"所守尤得其要","source":"맹자"},{"text":"也孟子之不動心其原蓋出於此下文詳之","source":"맹자"},{"text":"03-02-09 曰敢問夫子之不動心與告子之不動心可得聞與告子曰不得於言勿","source":"맹자"},{"text":"求於心不得於心勿求於氣不得於心勿求於氣可不得於言勿求於心不可夫","source":"맹자"},{"text":"志氣之帥也氣體之充也夫志至焉氣次焉故曰持其志無暴其氣","source":"맹자"},{"text":"此一節公孫丑之問孟子誦告子之言又斷以己意而告之也告子謂於言有所不達","source":"맹자"},{"text":"則當舍置其言而不必反求其理於心於心有所不安則當力制其心而不必更求其","source":"맹자"},{"text":"此所以固守其心而不動之速也","source":"맹자"},{"text":"孟子旣誦其言而斷之曰","source":"맹자"},{"text":"彼謂不得於心而","source":"맹자"},{"text":"勿求諸氣者急於本而緩其末猶之可也謂不得於言而不求諸心則旣失於外而遂","source":"맹자"},{"text":"遺其內其不可也必矣然凡曰可者亦僅可而有所未盡之辭耳若論其極則志固心","source":"맹자"},{"text":"之所之而爲氣之將師然氣亦人之所以充滿於身而爲志之卒徒者也故志固爲至極","source":"맹자"},{"text":"而氣卽次之人固當敬守其志然亦不可不致養其氣蓋其內外本末交相培養此則","source":"맹자"},{"text":"孟子之心所以未嘗必其不動而自然不動之大略也","source":"맹자"},{"text":"03-02-10 旣曰志至焉氣次焉又曰持其志無暴其氣者何也曰志壹則動氣","source":"맹자"},{"text":"氣壹則動志也今夫蹶者趨者是氣也而反動其心","source":"맹자"},{"text":"公孫丑見孟子言志至而氣次故問如此則專持其志可矣又言無暴其氣何也壹專","source":"맹자"},{"text":"一也蹶顚躓也趨走也孟子言志之所向專一則氣固從之然氣之所在專一則志","source":"맹자"},{"text":"亦反爲之動","source":"맹자"},{"text":"如人顚躓趨走","source":"맹자"},{"text":"則氣專在是而反動其心焉","source":"맹자"},{"text":"所以旣持其志而又必無暴","source":"맹자"},{"text":"其氣也程子曰志動氣者什九氣動志者什一","source":"맹자"},{"text":"03-02-11 敢問夫子惡乎長曰我知言我善養吾浩然之氣","source":"맹자"},{"text":"公孫丑復問孟子之不動心","source":"맹자"},{"text":"所以異於告子如此者","source":"맹자"},{"text":"有何所長而能然","source":"맹자"},{"text":"而孟子又詳告","source":"맹자"},{"text":"之以其故也知言者盡心知性於凡天下之言無不有以究極其理而識其是非得失之","source":"맹자"},{"text":"所以然也浩然盛大流行之貌氣卽所謂體之充者本自浩然失養故餒惟孟子爲善","source":"맹자"},{"text":"養之以復其初也蓋惟知言則有以明夫道義而於天下之事無所疑養氣則有以","source":"맹자"},{"text":"配夫道義而於天下之事無所懼此其所以當大任而不動心也告子之學與此正相","source":"맹자"},{"text":"反其不動心殆亦冥然無覺悍然不顧而已爾","source":"맹자"},{"text":"03-02-12 敢問何謂浩然之氣曰難言也","source":"맹자"},{"text":"孟子先言知言而丑先問養氣者承上文方論志氣而言也難言者蓋其心所獨得而","source":"맹자"},{"text":"無形聲之驗有未易以言語形容者故程子曰觀此一言則孟子之實有是氣可知矣","source":"맹자"},{"text":"03-02-13 其爲氣也至大至剛以直養而無害則塞于天地之間","source":"맹자"},{"text":"至大初無限量至剛不可屈撓蓋天地之正氣而人得以生者其體段本如是也惟","source":"맹자"},{"text":"其自反而縮則得其所養而又無所作爲以害之則其本體不虧而充塞無間矣程子","source":"맹자"},{"text":"曰天人一也更不分別浩然之氣乃吾氣也養而無害則塞于天地一爲私意所蔽","source":"맹자"},{"text":"則欿然而餒知其小也謝氏曰浩然之氣須於心得其正時識取又曰浩然是無虧","source":"맹자"},{"text":"03-02-14 其爲氣也配義與道無是餒也","source":"맹자"},{"text":"配者合而有助之意義者人心之裁制道者天理之自然餒飢乏而氣不充體也言人","source":"맹자"},{"text":"能養成此氣則其氣合乎道義而爲之助使其行之勇決無所疑憚若無此氣則其","source":"맹자"},{"text":"一時所爲雖未必不出於道義然其體有所不充則亦不免於疑懼而不足以有爲矣","source":"맹자"},{"text":"03-02-15 是集義所生者非義襲而取之也行有不慊於心則餒矣我故曰告子未","source":"맹자"},{"text":"嘗知義以其外之也","source":"맹자"},{"text":"集義猶言積善蓋欲事事皆合於義也襲掩取也如齊侯襲莒之襲言氣雖可以配乎","source":"맹자"},{"text":"道義而其養之之始乃由事皆合義自反常直是以無所愧怍而此氣自然發生於","source":"맹자"},{"text":"中非由只行一事偶合於義便可掩襲於外而得之也慊快也足也言所行一有不合","source":"맹자"},{"text":"於義而自反不直則不足於心而其體有所不充矣然則義豈在外哉告子不知此理","source":"맹자"},{"text":"乃曰仁內義外","source":"맹자"},{"text":"而不復以義爲事","source":"맹자"},{"text":"則必不能集義以生浩然之氣矣","source":"맹자"},{"text":"上文不得於言勿","source":"맹자"},{"text":"求於心卽外義之意詳見告子上篇","source":"맹자"},{"text":"03-02-16 必有事焉而勿正心勿忘勿助長也無若宋人然宋人有閔其苗之不","source":"맹자"},{"text":"長而揠之者芒芒然歸謂其人曰今日病矣予助苗長矣其子趨而往視之苗則","source":"맹자"},{"text":"槁矣天下之不助苗長者寡矣以爲無益而舍之者不耘苗者也助之長者揠苗者","source":"맹자"},{"text":"也非徒無益而又害之","source":"맹자"},{"text":"必有事焉而勿正趙氏程子以七字爲句近世或幷下文心字讀之者亦通必有事焉有","source":"맹자"},{"text":"所事也如有事於顓臾之有事正預期也春秋傳曰戰不正勝是也如作正心義亦","source":"맹자"},{"text":"同此與大學之所謂正心者語義自不同也此言養氣者必以集義爲事而勿預期","source":"맹자"},{"text":"其效其或未充則但當勿忘其所有事而不可作爲以助其長乃集義養氣之節度也","source":"맹자"},{"text":"閔憂也揠拔也芒芒無知之貌其人家人也病疲倦也舍之而不耘者忘其所有事","source":"맹자"},{"text":"揠而助之長者正之不得而妄有作爲者也","source":"맹자"},{"text":"然不耘則失養而已","source":"맹자"},{"text":"揠則反以害之","source":"맹자"},{"text":"則氣得其養而無所害矣","source":"맹자"},{"text":"如告子不能集義而欲彊制其心","source":"맹자"},{"text":"則必不能免於正助","source":"맹자"},{"text":"之病其於所謂浩然者蓋不惟不善養而又反害之矣","source":"맹자"},{"text":"03-02-17 何謂知言曰詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知","source":"맹자"},{"text":"其所窮生於其心害於其政發於其政害於其事聖人復起必從吾言矣","source":"맹자"},{"text":"此公孫丑復問而孟子答之也詖偏陂也淫放蕩也邪邪僻也遁逃避也四者相因","source":"맹자"},{"text":"言之病也蔽遮隔也陷沈溺也離叛去也窮困屈也四者亦相因則心之失也人之","source":"맹자"},{"text":"有言皆出於心其心明乎正理而無蔽然後其言平正通達而無病苟爲不然則必","source":"맹자"},{"text":"有是四者之病矣卽其言之病而知其心之失又知其害於政事之決然而不可易者如","source":"맹자"},{"text":"此非心通於道而無疑於天下之理其孰能之彼告子者不得於言而不肯求之於","source":"맹자"},{"text":"心至爲義外之說則自不免於四者之病其何以知天下之言而無所疑哉程子曰","source":"맹자"},{"text":"心通乎道然後能辨是非如持權衡以較輕重孟子所謂知言是也又曰孟子知言","source":"맹자"},{"text":"正如人在堂上方能辨堂下人曲直若猶未免雜於堂下衆人之中則不能辨決矣","source":"맹자"},{"text":"03-02-18 宰我子貢善爲說辭冉牛閔子顔淵善言德行孔子兼之曰我於辭命則","source":"맹자"},{"text":"不能也然則夫子旣聖矣乎","source":"맹자"},{"text":"林氏以爲皆公孫丑之問","source":"맹자"},{"text":"說辭言語也","source":"맹자"},{"text":"德行得於心而見於行事者也","source":"맹자"},{"text":"三子善言德行者","source":"맹자"},{"text":"身有之故言之親切而有味也","source":"맹자"},{"text":"公孫丑言數子","source":"맹자"},{"text":"各有所長而孔子兼","source":"맹자"},{"text":"之然猶自謂不能於辭命今孟子乃自謂我能知言又善養氣則是兼言語德行而","source":"맹자"},{"text":"有之然則豈不旣聖矣乎此夫子指孟子也○程子曰孔子自謂不能於辭命者欲","source":"맹자"},{"text":"使學者務本而已","source":"맹자"},{"text":"03-02-19 曰惡是何言也昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾","source":"맹자"},{"text":"不能我學不厭而敎不倦也子貢曰學不厭智也敎不倦仁也仁且智夫子旣","source":"맹자"},{"text":"聖矣夫聖孔子不居是何言也","source":"맹자"},{"text":"惡驚歎辭也昔者以下孟子不敢當丑之言而引孔子子貢問答之辭以告之也此夫","source":"맹자"},{"text":"子指孔子也學不厭者智之所以自明敎不倦者仁之所以及物再言是何言也以深","source":"맹자"},{"text":"03-02-20 昔者竊聞之子夏子游子張皆有聖人之一體冉牛閔子顔淵則具體而","source":"맹자"},{"text":"微敢問所安","source":"맹자"},{"text":"此一節林氏亦以爲皆公孫丑之問是也一體猶一肢也具體而微謂有其全體但","source":"맹자"},{"text":"未廣大耳安處也公孫丑復問孟子旣不敢比孔子則於此數子欲何所處也","source":"맹자"},{"text":"03-02-21 曰姑舍是","source":"맹자"},{"text":"孟子言且置是者不欲以數子所至者自處也","source":"맹자"},{"text":"03-02-22 曰伯夷伊尹何如曰不同道非其君不事非其民不使治則進亂則退","source":"맹자"},{"text":"伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可","source":"맹자"},{"text":"以久則久可以速則速孔子也皆古聖人也吾未能有行焉乃所願則學孔子也","source":"맹자"},{"text":"伯夷孤竹君之長子兄弟遜國避紂隱居聞文王之德而歸之及武王伐紂去而餓死","source":"맹자"},{"text":"伊尹有莘之處士湯聘而用之使之就桀桀不能用復歸於湯如是者五乃相湯而","source":"맹자"},{"text":"伐桀也三聖人事詳見此篇之末及萬章下篇","source":"맹자"},{"text":"03-02-23 伯夷伊尹於孔子若是班乎曰否自有生民以來未有孔子也","source":"맹자"},{"text":"班齊等之貌公孫丑問而孟子答之以不同也","source":"맹자"},{"text":"03-02-24 曰然則有同與曰有得百里之地而君之皆能以朝諸侯有天下行一不義","source":"맹자"},{"text":"殺一不辜而得天下皆不爲也是則同","source":"맹자"},{"text":"有言有同也以百里而王天下德之盛也行一不義殺一不辜而得天下有所不爲","source":"맹자"},{"text":"心之正也聖人之所以爲聖人其根本節目之大者惟在於此於此不同則亦不足以","source":"맹자"},{"text":"03-02-25 曰敢問其所以異曰宰我子貢有若智足以知聖人汚不至阿其所好","source":"맹자"},{"text":"汚下也三子智足以知夫子之道假使汚下必不阿私所好而空譽之明其言之可信","source":"맹자"},{"text":"03-02-26 宰我曰以予觀於夫子賢於堯舜遠矣","source":"맹자"},{"text":"程子曰語聖則不異事功則有異夫子賢於堯舜語事功也蓋堯舜治天下夫子又","source":"맹자"},{"text":"推其道以垂敎萬世堯舜之道非得孔子則後世亦何所據哉","source":"맹자"},{"text":"03-02-27 子貢曰見其禮而知其政聞其樂而知其德由百世之後等百世之王莫","source":"맹자"},{"text":"之能違也自生民以來未有夫子也","source":"맹자"},{"text":"言大凡見人之禮則可以知其政聞人之樂則可以知其德是以我從百世之後差等","source":"맹자"},{"text":"百世之王無有能遁其情者而見其皆莫若夫子之盛也","source":"맹자"},{"text":"03-02-28 有若曰豈惟民哉麒麟之於走獸鳳凰之於飛鳥泰山之於丘垤河海之","source":"맹자"},{"text":"於行潦類也聖人之於民亦類也出於其類拔乎其萃自生民以來未有盛於孔","source":"맹자"},{"text":"麒麟毛蟲之長鳳凰羽蟲之長垤蟻封也行潦道上無源之水也出高出也拔特起","source":"맹자"},{"text":"也萃聚也言自古聖人固皆異於衆人然未有如孔子之尤盛者也○程子曰孟","source":"맹자"},{"text":"子此章擴前聖所未發學者所宜潛心而玩索也","source":"맹자"},{"text":"公孫丑上3章","source":"맹자"},{"text":"03-03-01 孟子曰以力假仁者霸霸必有大國以德行仁者王王不待大湯以七十","source":"맹자"},{"text":"里文王以百里","source":"맹자"},{"text":"力謂土地甲兵之力假仁者本無是心而借其事以爲功者也霸若齊桓晉文是也以","source":"맹자"},{"text":"德行仁則自吾之得於心者推之無適而非仁也","source":"맹자"},{"text":"03-03-02 以力服人者非心服也力不贍也以德服人者中心悅而誠服也如七十","source":"맹자"},{"text":"子之服孔子也詩云自西自東自南自北無思不服此之謂也","source":"맹자"},{"text":"贍足也詩大雅文王有聲之篇王霸之心誠僞不同故人所以應之者其不同亦如","source":"맹자"},{"text":"此○鄒氏曰以力服人者有意於服人而人不敢不服以德服人者無意於服人而","source":"맹자"},{"text":"人不能不服從古以來論王霸者多矣未有若此章之深切而著明者也","source":"맹자"},{"text":"公孫丑上4章","source":"맹자"},{"text":"03-04-01 孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也","source":"맹자"},{"text":"好榮惡辱人之常情然徒惡之而不去其得之之道不能免也","source":"맹자"},{"text":"03-04-02 如惡之莫如貴德而尊士賢者在位能者在職國家閒暇及是時明其","source":"맹자"},{"text":"政刑雖大國必畏之矣","source":"맹자"},{"text":"此因其惡辱之情而進之以彊仁之事也貴德猶尙德也士則指其人而言之賢有德","source":"맹자"},{"text":"者使之在位則足以正君而善俗能有才者使之在職則足以修政而立事國家閒","source":"맹자"},{"text":"暇可以有爲之時也詳味及字則惟日不足之意可見矣","source":"맹자"},{"text":"03-04-03 詩云迨天之未陰雨徹彼桑土綢繆牖戶今此下民或敢侮予孔子曰","source":"맹자"},{"text":"爲此詩者其知道乎能治其國家誰敢侮之","source":"맹자"},{"text":"詩豳風鴟鴞之篇周公之所作也迨及也徹取也桑土桑根之皮也綢繆纏綿補葺","source":"맹자"},{"text":"也牖戶巢之通氣出入處也予鳥自謂也言我之備患詳密如此今此在下之人或","source":"맹자"},{"text":"敢有侮予者乎周公以鳥之爲巢如此比君之爲國亦當思患而預防之孔子讀而贊","source":"맹자"},{"text":"之以爲知道也","source":"맹자"},{"text":"03-04-04 今國家閒暇及是時般樂怠敖是自求禍也","source":"맹자"},{"text":"言其縱欲偸安亦惟日不足也","source":"맹자"},{"text":"03-04-05 禍福無不自己求之者","source":"맹자"},{"text":"結上文之意","source":"맹자"},{"text":"03-04-06 詩云永言配命自求多福太甲曰天作孼猶可違自作孼不可活此之","source":"맹자"},{"text":"詩大雅文王之篇永長也言猶念也配合也命天命也此言福之自己求者太甲商","source":"맹자"},{"text":"書篇名孼禍也違避也活生也書作逭逭猶緩也此言禍之自己求者","source":"맹자"},{"text":"公孫丑上5章","source":"맹자"},{"text":"03-05-01 孟子曰尊賢使能俊傑在位則天下之士皆悅而願立於其朝矣","source":"맹자"},{"text":"俊傑才德之異於衆者","source":"맹자"},{"text":"03-05-02 市廛而不征法而不廛則天下之商皆悅而願藏於其市矣","source":"맹자"},{"text":"廛市宅也張子曰或賦其市地之廛而不征其貨或治以市官之法而不賦其廛蓋","source":"맹자"},{"text":"逐末者多則廛而抑之少則不必廛也","source":"맹자"},{"text":"03-05-03 關譏而不征則天下之旅皆悅而願出於其路矣","source":"맹자"},{"text":"03-05-04 耕者助而不稅則天下之農皆悅而願耕於其野矣","source":"맹자"},{"text":"但使出力以助耕公田而不稅其私田也","source":"맹자"},{"text":"03-05-05 廛無夫里之布則天下之民皆悅而願爲之氓矣","source":"맹자"},{"text":"周禮宅不毛者有里布民無職事者出夫家之征鄭氏謂宅不種桑麻者罰之使出一","source":"맹자"},{"text":"里二十五家之布民無常業者罰之使出一夫百畝之稅一家力役之征也今戰國","source":"맹자"},{"text":"時一切取之市宅之民已賦其廛又令出此夫里之布非先王之法也氓民也","source":"맹자"},{"text":"03-05-06 信能行此五者則隣國之民仰之若父母矣率其子弟攻其父母自生民","source":"맹자"},{"text":"以來未有能濟者也如此則無敵於天下無敵於天下者天吏也然而不王者未之","source":"맹자"},{"text":"呂氏曰奉行天命謂之天吏廢興存亡惟天所命不敢不從若湯武是也○此章","source":"맹자"},{"text":"言能行王政則寇戎爲父子不行王政則赤子爲仇讎","source":"맹자"},{"text":"公孫丑上6章","source":"맹자"},{"text":"03-06-01 孟子曰人皆有不忍人之心","source":"맹자"},{"text":"天地以生物爲心而所生之物因各得夫天地生物之心以爲心所以人皆有不忍人","source":"맹자"},{"text":"03-06-02","source":"맹자"},{"text":"先王有不忍人之心","source":"맹자"},{"text":"斯有不忍人之政矣","source":"맹자"},{"text":"以不忍人之心","source":"맹자"},{"text":"行不忍人之政","source":"맹자"},{"text":"治天下可運之掌上","source":"맹자"},{"text":"言衆人雖有不忍人之心然物欲害之存焉者寡故不能察識而推之政事之間惟聖","source":"맹자"},{"text":"人全體此心隨感而應故其所行無非不忍人之政也","source":"맹자"},{"text":"03-06-03 所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之","source":"맹자"},{"text":"心非所以內交於孺子之父母也非所以要譽於鄕黨朋友也非惡其聲而然也","source":"맹자"},{"text":"乍猶忽也怵惕驚動貌惻償之切也隱痛之深也此卽所謂不忍人之心也內結要","source":"맹자"},{"text":"求聲名也言乍見之時便有此心隨見而發非由此三者而然也程子曰滿腔子","source":"맹자"},{"text":"是惻隱之心謝氏曰人須是識其眞心方乍見孺子入井之時其心怵惕乃眞心也","source":"맹자"},{"text":"非思而得非勉而中天理之自然也內交要譽惡其聲而然卽人欲之私矣","source":"맹자"},{"text":"03-06-04 由是觀之無惻隱之心非人也無羞惡之心非人也無辭讓之心非人","source":"맹자"},{"text":"也無是非之心非人也","source":"맹자"},{"text":"羞恥己之不善也惡憎人之不善也辭解使去己也讓推以與人也是知其善而以爲","source":"맹자"},{"text":"非知其惡而以爲非也","source":"맹자"},{"text":"人之所以爲心","source":"맹자"},{"text":"不外乎是四者","source":"맹자"},{"text":"故因論惻隱而悉數之","source":"맹자"},{"text":"言人若無此則不得謂之人所以明其必有也","source":"맹자"},{"text":"03-06-05 惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之","source":"맹자"},{"text":"心知之端也","source":"맹자"},{"text":"惻隱羞惡辭讓是非情也仁義禮知性也心統性情者也端緖也因其情之發而性","source":"맹자"},{"text":"之本然可得而見猶有物在中而緖見於外也","source":"맹자"},{"text":"03-06-06 人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也謂","source":"맹자"},{"text":"其君不能者賊其君者也","source":"맹자"},{"text":"四體四肢人之所必有者也自謂不能者物欲蔽之耳","source":"맹자"},{"text":"03-06-07 凡有四端於我者知皆擴而充之矣若火之始然泉之始達苟能充之足","source":"맹자"},{"text":"以保四海苟不充之不足以事父母","source":"맹자"},{"text":"擴推廣之意充滿也四端在我隨處發見知皆卽此推廣而充滿其本然之量則其","source":"맹자"},{"text":"日新又日新將有不能自已者矣能由此而遂充之則四海雖遠亦吾度內無難保","source":"맹자"},{"text":"者不能充之則雖事之至近而不能矣○此
