let deck=[...ALL_WORDS],cur=0,revealed=false,scores={again:0,hard:0,good:0},writers={};

function applyFilter(f,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(f==='all') deck=[...ALL_WORDS];
  else if(f==='2') deck=ALL_WORDS.filter(w=>w.word.length===2);
  else if(f==='3') deck=ALL_WORDS.filter(w=>w.word.length===3);
  else if(f==='4') deck=ALL_WORDS.filter(w=>w.word.length>=4);
  else if(f==='freq') deck=[...ALL_WORDS].sort((a,b)=>b.freq-a.freq);
  cur=0;revealed=false;writers={};renderCard();
}
function shuffleDeck(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  cur=0;revealed=false;writers={};renderCard();
}
function renderCard(){
  const c=deck[cur];
  const disp=document.getElementById('wordDisplay');
  disp.innerHTML='';writers={};
  c.chars.forEach((ch,i)=>{
    const cc=document.createElement('div');cc.className='char-card';
    const box=document.createElement('div');box.className='char-box';box.id='box-'+i;
    const stat=document.createElement('div');stat.className='char-static';stat.textContent=ch.c;
    const svg=document.createElement('div');svg.className='char-svg-wrap';svg.id='svg-'+i;
    box.appendChild(stat);box.appendChild(svg);
    box.addEventListener('click',()=>animateChar(ch.c,i));
    const hun=document.createElement('div');hun.className='char-hunum';hun.id='hunum-'+i;
    hun.innerHTML='<span class="hun">'+ch.hun+'</span><span class="eum">'+ch.eum+'</span>';
    const hint=document.createElement('div');hint.className='char-hint';hint.id='hint-'+i;hint.textContent='눌러서 획순';
    cc.appendChild(box);cc.appendChild(hun);cc.appendChild(hint);disp.appendChild(cc);
  });
  revealed=false;
  document.getElementById('revealBtn').style.display='';
  document.getElementById('rateWrap').classList.remove('visible');
  const area=document.getElementById('meaningArea');area.classList.remove('visible');
  document.getElementById('wordHanja').textContent='';
  document.getElementById('wordDef').textContent='';
  document.getElementById('wordMeta').innerHTML='';
  document.getElementById('progLabel').textContent=(cur+1)+' / '+deck.length;
  document.getElementById('prog').style.width=Math.round(((cur+1)/deck.length)*100)+'%';
  updateStats();
}
function animateChar(ch,idx){
  const box=document.getElementById('box-'+idx);
  const hint=document.getElementById('hint-'+idx);
  if(box.classList.contains('animating')){if(writers[idx])writers[idx].animateCharacter();return;}
  box.classList.add('animating');hint.textContent='▶ 재생 중';
  try{
    document.getElementById('svg-'+idx).innerHTML='';
    const w=HanziWriter.create('svg-'+idx,ch,{width:86,height:86,padding:6,strokeColor:'#e94560',radicalColor:'#ff8080',outlineColor:'#2a3a5e',strokeAnimationSpeed:1,delayBetweenStrokes:200,showCharacter:false,showOutline:true});
    writers[idx]=w;
    w.animateCharacter({onComplete:()=>{hint.textContent='↺ 다시 재생';}});
  }catch(e){box.classList.remove('animating');hint.textContent='획순 미지원';}
}
function revealMeaning(){
  revealed=true;const c=deck[cur];
  c.chars.forEach((_,i)=>{const h=document.getElementById('hunum-'+i);if(h)h.classList.add('visible');});
  document.getElementById('wordHanja').textContent=c.word;
  document.getElementById('wordDef').textContent=c.def;
  document.getElementById('wordMeta').innerHTML='<span class="freq-badge">빈도 '+c.freq+'</span><span class="src-badge">출처: '+c.src+'</span>';
  document.getElementById('meaningArea').classList.add('visible');
  document.getElementById('revealBtn').style.display='none';
  document.getElementById('rateWrap').classList.add('visible');
}
function rate(r){if(r==='again')scores.again++;else if(r==='hard')scores.hard++;else scores.good++;updateStats();nextCard();}
function nextCard(){if(cur<deck.length-1){cur++;renderCard();}}
function prevCard(){if(cur>0){cur--;renderCard();}}
function updateStats(){
  document.getElementById('sTotal').textContent=deck.length;
  document.getElementById('sAgain').textContent=scores.again;
  document.getElementById('sHard').textContent=scores.hard;
  document.getElementById('sGood').textContent=scores.good;
}
renderCard();
</script>

<!-- 제출 모달 -->
<div class="sub-overlay" id="subOverlay">
  <div class="sub-box">
    <div class="sub-title">📤 과제 제출 — 한자 플래시카드</div>
    <div class="sub-row">
      <label>이름</label>
      <input type="text" id="subName" placeholder="홍길동">
    </div>
    <div class="sub-row">
      <label>학번</label>
      <input type="text" id="subSid" placeholder="2024001">
    </div>
    <div class="sub-row">
      <label>제출 시기</label>
      <select id="subTerm">
        <option value="">선택하세요</option>
        <option value="중간">중간 과제</option>
        <option value="기말">기말 과제</option>
      </select>
    </div>
    <div class="sub-row">
      <label>학습 소감</label>
      <textarea id="subMemo" placeholder="오늘 학습한 내용이나 느낀 점을 입력하세요."></textarea>
    </div>
    <div class="sub-btns">
      <button class="sub-cancel" onclick="closeSubModal()">취소</button>
      <button class="sub-ok" id="subOkBtn" onclick="submitAssignment()">제출하기</button>

<!-- 오른쪽 하단 제출 버튼 -->
<button class="sub-float" onclick="openSubModal()">📤 과제 제출</button>

<script>
var _SUBMIT_URL = 'https://script.google.com/macros/s/AKfycbw771Qtr-YI4icYvN-IngcBI9FAt-DYGpUEEfqfYo-ke4nefv9IXYAk5JntaCGssKii/exec';
var _APP_NAME = '한자 플래시카드';

function openSubModal(){
  document.getElementById('subOverlay').classList.add('on');
  document.getElementById('subMsg').textContent='';
  document.getElementById('subMsg').className='sub-msg';
}
function closeSubModal(){
  document.getElementById('subOverlay').classList.remove('on');
}
document.getElementById('subOverlay').addEventListener('click',function(e){
  if(e.target===this)closeSubModal();
});

function submitAssignment(){
  var name=document.getElementById('subName').value.trim();
  var sid=document.getElementById('subSid').value.trim();
  var term=document.getElementById('subTerm').value;
  var memo=document.getElementById('subMemo').value.trim();
  if(!name||!sid||!term){
    var m=document.getElementById('subMsg');
    m.textContent='이름, 학번, 제출 시기를 모두 입력해주세요.';
    m.className='sub-msg err';return;
  }
  var btn=document.getElementById('subOkBtn');
  btn.disabled=true;btn.textContent='전송 중...';
  var appData={
    totalCards: deck.length,
    again: scores.again,
    hard: scores.hard,
    good: scores.good,
    scoreRate: deck.length>0?Math.round((scores.good/deck.length)*100)+'%':'—'
  };
  var payload=Object.assign({name:name,sid:sid,term:term,app:_APP_NAME,memo:memo},appData);
  var form=new FormData();
  form.append('payload',JSON.stringify(payload));
  fetch(_SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
  .then(function(){
    var m=document.getElementById('subMsg');
    m.textContent='✓ 제출 완료! 교수님께 전달되었습니다.';
    m.className='sub-msg ok';
    btn.disabled=false;btn.textContent='제출하기';
    setTimeout(closeSubModal,2000);
  })
  .catch(function(){
    var m=document.getElementById('subMsg');
    m.textContent='전송 오류가 발생했습니다. 다시 시도해주세요.';
    m.className='sub-msg err';
    btn.disabled=false;btn.textContent='제출하기';
  });
}
</script>
</body>
</html>
