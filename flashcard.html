<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>중학교 한문 단어 플래시카드</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f3ebd5;
    color: #2b2b33;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow-x: hidden;
  }

  /* ── 상단 헤더 ── */
  .top-bar {
    background: #f8f1dd;
    padding: 14px 20px 10px;
    border-bottom: 1px solid #e2d6b4;
    flex-shrink: 0;
  }
  .top-title {
    font-size: 13px;
    color: #8a7d5e;
    margin-bottom: 10px;
    text-align: center;
  }
  .progress-bar {
    height: 6px;
    background: #e6dcc0;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #d35450, #b5402f);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 13px;
    color: #a89564;
    text-align: right;
  }

  /* ── 필터 탭 ── */
  .filter-wrap {
    background: #f8f1dd;
    padding: 10px 16px 12px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
    border-bottom: 1px solid #e2d6b4;
  }
  .filter-wrap::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #d8c9a3;
    background: #ece1c4;
    color: #8a7d5e;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .filter-btn.active {
    background: #b5402f;
    color: #fff;
    border-color: #b5402f;
  }

  /* ── 메인 카드 영역 ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 16px 16px;
    gap: 16px;
    overflow-y: auto;
  }

  /* ── 카드 ── */
  .card {
    background: #fcf8ee;
    border-radius: 20px;
    border: 1px solid #e2d6b4;
    box-shadow: 0 2px 10px rgba(90,70,30,0.06);
    padding: 28px 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    min-height: 340px;
  }

  /* 단어 표시 */
  .word-display {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .char-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .char-box {
    width: 110px;
    height: 110px;
    border-radius: 16px;
    border: 2px solid #ddcca0;
    background: #f4ead0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
  }
  .char-box:active { transform: scale(0.95); }
  .char-box.animating {
    border-color: #b5402f;
    background: #fbeee9;
  }

  .char-static {
    font-size: 68px;
    line-height: 1;
    color: #2b2733;
    font-family: 'Noto Serif KR', 'Noto Serif SC', serif;
    user-select: none;
  }
  .char-svg-wrap { display: none; width: 86px; height: 86px; }
  .char-box.animating .char-static { display: none; }
  .char-box.animating .char-svg-wrap { display: block; }

  /* 훈음 */
  .char-hunum {
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s;
    min-height: 38px;
  }
  .char-hunum.visible { opacity: 1; }
  .hun {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: #2b2b33;
    line-height: 1.3;
  }
  .eum {
    display: block;
    font-size: 13px;
    color: #b5402f;
    margin-top: 2px;
  }

  .char-hint {
    font-size: 11px;
    color: #a89c78;
    text-align: center;
  }
  .char-box.animating ~ .char-hunum ~ .char-hint { color: #b5402f; }

  /* 단어 의미 */
  .meaning-area {
    width: 100%;
    border-top: 1px solid #e2d6b4;
    padding-top: 18px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .meaning-area.visible { opacity: 1; }
  .word-hanja {
    font-size: 28px;
    font-weight: 700;
    color: #b5402f;
    font-family: 'Noto Serif KR', serif;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .word-def {
    font-size: 15px;
    color: #4a4636;
    line-height: 1.8;
    margin-bottom: 10px;
    word-break: keep-all;
  }
  .word-meta {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .freq-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(181,64,47,0.12);
    color: #b5402f;
    border: 1px solid rgba(181,64,47,0.28);
  }
  .src-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(22,33,62,0.05);
    color: #6f7d96;
    border: 1px solid #d8ccac;
  }

  .stroke-hint {
    font-size: 12px;
    color: #a89c78;
    text-align: center;
  }

  /* ── 뜻 보기 버튼 ── */
  .reveal-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid #b5402f;
    background: transparent;
    color: #b5402f;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .reveal-btn:active { background: rgba(181,64,47,0.1); transform: scale(0.98); }

  /* ── 난이도 평가 ── */
  .rate-wrap {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    flex-shrink: 0;
  }
  .rate-wrap.visible { opacity: 1; pointer-events: all; }
  .rate-btn {
    padding: 13px 6px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: transform 0.1s, filter 0.1s;
  }
  .rate-btn:active { transform: scale(0.95); filter: brightness(0.95); }
  .r-again { background:#f6dcd6; color:#b03a2e; }
  .r-hard  { background:#f3e6c2; color:#946610; }
  .r-good  { background:#d8ecdb; color:#2f7a4a; }
  .r-easy  { background:#d6e6f2; color:#2a6090; }

  /* ── 이전/다음/섞기 ── */
  .nav-wrap {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    flex-shrink: 0;
  }
  .nav-btn {
    padding: 14px 10px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-prev { background: #ebe0c5; color: #5a5340; }
  .btn-next { background: #b5402f; color: #fff; }
  .btn-prev:active { background: #e0d3b0; }
  .btn-next:active { background: #99301f; }
  .btn-shuffle {
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid #d8c9a3;
    background: #ece1c4;
    color: #8a7d5e;
  }
  .btn-shuffle:active { background: #e0d3b0; }

  /* ── 통계 ── */
  .stats-wrap {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    flex-shrink: 0;
    padding-bottom: 20px;
  }
  .stat-card {
    background: #fcf8ee;
    border-radius: 12px;
    border: 1px solid #e2d6b4;
    padding: 12px 6px;
    text-align: center;
  }
  .stat-n { font-size: 22px; font-weight: 700; color: #2b2b33; }
  .stat-l { font-size: 11px; color: #a89c78; margin-top: 3px; }
</style>
</head>
<body>

<!-- 상단 헤더 -->
<div class="top-bar">
  <div class="top-title">2022 개정 중학교 한문 교과서 단어 플래시카드</div>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="progress-label" id="progLabel">1 / 278</div>
</div>

<!-- 필터 -->
<div class="filter-wrap">
  <button class="filter-btn active" onclick="applyFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="applyFilter('2',this)">2자 단어</button>
  <button class="filter-btn" onclick="applyFilter('3',this)">3자 단어</button>
  <button class="filter-btn" onclick="applyFilter('4',this)">4자 이상</button>
  <button class="filter-btn" onclick="applyFilter('freq',this)">빈출 우선</button>
</div>

<!-- 메인 -->
<div class="main">

  <!-- 카드 -->
  <div class="card">
    <div class="word-display" id="wordDisplay"></div>
    <div class="stroke-hint">↑ 한자를 누르면 획순 애니메이션</div>
    <div class="meaning-area" id="meaningArea">
      <div class="word-hanja" id="wordHanja"></div>
      <div class="word-def" id="wordDef"></div>
      <div class="word-meta" id="wordMeta"></div>
    </div>
  </div>

  <!-- 뜻 보기 버튼 -->
  <button class="reveal-btn" id="revealBtn" onclick="revealMeaning()">뜻 보기</button>

  <!-- 난이도 평가 -->
  <div class="rate-wrap" id="rateWrap">
    <button class="rate-btn r-again" onclick="rate('again')">다시</button>
    <button class="rate-btn r-hard"  onclick="rate('hard')">어려움</button>
    <button class="rate-btn r-good"  onclick="rate('good')">보통</button>
    <button class="rate-btn r-easy"  onclick="rate('easy')">쉬움</button>
  </div>

  <!-- 이전/다음/섞기 -->
  <div class="nav-wrap">
    <button class="nav-btn btn-prev" onclick="prevCard()">← 이전</button>
    <button class="btn-shuffle" onclick="shuffleDeck()">섞기</button>
    <button class="nav-btn btn-next" onclick="nextCard()">다음 →</button>
  </div>

  <!-- 통계 -->
  <div class="stats-wrap">
    <div class="stat-card"><div class="stat-n" id="sTotal">0</div><div class="stat-l">전체</div></div>
    <div class="stat-card"><div class="stat-n" id="sAgain" style="color:#b03a2e">0</div><div class="stat-l">다시</div></div>
    <div class="stat-card"><div class="stat-n" id="sHard"  style="color:#946610">0</div><div class="stat-l">어려움</div></div>
    <div class="stat-card"><div class="stat-n" id="sGood"  style="color:#2f7a4a">0</div><div class="stat-l">보통+쉬움</div></div>
  </div>

</div><!-- /.main -->

  {word:"漢文", chars:[{c:"漢",hun:"한나라",eum:"한"},{c:"文",hun:"글",eum:"문"}], def:"한자로 쓴 문장. 동아시아의 고전 문어.", freq:1, src:"교학"},
  {word:"幸福", chars:[{c:"幸",hun:"다행",eum:"행"},{c:"福",hun:"복",eum:"복"}], def:"충분한 만족과 기쁨을 느끼는 상태.", freq:1, src:"교학"},
  {word:"孝道", chars:[{c:"孝",hun:"효도",eum:"효"},{c:"道",hun:"길",eum:"도"}], def:"부모를 정성껏 잘 섬기는 도리.", freq:1, src:"교학"},
  {word:"希望", chars:[{c:"希",hun:"바랄",eum:"희"},{c:"望",hun:"바랄",eum:"망"}], def:"앞일에 대한 기대와 소망.", freq:1, src:"교학"},
  {word:"送舊迎新", chars:[{c:"送",hun:"보낼",eum:"송"},{c:"舊",hun:"예",eum:"구"},{c:"迎",hun:"맞을",eum:"영"},{c:"新",hun:"새",eum:"신"}], def:"묵은해를 보내고 새해를 맞이함.", freq:1, src:"교학"},
  {word:"假想現實", chars:[{c:"假",hun:"거짓",eum:"가"},{c:"想",hun:"생각",eum:"상"},{c:"現",hun:"나타날",eum:"현"},{c:"實",hun:"열매",eum:"실"}], def:"컴퓨터 등으로 만들어낸 가상의 현실 환경. VR.", freq:1, src:"대학"},
];

let deck = [...ALL_WORDS];
let cur = 0;
let revealed = false;
let scores = {again:0, hard:0, good:0};
let writers = {};

function applyFilter(f, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (f==='all') deck=[...ALL_WORDS];
  else if (f==='2') deck=ALL_WORDS.filter(w=>w.word.length===2);
  else if (f==='3') deck=ALL_WORDS.filter(w=>w.word.length===3);
  else if (f==='4') deck=ALL_WORDS.filter(w=>w.word.length>=4);
  else if (f==='freq') deck=[...ALL_WORDS].sort((a,b)=>b.freq-a.freq);
  cur=0; revealed=false; writers={};
  renderCard();
}

function shuffleDeck() {
  for (let i=deck.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  cur=0; revealed=false; writers={}; renderCard();
}

function renderCard() {
  const c = deck[cur];
  const disp = document.getElementById('wordDisplay');
  disp.innerHTML = '';
  writers = {};

  c.chars.forEach((ch, i) => {
    const charCard = document.createElement('div');
    charCard.className = 'char-card';

    const box = document.createElement('div');
    box.className = 'char-box';
    box.id = `box-${i}`;

    const stat = document.createElement('div');
    stat.className = 'char-static';
    stat.textContent = ch.c;

    const svgWrap = document.createElement('div');
    svgWrap.className = 'char-svg-wrap';
    svgWrap.id = `svg-${i}`;

    box.appendChild(stat);
    box.appendChild(svgWrap);
    box.addEventListener('click', () => animateChar(ch.c, i));

    const hunum = document.createElement('div');
    hunum.className = 'char-hunum';
    hunum.id = `hunum-${i}`;
    hunum.innerHTML = `<span class="hun">${ch.hun}</span><span class="eum">${ch.eum}</span>`;

    const hint = document.createElement('div');
    hint.className = 'char-hint';
    hint.id = `hint-${i}`;
    hint.textContent = '눌러서 획순';

    charCard.appendChild(box);
    charCard.appendChild(hunum);
    charCard.appendChild(hint);
    disp.appendChild(charCard);
  });

  revealed = false;
  document.getElementById('revealBtn').style.display = '';
  document.getElementById('rateWrap').classList.remove('visible');
  const area = document.getElementById('meaningArea');
  area.classList.remove('visible');
  document.getElementById('wordHanja').textContent = '';
  document.getElementById('wordDef').textContent = '';
  document.getElementById('wordMeta').innerHTML = '';

  document.getElementById('progLabel').textContent = `${cur+1} / ${deck.length}`;
  document.getElementById('prog').style.width = `${Math.round(((cur+1)/deck.length)*100)}%`;
  updateStats();
}

function animateChar(ch, idx) {
  const box = document.getElementById(`box-${idx}`);
  const svgWrap = document.getElementById(`svg-${idx}`);
  const hint = document.getElementById(`hint-${idx}`);
  if (box.classList.contains('animating')) {
    if (writers[idx]) writers[idx].animateCharacter();
    return;
  }
  box.classList.add('animating');
  hint.textContent = '▶ 재생 중';
  try {
    svgWrap.innerHTML = '';
    const writer = HanziWriter.create(`svg-${idx}`, ch, {
      width: 86, height: 86, padding: 6,
      strokeColor: '#b5402f',
      radicalColor: '#d9774a',
      outlineColor: '#d8cba4',
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 200,
      showCharacter: false,
      showOutline: true,
    });
    writers[idx] = writer;
    writer.animateCharacter({ onComplete: () => { hint.textContent = '↺ 다시 재생'; } });
  } catch(e) {
    box.classList.remove('animating');
    hint.textContent = '획순 미지원';
  }
}

function revealMeaning() {
  revealed = true;
  const c = deck[cur];
  c.chars.forEach((_, i) => {
    const h = document.getElementById(`hunum-${i}`);
    if (h) h.classList.add('visible');
  });
  document.getElementById('wordHanja').textContent = c.word;
  document.getElementById('wordDef').textContent = c.def;
  document.getElementById('wordMeta').innerHTML =
    `<span class="freq-badge">빈도 ${c.freq}</span><span class="src-badge">출처: ${c.src}</span>`;
  document.getElementById('meaningArea').classList.add('visible');
  document.getElementById('revealBtn').style.display = 'none';
  document.getElementById('rateWrap').classList.add('visible');
}

function rate(r) {
  if (r==='again') scores.again++;
  else if (r==='hard') scores.hard++;
  else scores.good++;
  updateStats();
  nextCard();
}

function nextCard() { if (cur<deck.length-1) { cur++; renderCard(); } }
function prevCard() { if (cur>0) { cur--; renderCard(); } }

function updateStats() {
  document.getElementById('sTotal').textContent = deck.length;
  document.getElementById('sAgain').textContent = scores.again;
  document.getElementById('sHard').textContent  = scores.hard;
  document.getElementById('sGood').textContent  = scores.good;
}

renderCard();
</script>
</body>
</html>
