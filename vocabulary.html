<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한문 손글씨 단어장</title>
<style>
:root {
  --ink:#1a1008;--red:#c0392b;--red2:#e74c3c;
  --paper:#faf8f0;--paper2:#f0ece0;--line:#ddd5b8;--muted:#a09070;
  --dark:#16120a;--cbg:#fffef8;--navy:#1a3a6e;
  --topbar:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--paper2);height:100dvh;display:flex;flex-direction:column;}

/* ── 탑바 ── */
.topbar{background:var(--dark);display:flex;align-items:center;height:var(--topbar);flex-shrink:0;}
.topbar-title{font-size:13px;color:#f0e8d0;padding:0 12px;font-weight:500;white-space:nowrap;border-right:1px solid #3a2a10;height:100%;display:flex;align-items:center;}
.tabs{display:flex;flex:1;height:100%;}
.tab{flex:1;font-size:12px;font-weight:600;cursor:pointer;color:#6a5a3a;border-bottom:3px solid transparent;display:flex;align-items:center;justify-content:center;gap:3px;transition:all .2s;padding:0 2px;}
.tab.active{color:#f0c060;border-bottom-color:#f0c060;}
.badge{background:#3a2a10;color:#f0c060;font-size:10px;padding:1px 5px;border-radius:8px;}

/* ── 패널 공통 ── */
/* 모든 패널: 탑바 아래 전체 높이, 내부 스크롤 */
.panel{display:none;position:absolute;top:var(--topbar);left:0;right:0;bottom:0;overflow:hidden;}
.panel.active{display:block;}

/* ══════════ 등록 패널 ══════════ */
#panel-note{overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--paper2);}
.notebook{padding:14px 13px 80px;display:flex;flex-direction:column;gap:12px;}

.form-card{background:var(--paper);border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(60,40,10,.12);}
.form-head{background:var(--red);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.form-head-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:.08em;}
.form-head-sub{font-size:10px;color:rgba(255,255,255,.65);}
.form-body{padding:13px;display:flex;flex-direction:column;gap:10px;}

.draw-field{display:flex;flex-direction:column;gap:5px;}
.draw-label{font-size:11px;font-weight:700;color:var(--red);letter-spacing:.12em;display:flex;align-items:center;justify-content:space-between;}
.draw-label-sub{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:0;}
.canvas-wrap{position:relative;border:1.5px solid var(--line);border-radius:8px;background:var(--cbg);overflow:hidden;}
.canvas-wrap canvas{display:block;width:100%;touch-action:none;cursor:crosshair;}
.canvas-tools{position:absolute;top:5px;right:5px;display:flex;gap:4px;}
.ctool{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);color:var(--muted);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.ctool:active{transform:scale(.92);}
.ctool.red{color:var(--red);}

.hanja-confirm-wrap{display:flex;align-items:center;gap:8px;background:#fff8f0;border:1.5px solid #f0d8c0;border-radius:8px;padding:8px 12px;margin-top:4px;}
.hanja-confirm-label{font-size:11px;color:var(--red);font-weight:700;white-space:nowrap;}
.hanja-confirm-input{flex:1;border:none;outline:none;background:transparent;font-size:18px;color:var(--ink);font-family:'Noto Serif KR',serif;text-align:center;}
.hanja-confirm-input::placeholder{font-size:12px;color:#c0a880;font-family:inherit;}
.naver-preview{font-size:10px;color:var(--navy);text-decoration:none;white-space:nowrap;background:#e8f0f8;padding:3px 8px;border-radius:6px;border:1px solid #c8d8f0;}

.hun-eum-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.type-row{display:flex;gap:5px;flex-wrap:wrap;}
.type-chip{padding:5px 10px;border-radius:14px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:var(--paper2);color:var(--muted);transition:all .15s;}
.type-chip.active{border-color:var(--red);background:var(--red);color:#fff;}

.text-field{display:flex;flex-direction:column;gap:4px;}
.text-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;}
.text-input{border:1.5px solid var(--line);border-radius:8px;background:var(--cbg);padding:9px 12px;font-size:14px;color:var(--ink);font-family:inherit;outline:none;width:100%;resize:none;}
.text-input:focus{border-color:var(--red);}

.related-wrap{display:flex;flex-direction:column;gap:6px;}
.related-tags{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;}
.rtag{display:inline-flex;align-items:center;gap:4px;background:#f0e8d8;border:1px solid #d4c0a0;border-radius:8px;padding:3px 8px;font-size:13px;color:var(--ink);font-family:'Noto Serif KR',serif;}
.rtag-del{background:none;border:none;color:#b0a080;cursor:pointer;font-size:12px;padding:0 0 0 2px;line-height:1;}
.rtag-del:active{color:var(--red);}
.related-input-row{display:flex;gap:6px;}
.related-input{flex:1;border:1.5px solid var(--line);border-radius:8px;background:var(--cbg);padding:8px 12px;font-size:15px;color:var(--ink);font-family:'Noto Serif KR',serif;outline:none;}
.related-input:focus{border-color:var(--red);}
.related-add-btn{padding:8px 12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.related-add-btn:active{background:var(--red2);}

.add-btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:all .15s;font-family:inherit;}
.add-btn:active{background:var(--red2);transform:scale(.98);}

/* ══════════ 전체보기 패널 ══════════ */
#panel-gallery{display:none;flex-direction:column;overflow:hidden;}
#panel-gallery.active{display:flex;}

.gallery-header{background:var(--paper);border-bottom:1px solid var(--line);padding:12px 14px;flex-shrink:0;}
.gallery-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.gallery-title{font-size:13px;font-weight:700;color:var(--ink);}
.gallery-sort{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.gallery-filter{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.gallery-filter::-webkit-scrollbar{display:none;}
.gf-btn{padding:4px 11px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:var(--paper2);color:var(--muted);white-space:nowrap;flex-shrink:0;}
.gf-btn.active{background:var(--red);border-color:var(--red);color:#fff;}

.gallery-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.gallery-grid{display:grid;grid-template-columns:1fr;gap:14px;padding:14px 13px 100px;}

/* 갤러리 카드 */
.gcard{background:var(--paper);border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(60,40,10,.10);cursor:pointer;position:relative;}
.gcard:active{transform:scale(.98);}
.gcard-spine{position:absolute;left:0;top:0;bottom:0;width:4px;}
.t-한자 .gcard-spine{background:#8B4513;}
.t-단어 .gcard-spine{background:#1a5fa0;}
.t-숙어 .gcard-spine{background:#7d3c98;}
.t-문법 .gcard-spine{background:#1a7a4a;}
.t-기타 .gcard-spine{background:#8a7a5a;}

.gcard-top{padding:24px 18px 16px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.gcard-type-row{width:100%;display:flex;align-items:center;justify-content:space-between;}
.gcard-type-badge{font-size:12px;padding:3px 10px;border-radius:8px;font-weight:700;}
.t-한자 .gcard-type-badge{background:#f5ede4;color:#8B4513;}
.t-단어 .gcard-type-badge{background:#e8f0f8;color:#1a5fa0;}
.t-숙어 .gcard-type-badge{background:#f5eefa;color:#7d3c98;}
.t-문법 .gcard-type-badge{background:#e8f5ee;color:#1a7a4a;}
.t-기타 .gcard-type-badge{background:#f0ece4;color:#8a7a5a;}
.gcard-date{font-size:12px;color:#c0b090;}

.gcard-img{border:1.5px solid var(--line);border-radius:10px;background:var(--cbg);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.gcard-img img{display:block;object-fit:contain;}
.gcard-hanja-text{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:500;color:var(--ink);text-align:center;}

.gcard-bottom{background:var(--paper2);border-top:1px solid var(--line);padding:18px 18px;display:flex;flex-direction:column;gap:10px;}
.gcard-hun-eum-row{display:flex;gap:16px;justify-content:center;align-items:flex-start;}
.gcard-img-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.gcard-img-label{font-size:14px;font-weight:700;color:var(--red);letter-spacing:.1em;margin-bottom:2px;}
.gcard-img-small{border:1.5px solid var(--line);border-radius:8px;background:var(--cbg);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.gcard-img-small img{display:block;object-fit:contain;}

.gcard-src{font-size:14px;color:var(--muted);font-style:italic;text-align:center;}
.gcard-def{font-size:15px;color:#4a3a20;line-height:1.7;text-align:center;}
.gcard-related-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.gcard-rtag{font-size:15px;background:#f0e8d8;border:1px solid #d4c0a0;border-radius:8px;padding:5px 12px;color:var(--ink);font-family:'Noto Serif KR',serif;}
.gcard-naver{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.gnlink{font-size:13px;color:var(--navy);text-decoration:none;background:#e8f0f8;padding:6px 14px;border-radius:8px;border:1px solid #c0d4f0;font-weight:600;}
.gnlink:active{background:#d0e4f8;}

.gallery-empty{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;}
.gallery-empty-icon{font-size:44px;margin-bottom:10px;opacity:.4;}
.gallery-empty-text{font-size:13px;line-height:1.9;}

/* ══════════ 모달 ══════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--paper);border-radius:20px 20px 0 0;width:100%;max-height:90dvh;overflow-y:auto;padding:20px 16px 40px;}
.modal-handle{width:40px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px;}
.modal-hanja-img{display:flex;justify-content:center;margin-bottom:12px;}
.modal-hanja-img img{border:1.5px solid var(--line);border-radius:12px;background:var(--cbg);object-fit:contain;}
.modal-hanja-text{font-family:'Noto Serif KR',serif;font-size:32px;font-weight:500;color:var(--ink);text-align:center;margin-bottom:8px;}
.modal-type{text-align:center;margin-bottom:14px;}
.modal-type span{font-size:11px;padding:3px 12px;border-radius:12px;font-weight:700;}
.modal-row{display:flex;gap:8px;margin-bottom:12px;justify-content:center;}
.modal-img-box{border:1px solid var(--line);border-radius:8px;background:var(--cbg);display:flex;flex-direction:column;align-items:center;overflow:hidden;}
.modal-img-box img{object-fit:contain;display:block;}
.modal-img-label{font-size:10px;color:var(--muted);padding:3px 0 4px;letter-spacing:.1em;}
.modal-section{margin-bottom:12px;}
.modal-section-label{font-size:11px;font-weight:700;color:var(--red);letter-spacing:.12em;margin-bottom:6px;}
.modal-def-text{font-size:14px;color:#4a3a20;line-height:1.7;}
.modal-related-tags{display:flex;flex-wrap:wrap;gap:5px;}
.modal-rtag{font-size:14px;background:#f0e8d8;border:1px solid #d4c0a0;border-radius:8px;padding:4px 10px;color:var(--ink);font-family:'Noto Serif KR',serif;}
.modal-naver-links{display:flex;flex-wrap:wrap;gap:6px;}
.modal-nlink{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--navy);text-decoration:none;background:#e8f0f8;padding:5px 12px;border-radius:8px;border:1px solid #c0d4f0;font-weight:600;}
.modal-nlink .mnchar{font-family:'Noto Serif KR',serif;font-size:16px;color:var(--ink);}
.modal-close{width:100%;margin-top:16px;padding:13px;background:var(--paper2);border:1px solid var(--line);border-radius:10px;font-size:14px;color:var(--muted);cursor:pointer;font-family:inherit;}
.modal-close:active{background:var(--line);}

/* ══════════ 테스트 패널 ══════════ */
#panel-quiz{display:none;flex-direction:column;overflow:hidden;}
#panel-quiz.active{display:flex;}
.quiz-mode-bar{padding:10px 14px;display:flex;gap:6px;border-bottom:1px solid #2a1e10;flex-shrink:0;background:var(--dark);}
.qmode-btn{flex:1;padding:7px 4px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #3a2a10;background:#2a1a08;color:#6a5a3a;transition:all .15s;}
.qmode-btn.active{background:#f0c060;color:var(--dark);border-color:#f0c060;}
.quiz-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 15px;gap:14px;background:var(--dark);}
.quiz-stat-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;}
.qs-card{background:#1a1208;border:1px solid #2a1e10;border-radius:10px;padding:10px 6px;text-align:center;}
.qs-n{font-size:22px;font-weight:700;}
.qs-l{font-size:10px;color:#5a4a2a;margin-top:2px;}
.q-card{width:100%;background:#16120a;border:1px solid #3a2a10;border-radius:18px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.q-label{font-size:11px;color:#5a4a2a;letter-spacing:.15em;}
.q-src{font-size:11px;color:#4a3a20;font-style:italic;}
.q-type{font-size:10px;color:#4a3a20;background:#2a1a08;padding:2px 8px;border-radius:8px;}
.ans-area{width:100%;display:flex;flex-direction:column;gap:10px;}
.ans-reveal-btn{width:100%;padding:15px;background:#2a1a08;border:1.5px solid #f0c060;border-radius:12px;color:#f0c060;font-size:15px;font-weight:700;cursor:pointer;}
.ans-reveal-btn:active{background:#f0c060;color:var(--dark);}
.ans-shown{display:none;flex-direction:column;gap:10px;width:100%;}
.ans-img-row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;}
.ans-img-box{border:1px solid #3a2a10;border-radius:8px;background:var(--cbg);display:flex;flex-direction:column;align-items:center;overflow:hidden;}
.ans-img-box img{display:block;object-fit:contain;}
.ans-img-label{font-size:10px;color:#5a4a2a;padding:3px 0 4px;letter-spacing:.1em;}
.q-naver-links{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.q-nlink{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--navy);text-decoration:none;background:#e8f0f8;padding:5px 12px;border-radius:8px;border:1px solid #c0d4f0;font-weight:600;}
.q-nlink .qnc{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--ink);}
.self-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.self-btn{padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;}
.self-btn:active{transform:scale(.96);}
.self-correct{background:#0a2a1a;color:#60d090;border:1px solid #27ae60;}
.self-wrong{background:#2a0a0a;color:#ff8080;border:1px solid #c0392b;}
.q-nav-btn{width:100%;padding:13px;background:#2a1a08;border:1px solid #3a2a10;border-radius:12px;color:#8a7a5a;font-size:13px;font-weight:600;cursor:pointer;}
.q-nav-btn:active{background:#3a2a10;}
.quiz-empty{text-align:center;padding:20px;}
.quiz-empty-icon{font-size:48px;margin-bottom:14px;opacity:.25;}
.quiz-empty-text{font-size:13px;color:#5a4a2a;line-height:1.9;}
.quiz-done{text-align:center;padding:20px;color:#f0e8d0;display:flex;flex-direction:column;align-items:center;gap:14px;}
.quiz-done-icon{font-size:48px;}
.quiz-done-title{font-size:20px;color:#f0c060;font-weight:700;}
.quiz-done-sub{font-size:14px;color:#8a7a5a;line-height:2;}
.quiz-retry-btn{padding:13px 32px;background:#f0c060;color:var(--dark);border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;}
.quiz-retry-btn:active{transform:scale(.97);}

/* 토스트 */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1008;color:#f0e8d0;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>

<style>
.sub-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center}
.sub-overlay.on{display:flex}
.sub-box{background:#faf8f4;border-radius:16px;padding:28px 26px;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.sub-title{font-family:'Noto Serif KR',serif;font-size:18px;color:#1a1410;margin-bottom:18px;text-align:center}
.sub-row{margin-bottom:13px}
.sub-row label{display:block;font-size:12px;color:#6b5744;margin-bottom:5px;font-weight:500}
.sub-row input,.sub-row select,.sub-row textarea{width:100%;padding:10px 12px;border:1px solid #e0d5c5;border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:#1a1410;background:#f3ede3;outline:none;transition:border .15s}
.sub-row input:focus,.sub-row select:focus,.sub-row textarea:focus{border-color:#c0392b}
.sub-row textarea{resize:vertical;min-height:70px}
.sub-btns{display:flex;gap:10px;margin-top:18px}
.sub-ok{flex:1;padding:12px;border-radius:9px;background:#c0392b;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .15s}
.sub-ok:hover{background:#a93226}
.sub-ok:disabled{background:#ccc;cursor:not-allowed}
.sub-cancel{padding:12px 18px;border-radius:9px;background:#f3ede3;color:#6b5744;border:1px solid #e0d5c5;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.sub-msg{text-align:center;font-size:13px;margin-top:12px;min-height:18px}
.sub-msg.ok{color:#3d6b4a}.sub-msg.err{color:#c0392b}
.sub-float{position:fixed;top:8px;right:10px;z-index:1000;padding:7px 14px;background:#1a5fa0;color:#fff;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 2px 8px rgba(26,95,160,.4);transition:all .2s}
.sub-float:hover{background:#154e8a;transform:translateY(-1px)}
</style>
</head>
<body>

<!-- 탑바 -->
<div class="topbar">
  <div class="topbar-title">📖 한문 단어장</div>
  <div class="tabs">
    <div class="tab active" id="tab-note" onclick="switchTab('note')">등록</div>
    <div class="tab" id="tab-gallery" onclick="switchTab('gallery')">전체보기 <span class="badge" id="totalBadge">0</span></div>
    <div class="tab" id="tab-quiz" onclick="switchTab('quiz')">테스트</div>
  </div>
</div>

<!-- ══ 등록 패널 ══ -->
<div class="panel active" id="panel-note">
  <div class="notebook">
    <div class="form-card">
      <div class="form-head">
        <span class="form-head-title">✦ 새 단어 등록</span>
        <span class="form-head-sub">손으로 직접 써 보세요</span>
      </div>
      <div class="form-body">

        <div class="draw-field">
          <div class="draw-label">字 한자 / 단어 <span class="draw-label-sub">손으로 쓰세요</span></div>
          <div class="canvas-wrap" id="wrap-hanja" style="max-width:330px;margin:0 auto;">
            <canvas id="canvas-hanja" height="195"></canvas>
            <div class="canvas-tools">
              <button class="ctool" onclick="undoCanvas('hanja')">↩</button>
              <button class="ctool red" onclick="clearCanvas('hanja')">✕</button>
            </div>
          </div>
          <div class="hanja-confirm-wrap">
            <span class="hanja-confirm-label">🔍 한자</span>
            <input class="hanja-confirm-input" id="inp-hanja-text" type="text"
              placeholder="쓴 한자 입력 → 사전 링크 생성" oninput="updateNaverPreview()">
            <a class="naver-preview" id="naver-preview-btn" href="#" target="_blank"
              style="display:none;">사전 →</a>
          </div>
        </div>

        <div class="hun-eum-row">
          <div class="draw-field">
            <div class="draw-label">訓 훈(뜻)</div>
            <div class="canvas-wrap" id="wrap-hun">
              <canvas id="canvas-hun" height="80"></canvas>
              <div class="canvas-tools">
                <button class="ctool red" onclick="clearCanvas('hun')">✕</button>

            </div>
          </div>
          <div class="draw-field">
            <div class="draw-label">音 음(읽기)</div>
            <div class="canvas-wrap" id="wrap-eum">
              <canvas id="canvas-eum" height="80"></canvas>
              <div class="canvas-tools">
                <button class="ctool red" onclick="clearCanvas('eum')">✕</button>
              </div>
            </div>
          </div>
        </div>

        <div class="draw-field">
          <div class="draw-label">유형</div>
          <div class="type-row">
            <div class="type-chip active" onclick="selectType(this,'한자')">한자</div>
            <div class="type-chip" onclick="selectType(this,'단어')">단어</div>
            <div class="type-chip" onclick="selectType(this,'숙어')">숙어·성어</div>
            <div class="type-chip" onclick="selectType(this,'문법')">문법</div>
            <div class="type-chip" onclick="selectType(this,'기타')">기타</div>
          </div>
        </div>

        <div class="text-field">
          <div class="text-label">出 출처 원문</div>
          <input class="text-input" id="inp-source" type="text" placeholder="예: 論語 學而篇">
        </div>

        <div class="text-field">
          <div class="text-label">義 의미 · 용법</div>
          <textarea class="text-input" id="inp-def" rows="2"
            placeholder="의미, 문법적 용법, 참고 사항"></textarea>
        </div>

        <div class="text-field">
          <div class="text-label">關 관련 한자어</div>
          <div class="related-wrap">
            <div class="related-tags" id="relatedTags"></div>
            <div class="related-input-row">
              <input class="related-input" id="inp-related" type="text"
                placeholder="관련 한자어 입력 후 + 버튼"
                onkeydown="if(event.key==='Enter')addRelatedTag()">
              <button class="related-add-btn" onclick="addRelatedTag()">+ 추가</button>
            </div>
          </div>
        </div>

        <button class="add-btn" onclick="addEntry()">+ 단어 추가</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ 전체보기 패널 ══ -->
<div class="panel" id="panel-gallery">
  <div class="gallery-header">
    <div class="gallery-top-row">
      <div class="gallery-title">등록된 단어 전체 보기</div>
      <button class="gallery-sort" onclick="toggleSort()" id="sortBtn">▼ 최신순</button>
    </div>
    <div class="gallery-filter">
      <button class="gf-btn active" onclick="filterGallery('전체',this)">전체</button>
      <button class="gf-btn" onclick="filterGallery('한자',this)">한자</button>
      <button class="gf-btn" onclick="filterGallery('단어',this)">단어</button>
      <button class="gf-btn" onclick="filterGallery('숙어',this)">숙어</button>
      <button class="gf-btn" onclick="filterGallery('문법',this)">문법</button>
      <button class="gf-btn" onclick="filterGallery('기타',this)">기타</button>
    </div>
  </div>
  <div class="gallery-scroll">
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</div>

<!-- ══ 테스트 패널 ══ -->
<div class="panel" id="panel-quiz">
  <div class="quiz-mode-bar">
    <button class="qmode-btn active" id="qm-h2h" onclick="setQMode('hanja2hun',this)">字 → 訓音</button>
    <button class="qmode-btn" id="qm-h2a" onclick="setQMode('hun2hanja',this)">訓音 → 字</button>
    <button class="qmode-btn" id="qm-rnd" onclick="setQMode('random',this)">랜덤</button>
  </div>
  <div class="quiz-body" id="quizBody"></div>
</div>

<!-- 모달 -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
/* ════ 데이터 ════ */
let entries = JSON.parse(localStorage.getItem('hanja_wb5') || '[]');
let sortAsc = false;
let selectedType = '한자';
let relatedTags = [];
let qMode = 'hanja2hun';
let qOrder = [];
let qIdx = 0;
let qStats = {c:0, w:0};
let galleryFilter = '전체';

function save() { localStorage.setItem('hanja_wb5', JSON.stringify(entries)); }

/* ════ 네이버 링크 ════ */
function naverURL(h) { return 'https://hanja.dict.naver.com/#/search?query=' + encodeURIComponent(h); }

function makeLinks(text) {
  if (!text) return [];
  const chars = [...text].filter(c => c.charCodeAt(0) >= 0x4E00 && c.charCodeAt(0) <= 0x9FFF);
  const links = [];
  if (text.length > 1) links.push({text, url: naverURL(text)});
  chars.forEach(c => { if (!links.find(l => l.text === c)) links.push({text:c, url:naverURL(c)}); });
  return links;
}

function updateNaverPreview() {
  const val = document.getElementById('inp-hanja-text').value.trim();
  const btn = document.getElementById('naver-preview-btn');
  if (val) { btn.style.display = ''; btn.href = naverURL(val); btn.textContent = '사전 →'; }
  else btn.style.display = 'none';
}

/* ════ 관련 한자어 태그 ════ */
function addRelatedTag() {
  const inp = document.getElementById('inp-related');
  const val = inp.value.trim();
  if (!val) return;
  if (!relatedTags.includes(val)) relatedTags.push(val);
  inp.value = '';
  renderRelatedTags();
}
function removeRelatedTag(idx) {
  relatedTags.splice(idx, 1);
  renderRelatedTags();
}
function renderRelatedTags() {
  document.getElementById('relatedTags').innerHTML = relatedTags.map((t, i) =>
    `<span class="rtag">${t}<button class="rtag-del" onclick="removeRelatedTag(${i})">✕</button></span>`
  ).join('');
}

/* ════ 캔버스 ════ */
const CVS = {}, CTX = {}, HIST = {};

function initCanvas(name) {
  const canvas = document.getElementById('canvas-' + name);
  const wrap   = document.getElementById('wrap-' + name);
  const dpr    = window.devicePixelRatio || 1;
  const w      = wrap.clientWidth;
  const h      = parseInt(canvas.getAttribute('height'));

  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#1a1008';
  ctx.lineWidth   = name === 'hanja' ? 3.5 : 2.5;
  ctx.lineCap = ctx.lineJoin = 'round';
  ctx.fillStyle = '#fffef8';
  ctx.fillRect(0, 0, w, h);

  CVS[name] = canvas; CTX[name] = ctx; HIST[name] = [];

  let drawing = false, lx = 0, ly = 0;

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return [s.clientX - r.left, s.clientY - r.top];
  }
  function down(e) {
    e.preventDefault(); drawing = true; [lx, ly] = pos(e);
    HIST[name].push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    ctx.beginPath(); ctx.arc(lx, ly, name==='hanja'?1.5:1, 0, Math.PI*2);
    ctx.fillStyle = '#1a1008'; ctx.fill();
  }
  function move(e) {
    e.preventDefault(); if (!drawing) return;
    const [x, y] = pos(e);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(x, y); ctx.stroke();
    [lx, ly] = [x, y];
  }
  function up(e) { e.preventDefault(); drawing = false; }

  canvas.addEventListener('touchstart', down, {passive:false});
  canvas.addEventListener('touchmove',  move, {passive:false});
  canvas.addEventListener('touchend',   up,   {passive:false});
  canvas.addEventListener('mousedown',  down);
  canvas.addEventListener('mousemove',  move);
  canvas.addEventListener('mouseup',    up);
  canvas.addEventListener('mouseleave', up);
}

function clearCanvas(name) {
  const c = CVS[name], ctx = CTX[name], dpr = window.devicePixelRatio || 1;
  ctx.fillStyle = '#fffef8';
  ctx.fillRect(0, 0, c.width/dpr, c.height/dpr);
  HIST[name] = [];
}
function undoCanvas(name) {
  const h = HIST[name];
  if (h.length) CTX[name].putImageData(h.pop(), 0, 0);
}
function getDataURL(name) { return CVS[name] ? CVS[name].toDataURL('image/png') : null; }
function isBlank(name) {
  const c = CVS[name]; if (!c) return true;
  const d = CTX[name].getImageData(0, 0, c.width, c.height).data;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i]<238 || d[i+1]<236 || d[i+2]<226) return false;
  }
  return true;
}

/* ════ 유형 ════ */
function selectType(el, type) {
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedType = type;
}

/* ════ 단어 추가 ════ */
function addEntry() {
  if (isBlank('hanja')) { alert('한자를 손으로 써 주세요.'); return; }
  const hanjaText = document.getElementById('inp-hanja-text').value.trim();
  const e = {
    id:        Date.now(),
    hanja:     getDataURL('hanja'),
    hun:       getDataURL('hun'),
    eum:       getDataURL('eum'),
    hunBlank:  isBlank('hun'),
    eumBlank:  isBlank('eum'),
    hanjaText, naverLinks: makeLinks(hanjaText),
    type:      selectedType,
    source:    document.getElementById('inp-source').value.trim(),
    def:       document.getElementById('inp-def').value.trim(),
    related:   [...relatedTags],
    date:      new Date().toLocaleDateString('ko-KR', {month:'2-digit', day:'2-digit'}),
    ts:        Date.now()
  };
  entries.unshift(e);
  save();
  clearCanvas('hanja'); clearCanvas('hun'); clearCanvas('eum');
  document.getElementById('inp-hanja-text').value = '';
  document.getElementById('naver-preview-btn').style.display = 'none';
  document.getElementById('inp-source').value = '';
  document.getElementById('inp-def').value = '';
  relatedTags = []; renderRelatedTags();
  updateBadge(); shuffleQ(); renderGallery();
  showToast('등록 완료! 전체보기 탭에서 확인하세요.');
}

/* ════ 배지 ════ */
function updateBadge() { document.getElementById('totalBadge').textContent = entries.length; }

/* ════ 탭 전환 ════ */
function switchTab(tab) {
  ['note', 'gallery', 'quiz'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'gallery') renderGallery();
  if (tab === 'quiz')    renderQuiz();
}

/* ════ 전체보기 갤러리 ════ */
let _sortAsc = false;

function toggleSort() {
  _sortAsc = !_sortAsc;
  document.getElementById('sortBtn').textContent = _sortAsc ? '▲ 오래된순' : '▼ 최신순';
  renderGallery();
}

function filterGallery(type, btn) {
  galleryFilter = type;
  document.querySelectorAll('.gf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  const base = galleryFilter === '전체' ? entries : entries.filter(e => e.type === galleryFilter);
  const list = _sortAsc ? [...base].reverse() : base;

  if (!list.length) {
    grid.innerHTML = '<div class="gallery-empty"><div class="gallery-empty-icon">冊</div><div class="gallery-empty-text">등록된 단어가 없습니다.<br>등록 탭에서 단어를 추가해 보세요.</div></div>';
    return;
  }

  grid.innerHTML = list.map(e => `
    <div class="gcard t-${e.type}" onclick="openModal(${e.id})">
      <div class="gcard-spine"></div>
      <div class="gcard-top">
        <div class="gcard-type-row">
          <span class="gcard-type-badge">${e.type}</span>
          <span class="gcard-date">${e.date}</span>
        </div>
        <div class="gcard-img" style="width:min(400px,96vw);height:min(400px,96vw);">
          <img src="${e.hanja}" style="width:100%;height:100%;" alt="한자">
        </div>
        ${e.hanjaText ? `<div class="gcard-hanja-text">${e.hanjaText}</div>` : ''}
      </div>
      <div class="gcard-bottom">
        <div class="gcard-hun-eum-row">
          ${!e.hunBlank ? `
            <div class="gcard-img-col">
              <div class="gcard-img-label">訓</div>
              <div class="gcard-img-small" style="width:min(200px,46vw);height:140px;">
                <img src="${e.hun}" style="width:100%;height:100%;" alt="훈">
              </div>
            </div>` : ''}
          ${!e.eumBlank ? `
            <div class="gcard-img-col">
              <div class="gcard-img-label">音</div>
              <div class="gcard-img-small" style="width:min(200px,46vw);height:140px;">
                <img src="${e.eum}" style="width:100%;height:100%;" alt="음">
              </div>
            </div>` : ''}
        </div>
        ${e.source ? `<div class="gcard-src">${e.source}</div>` : ''}
        ${e.def    ? `<div class="gcard-def">${e.def}</div>` : ''}
        ${e.related && e.related.length ? `
          <div class="gcard-related-row">
            ${e.related.map(r => `<span class="gcard-rtag">${r}</span>`).join('')}
          </div>` : ''}
        ${e.naverLinks && e.naverLinks.length ? `
          <div class="gcard-naver">
            ${e.naverLinks.map(l => `<a class="gnlink" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${l.text}</a>`).join('')}
          </div>` : ''}
      </div>
    </div>`).join('');
}

/* ════ 모달 ════ */
function openModal(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  const typeColors = {한자:'#f5ede4|#8B4513', 단어:'#e8f0f8|#1a5fa0', 숙어:'#f5eefa|#7d3c98', 문법:'#e8f5ee|#1a7a4a', 기타:'#f0ece4|#8a7a5a'};
  const [tbg, tc] = (typeColors[e.type] || '#f0ece4|#8a7a5a').split('|');
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-hanja-img"><img src="${e.hanja}" width="160" height="160" alt="한자"></div>
    ${e.hanjaText ? `<div class="modal-hanja-text">${e.hanjaText}</div>` : ''}
    <div class="modal-type"><span style="background:${tbg};color:${tc};">${e.type}</span></div>
    ${(!e.hunBlank || !e.eumBlank) ? `
    <div class="modal-row">
      ${!e.hunBlank ? `<div class="modal-img-box"><div class="modal-img-label">訓</div><img src="${e.hun}" width="120" height="78" alt="훈"></div>` : ''}
      ${!e.eumBlank ? `<div class="modal-img-box"><div class="modal-img-label">音</div><img src="${e.eum}" width="120" height="78" alt="음"></div>` : ''}
    </div>` : ''}
    ${e.source ? `<div class="modal-section"><div class="modal-section-label">出 출처</div><div class="modal-def-text">${e.source}</div></div>` : ''}
    ${e.def    ? `<div class="modal-section"><div class="modal-section-label">義 의미·용법</div><div class="modal-def-text">${e.def}</div></div>` : ''}
    ${e.related && e.related.length ? `
    <div class="modal-section">
      <div class="modal-section-label">關 관련 한자어</div>
      <div class="modal-related-tags">${e.related.map(r => `<span class="modal-rtag">${r}</span>`).join('')}</div>
    </div>` : ''}
    ${e.naverLinks && e.naverLinks.length ? `
    <div class="modal-section">
      <div class="modal-section-label">🔍 네이버 한자사전</div>
      <div class="modal-naver-links">${e.naverLinks.map(l => `<a class="modal-nlink" href="${l.url}" target="_blank" rel="noopener"><span class="mnchar">${l.text}</span> 사전</a>`).join('')}</div>
    </div>` : ''}
    <div style="font-size:11px;color:var(--muted);text-align:right;margin-bottom:4px;">${e.date} 등록</div>
    <button class="modal-close" onclick="closeModal()">닫기</button>`;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(ev) {
  if (!ev || ev.target === document.getElementById('modalBg'))
    document.getElementById('modalBg').classList.remove('open');
}

/* ════ 테스트 ════ */
function setQMode(mode, btn) {
  qMode = mode;
  document.querySelectorAll('.qmode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  shuffleQ(); renderQuiz();
}

function shuffleQ() {
  qOrder = entries.map((_, i) => i);
  for (let i = qOrder.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [qOrder[i], qOrder[j]] = [qOrder[j], qOrder[i]];
  }
  qIdx = 0; qStats = {c:0, w:0};
}

function renderQuiz() {
  const body = document.getElementById('quizBody');
  if (!entries.length) {
    body.innerHTML = '<div class="quiz-empty"><div class="quiz-empty-icon">問</div><div class="quiz-empty-text">단어를 등록하면<br>테스트가 시작됩니다.</div></div>';
    return;
  }
  if (!qOrder.length) shuffleQ();
  if (qIdx >= qOrder.length) {
    body.innerHTML = `<div class="quiz-done">
      <div class="quiz-done-icon">🎉</div>
      <div class="quiz-done-title">한 바퀴 완료!</div>
      <div class="quiz-done-sub">정답 <span style="color:#60d090;font-weight:700;">${qStats.c}</span>개 / 오답 <span style="color:#ff8080;font-weight:700;">${qStats.w}</span>개</div>
      <button class="quiz-retry-btn" onclick="shuffleQ();renderQuiz();">↺ 다시 테스트</button>
    </div>`;
    return;
  }

  const e = entries[qOrder[qIdx]];
  let mode = qMode === 'random' ? (Math.random() > .5 ? 'hanja2hun' : 'hun2hanja') : qMode;
  if (mode === 'hun2hanja' && e.hunBlank && e.eumBlank) mode = 'hanja2hun';
  const isH2H = mode === 'hanja2hun';

  const qNaverLinks = e.naverLinks && e.naverLinks.length
    ? `<div class="q-naver-links">${e.naverLinks.map(l => `<a class="q-nlink" href="${l.url}" target="_blank" rel="noopener"><span class="qnc">${l.text}</span> 사전</a>`).join('')}</div>` : '';
  const relatedHtml = e.related && e.related.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;">${e.related.map(r => `<span style="font-size:12px;background:#f0e8d8;border:1px solid #d4c0a0;border-radius:6px;padding:2px 8px;color:var(--ink);font-family:'Noto Serif KR',serif;">${r}</span>`).join('')}</div>` : '';

  body.innerHTML = `
    <div class="quiz-stat-bar">
      <div class="qs-card"><div class="qs-n" style="color:#60d090">${qStats.c}</div><div class="qs-l">정답</div></div>
      <div class="qs-card"><div class="qs-n" style="color:#ff8080">${qStats.w}</div><div class="qs-l">오답</div></div>
      <div class="qs-card"><div class="qs-n" style="color:#f0c060">${qOrder.length}</div><div class="qs-l">전체</div></div>
    </div>
    <div class="q-card">
      <div class="q-label">${isH2H ? '이 한자의 훈·음은?' : '이 훈·음의 한자는?'}</div>
      ${isH2H
        ? `<div style="border:1px solid #3a2a10;border-radius:10px;background:var(--cbg);"><img src="${e.hanja}" width="320" height="320" alt="한자" style="display:block;object-fit:contain;width:min(400px,96vw);height:min(400px,96vw);"></div>
           ${e.hanjaText ? `<div style="font-family:'Noto Serif KR',serif;font-size:22px;color:#f0c060;letter-spacing:.1em;">${e.hanjaText}</div>` : ''}`
        : `<div style="display:flex;gap:8px;justify-content:center;">
             ${!e.hunBlank ? `<div class="ans-img-box"><div class="ans-img-label">訓</div><img src="${e.hun}" width="200" height="140" alt="훈" style="width:min(200px,46vw);height:140px;object-fit:contain;"></div>` : ''}
             ${!e.eumBlank ? `<div class="ans-img-box"><div class="ans-img-label">音</div><img src="${e.eum}" width="200" height="140" alt="음" style="width:min(200px,46vw);height:140px;object-fit:contain;"></div>` : ''}
           </div>`}
      ${e.source ? `<div class="q-src">${e.source}</div>` : ''}
      <div class="q-type">${e.type}</div>
    </div>
    <div class="ans-area">
      <button class="ans-reveal-btn" id="revealBtn" onclick="revealAns()">정답 보기 →</button>
      <div class="ans-shown" id="ansShown">
        <div class="ans-img-row">
          ${isH2H
            ? `${!e.hunBlank ? `<div class="ans-img-box"><div class="ans-img-label">訓</div><img src="${e.hun}" width="200" height="140" alt="훈" style="width:min(200px,46vw);height:140px;object-fit:contain;"></div>` : ''}
               ${!e.eumBlank ? `<div class="ans-img-box"><div class="ans-img-label">音</div><img src="${e.eum}" width="200" height="140" alt="음" style="width:min(200px,46vw);height:140px;object-fit:contain;"></div>` : ''}`
            : `<div class="ans-img-box"><div class="ans-img-label">字</div><img src="${e.hanja}" width="320" height="320" alt="한자" style="width:min(400px,96vw);height:min(400px,96vw);object-fit:contain;"></div>
               ${e.hanjaText ? `<div style="font-family:'Noto Serif KR',serif;font-size:28px;color:var(--ink);margin-left:8px;">${e.hanjaText}</div>` : ''}`}
        </div>
        ${e.def ? `<div style="font-size:12px;color:#8a7a5a;text-align:center;line-height:1.7;padding:0 4px;">${e.def}</div>` : ''}
        ${relatedHtml}
        ${qNaverLinks}
        <div class="self-btns">
          <button class="self-btn self-correct" onclick="markSelf(true)">✓ 맞았어요</button>
          <button class="self-btn self-wrong"   onclick="markSelf(false)">✗ 틀렸어요</button>
        </div>
      </div>
      <button class="q-nav-btn" id="skipBtn" onclick="skipQ()">건너뛰기 →</button>
    </div>`;
}

function revealAns() {
  document.getElementById('revealBtn').style.display = 'none';
  document.getElementById('ansShown').style.display  = 'flex';
  document.getElementById('skipBtn').style.display   = 'none';
}
function markSelf(ok) { if(ok) qStats.c++; else qStats.w++; qIdx++; renderQuiz(); }
function skipQ()      { qIdx++; if(qIdx >= qOrder.length) qIdx = 0; renderQuiz(); }

/* ════ 토스트 ════ */
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ════ 초기화 ════ */
window.addEventListener('load', () => {
  initCanvas('hanja'); initCanvas('hun'); initCanvas('eum');
  updateBadge(); shuffleQ();
});
window.addEventListener('resize', () => {
  ['hanja','hun','eum'].forEach(n => { if (CVS[n]) initCanvas(n); });
});
</script>

<!-- 제출 모달 -->
<div class="sub-overlay" id="subOverlay">
  <div class="sub-box">
    <div class="sub-title">📤 과제 제출 — 한자 단어장</div>
    <div class="sub-row">
      <label>이름</label>
      <input type="text" id="subName" placeholder="홍길동">
    </div>
    <div class="sub-row">
      <label>학번</label>
      <input type="text" id="subSid" placeholder="2024001">
    </div>
    <div class="sub-row">
      <label>제출 시기</label>
      <select id="subTerm">
        <option value="">선택하세요</option>
        <option value="중간">중간 과제</option>
        <option value="기말">기말 과제</option>
      </select>
    </div>
    <div class="sub-row">
      <label>학습 소감</label>
      <textarea id="subMemo" placeholder="오늘 학습한 내용이나 느낀 점을 입력하세요."></textarea>
    </div>
    <div class="sub-btns">
      <button class="sub-cancel" onclick="closeSubModal()">취소</button>
      <button class="sub-ok" id="subOkBtn" onclick="submitAssignment()">제출하기</button>
    </div>
    <div class="sub-msg" id="subMsg"></div>
  </div>
</div>

<!-- 오른쪽 하단 제출 버튼 -->
<button class="sub-float" onclick="openSubModal()">📤 과제 제출</button>

<script>
var _SUBMIT_URL = 'https://script.google.com/macros/s/AKfycbw771Qtr-YI4icYvN-IngcBI9FAt-DYGpUEEfqfYo-ke4nefv9IXYAk5JntaCGssKii/exec';
var _APP_NAME = '한자 단어장';

function openSubModal(){
  document.getElementById('subOverlay').classList.add('on');
  document.getElementById('subMsg').textContent='';
  document.getElementById('subMsg').className='sub-msg';
}
function closeSubModal(){
  document.getElementById('subOverlay').classList.remove('on');
}
document.getElementById('subOverlay').addEventListener('click',function(e){
  if(e.target===this)closeSubModal();
});

function submitAssignment(){
  var name=document.getElementById('subName').value.trim();
  var sid=document.getElementById('subSid').value.trim();
  var term=document.getElementById('subTerm').value;
  var memo=document.getElementById('subMemo').value.trim();
  if(!name||!sid||!term){
    var m=document.getElementById('subMsg');
    m.textContent='이름, 학번, 제출 시기를 모두 입력해주세요.';
    m.className='sub-msg err';return;
  }
  var btn=document.getElementById('subOkBtn');
  btn.disabled=true;btn.textContent='전송 중...';
  var appData={
    info: '단어장 학습 완료'
  };
  var payload=Object.assign({name:name,sid:sid,term:term,app:_APP_NAME,memo:memo},appData);
  var form=new FormData();
  form.append('payload',JSON.stringify(payload));
  fetch(_SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
  .then(function(){
    var m=document.getElementById('subMsg');
    m.textContent='✓ 제출 완료! 교수님께 전달되었습니다.';
    m.className='sub-msg ok';
    btn.disabled=false;btn.textContent='제출하기';
    setTimeout(closeSubModal,2000);
  })
  .catch(function(){
    var m=document.getElementById('subMsg');
    m.textContent='전송 오류가 발생했습니다. 다시 시도해주세요.';
    m.className='sub-msg err';
    btn.disabled=false;btn.textContent='제출하기';
  });
}
</script>
</body>
</html>
