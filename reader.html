<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>고등학교 한문 원문-번역 대조 뷰어</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f2ede0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#16120a;color:#f0e8d0;padding:0 16px;height:50px;display:flex;align-items:center;flex-shrink:0;}
.topbar h1{font-size:13px;font-weight:500;}
.topbar-cnt{margin-left:auto;font-size:11px;color:#6a5a3a;}
.filterbar{background:#1e1610;padding:0 12px;height:42px;display:flex;align-items:center;gap:6px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.filterbar::-webkit-scrollbar{display:none;}
.flabel{font-size:11px;color:#5a4a2a;white-space:nowrap;flex-shrink:0;}
.fbtn{padding:4px 11px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #3a2a10;background:#2a1a08;color:#7a6a4a;white-space:nowrap;flex-shrink:0;}
.fbtn.on{background:#f0c060;color:#16120a;border-color:#f0c060;}
.fsep{width:1px;height:16px;background:#3a2a10;flex-shrink:0;}
.fsearch{background:#2a1a08;border:1px solid #3a2a10;border-radius:8px;padding:4px 10px;font-size:12px;color:#f0e8d0;outline:none;width:130px;flex-shrink:0;margin-left:auto;}
.fsearch:focus{border-color:#f0c060;}
.fsearch::placeholder{color:#4a3a20;}
.main{flex:1;display:flex;overflow:hidden;min-height:0;}
.LP{width:300px;flex-shrink:0;background:#faf8f0;border-right:1px solid #ddd5b8;display:flex;flex-direction:column;overflow:hidden;}
.LS{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.item{padding:10px 13px;border-bottom:1px solid #ece8dc;cursor:pointer;}
.item:hover{background:#f5f0e4;}
.item.sel{background:#fff8e0;border-left:3px solid #b8860b;padding-left:10px;}
.item-meta{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.ibadge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;}
.ibadge.po{background:#f0eafa;color:#3a1a5a;}
.ibadge.pr{background:#eaf5ea;color:#1a4a1a;}
.isrc{font-size:10px;color:#9a8a6a;margin-left:auto;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.itext{font-family:'Noto Serif KR',serif;font-size:13px;color:#3a2a10;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.VP{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fffef8;min-width:0;}
.VH{padding:10px 16px;background:#faf8f0;border-bottom:1px solid #ddd5b8;flex-shrink:0;display:none;align-items:center;gap:8px;flex-wrap:wrap;}
.VH.show{display:flex;}
.vhb{font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;}
.vhb.po{background:#f0eafa;color:#3a1a5a;}
.vhb.pr{background:#eaf5ea;color:#1a4a1a;}
.vhf{font-size:11px;color:#9a8a6a;}
.vhs{font-size:11px;color:#1a3a6e;background:#e8f0f8;padding:2px 8px;border-radius:5px;border:1px solid #c8d8f0;margin-left:auto;}
.vtab-row{display:none;align-items:stretch;background:#f0ece0;border-bottom:1px solid #ddd5b8;flex-shrink:0;}
.vtab-row.show{display:flex;}
.vtab{flex:1;padding:9px 6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#9a8a6a;border-bottom:3px solid transparent;transition:all .15s;}
.vtab.on{color:#b8860b;border-bottom-color:#b8860b;background:#faf8f0;}
.panels{flex:1;overflow:hidden;position:relative;min-height:0;}
.panel-inner{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 20px 60px;display:none;}
.panel-inner.show{display:block;}
.VE{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9a8a6a;gap:12px;padding:20px;text-align:center;}
.VE-icon{font-size:48px;opacity:.3;}
.VE-text{font-size:13px;line-height:1.9;}
/* 대조 */
.pair-box{display:grid;grid-template-columns:1fr 1fr;border:1px solid #ddd5b8;border-radius:10px;overflow:hidden;margin-bottom:16px;}
.col-o{background:#faf8f0;padding:16px 18px;}
.col-t{background:#f5fdf5;padding:16px 18px;border-left:1px solid #ddd5b8;}
.col-h{font-size:10px;font-weight:700;letter-spacing:.12em;padding-bottom:8px;border-bottom:1px solid #ddd5b8;margin-bottom:10px;}
.col-o .col-h{color:#3a1a5a;}
.col-t .col-h{color:#1a4a1a;}
.otxt{font-family:'Noto Serif KR',serif;font-size:15px;color:#1a1008;line-height:2;word-break:keep-all;}
.ttxt{font-size:14px;color:#1a3a1a;line-height:1.9;word-break:keep-all;}
/* 한시 */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px;}
.pch{font-size:11px;font-weight:700;letter-spacing:.12em;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid;}
.pch.o{color:#3a1a5a;border-color:#3a1a5a;}
.pch.t{color:#1a4a1a;border-color:#1a4a1a;}
.pl{font-family:'Noto Serif KR',serif;font-size:17px;color:#1a1008;padding:7px 0;border-bottom:1px solid #ece8dc;line-height:1.5;}
.ptl{font-size:13px;color:#1a3a1a;padding:7px 0;border-bottom:1px solid #ece8dc;line-height:1.6;}
.psec{margin-top:18px;padding-top:14px;border-top:1px solid #ddd5b8;}
.psh{font-size:11px;font-weight:700;color:#3a1a5a;margin-bottom:10px;letter-spacing:.1em;}
.prow{padding:10px 0;border-bottom:1px solid #ece8dc;}
.po2{font-family:'Noto Serif KR',serif;font-size:17px;color:#1a1008;margin-bottom:5px;}
.pt2{font-size:13px;color:#1a3a1a;padding-left:10px;border-left:3px solid #d4b86a;line-height:1.6;}
/* 문장 구조 */
.s-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.s-tbadge{font-size:12px;font-weight:700;padding:4px 14px;border-radius:12px;background:#fff8e0;color:#b8860b;border:1px solid #d4b86a;}
.s-legend{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;background:#faf8f0;border-radius:8px;border:1px solid #ddd5b8;margin-bottom:14px;}
.s-li{display:flex;align-items:center;gap:4px;font-size:11px;color:#4a3a20;}
.s-ld{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.s-note{font-size:12px;color:#5a4a2a;background:#fffbe8;border-left:4px solid #d4b86a;padding:8px 12px;border-radius:0 6px 6px 0;margin-bottom:16px;line-height:1.7;}
.s-sent{margin-bottom:18px;border:1.5px solid #ddd5b8;border-radius:10px;overflow:hidden;}
.s-orig{font-family:'Noto Serif KR',serif;font-size:16px;color:#1a1008;background:#f0ece0;padding:10px 14px;font-weight:500;}
.s-trans{font-size:13px;color:#1a4a1a;background:#f5fdf5;padding:8px 14px;border-top:1px solid #ddd5b8;font-style:italic;line-height:1.6;}
.s-segs{display:flex;flex-wrap:wrap;gap:12px;padding:16px 14px;background:#fffef8;border-top:1px solid #ddd5b8;align-items:flex-start;}
.s-seg{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:44px;}
.s-char{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:500;color:#1a1008;line-height:1;}
.s-role{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;color:#fff;white-space:nowrap;text-align:center;}
.s-mean{font-size:11px;color:#6a5a3a;text-align:center;max-width:72px;line-height:1.3;}
.s-none{text-align:center;padding:50px 20px;color:#9a8a6a;font-size:13px;line-height:1.9;}
.mob-back{display:none;align-items:center;gap:6px;padding:9px 13px;background:#faf8f0;border-bottom:1px solid #ddd5b8;cursor:pointer;flex-shrink:0;font-size:13px;color:#9a8a6a;}
@media(max-width:680px){
  .LP{width:100%;display:none;border-right:none;}
  .LP.mob{display:flex;}
  .VP{display:none;}
  .VP.mob{display:flex;}
  .mob-back{display:flex;}
  .pair-box{grid-template-columns:1fr;}
  .col-t{border-left:none;border-top:1px solid #ddd5b8;}
  .pg{grid-template-columns:1fr;}
}
</style>

<style>
.sub-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center}
.sub-overlay.on{display:flex}
.sub-box{background:#faf8f4;border-radius:16px;padding:28px 26px;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.sub-title{font-family:'Noto Serif KR',serif;font-size:18px;color:#1a1410;margin-bottom:18px;text-align:center}
.sub-row{margin-bottom:13px}
.sub-row label{display:block;font-size:12px;color:#6b5744;margin-bottom:5px;font-weight:500}
.sub-row input,.sub-row select,.sub-row textarea{width:100%;padding:10px 12px;border:1px solid #e0d5c5;border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:#1a1410;background:#f3ede3;outline:none;transition:border .15s}
.sub-row input:focus,.sub-row select:focus,.sub-row textarea:focus{border-color:#c0392b}
.sub-row textarea{resize:vertical;min-height:70px}
.sub-btns{display:flex;gap:10px;margin-top:18px}
.sub-ok{flex:1;padding:12px;border-radius:9px;background:#c0392b;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .15s}
.sub-ok:hover{background:#a93226}
.sub-ok:disabled{background:#ccc;cursor:not-allowed}
.sub-cancel{padding:12px 18px;border-radius:9px;background:#f3ede3;color:#6b5744;border:1px solid #e0d5c5;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.sub-msg{text-align:center;font-size:13px;margin-top:12px;min-height:18px}
.sub-msg.ok{color:#3d6b4a}.sub-msg.err{color:#c0392b}
.sub-float{position:fixed;bottom:22px;right:22px;z-index:1000;padding:12px 20px;background:#c0392b;color:#fff;border:none;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 14px rgba(192,57,43,.4);transition:all .2s}
.sub-float:hover{background:#a93226;transform:translateY(-2px)}
</style>
</head>

<script>

var D = [{"id": 601, "type": "문장", "text": "\"政者 正也 子帥以正 孰敢不正?\"", "trans": "\"정치란 바로잡는 것이다. 그대가 솔선하여 바르게 하면, 누가 감히 바르지 않겠는가?\"", "freq": 1, "src": "대학113"}, {"id": 602, "type": "문장", "text": "\"太宗實錄 春秋館 今已畢撰 予欲見之 何如?\" <중략> \"今所撰實錄 皆載嘉言善政 無所更改 況我殿下其有更改之乎? 殿下 若見之 則後世之主 必效而更改之 史官 亦疑君上之見 必不盡記其事 何以傳信於將來?\"", "trans": "\"태종실록을 춘추관에서 이제 다 편찬하였습니다. 전하께서 보고자 하시면 어떻겠습니까?\" ⋯(중략)⋯ \"지금 편찬한 실록은 모두 아름다운 말씀과 좋은 정치를 실었으니 고칠 것이 없거늘, 하물며 전하께서 어찌 고치실 것이 있겠습니까? 전하께서 만약 보신다면 후세의 임금이 반드시 본받아 고칠 것이요, 사관 또한 임금이 볼 것을 의심하여 반드시 사실을 다 기록하지 않을 것이니, 어찌 장래에 사실을 전할 수 있겠습니까?\"", "freq": 1, "src": "장원122"}, {"id": 605, "type": "문장", "text": "“我死後 埋我骨於哈爾濱公園之傍 待我國權回復 返葬故土也” <중략> “余 爲大韓獨立而死 爲東洋平和而死 死何憾焉?” 遂換着韓服 從容就刑 年三十有二", "trans": "\"내가 죽은 뒤에 내 뼈를 하얼빈 공원 곁에 묻어 두었다가, 우리나라 국권이 회복되면 고국으로 반장하라.\" ⋯(중략)⋯ \"나는 대한 독립을 위하여 죽고, 동양 평화를 위하여 죽노니, 죽음에 무슨 유감이 있으랴?\" 마침내 한복으로 갈아입고 조용히 형장으로 나아가니, 나이 서른둘이었다.", "freq": 1, "src": "비상159"}, {"id": 609, "type": "문장", "text": "蓋鷄與兔 合一百頭 鷄各二足 兔各四足 其共足二百七十二 問鷄兔各幾頭?", "trans": "닭과 토끼가 합하여 머리가 백 개이고, 닭은 각각 두 발, 토끼는 각각 네 발이며, 그 발의 합이 272개이다. 닭과 토끼는 각각 몇 마리인가?", "freq": 1, "src": "와이100"}, {"id": 610, "type": "문장", "text": "改過遷善 革舊自新 不踐斯語 汝棄汝身", "trans": "허물을 고치고 선으로 나아가며, 옛것을 버리고 스스로 새로워져라. 이 말을 실천하지 않으면, 너 스스로 너를 저버리는 것이다.", "freq": 1, "src": "장원50"}, {"id": 612, "type": "문장", "text": "去語固美 來語方好", "trans": "나가는 말이 진실로 아름다워야, 오는 말이 바야흐로 좋다.", "freq": 1, "src": "와이56"}, {"id": 618, "type": "문장", "text": "輕當矯之以重 急當矯之以緩", "trans": "경솔함은 마땅히 신중함으로 바로잡아야 하고, 조급함은 마땅히 느긋함으로 바로잡아야 한다.", "freq": 1, "src": "박영66"}, {"id": 619, "type": "문장", "text": "季札之初使 北過徐君 徐君 好季札劍 口弗敢言 季札 心知之 爲使上國 未獻 還至徐 徐君已死 於是 乃解其寶劍 繫之徐君樹 而去 從者曰 \"徐君 已死 尙誰予乎?\" 季子曰 \"不然 始吾心已許之 豈以死倍吾心哉?\"", "trans": "계찰이 처음 사신으로 나갔을 때, 북쪽으로 서군(徐君)을 지나쳤는데, 서군이 계찰의 칼을 좋아하여 입으로는 감히 말하지 못하였다. 계찰이 마음속으로 이를 알았으나 상국에 사신으로 가느라 아직 주지 못하였다. 돌아오는 길에 서나라에 이르니 서군은 이미 죽어 있었다. 이에 보검을 풀어 서군의 묘 나무에 걸어 두고 떠났다. 수행하는 자가 말하기를 \"서군은 이미 죽었는데, 아직도 누구에게 주려 하십니까?\" 하자, 계자가 말하기를 \"그렇지 않다. 처음에 내 마음이 이미 허락하였는데, 어찌 그의 죽음으로 내 마음을 저버리겠는가?\" 하였다.", "freq": 1, "src": "장원102"}, {"id": 620, "type": "문장", "text": "高麗不修渤海史 知高麗之不振也 昔者 高氏居于北 曰高句麗 扶餘氏居于西南 曰百濟 朴昔金氏居于東南 曰新羅 是謂三國 宜其有三國史 而高麗修之 是矣 扶餘氏亡 高氏亡 金氏有其南 大氏有其北 曰渤海 是謂南北國 宜其有南北國史 而高麗不修之 非矣 夫大氏 何人也? 乃高句麗之人也 其所有之地 何地也? 乃高句麗之地也", "trans": "고려가 발해의 역사를 편찬하지 않은 것을 보면 고려가 떨치지 못했음을 알 수 있다. 옛날에 고씨가 북쪽에 살면서 고구려라 하고, 부여씨가 서남쪽에 살면서 백제라 하고, 박씨·석씨·김씨가 동남쪽에 살면서 신라라 하니, 이를 삼국이라 한다. 마땅히 삼국사가 있어야 하는데 고려가 이를 편찬하였으니 옳다. 부여씨가 망하고 고씨가 망하여, 김씨가 그 남쪽을 차지하고 대씨가 그 북쪽을 차지하여 발해라 하니, 이를 남북국이라 한다. 마땅히 남북국사가 있어야 하는데 고려가 편찬하지 않았다.", "freq": 1, "src": "대학144"}, {"id": 622, "type": "문장", "text": "古之言 朋友者 或稱第二吾", "trans": "옛날에 벗을 말하는 사람이 혹 제2의 나라고 일컬었다.", "freq": 1, "src": "천재73"}, {"id": 631, "type": "문장", "text": "瓜田不納履 李下不整冠", "trans": "오이밭에서는 신발을 고쳐 신지 말고, 오얏나무 아래에서는 갓을 고쳐 쓰지 말라.", "freq": 1, "src": "다락65, 장원42"}, {"id": 635, "type": "문장", "text": "久而不已 則必至于有成", "trans": "오래도록 그치지 않으면, 반드시 이루는 바가 있기에 이른다.", "freq": 1, "src": "와이68"}, {"id": 637, "type": "문장", "text": "國無常强 無常弱 奉法者强 則國强 奉法者弱 則國弱 夫嚴刑重罰者 民之所惡也 而國之所以治也", "trans": "나라는 항상 강한 것도 없고, 항상 약한 것도 없다. 법을 받드는 자가 강하면 나라가 강해지고, 법을 받드는 자가 약하면 나라가 약해진다. 무릇 엄한 형벌과 중한 벌은 백성이 싫어하는 바이지만, 나라가 잘 다스려지는 까닭이다.", "freq": 1, "src": "박영116"}, {"id": 644, "type": "문장", "text": "君子 戒愼乎其不睹 恐懼乎其所不聞", "trans": "군자는 보이지 않는 곳에서도 경계하고 삼가며, 들리지 않는 곳에서도 두려워한다.", "freq": 1, "src": "박영105"}, {"id": 645, "type": "문장", "text": "君子 食無求飽 居無求安 敏於事而愼於言 就有道而正焉 可謂好學也已", "trans": "군자는 먹음에 배부름을 구하지 않고, 거처함에 편안함을 구하지 않으며, 일에 민첩하되 말에 신중하며, 도 있는 사람에게 나아가 바로잡는다. 가히 배우기를 좋아한다고 할 만하다.", "freq": 1, "src": "천재93"}, {"id": 646, "type": "문장", "text": "君子 與君子 以同道爲朋 小人 與小人 以同利爲朋 此自然之理也 然 臣謂小人無朋 惟君子則有之 其故 何哉? 小人 所好者 利祿也 所貪者 財貨也 當其同利之時 暫相黨引 以爲朋者 僞也 及其見利而爭先 或利盡而交疏 甚者 反相賊害 雖其兄弟親戚 不能相保", "trans": "군자는 군자끼리 같은 도(道)로써 벗을 삼고, 소인은 소인끼리 같은 이익으로써 벗을 삼으니, 이는 자연스러운 이치이다. 그러나 신은 소인에게는 벗이 없고, 오직 군자에게만 있다고 생각합니다. 그 까닭은 무엇입니까? 소인이 좋아하는 것은 이록이요, 탐하는 것은 재화입니다. 같은 이익이 있을 때에는 잠시 서로 패를 지어 벗처럼 행동하지만, 이것은 거짓입니다. 이익을 보면 다투어 앞서거나, 혹 이익이 다하면 교분이 멀어지며, 심한 경우에는 도리어 서로 해칩니다.", "freq": 1, "src": "장원138"}, {"id": 647, "type": "문장", "text": "君者舟也 庶人者水也 水則載舟 水則覆舟", "trans": "임금은 배요, 백성은 물이다. 물은 배를 띄우기도 하고, 물은 배를 뒤엎기도 한다.", "freq": 1, "src": "대학45"}, {"id": 648, "type": "문장", "text": "窮人之事 飜亦破鼻", "trans": "궁한 사람의 일은, 뒤집어도 코만 깨진다.", "freq": 1, "src": "장원38"}, {"id": 649, "type": "문장", "text": "勤 爲無價之寶 愼 是護身之符", "trans": "부지런함은 값 없는 보배요, 신중함은 몸을 지키는 부적이다.", "freq": 1, "src": "천재65"}, {"id": 650, "type": "문장", "text": "近塞上之人 有善術者 馬無故亡而入胡 人皆弔之 其父曰: \"此何遽不爲福乎?\" 居數月 其馬將胡駿馬而歸 人皆賀之 其父曰 \"此何遽不能爲禍乎?\" 家富良馬 其子好騎 墮而折其髀 人皆弔之 其父曰 \"此何遽不爲福乎?\"", "trans": "변새 근처에 술법을 잘 아는 사람이 살고 있었다. 말이 까닭 없이 달아나 오랑캐 땅으로 들어갔다. 사람들이 모두 위로하니, 그 아버지가 말하기를 \"이것이 어찌 갑자기 복이 되지 않겠소?\" 하였다. 몇 달이 지나 그 말이 오랑캐의 준마를 데리고 돌아왔다. 사람들이 모두 축하하니, 그 아버지가 말하기를 \"이것이 어찌 갑자기 화가 되지 않겠소?\" 하였다. 집에 좋은 말이 많아지자, 그 아들이 말 타기를 좋아하다가 떨어져 넓적다리뼈가 부러졌다. 사람들이 모두 위로하니, 그 아버지가 말하기를 \"이것이 어찌 갑자기 복이 되지 않겠소?\" 하였다.", "freq": 1, "src": "대학84"}, {"id": 651, "type": "문장", "text": "近世 有田舍人 亦當夏月之夕 加足於門櫳之上 仍着睡矣 有蛇入盤于中 不出 覺而料之 則難免矣 <중략> 兒 捷起附耳 曰 \"潛臥勿動\" 卽出井甃間 得一蛙而來 觸柱聲出 蛇聞之 敍身修然而出 遂得免害", "trans": "근세에 전사인(田舍人)이 있었는데, 마침 여름 저녁에 발을 문창살 위에 올려놓고 잠이 들었다. 뱀이 들어와 그 안에 똬리를 틀고 나오지 않았다. 깨어나 생각해 보니 피하기 어려웠다. ⋯(중략)⋯ 아이가 재빨리 일어나 귀에 대고 말하기를 \"가만히 누워 움직이지 마십시오.\" 하고는, 곧 우물가 돌 틈에서 개구리 한 마리를 가져와 기둥에 부딪혀 소리를 냈다. 뱀이 그 소리를 듣고 몸을 빼어 서서히 나왔다. 마침내 화를 면하였다.", "freq": 1, "src": "장원90"}, {"id": 652, "type": "문장", "text": "勤爲無價之寶 愼是護身之符", "trans": "부지런함은 값 없는 보배요, 신중함은 몸을 지키는 부적이다.", "freq": 2, "src": "박영61, 장원42"}, {"id": 655, "type": "문장", "text": "金先生者 善談笑 嘗訪友人家 主人設酌 只佐蔬菜 先謝 曰 \"家貧市遠 絶無兼味 惟淡泊 是愧耳\" 適有群鷄 亂啄庭除 金 曰 \"大丈夫 不惜千金 當斬吾馬 佐酒\" 主人 曰 \"斬一馬 騎何物而還?\" 金 曰 \"借鷄騎還\"", "trans": "금 선생은 담소를 잘하였다. 일찍이 친구 집을 방문하였는데, 주인이 술자리를 마련하되 채소 반찬만 올렸다. 먼저 사과하며 말하기를 \"집이 가난하고 시장이 멀어 변변한 반찬이 전혀 없으니, 오직 담박함이 부끄러울 뿐이오.\" 하였다. 마침 닭 떼가 뜰을 어지럽게 쪼아 먹고 있었다. 금 선생이 말하기를 \"대장부는 천금도 아끼지 않으니, 내 말을 베어 안주를 삼겠소.\" 하자, 주인이 \"말을 베면 무엇을 타고 돌아가겠소?\" 하니, 금 선생이 \"닭을 빌려 타고 돌아가겠소.\" 하였다.", "freq": 1, "src": "장원86"}, {"id": 656, "type": "문장", "text": "金先生者 善談笑 嘗訪友人家 主人設酌 只佐蔬菜 先謝曰: “家貧市遠 絶無兼味 惟淡泊 是愧耳” 適有群鷄 亂啄庭除 金曰: “大丈夫 不惜千金 當斬吾馬 佐酒” 主人曰: “斬一馬 騎何物而還?” 金曰: \"借鷄騎還\" 主人 大笑 殺鷄餉之", "trans": "금 선생은 담소를 잘하였다. 일찍이 친구 집을 방문하였는데, 주인이 술자리를 마련하되 채소 반찬만 올렸다. 먼저 사과하며 말하기를 \"집이 가난하고 시장이 멀어 변변한 반찬이 전혀 없으니, 오직 담박함이 부끄러울 뿐이오.\" 하였다. 마침 닭 떼가 뜰을 어지럽게 쪼아 먹고 있었다. 금 선생이 말하기를 \"대장부는 천금도 아끼지 않으니, 내 말을 베어 안주를 삼겠소.\" 하자, 주인이 \"말을 베면 무엇을 타고 돌아가겠소?\" 하니, 금 선생이 \"닭을 빌려 타고 돌아가겠소.\" 하매, 주인이 크게 웃으며 닭을 잡아 대접하였다.", "freq": 1, "src": "미래74"}, {"id": 660, "type": "문장", "text": "今欲使農者 得田 不爲農者 不得之 則行閭田之法 而吾志可遂也 (중략) 閭置閭長 凡一閭之田 令一閭之人 咸治厥事 無此疆爾界 唯閭長之命是聽 每役一日 閭長注於冊簿 秋旣成 凡五穀之物 悉輸之閭長之堂 分其糧 先輸之公家之稅 次輸之閭長之祿 以其餘 配之於日役之簿", "trans": "지금 농사짓는 자에게는 밭을 얻게 하고, 농사짓지 않는 자에게는 얻지 못하게 하려 한다면, 여전법(閭田法)을 시행해야 나의 뜻을 이룰 수 있다. ⋯(중략)⋯ 여(閭)마다 여장을 두어, 한 여의 밭을 한 여의 사람들이 모두 함께 일하게 하되, 경계를 나누지 말고 오직 여장의 명만 따른다. 하루 일한 것을 여장이 책부에 기록하며, 가을에 수확이 끝나면 모든 오곡을 다 여장의 집에 바치고, 양식을 나눌 때 먼저 공가의 세금을 바치고, 다음에 여장의 몫을 바친다.", "freq": 1, "src": "대학138"}, {"id": 661, "type": "문장", "text": "今有良馬 日行二百四十里 駑馬 日行一百五十里 駑馬 先行一十二日 問良馬幾何日追及之?", "trans": "지금 좋은 말이 있어 하루에 240리를 달리고, 둔한 말은 하루에 150리를 달린다. 둔한 말이 먼저 12일을 갔다면, 좋은 말이 몇 날 만에 따라잡겠는가?", "freq": 1, "src": "와이102"}, {"id": 663, "type": "문장", "text": "及其最終公判後 謂二弟定根恭根曰 \"我死後 埋我骨於哈爾濱公園之傍 待我國權回復 返葬故土也\" <중략> 以庚戌陽曆三月二十六日上午十時 立刑場 欣然而言曰 \"余 爲大韓獨立而死 爲東洋平和而死 死何憾焉?\" 遂換着韓服 從容就刑", "trans": "최종 공판이 끝난 뒤, 두 아우 정근·공근에게 말하기를 \"내가 죽은 뒤에 내 뼈를 하얼빈 공원 곁에 묻어 두었다가, 우리나라 국권이 회복되면 고국으로 반장하라.\" ⋯(중략)⋯ 경술년 양력 3월 26일 오전 10시에 형장에 나아가 기쁘게 말하기를 \"나는 대한 독립을 위하여 죽고, 동양 평화를 위하여 죽노니, 죽음에 무슨 유감이 있으랴?\" 마침내 한복으로 갈아입고 조용히 형을 받았다.", "freq": 1, "src": "장원130"}, {"id": 664, "type": "문장", "text": "及時當勉勵 歲月不待人", "trans": "때에 맞추어 마땅히 힘써 노력할지니, 세월은 사람을 기다려 주지 않는다.", "freq": 2, "src": "대학33, 장원46"}, {"id": 665, "type": "문장", "text": "騎馬 欲率奴", "trans": "말을 타고 종놈을 부리려 하네.", "freq": 3, "src": "박영54, 와이56, 천재56"}, {"id": 671, "type": "문장", "text": "金先生者 善談笑 嘗訪友人家 主人 設酌 只佐蔬菜 先謝曰: \"家貧市遠 絶無兼味 惟淡泊 是愧耳\" 適有群鷄 亂啄庭除 金曰: \"大丈夫 不惜千金 當斬吾馬 佐酒\" \"斬一馬 騎何物而還?\" \"借鷄騎還\" 主人 大笑 殺鷄餉之", "trans": "금 선생은 담소를 잘하였다. 일찍이 친구 집을 방문하였는데, 주인이 술자리를 마련하되 채소 반찬만 올렸다. 먼저 사과하여 \"집이 가난하고 시장이 멀어 변변한 반찬이 전혀 없으니, 오직 담박함이 부끄러울 뿐이오.\" 하였다. 마침 닭 떼가 뜰을 어지럽게 쪼아 먹고 있었다. 금 선생이 \"대장부는 천금도 아끼지 않으니, 내 말을 베어 안주를 삼겠소.\" 하자, \"말을 베면 무엇을 타고 돌아가겠소?\" 하니, \"닭을 빌려 타고 돌아가겠소.\" 하였다.", "freq": 1, "src": "와이116"}, {"id": 672, "type": "문장", "text": "金先生者 善談笑 嘗訪友人家 主人 設酌 只佐蔬菜 先謝曰: “家貧市遠 絶無兼味 惟淡泊 是愧耳\" 適有群鷄 亂啄庭除 金曰: “大丈夫 不惜千金 當斬吾馬 佐酒” 主人曰: “斬一馬 騎何物而還?” 金曰: “借鷄騎還” 主人 大笑 殺鷄餉之", "trans": "금 선생은 담소를 잘하였다. 일찍이 친구 집을 방문하였는데, 주인이 술자리를 마련하되 채소 반찬만 올렸다. 먼저 사과하여 \"집이 가난하고 시장이 멀어 변변한 반찬이 전혀 없으니, 오직 담박함이 부끄러울 뿐이오.\" 하였다. 마침 닭 떼가 뜰을 어지럽게 쪼아 먹고 있었다. 금 선생이 \"대장부는 천금도 아끼지 않으니, 내 말을 베어 안주를 삼겠소.\" 하자, 주인이 \"말을 베면 무엇을 타고 돌아가겠소?\" 하니, 금 선생이 \"닭을 빌려 타고 돌아가겠소.\" 하매, 주인이 크게 웃으며 닭을 잡아 대접하였다.", "freq": 1, "src": "박영144"}, {"id": 674, "type": "문장", "text": "男女年少卑幼者 皆着新衣 曰歲粧 訪族戚長老 曰歲拜 (八月)十五日 東俗稱秋夕 又曰嘉俳", "trans": "남녀 중 나이가 어리고 지위가 낮은 자들이 모두 새 옷을 입는데 세장이라 하고, 일가친척 어른을 찾아뵙는 것을 세배라 한다. (8월) 15일을 우리나라 풍속에서는 추석이라 하고, 또한 가배라 한다.", "freq": 1, "src": "동아113"}, {"id": 677, "type": "문장", "text": "內不足者 其辭煩 心無主者 其辭荒", "trans": "내면이 부족한 자는 말이 번잡하고, 마음에 주견이 없는 자는 말이 거칠다.", "freq": 3, "src": "미래57, 장원50, 천재65"}, {"id": 678, "type": "문장", "text": "女將還 現從之 女辭拒 而强隨之 (중략) 妾以明日 入市爲害劇 則國人 無如我何 大王 必募以重爵 而捉我矣", "trans": "여인이 돌아가려 하자 현(現)이 따라가려 하였다. 여인이 거절하며 뿌리쳤지만 강하게 따라갔다. ⋯(중략)⋯ \"첩이 내일 시장에 들어가 크게 해를 끼치면 나라 사람들이 나를 어찌하지 못할 것이요, 대왕께서 반드시 높은 벼슬을 내걸고 저를 잡으려 할 것입니다.\"", "freq": 1, "src": "박영132"}, {"id": 679, "type": "문장", "text": "寧測十丈水深 難測一丈人心", "trans": "차라리 열 길 물속은 알 수 있어도, 한 길 사람의 마음은 알기 어렵다.", "freq": 1, "src": "미래51"}, {"id": 680, "type": "문장", "text": "農夫餓死 枕厥種子", "trans": "농부가 굶어 죽더라도, 씨앗을 베고 죽는다.", "freq": 2, "src": "장원38, 천재57"}, {"id": 681, "type": "문장", "text": "談虎虎至", "trans": "호랑이 이야기를 하면 호랑이가 온다.", "freq": 1, "src": "동아84"}, {"id": 686, "type": "문장", "text": "德不孤 必有隣", "trans": "덕 있는 사람은 외롭지 않으니, 반드시 이웃이 있다.", "freq": 1, "src": "천재72"}, {"id": 687, "type": "문장", "text": "德不孤 必有鄰", "trans": "덕 있는 사람은 외롭지 않으니, 반드시 이웃이 있다.", "freq": 1, "src": "미래140"}, {"id": 688, "type": "문장", "text": "道之以政 齊之以刑 民免而無恥 道之以德 齊之以禮 有恥且格", "trans": "법령으로 인도하고 형벌로 다스리면, 백성이 형벌은 면하되 부끄러워하는 마음이 없다. 덕으로 인도하고 예로 다스리면, 부끄러워하는 마음이 있고 또한 바르게 된다.", "freq": 1, "src": "박영98"}, {"id": 690, "type": "문장", "text": "東方 初無君長 有神人 降于檀木下 國人 立爲君 是爲檀君 國號朝鮮 <중략> 初都平壤 後徙都白岳", "trans": "동방에 처음에는 군장이 없었는데, 신인(神人)이 단목(檀木) 아래로 내려왔다. 나라 사람들이 그를 세워 임금으로 삼으니, 이가 단군이다. 나라 이름을 조선이라 하였다. ⋯(중략)⋯ 처음에 평양에 도읍하였다가 뒤에 백악으로 도읍을 옮겼다.", "freq": 1, "src": "장원118"}, {"id": 694, "type": "문장", "text": "得寵思辱 居安慮危", "trans": "총애를 받을 때 욕됨을 생각하고, 편안할 때 위태로움을 생각하라.", "freq": 1, "src": "박영60"}, {"id": 701, "type": "문장", "text": "良藥苦於口 利於病 忠言逆於耳 利於行", "trans": "좋은 약은 입에 쓰지만 병에는 이롭고, 충언은 귀에 거슬리지만 행동에는 이롭다.", "freq": 1, "src": "대학33"}, {"id": 707, "type": "문장", "text": "莫見乎隱 莫顯乎微 故 君子 愼其獨也", "trans": "숨겨진 것보다 더 잘 드러나는 것은 없고, 미세한 것보다 더 잘 나타나는 것은 없다. 그러므로 군자는 혼자 있을 때를 삼간다.", "freq": 1, "src": "장원50"}, {"id": 712, "type": "문장", "text": "滿招損 謙受益", "trans": "가득 참은 손해를 부르고, 겸손함은 이로움을 받는다.", "freq": 2, "src": "다락70, 장원42"}, {"id": 714, "type": "문장", "text": "慕而學之 則雖不得其實 亦庶幾矣", "trans": "흠모하여 배운다면, 비록 그 실질에 이르지 못하더라도 또한 거의 가까이 가게 될 것이다.", "freq": 1, "src": "박영67"}, {"id": 718, "type": "문장", "text": "無恒産而有恒心者 惟士爲能 若民則無恒産 因無恒心 苟無恒心 放辟邪侈 無不爲已 及陷於罪然後 從而刑之 是 罔民也 焉有仁人在位 罔民而可爲也?", "trans": "항산(恒産)이 없이도 항심(恒心)을 가질 수 있는 자는 오직 선비라야 능히 할 수 있다. 일반 백성이라면 항산이 없으면 항심도 없게 된다. 진실로 항심이 없으면 방탕하고 편벽되며 사악하고 사치하여 못하는 짓이 없을 것이다. 죄에 빠진 연후에 그를 따라 형벌을 준다면, 이는 백성을 그물질하는 것이다. 어찌 인자한 사람이 자리에 있으면서 백성을 그물질하는 것을 할 수 있겠는가?", "freq": 1, "src": "대학118"}, {"id": 719, "type": "문장", "text": "勿謂堅 磨則穿 志於學 奚不然?", "trans": "단단하다 하지 말라, 갈면 뚫리느니. 배움에 뜻을 두면 어찌 그렇지 않겠는가?", "freq": 1, "src": "박영66"}, {"id": 721, "type": "문장", "text": "尾生 與女子 期於梁下 女子不來 水至不去 抱梁柱而死", "trans": "미생이 여자와 다리 아래에서 만나기로 약속하였는데, 여자가 오지 않고 물이 불어와도 떠나지 않고 다리 기둥을 끌어안고 죽었다.", "freq": 2, "src": "미래86, 박영45"}, {"id": 722, "type": "문장", "text": "未有仁而遺其親者也 未有義而後其君者也 王 亦曰仁義而已矣 何必曰利?", "trans": "어진 사람으로서 그 어버이를 버린 자는 없으며, 의로운 사람으로서 그 임금을 뒷전에 둔 자는 없습니다. 왕께서는 또한 인의를 말씀하실 따름이니, 하필 이익을 말씀하십니까?", "freq": 1, "src": "박영105"}, {"id": 723, "type": "문장", "text": "民爲貴 社稷次之 君爲輕", "trans": "백성이 가장 귀하고, 사직이 그 다음이며, 임금은 가벼운 존재이다.", "freq": 1, "src": "장원150"}, {"id": 724, "type": "문장", "text": "民惟邦本 本固邦寧", "trans": "백성은 나라의 근본이니, 근본이 굳건해야 나라가 편안하다.", "freq": 1, "src": "와이99"}, {"id": 725, "type": "문장", "text": "民有三患 飢者不得食 寒者不得衣 勞者不得息 三者民之巨患也", "trans": "백성에게 세 가지 근심이 있으니, 굶주린 자가 먹지 못하고, 추운 자가 입지 못하고, 일하는 자가 쉬지 못하는 것이다. 이 세 가지가 백성의 큰 근심이다.", "freq": 1, "src": "천재101"}, {"id": 726, "type": "문장", "text": "博學之 審問之 愼思之 明辨之 篤行之", "trans": "널리 배우고, 자세히 묻고, 신중히 생각하고, 밝게 분별하고, 독실히 실천하라.", "freq": 1, "src": "장원46"}, {"id": 727, "type": "문장", "text": "防民之口 甚於防水", "trans": "백성의 입을 막는 것은 물을 막는 것보다 심하다.", "freq": 1, "src": "대학44"}, {"id": 728, "type": "문장", "text": "邦有道 貧且賤焉 恥也 邦無道 富且貴焉 恥也", "trans": "나라에 도가 있는데 가난하고 천하면 부끄러운 일이요, 나라에 도가 없는데 부유하고 귀하면 부끄러운 일이다.", "freq": 2, "src": "대학45, 장원150"}, {"id": 730, "type": "문장", "text": "凡讀書 必熟讀一冊 盡曉義趣 貫通無疑 然後 乃改讀他書", "trans": "무릇 독서는 반드시 한 책을 익숙하게 읽어 뜻을 다 깨달아 막힘없이 통한 뒤에 다른 책을 읽어야 한다.", "freq": 1, "src": "장원46"}, {"id": 731, "type": "문장", "text": "凡守是而獲利者 太上也 其次 守是而取害也 其次 趨非而獲利也 最下者 趨非而取害也", "trans": "무릇 옳은 것을 지켜 이익을 얻는 자가 가장 훌륭하고, 그 다음은 옳은 것을 지키다가 해를 당하는 자이며, 그 다음은 그릇된 것을 따르면서 이익을 얻는 자이고, 가장 나쁜 자는 그릇된 것을 따르면서 해를 당하는 자이다.", "freq": 1, "src": "장원98"}, {"id": 732, "type": "문장", "text": "凡一家之人 務相雍睦 其心和平 則家內吉善之事 必集", "trans": "무릇 한 집안 사람들은 서로 화목하도록 힘쓰라. 그 마음이 화평하면 집안에 길하고 좋은 일이 반드시 모여든다.", "freq": 1, "src": "비상39"}, {"id": 733, "type": "문장", "text": "凡鄕之約 四 一曰德業相勸 二曰過失相規 三曰禮俗相交 四曰患難相恤", "trans": "무릇 향약(鄕約)에는 네 가지가 있으니, 첫째는 덕업을 서로 권면함이요, 둘째는 과실을 서로 규제함이요, 셋째는 예속으로 서로 사귐이요, 넷째는 환난을 서로 도움이다.", "freq": 1, "src": "비상57"}, {"id": 738, "type": "문장", "text": "不戒竊鍼 盜牛心生", "trans": "바늘 도둑질을 경계하지 않으면, 소를 훔치려는 마음이 생긴다.", "freq": 1, "src": "장원38"}, {"id": 741, "type": "문장", "text": "不燃之突 煙不生", "trans": "불타지 않는 굴뚝에서는 연기가 나지 않는다.", "freq": 1, "src": "박영55"}, {"id": 743, "type": "문장", "text": "富潤屋 德潤身", "trans": "재물은 집을 윤택하게 하고, 덕은 몸을 윤택하게 한다.", "freq": 1, "src": "장원42"}, {"id": 745, "type": "문장", "text": "附耳之言 勿聽焉", "trans": "귀에 대고 하는 말은 듣지 말라.", "freq": 1, "src": "장원50"}, {"id": 746, "type": "문장", "text": "夫仁者 己欲立而立人 己欲達而達人", "trans": "무릇 인자(仁者)는 자기가 서고자 하면 남도 세워 주고, 자기가 이루고자 하면 남도 이루게 해 준다.", "freq": 1, "src": "미래141"}, {"id": 747, "type": "문장", "text": "夫人必自侮然後 人 侮之 家必自毁而後 人 毁之 國必自伐而後 人 伐之", "trans": "사람은 반드시 스스로 모욕한 뒤에야 남이 모욕하고, 집안은 반드시 스스로 허물어뜨린 뒤에야 남이 허물며, 나라는 반드시 스스로 공격한 뒤에야 남이 공격한다.", "freq": 1, "src": "장원150"}, {"id": 748, "type": "문장", "text": "不入虎穴 不得虎子", "trans": "호랑이 굴에 들어가지 않으면, 호랑이 새끼를 얻지 못한다.", "freq": 2, "src": "비상87, 와이58"}, {"id": 756, "type": "문장", "text": "夫虎之所以能服狗者 爪牙也 使虎釋其爪牙 而使狗用之 則虎反服於狗矣", "trans": "호랑이가 개를 제압할 수 있는 것은 발톱과 이빨 때문이다. 호랑이로 하여금 발톱과 이빨을 버리고 개가 쓰게 한다면, 호랑이가 도리어 개에게 제압당할 것이다.", "freq": 1, "src": "대학125"}, {"id": 757, "type": "문장", "text": "不患人之不己知 患不知人也", "trans": "남이 나를 알아주지 않는 것을 근심하지 말고, 내가 남을 알지 못하는 것을 근심하라.", "freq": 1, "src": "미래140"}, {"id": 761, "type": "문장", "text": "不入虎穴 不得虎子", "trans": "호랑이 굴에 들어가지 않으면, 호랑이 새끼를 얻지 못한다.", "freq": 1, "src": "다락65"}, {"id": 762, "type": "문장", "text": "不躓於山而躓於垤", "trans": "산에서 걸려 넘어지지 않고, 작은 두더지 언덕에 걸려 넘어진다.", "freq": 1, "src": "다락143"}, {"id": 769, "type": "문장", "text": "削杻四片 擲之 一飜曰刀 二曰介 三曰傑 四曰杻 俱伏曰牟 畫紙爲局하니 縱橫卄九宮 如田字", "trans": "윷가락 네 개를 깎아 던져서, 하나가 뒤집히면 도(刀), 둘은 개(介), 셋은 걸(傑), 넷은 윷(杻), 모두 엎어지면 모(牟)라 한다. 종이에 그려 판을 만드니, 세로 가로 29칸으로 밭 전(田) 자 모양이다.", "freq": 1, "src": "박영126"}, {"id": 774, "type": "문장", "text": "三人行 必有我師焉 擇其善者而從之 其不善者而改之", "trans": "세 사람이 함께 걸어가면 반드시 나의 스승이 있으니, 그 중에서 좋은 점은 따르고, 좋지 않은 점은 고친다.", "freq": 1, "src": "미래141"}, {"id": 775, "type": "문장", "text": "三日之程 一日往 十日臥", "trans": "사흘 길을 하루에 갔다가, 열흘을 누워 있게 된다.", "freq": 1, "src": "와이58"}, {"id": 777, "type": "문장", "text": "上善若水 水善利萬物而不爭 處衆人之所惡 故 幾於道", "trans": "최상의 선은 물과 같다. 물은 만물을 이롭게 하면서도 다투지 않고, 뭇사람이 싫어하는 곳에 처한다. 그러므로 도(道)에 가깝다.", "freq": 1, "src": "다락142"}, {"id": 778, "type": "문장", "text": "上善若水 水善利萬物而不爭 處衆人之所惡 故幾於道", "trans": "최상의 선은 물과 같다. 물은 만물을 이롭게 하면서도 다투지 않고, 뭇사람이 싫어하는 곳에 처한다. 그러므로 도에 가깝다.", "freq": 1, "src": "대학125"}, {"id": 780, "type": "문장", "text": "生無益於國 則生 不足爲榮 死有輔於民 則死 不足爲慽 所謂勇士 不忘喪其元也 義者 宜也 宜除而除 不計其功 宜死而死 不易其志 斯其爲義士哉", "trans": "살아서 나라에 보탬이 없다면 삶이 영광스럽지 않고, 죽어서 백성에게 도움이 된다면 죽음이 슬프지 않다. 이른바 용사는 목숨을 잃음을 잊지 않는 자요, 의자(義者)는 마땅함이다. 마땅히 없애야 할 것을 없애되 그 공을 따지지 않고, 마땅히 죽어야 할 때에 죽되 그 뜻을 바꾸지 않으니, 이것이 의사(義士)이다.", "freq": 1, "src": "장원146"}, {"id": 781, "type": "문장", "text": "昔 黃相國喜 微時 行役 憩于路上 見田父駕二牛耕者 問曰: \"二牛何者爲勝?\" 田父不對 輟耕而至 附耳細語曰: \"此牛勝\" 公 怪之曰: \"何以附耳相語?\" 田父曰: \"雖畜物 其心與人同也 此勝則彼劣 使牛聞之 寧無不平之心乎?\" 公 大悟 遂不復言人之長短云", "trans": "옛날 황 정승 희(喜)가 미천할 때, 길을 가다가 밭을 두 마리 소로 갈고 있는 농부를 만나 물었다. \"두 소 중 어느 것이 낫소?\" 농부가 대답하지 않고 쟁기를 멈추고 와서 귀에 대고 작은 소리로 \"이 소가 낫습니다.\" 하였다. 공이 이상히 여겨 \"어찌하여 귀에 대고 말하오?\" 하였다.", "freq": 1, "src": "미래 116"}, {"id": 783, "type": "문장", "text": "城 以石築 所須唯石 非石之艱 唯起石與運石 洵費力而糜財 今取古人遺意 參以新制 製爲起重小架 俾用于城華之役", "trans": "성(城)은 돌로 쌓는 것이니, 필요한 것은 오직 돌이다. 돌 자체가 어려운 것이 아니라, 오직 돌을 일으키고 운반하는 것이 참으로 힘이 들고 재물을 소비한다. 지금 옛사람의 뜻을 취하고 새 방식을 참고하여 작은 기중기를 만들어 화성(華城) 공사에 쓰도록 하였다.", "freq": 1, "src": "비상111"}, {"id": 784, "type": "문장", "text": "\"聖上十九年乙卯 耽羅大飢 民相枕死 <중략> 於是 萬德 捐千金貿米 陸地諸郡縣棹夫 以時至 萬德 取十之一 以活親族 其餘 盡輸之官 浮黃者聞之 集官庭如雲\"", "trans": "\"성상 재위 19년 을묘에 탐라에 큰 기근이 들어 백성이 서로 베고 죽었다. ⋯(중략)⋯ 이에 만덕이 천금을 내놓아 육지 여러 군현에서 쌀을 사고 선인들이 때에 맞추어 이르니, 만덕이 십분의 일을 취하여 친족을 살리고, 나머지는 모두 관아에 바쳤다. 굶주린 자들이 이 소식을 듣고 관아 뜰에 구름처럼 모여들었다.\"", "freq": 1, "src": "다락100"}, {"id": 786, "type": "문장", "text": "世有伯樂然後 有千里馬 千里馬 常有 而伯樂 不常有 (중략) 馬之千里者 一食 或盡粟一石 食馬者 知其能千里而食也 是馬 雖有千里之能 食不飽 力不足 才美不外見 且欲與常馬等 不可得 安求其能千里也? (중략) 執策而臨之 曰: \"天下 無良馬 \"嗚呼! 其眞無馬耶? 其眞不識馬耶?", "trans": "세상에 백락(伯樂)이 있은 연후에 천리마가 있다. 천리마는 늘 있으나 백락은 늘 있지 않다. ⋯(중략)⋯ 천리를 달리는 말은 한 번 먹을 때 혹 한 섬의 쌀을 먹는다. 말을 기르는 자가 그 능력이 천리를 달릴 수 있음을 알고 먹인다면, 이 말이 비록 천리를 달리는 능력이 있어도 먹는 것이 충분하지 않고 힘이 부족하면, 재능과 아름다움이…", "freq": 1, "src": "미래146"}, {"id": 787, "type": "문장", "text": "世有伯樂然後 有千里馬 千里馬 常有 而伯樂 不常有 故 雖有名馬 秪辱於奴隷人之手 騈死於槽櫪之間 不以千里稱也 馬之千里者 一食 或盡粟一石 食馬者 不知其能千里而食也 是馬 雖有千里之能 食不飽 力不足 才美不外見 且欲與常馬等 不可得 安求其能千里也? 策之不以其道 食之不能盡其材 鳴之不能通其意 執策而臨之曰: “天下 無良馬” 嗚呼! 其眞無馬耶? 其眞不識馬耶?", "trans": "세상에 백락이 있은 연후에 천리마가 있다. 천리마는 늘 있으나 백락은 늘 있지 않다. 그러므로 비록 명마가 있어도 단지 노비의 손에서 욕을 당하고 구유 사이에서 나란히 죽으니, 천리마라 일컬어지지 못한다. 천리를 달리는 말은 한 번 먹을 때 혹 한 섬의 쌀을 다 먹는다. 말 먹이는 자가 그것이 천리를 달릴 수 있음을 알지 못하고…", "freq": 1, "src": "박영172"}, {"id": 790, "type": "문장", "text": "所謂十干者 甲乙丙丁戊己庚辛壬癸也 所謂十二支者 子丑寅卯辰巳午未申酉戌亥也", "trans": "이른바 십간(十干)이란 갑(甲)·을(乙)·병(丙)·정(丁)·무(戊)·기(己)·경(庚)·신(辛)·임(壬)·계(癸)이다. 이른바 십이지(十二支)란 자(子)·축(丑)·인(寅)·묘(卯)·진(辰)·사(巳)·오(午)·미(未)·신(申)·유(酉)·술(戌)·해(亥)이다.", "freq": 1, "src": "동아 107"}, {"id": 792, "type": "문장", "text": "蘇子曰: “客亦知夫水與月乎? 逝者如斯 而未嘗往也 盈虛者如彼 而卒莫消長也 蓋將自其變者而觀之 則天地曾不能以一瞬 自其不變者而觀之 則物與我皆無盡也 而又何羨乎? 且夫天地之間 物各有主 苟非吾之所有 雖一毫 而莫取 惟江上之淸風 與山間之明月 耳得之而爲聲 目遇之而成色 取之無禁 用之不竭 是 造物者之無盡藏也 而吾與子之所共適\"", "trans": "소자(蘇子)가 말하기를 \"그대도 저 물과 달을 아는가? 흘러가는 것은 이와 같으나 일찍이 사라진 적이 없고, 차고 기우는 것은 저와 같으나 마침내 불거나 줄어든 적이 없다. 대개 변하는 것으로 보면 천지도 한 순간도 변하지 않음이 없고, 변하지 않는 것으로 보면 만물과 나는 모두 다함이 없다. 또…\"", "freq": 1, "src": "박영166"}, {"id": 793, "type": "문장", "text": "孫叔敖爲嬰兒 出遊而還 憂而不食 其母問其故 泣而對曰 \"今日吾見兩頭蛇 恐去死無日矣\" 母曰 \"今蛇安在?\" 曰 \"吾聞見兩頭蛇者死 吾恐他人又見已埋之矣\" 母曰 \"無憂 汝不死 吾聞之 有陰德者 天報以福\"", "trans": "손숙오가 아이였을 때, 밖에서 놀다가 돌아와 근심하며 밥을 먹지 않았다. 그 어머니가 까닭을 물으니, 울며 대답하기를 \"오늘 저는 머리 둘 달린 뱀을 보았습니다. 아마도 죽을 날이 멀지 않을까 두렵습니다.\" 어머니가 \"지금 그 뱀은 어디 있느냐?\" 하니, \"저는 머리 둘 달린 뱀을 보면 죽는다고 들었습니다. 다른 사람이 또 볼까 두려워 이미 묻어 버렸습니다.\"", "freq": 1, "src": "대학64"}, {"id": 795, "type": "문장", "text": "宋人 有閔其苗之不長而揠之者 芒芒然歸 謂其人曰: \"今日 病矣! 予助苗長矣!\" 其子 趨而往視之 苗則槁矣", "trans": "송나라 사람 중에 그 싹이 자라지 않는 것을 걱정하여 그것을 잡아 뽑은 자가 있었다. 피곤하게 돌아와 그 사람들에게 말하기를 \"오늘 내가 힘들었다! 내가 싹이 자라도록 도와주었다!\" 하였다. 그의 아들이 달려가 보니, 싹은 이미 말라 죽어 있었다.", "freq": 1, "src": "미래81"}, {"id": 796, "type": "문장", "text": "宋人或得玉 獻諸子罕 子罕弗受 獻玉者 曰 \"以示玉人 玉人 以爲寶也 故 敢獻之\" 子罕 曰 \"我 以不貪爲寶 爾 以玉爲寶 若以與我 皆喪寶也 不若人有其寶\"", "trans": "송나라 사람이 옥을 얻어 자한(子罕)에게 바쳤다. 자한이 받지 않자, 옥을 바친 자가 \"옥장인에게 보였더니 옥장인이 보물이라 하였기 때문에 감히 바치는 것입니다.\" 하였다. 자한이 말하기를 \"나는 탐내지 않음을 보물로 삼고, 그대는 옥을 보물로 삼는다. 만약 내게 준다면 둘 다 보물을 잃는 것이니, 사람마다 자기 보물을 지니는 것만 못하다.\"", "freq": 1, "src": "장원82"}, {"id": 797, "type": "문장", "text": "宋人或得玉 獻諸子罕 子罕弗受 獻玉者曰 \"以示玉人 玉人以爲寶也 故敢獻之\" 子罕曰 \"我以不貪爲寶 爾以玉爲寶 若以與我 皆喪寶也 不若人有其寶\"", "trans": "송나라 사람이 옥을 얻어 자한에게 바쳤다. 자한이 받지 않자, 옥을 바친 자가 \"옥장인에게 보였더니 옥장인이 보물이라 하였으므로 감히 바치는 것입니다.\" 하였다. 자한이 말하기를 \"나는 탐내지 않음을 보물로 삼고, 그대는 옥을 보물로 삼는다. 만약 내게 준다면 둘 다 보물을 잃는 것이니, 사람마다 자기 보물을 지니는 것만 못하다.\"", "freq": 1, "src": "대학58"}, {"id": 804, "type": "문장", "text": "樹欲靜而風不止 子欲養而親不待也", "trans": "나무는 고요하고자 하나 바람이 그치지 않고, 자식이 봉양하고자 하나 어버이는 기다려 주지 않는다.", "freq": 1, "src": "다락53"}, {"id": 805, "type": "문장", "text": "隨牛適江南", "trans": "소를 따라 강남으로 간다. (분수에 맞게 처신하라는 뜻)", "freq": 1, "src": "미래54"}, {"id": 806, "type": "문장", "text": "雖有忙心 線不繫鍼", "trans": "비록 바쁜 마음이 있어도, 실은 바늘에 꿰어지지 않는다.", "freq": 1, "src": "박영55"}, {"id": 812, "type": "문장", "text": "施恩勿求報 與人勿追悔", "trans": "은혜를 베풀되 보답을 구하지 말고, 사람에게 주었으면 후회하지 말라.", "freq": 3, "src": "다락70, 박영60, 비상51"}, {"id": 813, "type": "문장", "text": "視人之國 若視其國 視人之家 若視其家 視人之身 若視其身", "trans": "남의 나라 보기를 자기 나라 보듯 하고, 남의 집 보기를 자기 집 보듯 하며, 남의 몸 보기를 자기 몸 보듯 하라.", "freq": 1, "src": "박영117"}, {"id": 816, "type": "문장", "text": "心不在焉 視而不見 聽而不聞 食而不知其味", "trans": "마음이 있지 않으면, 보아도 보이지 않고, 들어도 들리지 않으며, 먹어도 그 맛을 알지 못한다.", "freq": 1, "src": "박영98"}, {"id": 818, "type": "문장", "text": "十飯一匙 還成一飯", "trans": "열 끼 밥에서 한 숟가락씩 모으면 한 끼 밥이 된다.", "freq": 1, "src": "천재57"}, {"id": 819, "type": "문장", "text": "十三年 上曰 \"太宗實錄垂成 予欲觀之\" 右議政孟思誠曰 \"實錄所載 皆當時之事 以示後世 皆實事也 殿下見之 亦不得爲太宗更改 今一見之 後世人主效之 史官疑懼 必失其職 何以傳信將來?\" 上從之", "trans": "13년에 임금이 말씀하시기를 \"태종실록이 완성되니 내가 보고자 한다.\" 우의정 맹사성이 말씀드리기를 \"실록에 기록된 것은 모두 당시의 일로 후세에 보이기 위한 것이니 모두 사실입니다. 전하께서 보시더라도 태종을 위해 고칠 수 없으며, 지금 한번 보시면 후세 임금이 이를 본받아 사관이 임금이 볼 것을 의심하여…\"", "freq": 1, "src": "대학132"}, {"id": 821, "type": "문장", "text": "我腹旣飽 不察奴飢", "trans": "내 배가 이미 부르면, 종의 굶주림을 살피지 않는다.", "freq": 4, "src": "다락64, 대학32, 와이58, 장원38"}, {"id": 823, "type": "문장", "text": "安龍福 善倭語 入海漁採 漂到鬱陵島 被拘入馬島 乃曰 \"鬱陵 距我國 一日程 距倭 五日程 非屬我國者乎? 朝鮮人 自往朝鮮地 何拘爲?\"", "trans": "안용복은 왜어(倭語)를 잘하였다. 바다에 들어가 고기를 잡다가 울릉도에 표류하여 마도(馬島)에 붙잡혔다. 이에 말하기를 \"울릉도는 우리나라에서 하루 거리이고, 왜에서는 닷새 거리이니, 우리나라에 속한 것이 아닌가? 조선 사람이 스스로 조선 땅에 갔는데, 어찌 붙잡는가?\"", "freq": 1, "src": "장원128"}, {"id": 824, "type": "문장", "text": "顔淵 問仁 子曰: “克己復禮爲仁”", "trans": "안연이 인(仁)에 대해 물으니, 공자가 말씀하셨다. \"자기를 이기고 예(禮)로 돌아가는 것이 인이다.\"", "freq": 1, "src": "천재92"}, {"id": 830, "type": "문장", "text": "若民則無恒産 因無恒心 苟無恒心 放辟邪侈 無不爲已", "trans": "백성이라면 항산이 없으면 항심도 없게 된다. 진실로 항심이 없으면, 방탕하고 편벽되며 사악하고 사치하여 못하는 짓이 없을 것이다.", "freq": 1, "src": "천재100"}, {"id": 834, "type": "문장", "text": "어느 날 제자가 장자에게 선생님은 쓸모 있음과 쓸모없음 중 어디에 처하시겠느냐고 묻자… 莊子笑曰: “周 將處夫材與不材之間 材與不材之間 似之而非也 故未免乎累”", "trans": "어느 날 제자가 장자에게 \"선생님은 쓸모 있음과 쓸모없음 중 어디에 처하시겠느냐?\"고 묻자… 장자가 웃으며 말했다. \"나는 재목과 재목 아닌 것의 사이에 처할 것이다. 재목과 재목 아닌 것의 사이는 비슷한 듯하지만 실은 그렇지 않다.\"", "freq": 1, "src": "박영110"}, {"id": 836, "type": "문장", "text": "於是 萬德捐千金 貿米陸地 諸郡縣棹夫 以時至 萬德取十之一 以活親族 其餘盡輸之官 浮黃者聞之 集官庭如雲 官劑其緩急 分與之有差 男若女 出而頌萬德之恩 咸以爲活我者萬德 (중략) 傳敎曰: “爾以一女子 出義氣 救饑餓千百名 奇哉! 賞賜甚厚”", "trans": "이에 만덕이 천금을 내놓아 육지에서 쌀을 사고, 여러 군현의 선인들이 때에 맞추어 이르니, 만덕이 십분의 일을 취하여 친족을 살리고, 나머지는 모두 관아에 바쳤다. 굶주린 자들이 이 소식을 듣고 관아 뜰에 구름처럼 모여들었다. 관아에서 급박한 정도에 따라 나누어 주되 차등이 있게 하였다. 남녀 할 것 없이 나서서 만덕의 은혜를 칭송하며 모두…", "freq": 1, "src": "박영160"}, {"id": 837, "type": "문장", "text": "어질고 청렴한 관리로 이름 높던 황희가 젊은 시절에 길을 가다 밭 가는 농부를 보고는 물었다 \"二牛何者爲勝?\" 田父不對 輟耕而至 附耳細語曰: \"此牛勝\" 公怪之曰: \"何以附耳相語?\" 田父曰: \"雖畜物 其心與人同也 此勝則彼劣 使牛聞之 寧無不平之心乎?\" 公大悟 遂不復言人長短云", "trans": "어질고 청렴한 관리로 이름 높던 황희가 젊은 시절에 길을 가다 밭 가는 농부를 보고는 물었다. \"두 소 중 어느 것이 낫소?\" 농부가 대답하지 않고 쟁기를 멈추고 와서 귀에 대고 작은 소리로 \"이 소가 낫습니다.\" 하였다.", "freq": 1, "src": "와이110"}, {"id": 840, "type": "문장", "text": "與其視人 寧自視 與其聽人 寧自聽", "trans": "남을 살피기보다는 차라리 자신을 살피고, 남에게 듣기보다는 차라리 스스로 들어라.", "freq": 1, "src": "장원50"}, {"id": 843, "type": "문장", "text": "與益者居 則學日明 而業日進 與損者處 則名自卑 而身自賤", "trans": "이로운 사람과 함께하면 학문이 날로 밝아지고 업적이 날로 나아가고, 해로운 사람과 함께하면 이름이 저절로 낮아지고 몸이 저절로 천해진다.", "freq": 1, "src": "박영61"}, {"id": 846, "type": "문장", "text": "烏飛梨落", "trans": "까마귀가 날자 배가 떨어진다. (원인 없는 일이 공교롭게 일치하는 것의 비유)", "freq": 2, "src": "동아84, 천재56"}, {"id": 847, "type": "문장", "text": "吾亦嘗學爲山水矣 然度無以壓倒今之畵師而出其上 故擇物而習焉 猫之理在吾心 態在吾目然後 猫之形 觸吾手而出", "trans": "나는 일찍이 산수(山水) 그림 배우기를 시도하였다. 그러나 오늘날 화가들을 압도하여 그 위에 설 수 없다고 판단하여, 사물을 가려서 익혔다. 고양이의 이치가 내 마음에 있고, 고양이의 태도가 내 눈에 있은 연후에, 고양이의 형상이 내 손에 닿아 나온다.", "freq": 1, "src": "천재133"}, {"id": 848, "type": "문장", "text": "吾爲是術 非要其利 行吾志而已 故不擇貴賤焉 <중략> 若貧而無勢者 或拒以疾 或諱以不在 百請而不一起 是豈仁人之情哉?", "trans": "나는 이 술을 행하는 것이 그 이익을 바라는 것이 아니라, 나의 뜻을 행하는 것이다. 그러므로 귀하고 천한 것을 가리지 않는다. ⋯(중략)⋯ 가난하고 세력 없는 자에게는, 혹 병을 핑계로 거절하거나, 혹 없는 척하여 백 번 청해도 한 번도 나서지 않으니, 이것이 어찌 어진 사람의 마음이겠는가?", "freq": 1, "src": "천재149"}, {"id": 849, "type": "문장", "text": "吾爲是術 非要其利 行吾志而已 故不擇貴賤焉 彼貴顯者 寧少吾輩哉? 所哀憐 獨巷窮民耳 吾今年四十餘 復數十年 可活萬人 活人至萬 吾事畢矣", "trans": "나는 이 술을 행하는 것이 그 이익을 바라는 것이 아니라, 나의 뜻을 행하는 것이다. 그러므로 귀하고 천한 것을 가리지 않는다. 그 가련한 것은 오직 가난한 골목의 백성뿐이다. 내가 지금 나이 마흔 남짓이니, 다시 수십 년이면 만 명을 살릴 수 있다. 사람을 살리는 것이 만 명에 이르면 나의 일은 끝난다.", "freq": 1, "src": "비상105"}, {"id": 851, "type": "문장", "text": "吾日三省吾身 ‘爲人謀而不忠乎? 與朋友交而不信乎? 傳不習乎?’", "trans": "나는 날마다 세 가지로 나 자신을 반성한다. \"남을 위해 일을 도모함에 충성스럽지 않았는가? 벗과 사귐에 미덥지 않았는가? 배운 것을 익히지 않았는가?\"", "freq": 1, "src": "비상75"}, {"id": 852, "type": "문장", "text": "嗚呼! 仁愛之天 示警如此 而不能反躬自省 則天若之何?", "trans": "아! 인자한 하늘이 경고를 이와 같이 보이셨거늘, 능히 돌이켜 자신을 반성하지 않는다면, 하늘이 어찌하겠는가?", "freq": 1, "src": "천재170"}, {"id": 861, "type": "문장", "text": "于山·武陵二島 在縣正東海中 二島 相去不遠 風日淸明 則可望見 新羅時 稱于山國 一云鬱陵島", "trans": "우산(于山)·무릉(武陵) 두 섬이 현의 정동쪽 바다 한가운데 있다. 두 섬이 서로 멀지 않아, 날씨가 맑고 바람이 없으면 바라볼 수 있다. 신라 때에는 우산국(于山國)이라 불렸으며, 울릉도라고도 한다.", "freq": 1, "src": "박영138"}, {"id": 863, "type": "문장", "text": "于山武陵二島 在縣正東海中 二島 相去不遠 風日淸明 則可望見 新羅時 稱于山國 一云鬱陵島", "trans": "우산·무릉 두 섬이 현의 정동쪽 바다 한가운데 있다. 두 섬이 서로 멀지 않아, 날씨가 맑고 바람이 없으면 바라볼 수 있다. 신라 때에는 우산국이라 불렸으며, 울릉도라고도 한다.", "freq": 2, "src": "비상146, 장원126"}, {"id": 864, "type": "문장", "text": "右手畫圓 左手畫方 不能兩成", "trans": "오른손으로 원을 그리고, 왼손으로 사각형을 그리면 둘 다 이룰 수 없다.", "freq": 1, "src": "와이62"}, {"id": 866, "type": "문장", "text": "謂魏王曰: \"今一人 言市有虎 王 信之乎?\" 王曰: \"否\" (중략) \"三人 言市有虎 王 信之乎?\" 王曰: \"寡人 信之矣\" 龐葱曰: \"夫市之無虎 明矣 然而三人 言而成虎\"", "trans": "위왕(魏王)에게 말하기를 \"지금 한 사람이 시장에 호랑이가 있다 한다면, 왕께서는 믿으시겠습니까?\" 왕이 \"아니오.\" ⋯(중략)⋯ \"세 사람이 시장에 호랑이가 있다 한다면, 왕께서는 믿으시겠습니까?\" 왕이 \"과인은 믿겠소.\" 방총(龐葱)이 \"무릇 시장에 호랑이가 없는 것은 분명하거늘…\"", "freq": 1, "src": "미래87"}, {"id": 867, "type": "문장", "text": "謂學不暇者 雖暇 亦不能學矣", "trans": "배울 겨를이 없다고 말하는 자는, 비록 겨를이 있어도 또한 배우지 못할 것이다.", "freq": 1, "src": "박영61"}, {"id": 868, "type": "문장", "text": "有國有家者 不患寡而患不均 不患貧而患不安", "trans": "나라나 집을 가진 자는 적음을 근심하지 않고 고르지 않음을 근심하며, 가난함을 근심하지 않고 편안하지 않음을 근심한다.", "freq": 1, "src": "장원150"}, {"id": 870, "type": "문장", "text": "有朋 自遠方來 不亦樂乎?", "trans": "벗이 먼 곳에서 찾아오면, 또한 기쁘지 아니한가?", "freq": 1, "src": "비상33"}, {"id": 872, "type": "문장", "text": "有餘者 常譽人 不足者 常毁人", "trans": "남음이 있는 자는 항상 남을 칭찬하고, 부족한 자는 항상 남을 헐뜯는다.", "freq": 1, "src": "박영66"}, {"id": 875, "type": "문장", "text": "陰地轉 陽地變", "trans": "그늘진 땅이 바뀌면 양지바른 땅도 변한다. (세상의 변화는 불가피하다는 뜻)", "freq": 1, "src": "박영55"}, {"id": 876, "type": "문장", "text": "泣引淚而成鳥 此可謂忘榮辱於畫者也", "trans": "눈물을 흘리며 새를 그리니, 이것이 가히 영욕(榮辱)을 그림 속에서 잊었다 할 만하다.", "freq": 1, "src": "비상98"}, {"id": 879, "type": "문장", "text": "以物視人 物貴而人賤 自天而視之 人與物均也", "trans": "물건으로 사람을 보면 물건이 귀하고 사람이 천하지만, 하늘로부터 보면 사람과 물건이 균등하다.", "freq": 1, "src": "천재169"}, {"id": 880, "type": "문장", "text": "以勢交者 勢傾則絶 以利交者 利窮則散", "trans": "권세로 사귄 자는 권세가 기울면 절교하고, 이익으로 사귄 자는 이익이 다하면 흩어진다.", "freq": 1, "src": "천재80"}, {"id": 881, "type": "문장", "text": "二十四年製測雨器 鑄銅爲器 名曰測雨 서운관(書雲觀)에 측우기를 설치하고 每雨後 本觀官員 以周尺 量水深分寸 隨卽啓聞 又以測雨器制及周尺式 頒于諸道 使列邑 各造一件 置客舍庭中 每雨後 守令親審水深分寸 啓聞", "trans": "24년에 측우기를 만들었다. 구리를 녹여 기구를 만들고 이름을 측우라 하였다. 서운관(書雲觀)에 측우기를 설치하고, 비가 온 후마다 본관 관원이 주척(周尺)으로 물의 깊이를 재어 즉시 아뢰게 하였다. 또 측우기의 제도와 주척의 양식을 여러 도에 반포하여…", "freq": 1, "src": "와이94"}, {"id": 884, "type": "문장", "text": "二牛 何者爲勝? 何以附耳相語? 雖畜物 其心與人同也 此勝則彼劣 使牛聞之 寧無不平之心乎?", "trans": "두 소 중 어느 것이 낫소? / 어찌하여 귀에 대고 말하오? / 비록 짐승이라도 그 마음은 사람과 같다. 이 소가 저 소보다 낫다 하면, 소가 듣고 어찌 불평하는 마음이 없겠는가?", "freq": 1, "src": "동아143"}, {"id": 885, "type": "문장", "text": "二人同心 其利斷金 同心之言 其臭如蘭", "trans": "두 사람이 마음을 같이하면 그 날카로움이 쇠도 끊을 수 있고, 마음을 같이하는 말은 그 향기가 난초와 같다.", "freq": 1, "src": "대학39"}, {"id": 886, "type": "문장", "text": "二人同心 其利斷金 同心之言 其臭如蘭", "trans": "두 사람이 마음을 같이하면 그 날카로움이 쇠도 끊을 수 있고, 마음을 같이하는 말은 그 향기가 난초와 같다.", "freq": 1, "src": "다락47"}, {"id": 890, "type": "문장", "text": "人無遠慮 必有近憂", "trans": "사람이 멀리 생각함이 없으면, 반드시 가까운 근심이 있다.", "freq": 1, "src": "비상63"}, {"id": 892, "type": "문장", "text": "人性之善也 猶水之就下也 人無有不善 水無有不下", "trans": "사람의 본성이 선한 것은, 물이 낮은 곳으로 흐르는 것과 같다. 선하지 않은 사람이 없는 것은, 흐르지 않는 물이 없는 것과 같다.", "freq": 1, "src": "대학118"}, {"id": 893, "type": "문장", "text": "人性之善也 猶水之就下也 人無有不善 水無有不下 今夫水 搏而躍之 可使過顙 激而行之 可使在山 是豈水之性哉?", "trans": "사람의 본성이 선한 것은 물이 낮은 곳으로 흐르는 것과 같다. 선하지 않은 사람이 없는 것은 흐르지 않는 물이 없는 것과 같다. 지금 물을 쳐서 튀어 오르게 하면 이마보다 높이 지나게 할 수 있고, 세차게 흘려 보내면 산 위에도 있게 할 수 있다. 이것이 어찌 물의 본성이겠는가?", "freq": 1, "src": "박영104"}, {"id": 894, "type": "문장", "text": "人性之善也 猶水之就下也 人無有不善 水無有不下 今夫水 搏而躍之 可使過顙 激而行之 可使在山 是豈水之性哉?", "trans": "사람의 본성이 선한 것은 물이 낮은 곳으로 흐르는 것과 같다. 선하지 않은 사람이 없는 것은 흐르지 않는 물이 없는 것과 같다. 지금 물을 쳐서 튀어 오르게 하면 이마보다 높이 지나게 할 수 있고, 세차게 흘려 보내면 산 위에도 있게 할 수 있다. 이것이 어찌 물의 본성이겠는가?", "freq": 1, "src": "다락136"}, {"id": 899, "type": "문장", "text": "人有畜野鵝者 多與煙火之食 鵝便體重 不能飛 後 忽不食 人以爲病 益與之食 而不食 旬日而體輕 凌空而去 翁 聞之曰 \"智哉! 善自保也\"", "trans": "야생 거위를 기른 사람이 있었는데, 연기와 불기운이 있는 음식을 많이 주었더니, 거위 몸이 무거워져 날지 못하였다. 뒤에 홀연 먹지 않으니, 주인이 병든 줄 알고 더 주었지만 먹지 않았다. 열흘 만에 몸이 가벼워져 하늘로 올라 날아가 버렸다. 옹이 이 말을 듣고 \"지혜롭도다! 자신을 잘 보전하였구나.\"", "freq": 1, "src": "장원78"}, {"id": 906, "type": "문장", "text": "人之性 惡 其善者 僞也 今人之性 生而有好利焉 順是故 爭奪生而辭讓亡焉 生而有疾惡焉 順是故 殘賊生而忠信亡焉", "trans": "사람의 본성은 악하며, 그 선한 것은 인위적인 것이다. 지금 사람의 본성은 태어나면서 이익을 좋아하는 마음이 있으니, 이를 따르기 때문에 쟁탈이 생기고 사양함이 없어진다. 태어나면서 남을 미워하는 마음이 있으니, 이를 따르기 때문에 잔인함이 생기고 충신(忠信)이 없어진다.", "freq": 1, "src": "박영111"}, {"id": 907, "type": "문장", "text": "人之性 惡 其善者 僞也 今人之性 生而有好利焉 順是故 爭奪生而辭讓亡焉", "trans": "사람의 본성은 악하며, 그 선한 것은 인위적인 것이다. 지금 사람의 본성은 태어나면서 이익을 좋아하는 마음이 있으니, 이를 따르기 때문에 쟁탈이 생기고 사양함이 없어진다.", "freq": 2, "src": "다락137, 대학124"}, {"id": 908, "type": "문장", "text": "人必自侮然後 人侮之", "trans": "사람은 반드시 스스로 모욕한 뒤에야 남이 모욕한다.", "freq": 1, "src": "천재64"}, {"id": 911, "type": "문장", "text": "一士讀書 澤及四海 功垂萬世", "trans": "한 선비가 글을 읽으면, 은택이 사해에 미치고 공적이 만세에 드리운다.", "freq": 1, "src": "장원46"}, {"id": 912, "type": "문장", "text": "一手獨拍 雖疾無聲", "trans": "한 손으로 홀로 치면, 비록 빠르게 쳐도 소리가 없다.", "freq": 1, "src": "와이68"}, {"id": 916, "type": "문장", "text": "一人自貿猪肉而來 上問所買者焉用 對以供於麵需 不答之 及麵之賜也 獨置貿猪者而不與曰: “渠則自有所喫之物”", "trans": "한 사람이 돼지고기를 직접 사서 왔다. 임금이 산 것이 무엇에 쓰려 하느냐고 물으니, 국수 재료로 쓰려 한다고 하였다. 대답하지 않으셨다. 국수를 하사할 때, 돼지고기를 산 사람에게만 두고 주지 않으시며 말씀하기를, \"그는 먹을 것이 따로 있다.\"", "freq": 1, "src": "천재141"}, {"id": 918, "type": "문장", "text": "一日之狗 不知畏虎", "trans": "하루 된 개는 호랑이를 무서워할 줄 모른다.", "freq": 1, "src": "미래54"}, {"id": 919, "type": "문장", "text": "子貢 問政 子曰: \"足食 足兵 民信之矣\" 子貢曰: \"必不得已而去 於斯三者 何先?\" 曰: \"去兵\" 子貢曰: \"必不得已而去 於斯二者 何先?\" 曰: \"去食 自古皆有死 民無信不立\"", "trans": "자공이 정치에 대해 물으니, 공자가 말씀하셨다. \"양식을 넉넉히 하고, 병사를 넉넉히 하며, 백성이 믿도록 하는 것이다.\" 자공이 \"반드시 어쩔 수 없이 버려야 한다면, 이 세 가지 중 어느 것을 먼저 하겠습니까?\" 하자, \"병사를 버려라.\" 자공이 \"반드시 어쩔 수 없이 버려야 한다면, 이 두 가지 중 어느 것을 먼저 하겠습니까?\" 하자, \"양식을 버려라.\"", "freq": 1, "src": "와이132"}, {"id": 921, "type": "문장", "text": "子旣生 父母名之 而其別名字號 或自名 或師友之所名也 古之人 以號代名者 多矣", "trans": "자식이 태어나면 부모가 이름을 짓는데, 그 별명과 자호(字號)는 혹 스스로 짓거나 혹 스승과 벗이 지어 준다. 옛날 사람들이 호로 이름을 대신한 경우가 많았다.", "freq": 1, "src": "동아119"}, {"id": 923, "type": "문장", "text": "自反而不縮 雖褐寬博 吾不惴焉? 自反而縮 雖千萬人 吾往矣", "trans": "스스로 돌이켜 보아 옳지 않으면, 비록 상대가 미천한 자라도 내가 두려워하겠는가? 스스로 돌이켜 보아 옳다면, 비록 천만 명이라도 나는 나아가겠다.", "freq": 1, "src": "장원150"}, {"id": 924, "type": "문장", "text": "子曰 \"其恕乎 己所不欲 勿施於人\"", "trans": "공자가 말씀하셨다. \"그것은 서(恕)이다. 자기가 하고 싶지 않은 것을 남에게 베풀지 말라.\"", "freq": 1, "src": "대학112"}, {"id": 925, "type": "문장", "text": "子曰 \"學而時習之 不亦說乎? 有朋自遠方來 不亦樂乎? 人不知而不慍 不亦君子乎?\"", "trans": "공자가 말씀하셨다. \"배우고 때로 익히면, 또한 기쁘지 아니한가? 벗이 먼 곳에서 찾아오면, 또한 기쁘지 아니한가? 남이 알아주지 않아도 성내지 않으면, 또한 군자가 아닌가?\"", "freq": 1, "src": "대학112"}, {"id": 927, "type": "문장", "text": "自重其身者 人不敢輕之", "trans": "스스로 자신을 중히 여기는 자는 남이 감히 가볍게 보지 않는다.", "freq": 1, "src": "와이70"}, {"id": 929, "type": "문장", "text": "自秋七月旣望 每日早集大部之庭 績麻 乙夜而罷 至八月十五日 考其功之多少 負者 置酒食 以謝勝者", "trans": "가을 7월 16일부터 매일 이른 아침에 대부(大部)의 뜰에 모여 삼베를 삼고, 을야(乙夜)에 파한다. 8월 15일에 이르러 그 공의 많고 적음을 따진다. 진 편이 술과 음식을 내어 이긴 편에 사례한다.", "freq": 1, "src": "박영127"}, {"id": 934, "type": "문장", "text": "長一尺五寸 經七寸 用周尺 作臺於書雲觀 置器於臺上 每當雨水後 本觀官員 親視下雨之狀 以周尺量水深淺", "trans": "길이 1척 5촌, 지름 7촌이며 주척(周尺)을 사용한다. 서운관에 대(臺)를 만들고 기구를 대 위에 놓는다. 비가 온 후마다 본관 관원이 직접 비 내리는 상태를 보고 주척으로 물의 깊이를 잰다.", "freq": 1, "src": "다락119"}, {"id": 935, "type": "문장", "text": "將限其食 恐衆狙之不馴於己也 先誑之曰 \"與若芧 朝三而暮四면 足乎?\" 衆狙皆起而怒 俄而曰 與若芧 朝四而暮三 足乎?\" 衆狙皆伏而喜", "trans": "원숭이들이 먹이를 먹지 못할까 두려워, 먼저 속이며 말하기를 \"너희에게 도토리를 주되 아침에 셋, 저녁에 넷이면 충분하냐?\" 원숭이들이 모두 일어나 성내었다. 잠시 뒤에 말하기를 \"너희에게 도토리를 주되 아침에 넷, 저녁에 셋이면 충분하냐?\" 원숭이들이 모두 엎드려 기뻐하였다.", "freq": 1, "src": "대학78"}, {"id": 936, "type": "문장", "text": "才俊人 宜學恭謹 聰明人 宜學沈厚", "trans": "재주 있는 사람은 마땅히 공손하고 삼가는 것을 배워야 하고, 총명한 사람은 마땅히 침착하고 무게 있는 것을 배워야 한다.", "freq": 1, "src": "박영67"}, {"id": 937, "type": "문장", "text": "積功成塔 終亦不崩", "trans": "공든 탑이 무너지랴. (끝내 무너지지 않는다는 뜻)", "freq": 1, "src": "장원38"}, {"id": 938, "type": "문장", "text": "積功之塔 不墮", "trans": "공든 탑은 무너지지 않는다.", "freq": 4, "src": "다락64, 미래51, 와이56, 천재56"}, {"id": 940, "type": "문장", "text": "賊不敢直突於兩湖者 以舟師之扼其路也 今臣戰船 尙有十二 出死力拒戰 則猶可爲也 <중략> 戰船雖寡 微臣不死 則賊不敢侮我矣", "trans": "적이 감히 곧장 양호(兩湖)로 돌진하지 못하는 것은 수군이 그 길목을 막고 있기 때문입니다. 지금 신의 전선이 오히려 12척이 있으니, 죽을힘을 다하여 막아 싸우면 아직 할 수 있습니다. ⋯(중략)⋯ 전선이 비록 적으나, 미천한 신이 죽지 않는 한 적이 감히 우리를 업신여기지 못할 것입니다.", "freq": 1, "src": "천재157"}, {"id": 941, "type": "문장", "text": "積善之家 必有餘慶 積不善之家 必有餘殃", "trans": "선을 쌓은 집안에는 반드시 남은 경사가 있고, 불선(不善)을 쌓은 집안에는 반드시 남은 재앙이 있다.", "freq": 2, "src": "대학44, 와이64"}, {"id": 943, "type": "문장", "text": "戰戰兢兢 如臨深淵 如履薄氷", "trans": "조심하고 두려워하기를, 마치 깊은 연못에 임한 듯, 살얼음을 밟는 듯이 하라.", "freq": 1, "src": "비상63"}, {"id": 944, "type": "문장", "text": "轉禍而爲福 因敗而成功", "trans": "화를 돌이켜 복이 되게 하고, 실패로 인하여 성공을 이루게 하라.", "freq": 1, "src": "박영60"}, {"id": 946, "type": "문장", "text": "諸將易得耳 至如信者 國士無雙", "trans": "여러 장수는 쉽게 얻을 수 있지만, 한신과 같은 자는 나라에 둘도 없는 재사(才士)이다.", "freq": 1, "src": "다락40"}, {"id": 947, "type": "문장", "text": "第八阿達羅王卽位四年丁酉 東海濱 有延烏郞細烏女 夫婦而居 一日 延烏 歸海採藻 忽有一巖 負歸日本 國人 見之 曰 \"此 非常人也\" 乃立爲王", "trans": "제8대 아달라왕 즉위 4년 정유(丁酉)에, 동해 가에 연오랑(延烏郞)과 세오녀(細烏女) 부부가 살고 있었다. 하루는 연오가 바다로 나아가 해초를 따다가, 홀연히 바위 하나가 그를 싣고 일본으로 건너갔다. 그 나라 사람들이 보고 말하기를 \"이는 보통 사람이 아니다.\" 하여 마침내 왕으로 삼았다.", "freq": 1, "src": "장원118"}, {"id": 948, "type": "문장", "text": "鳥久止 必帶矢", "trans": "새가 오래 머무르면 반드시 화살을 맞는다.", "freq": 1, "src": "박영54"}, {"id": 950, "type": "문장", "text": "衆 惡之 必察焉 衆 好之 必察焉", "trans": "여럿이 나쁘다고 하더라도 반드시 살펴보고, 여럿이 좋다고 하더라도 반드시 살펴보라.", "freq": 1, "src": "미래140"}, {"id": 952, "type": "문장", "text": "重根 素不見伊藤 惟嘗見其小像 竊識之 乃披軍隊而前 擧槍射之三發 皆中伊藤胸腹 伊藤遂死 重根 見伊藤倒地 擧手大呼 ‘大韓萬歲’ (중략) 至死之日 脫洋裝 改着韓製衣 就刑 談笑如平日", "trans": "중근이 평소 이토를 보지 못하였지만, 일찍이 그의 작은 초상을 보아 몰래 알아보았다. 이에 군대를 헤치고 나아가 총을 세 발 쏘니, 모두 이토의 가슴과 배에 맞았다. 이토가 마침내 죽었다. 중근이 이토가 쓰러지는 것을 보고 손을 들어 크게 외치기를 \"대한 만세!\" ⋯(중략)⋯ 죽는 날에 이르러 양복을 벗고…", "freq": 1, "src": "미래 128"}, {"id": 953, "type": "문장", "text": "重根 素不見伊藤 惟嘗見其小像 竊識之 乃披軍隊而前 擧槍射之三發 皆中伊藤胸腹 伊藤遂死 重根 見伊藤倒地 擧手大呼‘大韓萬歲’", "trans": "중근이 평소 이토를 보지 못하였지만, 일찍이 그의 작은 초상을 보아 몰래 알아보았다. 이에 군대를 헤치고 나아가 총을 세 발 쏘니, 모두 이토의 가슴과 배에 맞았다. 이토가 마침내 죽었다. 중근이 이토가 쓰러지는 것을 보고 손을 들어 크게 외치기를 \"대한 만세!\"", "freq": 1, "src": "다락106"}, {"id": 955, "type": "문장", "text": "地不長無名之草", "trans": "땅은 이름 없는 풀을 기르지 않는다.", "freq": 1, "src": "미래67"}, {"id": 958, "type": "문장", "text": "智者 成之於順時 愚者 敗之於逆理", "trans": "지혜로운 자는 때에 순응하여 이루고, 어리석은 자는 이치에 거슬러 실패한다.", "freq": 1, "src": "박영67"}, {"id": 964, "type": "문장", "text": "知彼知己 百戰不殆 不知彼而知己 一勝一負 不知彼不知己 每戰必敗", "trans": "적을 알고 나를 알면 백 번 싸워도 위태롭지 않고, 적을 모르고 나만 알면 한 번 이기고 한 번 지며, 적도 모르고 나도 모르면 싸울 때마다 반드시 패한다.", "freq": 1, "src": "다락143"}, {"id": 971, "type": "문장", "text": "倉廩實則知禮節 衣食足則知榮辱", "trans": "창고가 가득 차야 예절을 알고, 의식이 족해야 영욕을 안다.", "freq": 1, "src": "박영116"}, {"id": 974, "type": "문장", "text": "天不生無祿之人 地不長無名之草", "trans": "하늘은 녹(祿) 없는 사람을 낳지 않고, 땅은 이름 없는 풀을 기르지 않는다.", "freq": 1, "src": "미래62"}, {"id": 983, "type": "문장", "text": "天下 無無一能之人 若聚十百人 而各用其長 便爲通才 如此 則世無棄人 人無棄才矣", "trans": "세상에 한 가지 재능도 없는 사람은 없다. 만약 열 명이나 백 명을 모아 각각 그 장점을 쓴다면, 곧 통재(通才)가 될 것이다. 이와 같이 한다면 세상에 버려지는 사람이 없고, 사람에게 버려지는 재주가 없을 것이다.", "freq": 1, "src": "장원98"}, {"id": 984, "type": "문장", "text": "天下兼相愛則治 交相惡則亂", "trans": "천하가 서로 사랑하면 다스려지고, 서로 미워하면 혼란해진다.", "freq": 2, "src": "대학125, 박영117"}, {"id": 987, "type": "문장", "text": "天下之所可畏者 唯民而已 民之可畏 有甚於水火虎豹 <중략> 夫天之立司牧 爲養民也 <중략> 上之人恬不知畏 以我國無豪民也", "trans": "천하에 두려워할 것은 오직 백성뿐이다. 백성이 두려운 것은 물과 불, 호랑이와 표범보다 심하다. ⋯(중략)⋯ 하늘이 목민관을 세운 것은 백성을 기르기 위함이다. ⋯(중략)⋯ 위에 있는 사람이 태연하여 두려워할 줄 모르는 것은 우리나라에 호민(豪民)이 없다고 여기기 때문이다.", "freq": 1, "src": "천재185"}, {"id": 988, "type": "문장", "text": "靑取之於藍而靑於藍", "trans": "청색은 쪽에서 취하였지만 쪽보다 더 푸르다.", "freq": 1, "src": "대학38"}, {"id": 989, "type": "문장", "text": "楚人 有涉江者 其劍 自舟中 墜於水 遽契其舟 曰: “是 吾劍之所從墜” 舟止 從其所契者 入水求之", "trans": "초나라 사람 중에 강을 건너는 자가 있었는데, 그의 칼이 배 안에서 물속으로 떨어졌다. 급히 배에 새기며 말하기를 \"이곳이 내 칼이 떨어진 곳이다.\" 배가 멈추자 새긴 곳에서 물속으로 들어가 칼을 찾았다.", "freq": 1, "src": "미래80"}, {"id": 991, "type": "문장", "text": "崔興孝 通國之善書者也 嘗赴擧 書卷 得一字 類王羲之 坐視終日 忍不能捨 懷卷而歸 是 可謂得失不存於心耳", "trans": "최흥효는 나라에서 글씨를 잘 쓰는 사람으로 알려져 있었다. 일찍이 과거에 응시하는데, 시권(試卷)에서 왕희지의 글씨와 비슷한 글자 하나를 발견하였다. 종일 앉아 보며 차마 버리지 못하다가, 시권을 품에 안고 돌아왔다. 이것이 이른바 득실이 마음에 존재하지 않는다 할 만하다.", "freq": 1, "src": "대학52"}, {"id": 997, "type": "문장", "text": "耽羅大饑 民相枕死 <중략> 於是萬德 捐千金貿米 陸地諸郡縣棹夫 以時至 萬德 取十之一 以活親族 其餘盡輸之官 浮黃者 聞之 集官庭如雲 官劑其緩急 分與之有差 男若女 出而頌萬德之恩 以爲活我者萬德", "trans": "탐라에 큰 기근이 들어 백성이 서로 베고 죽었다. ⋯(중략)⋯ 이에 만덕이 천금을 내놓아 쌀을 사고, 육지 여러 군현의 선인들이 때에 맞추어 이르니, 만덕이 십분의 일을 취하여 친족을 살리고, 나머지는 모두 관아에 바쳤다. 굶주린 자들이 이 소식을 듣고 관아 뜰에 구름처럼 모여들었다. 관아에서 급박한 정도에 따라 나누어 주되 차등이 있게 하였다.", "freq": 1, "src": "미래 122"}, {"id": 998, "type": "문장", "text": "耽羅大飢 民相枕死 <중략> 於是 萬德 捐千金 貿米陸地 諸郡縣棹夫 以時至 萬德 取十之一 以活親族 其餘 盡輸之官 浮黃者 聞之 集官庭如雲 官劑其緩急 分與之有差 男若女 出而頌萬德之恩 咸以爲活我者萬德", "trans": "탐라에 큰 기근이 들어 백성이 서로 베고 죽었다. ⋯(중략)⋯ 이에 만덕이 천금을 내놓아 육지에서 쌀을 사고, 여러 군현의 선인들이 때에 맞추어 이르니, 만덕이 십분의 일을 취하여 친족을 살리고, 나머지는 모두 관아에 바쳤다. 굶주린 자들이 이 소식을 듣고 관아 뜰에 구름처럼 모여들었다.", "freq": 1, "src": "장원110"}, {"id": 999, "type": "문장", "text": "太史公 云 \"以權利合者 權利盡而交疏\" 君亦世之滔滔中一人 其有超然自拔於滔滔權利之外 不以權利視我耶? 太史公之言非耶? 孔子曰 \"歲寒然後 知松柏之後凋\" 松柏 是貫四時而不凋者 歲寒以前 一松柏也 歲寒以後 一松柏也 聖人 特稱之於歲寒之後", "trans": "태사공(太史公)이 이르기를 \"권리로 합한 자는 권리가 다하면 교분이 멀어진다.\" 그대도 이 세상 분분한 사람 중의 하나이니, 권리를 초연히 벗어나 권리로 나를 보지 않는 자가 있겠는가? 태사공의 말이 그르단 말인가? 공자가 말씀하시기를 \"세한(歲寒)이 된 연후에 소나무와 잣나무가 나중에 시든다는 것을 알게 된다.\"", "freq": 1, "src": "장원142"}, {"id": 1000, "type": "문장", "text": "太山 不讓土壤 故能成其大 河海 不擇細流 故能就其深", "trans": "태산은 흙덩이를 마다하지 않기 때문에 그 크기를 이룰 수 있고, 하해(河海)는 작은 물줄기를 가리지 않기 때문에 그 깊이를 이룰 수 있다.", "freq": 3, "src": "다락71, 미래63, 천재81"}, {"id": 1001, "type": "문장", "text": "太山 不讓土壤 故 能成其大 河海 不擇細流 故 能就其深", "trans": "태산은 흙덩이를 마다하지 않기 때문에 그 크기를 이룰 수 있고, 하해는 작은 물줄기를 가리지 않기 때문에 그 깊이를 이룰 수 있다.", "freq": 1, "src": "비상81"}, {"id": 1002, "type": "문장", "text": "泰山 不辭土壤 故能成其大 河海 不擇細流 故能就其深", "trans": "태산은 흙덩이를 사양하지 않기 때문에 그 크기를 이룰 수 있고, 하해는 작은 물줄기를 가리지 않기 때문에 그 깊이를 이룰 수 있다.", "freq": 1, "src": "와이70"}, {"id": 1003, "type": "문장", "text": "太上 不知有之 其次 親之譽之 其次 畏之 其次 侮之", "trans": "가장 훌륭한 지도자는 백성이 있다는 것만 알 뿐이고, 그 다음은 백성이 가까이하고 칭찬하는 지도자이고, 그 다음은 두려워하는 지도자이고, 가장 나쁜 것은 업신여기는 지도자이다.", "freq": 1, "src": "박영110"}, {"id": 1004, "type": "문장", "text": "退溪先生 僑居漢城 隣家 栗樹數枝 過墻 子熟落庭 恐兒童取食 拾而投之墻外", "trans": "퇴계 선생이 한성에 살 때, 이웃집 밤나무 가지 몇 개가 담을 넘어왔다. 밤이 익어 뜰에 떨어지자, 어린 아이들이 주워 먹을까 두려워하여 집어다 담 밖으로 던졌다.", "freq": 1, "src": "장원106"}, {"id": 1005, "type": "문장", "text": "破山中賊易 破心中賊難", "trans": "산 속의 적을 무찌르기는 쉬우나, 마음속의 적을 무찌르기는 어렵다.", "freq": 1, "src": "대학32, 와이64"}, {"id": 1006, "type": "문장", "text": "판사: \"若何爲殺伊藤公也?\" 안중근: \"伊藤貪功而爲之者 攘我內外政權 吸我公私財源 虐殺我無辜人民\" 안중근: \"吾爲國家報仇 爲同胞報仇 安得不殺? 吾乃大韓義兵參謀將也\"", "trans": "판사: \"어찌하여 이토 공을 죽였는가?\" 안중근: \"이토는 공(功)을 탐하여 한 짓으로, 우리의 내외 정권을 빼앗고, 우리의 공사(公私) 재원을 빨아 먹고, 우리의 무고한 인민을 학살하였다.\" 안중근: \"내가 나라를 위해 원수를 갚고, 동포를 위해 원수를 갚는 것이니, 어찌 죽이지 않을 수 있겠소? 나는 나라를 위해…\"", "freq": 1, "src": "와이138"}, {"id": 1013, "type": "문장", "text": "鶴山守 通國之善歌者也 入山肄 每一闋 拾沙投屐 滿屐乃歸", "trans": "학산(鶴山) 수령은 나라에서 노래를 잘하는 사람으로 알려져 있었다. 산에 들어가 연습하되, 한 곡이 끝날 때마다 모래 한 개를 주워 나막신에 넣다가, 나막신이 가득 차면 돌아왔다.", "freq": 1, "src": "비상99"}, {"id": 1014, "type": "문장", "text": "學然後知不足", "trans": "배운 연후에야 부족함을 안다.", "freq": 1, "src": "미래66"}, {"id": 1015, "type": "문장", "text": "學而不思則罔 思而不學則殆", "trans": "배우기만 하고 생각하지 않으면 막연하고, 생각하기만 하고 배우지 않으면 위태롭다.", "freq": 1, "src": "박영98"}, {"id": 1017, "type": "문장", "text": "學而時習之 不亦說乎? 有朋自遠方來 不亦樂乎? 人不知而不慍 不亦君子乎?", "trans": "배우고 때로 익히면 또한 기쁘지 아니한가? 벗이 먼 곳에서 찾아오면 또한 기쁘지 아니한가? 남이 알아주지 않아도 성내지 않으면 또한 군자가 아닌가?", "freq": 1, "src": "다락130"}, {"id": 1019, "type": "문장", "text": "海內存知己 天涯若比隣", "trans": "천하에 나를 알아주는 벗이 있으면, 하늘 끝도 가까운 이웃과 같다.", "freq": 1, "src": "천재73"}, {"id": 1021, "type": "문장", "text": "孩兒之言 宜納耳門", "trans": "어린아이의 말을 귀 기울여 들어라.", "freq": 1, "src": "박영55"}, {"id": 1024, "type": "문장", "text": "許魯齋 暑中 過河陽 喝甚 道有梨 衆爭取啖 而獨危坐 或言 \"世亂 此無主\" 曰 \"梨無主 吾心獨無主乎?\"", "trans": "허로재(許魯齋)가 더운 여름날 하양(河陽)을 지나다 몹시 목이 말랐다. 길에 배가 있어 여러 사람이 다투어 따 먹는데, 홀로 단정히 앉아 있었다. 어떤 이가 \"세상이 어지러우니 임자가 없소.\" 하자, \"배에 임자가 없어도, 내 마음에 홀로 임자가 없겠는가?\" 하였다.", "freq": 1, "src": "장원106"}, {"id": 1026, "type": "문장", "text": "許生笑曰: “吾讀書未熟” 妻曰:“不有工乎?” 生曰: “工未素學 奈何?” 妻曰: “不有商乎?” 生曰: “商無本錢 奈何?” 其妻 恚且罵曰: “晝夜讀書 只學奈何? 不工不商 何不盜賊?”", "trans": "허생이 웃으며 말하기를 \"나는 글을 아직 다 읽지 못하였소.\" 아내가 말하기를 \"장인(匠人) 노릇이 있지 않습니까?\" 허생이 말하기를 \"장인 노릇은 평소에 배우지 않았으니 어찌하오?\" 아내가 말하기를 \"장사는 어떻습니까?\" 허생이 말하기를 \"장사는 밑천이 없으니 어찌하오?\" 그 아내가 화를 내며 꾸짖기를 \"밤낮으로 글을…\"", "freq": 1, "src": "박영133"}, {"id": 1027, "type": "문장", "text": "허생이 책 읽기만 좋아하고 일을 하지 않아 아내의 삯바느지로 겨우 먹고살았다 하루는 굶주림에 지친 처생의 아내가 울며 말했다 아내: “子平生不赴擧 讀書何爲?” 허생: “吾讀書未熟” 아내: “不有工乎?” 허생: “工 未素學 奈何?” 아내: “不有商乎?” 허생: “商 無本錢 奈何?” 아내: “晝夜讀書 只學奈何 不工不商 何不盜賊?” 허생이 책을 덮고 일어나 말하였다 허생: “惜乎! 吾讀書本期十年 今七年矣” 出門而去 無相識者 허생은 한양에서 제일 부자라는 변 씨를 찾아가 돈 만 냥을 빌려달라고 한다 그의 당당한 태도에 비범함을 느낀 변씨는 군말 없이 그 돈을 빌려준다", "trans": "허생이 책 읽기만 좋아하고 일을 하지 않아 아내의 삯바느질로 겨우 먹고살았다. 하루는 굶주림에 지친 허생의 아내가 울며 말하기를 아내: \"당신은 평생 과거에도 나가지 않으니…\"", "freq": 1, "src": "와이112"}, {"id": 1033, "type": "문장", "text": "後白變色 示以一紙 多記人姓名 將以除官者也 其族人姓名亦在錄中 後白曰: “吾錄子名 將以擬望 今子有求官之語 若求者得之 非公道也 惜乎! 子若不言 可以得官矣” 其人大慚而退 後白每除一官 必遍問其人可仕與否 若誤除不合之人 則輒終夜不眠曰: \"我誤國事\"", "trans": "후백(後白)이 낯빛을 바꾸며 종이 한 장을 내보이니, 많은 사람의 이름이 적혀 있어 관직에 제수하려는 것이었다. 그 친족의 이름도 적혀 있었다. 후백이 말하기를 \"내가 그대의 이름을 적어 천거하려 하였는데, 지금 그대가 관직을 구하는 말을 하였으니, 만약 구한 자가 얻는다면 공도(公道)가 아니다. 아깝구나! 그대가 말하지 않았다면 얻을 수 있었을 것이다.\"", "freq": 1, "src": "박영154"}, {"id": 1034, "type": "한시", "text": "江碧鳥逾白 山靑花欲燃 今春看又過 何日是歸年?", "trans": "강은 푸르고 새는 더욱 희며, 산은 파랗고 꽃은 불타려 하네. 올봄도 보는 사이 또 지나가니, 어느 날이 고향 돌아갈 해인가?", "freq": 3, "src": "다락81, 비상123, 천재112"}, {"id": 1035, "type": "한시", "text": "去年今日此門中 人面桃花相映紅 人面不知何處去 桃花依舊笑春風", "trans": "작년 오늘 이 문 안에서, 사람 얼굴과 복숭아꽃이 서로 붉게 빛났네. 사람 얼굴은 어디로 갔는지 알 수 없고, 복숭아꽃은 예전처럼 봄바람에 웃고 있네.", "freq": 1, "src": "다락91"}, {"id": 1036, "type": "한시", "text": "故人西辭黃鶴樓 煙花三月下揚州 孤帆遠影碧空盡 唯見長江天際流", "trans": "옛 벗은 서쪽 황학루에서 작별을 고하고, 안개꽃 피는 삼월에 양주로 내려가네. 외로운 돛의 먼 그림자 푸른 하늘 끝으로 사라지고, 오직 장강만 하늘가로 흘러가는 것이 보이네.", "freq": 1, "src": "장원66"}, {"id": 1037, "type": "한시", "text": "國破山河在 城春草木深 感時花濺淚 恨別鳥驚心 烽火連三月 家書抵萬金 白頭搔更短 渾欲不勝簪", "trans": "나라는 망했어도 산하는 그대로요, 성안에 봄이 오니 초목이 우거졌네. 시절을 느껴 꽃을 보아도 눈물 흘리고, 이별이 한스러워 새 소리에도 마음이 놀라네. 봉화가 석 달째 이어지니, 집에서 오는 편지는 만금보다 귀하네. 흰 머리를 긁을수록 더욱 짧아지니, 아무래도 비녀를 꽂지 못하겠네.", "freq": 1, "src": "대학104"}, {"id": 1038, "type": "한시", "text": "近來安否問如何 月白紗窓妾恨多 若使夢魂行有跡 門前石路已成沙", "trans": "근래에 안부를 물으니 어떠하십니까? 달 밝은 비단 창에 첩의 한이 많습니다. 만약 꿈속 혼이 다닌 자취가 있다면, 문 앞 돌길이 이미 모래가 되었을 것입니다.", "freq": 3, "src": "대학99, 미래 105, 천재120"}, {"id": 1039, "type": "한시", "text": "近來安否問如何 月到紗窓妾恨多 若使夢魂行有跡 門前石路便成沙", "trans": "근래에 안부를 물으니 어떠하십니까? 달이 비단 창에 비치니 첩의 한이 많습니다. 만약 꿈속 혼이 다닌 자취가 있다면, 문 앞 돌길이 곧 모래가 되었을 것입니다.", "freq": 1, "src": "비상129, 장원70"}, {"id": 1040, "type": "한시", "text": "岐王宅裏尋常見 崔九堂前幾度聞 正是江南好風景 落花時節又逢君", "trans": "기왕의 집에서 늘상 뵈었고, 최구의 당 앞에서 몇 번이나 노래를 들었지. 마침 강남의 좋은 풍경 때, 꽃 지는 시절에 또 그대를 만났네.", "freq": 1, "src": "박영82"}, {"id": 1041, "type": "한시", "text": "來從何處來 落向何處落? 姸姸細如眉 遍照天地廓", "trans": "오는 것은 어디서 오는가, 지는 것은 어디로 지는가? 가늘고 고운 것이 눈썹처럼 가는데, 넓은 천지를 두루 비추네.", "freq": 1, "src": "장원58"}, {"id": 1042, "type": "한시", "text": "離懷悄悄掩中門 羅袖無香滴淚痕 獨處深閨人寂寂 一庭微雨鎖黃昏", "trans": "이별의 마음으로 쓸쓸히 중문을 닫으니, 비단 소매엔 향기도 없이 눈물 자국만 남았네. 홀로 깊은 규방에 앉아 사람 소리 적적한데, 뜰 가득 가랑비가 황혼을 가두네.", "freq": 1, "src": "박영89"}, {"id": 1043, "type": "한시", "text": "問余何事棲碧山 笑而不答心自閑 桃花流水杳然去 別有天地非人間", "trans": "나에게 묻노니 어찌하여 푸른 산에 사느냐고, 웃으며 답하지 않아도 마음은 스스로 한가롭네. 복숭아꽃 흐르는 물 아득히 흘러가니, 딴 세상이 있어 인간 세상이 아니로다.", "freq": 2, "src": "대학93, 와이80"}, {"id": 1044, "type": "한시", "text": "問余何意棲碧山 笑而不答心自閑 桃花流水窅然去 別有天地非人間", "trans": "나에게 묻노니 어찌하여 푸른 산에 사느냐고, 웃으며 답하지 않아도 마음은 스스로 한가롭네. 복숭아꽃 흐르는 물 아득히 흘러가니, 딴 세상이 있어 인간 세상이 아니로다.", "freq": 1, "src": "미래 99"}, {"id": 1045, "type": "한시", "text": "山僧貪月色 幷汲一甁中 到寺方應覺 甁傾月亦空", "trans": "산 스님이 달빛을 탐하여, 함께 병에 담아 길어 왔네. 절에 도착하고서야 비로소 깨달으니, 병을 기울이니 달도 또한 없어졌네.", "freq": 1, "src": "대학92"}, {"id": 1046, "type": "한시", "text": "十五越溪女 羞人無語別 歸來掩重門 泣向梨花月", "trans": "열다섯 살 월계의 아가씨, 부끄러워 말도 못하고 이별하네. 돌아와서 겹문을 닫고, 배꽃 달 아래 흐느껴 우네.", "freq": 2, "src": "미래 104, 와이84"}, {"id": 1047, "type": "한시", "text": "我兄顔髮曾誰似 每憶先君看我兄 今日思兄何處見 自將巾袂映溪行", "trans": "우리 형의 얼굴과 머리칼이 일찍이 누구를 닮았던고, 늘 아버님 생각날 때마다 우리 형을 바라보았네. 오늘은 형이 그리워도 어디서 볼 수 있으랴, 스스로 수건 소매 잡고 시냇물에 비춰 보며 걷노라.", "freq": 1, "src": "천재121"}, {"id": 1048, "type": "한시", "text": "雨歇長堤草色多 送君南浦動悲歌 大同江水何時盡 別淚年年添綠波", "trans": "비 개인 긴 언덕에 풀빛이 짙고, 그대를 남포에서 보내니 슬픈 노래 울리네. 대동강 물은 어느 때나 마를 것인가, 이별 눈물이 해마다 푸른 물결에 더해지네.", "freq": 5, "src": "다락89, 대학98, 박영83, 와이86, 장원66"}, {"id": 1049, "type": "한시", "text": "有約郞何晩 庭梅欲謝時 忽聞枝上鵲 虛畫鏡中眉", "trans": "약속이 있건만 낭군은 어찌 늦는가, 뜰의 매화가 지려 하는 때. 홀연히 가지 위 까치 소리 들려, 헛되이 거울 속에 눈썹 그려 보네.", "freq": 1, "src": "박영88"}, {"id": 1050, "type": "한시", "text": "昨日入城市 歸來淚滿巾 徧身羅綺者 不是養蠶人", "trans": "어제 성시(城市)에 들어갔다가, 돌아오니 수건에 눈물이 가득하네. 온몸에 비단 걸친 자들은, 누에 치는 사람이 아니라네.", "freq": 1, "src": "장원62"}, {"id": 1051, "type": "한시", "text": "昨日入城市 歸來淚滿巾 徧身羅綺者 不是養蠶人", "trans": "어제 성시에 들어갔다가, 돌아오니 수건에 눈물이 가득하네. 온몸에 비단 걸친 자들은, 누에 치는 사람이 아니라네.", "freq": 1, "src": "박영76"}, {"id": 1052, "type": "한시", "text": "鳥獸哀鳴海岳嚬 槿花世界已沈淪 秋燈掩卷懷千古 難作人間識字人", "trans": "새와 짐승도 슬피 울고 산하도 찡그리는데, 무궁화 세계는 이미 가라앉아 버렸네. 가을 등불 아래 책을 덮고 천고를 생각하니, 세상에서 글 아는 사람 노릇 하기 어렵구나.", "freq": 1, "src": "장원62"}, {"id": 1053, "type": "한시", "text": "種花愁未發 花發又愁落 開落摠愁人 未識種花樂", "trans": "꽃을 심어 피지 않을까 걱정하고, 꽃이 피면 또 질까 걱정하네. 피고 지는 것 모두 사람을 근심스럽게 하니, 꽃 심는 즐거움을 알지 못하겠네.", "freq": 1, "src": "와이78"}, {"id": 1054, "type": "한시", "text": "天旣生兩手 意欲有所爲 安能拱而坐 以待雨粟時", "trans": "하늘이 이미 두 손을 주었으니, 뜻이 있어 하려는 바가 있네. 어찌 두 손 맞잡고 앉아서, 하늘에서 곡식 내려오기만 기다리겠는가?", "freq": 1, "src": "박영77"}, {"id": 1055, "type": "한시", "text": "穿雪野中去 不須胡亂行 今朝我行跡 遂作後人程", "trans": "눈 덮인 들판을 걸어갈 때, 모름지기 함부로 걷지 말라. 오늘 아침 내가 걷는 발자국이, 마침내 뒷사람의 이정표가 되리니.", "freq": 1, "src": "다락83"}, {"id": 1056, "type": "한시", "text": "秋陰漠漠四山空 落葉無聲滿地紅 立馬溪橋問歸路 不知身在畫圖中", "trans": "가을 구름 자욱하고 사방 산은 텅 빈데, 낙엽은 소리 없이 땅에 가득 붉게 쌓였네. 말 세우고 시냇가 다리에서 돌아갈 길 물으니, 몸이 그림 속에 있는 줄을 몰랐네.", "freq": 1, "src": "비상135"}, {"id": 1057, "type": "한시", "text": "秋淨長湖碧玉流 荷花深處係蘭舟 逢郞隔水投蓮子 剛被人知半日羞", "trans": "가을 맑은 긴 호수에 벽옥 같은 물 흐르고, 연꽃 깊은 곳에 난초 배를 매었네. 낭군 만나 물 건너 연밥을 던지다가, 그만 사람들에게 들켜 한나절 부끄러웠네.", "freq": 1, "src": "장원70"}, {"id": 1058, "type": "한시", "text": "春眠不覺曉 處處聞啼鳥 夜來風雨聲 花落知多少?", "trans": "봄잠에 새벽이 밝는 줄 모르고, 곳곳에서 새 우는 소리 들리네. 밤새 바람 불고 비 내리더니, 꽃은 얼마나 졌을까?", "freq": 1, "src": "미래 98"}, {"id": 1059, "type": "한시", "text": "春雨細不滴 夜中微有聲 雪盡南溪漲 草芽多少生?", "trans": "봄비가 가늘어 방울지지 않는데, 밤중에 은은히 소리가 있네. 눈이 다 녹아 남쪽 시냇물 불어나고, 풀싹은 얼마나 돋아났을까?", "freq": 1, "src": "장원58"}, {"id": 1060, "type": "한시", "text": "橫看成嶺側成峯 遠近高低無一同 不識廬山眞面目 只緣身在此山中", "trans": "가로로 보면 봉우리요 옆으로 보면 봉우리라, 멀고 가깝고 높고 낮음이 하나도 같지 않네. 여산의 참 모습을 알지 못하는 것은, 단지 내 몸이 이 산 속에 있기 때문이라네.", "freq": 1, "src": "천재113"}];

var cf='all', cq='', cid=-1, filtered=D.slice();

var RC = {
  '주어':   '#1a5fa0',
  '서술어': '#c0392b',
  '목적어': '#1a7a4a',
  '보어':   '#c87700',
  '수식어': '#6a2a8a',
  '부사어': '#1a7a7a',
  '어조사': '#8a8a8a'
};
var RL = [
  ['주어','#1a5fa0'],['서술어','#c0392b'],['목적어','#1a7a4a'],
  ['보어','#c87700'],['수식어','#6a2a8a'],['부사어','#1a7a7a'],['어조사','#8a8a8a']
];
var TN = {'주술':'주술 구조','주술목':'주술목 구조','주술보':'주술보 구조','주술목보':'주술목보 구조'};

function filt(f,btn){
  cf=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on'); doFilter();
}
function doSearch(){ cq=document.getElementById('sq').value.trim(); doFilter(); }
function doFilter(){
  var list=D.slice();
  if(cf==='hs') list=list.filter(function(t){return t.type==='한시';});
  else if(cf==='mj') list=list.filter(function(t){return t.type==='문장';});
  else if(cf==='freq') list=list.slice().sort(function(a,b){return b.freq-a.freq;});
  if(cq) list=list.filter(function(t){return t.text.indexOf(cq)>=0||t.src.indexOf(cq)>=0;});
  filtered=list;
  document.getElementById('cnt').textContent=filtered.length+'개';
  drawList();
}
function drawList(){
  var el=document.getElementById('LS'), h='';
  if(!filtered.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#9a8a6a;font-size:13px;">결과 없음</div>';return;}
  for(var i=0;i<filtered.length;i++){
    var t=filtered[i];
    var tc=(t.type==='한시')?'po':'pr';
    var sel=(cid===t.id)?' sel':'';
    var prev=t.text.replace(/\s+/g,' ').substring(0,55)+(t.text.length>55?'…':'');
    h+='<div class="item'+sel+'" onclick="pick('+t.id+')">';
    h+='<div class="item-meta"><span class="ibadge '+tc+'">'+t.type+'</span>';
    if(t.freq>1) h+='<span style="font-size:10px;color:#9a8a6a;">빈도 '+t.freq+'</span>';
    h+='<span class="isrc">'+esc(t.src)+'</span></div>';
    h+='<div class="itext">'+esc(prev)+'</div></div>';
  }
  el.innerHTML=h;
}
function pick(id){
  cid=id; drawList();
  var item=null;
  for(var i=0;i<D.length;i++){if(D[i].id===id){item=D[i];break;}}
  if(!item) return;
  showViewer(item);
  if(window.innerWidth<=680){
    document.getElementById('LP').classList.remove('mob');
    document.getElementById('VP').classList.add('mob');
  }
}
function goList(){
  document.getElementById('LP').classList.add('mob');
  document.getElementById('VP').classList.remove('mob');
}
function switchTab(tab){
  document.getElementById('vt1').className='vtab'+(tab==='trans'?' on':'');
  document.getElementById('vt2').className='vtab'+(tab==='struct'?' on':'');
  document.getElementById('PT').className='panel-inner'+(tab==='trans'?' show':'');
  document.getElementById('PS').className='panel-inner'+(tab==='struct'?' show':'');
}
function showViewer(item){
  var tc=(item.type==='한시')?'po':'pr';
  var VH=document.getElementById('VH');
  VH.className='VH show';
  VH.innerHTML='<span class="vhb '+tc+'">'+item.type+'</span>'+
    (item.freq>1?'<span class="vhf">빈도 '+item.freq+'</span>':'')+
    '<span class="vhs">'+esc(item.src)+'</span>';
  document.getElementById('VE').style.display='none';
  document.getElementById('tabRow').className='vtab-row show';

  var PT=document.getElementById('PT');
  var tr=item.trans||'';
  PT.innerHTML=(item.type==='한시')?renderPoem(item.text,tr):renderProse(item.text,tr);

  var PS=document.getElementById('PS');
  var key=String(item.id);
  PS.innerHTML = STRUCT[key] ? renderStruct(STRUCT[key]) :
    '<div class="s-none">이 지문의 문장 구조 분석 자료를 준비 중입니다.</div>';

  switchTab('trans');
}
function renderProse(text,trans){
  return '<div class="pair-box">'+
    '<div class="col-o"><div class="col-h">원문 (原文)</div><div class="otxt">'+esc(text)+'</div></div>'+
    '<div class="col-t"><div class="col-h">번역 (飜譯)</div><div class="ttxt">'+esc(trans)+'</div></div>'+
  '</div>';
}
function renderPoem(text,trans){
  var ol=splitPoem(text),tl=trans?splitPoem(trans):[],h='';
  h+='<div class="pg"><div>';
  h+='<div class="pch o">원문 (原文)</div>';
  for(var i=0;i<ol.length;i++) h+='<div class="pl">'+esc(ol[i])+'</div>';
  h+='</div><div><div class="pch t">번역 (飜譯)</div>';
  for(var i=0;i<tl.length;i++) h+='<div class="ptl">'+esc(tl[i])+'</div>';
  h+='</div></div>';
  if(tl.length){
    h+='<div class="psec"><div class="psh">구(句) 단위 대조</div>';
    var n=Math.max(ol.length,tl.length);
    for(var i=0;i<n;i++) h+='<div class="prow"><div class="po2">'+esc(ol[i]||'')+'</div><div class="pt2">'+esc(tl[i]||'')+'</div></div>';
    h+='</div>';
  }
  return h;
}
function renderStruct(d){
  var h='';
  h+='<div class="s-legend">';
  for(var i=0;i<RL.length;i++){
    h+='<div class="s-li"><div class="s-ld" style="background:'+RL[i][1]+'"></div>'+RL[i][0]+'</div>';
  }
  h+='</div>';
  h+='<div class="s-top"><span class="s-tbadge">'+(TN[d.type]||d.type)+'</span></div>';
  if(d.note) h+='<div class="s-note">'+esc(d.note)+'</div>';
  for(var i=0;i<d.sentences.length;i++){
    var s=d.sentences[i];
    h+='<div class="s-sent">';
    h+='<div class="s-orig">'+esc(s.orig)+'</div>';
    h+='<div class="s-trans">'+esc(s.trans)+'</div>';
    h+='<div class="s-segs">';
    for(var j=0;j<s.segs.length;j++){
      var sg=s.segs[j];
      var col=RC[sg.r]||'#6a5a3a';
      h+='<div class="s-seg">';
      h+='<div class="s-char">'+esc(sg.t)+'</div>';
      h+='<div class="s-role" style="background:'+col+'">'+sg.r+'</div>';
      if(sg.m) h+='<div class="s-mean">'+esc(sg.m)+'</div>';
      h+='</div>';
    }
    h+='</div></div>';
  }
  return h;
}
function splitPoem(text){
  var t=text.trim();
  if(t.indexOf('\n')>=0) return t.split('\n').map(function(s){return s.trim();}).filter(Boolean);
  var lines=[],cur='';
  for(var i=0;i<t.length;i++){
    cur+=t[i];
    if('?!？！。'.indexOf(t[i])>=0){if(cur.trim())lines.push(cur.trim());cur='';}
    else if(t[i]===' '&&cur.replace(/ /g,'').length>=4&&i<t.length-1){
      var nx=t.indexOf(' ',i+1);
      if(nx<0||nx-i>3){lines.push(cur.trim());cur='';}
    }
  }
  if(cur.trim())lines.push(cur.trim());
  return lines.length<=1?t.split(' ').filter(Boolean):lines;
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
doFilter();
if(D.length>0) pick(D[0].id);

</script>

<!-- 오른쪽 하단 제출 버튼 -->
<button class="sub-float" onclick="openSubModal()">📤 과제 제출</button>

<script>
var _SUBMIT_URL = 'https://script.google.com/macros/s/AKfycbw771Qtr-YI4icYvN-IngcBI9FAt-DYGpUEEfqfYo-ke4nefv9IXYAk5JntaCGssKii/exec';
var _APP_NAME = '원문 번역 뷰어';

function openSubModal(){
  document.getElementById('subOverlay').classList.add('on');
  document.getElementById('subMsg').textContent='';
  document.getElementById('subMsg').className='sub-msg';
}
function closeSubModal(){
  document.getElementById('subOverlay').classList.remove('on');
}
document.getElementById('subOverlay').addEventListener('click',function(e){
  if(e.target===this)closeSubModal();
});

function submitAssignment(){
  var name=document.getElementById('subName').value.trim();
  var sid=document.getElementById('subSid').value.trim();
  var term=document.getElementById('subTerm').value;
  var memo=document.getElementById('subMemo').value.trim();
  if(!name||!sid||!term){
    var m=document.getElementById('subMsg');
    m.textContent='이름, 학번, 제출 시기를 모두 입력해주세요.';
    m.className='sub-msg err';return;
  }
  var btn=document.getElementById('subOkBtn');
  btn.disabled=true;btn.textContent='전송 중...';
  var appData={
    info: '원문 번역 뷰어 학습 완료'
  };
  var payload=Object.assign({name:name,sid:sid,term:term,app:_APP_NAME,memo:memo},appData);
  var form=new FormData();
  form.append('payload',JSON.stringify(payload));
  fetch(_SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
  .then(function(){
    var m=document.getElementById('subMsg');
    m.textContent='✓ 제출 완료! 교수님께 전달되었습니다.';
    m.className='sub-msg ok';
    btn.disabled=false;btn.textContent='제출하기';
    setTimeout(closeSubModal,2000);
  })
  .catch(function(){
    var m=document.getElementById('subMsg');
    m.textContent='전송 오류가 발생했습니다. 다시 시도해주세요.';
    m.className='sub-msg err';
    btn.disabled=false;btn.textContent='제출하기';
  });
}
</script>
